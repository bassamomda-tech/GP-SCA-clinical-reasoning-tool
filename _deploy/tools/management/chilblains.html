MG.render({"icon":"🥶","title":"Chilblains","guideline":"NICE CKS","stemTitle":"Chilblains (perniosis) — keep warm, protect skin, reassure","stemSub":"Primary-care management of chilblains — painful, itchy inflammatory skin lesions from cold exposure; treat by warmth and skin care, prevent recurrence, and recognise when an underlying connective-tissue disease or other pathology should be considered. NICE CKS · 2026.","glance":[{"lbl":"Cause","val":"Cold-induced","sub":"abnormal vascular response"},{"lbl":"Cornerstone","val":"Keep warm + skin care","sub":"gradual rewarming"},{"lbl":"Severe/recurrent","val":"Nifedipine","sub":"consider"},{"lbl":"Prevent","val":"Warm clothing, stop smoking","sub":"avoid sudden heat"},{"lbl":"Don't","val":"Rub / direct heat","sub":"worsens"},{"lbl":"Red flag","val":"Ulceration / digital ischaemia / CTD","sub":"= investigate"}],"flow":[{"t":"node","d":"found","n":"1","tag":"Foundation","title":"Diagnose + consider associations","blocks":[{"b":"kv","rows":[["Typical","Itchy/painful red-purple swellings on toes (also fingers, ears, nose) hours after cold exposure; may blister; resolve over 1–3 weeks; worse in damp/cold"],["Mostly primary","Idiopathic, in otherwise healthy people; recurrent each winter"],["Consider secondary","If atypical/severe/persistent, or systemic features → connective-tissue disease (SLE, ‘chilblain lupus’), Raynaud’s, cryoglobulinaemia, peripheral vascular disease, low BMI/eating disorder"],["Examine","Peripheral pulses, skin integrity; look for ulceration/ischaemia"]]},{"b":"why","html":"Chilblains are usually a benign, self-limiting cold-induced phenomenon. The reasoning step is recognising when they are secondary — persistent/severe/atypical lesions or systemic features warrant screening for connective-tissue disease or vascular pathology."}]},{"t":"node","d":"safety","n":"2","tag":"Safety-net","title":"Don't miss","blocks":[{"b":"tiles","v":"safety","items":[{"t":"🔴 Digital ischaemia / ulceration","html":"Non-healing ulcer, necrosis, absent pulses → urgent vascular assessment."},{"t":"🟠 Connective-tissue disease","html":"Persistent chilblain-like lesions, photosensitivity, arthralgia, malar rash → consider lupus; check ANA."},{"t":"🟠 Raynaud’s overlap","html":"Marked colour change of digits with cold → manage Raynaud’s; consider secondary causes."}]}]},{"t":"node","d":"drug","n":"3","tag":"Treatment","title":"Mostly non-drug","blocks":[{"b":"ladder","steps":[{"step":"Step 1","title":"Warmth + skin care","when":"all","html":"Keep the whole body and extremities warm; gradual rewarming (not direct heat); warm gloves/socks/footwear; moisturise; protect blistered/broken skin; do not rub or scratch. Most resolve in 1–3 weeks."},{"step":"Step 2","title":"Symptom relief","when":"if itchy/painful","fromLabel":"symptomatic","html":"Soothing emollient; a short course of topical corticosteroid may reduce itch/inflammation; analgesia if painful."},{"step":"Step 3","title":"Nifedipine","when":"severe/recurrent","fromLabel":"if recurrent/refractory","html":"Consider <b>nifedipine 5–20 mg TDS</b> (vasodilator) for severe or recurrent chilblains (off-label) and for prevention through winter; counsel on side effects."}]},{"b":"warn","html":"Avoid direct heat (hot water bottles, fires) and rubbing — these worsen the inflammatory vascular response. Smoking and very low body weight predispose."}]},{"t":"node","d":"life","n":"4","tag":"Prevention","title":"Self-care","blocks":[{"b":"tiles","v":"life","items":[{"t":"🧤 Stay warm","html":"Warm gloves, thermal socks, layered clothing; keep home adequately heated; warm footwear."},{"t":"🚭 Stop smoking","html":"Smoking impairs peripheral circulation — offer cessation."},{"t":"🔥 Rewarm gradually","html":"Warm extremities slowly; avoid sudden heat after cold."},{"t":"⚖️ Nutrition","html":"Address low body weight; keep active to improve circulation."}]},{"b":"say","html":"These are chilblains — the skin’s painful over-reaction to cold. They’re harmless and settle over a week or two. The key is keeping warm all over and rewarming slowly — don’t put feet straight onto direct heat, and try not to scratch. Warm socks, stopping smoking and keeping moving all help prevent them. If a sore won’t heal, come back."}]},{"t":"node","d":"follow","n":"5","tag":"Follow-up","title":"Review & prevention","blocks":[{"b":"timeline","items":[{"n":"1","when":"1–3 weeks","title":"Expect resolution","html":"Most chilblains resolve within 1–3 weeks with warmth and avoiding rapid rewarming. Review if not settling, ulcerating, or recurrent."},{"n":"2","when":"Each winter","title":"Prevent recurrence","html":"Keep extremities warm (gloves/thermal socks), avoid sudden temperature change, stop smoking. Consider winter-long <b>nifedipine 5–20 mg TDS</b> (off-label) for severe recurrent cases."},{"n":"3","when":"Atypical / persistent","title":"Look for a cause","html":"Persistent, ulcerating or out-of-season lesions → investigate for an underlying cause (connective tissue disease, e.g. lupus / chilblain lupus) or refer."}]},{"b":"say","html":"These usually clear in a couple of weeks once your feet stay warm. Warm them up slowly, not in front of a fire, and over winter keep them well wrapped — come back if they don't heal or keep returning."}]},{"t":"node","d":"refer","n":"6","tag":"Refer","title":"When to refer / investigate","blocks":[{"b":"tiles","v":"refer","items":[{"t":"🟠 Atypical / persistent","html":"Ulcerating, out-of-season, or not resolving → investigate for an underlying cause (connective-tissue disease / chilblain lupus) or refer dermatology."},{"t":"🔴 Ischaemia","html":"Signs of peripheral arterial disease or digital ischaemia → vascular assessment."},{"t":"🩺 Recurrent severe","html":"Frequent disabling chilblains despite preventive measures → dermatology / specialist advice."}]}]}],"foot":"Management of chilblains in primary care — usually benign; persistent/atypical lesions warrant screening for connective-tissue or vascular disease. Verify against current NICE CKS Chilblains."});
</script>
