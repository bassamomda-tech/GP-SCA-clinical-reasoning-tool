<script>
MG.render({
  icon:"🦋",
  title:"Hyperthyroidism — The Complete Guide",
  stemTitle:"Thyrotoxicosis made simple &mdash; confirm the cause, β-block the symptoms, carbimazole with the agranulocytosis rule",
  stemSub:"One pathway: confirm biochemically and find the CAUSE (Graves vs toxic nodule vs thyroiditis — it changes everything), calm symptoms with a β-blocker, start carbimazole titration or block-and-replace, counsel the agranulocytosis red flag that saves lives, plan definitive radioiodine/surgery, handle the pregnancy and thyroid-eye-disease curveballs, and recognise thyroid storm + subclinical disease. NICE NG145 \u00b7 CKS.",
  guideline:"NICE NG145 \u00b7 BTA",
  glance:[
    {lbl:"Confirm", val:"\u2193TSH + \u2191FT4/FT3", sub:"then find the cause"},
    {lbl:"Cause matters", val:"TRAb / uptake scan", sub:"Graves vs nodule vs thyroiditis"},
    {lbl:"Symptoms", val:"Propranolol 40mg", sub:"while you sort the rest"},
    {lbl:"Drug", val:"Carbimazole", sub:"PTU in 1st-trimester pregnancy"},
    {lbl:"Red flag", val:"Sore throat + fever", sub:"STOP drug \u2192 urgent FBC"},
    {lbl:"Emergency", val:"Thyroid storm", sub:"fever, AF, delirium \u2192 999"}
  ],
  flow:[

    {t:"node", d:"found", n:"1", tag:"Step 1 · confirm & cause", title:"Confirm biochemically — then find the CAUSE (it changes the plan)",
      blocks:[
        {b:"kv", rows:[
          ["Confirm","<b>\u2193TSH with \u2191FT4 and/or \u2191FT3</b> = overt hyperthyroidism. <b>\u2193TSH with normal FT4 + FT3</b> = subclinical (Step 7). Repeat after 2\u20136 weeks to confirm + exclude non-thyroidal illness"],
          ["<b>Find the cause \u2014 it dictates everything</b>","<b>TRAb (TSH-receptor antibody)</b> first-line: positive \u2192 <b>Graves'</b> (commonest; diffuse goitre, eye signs, pretibial myxoedema). Negative/uncertain \u2192 <b>technetium uptake scan</b>: high focal = toxic nodule/multinodular goitre; low/absent = thyroiditis"],
          ["Graves' vs thyroiditis is the key fork","Graves & nodular disease OVERproduce hormone (need antithyroid drugs \u00b1 definitive treatment). <b>Thyroiditis LEAKS stored hormone</b> (self-limiting \u2014 antithyroid drugs useless; treat symptoms only, expect a hypothyroid phase)"],
          ["Bloods + baseline","TFTs, TRAb, FBC + LFTs (BEFORE starting carbimazole \u2014 baseline neutrophils + transaminases), glucose; ECG if palpitations/AF"],
          ["Types of thyroiditis","Post-partum, subacute (de Quervain's \u2014 painful goitre + raised CRP, post-viral), drug-induced (amiodarone, lithium, immunotherapy/checkpoint inhibitors)"]
        ]},
        {b:"why", html:"The single most useful early question is <strong>overproduction or leak?</strong> \u2014 because carbimazole only works on glands that are actively making too much hormone. Give it to thyroiditis and you achieve nothing but side-effect risk. TRAb \u00b1 uptake scan answers it and should precede committing to long-term antithyroid therapy."},
        {b:"warn", html:"<b>Refer everyone with confirmed thyrotoxicosis to endocrinology</b> (NG145) \u2014 but start symptom control and, where clearly Graves', often antithyroid drugs in primary care per local shared-care while awaiting review. New AF, pregnancy, thyroid eye disease, a child, or a very unwell patient = <b>urgent</b> referral."}
      ]},

    {t:"node", d:"drug", n:"2", tag:"Step 2 · symptoms", title:"Calm the symptoms first — the β-blocker bridge",
      blocks:[
        {b:"kv", rows:[
          ["Beta-blocker","<b>Propranolol 40mg BD\u2013TDS</b> (non-selective \u2014 also blunts peripheral T4\u2192T3 conversion) for palpitations, tremor, anxiety, heat intolerance \u2014 rapid relief while antithyroid drugs (weeks) or thyroiditis (self-limiting) take effect. Bisoprolol if asthma/COPD (with caution)"],
          ["Works for every cause","Symptom control is identical whether Graves, nodule or thyroiditis \u2014 start it day one regardless, wean as the patient settles"],
          ["Atrial fibrillation","Thyrotoxic AF is common \u2014 rate-control with the \u03b2-blocker; anticoagulate by CHA\u2082DS\u2082-VASc (thyrotoxicosis itself is prothrombotic; many revert to sinus once euthyroid)"],
          ["Caution","Avoid \u03b2-blocker in decompensated heart failure; use rate-limiting CCB (diltiazem) if truly contraindicated"]
        ]}
      ]},

    {t:"node", d:"drug", n:"3", tag:"Step 3 · antithyroid drug", title:"Carbimazole — titration vs block-and-replace",
      blocks:[
        {b:"ladder", steps:[
          {step:"1st", title:"Carbimazole — titration regimen", when:"Graves / toxic nodular disease",
           html:"<b>Carbimazole 20\u201340mg OD</b> (higher for severe), reduce every 4\u20136 weeks guided by FT4 (NOT TSH \u2014 it stays suppressed for months) to a maintenance ~5\u201315mg. Symptoms improve in 2\u20134 weeks, biochemistry in 4\u20136. <b>Graves: 12\u201318 month course</b> then trial off (~50% remit); toxic nodules rarely remit \u2192 need definitive treatment"},
          {step:"Alt", title:"Block-and-replace", when:"labile control / specialist preference",
           fromLabel:"Graves only",
           html:"Fixed higher-dose carbimazole (40mg) + levothyroxine added once euthyroid \u2014 fewer blood tests, same remission rate; NOT for use in pregnancy"},
          {step:"Pregnancy", title:"Propylthiouracil (PTU) in the 1st trimester", when:"pregnant / planning",
           fromLabel:"the teratogenicity swap",
           html:"<b>Carbimazole is teratogenic (aplasia cutis, embryopathy) \u2014 switch to PTU pre-conception and through the 1st trimester</b>, then many switch back to carbimazole in 2nd/3rd (PTU hepatotoxicity risk). Lowest dose to keep FT4 at the upper-normal limit; joint obstetric-endocrine care; TRAb crosses the placenta (fetal thyroid monitoring)"}
        ]},
        {b:"table", head:["Side effect","Detail","Action"], rows:[
          ["<b>Agranulocytosis</b> (rare, ~0.3%, life-threatening)","Both carbimazole & PTU \u2014 usually first 3 months","<b>Counsel EVERY patient: sore throat, mouth ulcers, fever, or any infection \u2192 STOP the drug + urgent same-day FBC.</b> Neutropenic \u2192 stop permanently, don't re-challenge, treat as neutropenic sepsis if unwell"],
          ["Rash / urticaria / arthralgia","Common, usually mild","Antihistamine; if mild continue; severe \u2192 switch carbimazole\u2194PTU"],
          ["Hepatotoxicity","PTU > carbimazole (PTU can cause fulminant failure)","LFTs if jaundice/dark urine/RUQ pain \u2192 stop"],
          ["Over-treatment \u2192 hypothyroid","Titration overshoot","Reduce dose (titration) or add/adjust levothyroxine (block-replace); monitor FT4"]
        ]},
        {b:"warn", html:"<b>The agranulocytosis rule is the single most important thing you say in this consultation.</b> Give it verbally AND in writing: any sign of infection, especially sore throat + fever \u2014 stop the tablet and get a same-day full blood count. Missing it kills."}
      ]},

    {t:"node", d:"drug", n:"4", tag:"Step 4 · definitive", title:"Definitive treatment — radioiodine or surgery",
      blocks:[
        {b:"kv", rows:[
          ["Radioiodine (RAI)","First-line definitive for most Graves & toxic nodular disease \u2014 outpatient oral dose; <b>expect eventual hypothyroidism</b> (lifelong levothyroxine, a planned outcome not a failure). Radiation-protection precautions; <b>avoid pregnancy/breastfeeding</b> (defer conception ~6 months, both partners)"],
          ["Can worsen thyroid eye disease","RAI can flare Graves ophthalmopathy \u2014 caution/steroid cover in active eye disease, or choose an alternative; smoking cessation is critical (smoking drives eye disease)"],
          ["Surgery (total thyroidectomy)","Large compressive goitre, suspected malignancy, severe eye disease, pregnancy with poor drug control, patient choice \u2014 must be euthyroid pre-op (antithyroid drugs \u00b1 iodine/\u03b2-blocker). Risks: hypoparathyroidism, recurrent laryngeal nerve; lifelong levothyroxine"],
          ["Choice driver","Graves wanting a shot at drug remission \u2192 12\u201318m carbimazole first; nodular disease \u2192 definitive treatment earlier (won't remit)"]
        ]}
      ]},

    {t:"node", d:"monitor", n:"5", tag:"Step 5 · monitor", title:"Monitoring — track FT4, not TSH, early on",
      blocks:[
        {b:"table", head:["What","When","Note"], rows:[
          ["FT4 (± FT3)","Every 4\u20136 weeks while titrating \u2192 then 3-monthly","<b>TSH stays suppressed for months \u2014 don't titrate to it early</b>; use FT4"],
          ["TSH","Once it recovers, then to confirm euthyroid","Guides long-term dosing once the axis resets"],
          ["FBC","No routine monitoring \u2014 SYMPTOM-triggered","The agranulocytosis rule replaces routine FBCs (do baseline; then only if infection signs)"],
          ["LFTs","If hepatotoxicity symptoms","PTU especially"],
          ["After stopping (Graves)","TFTs at 6\u20138 weeks, then periodically for \u226512 months","~50% relapse \u2014 often in the first year; relapse \u2192 definitive treatment"],
          ["After RAI / surgery","Lifelong TFTs","Detect the expected hypothyroidism \u2192 levothyroxine (see hypothyroidism guide)"]
        ]},
        {b:"say", html:"Two things to hold onto. First \u2014 and this is the one that matters most \u2014 if you get a sore throat, mouth ulcers or a fever, STOP the tablet and ring us the same day for a blood test; it's rare but we take it seriously. Second, the tablets work slowly, so we judge them on blood tests over weeks, and the \u03b2-blocker settles the racing and shakes in the meantime."}
      ]},

    {t:"node", d:"safety", n:"6", tag:"Emergencies", title:"Thyroid storm + thyroid eye disease",
      blocks:[
        {b:"kv", rows:[
          ["<b>Thyroid storm (thyrotoxic crisis)</b>","Fever, tachyarrhythmia/AF, agitation/delirium, vomiting/diarrhoea, heart failure \u2014 often triggered by infection, surgery, RAI, or stopping drugs. <b>Medical emergency \u2192 999/admit</b> (IV \u03b2-blocker, propylthiouracil, iodine, hydrocortisone, cooling, treat trigger). Mortality is high \u2014 low threshold"],
          ["<b>Thyroid eye disease (Graves ophthalmopathy)</b>","Grittiness, redness, proptosis, lid retraction, diplopia. <b>Red-flag: pain, colour-vision loss, or reduced acuity = sight-threatening optic neuropathy \u2192 same-day ophthalmology</b>. Strongly linked to smoking \u2014 cessation is treatment; refer active/moderate disease to a combined clinic (steroids/teprotumumab/orbital care)"],
          ["Selenium","May help mild active eye disease (specialist advice)"]
        ]}
      ]},

    {t:"node", d:"monitor", n:"7", tag:"Subclinical", title:"Subclinical hyperthyroidism — treat or watch?",
      blocks:[
        {b:"kv", rows:[
          ["Definition","\u2193TSH with NORMAL FT4 + FT3 \u2014 confirm persists on repeat at 3\u20136 months (exclude drugs, non-thyroidal illness, pregnancy)"],
          ["<b>TSH <0.1 (persistently)</b>","Higher risk of AF, osteoporosis, CV mortality \u2014 <b>refer/consider treatment, especially if >65, AF, osteoporosis, or cardiac disease</b>"],
          ["TSH 0.1\u20130.4","Usually monitor (6-monthly TFTs); treat if symptomatic or high-risk"],
          ["Why it matters","Not benign in the older patient \u2014 the AF and fracture risk are real; don't just file a low TSH as 'normal-ish'"]
        ]}
      ]},

    {t:"loop", icon:"🔁", title:"Not settling? Work through this",
      arrow:"\u2026cause + adherence + phase",
      checks:[
        {b:"1 · Right cause?", html:"Is it actually thyroiditis (leak) being given carbimazole pointlessly? Recheck TRAb/uptake."},
        {b:"2 · Adherence + dose", html:"Carbimazole taken? Titrated against FT4 (not TSH)? Enough time (4–6 weeks)?"},
        {b:"3 · Over-shot", html:"Now hypothyroid/fatigued from too much carbimazole → reduce dose or block-and-replace."},
        {b:"4 · Relapse (Graves)", html:"Symptoms back after stopping → confirm biochemically → definitive treatment conversation."},
        {b:"5 · Missed emergency", html:"Fever/sore throat (agranulocytosis) or storm features → stop drug + urgent action, don't push dose."},
        {b:"6 · Eye/pregnancy curveball", html:"New eye symptoms → ophthalmology; pregnant/planning → PTU switch + joint care."}
      ],
      back:"Cause confirmed + optimised → endocrinology for definitive treatment"},

    {t:"node", d:"safety", n:"8", tag:"Safety-net", title:"What the patient must know",
      blocks:[
        {b:"tiles", v:"safety", items:[
          {t:"🔴 The drug rule", html:"\u201cSore throat, mouth ulcers, fever or any infection on carbimazole/PTU \u2014 STOP it and ring us the SAME DAY for a blood test.\u201d"},
          {t:"🔴 Storm", html:"\u201cHigh fever, racing/irregular heart, confusion, being violently unwell \u2014 999; thyroid can occasionally go into overdrive.\u201d"},
          {t:"👁️ Eyes", html:"\u201cEye pain, double vision or colour looking washed out \u2014 same-day eye assessment. And stopping smoking genuinely protects your eyes.\u201d"},
          {t:"🤰 Pregnancy", html:"\u201cTell us BEFORE trying for a baby \u2014 we switch you to a different tablet in advance; carbimazole isn't safe early in pregnancy.\u201d"}
        ]}
      ]},

    {t:"node", d:"refer", n:"9", tag:"Refer", title:"Endocrinology (everyone) — and who goes urgently",
      blocks:[
        {b:"tiles", v:"refer", items:[
          {t:"Urgent / same-day", html:"Thyroid storm; agranulocytosis (neutropenic + unwell); sight-threatening eye disease; new thyrotoxic AF with instability."},
          {t:"Urgent (soon)", html:"Pregnancy or planning; children; active/moderate thyroid eye disease; severe symptomatic disease."},
          {t:"Routine endocrine", html:"All confirmed thyrotoxicosis — cause work-up, drug plan, definitive treatment (RAI/surgery) decision."},
          {t:"Shared care", html:"Stable Graves on titration per local pathway — GP monitors FT4 + reinforces the agranulocytosis rule."}
        ]},
        {b:"say", html:"Your thyroid is running fast; the \u03b2-blocker settles how you feel today and the carbimazole turns down the production over the coming weeks. The specialist will decide whether we aim for a course of tablets or a permanent fix \u2014 and remember that one rule: infection signs mean stop and test, same day."}
      ]}
  ],
  foot:"Hyperthyroidism / thyrotoxicosis in adults \u2014 NICE NG145 and BTA guidance. Verify doses against the current BNF; carbimazole/PTU per MHRA agranulocytosis + pregnancy warnings, before prescribing."
});
</script>
