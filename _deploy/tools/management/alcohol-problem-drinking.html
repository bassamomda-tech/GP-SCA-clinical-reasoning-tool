MG.render({"icon":"🍷","title":"Alcohol — Problem Drinking","guideline":"NICE CG115 / NG","stemTitle":"Problem drinking — screen, brief intervention, safe withdrawal","stemSub":"Primary-care management of alcohol misuse — screen with AUDIT, deliver brief interventions, assess dependence and withdrawal risk (don’t stop suddenly if dependent), support detox/relapse-prevention, and recognise the medical emergencies. NICE CG115 · 2026.","glance":[{"lbl":"Screen","val":"AUDIT / AUDIT-C","sub":"quantify risk"},{"lbl":"Lower risk","val":"Brief intervention","sub":"+ feedback"},{"lbl":"Dependent","val":"Don’t stop abruptly","sub":"withdrawal/seizure risk"},{"lbl":"Detox","val":"Chlordiazepoxide + thiamine","sub":"community/inpatient by risk"},{"lbl":"Relapse prevention","val":"Acamprosate/naltrexone + support","sub":""},{"lbl":"Red flag","val":"DTs / Wernicke / withdrawal seizures","sub":"= emergency"}],"flow":[{"t":"node","d":"safety","n":"1","tag":"Safety-net","title":"Withdrawal emergencies","blocks":[{"b":"tiles","v":"safety","items":[{"t":"🔴 Delirium tremens","html":"Coarse tremor, agitation, confusion, hallucinations, autonomic instability ~48–72h after stopping → medical emergency/admit."},{"t":"🔴 Withdrawal seizures","html":"Usually within 48h of cessation → urgent assessment; high risk if previous seizures/DTs."},{"t":"🔴 Wernicke’s encephalopathy","html":"Confusion + ataxia + ophthalmoplegia (often incomplete) → emergency <b>parenteral thiamine</b> (oral is inadequate if at risk); prevent Korsakoff’s."},{"t":"⚠️ Don’t advise abrupt cessation if dependent","html":"Sudden stopping in alcohol dependence can precipitate seizures/DTs — plan assisted withdrawal."}]},{"b":"why","html":"The safety crux is dependence: a dependent drinker must not be told to ‘just stop’, as abrupt cessation risks seizures and delirium tremens. Wernicke’s encephalopathy is a preventable emergency requiring parenteral thiamine at the first suspicion."}]},{"t":"node","d":"found","n":"2","tag":"Foundation","title":"Screen + assess","blocks":[{"b":"kv","rows":[["Screen","AUDIT (or AUDIT-C) to quantify hazardous/harmful/possible-dependent drinking; ask about units, pattern, impact, dependence features (compulsion, tolerance, withdrawal, prioritisation)"],["Assess dependence + withdrawal risk","SADQ/severity; previous withdrawal seizures/DTs; comorbidity, mental health, social situation, safeguarding (children/others)"],["Investigations","FBC (raised MCV), LFTs/GGT, consider fibrosis assessment for alcohol-related liver disease; B12/folate"],["Comorbidity","Depression/anxiety, other substances, suicide risk"]]}]},{"t":"node","d":"life","n":"3","tag":"Non-drug · core","title":"Psychosocial & support","blocks":[{"b":"tiles","v":"life","items":[{"t":"🗣️ Brief intervention","html":"Structured brief advice (FRAMES) and motivational interviewing are evidence-based first-line for hazardous/harmful drinking."},{"t":"👥 Structured support","html":"Refer to local alcohol services; mutual-aid (AA, SMART Recovery); psychological therapy for dependence."},{"t":"🎯 Agree goals","html":"Agree abstinence vs controlled drinking; drink diary; address triggers, housing, mental health."}]},{"b":"why","html":"Medication supports relapse prevention, but psychosocial intervention is the evidence-based core of alcohol treatment."}]},{"t":"node","d":"drug","n":"4","tag":"Management","title":"By severity","blocks":[{"b":"ladder","steps":[{"step":"Lower risk / harmful","title":"Brief intervention","when":"screen-positive, not dependent","html":"Structured brief advice + personalised feedback (FRAMES), agree goals (reduction or abstinence), self-help/online resources, follow-up; treat coexisting mood disorder."},{"step":"Assisted withdrawal","title":"Detox + thiamine","when":"dependent","fromLabel":"if dependent","html":"Community or inpatient detox by risk: <b>chlordiazepoxide</b> reducing regimen (e.g. 10–40 mg QDS tapering over ~7 days) + <b>thiamine</b> (oral 100 mg TDS, or parenteral Pabrinex if Wernicke’s risk/poor nutrition). Inpatient if history of seizures/DTs, severe dependence, significant comorbidity, or unsafe home."},{"step":"Relapse prevention","title":"Pharmacotherapy + support","when":"after abstinence","fromLabel":"maintain abstinence","html":"Acamprosate (<b>666 mg TDS</b>) or oral naltrexone (<b>50 mg OD</b>) — or disulfiram (200 mg OD) in selected, supervised — + psychosocial support; refer to alcohol/community services."},{"step":"Liver / nutrition","title":"Address complications","when":"ongoing","fromLabel":"medical care","html":"Assess/monitor alcohol-related liver disease; nutrition; vaccinate (hep B) as appropriate."}]},{"b":"warn","html":"Always give thiamine before/with carbohydrate in malnourished/dependent drinkers; use parenteral thiamine where Wernicke’s is a risk — oral absorption is unreliable."}]},{"t":"node","d":"follow","n":"5","tag":"Follow-up","title":"Relapse prevention & review","blocks":[{"b":"timeline","items":[{"n":"1","when":"After detox","title":"Maintain abstinence","html":"Continue <b>acamprosate 666 mg TDS</b> or <b>naltrexone 50 mg OD</b> for relapse prevention with psychosocial support; review regularly. Continue oral thiamine in those at risk."},{"n":"2","when":"Ongoing","title":"Monitor & support","html":"Monitor LFTs/FBC, mood (high comorbidity with depression/anxiety), and engagement with structured support/AA. Treat coexisting conditions."},{"n":"3","when":"Relapse","title":"Non-judgemental re-engagement","html":"Relapse is common and not failure — re-engage, reassess goals (abstinence vs controlled drinking), and re-refer to specialist alcohol services if needed."}]},{"b":"say","html":"Staying off alcohol is the hard part — medication and regular support both help, and if you slip, that's normal; come back and we'll pick it up again."}]},{"t":"node","d":"refer","n":"6","tag":"Refer","title":"Referral","blocks":[{"b":"tiles","v":"refer","items":[{"t":"Emergency","html":"Delirium tremens, withdrawal seizures, Wernicke’s, decompensated liver disease, suicide risk."},{"t":"Community alcohol service","html":"Dependence, assisted withdrawal, relapse prevention, psychosocial support."},{"t":"Mental health / safeguarding","html":"Coexisting mental illness; children/vulnerable adults affected."},{"t":"Hepatology","html":"Significant alcohol-related liver disease."}]},{"b":"say","html":"Let’s look at your drinking together — no judgement. If it’s in the riskier range, some focused advice and support can really help. If your body has become dependent on alcohol, it’s important not to stop suddenly, as that can cause fits — we’d plan a safe, medicated detox and vitamins, with ongoing support to stay well."}]}],"foot":"Management of alcohol misuse in primary care; dependent drinkers need planned assisted withdrawal (not abrupt cessation), and Wernicke’s/DTs/seizures are emergencies. Verify against current NICE CG115 and local alcohol services."});
</script>
