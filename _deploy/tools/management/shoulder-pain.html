MG.render({"icon":"💪","title":"Shoulder Pain","guideline":"NICE CKS","stemTitle":"Shoulder pain — diagnose the pattern, exclude red flags, rehab","stemSub":"Primary-care management of shoulder pain — identify the common causes (rotator cuff disorders, frozen shoulder, OA, instability), exclude red flags and referred pain, and treat with analgesia, exercise/physiotherapy and selective injection. NICE CKS · 2026.","glance":[{"lbl":"Commonest","val":"Rotator cuff (subacromial)","sub":"painful arc"},{"lbl":"Frozen shoulder","val":"Global stiffness","sub":"↓ passive external rotation"},{"lbl":"1st-line","val":"Analgesia + exercises","sub":"physiotherapy"},{"lbl":"Option","val":"Subacromial steroid injection","sub":"short-term relief"},{"lbl":"Exclude","val":"Referred cardiac/diaphragm/neck","sub":"+ red flags"},{"lbl":"Red flag","val":"Mass, trauma/?dislocation, sepsis, cancer hx","sub":"= urgent"}],"flow":[{"t":"node","d":"safety","n":"1","tag":"Safety-net","title":"Red flags + referred pain","blocks":[{"b":"tiles","v":"safety","items":[{"t":"🔴 Referred / cardiac","html":"Shoulder-tip pain or exertional pain → consider cardiac, diaphragmatic (gallbladder, subphrenic), or thoracic causes; left shoulder-tip + collapse → ruptured spleen/ectopic."},{"t":"🔴 Acute trauma / dislocation","html":"Significant trauma, deformity, inability to move, neurovascular deficit → X-ray / urgent assessment (fracture/dislocation)."},{"t":"🔴 Infection / inflammatory","html":"Hot swollen joint + fever → septic arthritis (urgent); polymyalgic/inflammatory features → consider PMR/inflammatory arthritis."},{"t":"🔴 Mass / cancer","html":"Unexplained mass, history of cancer, or possible Pancoast tumour (apical lung) → investigate/refer."}]},{"b":"why","html":"Most shoulder pain is musculoskeletal (rotator cuff, frozen shoulder, OA), but the GP must exclude referred pain (cardiac, diaphragmatic, neck) and the red flags — trauma/dislocation, septic joint, and malignancy (including apical lung) — before rehab."}]},{"t":"node","d":"found","n":"2","tag":"Foundation","title":"Diagnose the pattern","blocks":[{"b":"kv","rows":[["Rotator cuff / subacromial pain","Painful arc (60–120°), pain on resisted abduction/external rotation; impingement/tendinopathy or tear; commonest"],["Frozen shoulder (adhesive capsulitis)","Global restriction esp. <b>passive external rotation</b>; painful then stiff phases; associated with diabetes"],["Glenohumeral OA / ACJ","OA: deep pain + crepitus; ACJ: pain over the joint, high-arc pain, cross-body adduction"],["Instability","Younger, post-dislocation, apprehension"],["Examine","Active/passive range, painful arc, cuff tests, ACJ, cervical spine, neurovascular"]]}]},{"t":"node","d":"life","n":"3","tag":"Non-drug · first-line","title":"Exercise & activity","blocks":[{"b":"tiles","v":"life","items":[{"t":"🏋️ Exercise therapy","html":"Physiotherapy-led exercise is the mainstay for rotator-cuff/impingement and adhesive capsulitis."},{"t":"🧊 Activity & analgesia","html":"Relative rest from aggravating overhead activity; heat/ice; keep using the arm within comfort."},{"t":"📐 Posture/ergonomics","html":"Address posture and work/sport technique; progressive loading as pain allows."}]},{"b":"why","html":"For most shoulder pain, physiotherapy-led exercise is the principal treatment — drugs and injections are adjuncts."}]},{"t":"node","d":"drug","n":"4","tag":"Treatment","title":"Analgesia + rehab ± injection","blocks":[{"b":"ladder","steps":[{"step":"Step 1","title":"Analgesia + activity/exercise","when":"first-line","html":"Paracetamol 1 g QDS / NSAID (ibuprofen 400 mg TDS or naproxen 250–500 mg BD; consider risk); maintain movement, avoid prolonged immobility; <b>physiotherapy</b>/exercise programme — mainstay for cuff disorders and frozen shoulder."},{"step":"Step 2","title":"Corticosteroid injection","when":"if pain limits rehab","fromLabel":"persistent pain","html":"Subacromial (cuff) or glenohumeral (frozen shoulder) corticosteroid injection for short-to-medium-term pain relief to enable rehabilitation."},{"step":"Step 3","title":"Imaging / refer","when":"refractory or specific","fromLabel":"if not improving","html":"USS (cuff tear) / X-ray (OA, calcific tendinitis); refer for suspected full-thickness tear (esp. acute/traumatic in a younger patient), refractory frozen shoulder, instability, or OA for surgical opinion."}]}]},{"t":"node","d":"follow","n":"5","tag":"Follow-up","title":"Review & escalation","blocks":[{"b":"timeline","items":[{"n":"1","when":"6 weeks","title":"Conservative trial","html":"Review response to analgesia + <b>physiotherapy/exercise</b> (mainstay for rotator cuff/impingement and adhesive capsulitis). Most improve over weeks–months."},{"n":"2","when":"If persistent","title":"Injection","html":"Persistent pain limiting function → <b>subacromial/glenohumeral corticosteroid injection</b> alongside continued exercises; useful in adhesive capsulitis."},{"n":"3","when":"Refractory / red flag","title":"Refer / image","html":"No improvement after ~3 months, suspected large cuff tear (weakness), or red flags (mass, unexplained wasting) → imaging + orthopaedic/MSK referral."}]},{"b":"say","html":"The mainstay is exercises with a physio, which take a few weeks to work. If it's stuck we can add a steroid injection, and only refer for scans or surgery if it doesn't settle."}]},{"t":"node","d":"refer","n":"6","tag":"Refer","title":"Referral","blocks":[{"b":"tiles","v":"refer","items":[{"t":"Urgent","html":"Suspected septic arthritis, acute dislocation/fracture, suspected malignancy/Pancoast, neurovascular compromise."},{"t":"Physiotherapy","html":"Rotator cuff disorders + frozen shoulder — first-line rehab."},{"t":"Orthopaedics / shoulder clinic","html":"Suspected significant cuff tear (esp. acute/traumatic), refractory frozen shoulder, instability, advanced OA."},{"t":"Imaging","html":"USS for cuff integrity; X-ray for OA/calcific/bony pathology."}]},{"b":"say","html":"Shoulder pain is usually from the rotator cuff tendons or a ‘frozen shoulder’, and most improves with painkillers and exercises — keeping it moving is important. A steroid injection can settle the pain enough to do the rehab. I’ll check it isn’t coming from your neck, heart or elsewhere, and we’ll scan or refer if it’s not improving."}]}],"foot":"Management of shoulder pain in primary care; exclude referred pain and red flags, then rehab ± injection. Verify against current NICE CKS Shoulder pain."});
