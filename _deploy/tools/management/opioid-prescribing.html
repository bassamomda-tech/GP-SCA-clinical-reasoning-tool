<body data-screen-label="Opioid prescribing management card">

<script>
MG.render({
  icon:"💊",
  title:"Opioids in Non-Cancer Pain — The Complete Guide",
  stemTitle:"Opioids made simple &mdash; trial with an exit, cap the dose, taper over months",
  stemSub:"One pathway: know which pains opioids won't help before you start, run a time-limited morphine trial with the 20mg off-ramp, convert to MR with named brands and the 120mg OME ceiling, watch the weak-opioid traps (tramadol, codeine's genetics), manage the side effects that make people quit or die (constipation, the benzo combination), and taper established users 10% at a time over months \u2014 with the withdrawal-vs-pain conversation scripted. Opioids Aware \u00b7 FPM \u00b7 NICE NG193.",
  guideline:"Opioids Aware \u00b7 NG193",
  glance:[
    {lbl:"Won't help", val:"Fibro \u00b7 LBP \u00b7 headache", sub:"NG193: don't start"},
    {lbl:"Trial", val:"Morphine IR 5\u201310mg", sub:"4 weeks \u00b7 goals agreed"},
    {lbl:"Off-ramp", val:"20mg no relief \u2192 stop", sub:"opioids won't work"},
    {lbl:"Ceiling", val:"120mg/day OME", sub:"above = specialist only"},
    {lbl:"Never with", val:"Benzos \u00b7 gabapentinoids", sub:"respiratory depression"},
    {lbl:"Taper", val:"10% / 2\u20134 weeks", sub:"months, not weeks"}
  ],
  flow:[

    {t:"node", d:"found", n:"1", tag:"Step 1 · before", title:"Which pain is this? Half the battle is won here",
      blocks:[
        {b:"kv", rows:[
          ["<b>Opioids won't help</b>","<b>Fibromyalgia, chronic primary pain (NG193 says do NOT start), chronic low back pain, headache/migraine (they CAUSE medication-overuse headache), chronic abdominal/pelvic pain</b> \u2014 saying no here, with the why, is the kindest prescription"],
          ["Different pathway","Neuropathic pain \u2192 amitriptyline/duloxetine/gabapentinoid ladder (own card) \u00b7 inflammatory \u2192 treat the disease \u00b7 mechanical awaiting surgery \u2192 time-limited bridge with the stop date = the operation date"],
          ["May respond","Nociceptive tissue pain \u2014 osteoarthritis awaiting replacement, vertebral fracture, some post-surgical states. Even here: adjunct to movement, not instead of it"],
          ["Risk screen before starting","Past/current substance misuse (incl. alcohol), mental illness, benzodiazepine/gabapentinoid use, respiratory disease/OSA, eGFR <30, age (start lower), pregnancy possibility"],
          ["The upfront contract","Functional goals written down (\u2018walk to the shop\u2019, \u2018sleep through\u2019) \u00b7 single prescriber + one pharmacy \u00b7 \u226428 days\u2019 supply \u00b7 <b>the exit named at the start: no benefit at 4 weeks = taper and stop</b>"]
        ]},
        {b:"warn", html:"<b>MHRA (2020):</b> any opioid can cause dependence and addiction \u2014 label and counsel accordingly. <b>Driving:</b> don't drive on initiation, after dose changes, or if sedated; opioids are on the drug-driving statute (medical defence only if taken as prescribed AND unimpaired). <b>Renal:</b> eGFR <30 \u2192 reduce doses / prefer buprenorphine \u2014 morphine metabolites accumulate."}
      ]},

    {t:"node", d:"life", n:"2", tag:"Step 2 · the real plan", title:"The treatment is function — opioids are the adjunct",
      blocks:[
        {b:"tiles", v:"life", items:[
          {t:"🏃 Movement first", html:"Exercise + physio + pacing are first-line for every chronic pain — and the only interventions that grow rather than shrink over time."},
          {t:"🧠 The amplifiers", html:"Depression, anxiety, insomnia and catastrophising all turn the volume up — treat them in their own right (see their cards); pain clinics call this the whole job."},
          {t:"🎯 Function goals", html:"Track the goal, not the pain score — 'pain 6/10 but back at work' is success; 'pain 4/10 on the sofa' is not."},
          {t:"📚 Self-management", html:"Live Well with Pain 'Ten Footsteps', pain-management programmes, CBT for pain — refer early, not as a consolation prize."},
          {t:"😴 Sleep + mood loop", html:"Poor sleep drops pain thresholds measurably — the insomnia card is pain treatment too."},
          {t:"⚖️ Weight + smoking", html:"Both worsen chronic pain outcomes; smoking also predicts poor opioid outcomes."}
        ]}
      ]},

    {t:"node", d:"drug", n:"3", tag:"Step 3 · the trial", title:"The time-limited trial — with both off-ramps built in",
      blocks:[
        {b:"ladder", steps:[
          {step:"3a", title:"Morphine IR 5\u201310mg — short supply", when:"start here (not patches, not oxycodone)",
           html:"1\u20132 week supply of immediate-release morphine, fixed dose range with a stated daily max \u2014 <b>'as directed' is never acceptable</b>. Elderly/frail: 2.5\u20135mg. Co-prescribe the laxative from day one (see Step 5)."},
          {step:"3b", title:"The 20mg off-ramp", when:"the single-dose test",
           fromLabel:"no useful relief?",
           html:"<b>If a single 20mg dose of morphine gives no meaningful relief, opioids are unlikely ever to help this pain \u2014 stop, don't escalate.</b> This one sentence prevents most long-term failed prescribing."},
          {step:"3c", title:"Judge at 4 weeks — against the WRITTEN goals", when:"the trial endpoint",
           fromLabel:"tolerated + some relief",
           html:"Success = pain relief AND functional progress. Early response does not predict long-term benefit. Goals not met \u2192 the exit agreed at the start: taper and stop (Step 6) \u2014 even if nothing else is on offer."},
          {step:"3d", title:"Convert to MR morphine if continuing", when:"genuine benefit",
           fromLabel:"trial met goals",
           html:"<b>Morphine MR (Zomorph\u00ae) 10mg BD</b>, titrate no faster than 2-weekly; keep any IR top-ups few and capped. Lowest effective dose; intermittent use has the best long-term outcomes. Review monthly until stable."}
        ]},
        {b:"table", head:["Opioid","Start","Primary-care ceiling","Place"], rows:[
          ["Morphine MR (Zomorph\u00ae)","10mg BD","60mg BD (\u2248120mg OME)","<b>First-line</b>"],
          ["Buprenorphine patch (Butec\u00ae)","5\u201310mcg/h weekly","52.5mcg/h","Renal impairment (eGFR <30), swallowing difficulty, adherence"],
          ["Oxycodone MR","5mg BD","~40mg BD","Morphine-intolerant \u2014 specialist recommendation locally (Amber)"],
          ["Fentanyl patch","12mcg/h /72h","37mcg/h","Specialist only; NEVER opioid-na\u00efve or unstable pain \u2014 12mcg/h \u2248 45mg OME"],
          ["Tapentadol MR","50mg BD","specialist","3rd-line, pain-clinic initiation"]
        ]},
        {b:"warn", html:"<b>Weak-opioid traps:</b> <b>Tramadol</b> \u2014 not 'safe-lite': serotonergic (SSRI interaction \u2192 serotonin syndrome), lowers seizure threshold, genuinely dependence-forming, nasty withdrawal. <b>Codeine</b> \u2014 CYP2D6 genetics: ~8% get nothing, ultra-metabolisers get morphine spikes (fatal case reports in children/breastfeeding \u2014 contraindicated <12y and in breastfeeding mothers). 30mg codeine \u2248 3mg morphine \u2014 co-codamol 8/500 is mostly paracetamol with a dependence risk attached."}
      ]},

    {t:"node", d:"drug", n:"4", tag:"Step 4 · switching", title:"Switching — cut 25\u201350% for cross-tolerance",
      blocks:[
        {b:"kv", rows:[
          ["When","Intolerable side effects on an adequate trial (patients genuinely differ between opioids), or a formulation need (patch for renal/swallowing)"],
          ["The safety rule","Calculate the OME equivalent (FPM/ANZCA calculator), then <b>reduce by 25\u201350%</b> \u2014 incomplete cross-tolerance means the 'equivalent' dose can overdose. Re-titrate from there"],
          ["More potent = specialist","Oxycodone, fentanyl, tapentadol \u2192 pain-clinic advice first (local Amber rules)"],
          ["Patch mechanics","Fentanyl: 72h patches, 12h lag both on AND off \u2014 never for acute titration; fever increases absorption. Buprenorphine: weekly (Butec) vs twice-weekly (higher strengths); site rotation"],
          ["Anaesthetics + procedures","On any regular opioid \u2192 tell the surgical team (tolerance changes perioperative dosing); buprenorphine no longer needs stopping pre-op"]
        ]}
      ]},

    {t:"node", d:"safety", n:"5", tag:"Step 5 · harms", title:"The side effects that make people quit — or die",
      blocks:[
        {b:"table", head:["Harm","Detail","Action"], rows:[
          ["Constipation","Near-universal, does NOT settle","<b>Co-prescribe from day one:</b> stimulant (senna/bisacodyl) \u00b1 osmotic (macrogol) \u2014 not fibre alone (bulking worsens it)"],
          ["Nausea / sedation","First days\u20132 weeks, usually settles","Short-term antiemetic; no driving; persistent sedation = dose too high"],
          ["<b>Respiratory depression</b>","The killer \u2014 risk multiplied by benzos, Z-drugs, gabapentinoids, alcohol, OSA","<b>Don't co-prescribe</b>; if unavoidable/inherited \u2192 lowest doses + prioritise deprescribing + consider take-home naloxone (high-dose, misuse history, previous overdose)"],
          ["Tolerance + hyperalgesia","Dose creeping up, pain WORSE overall, whole-body tenderness","Opioid-induced hyperalgesia is real \u2014 the treatment is a taper, not an increase; pain often improves as the dose falls"],
          ["Endocrine","Fatigue, low libido, ED, amenorrhoea on long-term use","Check testosterone (men) / ask about cycles at annual review; abnormal \u2192 endocrine advice + another reason to taper"],
          ["Immunosuppression + falls + fractures","Long-term, esp. elderly","Counts in the annual risk\u2013benefit; opioids double fall-related fracture risk in the old"],
          ["Dependence vs addiction","Physical dependence = expected pharmacology; addiction = craving, loss of control, use despite harm (~1 in 10 long-term)","Dependence needs a taper; addiction needs the drug service alongside \u2014 different problems, different help, say so without stigma"]
        ]},
        {b:"kv", rows:[
          ["Review rhythm","Monthly until stable \u2192 at least 6-monthly forever; opioid code on the record; no early scripts \u2014 'lost' prescriptions have a pattern"],
          ["Aberrant-use flags","Escalating without review, early requests, multiple prescribers/OOH, injecting/crushing MR \u2014 name it, don't chase it with more supply; drug service referral"]
        ]}
      ]},

    {t:"node", d:"drug", n:"6", tag:"Step 6 · the taper", title:"Deprescribing — 10% steps, months not weeks, patient owns the pace",
      blocks:[
        {b:"p", html:"<strong>Taper when:</strong> no functional benefit \u00b7 >120mg OME \u00b7 >3 months' use without re-justification \u00b7 hyperalgesia \u00b7 on benzos/gabapentinoids \u00b7 the condition resolved (post-op, post-fracture \u2014 the commonest forgotten taper) \u00b7 misuse. <strong>The message that works:</strong> most people feel BETTER, not worse, as the dose falls \u2014 clearer-headed, less constipated, and the pain usually doesn't worsen (hyperalgesia often means it improves)."},
        {b:"ladder", steps:[
          {step:"6a", title:"Invite, don't ambush", when:"engagement first",
           html:"Frame as a health upgrade, not punishment. Not ready \u2192 information (Live Well with Pain / POD scale), revisit in 3\u20136 months \u2014 forced tapers fail and fracture trust. Exception: safety-critical combinations \u2192 firmer timeline."},
          {step:"6b", title:"Count the real dose", when:"plan",
           fromLabel:"willing",
           html:"Total OME across everything (calculator) and ask what they ACTUALLY take \u2014 stockpiles and 'saving the top-ups' are normal. Taper the MR/patch first, keep IR visible and countable (switch liquid \u2192 tablets)."},
          {step:"6c", title:"10% of the ORIGINAL dose every 2\u20134 weeks", when:"the schedule",
           fromLabel:"agreed start date",
           html:"One opioid at a time, most potent first. Hold at any step for life events; never go back up more than one step. Withdrawal (sweats, yawning, cramps, restless legs, anxiety, diarrhoea) peaks day 2\u20135 and settles within a week of each cut \u2014 pre-warn: <b>withdrawal is not the pain returning</b>."},
          {step:"6d", title:"Smaller steps at the bottom", when:"the last third",
           fromLabel:"doses falling",
           html:"Each 10% becomes proportionally bigger \u2014 drop to 5% monthly near the end. The last 10\u201320mg OME is the hardest; liquid morphine or alternate-strength tablets help. Total course: months for most, a year+ for long-term high-dose \u2014 <b>that pace IS success</b>."},
          {step:"6e", title:"Fill the gap", when:"throughout",
           fromLabel:"parallel work",
           html:"Pain self-management running alongside (Ten Footsteps, pacing, activity goals); treat the unmasked mood/sleep problems on their own cards; celebrate milestones \u2014 a printed dose chart with dates crossed off genuinely motivates."}
        ]},
        {b:"warn", html:"<b>Never stop abruptly</b> after regular use \u2014 and never let someone else's abrupt stop happen either (hospital discharge without the opioid, nursing-home transfer): withdrawal + lost tolerance is the overdose set-up if they resume their old dose. Any planned restart after a gap = restart LOW."}
      ]},

    {t:"loop", icon:"🔁", title:"Still in pain on opioids? The answer is rarely a higher dose",
      arrow:"\u2026run this before any escalation",
      checks:[
        {b:"1 · Working at all?", html:"Functional gain documented against the written goals? No → the plan is a taper, not a titration."},
        {b:"2 · Hyperalgesia?", html:"Pain worse + spreading + tender all over as doses rose → the opioid is now the cause. Taper."},
        {b:"3 · Right pain type?", html:"Neuropathic features (burning, shooting, allodynia) → wrong ladder entirely. Fibromyalgia/primary pain → NG193: opioids off the table."},
        {b:"4 · The combination", html:"Benzos, gabapentinoids, alcohol on board? That's the overdose risk — deprescribing priority #1 (MHRA)."},
        {b:"5 · The person", html:"Untreated depression, insomnia, unresolved compensation/work issues, addiction needing its own care?"},
        {b:"6 · New pathology?", html:"Changed pain, red flags, weight loss — re-examine before attributing everything to 'chronic pain'."}
      ],
      back:"No benefit / high dose / high risk → structured taper ± pain service"},

    {t:"node", d:"safety", n:"7", tag:"Safety-net", title:"What the patient must know",
      blocks:[
        {b:"tiles", v:"safety", items:[
          {t:"🔴 Overdose signs", html:"\u201cExtreme drowsiness you can't be woken from, slow or gurgling breathing, blue lips \u2014 whoever's with you calls 999 and says 'opioid overdose'. Keep the take-home naloxone where your family can find it if you've been given one.\u201d"},
          {t:"🍷 Never mix", html:"\u201cNo alcohol, no sleeping tablets, no 'nerve' tablets from anyone else on top of these \u2014 the combination stops breathing.\u201d"},
          {t:"🚗 Driving", html:"\u201cNo driving when we start or change the dose, or any day you feel drowsy \u2014 the law treats impaired driving on these like drink-driving.\u201d"},
          {t:"👶 Storage", html:"\u201cLocked away from children and visitors \u2014 one MR tablet can kill a child. Return leftovers to the pharmacy, never the bin.\u201d"},
          {t:"⏸️ Never stop dead", html:"\u201cRunning out or stopping suddenly makes you genuinely ill \u2014 reductions are planned together, in small steps.\u201d"}
        ]}
      ]},

    {t:"node", d:"refer", n:"8", tag:"Refer", title:"Who needs which specialist",
      blocks:[
        {b:"tiles", v:"refer", items:[
          {t:"Pain service", html:"Considering >120mg OME or a more potent opioid; refractory pain despite an adequate trial; complex tapers; pain-management-programme referral."},
          {t:"Drug & alcohol service", html:"Addiction features, diversion, illicit top-ups — alongside primary care, not instead of it; OST (buprenorphine/methadone) conversations are theirs."},
          {t:"Reassess the cause", html:"The joint that needs replacing, the radiculopathy that needs imaging, red flags — a definitive fix beats any taper plan."},
          {t:"Perinatal", html:"Pregnant on regular opioids → joint obstetric/specialist plan (NOT abrupt cessation — fetal withdrawal); neonatal team aware."},
          {t:"Palliative exception", html:"This whole card is NON-cancer pain — cancer pain follows its own ladder without these ceilings."}
        ]},
        {b:"say", html:"We'll treat this as a proper four-week experiment with goals we've written down together. If it works, we use the lowest dose that keeps you moving. If it doesn't \u2014 and for a lot of long-term pain it doesn't \u2014 the kindest thing I can do is bring you off it slowly, because most people feel better in themselves at the end of that, not worse."}
      ]}
  ],
  foot:"Opioids for persistent NON-cancer pain in adults \u2014 Opioids Aware (FPM), NICE NG193, MHRA 2020. Cancer pain follows its own pathway. Verify doses and equivalences (FPM calculator) against the current BNF before prescribing."
});
</script>
