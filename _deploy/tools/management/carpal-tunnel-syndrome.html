MG.render({"icon":"🤚","title":"Carpal Tunnel Syndrome","guideline":"NICE CKS","stemTitle":"Carpal tunnel syndrome — splint, inject, refer for decompression","stemSub":"Primary-care management of carpal tunnel syndrome — median nerve compression at the wrist; confirm clinically, treat mild–moderate disease with night splints ± corticosteroid injection, and refer for nerve studies/surgical decompression when severe or refractory. NICE CKS · 2026.","glance":[{"lbl":"Hallmark","val":"Median-nerve tingling","sub":"thumb–middle finger, worse at night"},{"lbl":"1st-line","val":"Night wrist splint","sub":"neutral position"},{"lbl":"Option","val":"Corticosteroid injection","sub":"short-term benefit"},{"lbl":"Severe","val":"Refer for decompression","sub":"thenar wasting / constant"},{"lbl":"Investigate","val":"Nerve conduction studies","sub":"if uncertain / pre-op"},{"lbl":"Causes","val":"Pregnancy, hypothyroid, diabetes, RA","sub":"treat if present"}],"flow":[{"t":"node","d":"found","n":"1","tag":"Foundation","title":"Diagnose + contributors","blocks":[{"b":"kv","rows":[["Symptoms","Tingling/numbness/pain in the <b>median</b> distribution (thumb, index, middle, radial half of ring finger), <b>worse at night</b>, shaking the hand relieves it; may radiate up forearm"],["Signs","Tinel’s/Phalen’s tests; in severe disease thenar wasting + weak thumb abduction + sensory loss"],["Contributors","Pregnancy, hypothyroidism, diabetes, obesity, rheumatoid arthritis, repetitive wrist use, acromegaly"],["Assess severity","Intermittent vs constant symptoms, sensory/motor deficit, functional impact"]]},{"b":"why","html":"Carpal tunnel is a clinical diagnosis; severity guides treatment. Mild–moderate intermittent symptoms respond to splinting/injection, while constant numbness, weakness or thenar wasting indicates significant nerve compromise needing surgical decompression to prevent permanent deficit."}]},{"t":"node","d":"life","n":"2","tag":"Non-drug · first-line","title":"Splinting & activity","blocks":[{"b":"tiles","v":"life","items":[{"t":"🌙 Night splint","html":"A neutral-position wrist splint worn at night is first-line and often sufficient for mild–moderate CTS."},{"t":"⌨️ Activity modification","html":"Adjust aggravating wrist postures/repetitive tasks; ergonomic review."},{"t":"🤰 Reversible causes","html":"Pregnancy-related CTS usually resolves postpartum; manage hypothyroidism/diabetes/weight."}]},{"b":"why","html":"Nocturnal wrist splinting is the genuine first-line treatment — many improve without any drug or procedure."}]},{"t":"node","d":"drug","n":"3","tag":"Treatment","title":"Stepwise","blocks":[{"b":"ladder","steps":[{"step":"Step 1","title":"Night splint + address contributors","when":"mild–moderate","html":"Neutral-position wrist splint worn at night (± day) for several weeks; treat hypothyroidism/diabetes; activity modification. Pregnancy-related CTS often resolves postpartum — splint + reassure."},{"step":"Step 2","title":"Corticosteroid injection","when":"if splint insufficient","fromLabel":"persistent mild–moderate","html":"Local corticosteroid injection into the carpal tunnel gives short-to-medium-term relief; can be repeated; useful while awaiting surgery or in pregnancy."},{"step":"Step 3","title":"Surgical decompression","when":"severe/refractory","fromLabel":"if severe or failed conservative","html":"Carpal tunnel release — for severe (constant symptoms, sensory loss, thenar wasting) or symptoms not responding to conservative measures; refer (hand surgery)."}]},{"b":"warn","html":"Thenar wasting or constant numbness/weakness indicates advanced compression — refer promptly, as delayed decompression risks permanent deficit. Oral steroids/NSAIDs have limited evidence."}]},{"t":"node","d":"monitor","n":"4","tag":"Investigations","title":"When to test","blocks":[{"b":"kv","rows":[["Nerve conduction studies","Confirm diagnosis where uncertain, grade severity, and commonly required before surgery"],["Bloods","TFTs, HbA1c if clinically indicated (treatable contributors)"],["Review","Reassess response to splint/injection; escalate if deficit progresses"]]}]},{"t":"node","d":"follow","n":"5","tag":"Follow-up","title":"Review & escalation","blocks":[{"b":"timeline","items":[{"n":"1","when":"4–6 weeks","title":"Splint response","html":"Review the response to <b>nocturnal wrist splinting</b> (first-line; worn 4–6 weeks). Mild–moderate symptoms often improve. Treat contributors (hypothyroidism, diabetes, pregnancy-related usually resolves postpartum)."},{"n":"2","when":"If inadequate","title":"Corticosteroid injection","html":"A local corticosteroid injection gives medium-term relief and can be diagnostic-therapeutic while awaiting definitive treatment."},{"n":"3","when":"Persistent / severe","title":"Refer for surgery","html":"Persistent or severe symptoms, motor signs (thenar wasting/weakness) or continuous numbness → refer for nerve conduction studies and <b>carpal tunnel decompression</b> (definitive)."}]},{"b":"say","html":"Start with a night splint for about six weeks. If that's not enough, an injection can help, and if symptoms are severe or your thumb muscles are weakening, a small operation is the definitive fix."}]},{"t":"node","d":"safety","n":"6","tag":"Safety-net","title":"When to act fast","blocks":[{"b":"tiles","v":"safety","items":[{"t":"🟠 Thenar wasting / weakness","html":"Constant numbness or wasting/weakness of the thumb base = established nerve damage → expedite referral for decompression."},{"t":"🔴 Acute severe","html":"Sudden severe or rapidly progressive symptoms → reconsider diagnosis and refer urgently."},{"t":"💬 Safety-net","html":"If your thumb muscles weaken, you drop things, or the numbness becomes constant, contact us."}]}]},{"t":"node","d":"refer","n":"7","tag":"Refer","title":"Referral","blocks":[{"b":"tiles","v":"refer","items":[{"t":"Hand / orthopaedic surgery","html":"Severe (thenar wasting, constant symptoms, motor/sensory loss) or refractory to conservative treatment — for nerve studies + decompression."},{"t":"Endocrine","html":"If acromegaly/uncontrolled thyroid suspected."},{"t":"Manage in primary care","html":"Mild–moderate intermittent CTS — splint ± injection; pregnancy-related (often self-limiting)."}]},{"b":"say","html":"This is carpal tunnel syndrome — a nerve squeezed at the wrist, giving that tingling in the fingers that’s worse at night. A night-time wrist splint often helps, and a steroid injection can settle it further. If there’s constant numbness or the thumb muscle is weakening, a small operation to release the nerve works very well — and we’d arrange that promptly."}]}],"foot":"Management of carpal tunnel syndrome in primary care; severe/refractory disease needs surgical decompression. Verify against current NICE CKS Carpal tunnel syndrome."});
