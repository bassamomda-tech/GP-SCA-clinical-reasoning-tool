<script>
MG.render({
  icon:"🦶",
  title:"Gout — The Complete Guide",
  stemTitle:"Gout made simple &mdash; kill the flare fast, then treat the urate to target for life",
  stemSub:"One pathway: confirm it (and never miss the septic joint), pick the flare drug by the patient's kidneys/heart/gut with exact doses, start allopurinol low with flare cover and the DRESS warning, titrate monthly to a target urate \u2014 not a fixed dose \u2014 handle the interactions that genuinely kill (azathioprine), and know the febuxostat and referral rules. NICE NG219 \u00b7 CKS \u00b7 BSR.",
  guideline:"NICE NG219",
  glance:[
    {lbl:"Flare", val:"NSAID / colch / pred", sub:"pick by comorbidity"},
    {lbl:"Colchicine", val:"500mcg BD\u2013QDS", sub:"diarrhoea = stop"},
    {lbl:"ULT", val:"Allopurinol 100mg", sub:"50mg if CKD \u00b7 \u2191 monthly"},
    {lbl:"Target", val:"<360 \u00b5mol/L", sub:"<300 if tophi/severe"},
    {lbl:"Flare cover", val:"\u22646 months", sub:"colchicine 500mcg OD\u2013BD"},
    {lbl:"Never together", val:"Allopurinol + azathioprine", sub:"fatal marrow toxicity"}
  ],
  flow:[

    {t:"node", d:"found", n:"1", tag:"Step 1 · confirm", title:"Confirm gout — and rule out the joint that kills",
      blocks:[
        {b:"kv", rows:[
          ["Clinical diagnosis","Rapid-onset (<24h to peak) hot, red, exquisitely tender joint \u2014 1st MTP in ~half (podagra); also midfoot, ankle, knee, hand. Can't bear the bedsheet touching it. Settles in 1\u20132 weeks even untreated"],
          ["Serum urate","<b>\u2265360 \u00b5mol/L supports the diagnosis</b> \u2014 but urate DIPS during flares: if <360 and gout still suspected, <b>recheck \u22652 weeks after it settles</b>. A normal level mid-flare excludes nothing"],
          ["Aspirate when in doubt","Negatively birefringent needle crystals = gout; also excludes sepsis and pseudogout (CPPD \u2014 positively birefringent rhomboids, older patients, knee/wrist, chondrocalcinosis on X-ray)"],
          ["Assess the burden","Flares/year, tophi (ears, elbows, fingers \u2014 look), joint damage, urate stones, CKD, diuretics, CV/metabolic disease (gout travels with hypertension, CKD, diabetes \u2014 screen them all)"],
          ["Drivers to find","Thiazides/loop diuretics, low-dose aspirin (minor), alcohol, chemotherapy (tumour lysis), post-surgical, dehydration"]
        ]},
        {b:"warn", html:"<b>Hot swollen joint + fever/unwell = septic arthritis until proven otherwise \u2192 same-day orthopaedics/rheumatology for aspiration BEFORE any steroid.</b> Gout and sepsis co-exist \u2014 a known gout patient can still have an infected joint. Never inject steroid into a possibly-septic joint."}
      ]},

    {t:"node", d:"drug", n:"2", tag:"Step 2 · the flare", title:"Kill the flare — choose by the patient, exact doses",
      blocks:[
        {b:"table", head:["Option","Dose","Best for / avoid"], rows:[
          ["<b>NSAID</b>","Naproxen <b>750mg stat then 250mg TDS</b> (or ibuprofen 400\u2013600mg TDS) + <b>PPI</b>, until 1\u20132 days after resolution","Young, kidneys fine, no GI/CV risk. <b>Avoid:</b> CKD, HF, anticoagulated, GI bleed history, on ACEi+diuretic (triple whammy)"],
          ["<b>Colchicine</b>","<b>500mcg BD\u2013QDS</b> until relief or side effects (max ~6mg/course); works best started <24h","NSAID-unsuitable. <b>Halve/avoid in CKD (eGFR <30: avoid); avoid with clarithromycin/erythromycin, azoles, ciclosporin, verapamil/diltiazem (CYP3A4/P-gp \u2014 toxicity); statin interaction (myopathy \u2014 warn)</b>. Diarrhoea = first sign of toxicity \u2192 stop"],
          ["<b>Prednisolone</b>","<b>30\u201335mg OD \u00d7 3\u20135 days</b> (no taper needed)","CKD + colchicine-unsuitable, elderly. Caution: diabetes (sugars spike \u2014 warn + monitor), HF (fluid), psychiatric history"],
          ["<b>IA steroid</b>","Methylprednisolone/triamcinolone into the joint","Single accessible joint, sepsis EXCLUDED \u2014 fastest fix of all"],
          ["Combine","NSAID/colchicine + steroid","Severe/polyarticular under review \u2014 or admit if systemically unwell"]
        ]},
        {b:"kv", rows:[
          ["Adjuncts","Rest, elevate, ice 20 min \u00d7 several/day; the flare drug in the bathroom cabinet BEFORE the next attack (self-start plan \u2014 halves flare duration)"],
          ["Already on ULT?","<b>Keep the allopurinol going through the flare</b> \u2014 stopping and restarting yo-yos the urate and provokes more"],
          ["On flare-prophylaxis colchicine already?","Treat the breakthrough flare with NSAID or steroid \u2014 don't stack full-dose colchicine on prophylactic colchicine"]
        ]}
      ]},

    {t:"node", d:"life", n:"3", tag:"Step 3 · drivers", title:"Lifestyle + deprescribing — worth ~60 µmol/L, not a substitute for ULT",
      blocks:[
        {b:"tiles", v:"life", items:[
          {t:"🍺 Alcohol", html:"Beer and spirits worst (purine load + blocked excretion); wine more neutral. The honest ask, every review."},
          {t:"🥤 Fructose", html:"Sugary drinks and juices raise urate — the most under-recognised dietary driver."},
          {t:"🍖 Purines", html:"Moderate red meat, offal, shellfish; dairy is protective. Crash diets PROVOKE flares — gradual loss only."},
          {t:"⚖️ Weight + the cluster", html:"Gout is a metabolic disease: screen and treat BP, HbA1c, lipids, CKD — the flare is often the door to finding all four."},
          {t:"💊 Swap the diuretic", html:"Thiazide for hypertension in a gout patient → switch (amlodipine — or losartan, which is mildly uricosuric). Keep diuretics needed for HF."},
          {t:"💧 Hydration", html:"2L/day, more with urate stones."}
        ]},
        {b:"why", html:"Lifestyle changes drop urate ~30\u201360 \u00b5mol/L \u2014 real but rarely enough alone once flares are recurrent. The error in both directions: lecturing about diet INSTEAD of starting allopurinol, or starting allopurinol without touching the beer and the bendroflumethiazide."}
      ]},

    {t:"node", d:"drug", n:"4", tag:"Step 4 · ULT", title:"Urate-lowering therapy — low start, flare cover, titrate to TARGET",
      blocks:[
        {b:"p", html:"<strong>Offer ULT to everyone with confirmed gout</strong> (NG219) \u2014 push hardest with \u22652 flares/year, tophi, joint damage, CKD 3+, diuretics, stones, or young onset. Start once the flare has settled (2\u20134 weeks) \u2014 or during one if the patient's ready and covered."},
        {b:"ladder", steps:[
          {step:"1st", title:"Allopurinol — start low, go slow, don't stop", when:"first-line for everyone",
           html:"<b>100mg OD (50mg if CKD 3+/elderly) \u2192 increase by 100mg (50 in CKD) every ~4 weeks guided by urate</b> \u2192 usual maintenance 300\u2013600mg, max 900mg. CKD is NOT a bar \u2014 titrate slower with renal monitoring. <b>Counsel the DRESS/SJS warning:</b> any rash in the first weeks \u2192 stop + same-day advice (highest risk: CKD, Han Chinese/Thai/Korean \u2014 consider HLA-B*58:01 testing first)."},
          {step:"Cover", title:"Flare prophylaxis alongside — up to 6 months", when:"co-prescribe from day one",
           fromLabel:"mobilising urate PROVOKES flares",
           html:"<b>Colchicine 500mcg OD\u2013BD</b> (dose by renal function) first-line; low-dose NSAID+PPI or prednisolone \u22645mg if colchicine unsuitable. Without cover, early flares convince patients allopurinol 'caused' the gout \u2014 the #1 reason ULT gets abandoned."},
          {step:"Target", title:"Treat to TARGET, not to dose", when:"urate every 4 weeks while titrating",
           fromLabel:"the discipline that cures",
           html:"<b><360 \u00b5mol/L \u2014 or <300 if tophi, joint damage, or ongoing flares</b> \u2014 then annually, lifelong. 'On allopurinol 100mg for 5 years, still flaring' = under-titration, the commonest failure in UK gout care. Tophi take months\u2013years to dissolve below 300."},
          {step:"2nd", title:"Febuxostat", when:"allopurinol intolerant / target unreachable",
           fromLabel:"with the CV caveat",
           html:"<b>80mg OD \u2192 120mg if urate >360 after 2\u20134 weeks.</b> No dose change in mild\u2013moderate CKD (handy). <b>Prefer allopurinol if major CV disease</b> (MI/stroke/unstable angina \u2014 FAST/CARES signal); LFTs baseline + periodic. Same flare-cover rules."},
          {step:"3rd", title:"Specialist options", when:"both failed / intolerant",
           fromLabel:"refer, don't abandon",
           html:"Uricosurics (sulfinpyrazone, benzbromarone via specialist; <b>losartan + SGLT2i</b> are useful urate-lowering comorbidity choices), combination therapy, IL-1 blockade (anakinra/canakinumab) for refractory flares."}
        ]},
        {b:"warn", html:"<b>The interaction that kills: allopurinol + azathioprine (or 6-mercaptopurine)</b> \u2014 xanthine-oxidase inhibition multiplies the thiopurine \u2192 profound marrow suppression. Screen every gout patient's list for azathioprine (transplant, IBD, autoimmune) BEFORE prescribing \u2014 if present, specialist decision only. Also: allopurinol boosts warfarin and theophylline \u2014 recheck INR after starting."}
      ]},

    {t:"node", d:"monitor", n:"5", tag:"Step 5 · review", title:"Urate-led titration — the review rhythm",
      blocks:[
        {b:"table", head:["What","When","Action"], rows:[
          ["Serum urate","<b>Every 4 weeks while titrating</b> \u2192 annually at target","Above target \u2192 next dose step; at target \u2192 hold + annual check"],
          ["U&E / eGFR","Baseline, with each titration in CKD, then annually","Guides allopurinol pace + flare-drug choice"],
          ["LFTs","Febuxostat: baseline + periodic","Significant rise \u2192 stop/switch"],
          ["Flares + tophi","Every review","Flares while titrating = expected (cover working?); flares AT target >6\u201312 months \u2192 recheck adherence, then look again at the target (<300)"],
          ["The metabolic annual","BP, HbA1c, lipids, weight, QRISK","Gout = a CV risk marker; treat the cluster"],
          ["Adherence","Every contact","Daily tablet forever, flares or not \u2014 the single message that determines success"]
        ]},
        {b:"say", html:"There are two jobs: today's fire, and the chemistry that keeps lighting it. The flare tablets put the fire out; the daily allopurinol drains the fuel \u2014 slowly, over months, and only if we push the dose until your blood level is under target. Expect a few flares early on \u2014 that's the crystals dissolving, not the tablet failing \u2014 and never stop it during a flare."}
      ]},

    {t:"loop", icon:"🔁", title:"Still flaring or urate above target? Check before calling it refractory",
      arrow:"\u2026it's almost never true failure",
      checks:[
        {b:"1 · Taking it daily?", html:"Refill history — the commonest cause. Many take allopurinol 'for attacks' like an antibiotic."},
        {b:"2 · Dose stuck?", html:"Still on 100mg? Titrate — 300–600mg is normal, 900 max. CKD slows the pace, doesn't cap the goal."},
        {b:"3 · Cover given?", html:"Early flares without prophylaxis → patient quit? Restart WITH colchicine cover this time."},
        {b:"4 · Drivers still running?", html:"Beer, sugary drinks, the thiazide nobody swapped, weight."},
        {b:"5 · Right diagnosis?", html:"CPPD (pseudogout), septic joint, reactive arthritis, cellulitis over a joint — aspirate if doubt."},
        {b:"6 · Genuinely refractory", html:"Adherent at max tolerated ULT, urate still >360, or flares at target → rheumatology (combination/uricosuric/IL-1)."}
      ],
      back:"All verified → uptitrate / switch / refer"},

    {t:"node", d:"safety", n:"6", tag:"Safety-net", title:"What the patient must know",
      blocks:[
        {b:"tiles", v:"safety", items:[
          {t:"🔴 Septic joint", html:"\u201cA hot swollen joint WITH fever, shivers or feeling properly unwell \u2014 same-day help, it can be an infected joint, which is an emergency.\u201d"},
          {t:"🟠 Allopurinol rash", html:"\u201cAny rash in the first couple of months \u2014 STOP the tablet and contact us the same day; rarely it signals a serious reaction.\u201d"},
          {t:"💩 Colchicine limit", html:"\u201cDiarrhoea or vomiting on colchicine means too much \u2014 stop and call. Never stockpile doses; and remind any prescriber you're on it before new antibiotics.\u201d"},
          {t:"💊 The forever rule", html:"\u201cThe daily tablet continues through flares, through good spells, for life \u2014 stopping is what brings gout back.\u201d"}
        ]}
      ]},

    {t:"node", d:"refer", n:"7", tag:"Refer", title:"Rheumatology — who and why",
      blocks:[
        {b:"tiles", v:"refer", items:[
          {t:"Same day", html:"Suspected septic arthritis → aspiration before steroids, admission."},
          {t:"Diagnostic doubt", html:"Atypical joints, young onset (<30 — think enzyme defects/renal), need for crystal confirmation."},
          {t:"Refractory", html:"Urate >360 despite maximum tolerated ULT, or flares/tophi persisting at target — combination therapy, uricosurics, IL-1 blockade."},
          {t:"Intolerance", html:"Allopurinol hypersensitivity (esp. after rash — desensitisation/alternatives are specialist calls) + febuxostat unsuitable."},
          {t:"Complex renal", html:"eGFR <30, transplant patients (the azathioprine/ciclosporin interactions), urate nephropathy/stones."},
          {t:"Pregnancy", html:"Gout in pregnancy is rare and odd — investigate + specialist."}
        ]},
        {b:"say", html:"Gout is one of the few kinds of arthritis we can effectively switch off \u2014 but the part people miss is that the daily tablet has to be pushed up until your blood level hits the target, and then kept forever. Do that, and the attacks stop; skip it, and they always come back."}
      ]}
  ],
  foot:"Gout in adults \u2014 NICE NG219, BSR 2017 and CKS. Verify doses against the current BNF before prescribing."
});
</script>
