<script>
MG.render({
  icon:"🔥",
  title:"GORD / Acid Reflux — The Complete Guide",
  stemTitle:"GORD made simple &mdash; exclude cancer, heal it, then get OFF the PPI properly",
  stemSub:"One pathway: screen NG12 alarm features (and stop the PPI before OGD), treat with a full-dose PPI taken at the RIGHT time, test-and-treat H. pylori, handle pregnancy/LPR/functional differently \u2014 then the bit everyone skips: STEP DOWN and stop long-term PPIs with a taper that beats the rebound. NICE CG184 \u00b7 NG12 \u00b7 CKS.",
  guideline:"NICE CG184 \u00b7 NG12",
  glance:[
    {lbl:"1st-line", val:"Full-dose PPI 4\u20138wk", sub:"30\u201360 min PRE-breakfast"},
    {lbl:"Alarm", val:"Dysphagia = OGD any age", sub:"NG12 \u00b7 stop PPI 2wk before"},
    {lbl:"H. pylori", val:"Test & treat", sub:"if dyspepsia/ulcer type"},
    {lbl:"Then", val:"STEP DOWN", sub:"lowest dose / on-demand"},
    {lbl:"Stopping", val:"Taper — beat rebound", sub:"not cold-turkey"},
    {lbl:"Long-term PPI", val:"Review annually", sub:"Mg, B12, #, C.diff"}
  ],
  flow:[

    {t:"node", d:"found", n:"1", tag:"Step 1 · diagnose", title:"Diagnose clinically — with a step-down goal from day one",
      blocks:[
        {b:"kv", rows:[
          ["Clinical diagnosis","Typical heartburn/regurgitation once NG12 alarms excluded \u2014 no OGD needed for uncomplicated typical symptoms. A PPI response supports it but isn't diagnostic"],
          ["Set the goal now","Control symptoms + heal any oesophagitis on the <b>lowest effective long-term acid suppression</b> \u2014 NOT indefinite full-dose PPI by default. Say 'this is a course, then we reduce' at the FIRST prescription"],
          ["Spectrum","Intermittent reflux \u2192 erosive oesophagitis \u2192 Barrett's; LPR and functional heartburn behave differently (Step 5)"],
          ["Drug review","NSAIDs, CCBs, nitrates, bisphosphonates, theophylline, doxycycline all worsen reflux/oesophagitis \u2014 deprescribe or protect"]
        ]},
        {b:"why", html:"The commonest GORD pitfall isn't misdiagnosis \u2014 it's the patient left on full-dose PPI for a decade with no review. Framing it as a heal-then-step-down problem at the start is what prevents that."}
      ]},

    {t:"node", d:"safety", n:"2", tag:"Step 2 · exclude cancer", title:"NG12 alarm features — check before any benign label",
      blocks:[
        {b:"tiles", v:"safety", items:[
          {t:"🔴 Dysphagia — ANY age", html:"Difficulty swallowing → urgent direct-access OGD (2WW). Never attribute new dysphagia to reflux."},
          {t:"🔴 55+ with weight loss", html:"+ upper abdominal pain / reflux / dyspepsia → 2WW OGD."},
          {t:"🔴 GI bleed", html:"Haematemesis, melaena, coffee-ground vomit → same-day / 999."},
          {t:"🟠 Mass / IDA", html:"Epigastric or supraclavicular mass, or unexplained iron-deficiency anaemia → 2WW."}
        ]},
        {b:"warn", html:"<b>Stop the PPI (and NSAIDs) before urgent OGD</b> \u2014 acid suppression heals and masks cancer at endoscopy, causing false reassurance. Ideally PPI off \u22652 weeks pre-OGD. Also consider <b>routine</b> OGD: 55+ with treatment-resistant dyspepsia, or upper abdominal pain + anaemia/raised platelets; and think earlier in >40s with FHx gastro-oesophageal cancer or high-risk ethnicity."}
      ]},

    {t:"node", d:"life", n:"3", tag:"Step 3 · lifestyle", title:"Lifestyle — every patient",
      blocks:[
        {b:"tiles", v:"life", items:[
          {t:"⚖️ Weight loss", html:"The single most effective measure in the overweight — lowers intra-abdominal pressure."},
          {t:"🍽️ Meal pattern", html:"Smaller meals; nothing within 3h of lying down; lighter evening meal."},
          {t:"🛏️ Bed head up", html:"Raise the head of the bed (blocks, not extra pillows) for nocturnal symptoms."},
          {t:"☕ Triggers", html:"Trim alcohol, caffeine, fatty/spicy/acidic foods, chocolate, fizzy drinks — individualised."},
          {t:"🚭 Smoking", html:"Cessation — lowers oesophageal sphincter tone."},
          {t:"💊 Deprescribe aggravators", html:"NSAIDs, CCBs, nitrates, bisphosphonates — review the culprits above."}
        ]}
      ]},

    {t:"node", d:"drug", n:"4", tag:"Step 4 · acid suppression", title:"Treat — the right drug, the right TIME",
      blocks:[
        {b:"ladder", steps:[
          {step:"Step 1", title:"Full-dose PPI × 4–8 weeks", when:"first-line",
           html:"<b>Omeprazole 20\u201340mg OD or lansoprazole 30mg OD, 30\u201360 min BEFORE breakfast</b> (PPIs need food to activate proton pumps \u2014 wrong timing is the commonest 'PPI failure'). Erosive oesophagitis \u2192 8 weeks full dose."},
          {step:"Step 2", title:"Test & treat H. pylori", when:"dyspepsia / ulcer-type symptoms",
           fromLabel:"epigastric/ulcer features",
           html:"Urea breath test or stool antigen \u2014 <b>stop PPI 2 weeks before testing</b> (false negatives). Positive \u2192 <b>7-day triple therapy: PPI BD + amoxicillin 1g BD + clarithromycin 500mg BD</b> (metronidazole 400mg BD if penicillin-allergic); retest after if ulcer/persistent."},
          {step:"Step 3", title:"Optimise before escalating", when:"partial response",
           fromLabel:"still symptomatic",
           html:"Check timing + adherence FIRST; then BD dosing or switch PPI. Add <b>alginate (Gaviscon Advance) PRN</b> for breakthrough / post-prandial / nocturnal symptoms."},
          {step:"Step 4", title:"H2RA add-on / alternative", when:"nocturnal breakthrough or PPI intolerance",
           fromLabel:"adjunct",
           html:"<b>Famotidine 20\u201340mg nocte</b> for nocturnal acid breakthrough or where a PPI isn't tolerated."}
        ]},
        {b:"warn", html:"<b>Long-term PPI risks</b> (the reasons to step down): hypomagnesaemia, B12 deficiency, C. difficile + other enteric infections, hip fracture, hypochlorhydria, and <b>rebound acid hypersecretion on stopping</b> \u2014 the trap that convinces patients they 'need it for life'."}
      ]},

    {t:"node", d:"drug", n:"5", tag:"Step 5 · step down & STOP", title:"The step-down — beating the rebound is the whole skill",
      blocks:[
        {b:"p", html:"<strong>Once symptoms are controlled for 4\u20138 weeks (and oesophagitis healed), reduce.</strong> Rebound acid hypersecretion after abrupt cessation lasts ~2 weeks and mimics relapse \u2014 patients restart and conclude they're PPI-dependent. A taper pre-empts it."},
        {b:"ladder", steps:[
          {step:"1st", title:"Halve the dose", when:"controlled 4\u20138 weeks",
           html:"Drop full \u2192 standard \u2192 low dose (e.g. omeprazole 40\u219220\u219210mg) over a few weeks, each step held until stable. Reinforce lifestyle at each step \u2014 it carries more load as the drug reduces."},
          {step:"2nd", title:"On-demand / intermittent", when:"low dose stable",
           fromLabel:"the target for most",
           html:"Take the PPI only for symptomatic days/short courses \u2014 <b>on-demand dosing controls most uncomplicated GORD with a fraction of the total drug</b>. Alginate PRN bridges breakthrough."},
          {step:"3rd", title:"Cover the rebound fortnight", when:"stopping fully",
           fromLabel:"pre-warn + bridge",
           html:"Warn that heartburn may briefly worsen for ~1\u20132 weeks \u2014 <b>this is rebound, not your reflux returning</b>. Bridge with alginate \u00b1 short famotidine; hold the line and it settles. This single conversation is what makes stopping succeed."},
          {step:"Don't", title:"Who should NOT step down/stop", when:"keep the PPI",
           fromLabel:"maintain, at lowest effective dose",
           html:"<b>Barrett's oesophagus, severe erosive oesophagitis (LA grade C/D), documented stricture, or ongoing NSAID/antiplatelet gastroprotection</b> \u2014 these need continued PPI; step to the lowest effective dose but don't stop. Reflux-symptom relapse on stopping (in the majority) \u2192 lowest dose that controls it."}
        ]},
        {b:"say", html:"These tablets are brilliant for healing the irritation, but they're not meant to be forever for most people. We'll get you comfortable, then come down step by step. One thing to expect when we stop: your heartburn may flare for a week or two \u2014 that's the stomach readjusting, NOT the reflux coming back for good. Ride it out with the Gaviscon and it settles; jump straight back on the tablet and we never find out you didn't need it."}
      ]},

    {t:"node", d:"life", n:"6", tag:"Special situations", title:"Pregnancy · LPR · functional · Barrett's",
      blocks:[
        {b:"kv", rows:[
          ["Pregnancy","Lifestyle + <b>alginates first</b>; <b>omeprazole</b> has the most safety data if acid suppression needed; usually resolves postpartum"],
          ["Laryngopharyngeal reflux (LPR)","Hoarseness / globus / throat-clearing / chronic cough \u2014 longer trial (BD PPI, 8\u201312 weeks) + alginate; ENT if persistent (exclude head & neck pathology). Responds less reliably than typical GORD"],
          ["Functional heartburn / dyspepsia","Normal OGD \u00b1 pH \u2014 a gut\u2013brain-axis disorder: test/treat H. pylori for epigastric type, coeliac serology if IBS overlap, USS if epigastric pain <1yr (?biliary), consider <b>low-dose TCA</b> (amitriptyline) \u2014 and AVOID endless PPI escalation"],
          ["Barrett's oesophagus","Confirmed at OGD \u2192 continue PPI + ensure enrolled in the endoscopic surveillance programme"]
        ]}
      ]},

    {t:"node", d:"monitor", n:"7", tag:"Step 6 · review", title:"Review — especially the repeat PPI",
      blocks:[
        {b:"table", head:["What","When","Action"], rows:[
          ["Symptom response","4\u20138 weeks","Controlled \u2192 step down (Step 5); not controlled \u2192 check timing/adherence \u2192 escalate/refer"],
          ["<b>Long-term PPI on repeat</b>","<b>At least annually</b>","Confirm ongoing need, attempt step-down/stop, lowest effective dose; check Mg (and B12 if prolonged); every repeat is a step-down opportunity"],
          ["Alarm features","Every contact","New dysphagia/weight loss/bleeding \u2192 urgent OGD \u2014 do NOT just increase the PPI"],
          ["H. pylori eradication","Post-treatment if ulcer/persistent","Retest (breath/stool, off PPI) to confirm clearance"]
        ]},
        {b:"warn", html:"Audit your repeat-prescribing list for long-term full-dose PPIs with no review \u2014 it's one of the highest-yield deprescribing wins in general practice."}
      ]},

    {t:"loop", icon:"🔁", title:"Not responding? Check before escalating",
      arrow:"\u2026'PPI-resistant' is usually fixable",
      checks:[
        {b:"1 · Timing", html:"Taken 30–60 min BEFORE breakfast? Wrong timing is the #1 'failure'."},
        {b:"2 · Adherence + lifestyle", html:"Actually taking it? Weight, late meals, triggers, aggravating drugs (NSAIDs/CCBs)?"},
        {b:"3 · Right diagnosis?", html:"Cardiac pain masquerading? Functional heartburn / LPR (different response)? Eosinophilic oesophagitis (dysphagia, food impaction, young atopic → OGD + biopsy)?"},
        {b:"4 · Alarm features", html:"New dysphagia / weight loss / bleeding / IDA → OGD, not a higher PPI dose."},
        {b:"5 · H. pylori", html:"Tested (off PPI) and eradicated where relevant?"},
        {b:"6 · Refractory", html:"Optimised BD PPI + alginate and still symptomatic → gastroenterology (pH/manometry)."}
      ],
      back:"Timing + adherence + alarms + diagnosis addressed → optimise or refer"},

    {t:"node", d:"safety", n:"8", tag:"Safety-net", title:"What the patient must know",
      blocks:[
        {b:"tiles", v:"safety", items:[
          {t:"🔴 Swallowing / weight", html:"\u201cTrouble swallowing, food sticking, or losing weight \u2014 tell me straight away; that needs a camera test, not a stronger tablet.\u201d"},
          {t:"🔴 Bleeding", html:"\u201cVomiting blood or black tarry stools \u2014 999/A&E.\u201d"},
          {t:"🔄 Rebound on stopping", html:"\u201cWhen we stop the tablet your heartburn may flare for a week or two \u2014 that's rebound, not relapse; use the Gaviscon and it settles.\u201d"},
          {t:"💊 Not forever", html:"\u201cThese aren't meant to be lifelong for most people \u2014 we'll review yearly and use the lowest dose that keeps you comfortable.\u201d"}
        ]}
      ]},

    {t:"node", d:"refer", n:"9", tag:"Refer", title:"When to refer",
      blocks:[
        {b:"tiles", v:"refer", items:[
          {t:"2WW upper GI", html:"Dysphagia any age; 55+ weight loss + reflux/dyspepsia/upper abdominal pain; epigastric mass; iron-deficiency anaemia."},
          {t:"Same-day / 999", html:"Haematemesis, melaena, haemodynamic instability."},
          {t:"Gastroenterology", html:"Refractory symptoms despite optimised PPI; confirmed Barrett's (surveillance); suspected eosinophilic oesophagitis; younger patients relapsing off PPI."},
          {t:"Upper-GI surgery", html:"Proven GORD considering fundoplication — after pH/manometry."}
        ]},
        {b:"say", html:"Reflux usually settles with some weight loss, meal changes and a course of an acid tablet taken before breakfast \u2014 then we bring it down to the lowest dose you need, and for many people, off it altogether. If you ever struggle to swallow or lose weight, that changes things and I need to know."}
      ]}
  ],
  foot:"Management of confirmed/clinical GORD in primary care; alarm features follow the NICE NG12 suspected-cancer pathway. Verify against current NICE CG184, NG12 and CKS before prescribing."
});
</script>
