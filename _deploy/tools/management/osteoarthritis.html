<body data-screen-label="Osteoarthritis management card">
<div class="mg-wrap" id="mgRoot"></div>
<script src="../../assets/management-engine.js?v=3"></script>
<script>
MG.render({
  icon:"🦵",
  title:"Osteoarthritis — The Complete Guide",
  stemTitle:"OA made simple &mdash; exercise IS the treatment, drugs are the adjunct, topical before oral",
  stemSub:"One pathway: diagnose clinically (no X-ray for typical OA), make therapeutic exercise + weight loss the CORE treatment for everyone, climb the analgesia ladder topical-first with the drugs NICE says to avoid, use intra-articular steroid for flares, and refer for joint replacement on quality of life \u2014 not on an X-ray grade. NICE NG226 \u00b7 CKS.",
  guideline:"NICE NG226 \u00b7 CKS",
  glance:[
    {lbl:"Diagnose", val:"Clinically \u226545y", sub:"no imaging if typical"},
    {lbl:"Core Rx (everyone)", val:"Exercise + weight", sub:"best evidence for pain"},
    {lbl:"Analgesia 1st", val:"Topical NSAID", sub:"knee/hand"},
    {lbl:"Then", val:"Oral NSAID + PPI", sub:"lowest dose, shortest time"},
    {lbl:"Avoid", val:"Paracetamol-alone / opioids", sub:"+ glucosamine, hyaluronan"},
    {lbl:"Refer on", val:"Quality of life", sub:"NOT the X-ray grade"}
  ],
  flow:[

    {t:"node", d:"found", n:"1", tag:"Step 1 · diagnose", title:"Diagnose clinically — and reframe the story",
      blocks:[
        {b:"kv", rows:[
          ["Clinical diagnosis (no imaging)","\u226545y + activity-related joint pain + <b>no morning stiffness, or stiffness \u226430 min</b> \u2192 diagnose without X-ray. Imaging doesn't change management and X-ray severity correlates poorly with symptoms"],
          ["Assess the impact","Pain, function, sleep, mood, work, which joints, and \u2014 the referral currency \u2014 <b>effect on quality of life</b>"],
          ["Comorbidity (drives drug choice)","GI risk, CKD, CVD/HF, anticoagulation \u2014 all constrain NSAID use (the mainstay analgesic)"],
          ["Reset expectations","OA is manageable and not inevitably progressive; the aim is function + pain control, not a 'cure' \u2014 and movement helps rather than harms the joint"]
        ]},
        {b:"why", html:"NICE NG226 (2022) deliberately reframed OA around <strong>therapeutic exercise and weight management as the core treatment for everyone</strong>, with drugs as adjuncts \u2014 because exercise has the best evidence for pain and function while long-term analgesia has modest benefit and real harms. An X-ray-led narrative ('bone on bone') drives fear, inactivity and unnecessary intervention \u2014 the words you use are part of the treatment."},
        {b:"warn", html:"<b>Reconsider the diagnosis if:</b> hot swollen joint (septic/crystal), true inflammatory pattern (prolonged morning stiffness, small-joint symmetrical \u2192 ?RA), rapid deterioration, night pain + weight loss or a mass (?malignancy), or symptoms not fitting OA \u2014 don't anchor on 'wear and tear'."}
      ]},

    {t:"node", d:"life", n:"2", tag:"Step 2 · core treatment", title:"Exercise + weight — offered to ALL, the actual therapy",
      blocks:[
        {b:"tiles", v:"life", items:[
          {t:"🏃 Therapeutic exercise", html:"<b>First-line for everyone</b> — muscle strengthening + aerobic, tailored and SUSTAINED. Counsel: it may hurt a little at first and benefit takes weeks — that's expected, not damage. Refer physio for a programme."},
          {t:"⚖️ Weight loss", html:"If overweight — even modest loss meaningfully cuts load-joint (knee/hip) pain; any loss helps, more is better."},
          {t:"📚 Education & self-management", html:"Explain OA honestly, set functional goals, build self-efficacy — replace the 'bone-on-bone' story."},
          {t:"🦯 Aids & devices", html:"Walking aids, appropriate footwear; OT for hand OA aids and joint protection."},
          {t:"🤲 Manual therapy", html:"As an ADJUNCT to exercise (esp. hip/knee) — not a standalone treatment."},
          {t:"🔥 Heat / TENS", html:"Low-risk symptom adjuncts some patients find helpful."}
        ]},
        {b:"say", html:"The single best treatment for your joint isn't a tablet — it's the right exercise, kept up. It'll ache a bit at first and take a few weeks to pay off, but the strengthening is what actually reduces the pain long term. The painkillers just help you move enough to do it."}
      ]},

    {t:"node", d:"drug", n:"3", tag:"Step 3 · analgesia", title:"The analgesia ladder — adjunct only, topical before oral",
      blocks:[
        {b:"ladder", steps:[
          {step:"Step 1", title:"Topical NSAID", when:"knee / hand OA — first-line drug",
           html:"<b>Topical ibuprofen 5% or diclofenac 1% gel, up to TDS\u2013QDS</b> \u2014 good local effect, minimal systemic absorption/risk. Try this before any oral analgesic for knee and hand OA."},
          {step:"Step 2", title:"Oral NSAID + gastroprotection", when:"topical insufficient / unsuitable site (e.g. hip)",
           fromLabel:"lowest dose, shortest time",
           html:"<b>Ibuprofen 400mg TDS or naproxen 250\u2013500mg BD, WITH a PPI</b> (omeprazole 20mg OD). Lowest effective dose, shortest duration, intermittent where possible. <b>Weigh GI, renal and CV risk</b> \u2014 caution/avoid in elderly, CKD (check eGFR), CVD/HF, and on ACEi + diuretic (triple whammy AKI)."},
          {step:"Adjuncts", title:"Topical capsaicin · intra-articular steroid", when:"flares / NSAIDs unsuitable",
           fromLabel:"targeted add-ons",
           html:"<b>Capsaicin 0.025% cream QDS</b> (knee/hand) \u2014 useful when NSAIDs contraindicated; warn re burning + hand-washing. <b>Intra-articular corticosteroid</b> (methylprednisolone 40mg / triamcinolone) for short-term relief of a significant flare or to enable rehab \u2014 effect is weeks, not months."},
          {step:"Avoid", title:"What NICE says NOT to use", when:"low-value / harmful",
           fromLabel:"deprescribing targets",
           html:"<b>Do NOT routinely offer paracetamol alone</b> (minimal benefit) <b>or weak/strong opioids</b> (limited benefit, real harm \u2014 strong opioids only exceptional + time-limited). <b>Don't offer glucosamine/chondroitin or intra-articular hyaluronan</b> (no benefit)."}
        ]},
        {b:"warn", html:"Opioids are a trap in OA: modest short-term analgesia, no long-term function gain, and dependence/hyperalgesia (see the opioid guide). If someone's on regular OA opioids with no functional benefit, the plan is a taper, not a repeat."}
      ]},

    {t:"node", d:"monitor", n:"4", tag:"Step 4 · review", title:"Review — function first, drug safety, exercise adherence",
      blocks:[
        {b:"table", head:["What","When","Action"], rows:[
          ["Function / pain / QoL","Each review","Worsening QoL despite optimised core treatment → consider referral"],
          ["Exercise adherence","Each review","The core treatment only works if done — re-motivate, re-refer physio; this is the highest-yield review item"],
          ["NSAID safety","If on regular oral NSAID","Renal function + BP + GI symptoms; use intermittently; confirm PPI cover"],
          ["Mood / sleep","As needed","Treat comorbid low mood + poor sleep — they amplify pain perception measurably"],
          ["Opioid use","Ongoing","Any regular opioid → functional benefit documented? If not → taper"]
        ]},
        {b:"say", html:"We'll judge success by what you can DO, not just the pain score. The exercise is the treatment we keep coming back to — if it's slipped, that's usually why things feel worse, not the joint getting dramatically worse."}
      ]},

    {t:"loop", icon:"🔁", title:"Not controlled? Optimise the core BEFORE escalating",
      arrow:"\u2026it's usually the exercise, not the joint",
      checks:[
        {b:"1 · Exercise", html:"Genuinely being done and sustained? Referred to physio for a real programme?"},
        {b:"2 · Weight", html:"Load-joint OA + overweight — weight management actually engaged?"},
        {b:"3 · Analgesia order", html:"Topical tried before oral? NSAID at lowest dose WITH PPI? Capsaicin/IA steroid considered?"},
        {b:"4 · Another diagnosis", html:"Hot/swollen, inflammatory pattern, rapid change, night pain + red flags → reconsider (septic, crystal, RA, malignancy)."},
        {b:"5 · Mood/sleep", html:"Depression, poor sleep, catastrophising amplifying pain → treat them."},
        {b:"6 · QoL", html:"Substantially affecting life despite all the above → refer, regardless of X-ray."}
      ],
      back:"Core optimised + QoL still affected → joint-replacement assessment"},

    {t:"node", d:"safety", n:"5", tag:"Safety-net", title:"What the patient must know",
      blocks:[
        {b:"tiles", v:"safety", items:[
          {t:"🔴 Hot swollen joint", html:"\u201cA suddenly hot, swollen, very painful joint with fever — urgent help; that's infection or gout, not arthritis wear.\u201d"},
          {t:"⚠️ NSAID risks", html:"\u201cIndigestion, black tarry stools, or ankle swelling on anti-inflammatories — tell us; and avoid them if we've flagged your kidneys or stomach.\u201d"},
          {t:"🦵 Red flags", html:"\u201cRapidly worsening pain, pain waking you at night, weight loss, or a new lump — get checked.\u201d"},
          {t:"🏃 Keep moving", html:"\u201cRest makes OA joints stiffer — staying active is treatment, even when it aches a little. Hurt doesn't mean harm here.\u201d"}
        ]}
      ]},

    {t:"node", d:"refer", n:"6", tag:"Refer", title:"When to refer — on life, not on the X-ray",
      blocks:[
        {b:"tiles", v:"refer", items:[
          {t:"Joint replacement", html:"Quality of life substantially affected despite optimal conservative management → orthopaedics. <b>Don't delay for arbitrary X-ray thresholds or age</b> (NG226)."},
          {t:"Diagnostic doubt", html:"Atypical/inflammatory pattern or suspected alternative diagnosis → rheumatology."},
          {t:"Urgent", html:"Suspected septic arthritis or sinister cause → same-day."},
          {t:"Allied health", html:"Physiotherapy (the core), occupational therapy (hand OA/aids), podiatry, weight-management services."}
        ]},
        {b:"say", html:"The exercise and, if it applies, some weight loss do the real work; painkillers help you keep moving. If your joint ever stops you doing the things that matter despite all that, we'll talk about a replacement — and that decision is based on how it affects your life, not on what an X-ray looks like."}
      ]}
  ],
  foot:"Osteoarthritis in adults \u2014 NICE NG226 (2022) and CKS. Verify doses against the current BNF before prescribing."
});
</script>
