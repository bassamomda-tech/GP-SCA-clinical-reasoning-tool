MG.render({"icon":"🩸","title":"Neutropenic Sepsis","guideline":"NICE NG191/CG151","stemTitle":"Neutropenic sepsis — a time-critical emergency: recognise and admit NOW","stemSub":"The primary-care priority in neutropenic sepsis is immediate recognition and emergency admission of any unwell or febrile patient on/after recent chemotherapy — do not delay for tests. NICE NG191 / CG151 · 2026.","glance":[{"lbl":"Define","val":"Neutrophils ≤0.5 + fever/illness","sub":"after chemo"},{"lbl":"Suspect","val":"Any unwell patient on chemo","sub":"± fever (may be absent)"},{"lbl":"Action","val":"999 / emergency admission","sub":"IV antibiotics ≤1h"},{"lbl":"Don't","val":"Delay for bloods / give oral abx","sub":"& wait"},{"lbl":"Window","val":"Recent chemo (≥6 wk)","sub":"high index of suspicion"},{"lbl":"Red flag","val":"Fever ≥38°C on chemo","sub":"= emergency"}],"flow":[{"t":"node","d":"safety","n":"1","tag":"Safety-net","title":"This is the emergency — act immediately","blocks":[{"b":"tiles","v":"safety","items":[{"t":"🔴 Admit NOW","html":"Any patient who is unwell or febrile (≥38°C, or other signs of sepsis) during or within ~6 weeks of chemotherapy → <b>emergency admission</b> for IV broad-spectrum antibiotics within 1 hour (‘door-to-needle’)."},{"t":"🌡️ Fever may be absent","html":"Hypothermia, rigors, hypotension, confusion or just ‘feeling unwell’ can be the only signs — do not be reassured by a normal temperature."},{"t":"⛔ Don’t delay","html":"Do NOT wait for a blood count, and do NOT start oral antibiotics and review later — this kills. Arrange blue-light transfer to the patient’s acute oncology service."},{"t":"📋 Use the alert card","html":"Chemotherapy patients carry an alert card/24h hotline number — use it; communicate ‘?neutropenic sepsis’."}]},{"b":"why","html":"Neutropenic sepsis is one of the true primary-care emergencies: a febrile or unwell patient on recent chemotherapy can deteriorate and die within hours. The only correct action is immediate emergency admission for IV antibiotics — never temporise with oral antibiotics or wait for tests."}]},{"t":"node","d":"found","n":"2","tag":"Foundation","title":"Recognise the at-risk patient","blocks":[{"b":"kv","rows":[["Definition","Neutrophil count ≤0.5 × 10⁹/L (or ≤1.0 and falling) with temperature &gt;38°C OR other signs/symptoms of clinically significant sepsis"],["Who","Patients on cytotoxic chemotherapy (commonly 7–14 days post-cycle, nadir), some immunosuppressants/biologics; haematological malignancy"],["History","Always ask about recent chemotherapy in any unwell adult; check the alert card and treatment dates"],["Signs of sepsis","Fever or hypothermia, tachycardia, hypotension, tachypnoea, confusion, rigors, mucositis, line site, focal infection"]]}]},{"t":"node","d":"drug","n":"3","tag":"Action","title":"What to do in primary care","blocks":[{"b":"ladder","steps":[{"step":"Step 1","title":"Recognise + resuscitate","when":"immediately","html":"ABCDE; if signs of sepsis/shock manage as sepsis; oxygen if hypoxic; do not delay transfer for interventions."},{"step":"Step 2","title":"Emergency transfer","when":"now","fromLabel":"blue-light","html":"Call 999 / contact the acute oncology service or 24h chemotherapy hotline; communicate ‘suspected neutropenic sepsis’ so IV antibiotics are given within 1 hour on arrival."},{"step":"Step 3","title":"Do NOT","when":"avoid harm","fromLabel":"pitfalls","html":"Do not give/await a trial of oral antibiotics, do not wait for FBC results, do not send home to ‘see how things go’."}]},{"b":"warn","html":"Hospitals use risk scores (e.g. MASCC) and may later offer outpatient management to selected low-risk patients — but that decision is made in secondary care after assessment, never in the community."}]},{"t":"node","d":"refer","n":"4","tag":"Refer","title":"Referral","blocks":[{"b":"tiles","v":"refer","items":[{"t":"999 / acute oncology","html":"All suspected cases — immediate admission for IV antibiotics within 1 hour."},{"t":"Use hotline / alert card","html":"Direct route to the patient’s cancer unit."},{"t":"Educate patients","html":"Ensure chemo patients know to seek help immediately for fever/feeling unwell and carry their alert card."}]},{"b":"say","html":"Because you’re having chemotherapy, a fever or just feeling unwell can mean a dangerous infection called neutropenic sepsis — your body can’t fight infection normally. This needs hospital treatment with antibiotics into a vein within the hour, so we’re sending you in straight away. Always ring your chemo hotline the moment you feel feverish or unwell."}]}],"foot":"Neutropenic sepsis is a primary-care emergency — immediate admission for IV antibiotics; never delay for tests or give oral antibiotics and wait. Verify against current NICE NG191/CG151 and local acute oncology pathways."});
</script>
