<body data-screen-label="Smoking cessation management card">
<div class="mg-wrap" id="mgRoot"></div>
<script src="../../assets/management-engine.js?v=3"></script>
<script>
MG.render({
  icon:"🚭",
  title:"Smoking Cessation — The Complete Guide",
  stemTitle:"Stopping smoking &mdash; 30-second advice at every contact, then the most effective drug + support",
  stemSub:"One pathway: deliver Very Brief Advice to every smoker (Ask\u2013Advise\u2013Act, ~30s), set a quit date, then combine behavioural support with the most effective pharmacotherapy \u2014 varenicline (back in UK supply), combination NRT, or a licensed vape \u2014 tailor for pregnancy and severe mental illness, and remember the CYP1A2 interaction that changes drug levels the day they stop. NICE NG209 \u00b7 CKS.",
  guideline:"NICE NG209 \u00b7 CKS",
  glance:[
    {lbl:"Every contact", val:"Very Brief Advice", sub:"Ask \u00b7 Advise \u00b7 Act (~30s)"},
    {lbl:"Most effective", val:"Varenicline 1mg BD", sub:"or combination NRT"},
    {lbl:"NRT", val:"Patch + short-acting", sub:"together, not alone"},
    {lbl:"Option", val:"Licensed vape", sub:"effective adult quit aid"},
    {lbl:"Support", val:"Stop-smoking service", sub:"\u00d72\u20133 quit rate"},
    {lbl:"Watch on quitting", val:"Clozapine / olanzapine / theophylline", sub:"CYP1A2 levels rise"}
  ],
  flow:[

    {t:"node", d:"found", n:"1", tag:"Step 1 · every contact", title:"Very Brief Advice — 30 seconds, every smoker, every time",
      blocks:[
        {b:"kv", rows:[
          ["ASK","Record smoking status at every opportunity \u2014 it's the trigger for everything else"],
          ["ADVISE","\u201cThe best thing for your health is to stop \u2014 and the most effective way is with support + medication, not willpower alone.\u201d Clear, personal, non-judgemental"],
          ["ACT","Offer referral to the local stop-smoking service + pharmacotherapy TODAY \u2014 don't lecture, don't wait for them to be 'ready'; the offer itself prompts quit attempts"],
          ["Assess dependence","Cigarettes/day, <b>time to first cigarette</b> (<30 min = highly dependent), previous attempts + what happened, triggers, motivation, comorbidity"]
        ]},
        {b:"why", html:"Smoking is the single largest preventable cause of death. <strong>Opportunistic VBA plus an offer of help meaningfully increases quit attempts</strong> \u2014 you don't need the patient to arrive motivated. And combining behavioural support with pharmacotherapy roughly TRIPLES success versus unaided willpower, which is why 'just offer support' is not enough on its own."}
      ]},

    {t:"node", d:"drug", n:"2", tag:"Step 2 · pharmacotherapy", title:"Choose the drug — most effective first",
      blocks:[
        {b:"ladder", steps:[
          {step:"1st-line", title:"Varenicline", when:"most effective single agent \u2014 back in UK supply",
           html:"<b>Start 1\u20132 weeks BEFORE the quit date</b>; titrate 0.5mg OD \u2192 0.5mg BD \u2192 <b>1mg BD</b>; 12-week course (extend 12 more weeks in abstainers to prevent relapse). Withdrawn 2021 (nitrosamine impurity) but <b>re-available from 2025</b>. Counsel: nausea (with food), vivid dreams, insomnia; review mood \u2014 monitor in psychiatric illness though the serious-neuropsychiatric-risk signal was not confirmed (EAGLES)."},
          {step:"1st-line", title:"Combination NRT", when:"widely available, very effective",
           fromLabel:"if varenicline unsuitable/declined",
           html:"<b>Long-acting patch + a short-acting form</b> (gum/lozenge/inhalator/nasal spray) TOGETHER \u2014 more effective than any single form. Patch for the baseline, short-acting for breakthrough cravings. Start on quit date (or 2 weeks before, patch-led, per newer evidence); titrate to cravings; safe in CVD."},
          {step:"Option", title:"Licensed nicotine vape", when:"patient prefers / other options failed",
           fromLabel:"effective adult quit aid",
           html:"NG209 supports vapes as an effective quit aid for adults trying to stop \u2014 combine with behavioural support. <b>Not for non-smokers, under-18s, or in pregnancy</b> as a first choice. Frame as a route OFF tobacco, not a permanent habit."},
          {step:"Alternatives", title:"Cytisine · bupropion", when:"other agents unsuitable",
           fromLabel:"further options",
           html:"<b>Cytisinicline/cytisine</b> \u2014 plant-derived partial agonist, effective, increasingly available. <b>Bupropion 150mg OD \u00d76 days \u2192 150mg BD</b>, start 1\u20132 weeks pre-quit \u2014 avoid in seizure risk, eating disorders, pregnancy."}
        ]},
        {b:"warn", html:"<b>The CYP1A2 interaction \u2014 easy to miss:</b> tobacco smoke (not nicotine) induces CYP1A2, so <b>stopping smoking RAISES levels of clozapine, olanzapine, theophylline, and affects warfarin/insulin</b>. On the quit date these can climb into toxicity \u2014 flag it: clozapine/theophylline need level monitoring + likely dose reduction; review insulin (requirements often fall). This applies to a sudden switch to vaping too (no combustion = no induction)."}
      ]},

    {t:"node", d:"life", n:"3", tag:"Step 3 · behavioural support", title:"Maximise the quit — support is half the treatment",
      blocks:[
        {b:"tiles", v:"life", items:[
          {t:"📅 Quit date + 'not a puff'", html:"Set a firm quit date; the 'not a single puff' rule from that day is more successful than cutting down (though cut-down-to-quit with NRT is an option for the unready)."},
          {t:"🤝 Specialist service", html:"Refer to the local stop-smoking service — structured behavioural support DOUBLES to TRIPLES success. The single highest-yield referral in the consultation."},
          {t:"🧠 Triggers + coping", html:"Map routines/triggers (coffee, alcohol, breaks), plan alternatives; pre-empt the weight-gain worry (real but far outweighed by the health gain)."},
          {t:"👨‍👩‍👧 Household", html:"Encourage co-habiting smokers to quit together; smoke-free home + car protects children (and cuts relapse)."},
          {t:"📱 Tools + money", html:"NHS Quit Smoking app, helpline; the financial saving is a powerful, concrete motivator."}
        ]},
        {b:"say", html:"Stopping smoking is the single best thing you can do for your health, and you're far more likely to succeed with support and medication than willpower alone. I'll refer you to the stop-smoking service and we'll start a treatment around your quit date. Most people need a few goes \u2014 a slip isn't failure, it's information for the next attempt."}
      ]},

    {t:"node", d:"safety", n:"4", tag:"Step 4 · special groups", title:"Tailor the approach",
      blocks:[
        {b:"tiles", v:"safety", items:[
          {t:"🤰 Pregnancy", html:"Behavioural support + CO monitoring first-line; offer <b>NRT if needed</b> (intermittent/short-acting, or remove the patch overnight); <b>avoid varenicline + bupropion</b>. A licensed vape is less harmful than smoking if it's what helps her quit."},
          {t:"🧠 Severe mental illness", html:"Smoking rates far higher, life expectancy hit hardest \u2014 offer cessation ACTIVELY (don't assume they won't). Monitor mental state, and <b>clozapine/olanzapine levels rise on quitting</b> \u2192 dose review."},
          {t:"🫁 High-value comorbidity", html:"COPD, CVD, diabetes, pre-surgery, cancer treatment \u2014 cessation is the highest-value single intervention; prioritise and re-offer every time."},
          {t:"🧒 Young people", html:"Behavioural support; <b>do NOT initiate vaping in non-smokers</b>; involve youth services."}
        ]}
      ]},

    {t:"node", d:"monitor", n:"5", tag:"Step 5 · follow-up", title:"Support the attempt through to abstinence",
      blocks:[
        {b:"table", head:["When","Focus","Action"], rows:[
          ["Quit date (or 1\u20132 wks before for varenicline/bupropion)","Start","Begin pharmacotherapy, confirm the plan + service referral, set 'not a puff'"],
          ["1\u20134 weeks","Review","Adherence, side effects, cravings/withdrawal, mood; titrate NRT up if still craving; CO reading if available; troubleshoot triggers"],
          ["12 weeks +","Relapse prevention","Complete/extend the course; congratulate; plan high-risk situations; a lapse = learning, re-attempt promptly"],
          ["On quitting: interacting drugs","Around quit date","Clozapine/theophylline levels + doses; insulin requirement (often falls); warfarin INR"]
        ]},
        {b:"say", html:"We'll check in within the first few weeks \u2014 that's when cravings and side effects peak and when a bit of dose adjustment keeps you on track. Keep going even if you slip; the people who succeed are usually the ones who just start the next attempt quickly."}
      ]},

    {t:"loop", icon:"🔁", title:"Struggling or relapsed? Work through this",
      arrow:"\u2026relapse is part of quitting, not the end",
      checks:[
        {b:"1 · Enough medication?", html:"Combination NRT (patch + short-acting), not single-form? NRT titrated up for breakthrough cravings? Varenicline at full 1mg BD?"},
        {b:"2 · Behavioural support engaged?", html:"Actually referred to and attending the stop-smoking service, or going it alone?"},
        {b:"3 · Triggers unmanaged?", html:"Alcohol, other household smokers, work breaks — the specific relapse setting addressed?"},
        {b:"4 · Side effects driving it?", html:"Nausea/dreams on varenicline, skin on patches → switch form/agent rather than abandon."},
        {b:"5 · Switch agent", html:"Failed on one → try another (varenicline ↔ combination NRT ↔ vape ↔ cytisine); combining approaches is reasonable."},
        {b:"6 · Re-offer", html:"Not ready today → leave the door open, re-offer at the next contact; most quitters take several attempts."}
      ],
      back:"Re-attempt with a different/stronger combination + service support"},

    {t:"node", d:"safety", n:"6", tag:"Safety-net", title:"What the patient must know",
      blocks:[
        {b:"tiles", v:"safety", items:[
          {t:"💊 Other medicines", html:"\u201cIf you take clozapine, olanzapine or a theophylline inhaler tablet \u2014 tell us the day you stop; smoking changes how your body handles them and the dose may need adjusting.\u201d"},
          {t:"💉 Diabetes", html:"\u201cIf you're on insulin, your sugars may change when you stop \u2014 check more often for the first couple of weeks.\u201d"},
          {t:"🤰 Pregnancy", html:"\u201cWe'll use support and, if needed, nicotine replacement \u2014 not the tablets. Any step away from cigarettes protects the baby.\u201d"},
          {t:"🔁 A slip isn't failure", html:"\u201cIf you have a cigarette, don't write off the whole attempt \u2014 get straight back on the plan and tell us.\u201d"}
        ]}
      ]},

    {t:"node", d:"refer", n:"7", tag:"Refer", title:"Signposting",
      blocks:[
        {b:"tiles", v:"refer", items:[
          {t:"Stop-smoking service", html:"Local specialist behavioural support + medication — the highest-yield referral; doubles–triples success."},
          {t:"Community pharmacy", html:"Pharmacy cessation schemes for NRT supply + brief support."},
          {t:"Mental health / maternity", html:"Integrated cessation support for severe mental illness and pregnancy."}
        ]},
        {b:"say", html:"I'm putting you in touch with the stop-smoking service \u2014 they're the experts and the people who use them do far better than those who try alone. We'll pick the treatment that suits you and get going around your quit date; I'll keep an eye on anything else it affects."}
      ]}
  ],
  foot:"Smoking cessation in primary care \u2014 NICE NG209 and CKS. Very Brief Advice + combined behavioural support and pharmacotherapy. Varenicline is back in UK supply (2025); check local availability. Verify doses against the current BNF before prescribing."
});
</script>
