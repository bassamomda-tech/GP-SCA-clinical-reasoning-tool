<script>
MG.render({
  icon:"🫁",
  title:"Asthma (Adults & 12+) — The Complete Guide",
  stemTitle:"Asthma on NG245 made simple &mdash; confirm, start AIR, step through MART, fix, step down",
  stemSub:"One pathway: confirm the diagnosis objectively (in the right test order), start the anti-inflammatory reliever (never SABA alone), escalate low-dose \u2192 moderate-dose MART, use the FeNO/eosinophil gate before add-ons, manage the acute attack, transition legacy SABA patients, and know when to step DOWN. NICE/BTS/SIGN NG245 (2024).",
  guideline:"NICE NG245 (2024)",
  glance:[
    {lbl:"Diagnose", val:"FeNO \u2192 BDR \u2192 PEF", sub:"objective test sequence"},
    {lbl:"Step 1", val:"AIR", sub:"ICS/formoterol PRN only"},
    {lbl:"Steps 2\u20133", val:"MART low \u2192 moderate", sub:"same inhaler BD + PRN"},
    {lbl:"Step 4 gate", val:"FeNO + eosinophils", sub:"raised \u2192 refer"},
    {lbl:"Danger sign", val:">2 relievers/yr", sub:"or \u22653 doses/week"},
    {lbl:"Attack", val:"Pred 40\u201350mg \u00d75d", sub:"review within 48h"}
  ],
  flow:[

    {t:"node", d:"found", n:"1", tag:"Step 1 · confirm", title:"Diagnose objectively — in this order (NG245)",
      blocks:[
        {b:"ladder", steps:[
          {step:"1st", title:"FeNO", when:"symptoms suggest asthma",
           html:"<b>FeNO \u226550 ppb = asthma confirmed.</b> (Smoking lowers FeNO \u2014 a normal result doesn't exclude.) If unavailable or not raised \u2192 next test."},
          {step:"2nd", title:"Spirometry with bronchodilator reversibility", when:"FeNO not diagnostic",
           fromLabel:"FeNO <50 or unavailable",
           html:"<b>FEV1 increase \u226512% AND \u2265200ml</b> (or \u226510% of predicted FEV1) after salbutamol = confirmed. Normal spirometry when well doesn't exclude asthma."},
          {step:"3rd", title:"PEF variability", when:"still uncertain",
           fromLabel:"spirometry not diagnostic",
           html:"Twice-daily peak flow diary for 2 weeks: <b>mean variability \u226520%</b> = confirmed."},
          {step:"4th", title:"Refer for bronchial challenge", when:"all the above negative but suspicion persists",
           fromLabel:"don't label without evidence",
           html:"Direct challenge (histamine/methacholine) in secondary care. <b>Never leave 'asthma' on the record without objective confirmation</b> \u2014 and never remove treatment abruptly to test; plan it."}
        ]},
        {b:"kv", rows:[
          ["Assess at baseline","Symptom pattern + triggers, occupation (<b>ask every adult</b> \u2014 paint sprayers, bakers, cleaners, healthcare), smoking/vaping, atopy/rhinitis, BMI, previous attacks/admissions/oral steroids"],
          ["Control score","RCP 3 questions (daytime symptoms? night waking? activity limitation?) or ACT \u2014 record a number you can compare at review"]
        ]},
        {b:"warn", html:"Do not start long-term treatment on 'trial of therapy' alone in 12+ \u2014 get the objective test first where at all possible (treatment normalises the tests and traps the patient in a label). If already started, arrange testing at the point treatment can safely be reviewed."}
      ]},

    {t:"node", d:"life", n:"2", tag:"Step 2 · foundations", title:"The work that makes inhalers work",
      blocks:[
        {b:"tiles", v:"life", items:[
          {t:"🌬️ Technique", html:"Watch them use the device at EVERY review and step change \u2014 the single commonest cause of 'treatment failure'. DPIs need a sharp inhale; MDIs slow + spacer."},
          {t:"📝 Action plan", html:"Written personalised asthma action plan (PAAP) for everyone \u2014 MART-specific if on MART (their 'blue inhaler' IS the steroid one)."},
          {t:"🚭 Smoking / vaping", html:"Cessation support \u2014 smoking worsens control AND blunts both ICS response and FeNO interpretation."},
          {t:"🌿 Triggers", html:"Treat allergic rhinitis (it drags asthma down), review occupational exposure, NSAID/\u03b2-blocker use (incl. eye drops)."},
          {t:"💉 Vaccines", html:"Annual influenza; pneumococcal if eligible; COVID per current schedule."},
          {t:"⚖️ Weight","html":"Weight loss measurably improves control and reduces the steroid dose needed."}
        ]}
      ]},

    {t:"node", d:"drug", n:"3", tag:"Step 3 · treat", title:"The AIR → MART ladder — named inhalers and exact doses",
      blocks:[
        {b:"p", html:"<strong>Nobody gets SABA alone any more.</strong> Every reliever puff contains ICS, so worsening symptoms automatically deliver more anti-inflammatory. Step up when uncontrolled (after the technique/adherence check); review every step at <b>8\u201312 weeks</b>."},
        {b:"ladder", steps:[
          {step:"Step 1", title:"AIR — low-dose ICS/formoterol AS NEEDED only", when:"new diagnosis / infrequent symptoms",
           html:"<b>Symbicort Turbohaler 200/6</b> or <b>DuoResp Spiromax 160/4.5</b> or <b>Fobumix Easyhaler 160/4.5</b> (budesonide/formoterol, licensed AIR 12+): <b>1 inhalation when symptomatic</b>; repeat after a few minutes if needed (max 6 in one episode, usual max 8/day)."},
          {step:"Step 2", title:"Low-dose MART", when:"reliever \u22653 days/week, night waking, or ANY exacerbation",
           fromLabel:"uncontrolled on AIR",
           html:"Same drug, now regular: <b>Symbicort 100/6 or 200/6 \u2014 1 inhalation BD + PRN</b> (or Fobumix/DuoResp equivalents; Fostair 100/6 MDI+spacer or NEXThaler from 18+). One device does maintenance AND relief."},
          {step:"Step 3", title:"Moderate-dose MART", when:"uncontrolled on low-dose MART at 8\u201312 weeks",
           fromLabel:"technique + adherence confirmed first",
           html:"Double the maintenance: <b>Symbicort 200/6 \u2014 2 inhalations BD + PRN</b> (or Fostair 200/6 1 puff BD 18+). Total daily max usually 8 inhalations (12 briefly during flares)."},
          {step:"Step 4", title:"The biomarker gate — FeNO + blood eosinophils", when:"uncontrolled on moderate MART",
           fromLabel:"phenotype before more drugs",
           html:"<b>Either raised \u2192 REFER</b> (eosinophilic asthma \u2014 potential biologic candidate; don't blind-escalate). <b>Both normal \u2192 8\u201312 week trial of montelukast 10mg nocte (LTRA) OR a LAMA</b> (e.g. tiotropium Respimat) added to moderate MART. Works \u2192 continue; doesn't \u2192 stop it, try the other, then refer."},
          {step:"Step down", title:"Don't forget the way down", when:"controlled \u22653 months",
           fromLabel:"good control, no flares",
           html:"Reduce maintenance one step (moderate \u2192 low MART \u2192 consider AIR-only) at a review, with the action plan updated and an early re-review booked. Most patients end up over-treated because nobody ever steps down."}
        ]},
        {b:"table", head:["Side effect","Cause","Fix"], rows:[
          ["Oral thrush / dysphonia","ICS deposition","Rinse-and-spit after maintenance doses; spacer with MDIs; re-check technique; treat candida (miconazole gel/nystatin)"],
          ["Tremor / palpitations","Formoterol","Usually settles in days\u2013weeks; persistent = review PRN frequency (is she treating uncontrolled asthma with puffs?)"],
          ["Cough on inhaling","Device or propellant","Switch DPI\u2194MDI+spacer; slow the technique"],
          ["Montelukast: vivid dreams, low mood, agitation","LTRA neuropsychiatric effects (MHRA warning)","Counsel at initiation; stop if mood/behaviour changes \u2014 they reverse"],
          ["LAMA: dry mouth, urinary retention","Anticholinergic","Caution in glaucoma / prostatic symptoms"]
        ]},
        {b:"warn", html:"<b>Transitioning legacy patients:</b> anyone still on SABA + separate ICS (old pathway) is NOT wrong to continue if well controlled \u2014 but at their next review discuss switching to MART/AIR, and <b>never renew SABA-only prescriptions</b> (no ICS anywhere = the dangerous pattern; >2 reliever canisters/year or \u22653 doses/week = act, don't reissue)."}
      ]},

    {t:"node", d:"safety", n:"4", tag:"Acute attack", title:"The attack — recognise, dose, follow up",
      blocks:[
        {b:"table", head:["Severity","Features","Action"], rows:[
          ["Moderate","PEF 50\u201375% best, speaking full sentences, RR <25, HR <110","On MART: up to 6 ICS/formoterol inhalations at once (1-min intervals). Or salbutamol 4\u201310 puffs via spacer, repeat q10\u201320min. <b>Prednisolone 40\u201350mg OD \u00d7 \u22655 days.</b> Review response before they leave"],
          ["Severe","PEF 33\u201350%, can't complete sentences, RR \u226525, HR \u2265110","Nebulised/spacer salbutamol + prednisolone; <b>admit unless rapid, sustained response</b>"],
          ["Life-threatening","PEF <33%, SpO2 <92%, silent chest, cyanosis, exhaustion, altered consciousness","<b>999 now.</b> Salbutamol + oxygen while waiting; do not sedate; never leave them alone"]
        ]},
        {b:"kv", rows:[
          ["After every attack","Review within <b>48 hours</b>: technique, adherence, trigger, step-up decision \u2014 every attack is a sentinel event and a failed pathway, not bad luck"],
          ["Frequent oral steroids","\u22652 courses/year = uncontrolled disease \u2192 escalate / biomarker gate / refer \u2014 and think bone/adrenal protection"]
        ]}
      ]},

    {t:"node", d:"monitor", n:"5", tag:"Follow-up", title:"Review rhythm",
      blocks:[
        {b:"table", head:["What","When","Action"], rows:[
          ["Response to any change","8\u201312 weeks","Control score + reliever-use audit \u2192 continue, step up, or step down"],
          ["Structured review","At least annually","RCP3/ACT, technique observed, action plan updated, reliever count from prescribing record, smoking, rhinitis, flu jab"],
          ["Post-attack","Within 48h","As above \u2014 non-negotiable"],
          ["Prescribing-system audit","Ongoing","Flag >2 reliever inhalers/year and SABA-only repeats \u2014 these patients die preventably (NRAD)"]
        ]},
        {b:"say", html:"Your reliever now contains the steroid too \u2014 so when your chest is bad, every extra puff is also treating the inflammation underneath. If you're needing it most days, that's your signal to come back, not to soldier on."}
      ]},

    {t:"loop", icon:"🔁", title:"Not controlled? Run this BEFORE stepping up",
      arrow:"\u2026most 'severe asthma' isn't",
      intro:"Most uncontrolled asthma is technique, adherence, smoking or the wrong diagnosis — not undertreatment.",
      checks:[
        {b:"1 · Technique", html:"Watched them use it? Right device for their inspiratory effort?"},
        {b:"2 · Adherence", html:"Pickup data checked? Steroid fears explored? MART simplifies to one inhaler."},
        {b:"3 · Triggers", html:"Smoking/vaping, occupation, rhinitis untreated, NSAIDs, \u03b2-blockers (incl. timolol drops)?"},
        {b:"4 · Diagnosis", html:"Ever objectively confirmed? Consider ILO/breathing-pattern disorder, COPD overlap, cardiac."},
        {b:"5 · Biomarkers", html:"At the step-4 gate: FeNO + eosinophils done?"}
      ],
      back:"All checked and uncontrolled → step up / refer"},

    {t:"node", d:"refer", n:"6", tag:"Refer", title:"Who goes to respiratory",
      blocks:[
        {b:"tiles", v:"refer", items:[
          {t:"Raised biomarkers", html:"FeNO or eosinophils raised at the step-4 gate → specialist / biologic assessment."},
          {t:"Refractory", html:"Uncontrolled despite moderate MART + LTRA/LAMA trial with confirmed technique + adherence."},
          {t:"Attacks", html:"Any life-threatening attack; \u22652 steroid courses or \u22651 admission in a year."},
          {t:"Occupational", html:"Suspected occupational asthma \u2014 refer (job may be curable; document exposure)."},
          {t:"Diagnostic doubt", html:"Objective tests negative but symptoms persist \u2192 bronchial challenge; atypical features."},
          {t:"Pregnancy", html:"Don't stop ICS/MART \u2014 poor control harms the baby far more than the drugs; severe or deteriorating asthma in pregnancy warrants early specialist involvement."}
        ]},
        {b:"say", html:"Your asthma isn't as settled as it should be despite the right inhalers used well, so I want a chest specialist to check whether you're in the group that responds to the newer targeted treatments."}
      ]}
  ],
  foot:"Adults & children 12+ on the NICE/BTS/SIGN NG245 (2024) pathway. Children 5\u201311 follow a separate ladder \u2014 see the paediatric asthma protocol. Verify doses against the current BNF before prescribing."
});
</script>
