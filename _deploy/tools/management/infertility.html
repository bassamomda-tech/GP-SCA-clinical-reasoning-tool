    {lbl:"Female", val:"Mid-luteal progesterone", sub:"day 21 of 28-day cycle"},
    {lbl:"Male", val:"Semen analysis", sub:"first-line, repeat if abnormal"},
    {lbl:"Both", val:"Folic acid 400 mcg OD (5 mg if high-risk)", sub:"+ lifestyle"},
    {lbl:"Refer", val:"Fertility clinic", sub:"per local criteria"},
    {lbl:"Earlier", val:"Amenorrhoea / PID / cancer Rx", sub:"= refer sooner"}
  ],
  flow:[
    {t:"node", d:"found", n:"1", tag:"Foundation", title:"When to investigate + take the history",
      blocks:[
        {b:"kv", rows:[
          ["Define","Failure to conceive after <b>1 year</b> of regular unprotected intercourse (every 2\u20133 days)"],
          ["Investigate earlier if","Woman \u226536, known cause (e.g. amenorrhoea/oligomenorrhoea, PID, undescended testes, cancer treatment), or predisposing factors"],
          ["Female history","Cycle regularity, previous pregnancy, PID/STI, pelvic surgery, galactorrhoea, hirsutism (PCOS), smear status"],

        {b:"why", html:"Both partners are investigated in parallel from the outset \u2014 a male factor contributes in ~half of cases. Starting the workup early in older women and known-cause cases avoids losing time when ovarian reserve is declining."}
      ]},
    {t:"node", d:"life", n:"2", tag:"Non-drug \u00b7 both partners", title:"Pre-conception optimisation",
      blocks:[
        {b:"tiles", v:"life", items:[

          {t:"⚖️ Weight", html:"Optimise BMI \u2014 both high and low BMI reduce fertility; weight loss restores ovulation in PCOS."},
          {t:"🚭 Smoking/alcohol", html:"Stop smoking (both); limit alcohol; stop recreational drugs/anabolic steroids."},
          {t:"📅 Timing", html:"Intercourse every 2\u20133 days throughout the cycle \u2014 no need to time to ovulation."},
          {t:"🌡️ Male heat", html:"Avoid excessive scrotal heat; review medications affecting fertility."},
          {t:"💉 Rubella/cervical screen", html:"Check rubella immunity; ensure smear up to date."}
        ]}
      ]},
    {t:"node", d:"monitor", n:"3", tag:"Investigations", title:"Parallel female + male workup",
      blocks:[
        {b:"table", head:["Test","For","Notes"], rows:[
          ["Semen analysis","Male","First-line; repeat after 3 months if abnormal (confirm before labelling)"],
          ["Mid-luteal progesterone","Ovulation","Day 21 of a 28-day cycle (7 days before expected period); confirms ovulation"],
          ["Chlamydia screen","Both","Before any uterine instrumentation"],
          ["Hormones if irregular cycles","Female","FSH/LH, oestradiol, prolactin, TFTs; testosterone/SHBG if PCOS features"],
          ["Rubella immunity, BMI, BP","Female","Pre-conception screen"],
          ["Tubal/ovarian reserve, USS","Specialist","HSG/HyCoSy, AMH, antral follicle count \u2014 usually arranged in secondary care"]

    {t:"node", d:"safety", n:"5", tag:"Don't miss", title:"Earlier / urgent considerations",
      blocks:[
        {b:"tiles", v:"safety", items:[
          {t:"🟠 Premature ovarian insufficiency", html:"Amenorrhoea + high FSH in a young woman \u2192 refer; counsel re fertility window."},
          {t:"🟠 Fertility preservation", html:"Before gonadotoxic cancer treatment \u2192 urgent referral for gamete storage."},
          {t:"🟠 Azoospermia / very low count", html:"Confirm + refer; consider genetic/endocrine causes."},
          {t:"⏳ Age", html:"Female age is the strongest determinant \u2014 do not delay referral in older women."}
        ]}
      ]},
    {t:"node", d:"follow", n:"6", tag:"Support", title:"Information + wellbeing",

        {b:"say", html:"About 8 in 10 couples conceive within a year. We\u2019ll start tests for both of you together \u2014 a sperm sample and a blood test to confirm ovulation \u2014 and optimise things like folic acid, weight and smoking. If we don\u2019t have a pregnancy after a year, or sooner given your circumstances, we\u2019ll refer to the fertility clinic. It can be a stressful journey, so support is available too."}
