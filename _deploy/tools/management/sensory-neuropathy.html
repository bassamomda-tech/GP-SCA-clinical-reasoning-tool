MG.render({"icon":"🦶","title":"Sensory Neuropathy","guideline":"NICE CKS / NG173","stemTitle":"Peripheral sensory neuropathy — find the cause, protect, treat the pain","stemSub":"Primary-care management of peripheral sensory neuropathy — identify and treat the underlying cause (commonly diabetes, B12 deficiency, alcohol), protect insensate feet, and treat neuropathic pain per NG173, while recognising the patterns that need urgent neurology. NICE CKS · NG173 · 2026.","glance":[{"lbl":"Commonest","val":"Diabetes, B12, alcohol","sub":"+ drugs, CKD, thyroid"},{"lbl":"Screen","val":"HbA1c, B12/folate, U&E, TFT, FBC","sub":"± ESR/Ig"},{"lbl":"Protect","val":"Foot care","sub":"insensate → ulcer risk"},{"lbl":"Pain","val":"NG173 agents","sub":"amitriptyline/duloxetine/gabapentinoid"},{"lbl":"Cause","val":"Treat it","sub":"glycaemia, replace B12"},{"lbl":"Red flag","val":"Rapid/asymmetric/motor","sub":"= urgent neurology"}],"flow":[{"t":"node","d":"safety","n":"1","tag":"Safety-net","title":"Patterns needing urgent referral","blocks":[{"b":"tiles","v":"safety","items":[{"t":"🔴 Rapidly progressive / ascending","html":"Especially with weakness → exclude Guillain-Barré → same-day."},{"t":"🟠 Asymmetric / mononeuritis multiplex","html":"Multiple named-nerve deficits → urgent neurology (vasculitis, etc.)."},{"t":"🟠 Motor involvement / cord signs","html":"Weakness, brisk reflexes, sensory level, bladder/bowel → exclude cord/cauda equina."},{"t":"🦶 Neuropathic foot","html":"Ulceration, deformity, infection in an insensate foot → urgent diabetic foot pathway."}]},{"b":"why","html":"Most sensory neuropathy is chronic and length-dependent (glove-and-stocking) from a metabolic/toxic cause. The reasoning is to find and treat that cause, protect insensate feet, and escalate the atypical patterns (rapid, asymmetric, motor) that signal a dangerous neuropathy."}]},{"t":"node","d":"found","n":"2","tag":"Foundation","title":"Identify the cause","blocks":[{"b":"kv","rows":[["Pattern","Length-dependent glove-and-stocking numbness/tingling/burning; reduced pinprick/vibration/proprioception; reduced ankle reflexes"],["Common causes","Diabetes (commonest), B12/folate deficiency, alcohol, CKD, hypothyroidism, drugs (chemotherapy, isoniazid, amiodarone), paraproteinaemia"],["Screen","HbA1c/glucose, B12 + folate, U&E, LFTs, TFTs, FBC; consider ESR, serum electrophoresis/immunoglobulins, HIV, autoimmune screen if atypical"],["Examine","Sensory modalities, reflexes, gait, foot inspection (ulcer risk), proprioception (Romberg)"]]}]},{"t":"node","d":"life","n":"3","tag":"Non-drug · core","title":"Foot care & cause control","blocks":[{"b":"tiles","v":"life","items":[{"t":"🦶 Foot protection","html":"Daily foot inspection, well-fitting footwear, podiatry — numb feet are at high ulcer/injury risk."},{"t":"🍷 Address the cause","html":"Optimise glycaemic control, stop alcohol, correct B12/folate; review neurotoxic drugs."},{"t":"🏃 General health","html":"Exercise, weight and CV risk; physiotherapy/OT for balance and falls."}]},{"b":"why","html":"Treating the underlying cause and protecting insensate feet prevent the most serious complications."}]},{"t":"node","d":"drug","n":"4","tag":"Treatment","title":"Cause + pain + protection","blocks":[{"b":"ladder","steps":[{"step":"Step 1","title":"Treat the underlying cause","when":"always","html":"Optimise glycaemia (diabetic neuropathy), replace B12/folate, address alcohol, correct thyroid/renal factors, stop/switch causative drugs."},{"step":"Step 2","title":"Neuropathic pain (NG173)","when":"if painful","fromLabel":"symptomatic","html":"Offer one of <b>amitriptyline 10–75 mg nocte</b>, <b>duloxetine 60 mg OD</b>, <b>gabapentin 300–1200 mg TDS</b> or <b>pregabalin 75–300 mg BD</b> (duloxetine first choice in diabetic neuropathy); switch if ineffective. Topical capsaicin for localised pain."},{"step":"Step 3","title":"Foot protection","when":"insensate feet","fromLabel":"prevent ulceration","html":"Diabetic foot surveillance, footwear advice, podiatry; educate on protecting numb feet; falls-risk assessment (proprioceptive loss)."}]},{"b":"warn","html":"Gabapentin/pregabalin are controlled drugs — assess misuse risk and avoid co-prescribing with opioids. Review pain treatment at 4–6 weeks; stop if ineffective."}]},{"t":"node","d":"monitor","n":"5","tag":"Monitoring","title":"Review","blocks":[{"b":"table","head":["What","When","Action"],"rows":[["Symptoms + progression","Each review","Stable length-dependent → reassure; progressing/changing → reconsider/refer"],["Underlying cause","Ongoing","HbA1c, B12 if replacing, alcohol; re-screen if cause unclear"],["Foot review","≥annually (diabetic)","Ulcer risk stratification + podiatry"],["Pain agent","4–6 weeks","Titrate/switch per NG173; deprescribe if no benefit"]]}]},{"t":"node","d":"refer","n":"6","tag":"Refer","title":"Referral","blocks":[{"b":"tiles","v":"refer","items":[{"t":"Urgent neurology","html":"Rapidly progressive, asymmetric, motor involvement, or diagnostic uncertainty (consider GBS/vasculitis/inflammatory)."},{"t":"Diabetic foot / podiatry","html":"Insensate foot, ulceration, deformity."},{"t":"Pain clinic","html":"Refractory neuropathic pain despite optimised NG173 therapy."},{"t":"Haematology","html":"Paraproteinaemia found on screening."}]},{"b":"say","html":"This is a sensory neuropathy — the nerves to your feet (and sometimes hands) aren’t working quite right, often from diabetes, low B12 or alcohol. We’ll find and treat the cause, look after your feet carefully because reduced feeling raises the risk of unnoticed injury, and use nerve-pain tablets if it’s painful."}]}],"foot":"Management of peripheral sensory neuropathy in primary care; treat the cause, protect insensate feet, and treat neuropathic pain per NG173. Atypical patterns need neurology. Verify against current NICE CKS and NG173."});
