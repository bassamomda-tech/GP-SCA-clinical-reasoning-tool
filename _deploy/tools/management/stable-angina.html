<body data-screen-label="Stable angina management card">

<script>
MG.render({
  icon:"🫀",
  title:"Stable Angina — The Complete Guide",
  stemTitle:"Angina made simple &mdash; two tracks forever: feel better, don't infarct",
  stemSub:"One pathway: confirm it's stable (and know the CTCA route in), run the two tracks that must never be confused \u2014 anti-anginals for symptoms, the prevention bundle for survival \u2014 teach the GTN rules including the sildenafil one that kills, titrate the ladder with exact doses and the combination traps, know what revascularisation does and doesn't fix, and the DVLA rules everyone forgets. NICE CG126 \u00b7 CG95 \u00b7 NG185.",
  guideline:"NICE CG126 \u00b7 CG95",
  glance:[
    {lbl:"Diagnosis route", val:"CTCA first-line", sub:"typical pain \u2192 CG95"},
    {lbl:"Rescue", val:"GTN 5-5-999 rule", sub:"+ sit down first"},
    {lbl:"Never", val:"GTN/nicorandil + PDE5i", sub:"sildenafil \u226524h gap"},
    {lbl:"1st-line", val:"BB or CCB \u2192 max", sub:"then combine BB + amlodipine"},
    {lbl:"Prognosis drugs", val:"Aspirin + atorva 80", sub:"the bundle that prevents MI"},
    {lbl:"Refer if", val:"Symptomatic on 2", sub:"revascularisation = symptoms"}
  ],
  flow:[

    {t:"node", d:"found", n:"1", tag:"Step 1 · confirm", title:"Confirm it's angina — and that it's stable",
      blocks:[
        {b:"kv", rows:[
          ["The 3-point definition","(1) Constricting chest/arm/jaw discomfort (2) brought on by exertion (3) relieved <5 min by rest/GTN. 3/3 = typical \u00b7 2/3 = atypical \u00b7 \u22641 = non-anginal. Women, diabetics and the elderly present atypically \u2014 breathlessness may BE the angina"],
          ["Route in (CG95)","New suspected angina \u2192 <b>CT coronary angiography first-line</b> via RACPC; functional imaging second-line; invasive angiography third. Don't 'trial GTN' as a diagnostic test \u2014 oesophageal spasm responds too"],
          ["Confirm STABLE","Predictable, exertional, relieved by rest. <b>Rest pain, crescendo frequency, new pain <2 weeks, or pain no longer responding to GTN = ACS pathway, not this card</b>"],
          ["Quantify","CCS class (I strenuous \u00b7 II moderate limitation \u00b7 III marked \u2014 one flight \u00b7 IV any activity/rest); triggers (cold, meals, emotion); what it stops them doing"],
          ["Baseline","ECG (old MI? AF? LVH), FBC (anaemia = angina amplifier), TFTs, HbA1c, lipids, U&E, BP, weight; echo if murmur, HF signs, or previous MI"]
        ]},
        {b:"why", html:"Two tracks run forever and must never be confused: <strong>anti-anginals make them feel better but do not prevent MI; aspirin + statin prevent the MI but do nothing for the pain</strong>. Every review checks both tracks \u2014 the classic failure is a comfortable patient whose statin quietly stopped a year ago."}
      ]},

    {t:"node", d:"safety", n:"2", tag:"Step 2 · GTN", title:"GTN — the rules that save lives (and the one that kills)",
      blocks:[
        {b:"kv", rows:[
          ["How to use it","<b>SIT DOWN</b> (it drops BP \u2014 syncope on a ladder is how GTN injures people), spray 1\u20132 \u00d7 400mcg under the tongue, close mouth. Use BEFORE predictable triggers too (pre-exertion prophylaxis \u2014 hills, cold mornings, sex)"],
          ["<b>The 5-5-999 rule</b>","Pain \u2192 stop + rest + GTN. Still there at <b>5 min</b> \u2192 second dose. Still there <b>5 min after that (or 15 min total) \u2192 999</b> \u2014 say it, write it, check recall at every review"],
          ["Expect","Headache + flushing = the drug working (paracetamol, passes); light-headedness = sit longer"],
          ["Tablets vs spray","Tablets (300\u2013500mcg) degrade 8 weeks after opening \u2014 spray for most; tablets can be spat out if side effects"],
          ["<b>The interaction that kills</b>","<b>NO sildenafil/tadalafil (any PDE5 inhibitor) within 24h of GTN or ANY nitrate \u2014 or with nicorandil</b> (48h for tadalafil). Profound refractory hypotension. Angina patients ARE the ED demographic \u2014 ask proactively, because a man who took sildenafil last night and gets chest pain today must NOT use his GTN: 999 instead, and tell the crew"]
        ]}
      ]},

    {t:"node", d:"drug", n:"3", tag:"Step 3 · symptoms", title:"The anti-anginal ladder — exact doses, real traps",
      blocks:[
        {b:"ladder", steps:[
          {step:"Step 1", title:"Beta-blocker OR calcium blocker — titrate to MAX", when:"choose by the patient",
           html:"<b>Bisoprolol 2.5 \u2192 10mg OD</b> (default \u2014 especially post-MI, HF, high resting HR; target resting HR ~55\u201360). OR <b>CCB</b>: rate-limiting <b>diltiazem MR 90 BD \u2192 360/day</b> or verapamil (asthma, BB-intolerant) \u00b7 <b>amlodipine 5 \u2192 10mg</b> (also covers BP). Review 2\u20134 weeks; 'failed' at half-dose = not failed \u2014 titrate before judging. Not tolerated \u2192 switch to the other class."},
          {step:"Step 2", title:"Combine: BB + amlodipine", when:"still symptomatic on one at max",
           fromLabel:"the ONLY safe routine combination",
           html:"\u03b2-blocker + <b>dihydropyridine</b> CCB (amlodipine/felodipine). <b>NEVER BB + verapamil (absolute) or BB + diltiazem (avoid \u2014 specialist only): bradycardia/asystole risk.</b> Check ankles (amlodipine oedema \u2014 see hypertension guide: switch to lercanidipine rather than abandon)."},
          {step:"Step 3", title:"Third agent — chosen by phenotype", when:"symptomatic on two, or awaiting revascularisation",
           fromLabel:"don't add if controlled on two",
           html:"<b>Isosorbide mononitrate MR 25\u201360mg ONCE daily in the MORNING</b> \u2014 the once-daily MR dosing IS the nitrate-free interval; BD dosing without an asymmetric gap breeds tolerance and a useless drug. <b>Ivabradine 2.5\u20135 \u2192 7.5mg BD</b> \u2014 sinus rhythm \u226570 only, never with verapamil/diltiazem (MHRA). <b>Ranolazine 375 \u2192 750mg BD</b> \u2014 no HR/BP effect: the low-BP/bradycardic patient's friend; QT + interactions caution. <b>Nicorandil 10 \u2192 20mg BD</b> \u2014 MHRA: GI/skin/eye ULCERS (mouth ulcers \u2192 stop, they don't heal on treatment); same PDE5i ban as nitrates."},
          {step:"Refer", title:"Revascularisation assessment", when:"limiting symptoms despite 2 optimised agents",
           fromLabel:"the honest framing",
           html:"PCI/CABG for <b>symptom control</b> \u2014 in STABLE angina PCI does not reduce MI/death (ISCHEMIA, ORBITA \u2014 optimal medical therapy is that good); CABG has prognostic benefit in left-main/complex 3-vessel + diabetic disease, which is the anatomy assessment's job to find. Tell patients this honestly \u2014 many decline a stent once they know the tablets are doing the survival work."}
        ]},
        {b:"warn", html:"<b>Never stop a \u03b2-blocker abruptly</b> \u2014 rebound tachycardia precipitates ACS; taper over 1\u20132 weeks. And in the multimorbid: this card + HF (\u2192 bisoprolol does both, avoid diltiazem/verapamil entirely) + hypertension (amlodipine does both) \u2014 one drug, two jobs beats polypharmacy."}
      ]},

    {t:"node", d:"drug", n:"4", tag:"Step 4 · survival", title:"The prevention bundle — the part that stops the infarct",
      blocks:[
        {b:"table", head:["Drug","Dose","Notes"], rows:[
          ["<b>Aspirin</b>","75mg OD lifelong","Clopidogrel 75mg if intolerant/allergic; PPI cover if GI risk (see DOAC guide for the combination rules)"],
          ["<b>Atorvastatin</b>","<b>80mg</b> (secondary prevention dose)","Target LDL \u22642.0 / non-HDL \u22642.6 (NG238); not met \u2192 add ezetimibe 10mg; still not \u2192 injectable pathway (inclisiran/PCSK9i criteria)"],
          ["<b>ACE inhibitor</b>","Ramipril titrated \u2192 10mg","If diabetes, hypertension, CKD, or any LV dysfunction \u2014 most angina patients qualify for one reason or another"],
          ["BP + diabetes to target","Per their own guides","Each mmHg and mmol counts double in established CAD"],
          ["Vaccines","Flu annually + pneumococcal","MI risk spikes after influenza \u2014 the forgotten prevention drug"]
        ]},
        {b:"tiles", v:"life", items:[
          {t:"🚭 Smoking", html:"THE biggest single modifiable risk — cessation support at every contact; risk halves within a year."},
          {t:"🏃 Exercise", html:"Regular activity WITHIN symptoms is protective and improves anginal threshold — 'exercise to the edge of the pain, not through it'. Cardiac rehab if post-MI/revascularisation."},
          {t:"🥗 Diet + weight", html:"Mediterranean pattern has post-MI trial evidence (Lyon); weight loss lowers demand."},
          {t:"🧠 Mood", html:"Depression doubles post-event mortality and kills adherence — screen and treat (sertraline is the cardiac-safe choice)."},
          {t:"❄️ Triggers", html:"Cold mornings, heavy meals, unaccustomed exertion — plan around them (GTN before, scarf over mouth in winter)."},
          {t:"🚗 DVLA", html:"Group 1: no notification needed; <b>must stop driving if symptoms at rest, with emotion, or at the wheel</b> — resume when controlled. Group 2 (lorry/bus): notify + disqualified until symptom-free and functional test passed."}
        ]}
      ]},

    {t:"node", d:"monitor", n:"5", tag:"Step 5 · review", title:"The review — both tracks, every time",
      blocks:[
        {b:"table", head:["What","When","Action"], rows:[
          ["Symptom track: frequency, CCS, GTN use/week","Each review + 2\u20134 wks after any change","GTN use creeping up = escalate the ladder \u2014 rising rescue use is the earliest warning, exactly like asthma"],
          ["Pattern check","Every contact","Less predictable? Lower threshold? Rest symptoms? \u2192 unstable \u2192 same-day/999, not a routine titration"],
          ["HR + BP","Each titration","BB target resting HR ~55\u201360; hypotension limiting titration \u2192 ranolazine niche"],
          ["Prevention track: lipids","3 months after statin change, then annually","non-HDL \u2193\u226540% or LDL \u22642.0; not met \u2192 ezetimibe \u2192 injectables"],
          ["Adherence BOTH tracks","Every review","The comfortable patient off their statin is the one who infarcts"],
          ["Annual bundle","Once a year","Lipids, HbA1c, BP, smoking, weight, mood, GTN technique + 5-5-999 recall, DVLA if Group 2"]
        ]},
        {b:"say", html:"You have two kinds of medicine and they do completely different jobs. The spray and the daily heart-rate tablets are for comfort \u2014 they stop the pain. The aspirin and the statin are the life-savers \u2014 they stop the heart attack \u2014 and they keep working only if you keep taking them, especially on the days you feel completely well. And one rule to remember cold: pain that doesn't settle after two sprays and fifteen minutes is a 999 call, not a wait-and-see."}
      ]},

    {t:"loop", icon:"🔁", title:"Angina worsening? Check before assuming disease progression",
      arrow:"\u2026find the amplifier first",
      checks:[
        {b:"1 · Unstable?", html:"Rest pain, crescendo, new <2 weeks, GTN-unresponsive → ACS pathway NOW — this loop is for stable patterns only."},
        {b:"2 · An amplifier?", html:"Anaemia (FBC — the classic), thyrotoxicosis, new AF/tachyarrhythmia, uncontrolled BP, aortic stenosis (murmur ever auscultated?), infection."},
        {b:"3 · Adherence + technique", html:"Tablets taken? GTN in date and used correctly? β-blocker stopped by someone?"},
        {b:"4 · Doses maxed?", html:"Bisoprolol 10? Amlodipine 10? Nitrate with proper once-daily MR dosing? 'On three drugs' at starting doses = on one drug."},
        {b:"5 · New demand?", html:"Weight gain, NSAID fluid retention, new job/exertion, cold season."},
        {b:"6 · Genuinely progressing", html:"Optimised + amplifiers excluded + still limiting → cardiology for anatomy reassessment."}
      ],
      back:"Amplifiers excluded + optimised → revascularisation referral"},

    {t:"node", d:"safety", n:"6", tag:"Safety-net", title:"What the patient must know",
      blocks:[
        {b:"tiles", v:"safety", items:[
          {t:"🔴 The 5-5-999 rule", html:"\u201cStop, sit, spray. Five minutes, spray again. Five more minutes and it's still there — 999. Never drive yourself in.\u201d"},
          {t:"🔴 Changing pattern", html:"\u201cPain coming at rest, at night, more often, or with less effort — ring us the same day; that's the warning we act on fast.\u201d"},
          {t:"💊 Viagra-type tablets", html:"\u201cNever within 24 hours of the spray or nitrate tablets — the combination can drop your blood pressure catastrophically. If you've taken one and get chest pain: no spray, call 999 and tell them.\u201d"},
          {t:"💊 Never stop suddenly", html:"\u201cThe heart-rate tablet must never be stopped dead — it can trigger the very attack it prevents. Running low is a same-day prescription request.\u201d"}
        ]}
      ]},

    {t:"node", d:"refer", n:"7", tag:"Refer", title:"Cardiology — who and why",
      blocks:[
        {b:"tiles", v:"refer", items:[
          {t:"999", html:"Suspected ACS: rest/crescendo pain, GTN-unresponsive, autonomic features."},
          {t:"Same-day / urgent", html:"Rapidly changing pattern without frank ACS; new murmur + angina (aortic stenosis — echo before anything that drops afterload); syncope with angina."},
          {t:"Revascularisation", html:"Lifestyle-limiting angina despite 2 optimised anti-anginals → PCI/CABG assessment (symptoms; CABG-prognosis anatomy is theirs to find)."},
          {t:"Diagnostic doubt", html:"Atypical features, normal CTCA with ongoing symptoms (microvascular angina — specialist territory), suspected vasospastic angina (rest pain, cyclical, responds to CCB not BB)."},
          {t:"Angina + comorbidity", html:"With HF, significant arrhythmia, or pre-op for major surgery — combined assessment."}
        ]},
        {b:"say", html:"The tablets are at full strength and your angina is still limiting what you can do \u2014 that's exactly when a camera test and possibly a stent or bypass earns its place. One honest thing to know: in stable angina those procedures are for SYMPTOMS \u2014 your tablets are already doing the work of preventing a heart attack, and they carry on regardless."}
      ]}
  ],
  foot:"Confirmed stable angina in adults \u2014 NICE CG126 with CG95 (diagnosis), NG185/NG238 (secondary prevention) interfaces. Verify doses against the current BNF before prescribing."
});
</script>
