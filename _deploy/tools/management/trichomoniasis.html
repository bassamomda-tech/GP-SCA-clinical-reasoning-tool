MG.render({"icon":"🦠","title":"Trichomoniasis","guideline":"BASHH","stemTitle":"Trichomoniasis — metronidazole + sexual-health pathway","stemSub":"Primary-care management of Trichomonas vaginalis — a sexually transmitted protozoal infection — confirm, treat with metronidazole, refer to sexual health for partner notification and full STI screen, and note the pregnancy associations. BASHH · CKS · 2026.","glance":[{"lbl":"Organism","val":"Trichomonas vaginalis","sub":"protozoan STI"},{"lbl":"Classic","val":"Frothy yellow-green discharge","sub":"‘strawberry cervix’"},{"lbl":"1st-line","val":"Metronidazole 400 mg BD 5–7d","sub":"400 mg BD 5–7d or 2 g stat"},{"lbl":"Refer","val":"GUM / sexual health","sub":"+ full STI screen"},{"lbl":"Always","val":"Treat partner(s)","sub":"abstain until both treated"},{"lbl":"Pregnancy","val":"Associated risks","sub":"treat; specialist advice"}],"flow":[{"t":"node","d":"found","n":"1","tag":"Foundation","title":"Diagnose","blocks":[{"b":"kv","rows":[["Presentation (women)","Frothy yellow-green offensive discharge, vulval itch/soreness, dysuria; ‘strawberry cervix’; up to half asymptomatic"],["Presentation (men)","Usually asymptomatic; may cause urethritis/discharge"],["Confirm","High vaginal swab (posterior fornix) microscopy/culture or NAAT; men: urethral/urine NAAT"],["Full screen","It’s an STI — test HIV, chlamydia, gonorrhoea, syphilis"]]},{"b":"why","html":"Trichomoniasis is a treatable STI that is easily confused with bacterial vaginosis/candida; confirming it matters because it requires systemic metronidazole and partner treatment, and it is associated with adverse pregnancy outcomes and increased HIV transmission."}]},{"t":"node","d":"safety","n":"2","tag":"Safety-net","title":"Considerations","blocks":[{"b":"tiles","v":"safety","items":[{"t":"🤰 Pregnancy","html":"Associated with preterm birth/low birth weight; treat symptomatic infection — <b>metronidazole 400 mg BD for 5–7 days</b> (or 2 g single dose, not in pregnancy); seek specialist advice (avoid high single doses; high-dose regimens not recommended in pregnancy)."},{"t":"🩸 Co-infection / HIV","html":"Increases HIV acquisition/transmission risk; ensure full STI screen + HIV test."},{"t":"🍷 Metronidazole","html":"Avoid alcohol during and for 48h after (disulfiram-like reaction)."}]}]},{"t":"node","d":"life","n":"3","tag":"Non-drug · prevention","title":"Safer sex & prevention","blocks":[{"b":"tiles","v":"life","items":[{"t":"🚫 Abstain during treatment","html":"Avoid sex until patient and partner(s) have completed treatment and are symptom-free."},{"t":"🧴 Condoms","html":"Promote condom use to prevent reinfection and other STIs."},{"t":"🔎 Full screen","html":"Offer testing for other STIs incl. HIV; reinforce partner treatment regardless of their symptoms."}]},{"b":"why","html":"Treatment cures it but partners and reinfection drive recurrence — abstinence during treatment, partner treatment and condoms are the key non-drug measures."}]},{"t":"node","d":"drug","n":"4","tag":"Medication","title":"Treatment","blocks":[{"b":"ladder","steps":[{"step":"1st-line","title":"Metronidazole","when":"oral","html":"Metronidazole 400–500 mg BD for 5–7 days, OR 2 g single dose (not in pregnancy/breastfeeding). Topical agents are less effective — oral preferred."},{"step":"Always","title":"Treat partner(s) + abstain","when":"all cases","fromLabel":"prevent reinfection","html":"Current partners treated simultaneously (often epidemiologically) via sexual health; abstain until both treated and symptom-free."}]},{"b":"warn","html":"Single-dose metronidazole has slightly higher failure rates than the 7-day course in some settings; avoid the 2 g single dose in pregnancy/breastfeeding."}]},{"t":"node","d":"follow","n":"5","tag":"Follow-up","title":"Partner care & retest","blocks":[{"b":"timeline","items":[{"n":"1","when":"Always","title":"Treat partners","html":"Treat <b>current partners simultaneously</b> (metronidazole) regardless of their test result; advise abstinence until both completed treatment and symptom-free. Offer a full STI screen + HIV."},{"n":"2","when":"Counsel","title":"Avoid alcohol","html":"Warn against alcohol during and 48 h after metronidazole (disulfiram-like reaction). The 2 g single dose is avoided in pregnancy/breastfeeding."},{"n":"3","when":"Persistent","title":"Refer to GUM","html":"Treatment failure or recurrent infection → sexual-health clinic (consider adherence, reinfection, resistance)."}]},{"b":"say","html":"Your partner needs treating at the same time even if they have no symptoms, and avoid alcohol while on the tablets. We'll also check for other infections."}]},{"t":"node","d":"refer","n":"6","tag":"Refer","title":"Referral","blocks":[{"b":"tiles","v":"refer","items":[{"t":"GUM / sexual health","html":"Confirmation, full STI screen, partner notification, treatment failure."},{"t":"Obstetrics","html":"Trichomoniasis in pregnancy."},{"t":"Recurrent","html":"Persistent/recurrent → reconsider adherence, reinfection, resistance → specialist."}]},{"b":"say","html":"This is trichomonas, a sexually transmitted infection treated with a course of antibiotics (metronidazole) — avoid alcohol while taking it. Your partner needs treating at the same time, and you should both avoid sex until you’ve finished and symptoms have gone. We’ll arrange a full sexual-health check too."}]}],"foot":"Management of trichomoniasis in primary care, usually with sexual-health involvement for partner notification and screening. Verify against current BASHH guidance and NICE CKS."});
