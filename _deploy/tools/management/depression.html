<body data-screen-label="Depression management card">

<script>
MG.render({
  icon:"🧠",
  title:"Depression — The Complete Guide",
  stemTitle:"Depression made simple &mdash; risk first, match the drug to the person, switch properly, stop slowly",
  stemSub:"One pathway: risk and bipolar screen before anything, the non-drug menu for less severe illness, choose the antidepressant BY the patient in front of you (comorbidity, age, sleep, weight, sex), run the 2\u20134\u20136 week response clock, fix each side effect instead of abandoning ship, switch with the right taper, continue 6 months\u20132 years \u2014 and come off hyperbolically, not in a fortnight. NICE NG222 \u00b7 CKS \u00b7 MPS.",
  guideline:"NICE NG222",
  glance:[
    {lbl:"Before any drug", val:"Risk + bipolar", sub:"mania Hx changes everything"},
    {lbl:"Less severe", val:"Menu, not pill", sub:"CBT / BA / exercise first"},
    {lbl:"First-line", val:"Sertraline 50mg", sub:"review 2wks (1wk if <25)"},
    {lbl:"Judge at", val:"4 weeks", sub:"some response? push on to 6\u20138"},
    {lbl:"Continue", val:"6m \u00b7 2y if recurrent", sub:"after remission"},
    {lbl:"Stop", val:"Slow + proportionate", sub:"weeks\u2013months, smaller steps at the end"}
  ],
  flow:[

    {t:"node", d:"safety", n:"1", tag:"Step 1 · before anything", title:"Risk, bipolar, and the mimics — the three questions that change the plan",
      blocks:[
        {b:"kv", rows:[
          ["Risk — ask directly","Thoughts of death \u2192 plans \u2192 intent \u2192 means \u2192 protective factors. Asking does not plant the idea. High risk \u2192 crisis plan TODAY (crisis team / same-day assessment), restrict means (stockpiles, weekly scripts), involve family where consented"],
          ["Bipolar screen — every time","\u201cEver had 4+ days of feeling unusually high, wired, needing little sleep, spending out of character?\u201d Past mania/hypomania \u2192 an SSRI alone can precipitate mania \u2014 refer instead"],
          ["The mimics","TFTs, FBC/ferritin, HbA1c, B12/D if indicated; alcohol (AUDIT-C \u2014 depression rarely lifts while drinking heavily); drugs that lower mood (isotretinoin, steroids, propranolol, varenicline); OSA; perimenopause (consider HRT pathway); grief (support, not necessarily sertraline)"],
          ["Severity","PHQ-9 + functional impact \u2192 <b>less severe (<16)</b> vs <b>more severe (\u226516)</b> \u2014 NG222's treatment fork"],
          ["Safeguarding","Dependants at home? Perinatal? Driving safety if agitated/sedated?"]
        ]},
        {b:"warn", html:"<b>Psychotic features (delusions of guilt/poverty/nihilism, hallucinations), stupor, or rapidly escalating risk = urgent psychiatry today</b> \u2014 psychotic depression does not respond to an SSRI alone and carries the highest suicide risk of all."}
      ]},

    {t:"node", d:"life", n:"2", tag:"Step 2 · less severe", title:"The menu — NG222's order, medication deliberately last",
      blocks:[
        {b:"p", html:"For <strong>less severe</strong> depression NG222 lists options in order of least-intrusive first \u2014 and an antidepressant is <em>bottom</em> of that list, offered only if the patient prefers it or others fail. Shared choice from:"},
        {b:"tiles", v:"life", items:[
          {t:"📚 Guided self-help", html:"CBT-based workbook/digital with practitioner support — first on the list; NHS Talking Therapies self-referral (give the actual link/number, self-referral rates double when you do)."},
          {t:"🏃 Exercise", html:"Structured group exercise ~3\u00d7/week — effect sizes rival medication for mild illness."},
          {t:"💬 Therapies", html:"Group/individual CBT, behavioural activation, IPT, counselling, mindfulness (esp. relapse prevention)."},
          {t:"🔗 Social prescribing", html:"Debt, housing, loneliness, work — when the life problem is the driver, treat the life problem."},
          {t:"😴 Sleep + alcohol", html:"Fix the sleep (CBT-I principles) and the drinking before judging mood response."},
          {t:"👀 Active monitoring", html:"Genuine option for subthreshold symptoms — structured review in 2\u20134 weeks, not 'come back if worse'."}
        ]}
      ]},

    {t:"node", d:"drug", n:"3", tag:"Step 3 · choose", title:"Match the antidepressant to the person — the table that does the work",
      blocks:[
        {b:"p", html:"For <strong>more severe</strong> depression: antidepressant + psychological therapy together beats either alone. All first-line agents are roughly equal on average \u2014 the choice is made by the <em>patient's</em> comorbidities, symptoms and priorities:"},
        {b:"table", head:["The patient","Best pick","Why / dose"], rows:[
          ["Default adult","<b>Sertraline 50 \u2192 200mg</b>","Best-tolerated, cardiac-safe, cheap; take with food"],
          ["Poor sleep + poor appetite \u00b1 weight loss","<b>Mirtazapine 15 \u2192 45mg nocte</b>","Sedation + appetite gain become the treatment; also spares sexual function. (Paradox: MORE sedating at 15 than 30\u201345)"],
          ["Comorbid anxiety dominant","Sertraline or escitalopram 10 \u2192 20mg","Start half-dose for 1 week (early agitation is the quit-driver in anxious patients)"],
          ["Post-MI / cardiac disease","<b>Sertraline</b> (evidence-based post-MI)","Avoid citalopram/escitalopram if QT risk; avoid TCAs"],
          ["On NSAID / aspirin / DOAC / warfarin","Any SSRI <b>+ PPI cover</b> \u2014 or mirtazapine","SSRIs impair platelet serotonin \u2192 GI bleed risk multiplies with these"],
          ["Elderly","Sertraline; check <b>Na\u207a at 2\u20134 weeks</b>","Hyponatraemia risk (worse with diuretics); falls counselling"],
          ["<25 years","Fluoxetine has the best young-adult evidence","<b>Review at 1 week</b> mandatory \u2014 early activation/suicidality window"],
          ["Sexual dysfunction already an issue","Mirtazapine (or vortioxetine later)","SSRIs/SNRIs cause dysfunction in ~50%+ \u2014 ask, they won't volunteer it"],
          ["Neuropathic pain co-existing","Duloxetine 60mg","One drug, two jobs"],
          ["Pregnancy / breastfeeding","<b>Sertraline</b> (best data both) \u2014 don't stop an effective drug abruptly for pregnancy","Joint decision, perinatal team if moderate+; paroxetine avoided T1"],
          ["Stopped before due to withdrawal","Fluoxetine (long half-life, self-tapering)","Or plan the slow taper from day one"]
        ]},
        {b:"warn", html:"Counsel at initiation \u2014 the 4 sentences that prevent abandonment: (1) \u201cIt takes 2\u20134 weeks to start working \u2014 don't judge it at day 5.\u201d (2) \u201cThe first week can bring nausea or feeling wired \u2014 that fades.\u201d (3) \u201cIt's not addictive, but we stop it slowly, together.\u201d (4) \u201cIf your mood dips further or you have thoughts of harming yourself \u2014 contact us straight away, don't wait for the review.\u201d"}
      ]},

    {t:"node", d:"drug", n:"4", tag:"Step 4 · not better?", title:"The response clock — optimise, switch, then combine",
      blocks:[
        {b:"ladder", steps:[
          {step:"4a", title:"Judge at 4 weeks (6\u20138 if partial)", when:"the clock",
           html:"<b>Some response at 4 weeks \u2192 hold course + optimise dose; judge fully at 6\u20138.</b> Zero response at 4 weeks on an adequate dose \u2192 don't nurse it along \u2014 move. First: adherence (half of 'non-response'), alcohol, and the missed drivers from Step 1."},
          {step:"4b", title:"Optimise the dose", when:"partial response",
           fromLabel:"before any switch",
           html:"Sertraline 50\u2192100\u2192150\u2192200; escitalopram 10\u219220; mirtazapine 15\u219230\u219245. Meaningful gains often appear one step up; go to max tolerated before declaring failure."},
          {step:"4c", title:"Switch — with the right mechanics", when:"no/insufficient response",
           fromLabel:"adequate dose + 4 weeks",
           html:"<b>SSRI\u2192SSRI:</b> direct swap next day (same-class). <b>SSRI\u2192mirtazapine:</b> cross-taper over 1\u20132 weeks. <b>SSRI\u2192venlafaxine MR 75\u2192375mg:</b> cross-taper; check BP at higher doses. <b>Fluoxetine\u2192anything:</b> stop, wait 4\u20137 days (long half-life), start low. <b>Anything\u2192MAOI territory:</b> specialist only. Never overlap two serotonergics at full dose."},
          {step:"4d", title:"Two adequate trials failed", when:"'treatment-resistant'",
           fromLabel:"the referral threshold",
           html:"Refer / seek advice: augmentation (lithium, quetiapine, aripiprazole), vortioxetine, combination therapy \u2014 psychiatry-initiated. Meanwhile: therapy on board? alcohol really addressed? diagnosis revisited (bipolar II, ADHD, PTSD, personality-level difficulties, undisclosed trauma)?"}
        ]},
        {b:"table", head:["Side effect","Typical culprit","Fix — keep treatment alive"], rows:[
          ["Nausea, GI upset week 1","Any SSRI/SNRI","With food; usually gone by wk 2 \u2014 pre-warned patients tolerate it"],
          ["Early agitation / 'wired'","SSRIs, esp. fluoxetine","Half-dose start, morning dosing; short-term propranolol if needed; review risk"],
          ["Sexual dysfunction (persists)","All SSRIs/SNRIs (~50%+)","ASK at review. Dose-reduce \u00b7 switch to mirtazapine/vortioxetine \u00b7 or treat (sildenafil for men). Silent quit-driver #1"],
          ["Weight gain","Mirtazapine >> SSRIs","Named upfront; diet/activity support; switch if unacceptable"],
          ["Sedation","Mirtazapine, trazodone","Night dosing; often the desired effect \u2014 or increase mirtazapine (less sedating higher up)"],
          ["Hyponatraemia (confusion, cramps, falls)","All serotonergics; elderly + diuretics","Na\u207a at 2\u20134 wks in at-risk; <130 \u2192 stop + recheck; mirtazapine least implicated"],
          ["Bleeding / bruising","SSRIs + NSAID/anticoagulant","PPI cover or switch class"],
          ["Sweating","Venlafaxine, sertraline","Dose timing; usually tolerable once explained"],
          ["QT concerns","Citalopram/escitalopram","Respect the caps (40mg / 20mg; halved >65); ECG if cardiac history or co-QT drugs"]
        ]},
        {b:"warn", html:"<b>Serotonin syndrome</b> \u2014 agitation + sweating + tremor/clonus + fever after a dose rise or a new serotonergic (tramadol, triptans, St John's Wort, linezolid, MDMA): stop the drugs, same-day assessment; severe (fever, rigidity) \u2192 999."}
      ]},

    {t:"node", d:"monitor", n:"5", tag:"Step 5 · continue & stop", title:"Continuation, relapse prevention — and stopping properly",
      blocks:[
        {b:"table", head:["Phase","How long","Notes"], rows:[
          ["First episode","<b>\u22656 months after remission</b> at the dose that worked","Stopping at 'feeling better' is the commonest relapse cause \u2014 name this"],
          ["Recurrent (\u22652 episodes) / severe / residual symptoms","<b>\u22652 years</b>, often longer","Plus relapse-prevention psychology (MBCT has the best evidence)"],
          ["Relapse signature","Write it down with the patient","Their personal early-warning signs + action plan"],
          ["<b>Stopping — NG222 rules</b>","<b>Slow, stepwise, PROPORTIONATE reductions</b> over weeks\u2013months \u2014 smaller absolute steps as the dose falls (e.g. sertraline 100\u219250\u219225\u219212.5\u2192alternate days\u2192stop), next step only when the last one is comfortable","NOT 'take one every other day for two weeks'. Venlafaxine + paroxetine are the withdrawal-heavy ones (liquid formulations help); fluoxetine mostly self-tapers"],
          ["Withdrawal vs relapse","Withdrawal: days after a cut, physical (dizzy, 'brain-zaps', nausea), settles/resolves on restoring dose. Relapse: weeks later, the old mood symptoms return","Withdrawal \u2192 go back a step and slow down; relapse \u2192 restore treatment dose"]
        ]},
        {b:"say", html:"You're feeling well BECAUSE of the tablet, not despite it \u2014 like a cast on a healing bone, it stays on a while after the pain stops. When we do stop, we'll go down in small steps at your pace; some people notice dizzy, electric-shock-type feelings if we go too fast, and that just means we slow down \u2014 it's not the depression coming back."}
      ]},

    {t:"loop", icon:"🔁", title:"Not responding? Run this before the next switch",
      arrow:"\u2026serial switching without this = serial under-treatment",
      checks:[
        {b:"1 · Adequate trial?", html:"Right dose, actually taken, for a genuine 4 weeks? (Pharmacy record + honest conversation.)"},
        {b:"2 · Alcohol / substances", html:"AUDIT-C again — the commonest hidden reason nothing works."},
        {b:"3 · Diagnosis drift", html:"Bipolar II (recheck), ADHD, PTSD/trauma, perimenopause, hypothyroidism, OSA, anaemia."},
        {b:"4 · Life drivers", html:"Abuse, debt, housing, carer load — no tablet outruns an unaddressed cause."},
        {b:"5 · Therapy on board?", html:"Drug + therapy beats drug alone in moderate-severe — has the referral actually happened?"},
        {b:"6 · Physical illness", html:"New/undertreated pain, inflammation, malignancy in the older patient with somatic features."}
      ],
      back:"All confirmed → switch (4c) or refer (4d)"},

    {t:"node", d:"safety", n:"6", tag:"Safety-net", title:"Say it, write it, repeat it",
      blocks:[
        {b:"tiles", v:"safety", items:[
          {t:"🔴 Crisis", html:"\u201cIf you feel unsafe: 999 or A&E now; NHS 111 option 2; Samaritans 116 123 — any hour. Save these in your phone now, while we're together.\u201d"},
          {t:"⚠️ First fortnight", html:"\u201cIf you feel more agitated, or have new thoughts of harming yourself in the first weeks — contact us the same day; it's a known effect and we act on it.\u201d"},
          {t:"💊 Never stop dead", html:"\u201cRun out or stop suddenly and you may feel dizzy, sick, electric-shock sensations — always come to us to plan it.\u201d"},
          {t:"🌡️ Mixing", html:"\u201cCheck with a pharmacist before adding anything new — including St John's Wort and strong painkillers.\u201d"}
        ]}
      ]},

    {t:"node", d:"refer", n:"7", tag:"Refer", title:"Who needs psychiatry",
      blocks:[
        {b:"tiles", v:"refer", items:[
          {t:"Today", html:"Active suicidal intent/plan; psychotic depression; stupor/severe self-neglect → crisis team / same-day assessment."},
          {t:"Bipolar signal", html:"Any mania/hypomania history, or an antidepressant-induced 'high' → stop and refer, don't just switch."},
          {t:"Two adequate failures", html:"Treatment-resistant pathway — augmentation is specialist territory."},
          {t:"Perinatal", html:"Moderate+ in pregnancy/postnatal, or any risk — perinatal mental-health team (low threshold; also preconception planning on existing treatment)."},
          {t:"Complex", html:"Comorbid eating disorder, substance dependence, emerging personality-level difficulties, <18s (CAMHS — fluoxetine only, with therapy)."}
        ]},
        {b:"say", html:"We've tried two fair rounds of treatment and you're still fighting hard for not enough reward \u2014 that tells me you need the options only the specialist team can add, not that you've failed. We keep going here alongside them, and the crisis numbers stay in your phone meanwhile."}
      ]}
  ],
  foot:"Depression in adults \u2014 NICE NG222 with CKS. Under-18s: CAMHS pathways. Verify doses against the current BNF before prescribing."
});
</script>
