<script>
MG.render({
  icon:"🕊️",
  title:"Palliative Pain & Opioids — Step-by-Step",
  stemTitle:"Palliative pain control &mdash; the WHO ladder, starting and titrating strong opioids, conversions, side effects and adjuvants",
  stemSub:"A practical prescribing protocol for adults with palliative care needs: assess each pain by type, climb the WHO ladder, start and titrate oral morphine (with the right breakthrough dose), switch opioid for side effects or renal impairment, convert safely between routes/drugs, and add adjuvants for neuropathic and bone pain \u2014 always co-prescribing a laxative. GMEC Palliative Care Guidelines 2025 / NICE CG140 / PCF8.",
  guideline:"GMEC 2025 \u00b7 NICE CG140 \u00b7 PCF8",
  glance:[
    {lbl:"Step 1", val:"Paracetamol 1g QDS", sub:"± NSAID (celecoxib)"},
    {lbl:"Strong opioid", val:"Oral morphine MR 10 mg BD", sub:"IR + modified-release"},
    {lbl:"Breakthrough", val:"1/6 of 24h dose", sub:"immediate-release, PRN"},
    {lbl:"Always", val:"Co-prescribe laxative", sub:"+ antiemetic PRN"},
    {lbl:"Renal impairment", val:"Avoid morphine", sub:"oxycodone / alfentanil"},
    {lbl:"Toxicity", val:"Drowsy + myoclonus", sub:"reduce dose; naloxone only if life-threatening"}
  ],
  flow:[

    {t:"node", d:"found", n:"1", tag:"Assess", title:"Assess each pain by type \u2014 it dictates the adjuvant",
      blocks:[
        {b:"p", html:"Many palliative patients have <strong>more than one pain</strong> \u2014 assess each separately (site, character, timing, exacerbating/relieving factors, effect on function/sleep/mood) and identify the likely cause. The pain <em>type</em> steers which adjuvant to add (Step 6)."},
        {b:"table", head:["Pain type","Typical features","Beyond the WHO ladder"], rows:[
          ["Bone metastases","Gnawing/aching, worse on movement/weight-bearing","NSAID, bisphosphonate, radiotherapy"],
          ["Visceral (liver/lung/bowel)","Deep, throbbing","Corticosteroid (dexamethasone), NSAID"],
          ["Neuropathic","Burning/shooting, sensory disturbance","Amitriptyline / gabapentin / pregabalin / duloxetine; corticosteroid for nerve compression"],
          ["Smooth-muscle colic","Deep, twisting, colicky (bowel/bladder)","Antispasmodic \u2014 hyoscine butylbromide (Buscopan)"]
        ]},
        {b:"kv", rows:[
          ["Principles","<b>By mouth, by the clock, for the individual, with attention to detail.</b> Set realistic goals (pain-free at rest/overnight may be more achievable than on movement)."],
          ["Baseline","Check renal &amp; liver function before starting analgesics where possible \u2014 it changes opioid choice (Step 8)."]
        ]}
      ]},

    {t:"node", d:"life", n:"2", tag:"Non-drug · core", title:"Holistic & non-drug measures", blocks:[{b:"tiles", v:"life", items:[{t:"🛏️ Comfort measures", html:"Positioning, pressure care, heat/cold, gentle activity and complementary approaches support analgesia."},{t:"🧠 Total pain", html:"Address psychological, social and spiritual components ('total pain'); involve the wider palliative team."},{t:"👪 Carer support", html:"Educate and support carers in giving PRN medication and recognising uncontrolled pain."}]},{b:"why", html:"Palliative pain is 'total pain' \u2014 non-drug comfort measures, psychological/spiritual support and carer education work alongside the analgesic ladder, not after it."}]},
    {t:"node", d:"drug", n:"3", tag:"Step 1 \u00b7 non-opioid", title:"WHO Step 1 \u2014 paracetamol ± NSAID",
      blocks:[
        {b:"kv", rows:[
          ["Paracetamol","<b>1g QDS</b>. Reduce to <b>500mg QDS</b> if \u22651 hepatotoxicity risk (age, &lt;50kg, poor nutrition/cachexia, chronic alcohol). Severe renal impairment (eGFR &lt;30): 500mg 6-hourly, max 3g/day."],
          ["NSAID (if inflammatory/bone pain)","Celecoxib 100\u2013200mg BD (PCF NSAID of choice), ibuprofen 200\u2013400mg TDS, or naproxen 250\u2013500mg BD. Co-prescribe a PPI for gastroprotection; caution renal/cardiac."],
          ["For mild pain","Start at Step 1. For moderate\u2013severe pain, go straight to a strong opioid (Step 3)."]
        ]}
      ]},

    {t:"node", d:"drug", n:"4", tag:"Step 2 \u00b7 weak opioid (often skipped)", title:"WHO Step 2 \u2014 weak opioid",
      blocks:[
        {b:"p", html:"<b>There is no pharmacological need for Step 2 in cancer pain</b> \u2014 low-dose strong opioid gives quicker, better relief. Moving straight from non-opioid to a low-dose strong opioid is increasingly preferred."},
        {b:"kv", rows:[
          ["If used","Codeine 30\u201360mg QDS (or dihydrocodeine). Codeine needs CYP2D6 conversion to morphine \u2014 poor metabolisers get no effect, ultra-rapid metabolisers risk toxicity."],
          ["Conversion","Codeine/dihydrocodeine/tramadol oral \u2192 oral morphine: <b>divide by 10</b> (e.g. codeine 240mg/day \u2248 morphine 24mg/day)."]
        ]}
      ]},

    {t:"node", d:"drug", n:"5", tag:"Step 3 \u00b7 strong opioid", title:"Start & titrate oral morphine",
      blocks:[
        {b:"p", html:"<b>Morphine is the strong opioid of choice</b> (familiarity, availability, cost); oral route preferred. Start with <b>regular MR morphine (e.g. 10 mg BD; 5 mg BD if frail/renal)</b> plus <b>immediate-release morphine 2.5–5 mg (1/6 of the 24-h dose) for breakthrough</b>, then titrate."},
        {b:"ladder", steps:[
          {step:"4a", title:"Start (opioid-naive)", when:"normal renal function",
           html:"<b>Modified-release morphine (Zomorph\u00ae/MST\u00ae) 10\u201315mg BD</b>, OR immediate-release morphine (Oramorph\u00ae/Sevredol\u00ae) 2.5\u20135mg 4-hourly. Frail/elderly: start lower (e.g. 5mg MR BD or 2.5mg IR). Always provide an IR breakthrough dose."},
          {step:"4b", title:"Breakthrough dose", when:"PRN for incident pain",
           fromLabel:"alongside regular opioid",
           html:"Breakthrough = <b>1/6 of the total 24-hour morphine dose</b>, given as immediate-release, up to <b>hourly PRN</b> (e.g. on 30mg MR BD = 60mg/day \u2192 breakthrough 10mg)."},
          {step:"4c", title:"Titrate", when:"review every 24\u201348h",
           fromLabel:"persistent pain",
           html:"Add up the total used (regular + breakthrough) over 24h and increase the regular dose accordingly (typically by 30\u201350%). Recalculate the breakthrough dose each time. Review benefit + side effects."},
          {step:"4d", title:"Co-prescribe always", when:"from the start",
           fromLabel:"prevent predictable side effects",
           html:"<b>A regular laxative</b> (e.g. macrogol + senna) for everyone \u2014 opioid constipation does not tolerate out. An <b>antiemetic PRN</b> (e.g. metoclopramide/haloperidol) for the first days \u2014 nausea usually settles."}
        ]},
        {b:"warn", html:"<b>Never stop a patient's regular long-acting/basal opioid</b> when adding breakthrough doses. In the last days of life or if unable to swallow, convert to a continuous subcutaneous infusion (syringe pump) \u2014 see Care of the Dying protocol."}
      ]},

    {t:"node", d:"drug", n:"6", tag:"Step 3 \u00b7 alternatives", title:"Alternative strong opioids \u2014 when to switch",
      blocks:[
        {b:"table", head:["Opioid","When to use","Notes"], rows:[
          ["Oxycodone (OxyContin\u00ae MR / OxyNorm\u00ae IR)","Morphine intolerance, or mild\u2013moderate renal impairment","~1.5\u20132\u00d7 as potent as oral morphine"],
          ["Fentanyl patch (12\u201325 mcg/h\u2026)","Stable pain, swallowing problems, renal impairment","NOT for acute titration / unstable pain; takes ~12\u201324h to work; keep IR breakthrough"],
          ["Buprenorphine patch (BuTrans\u00ae / Transtec\u00ae)","Stable moderate pain, renal impairment","Lower-potency patch; weekly (BuTrans) or twice-weekly"],
          ["Alfentanil (SC)","Severe renal impairment (eGFR &lt;30) in syringe pump","Specialist; short-acting"],
          ["Methadone","Complex/neuropathic pain refractory to other opioids","Specialist initiation only \u2014 long, variable half-life"]
        ]},
        {b:"warn", html:"Switch to a non-morphine opioid mainly for: <b>unacceptable morphine side effects</b>, <b>renal impairment</b> (morphine has active renally-cleared metabolites \u2192 toxicity), the <b>transdermal route</b> being preferable, or morphine unavailability."}
      ]},

    {t:"node", d:"drug", n:"7", tag:"Conversions", title:"Opioid conversion \u2014 the key ratios",
      blocks:[
        {b:"p", html:"Convert carefully and, when in doubt, <b>reduce the calculated dose by ~25\u201350% for incomplete cross-tolerance</b> and seek specialist advice. Always keep a correctly-sized breakthrough dose after switching."},
        {b:"table", head:["From \u2192 To","Divide by","Example"], rows:[
          ["Oral codeine/tramadol \u2192 oral morphine","\u00f7 10","codeine 240mg \u2192 morphine 24mg"],
          ["Oral morphine \u2192 oral oxycodone","\u00f7 1.5\u20132","morphine 30mg \u2192 oxycodone 15\u201320mg"],
          ["Oral morphine \u2192 SC morphine","\u00f7 2","morphine 60mg oral \u2192 30mg SC/24h"],
          ["Oral morphine \u2192 SC diamorphine","\u00f7 3","morphine 60mg oral \u2192 20mg SC/24h"],
          ["Oral oxycodone \u2192 SC oxycodone","\u00f7 1.5\u20132","oxycodone 30mg oral \u2192 15\u201320mg SC/24h"],
          ["Fentanyl patch (approx)","\u2014","12 mcg/h \u2248 30mg oral morphine/24h; 25 mcg/h \u2248 60\u201390mg"]
        ]},
        {b:"warn", html:"Patch and methadone conversions are error-prone \u2014 use the <b>full conversion chart (Appendix 1) or seek specialist advice</b>. Fentanyl/buprenorphine patches are not removed for breakthrough \u2014 add IR breakthrough alongside."}
      ]},

    {t:"node", d:"safety", n:"8", tag:"Side effects & toxicity", title:"Manage opioid side effects; recognise toxicity",
      blocks:[
        {b:"table", head:["Effect","Action"], rows:[
          ["Constipation","Universal \u2014 <b>co-prescribe a regular laxative from day 1</b> (macrogol + senna). Does not wear off."],
          ["Nausea","Common early, usually transient \u2014 antiemetic (metoclopramide or haloperidol 1.5mg nocte) for ~1 week."],
          ["Drowsiness / dry mouth","Often settles in a few days; warn re driving when starting/changing dose."],
          ["Opioid toxicity","Persistent drowsiness, vivid dreams/hallucinations, <b>myoclonus (jerks)</b>, pinpoint pupils, confusion \u2192 reduce dose, ensure hydration, check renal function, consider opioid switch."],
          ["Life-threatening respiratory depression","RR &lt;8 + unrousable \u2192 titrated <b>naloxone</b> (dilute 400mcg to 10mL, give 0.5mL = 20mcg IV every 2 min) \u2014 small doses to reverse respiratory depression without reversing analgesia/precipitating crisis."]
        ]},
        {b:"warn", html:"In palliative patients, use <b>small, titrated naloxone doses</b> for respiratory depression \u2014 a full reversal dose causes severe pain and acute withdrawal. Suspect renal impairment / accumulation if a stable patient becomes toxic."}
      ]},

    {t:"node", d:"drug", n:"9", tag:"Adjuvants", title:"Adjuvant analgesics by pain type",
      blocks:[
        {b:"kv", rows:[
          ["Neuropathic pain","<b>Amitriptyline 10\u201325mg nocte</b>, or <b>gabapentin 300mg \u2192 titrate</b> / <b>pregabalin 75mg BD</b>, or duloxetine 30\u201360mg. Add a corticosteroid (dexamethasone) for nerve compression."],
          ["Bone pain","NSAID (celecoxib), <b>bisphosphonate</b> (e.g. zoledronic acid \u2014 specialist), and <b>radiotherapy</b> referral \u2014 highly effective for localised metastatic bone pain."],
          ["Liver-capsule / raised ICP / nerve compression","<b>Dexamethasone</b> (e.g. 8\u201316mg OD, reducing) \u2014 give before 2pm; co-prescribe gastroprotection; review and taper."],
          ["Smooth-muscle colic","<b>Hyoscine butylbromide (Buscopan) 20mg</b> PRN/regular (oral or SC)."],
          ["Adjuvant principle","Adjuvants run <b>alongside</b> the WHO ladder \u2014 they target a mechanism the opioid alone won't fully control."]
        ]}
      ]},

    {t:"node", d:"monitor", n:"10", tag:"Renal / review", title:"Renal impairment & ongoing review",
      blocks:[
        {b:"table", head:["Renal function","Preferred opioid"], rows:[
          ["Normal / mild","Morphine"],
          ["Moderate (eGFR 30\u201350)","Oxycodone (caution); reduce dose/frequency"],
          ["Severe (eGFR &lt;30)","Avoid morphine &amp; oxycodone accumulation \u2192 fentanyl/buprenorphine patch (stable) or alfentanil SC (syringe pump); seek advice"]
        ]},
        {b:"kv", rows:[
          ["Review","Reassess pain, function and side effects regularly; recalculate breakthrough at each dose change; check renal function if toxicity develops."],
          ["Document","Write the full regimen for the patient/carers \u2014 drug names, reasons, doses, intervals, and what to do for breakthrough."]
        ]}
      ]},

    {t:"loop", icon:"\uD83D\uDD01", title:"Pain still uncontrolled? Re-check before escalating",
      arrow:"\u2026more opioid isn't always the answer",
      intro:"Opioid-resistant pain (neuropathic, bone, colic, incident) needs the right adjuvant or a non-drug measure, not just dose increases.",
      checks:[
        {b:"1 \u00b7 Pain type", html:"Neuropathic / bone / colic? Add the matching adjuvant (Step 8)."},
        {b:"2 \u00b7 Breakthrough", html:"Is the breakthrough dose 1/6 of the 24h dose and being used? Titrate the regular dose up."},
        {b:"3 \u00b7 Toxicity vs pain", html:"Drowsy + myoclonus + still in pain = opioid toxicity \u2192 switch opioid, don't just increase."},
        {b:"4 \u00b7 Renal", html:"New toxicity in a stable patient \u2192 check renal function / accumulation."},
        {b:"5 \u00b7 Specialist", html:"Refractory, complex neuropathic, or considering methadone/patches \u2192 specialist palliative care."}
      ],
      back:"Adjuvant added, opioid switched/titrated, renal checked \u2192 specialist palliative care advice"},

    {t:"node", d:"refer", n:"11", tag:"Refer / advice", title:"When to seek specialist palliative care",
      arrow:"complex or refractory pain",
      blocks:[
        {b:"tiles", v:"refer", items:[
          {t:"Specialist palliative care", html:"Refractory pain despite optimised ladder + adjuvants; complex neuropathic pain; methadone consideration; rapid escalation."},
          {t:"Oncology / radiotherapy", html:"Localised metastatic bone pain (palliative radiotherapy), or for disease-directed treatment."},
          {t:"Anaesthetic / pain team", html:"For nerve blocks, intrathecal/epidural analgesia, or interventional options."},
          {t:"Renal impairment", html:"Severe renal impairment needing opioid choice/conversion \u2014 specialist advice on alfentanil/patch dosing."}
        ]},
        {b:"say", html:"We'll treat each of your pains in the way that suits it \u2014 a strong painkiller around the clock with extra doses for flare-ups, plus a laxative because these medicines always slow the bowels. If one type of pain doesn't settle, there are add-on treatments and a specialist team we can call on."}
      ]}
  ]
});
</script>
