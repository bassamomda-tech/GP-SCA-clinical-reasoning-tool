MG.render({"icon":"🚹","title":"Undescended Testis","guideline":"NICE CKS","stemTitle":"Undescended testis — refer for orchidopexy; distinguish from retractile","stemSub":"Primary-care management of undescended testis (cryptorchidism) — examine the newborn/infant, distinguish a truly undescended from a retractile testis, refer for surgical correction by the recommended age, and recognise the acute emergency of an impalpable + acutely painful testis. NICE CKS · 2026.","glance":[{"lbl":"Examine","val":"At birth + 6–8 weeks + reviews","sub":"warm hands, relaxed child"},{"lbl":"Refer","val":"Paediatric surgery/urology","sub":"if still undescended"},{"lbl":"Orchidopexy","val":"By ~6–12 (–18) months","sub":"surgical fixation"},{"lbl":"Retractile","val":"Observe","sub":"not pathological; monitor"},{"lbl":"Bilateral impalpable","val":"Urgent","sub":"exclude DSD/CAH"},{"lbl":"Adult late","val":"Counsel + urology","sub":"cancer/fertility risk"}],"flow":[{"t":"node","d":"safety","n":"1","tag":"Safety-net","title":"Urgent situations","blocks":[{"b":"tiles","v":"safety","items":[{"t":"🔴 Bilateral impalpable at birth","html":"With hypospadias or ambiguous genitalia → urgent same-day neonatal/endocrine review — exclude disorder of sex development / congenital adrenal hyperplasia (salt-losing crisis)."},{"t":"🔴 Acute painful impalpable testis","html":"Sudden pain/swelling in the groin of a boy with an undescended testis → torsion of an undescended testis → emergency surgical referral."},{"t":"🟠 Newly absent testis","html":"Previously descended testis now absent (ascending/acquired undescended testis) → refer."},{"t":"🟠 Adult","html":"Undescended testis discovered in an adult — increased malignancy/fertility risk → urology."}]},{"b":"why","html":"Most cryptorchidism is managed by timely elective referral, but two situations are urgent: bilateral impalpable testes at birth (possible CAH/DSD — life-threatening salt-losing crisis) and an acutely painful impalpable testis (torsion)."}]},{"t":"node","d":"found","n":"2","tag":"Foundation","title":"Examine + distinguish","blocks":[{"b":"kv","rows":[["Examine","Warm hands, warm relaxed child (frog-leg/squatting); palpate for the testis along the inguinal canal; document side, palpable vs impalpable"],["Undescended","Testis not in the scrotum and cannot be manipulated into it (or only briefly)"],["Retractile","Can be brought into the scrotum and stays — normal variant (active cremasteric reflex); monitor as can become ascending"],["Timing","Many descend by 3 months; if still undescended at examination around 3–6 months → refer"]]}]},{"t":"node","d":"life","n":"3","tag":"Non-drug · advice","title":"Parent advice & expectations","blocks":[{"b":"tiles","v":"life","items":[{"t":"👶 Watchful waiting","html":"In the first 3–6 months a unilateral undescended testis may descend — re-examine rather than rush to surgery."},{"t":"🗣️ Parental counselling","html":"Explain the reason for orchidopexy timing (fertility, malignancy risk, examination) and what to expect."},{"t":"🔎 Self-exam later","html":"Teach future testicular self-examination given the (small) raised cancer risk in adulthood."}]},{"b":"why","html":"There is no drug treatment — management is appropriate watchful waiting in early infancy, parental counselling on timing, and teaching future self-examination."}]},{"t":"node","d":"drug","n":"4","tag":"Management","title":"Surgical pathway","blocks":[{"b":"ladder","steps":[{"step":"Step 1","title":"Newborn/infant examination","when":"surveillance","html":"Check at newborn exam, 6–8 week check, and subsequent reviews. Reassess at ~3 months — spontaneous descent is unlikely after this."},{"step":"Step 2","title":"Refer if still undescended","when":"by ~3 months","fromLabel":"persistent undescended","html":"Refer to paediatric surgery/urology so that <b>orchidopexy</b> can be performed by around 6–12 months (ideally before 18 months) — improves fertility potential and allows testis surveillance."},{"step":"Step 3","title":"Retractile testis","when":"observe","fromLabel":"if retractile","html":"No surgery needed; monitor at reviews as a minority become ascending and then require referral."}]},{"b":"warn","html":"Hormonal therapy is not recommended to induce descent. Early orchidopexy reduces (but does not eliminate) the increased risk of testicular cancer and subfertility, and allows the testis to be examined."}]},{"t":"node","d":"follow","n":"5","tag":"Follow-up","title":"Timing of referral","blocks":[{"b":"timeline","items":[{"n":"1","when":"Birth–3 months","title":"Observe","html":"A unilateral undescended testis may descend spontaneously by <b>3 months</b>. Re-examine; if still undescended at 3 months, refer."},{"n":"2","when":"By 6 months → refer","title":"Surgical timing","html":"Refer for <b>orchidopexy, ideally completed by 12–18 months</b> of age (improves fertility and reduces — though does not abolish — malignancy risk; aids future examination)."},{"n":"3","when":"Bilateral / not palpable","title":"Urgent","html":"<b>Bilateral impalpable testes (esp. with hypospadias) need urgent assessment at birth</b> for a disorder of sex development/CAH. Acquired/retractile testis → monitor."}]},{"b":"say","html":"One undescended testicle often drops by three months, so we'll re-check. If not, a small operation to bring it down is best done in the first year or so."}]},{"t":"node","d":"refer","n":"6","tag":"Refer","title":"Referral","blocks":[{"b":"tiles","v":"refer","items":[{"t":"Urgent neonatal/endocrine","html":"Bilateral impalpable ± hypospadias/ambiguous genitalia — exclude CAH/DSD."},{"t":"Emergency surgery","html":"Acutely painful impalpable/undescended testis — ?torsion."},{"t":"Paediatric surgery/urology","html":"Persistent undescended (or acquired/ascending) testis — for orchidopexy."},{"t":"Urology (adult)","html":"Undescended testis presenting in adulthood — counsel re cancer/fertility."}]},{"b":"say","html":"One of the testicles hasn’t settled into the scrotum. We’ll keep checking, but if it hasn’t come down by around three months we refer to a children’s surgeon for a small operation (orchidopexy), ideally before the first birthday — this helps fertility later and lets the testicle be checked. A ‘retractile’ testicle that pops up and down is normal and just needs watching."}]}],"foot":"Management of undescended testis in primary care — timely referral for orchidopexy; bilateral impalpable (?CAH/DSD) and acute pain (?torsion) are urgent. Verify against current NICE CKS Undescended testes."});
