<body data-screen-label="Obesity management card">

<script>
MG.render({
  icon:"⚖️",
  title:"Obesity — The Complete Guide",
  stemTitle:"Obesity made simple &mdash; a chronic disease: classify, treat comorbidity, climb the tiers, hold the weight loss",
  stemSub:"One pathway: classify by BMI + waist with ethnicity adjustment, screen the secondary causes and the cardiometabolic comorbidity that IS the reason to treat, raise it without stigma, build the lifestyle foundation, use the GLP-1 era drugs by their named criteria and stopping rules, refer for bariatric surgery on threshold, and keep the weight off. NICE CG189 \u00b7 NG246 \u00b7 CKS.",
  guideline:"NICE CG189 \u00b7 NG246",
  glance:[
    {lbl:"Classify", val:"BMI + waist", sub:"lower cut-offs S.Asian/high-risk"},
    {lbl:"Goal", val:"5\u201310% loss", sub:"transforms BP, glucose, OSA"},
    {lbl:"Screen", val:"T2DM \u00b7 BP \u00b7 lipids \u00b7 OSA \u00b7 MASLD", sub:"+ secondary causes"},
    {lbl:"Drugs", val:"Semaglutide \u00b7 tirzepatide", sub:"specialist / criteria"},
    {lbl:"Surgery", val:"BMI \u226540 (or \u226535 + comorbid)", sub:"expedite new T2DM"},
    {lbl:"Approach", val:"Non-stigmatising", sub:"ask permission first"}
  ],
  flow:[

    {t:"node", d:"found", n:"1", tag:"Step 1 · classify & assess", title:"Classify by BMI + waist — and ask permission first",
      blocks:[
        {b:"kv", rows:[
          ["BMI categories","Overweight 25\u201329.9 \u00b7 Obesity I 30\u201334.9 \u00b7 II 35\u201339.9 \u00b7 III \u226540. <b>Lower thresholds for South Asian, Chinese, other high-risk groups: overweight \u226523, obesity \u226527.5</b> (same cardiometabolic risk at lower BMI)"],
          ["Waist / waist-to-height","Waist-to-height ratio <b>>0.5</b> flags central adiposity risk at ANY BMI \u2014 useful especially in the BMI 25\u201335 range; less reliable at BMI \u226535"],
          ["Raise it sensitively","<b>Ask permission to discuss weight</b>; use neutral language ('weight', 'BMI', not 'obese/fat'); person-centred goals. The opening line sets whether they engage at all"],
          ["Assess","Eating pattern + binge/eating disorder, mental health, sleep (OSA), mobility, medications that drive gain, readiness to change, social determinants (food access, shift work, finances)"]
        ]},
        {b:"why", html:"Obesity is a <strong>chronic relapsing disease driven by biology and environment, not willpower</strong> \u2014 the framing changes the medicine: you screen for comorbidity, treat to protect organs, expect relapse, and support long-term rather than moralise. Ethnicity-adjusted thresholds matter enormously in UK primary care."}
      ]},

    {t:"node", d:"found", n:"2", tag:"Step 2 · causes & comorbidity", title:"Secondary causes + the comorbidity that IS the reason to treat",
      blocks:[
        {b:"kv", rows:[
          ["Secondary causes to screen","<b>Hypothyroidism</b> (TFTs), <b>Cushing's</b> (if cushingoid), <b>PCOS</b> (in women with menstrual/androgenic features), hypothalamic causes; <b>drug-induced gain</b> \u2014 antipsychotics (olanzapine/clozapine), steroids, insulin/sulfonylureas, sodium valproate, some antidepressants, gabapentinoids"],
          ["Cardiometabolic screen","<b>HbA1c</b> (T2DM), <b>BP</b>, <b>lipids + QRISK3</b>, <b>MASLD/NAFLD</b> (FIB-4), gout \u2014 these are the outcomes you're preventing and they justify the intensity of treatment"],
          ["OSA","Snoring + witnessed apnoeas + daytime somnolence \u2192 Epworth/STOP-BANG \u2192 sleep service (untreated OSA worsens everything and its own CV risk)"],
          ["Mental health + eating disorder","<b>Screen for binge-eating disorder and depression BEFORE weight-focused intervention</b> \u2014 a restrictive plan on an untreated eating disorder harms; depression wrecks adherence"]
        ]},
        {b:"warn", html:"Consider a drug swap where a medicine is driving the weight (e.g. a weight-neutral antipsychotic/antidepressant with the prescriber's agreement) \u2014 fighting iatrogenic gain with diet alone rarely works."}
      ]},

    {t:"node", d:"life", n:"3", tag:"Step 3 · foundation", title:"Tier 1–2: lifestyle + behaviour — the base of everything",
      blocks:[
        {b:"tiles", v:"life", items:[
          {t:"🥗 Diet", html:"Sustainable ~600 kcal/day deficit or a structured programme; cut sugary drinks + ultra-processed food. <b>Total diet replacement (~800 kcal/day)</b> programmes can achieve substantial loss + T2DM remission in selected patients (see T2DM guide)."},
          {t:"🏃 Activity", html:"Build to ≥150 min/week moderate + resistance work; reduce sedentary time. Activity holds weight off more than it takes it off — frame honestly."},
          {t:"🧠 Behaviour", html:"Behavioural support, self-monitoring, goal-setting; refer to a structured Tier-2 weight-management service (the evidence-based delivery)."},
          {t:"🎯 The 5–10% goal", html:"Realistic 5–10% loss meaningfully improves BP, glycaemia, lipids, MASLD, OSA, fertility — sell the health wins, not a target dress size."},
          {t:"🤝 Barriers", html:"Sleep, mood, medication-related gain, finances, food environment — address the real obstacles."},
          {t:"🔁 Expect relapse", html:"Weight regain is the biology of the disease, not failure — re-engage non-judgementally, every time."}
        ]},
        {b:"say", html:"Aiming for around 5–10% of your weight is enough to genuinely improve your blood pressure, sugars and sleep — we're chasing health, not a number on a chart. And if the weight creeps back, that's the condition, not you failing; we just pick it back up together."}
      ]},

    {t:"node", d:"drug", n:"4", tag:"Step 4 · pharmacotherapy", title:"The GLP-1 era — named agents, criteria, stopping rules",
      blocks:[
        {b:"ladder", steps:[
          {step:"1st-line drug", title:"Semaglutide (Wegovy) — GLP-1 agonist", when:"adjunct to lifestyle within criteria",
           html:"<b>Semaglutide 2.4mg SC weekly</b> (titrated up over 16\u201320 weeks). NICE TA875: within a <b>specialist weight-management service</b>, BMI \u226535 (or 30\u201334.9 meeting referral criteria; lower cut-offs for high-risk ethnicity) + \u22651 weight-related comorbidity. ~15% mean weight loss. <b>Stopping rule: review at set points; discontinue if <5% lost.</b> Counsel: nausea (titrate slowly), gallstones, pancreatitis (rare), pause peri-operatively per anaesthetic guidance; not in pregnancy."},
          {step:"Most potent", title:"Tirzepatide (Mounjaro) — dual GIP/GLP-1", when:"NICE-approved for weight (TA1026)",
           fromLabel:"greatest efficacy",
           html:"<b>Tirzepatide</b> titrated to 10\u201315mg SC weekly \u2014 the most effective agent (~20% loss). NICE TA1026 approves it for weight management within criteria (BMI + comorbidity); phased NHS rollout via primary care/weight services. Same GI side-effect + stopping-rule + pregnancy cautions as semaglutide."},
          {step:"Alternative", title:"Orlistat 120mg TDS", when:"GLP-1 unsuitable / patient choice",
           fromLabel:"lipase inhibitor",
           html:"With meals (omit if a meal is missed/fat-free). GI effects (steatorrhoea, urgency) are the adherence limiter and a behavioural feedback signal. Continue beyond 3 months only if \u22655% lost. Reduces fat-soluble vitamin absorption."},
          {step:"Reality", title:"The weight-regain caveat", when:"counsel upfront",
           fromLabel:"these are chronic-disease drugs",
           html:"Weight is regained when GLP-1 drugs stop (STEP-4 etc.) \u2014 they treat a chronic disease like antihypertensives do; frame as ongoing, not a 'course'. This shapes funding + patient expectation honestly."}
        ]},
        {b:"warn", html:"Pharmacotherapy is an <b>adjunct to</b>, never a replacement for, lifestyle change \u2014 and each agent has NICE eligibility + stopping rules. Beware unregulated online GLP-1 supply (dosing errors, no monitoring, no eating-disorder screen)."}
      ]},

    {t:"node", d:"drug", n:"5", tag:"Step 5 · surgery", title:"Bariatric surgery (Tier 4) — the most effective durable treatment",
      blocks:[
        {b:"kv", rows:[
          ["Thresholds (CG189)","<b>BMI \u226540</b>, OR <b>\u226535 with a significant comorbidity</b> that would improve (T2DM, OSA, hypertension) \u2014 lower thresholds for high-risk ethnic groups; all after specialist assessment + Tier-3 input"],
          ["Expedite","<b>Recent-onset T2DM + BMI \u226535 \u2192 expedited assessment</b> (surgery can drive diabetes remission; the earlier the better)"],
          ["Procedures","Sleeve gastrectomy, Roux-en-Y bypass, band (less now) \u2014 substantial durable loss + comorbidity remission; the most effective long-term treatment we have"],
          ["<b>Lifelong follow-up</b>","<b>Lifelong micronutrient monitoring + supplementation</b> (B12, iron, folate, calcium, vitamin D, thiamine) \u2014 a GP responsibility post-discharge; watch for dumping, hypoglycaemia, internal hernia (acute abdominal pain post-bypass = surgical emergency)"]
        ]}
      ]},

    {t:"node", d:"monitor", n:"6", tag:"Step 6 · review", title:"Review — progress, comorbidity, drug/surgery aftercare",
      blocks:[
        {b:"table", head:["What","When","Action"], rows:[
          ["Weight/waist + goals","Regularly","Reinforce; adjust; expect + normalise relapse, re-engage"],
          ["Cardiometabolic","Annually (more if abnormal)","HbA1c, BP, lipids/QRISK3, MASLD (FIB-4) \u2014 treat each to its own target"],
          ["Drug therapy","Per agent's schedule","Efficacy vs the stopping rule (≥5%), side effects, continue only if responding"],
          ["Post-bariatric","Per shared-care protocol","Lifelong micronutrients + supplementation; new abdominal pain → surgical review"],
          ["Mood + eating","As needed","Re-screen — treat depression/binge-eating in their own right"]
        ]},
        {b:"say", html:"We'll keep an eye on the things the weight affects — sugars, blood pressure, liver and sleep — because improving those is the real win. If we use medication or surgery, they come with their own follow-up, and I'll keep that going with you long-term."}
      ]},

    {t:"loop", icon:"🔁", title:"Not progressing? Work through this",
      arrow:"\u2026rarely 'just eat less'",
      checks:[
        {b:"1 · Secondary/iatrogenic", html:"Hypothyroid, Cushing's, PCOS, or a weight-driving drug (antipsychotic, steroid, insulin) unaddressed?"},
        {b:"2 · Eating disorder / mood", html:"Binge-eating or depression sabotaging any plan → treat these first."},
        {b:"3 · Structured support", html:"Actually in a Tier-2 programme, or going it alone? Referral made?"},
        {b:"4 · Drug eligibility", html:"Meets GLP-1/surgery criteria and not yet offered? Or on a drug below the ≥5% stopping threshold?"},
        {b:"5 · Sleep + barriers", html:"Untreated OSA, shift work, food insecurity — the real-world obstacles."},
        {b:"6 · Expectations", html:"Chasing an unrealistic target and disengaging → reset to 5–10% health goals."}
      ],
      back:"Foundation optimised + criteria met → weight service / pharmacotherapy / bariatric"},

    {t:"node", d:"safety", n:"7", tag:"Safety-net", title:"What the patient must know",
      blocks:[
        {b:"tiles", v:"safety", items:[
          {t:"🔴 Post-bariatric emergency", html:"\u201cSevere or persistent tummy pain after weight-loss surgery — same-day/A&E; some complications are urgent.\u201d"},
          {t:"💉 GLP-1 side effects", html:"\u201cNausea is common early and settles as we go up slowly; severe ongoing tummy pain → contact us (rarely the pancreas or gallbladder).\u201d"},
          {t:"🤰 Pregnancy", html:"\u201cStop weight-loss injections and tell us if you might become pregnant — they're not used in pregnancy, and they can reduce how well the pill works.\u201d"},
          {t:"🌐 Online supply", html:"\u201cPlease don't buy these injections from unregulated websites — wrong doses without monitoring cause real harm.\u201d"}
        ]}
      ]},

    {t:"node", d:"refer", n:"8", tag:"Refer", title:"The tiered pathway",
      blocks:[
        {b:"tiles", v:"refer", items:[
          {t:"Tier 2 (community)", html:"Structured weight-management/behavioural programmes — the evidence-based first referral for most."},
          {t:"Tier 3 (specialist MDT)", html:"Complex obesity, comorbidity, pharmacotherapy initiation, pre-bariatric optimisation."},
          {t:"Tier 4 (bariatric)", html:"Meets CG189 thresholds after specialist input; expedite recent-onset T2DM + BMI ≥35."},
          {t:"Endocrine", html:"Suspected Cushing's / hypothalamic cause, or PCOS needing specialist input."},
          {t:"Mental health / eating disorder", html:"Binge-eating disorder, significant depression — before or alongside weight work."}
        ]},
        {b:"say", html:"Carrying extra weight is a medical condition, not a personal failing, and it responds to treatment — from structured support to newer medicines and, for some, surgery. We'll start where it fits you, aim for changes that improve your health, and I'll refer you into the right service."}
      ]}
  ],
  foot:"Tiered management of obesity in adults \u2014 NICE CG189, NG246, TA875 (semaglutide), TA1026 (tirzepatide) and CKS. Pharmacotherapy + surgery are adjuncts within specialist pathways. Verify against current NICE + local weight-service criteria + the BNF before prescribing."
});
</script>
