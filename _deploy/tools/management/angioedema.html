  stemTitle:"Angioedema \u2014 stabilise the airway, then find the mechanism",
  stemSub:"Primary-care management of angioedema \u2014 recognise life-threatening airway involvement and anaphylaxis, distinguish histaminergic (allergic/idiopathic) from bradykinin-mediated (ACEi, hereditary) types, treat each correctly, and stop the trigger. CKS \u00b7 BSACI \u00b7 2026.",
  guideline:"NICE CKS / BSACI",
  glance:[
    {lbl:"Airway", val:"Tongue/throat?", sub:"= emergency"},
    {lbl:"With urticaria", val:"Histaminergic", sub:"antihistamine-responsive"},
    {lbl:"No urticaria", val:"Bradykinin?", sub:"ACEi / hereditary"},
    {lbl:"Allergic", val:"Antihistamine \u00b1 steroid", sub:"+ adrenaline if anaphylaxis"},
    {lbl:"ACEi", val:"Stop permanently", sub:"avoid all ACEi"},
    {lbl:"Red flag", val:"Stridor / anaphylaxis", sub:"= 999 + IM adrenaline"}

  flow:[
    {t:"node", d:"safety", n:"1", tag:"Safety-net", title:"Airway + anaphylaxis first",
      blocks:[
        {b:"tiles", v:"safety", items:[
          {t:"🔴 Airway involvement", html:"Tongue, lips, floor of mouth, pharynx or larynx swelling; voice change, stridor, drooling, difficulty swallowing/breathing \u2192 999."},
          {t:"💉 Anaphylaxis", html:"Angioedema + wheeze/hypotension/widespread urticaria \u2192 <b>IM adrenaline</b> anterolateral thigh, <b>repeat after 5 min if no improvement</b>: adult/&gt;12y 500 \u00b5g, 6\u201312y 300 \u00b5g, 6m\u20136y 150 \u00b5g, &lt;6m 100\u2013150 \u00b5g. Lie flat + raise legs (semi-recumbent if breathing hard) \u2014 <b>don\u2019t let them stand or sit up suddenly</b>. 999, ABC, high-flow O\u2082, IV fluids if shocked. All need observation/admission (biphasic risk)."},

        {b:"why", html:"The first decision is airway, not aetiology. Allergic/histaminergic angioedema responds to adrenaline, antihistamine and steroid; bradykinin-mediated (ACEi-induced, hereditary) does not \u2014 but you still treat for anaphylaxis if uncertain and protect the airway."}
      ]},
    {t:"node", d:"found", n:"2", tag:"Foundation", title:"Identify the mechanism",

          ["Drug triggers","ACEi (and sometimes ARBs), NSAIDs, contrast; review medication list"]

        {b:"why", html:"Angioedema without urticaria points away from allergy toward a bradykinin mechanism (ACEi or C1-inhibitor deficiency) \u2014 these need ACEi cessation and specific therapies (C1-INH concentrate/icatibant), not just antihistamines."}

    {t:"node", d:"life", n:"3", tag:"Non-drug · core", title:"Trigger avoidance", blocks:[{b:"tiles", v:"life", items:[{t:"🚫 Stop the trigger", html:"Stop any causative drug \u2014 esp. ACE inhibitor (switch class); avoid known allergens/NSAIDs if implicated."},{t:"📋 Action plan", html:"For recurrent/allergic angioedema, provide a written action plan and carry antihistamines; adrenaline auto-injector if anaphylaxis risk."},{t:"🧠 Identify type", html:"Distinguish histaminergic (allergic/idiopathic) from bradykinin-mediated (ACEi/hereditary) \u2014 management differs."}]},{b:"why", html:"Identifying and removing the trigger \u2014 most often an ACE inhibitor \u2014 is the single most important step, since bradykinin-mediated angioedema won\u2019t respond to antihistamines."}]},

          {step:"ACEi-induced", title:"Stop the ACEi permanently", when:"+ supportive care",

          {t:"Adrenaline auto-injector", html:"Prescribe + train if anaphylaxis/food/venom trigger \u2014 <b>carry two at all times</b>, second dose at 5 min if not recovering, and <b>call an ambulance whenever it is used</b> (even if improving). Check technique at every review; refer allergy."},
          {t:"Medication change", html:"ACEi-induced \u2192 switch antihypertensive, document avoidance."}

      ]}
