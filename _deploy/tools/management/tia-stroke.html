<script>
MG.render({
  icon:"🧠",
  title:"TIA & Stroke — The Complete Guide",
  stemTitle:"TIA &amp; ischaemic stroke &mdash; act on the emergency, then own the secondary prevention",
  stemSub:"One pathway: recognise and act on the emergency (stroke = 999, all suspected TIA = aspirin + 24-hour specialist review \u2014 ABCD\u00b2 no longer triages), then deliver the secondary-prevention bundle the GP owns \u2014 antithrombotic (clopidogrel, or anticoagulate if AF), high-intensity statin, blood pressure to target, carotid + lifestyle + rehab, with the DVLA rules. NICE NG128.",
  guideline:"NICE NG128",
  glance:[
    {lbl:"Acute stroke", val:"FAST \u2192 999", sub:"thrombolysis/thrombectomy window"},
    {lbl:"Suspected TIA", val:"Aspirin 300", sub:"+ 24h specialist (no ABCD\u00b2)"},
    {lbl:"Antithrombotic", val:"Clopidogrel 75", sub:"AF \u2192 anticoagulate"},
    {lbl:"Statin", val:"Atorvastatin 80", sub:"high-intensity"},
    {lbl:"BP", val:"Treat to target", sub:"dominant recurrence lever"},
    {lbl:"Driving", val:"\u22651 month off", sub:"DVLA if deficit / Group 2"}
  ],
  flow:[

    {t:"node", d:"safety", n:"1", tag:"Step 1 · emergency", title:"Recognise and act — stroke and TIA are emergencies",
      blocks:[
        {b:"table", head:["Presentation","Recognise","Action NOW"], rows:[
          ["<b>Acute stroke</b>","FAST-positive / persistent sudden focal deficit","<b>999 immediately</b> \u2014 time-critical thrombolysis (\u22644.5h) / thrombectomy; note onset time; check glucose (mimic)"],
          ["<b>Suspected TIA</b>","Transient focal deficit, fully resolved","<b>Aspirin 300mg</b> now (unless contraindicated) + <b>specialist assessment within 24 hours</b>"],
          ["<b>Crescendo / on anticoagulant</b>","\u22652 TIAs in a week, or TIA on anticoagulant / bleeding disorder","<b>Same-day acute referral</b> (higher early stroke risk / needs imaging first)"]
        ]},
        {b:"kv", rows:[
          ["<b>ABCD\u00b2 is gone</b>","NG128: do <b>NOT</b> use ABCD\u00b2 to triage \u2014 <b>every</b> suspected TIA needs specialist assessment within 24 hours regardless of score"],
          ["Confirm the type","This secondary-prevention pathway assumes <b>ischaemic</b> stroke/TIA \u2014 haemorrhagic stroke has different antithrombotic implications (specialist-led)"],
          ["Don't image in primary care","Brain imaging is arranged via the specialist pathway, not the GP"],
          ["This page","The ongoing primary-care job once the acute pathway is complete"]
        ]},
        {b:"warn", html:"<b>Mimics to consider but not to delay for:</b> hypoglycaemia (check glucose), migraine aura (evolves over minutes, positive symptoms), seizure/Todd's paresis, functional. But <b>sudden</b> focal deficit is stroke until proven otherwise \u2014 999, don't sit on it."}
      ]},

    {t:"node", d:"drug", n:"2", tag:"Step 2 · antithrombotic", title:"Antithrombotic — the single biggest recurrence lever",
      blocks:[
        {b:"ladder", steps:[
          {step:"1st", title:"Long-term antiplatelet", when:"non-cardioembolic ischaemic stroke/TIA",
           splits:[
             {cond:"First-line long-term", drug:"Clopidogrel 75mg OD", note:"After specialist-directed initial aspirin \u00b1 short DAPT (e.g. aspirin+clopidogrel 21 days post minor stroke/high-risk TIA)"},
             {cond:"Clopidogrel not tolerated", drug:"Aspirin 75mg + dipyridamole MR", note:"Or aspirin alone if neither tolerated"}
           ]},
          {step:"If AF", title:"Anticoagulate instead of antiplatelet", when:"cardioembolic source", fromLabel:"atrial fibrillation present",
           splits:[
             {cond:"Drug", drug:"DOAC (or warfarin if indicated)", note:"Replaces the antiplatelet \u2014 do not routinely use both"},
             {cond:"Timing", drug:"Delayed after stroke", note:"Per specialist by infarct size (haemorrhagic transformation risk) \u2014 often ~1\u20132 weeks"}
           ]}
        ]},
        {b:"warn", html:"<b>Don't combine anticoagulant + antiplatelet</b> without a specific indication (bleeding risk with no added benefit). If a patient is on both post-stent, that's time-limited and specialist-led \u2014 clarify the stop date."}
      ]},

    {t:"node", d:"drug", n:"3", tag:"Step 3 · statin & BP", title:"Statin and blood pressure to target",
      blocks:[
        {b:"table", head:["Domain","Treatment","Target / note"], rows:[
          ["<b>Statin</b>","<b>Atorvastatin 80mg</b> (high-intensity)","Aim &gt;40% non-HDL reduction (LDL \u22642.0 / non-HDL \u22642.6) \u2014 secondary prevention regardless of baseline cholesterol; add ezetimibe if not met"],
          ["<b>Blood pressure</b>","Antihypertensives to target","The dominant driver of recurrent stroke; introduce/uptitrate once stabilised (don't drop BP acutely post-stroke \u2014 specialist-guided in the acute phase)"],
          ["Diabetes","Optimise HbA1c","Where relevant \u2014 vascular risk factor"],
          ["Statin timing","Usually started/continued in the acute unit","GP job is to titrate + not let it lapse"]
        ]},
        {b:"why", html:"After the antithrombotic, <strong>statin + blood pressure control</strong> deliver the biggest reductions in recurrent stroke. The commonest primary-care miss is a comfortable patient whose BP was never up-titrated to target, or whose statin quietly stopped \u2014 both are silent until the next event."}
      ]},

    {t:"node", d:"life", n:"4", tag:"Step 4 · lifestyle, rehab, driving", title:"The non-drug work — and the driving rules",
      blocks:[
        {b:"tiles", v:"life", items:[
          {t:"🚭 Smoking", html:"Cessation \u2014 the single biggest modifiable stroke-risk reduction."},
          {t:"🥗 Diet & weight", html:"Mediterranean-style diet, salt reduction, weight management, alcohol within limits."},
          {t:"🏃 Rehab & activity", html:"Stroke rehab MDT (PT/OT/SALT, early supported discharge) for deficits; regular activity."},
          {t:"🧠 Mood & cognition", html:"Screen for post-stroke depression + cognitive impairment; support carers."}
        ]},
        {b:"table", head:["Driving (DVLA)","Rule"], rows:[
          ["Group 1 (car/motorcycle) \u2014 single TIA/stroke","<b>Must not drive for 1 month</b>; no need to notify DVLA if full recovery (notify if residual deficit at 1 month)"],
          ["Multiple TIAs / recurrent events","Must not drive until 3 months free of events; notify DVLA"],
          ["Group 2 (HGV/PSV)","<b>Must notify DVLA</b>; licence refused/revoked for 1 year (2 years for stroke with deficit); stricter re-licensing"]
        ]}
      ]},

    {t:"node", d:"monitor", n:"5", tag:"Step 5 · monitor & review", title:"Risk-factor surveillance",
      blocks:[
        {b:"table", head:["What","When","Action"], rows:[
          ["Blood pressure","Until at target, then routinely","Uptitrate to target \u2014 the highest-yield lever"],
          ["Lipids (non-HDL)","3 months, then annually","<40% reduction \u2192 optimise statin \u00b1 ezetimibe \u00b1 injectables"],
          ["Pulse / AF","Each review","New irregular pulse \u2192 ECG \u2192 switch to anticoagulation; consider prolonged monitoring for paroxysmal AF"],
          ["Adherence + HbA1c","Each review","Reinforce antithrombotic + statin; manage diabetes"],
          ["Mood / function / cognition","Each review","Treat depression; monitor rehab progress; support carers"]
        ]},
        {b:"say", html:"That was a warning we can act on. The antiplatelet (or a blood thinner if your heart rhythm is irregular), a statin, controlling your blood pressure and stopping smoking together cut the risk of a disabling stroke substantially \u2014 and they only work while you keep taking them. Please don't drive for at least a month."}
      ]},

    {t:"loop", icon:"🔁", title:"Recurrent events? Act, don't reassure", arrow:"…a recurrence on treatment is a red flag",
      checks:[
        {b:"1 · Re-refer urgently", html:"A further event → urgent specialist reassessment (acute stroke → 999)."},
        {b:"2 · Adherence", html:"Antithrombotic/anticoagulant + statin actually taken?"},
        {b:"3 · AF missed?", html:"Recheck rhythm — paroxysmal AF may need prolonged monitoring (48h tape / implantable loop)."},
        {b:"4 · Carotid", html:"Symptomatic significant carotid stenosis excluded/treated? (time-critical endarterectomy)."},
        {b:"5 · BP at target?", html:"Is blood pressure genuinely controlled, or drifting?"},
        {b:"6 · Right diagnosis?", html:"Recurrent 'TIAs' that are actually migraine, seizures, arrhythmia, or functional?"}
      ],
      back:"Recurrence → urgent re-referral; otherwise optimise adherence + risk factors"},

    {t:"node", d:"safety", n:"6", tag:"Safety-net", title:"What the patient must know",
      blocks:[
        {b:"table", head:["Scenario","Advice"], rows:[
          ["🔴 Stroke (FAST)","\u201cFace drooping, arm weakness, speech difficulty \u2014 999 immediately, even if it passes off.\u201d"],
          ["⚠️ Recurrent TIA","\u201cAny further temporary weakness, numbness, speech or vision loss \u2014 contact us urgently the same day.\u201d"],
          ["🩸 Bleeding","\u201cOn a blood thinner: black stools, vomiting blood, a bleed that won't stop, or any head injury \u2014 urgent help / A&E.\u201d"],
          ["🚗 Driving","\u201cYou must not drive for at least a month \u2014 we'll advise when it's safe and whether the DVLA needs telling.\u201d"]
        ]}
      ]},

    {t:"node", d:"refer", n:"7", tag:"Refer", title:"Referral pathways",
      blocks:[
        {b:"table", head:["Refer","Trigger"], rows:[
          ["999 / emergency","Acute stroke (FAST) or evolving deficit"],
          ["TIA clinic \u226424h","ALL suspected TIA (same-day if crescendo / on anticoagulant) \u2014 no ABCD\u00b2 triage"],
          ["Urgent vascular","Symptomatic significant carotid stenosis \u2192 endarterectomy assessment (time-critical)"],
          ["Cardiology","AF / cardiac source for anticoagulation + investigation"],
          ["Rehab MDT","Ongoing deficits \u2192 PT/OT/SALT, early supported discharge"],
          ["Recurrence","Further events despite optimal secondary prevention"]
        ]},
        {b:"say", html:"Most of the ongoing work is here with us \u2014 the prevention tablets, blood pressure, and lifestyle. The specialist team handle the urgent assessment, any narrowed neck artery, and decisions about blood thinners if your heart rhythm is irregular."}
      ]}
  ]
});
</script>
