<body data-screen-label="Cellulitis management card">
<div class="mg-wrap" id="mgRoot"></div>
<script src="../../assets/management-engine.js?v=3"></script>
<script>
MG.render({
  icon:"🦠",
  title:"Cellulitis — The Complete Guide",
  stemTitle:"Cellulitis made simple &mdash; is it even cellulitis? then class it, treat it, stop it coming back",
  stemSub:"One pathway: confirm it's actually cellulitis (bilateral redness almost never is), exclude the two killers (necrotising fasciitis + sepsis), stratify with Eron to decide home vs admit, give flucloxacillin at a real dose, mark-and-review at 48h, treat the entry portal that caused it, and break the recurrence cycle with prophylaxis. NICE NG141 \u00b7 CKS.",
  guideline:"NICE NG141 \u00b7 CKS",
  glance:[
    {lbl:"Is it cellulitis?", val:"Unilateral + acute", sub:"bilateral = rarely infection"},
    {lbl:"Exclude", val:"Nec fasc \u00b7 sepsis", sub:"pain out of proportion"},
    {lbl:"Class it", val:"Eron I\u2013IV", sub:"III/IV \u2192 admit"},
    {lbl:"First-line", val:"Flucloxacillin 500mg\u20131g QDS", sub:"clarithro 500 BD if allergic"},
    {lbl:"Review", val:"Mark margin \u2192 48\u201372h", sub:"safety-net every case"},
    {lbl:"Stop recurrence", val:"Treat tinea + oedema", sub:"prophylaxis if \u22652/yr"}
  ],
  flow:[

    {t:"node", d:"safety", n:"1", tag:"Step 1 · is it dangerous?", title:"Exclude the two killers and the mimics FIRST",
      blocks:[
        {b:"tiles", v:"safety", items:[
          {t:"🔴 Necrotising fasciitis", html:"<b>Pain out of proportion</b> to visible signs, rapidly spreading, dusky/blistering skin, crepitus, systemically very unwell → <b>999 / emergency surgical admission</b>. Don't wait, don't 'trial oral abx'."},
          {t:"🔴 Sepsis", html:"Fever/rigors, tachycardia, tachypnoea, hypotension, confusion, or high-risk host (immunosuppressed, diabetic foot) → admit for IV. Use the sepsis screen."},
          {t:"🔴 Orbital / periorbital", html:"Eyelid swelling + proptosis, painful/restricted eye movement, or reduced vision/colour → same-day emergency (sight- AND life-threatening)."},
          {t:"🟠 Not-cellulitis mimics", html:"DVT (hot calf), septic arthritis (hot joint won't move), gout, acute lipodermatosclerosis, contact dermatitis. <b>Bilateral lower-leg redness is almost never cellulitis</b> — think venous eczema / lymphoedema."}
        ]},
        {b:"why", html:"Cellulitis is <strong>acute and unilateral</strong>. The single commonest error in primary care is antibiotics for <em>bilateral</em> gravitational/venous eczema \u2014 red, warm, but not infected. The two you must never miss are necrotising fasciitis (pain out of proportion is the earliest clue, before the skin looks dramatic) and a DVT masquerading as a hot leg."}
      ]},

    {t:"node", d:"found", n:"2", tag:"Step 2 · confirm & class", title:"Recognise it, find the source, stratify with Eron",
      blocks:[
        {b:"kv", rows:[
          ["Features","Acute, <b>unilateral</b>, hot, red, swollen, tender, poorly-demarcated spreading area \u00b1 fever/malaise. <b>Erysipelas</b> = sharply demarcated, raised, often face or shin (more Strep)"],
          ["Organisms","<b>Streptococcus pyogenes</b> and <b>Staphylococcus aureus</b> \u2014 flucloxacillin covers both"],
          ["Find the portal of entry","Toe-web <b>tinea pedis</b> (the classic), leg ulcer, wound, eczema, insect bite, IVDU \u2014 treating it is how you stop recurrence"],
          ["Host factors","Lymphoedema/oedema, diabetes, venous insufficiency, immunosuppression, obesity, prior cellulitis \u2014 all raise risk + complication likelihood"],
          ["Draw + date the margin","Mark the erythema edge with the date/time (or photograph) \u2014 the objective way to judge response at review"]
        ]},
        {b:"table", head:["Eron class","Picture","Disposition"], rows:[
          ["I","Systemically well, no uncontrolled comorbidity","<b>Oral antibiotics at home</b>"],
          ["II","Systemically unwell OR comorbidity that may delay resolution","Oral \u00b1 closer review; consider community IV/OPAT"],
          ["III","Significant systemic upset (tachycardia, hypotension, confusion) or limb-threatening","<b>Admit</b> for IV"],
          ["IV","Sepsis or necrotising infection","<b>Emergency admission</b>"]
        ]}
      ]},

    {t:"node", d:"drug", n:"3", tag:"Step 3 · treat", title:"Antibiotics at a real dose + treat the portal",
      blocks:[
        {b:"ladder", steps:[
          {step:"1st-line", title:"Flucloxacillin — high dose", when:"Eron I, treat at home",
           html:"<b>Flucloxacillin 500mg\u20131g QDS for 5\u20137 days</b> (review + extend if still improving but not resolved \u2014 don't stop at 5 days if actively settling). Take on an empty stomach. Under-dosing is the commonest treatment failure."},
          {step:"Penicillin allergy", title:"Clarithromycin / doxycycline", when:"true penicillin allergy",
           fromLabel:"non-penicillin cover",
           html:"<b>Clarithromycin 500mg BD</b> (or <b>erythromycin 500mg QDS in pregnancy</b>), or <b>doxycycline 200mg day 1 then 100mg OD</b>. 5\u20137 days."},
          {step:"Face / special sites", title:"Broaden the cover", when:"near eyes/nose, or bites",
           fromLabel:"site-specific",
           html:"Facial cellulitis near eyes/nose \u2192 <b>co-amoxiclav 500/125mg TDS</b> (Haemophilus/anaerobe cover); animal/human bite \u2192 co-amoxiclav; water exposure \u2192 seek micro advice (Vibrio/Aeromonas)."},
          {step:"Support", title:"Mark, elevate, analgesia, portal", when:"every case",
           fromLabel:"the non-antibiotic half",
           html:"Elevate the limb (biggest non-drug lever for leg cellulitis); paracetamol/NSAID; <b>treat tinea pedis / ulcers / eczema / oedema</b> \u2014 source control prevents the next episode."}
        ]},
        {b:"warn", html:"<b>Mark the margin and review at 48\u201372h.</b> Spreading past the line despite antibiotics, systemic deterioration, or no improvement \u2192 reassess for the wrong diagnosis (DVT/nec fasc), an abscess needing drainage, resistance, or the need for IV/admission. A fluctuant collection = abscess \u2192 incision & drainage (antibiotics alone won't clear it)."}
      ]},

    {t:"node", d:"monitor", n:"4", tag:"Step 4 · review & recurrence", title:"48h review, resolution, and breaking the cycle",
      blocks:[
        {b:"table", head:["What","When","Action"], rows:[
          ["Response vs the marked margin","48\u201372h","Improving \u2192 continue; spreading/unwell \u2192 escalate (IV/admit) + reconsider diagnosis"],
          ["Completion","End of course","Confirm full resolution; extend if improving-but-not-clear; treat residual oedema"],
          ["Portal of entry","Every case","Tinea pedis, ulcers, eczema, lymphoedema treated? \u2014 the #1 preventable recurrence driver"],
          ["Recurrent (\u22652 episodes/yr)","Ongoing","Optimise oedema/skin care + <b>antibiotic prophylaxis: phenoxymethylpenicillin 250mg BD</b> (erythromycin 250mg BD if penicillin-allergic); compression once settled"]
        ]},
        {b:"say", html:"This is a skin infection \u2014 the redness and tenderness should start settling within a couple of days. I've drawn around the edge so we can see if it's improving; keep the leg up as much as you can. Come back urgently if it spreads past the line, you feel feverish or shivery, or the pain becomes severe and out of keeping with how it looks."}
      ]},

    {t:"loop", icon:"🔁", title:"Not improving at 48h? Work through this",
      arrow:"\u2026it's often not 'stronger antibiotics'",
      checks:[
        {b:"1 · Is it cellulitis at all?", html:"Bilateral? Not spreading? Chronic? → venous eczema / lipodermatosclerosis, not infection — stop antibiotics."},
        {b:"2 · A missed emergency", html:"Pain out of proportion (nec fasc) or hot swollen calf (DVT)? Reassess now."},
        {b:"3 · Dose / adherence", html:"Actually on flucloxacillin 500mg–1g QDS, taken, on an empty stomach?"},
        {b:"4 · Abscess", html:"Fluctuant collection → needs incision & drainage; antibiotics won't clear pus."},
        {b:"5 · Host / resistance", html:"Diabetes, immunosuppression, MRSA risk → swab, micro advice, consider admission."},
        {b:"6 · Portal untreated", html:"Tinea pedis / ulcer still open → reinfection source."}
      ],
      back:"Genuinely failing oral therapy → admit for IV / OPAT"},

    {t:"node", d:"safety", n:"5", tag:"Safety-net", title:"What the patient must know",
      blocks:[
        {b:"tiles", v:"safety", items:[
          {t:"🔴 Get emergency help", html:"\u201cSevere pain out of keeping with how it looks, the skin turning dusky/blistering, or feeling very unwell/feverish \u2014 999 or A&E; some skin infections turn serious fast.\u201d"},
          {t:"🟠 Spreading past the line", html:"\u201cIf the redness spreads beyond the mark I've drawn, or you get shivery and hot, contact us the same day \u2014 it may need a drip antibiotic.\u201d"},
          {t:"🦶 The cause", html:"\u201cAthlete's foot or a leg ulcer is often the way in \u2014 treating that is how we stop it coming back.\u201d"},
          {t:"⬆️ Elevate", html:"\u201cKeeping the leg raised genuinely speeds up recovery \u2014 it's part of the treatment, not optional.\u201d"}
        ]}
      ]},

    {t:"node", d:"refer", n:"6", tag:"Refer", title:"Admit vs community",
      blocks:[
        {b:"tiles", v:"refer", items:[
          {t:"999 / emergency", html:"Suspected necrotising fasciitis, sepsis, or orbital cellulitis."},
          {t:"Admit for IV", html:"Eron III–IV, failing oral therapy, immunosuppressed, facial cellulitis, or can't manage at home."},
          {t:"Community IV / OPAT", html:"Selected moderate cellulitis suitable for ambulatory IV antibiotics where the service exists."},
          {t:"Lymphoedema / dermatology", html:"Recurrent cellulitis, complex lymphoedema, or diagnostic uncertainty (?venous eczema)."}
        ]},
        {b:"say", html:"Most cellulitis clears with tablets, rest and elevation \u2014 but if you're systemically unwell or it's not turning the corner, a short course of drip antibiotics sorts it quickly. Either way, we'll treat whatever let the infection in so we're not back here in a month."}
      ]}
  ],
  foot:"Cellulitis & erysipelas in primary care \u2014 NICE NG141 and CKS. Necrotising fasciitis, sepsis and orbital cellulitis are emergencies; bilateral lower-leg redness is rarely infective. Verify doses against the current BNF before prescribing."
});
</script>
