<body data-screen-label="Peripheral arterial disease management card">

<script>
MG.render({
  icon:"🦵",
  title:"Peripheral Arterial Disease — The Complete Guide",
  stemTitle:"PAD made simple &mdash; it's coronary disease in the legs: confirm with ABPI, treat the artery everywhere, save the limb",
  stemSub:"One pathway: recognise claudication vs the limb-threatening emergencies (critical ischaemia + acute ischaemia), confirm with ABPI, deliver the secondary-prevention bundle that PAD shares with IHD (it's a CV-risk equivalent), prescribe supervised exercise as the evidence-based first-line for claudication, and refer the right limbs urgently for revascularisation. NICE CG147 \u00b7 NG12.",
  guideline:"NICE CG147",
  glance:[
    {lbl:"Confirm", val:"ABPI <0.9", sub:"<0.5 = severe"},
    {lbl:"It IS", val:"CV risk equivalent", sub:"treat like IHD"},
    {lbl:"Bundle", val:"Statin + antiplatelet", sub:"atorvastatin 80 · clopidogrel"},
    {lbl:"Claudication 1st", val:"Supervised exercise", sub:"before angioplasty"},
    {lbl:"Critical ischaemia", val:"Rest pain / ulcer / gangrene", sub:"urgent vascular"},
    {lbl:"Acute ischaemia", val:"6 P's", sub:"same-day \u2014 limb + life threat"}
  ],
  flow:[

    {t:"node", d:"safety", n:"1", tag:"Step 1 · emergencies", title:"Spot the limb-threatening emergencies FIRST",
      blocks:[
        {b:"table", head:["Presentation","Recognise","Action"], rows:[
          ["<b>Acute limb ischaemia</b>","Sudden: the <b>6 P's</b> \u2014 Pain, Pallor, Pulseless, Perishingly cold, Paraesthesia, Paralysis (last two = threatened, act now)","<b>Same-day emergency vascular referral / 999</b> \u2014 window to save the limb is ~6h; IV heparin while arranging"],
          ["<b>Critical limb ischaemia (CLTI)</b>","<b>Rest pain \u22652 weeks</b> (worse lying flat, relieved hanging leg off bed), <b>ulceration or gangrene</b>, ABPI often <0.5","<b>Urgent vascular referral</b> for revascularisation \u2014 limb loss risk without it"],
          ["Diabetic foot","Ulcer/infection + PAD","Same-day/urgent MDT foot service \u2014 don't sit on it"]
        ]},
        {b:"why", html:"PAD's spectrum runs from stable claudication (manage in primary care) to critical and acute ischaemia (the leg is dying). The single most important early split is <strong>stable vs limb-threatening</strong> \u2014 rest pain, tissue loss, or the 6 P's all leave primary care today."}
      ]},

    {t:"node", d:"found", n:"2", tag:"Step 2 · confirm", title:"Confirm the diagnosis — ABPI + who to suspect",
      blocks:[
        {b:"table", head:["Element","Detail"], rows:[
          ["Intermittent claudication","Cramping calf (or thigh/buttock \u2014 aorto-iliac) pain on walking, <b>relieved by rest within minutes</b>, reproducible at a claudication distance"],
          ["Examine","Absent/reduced pulses, cool foot, hair loss, shiny skin, slow capillary refill, Buerger's test; check for ulcers between toes/pressure points"],
          ["<b>ABPI</b>","<b>>0.9 normal \u00b7 0.5\u20130.9 claudication \u00b7 <0.5 severe/critical</b>. <b>Falsely HIGH (>1.3) in diabetes/CKD</b> (calcified incompressible vessels) \u2192 use toe-brachial pressure/waveforms"],
          ["Investigate the person","Duplex \u00b1 CT/MR angiography (specialist, pre-intervention); bloods U&E, HbA1c, lipids, FBC; ECG (co-existent IHD)"],
          ["Differentials","Spinal stenosis (\u2018neurogenic claudication\u2019 \u2014 eased by leaning forward, not by standing still), venous claudication, arthritis, sciatica"]
        ]},
        {b:"warn", html:"An <b>ABPI in the \u2018normal\u2019 range does not exclude PAD in a diabetic</b> \u2014 medial calcification stiffens the arteries and falsely elevates it. If the story fits, use toe pressures / waveforms and refer for duplex."}
      ]},

    {t:"node", d:"drug", n:"3", tag:"Step 3 · the bundle", title:"Secondary prevention — PAD is a cardiovascular risk equivalent",
      blocks:[
        {b:"table", head:["Domain","Treatment","Target / note"], rows:[
          ["<b>Statin</b>","<b>Atorvastatin 80mg</b>","High-intensity for ALL PAD (established atherosclerosis) \u2014 LDL \u22642.0 / non-HDL \u22642.6; add ezetimibe if not met"],
          ["<b>Antiplatelet</b>","<b>Clopidogrel 75mg OD</b> (first-line in PAD)","Aspirin if clopidogrel not tolerated; reduces MI/stroke/vascular death"],
          ["<b>Smoking</b>","Cessation \u2014 the single biggest lever","Continued smoking is the strongest driver of progression + graft failure"],
          ["<b>Diabetes / BP</b>","Optimise HbA1c; BP to target (ACEi/ARB reasonable)","Tight control slows progression + protects heart/kidneys"],
          ["Diet / weight / exercise","Cardioprotective diet, weight loss, activity","Same package as IHD"]
        ]},
        {b:"why", html:"A person with PAD is at high risk of <strong>MI and stroke</strong> \u2014 more will die of a coronary or cerebral event than lose a leg. So the statin + antiplatelet + smoking cessation bundle is not optional adjunct: it is the main survival treatment, exactly as in coronary disease."}
      ]},

    {t:"node", d:"life", n:"4", tag:"Step 4 · claudication", title:"Treat the claudication — exercise is first-line",
      blocks:[
        {b:"ladder", steps:[
          {step:"1st", title:"Supervised exercise programme", when:"first-line for intermittent claudication (CG147)",
           splits:[
             {cond:"What", drug:"2h/week \u00d7 3 months", note:"Walk to near-maximal pain, rest, repeat \u2014 builds collaterals + walking distance"},
             {cond:"Evidence", drug:"Improves walking distance", note:"Offer BEFORE considering angioplasty; as effective for many"}
           ]},
          {step:"2nd", title:"Optimise the bundle + reassess", when:"alongside exercise", fromLabel:"symptoms persist",
           html:"Ensure statin + antiplatelet + smoking cessation maximised; treat pain; naftidrofuryl oxalate is a licensed option for those declining/limited by exercise (review at 3\u20136 months, stop if no benefit)."},
          {step:"3rd", title:"Refer for revascularisation", when:"lifestyle-limiting despite supervised exercise + risk factors optimised", fromLabel:"vascular referral",
           html:"Angioplasty \u00b1 stent, or bypass \u2014 for symptoms that limit life despite conservative management (imaging decides suitability). NOT a substitute for the prevention bundle, which continues."}
        ]},
        {b:"warn", html:"<b>Avoid</b> pentoxifylline (poor evidence) and don't withhold \u03b2-blockers purely because of PAD (they're safe in most and often needed for co-existent IHD). Foot care: well-fitting shoes, daily inspection, treat minor injuries promptly \u2014 especially in diabetics."}
      ]},

    {t:"node", d:"monitor", n:"5", tag:"Step 5 · review", title:"Review — CV risk, symptoms, the foot",
      blocks:[
        {b:"table", head:["What","When","Action"], rows:[
          ["CV risk bundle","Annually + after any change","Statin adherence + lipids, antiplatelet, BP, HbA1c, smoking status"],
          ["Symptoms / walking distance","Each review","Worsening claudication or new rest pain \u2192 reassess ABPI \u2192 vascular referral"],
          ["Foot check","Each review (more if diabetic)","New ulcer, colour change, rest pain \u2192 urgent; diabetic foot \u2192 same-day MDT"],
          ["Progression flag","Any contact","Rest pain, tissue loss, sudden deterioration = critical/acute ischaemia pathway"]
        ]},
        {b:"say", html:"The leg pain is a warning sign that the same furring-up is happening in the arteries to your heart and brain \u2014 so the statin, the antiplatelet and stopping smoking are protecting your life, not just your legs. The best treatment for the walking pain itself is, surprisingly, walking \u2014 a structured programme that pushes through the ache and builds new supply."}
      ]},

    {t:"loop", icon:"🔁", title:"Worsening leg? Work through this", arrow:"…stable vs limb-threat is the key call",
      checks:[
        {b:"1 · Emergency?", html:"Rest pain, ulcer, gangrene (critical) or the 6 P's (acute) → urgent/same-day vascular, don't manage as claudication."},
        {b:"2 · Bundle maxed?", html:"Atorvastatin 80, clopidogrel, smoking cessation all actually in place and adhered to?"},
        {b:"3 · Exercise done?", html:"Supervised programme genuinely offered and attended before escalating?"},
        {b:"4 · ABPI misleading?", html:"Diabetic with 'normal' ABPI but classic symptoms → toe pressures/duplex."},
        {b:"5 · Right diagnosis?", html:"Neurogenic claudication (spinal stenosis), venous, MSK — reconsider if atypical."},
        {b:"6 · Diabetic foot", html:"Ulcer + PAD + infection → same-day MDT foot service, not routine."}
      ],
      back:"Limb-threat or lifestyle-limiting despite optimisation → vascular surgery"},

    {t:"node", d:"safety", n:"6", tag:"Safety-net", title:"What the patient must know",
      blocks:[
        {b:"table", head:["Scenario","Advice"], rows:[
          ["🔴 Acute (6 P's)","Sudden painful, pale, cold, numb or weak leg \u2014 999; the clock matters for saving the limb"],
          ["🟠 Rest pain","Foot pain at night/rest, eased by hanging it out of bed \u2014 contact us urgently"],
          ["🦶 Tissue loss","Any new ulcer, black area or non-healing wound on the foot \u2014 urgent review"],
          ["🚭 Smoking","Stopping smoking is the single most powerful thing you can do for the leg and your heart"]
        ]}
      ]},

    {t:"node", d:"refer", n:"7", tag:"Refer", title:"Vascular referral — how fast",
      blocks:[
        {b:"table", head:["Refer","Trigger"], rows:[
          ["Same-day / 999","Acute limb ischaemia (6 P's) \u2014 limb + life threatening"],
          ["Urgent vascular","Critical limb ischaemia: rest pain, ulceration, gangrene; ABPI <0.5"],
          ["Same-day MDT foot","Diabetic foot ulcer/infection with PAD"],
          ["Routine vascular","Lifestyle-limiting claudication despite supervised exercise + optimised risk factors (for revascularisation assessment)"]
        ]},
        {b:"say", html:"I'm keeping a close eye on the leg while we get the artery-protecting treatment and the walking programme working. The things that change the plan fast are pain at rest, any wound that won't heal, or a sudden cold painful leg \u2014 those go straight to the vascular team."}
      ]}
  ],
  foot:"Peripheral arterial disease in adults \u2014 NICE CG147, NG12 (foot/tissue-loss), CKS. Verify doses against the current BNF before prescribing."
});
</script>
