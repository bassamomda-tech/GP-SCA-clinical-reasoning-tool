<script>
MG.render({
  icon:"🧴",
  title:"Atopic Eczema — The Complete Guide",
  stemTitle:"Eczema made simple &mdash; drown it in emollient, match the steroid to the site, step up and down",
  stemSub:"One pathway: confirm the diagnosis, get the emollient dose and technique right (the treatment everyone under-does), pick topical steroid potency by SITE not just severity with fingertip-unit quantities, use calcineurin inhibitors to spare the face, recognise and treat the two infections (bacterial + eczema herpeticum), prevent flares with weekend therapy, and know the systemic/biologic ladder behind a dermatology referral. NICE CG57 \u00b7 CKS.",
  guideline:"NICE CG57 \u00b7 CKS",
  glance:[
    {lbl:"Base for all", val:"Emollient 250\u2013500g/wk", sub:"even when clear"},
    {lbl:"Dose steroids in", val:"Fingertip units", sub:"1 FTU = 2 adult palms"},
    {lbl:"Potency by", val:"SITE", sub:"mild on face, up limbs/trunk"},
    {lbl:"Face/flexure sparing", val:"Tacrolimus / pimecrolimus", sub:"no skin atrophy"},
    {lbl:"Emergency", val:"Eczema herpeticum", sub:"same-day aciclovir"},
    {lbl:"Refer for", val:"Dupilumab / JAK", sub:"TA534 / TA814"}
  ],
  flow:[

    {t:"node", d:"found", n:"1", tag:"Step 1 · confirm", title:"Confirm the diagnosis, grade severity + impact",
      blocks:[
        {b:"kv", rows:[
          ["Diagnosis (UK Working Party)","Itchy skin PLUS \u22653 of: visible flexural dermatitis (or cheeks/extensors if <18mo), personal history of flexural involvement, dry skin in last year, personal atopy (asthma/rhinitis \u2014 or 1st-degree relative if <4y), onset <2 years"],
          ["Grade severity","<b>Clear \u00b7 mild \u00b7 moderate \u00b7 severe</b> \u2014 AND the impact separately (POEM/DLQI, sleep loss, school/work days, mood): a small area can be severe by impact"],
          ["Triggers","Soaps/detergents, heat, wool/synthetics, stress, infection, aeroallergens (dust mite/pollen/pet), and \u2014 in poorly-controlled infants \u2014 food allergy (cow's milk, egg)"],
          ["Baseline","Map affected sites (drives potency choice), current products + actual quantities used, adherence, and steroid-phobia beliefs (ask directly \u2014 it's the top adherence barrier)"]
        ]},
        {b:"why", html:"Eczema is <strong>stepped care on an emollient base</strong>: emollients are the continuous treatment that reduces flares and steroid need \u2014 topical steroid potency steps up and down on top. The two commonest reasons for 'treatment failure' are <em>emollient under-use</em> and <em>steroid under-use from phobia</em> \u2014 both fixed by education, not escalation."},
        {b:"warn", html:"Not all eczema is atopic. Consider <b>contact dermatitis</b> (hands/occupational, sharp margins \u2192 patch testing), <b>discoid eczema</b>, <b>seborrhoeic</b> (scalp/face folds), <b>venous eczema</b> (lower legs + venous signs), and \u2014 the mimic to fear \u2014 <b>cutaneous T-cell lymphoma</b> in fixed, treatment-resistant 'eczema' in an adult."}
      ]},

    {t:"node", d:"life", n:"2", tag:"Step 2 · emollients", title:"Emollients — the treatment everyone under-doses",
      blocks:[
        {b:"tiles", v:"life", items:[
          {t:"🧴 Quantity", html:"Prescribe GENEROUSLY: ~250\u2013500g/week (adult), 250g/week (child) of a leave-on emollient. If a 500g tub lasts a month, they're not using enough."},
          {t:"⏱️ Frequency", html:"Apply at least BD and after washing \u2014 and continue when the skin is clear (this is what prevents flares). Smooth on in the direction of hair growth, don't rub."},
          {t:"🧼 Soap substitute", html:"Stop all soap/bubble bath/shower gel \u2014 use the emollient (or a dedicated wash) instead. Lukewarm, short baths; pat dry."},
          {t:"🥇 Order + gap", html:"Emollient first; wait ~15\u201330 min before the topical steroid so you don't dilute or spread it. Different products, different tubes."},
          {t:"🎯 Choose by preference", html:"Greasier ointments (e.g. 50:50, epaderm) hold moisture best but are less cosmetically acceptable \u2192 lighter creams/lotions by day, ointment at night. Adherence beats theory."},
          {t:"🔥 Fire risk", html:"Paraffin-based emollients on skin/dressings/clothing are a FIRE HAZARD \u2014 warn about naked flames, smoking, and that bedding/clothing can ignite even after washing."}
        ]},
        {b:"warn", html:"Pump dispensers or a clean spoon (not fingers into the tub) reduce bacterial contamination. Aqueous cream is <b>not</b> a good leave-on emollient (SLS content stings/irritates) \u2014 fine only as a brief wash-off if at all."}
      ]},

    {t:"node", d:"drug", n:"3", tag:"Step 3 · steroids", title:"Topical corticosteroids — potency by site, dosed in fingertip units",
      blocks:[
        {b:"table", head:["Potency","Named example","Where / when"], rows:[
          ["<b>Mild</b>","Hydrocortisone 1%","Face, flexures, infants; mild flares anywhere. Safe on the face short-term"],
          ["<b>Moderate</b>","Clobetasone butyrate 0.05% (Eumovate); betamethasone valerate 0.025%","Moderate flares on trunk/limbs; brief courses on face only if mild-potency fails"],
          ["<b>Potent</b>","Betamethasone valerate 0.1% (Betnovate); mometasone 0.1% (Elocon, OD); fluticasone 0.05%","Severe/lichenified eczema on trunk/limbs; hands & feet (thick skin). NOT routine on face"],
          ["<b>Very potent</b>","Clobetasol propionate 0.05% (Dermovate)","Specialist-guided; palms/soles, severe lichenification only"]
        ]},
        {b:"kv", rows:[
          ["Dose in fingertip units (FTU)","<b>1 FTU</b> (last finger crease to tip, from a 5mm nozzle) \u2248 0.5g \u2248 covers <b>2 adult palms</b> of skin. Face+neck ~2.5 FTU \u00b7 one arm ~3 \u00b7 one leg ~6 \u00b7 trunk front ~7 \u00b7 whole hand ~1. Apply <b>OD\u2013BD to active skin until clear + 48h</b>, then stop (emollient continues)"],
          ["Match potency to SITE not just severity","Thin skin (face, flexures, genitals, infants) \u2192 mild; thick skin (palms, soles, lichenified plaques) \u2192 potent. Same flare, different potency by body area"],
          ["Safety","Used correctly for flares, TCS are safe. Atrophy/striae/telangiectasia come from prolonged POTENT steroid on thin skin \u2014 not from appropriate courses. Counter steroid phobia explicitly or they'll under-treat"]
        ]},
        {b:"ladder", steps:[
          {step:"Add-on", title:"Topical calcineurin inhibitor (TCI)", when:"face/flexure or steroid-sparing",
           html:"<b>Tacrolimus 0.03% (child) / 0.1% (adult) ointment BD</b>, or pimecrolimus 1% cream (milder). No skin atrophy \u2192 ideal for face, eyelids, flexures, or where steroids are being over-relied on. Warn of transient stinging/burning first few days; advise sun protection. 2nd-line (after TCS) per licence."},
          {step:"Itch/sleep", title:"Short-term sedating antihistamine", when:"sleep wrecked by itch during a flare",
           fromLabel:"acute flare only",
           html:"<b>Chlorphenamine or hydroxyzine</b> at night, SHORT courses only. <b>Non-sedating antihistamines are NOT routinely recommended</b> (eczema itch is not histamine-driven) \u2014 they don't help the eczema."},
          {step:"Maintenance", title:"'Weekend' (proactive) therapy", when:"frequent flares at the same sites",
           fromLabel:"\u22652\u20133 flares/month at recurrent spots",
           html:"Once control achieved, apply the TCS (or tacrolimus) to those recurrent sites on <b>2 consecutive days per week</b> while continuing daily emollient \u2014 halves flare frequency and total steroid used."}
        ]},
        {b:"warn", html:"<b>Bandaging/wet wraps</b> (occlusion) increase potency and absorption \u2014 initiate with specialist/nurse guidance, and never over infected skin. Review potent-TCS quantity in children (growth) but reassure appropriate use is safe."}
      ]},

    {t:"node", d:"safety", n:"4", tag:"Step 4 · infection", title:"The two infections — bacterial and the emergency",
      blocks:[
        {b:"table", head:["Infection","Recognise","Action"], rows:[
          ["<b>Bacterial (Staph/Strep)</b>","Weeping, golden crusting, pustules, rapid worsening, failure to respond","<b>Flucloxacillin</b> (clarithromycin/erythromycin if penicillin-allergic) 5\u20137 days ONLY if unwell/spreading \u2014 NICE NG190: don't routinely swab or treat colonised eczema. Optimise TCS + emollient; swab if recurrent/not responding"],
          ["<b>Eczema herpeticum</b> (HSV) \u2014 EMERGENCY","Rapidly worsening, PAINFUL eczema; clustered <b>monomorphic punched-out</b> erosions/vesicles; fever/malaise; not responding to steroids","<b>Same-day:</b> oral (or IV if unwell/widespread) <b>aciclovir</b> + urgent dermatology; <b>same-day ophthalmology if near the eye</b> (sight-threatening). Don't wait for swabs"]
        ]},
        {b:"warn", html:"A painful, rapidly spreading flare that isn't responding to steroids is eczema herpeticum until proven otherwise \u2014 pain + monomorphic punched-out lesions are the giveaway (bacterial infection is crusted/weepy and less painful). Missing it risks disseminated HSV and, periocularly, blindness."}
      ]},

    {t:"node", d:"monitor", n:"5", tag:"Step 5 · review", title:"Review — control, quantities, growth",
      blocks:[
        {b:"table", head:["What","When","Action"], rows:[
          ["Control + flare frequency + impact","Each review (POEM)","Step potency up/down; add weekend therapy if frequent flares"],
          ["Emollient QUANTITY on repeat","Each review","Check the actual amount dispensed \u2014 under-use is the #1 failure; re-prescribe 250\u2013500g/wk generously"],
          ["TCS potency vs site + steroid phobia","Each review","Right potency for the area; re-teach FTU; re-address phobia (drives under-treatment)"],
          ["Technique + adherence","Each review","Emollient-then-steroid order, frequency, soap substitute actually stopped?"],
          ["Growth (children on potent/extensive TCS)","Periodically","Monitor height/weight; reassure appropriate use is safe \u2014 the eczema harms growth/sleep more than the steroid"]
        ]},
        {b:"say", html:"There are two treatments and they do different jobs. The moisturiser is the one that keeps the eczema away \u2014 use loads, every day, even when the skin looks perfect. The steroid cream is the firefighter \u2014 a good layer on the angry patches until they settle and a couple of days after, then stop. Used that way the steroid is safe; the mistake most people make is using too little of both."}
      ]},

    {t:"loop", icon:"🔁", title:"Not controlled? Run this BEFORE escalating",
      arrow:"\u2026it's rarely 'stronger drugs needed'",
      intro:"Most uncontrolled eczema is emollient under-use, steroid phobia, or unrecognised infection.",
      checks:[
        {b:"1 · Emollient dose", html:"Genuinely 250\u2013500g/week, often, including when clear? (Check the repeat quantity, not what they say.)"},
        {b:"2 · Steroid phobia", html:"Under-treating flares from fear? Using too-mild a potency for the site? Re-teach FTU + safety."},
        {b:"3 · Infection", html:"Weeping/crusting (bacterial) or painful punched-out lesions (herpeticum)? Treat before escalating."},
        {b:"4 · Triggers + contact", html:"Soap still in use? Occupational/hand pattern → think contact dermatitis + patch testing. Food allergy in a poorly-controlled infant."},
        {b:"5 · Right diagnosis?", html:"Fixed, single-site, treatment-resistant 'eczema' in an adult → biopsy (cutaneous T-cell lymphoma). Annular → tinea (do skin scrapings; steroids worsen it)."},
        {b:"6 · Escalate", html:"Optimal topical care + still severe/uncontrolled → dermatology (phototherapy / systemic / biologic)."}
      ],
      back:"Emollient + technique + infection + triggers + diagnosis all addressed → refer dermatology"},

    {t:"node", d:"safety", n:"6", tag:"Safety-net", title:"What the patient must know",
      blocks:[
        {b:"tiles", v:"safety", items:[
          {t:"🔴 Eczema herpeticum", html:"\u201cRapidly spreading, PAINFUL eczema with clusters of little blisters or punched-out sores, feeling unwell \u2014 same-day help; near the eye, that's urgent.\u201d"},
          {t:"🟠 Infected eczema", html:"\u201cWeeping, golden crusting or pustules with the skin getting worse fast \u2014 contact us; it may need an antibiotic.\u201d"},
          {t:"🧴 Never stop the moisturiser", html:"\u201cKeep it going every day even when clear \u2014 stopping is what brings the flare back.\u201d"},
          {t:"🔥 Fire safety", html:"\u201cMoisturisers soak into clothes and bedding and can catch fire \u2014 keep away from flames and don't smoke near them.\u201d"}
        ]}
      ]},

    {t:"node", d:"refer", n:"7", tag:"Refer", title:"Dermatology — and the systemic ladder behind it",
      blocks:[
        {b:"tiles", v:"refer", items:[
          {t:"Same day", html:"Eczema herpeticum → dermatology (+ ophthalmology if periocular); severe erythroderma."},
          {t:"Urgent / soon", html:"Severe eczema not controlled by optimal topical therapy; psychological/social impact severe; recurrent serious infections."},
          {t:"Routine", html:"Diagnostic doubt or suspected contact allergy → patch testing; failure of moderate potency + TCI; frequent flares needing maintenance review."},
          {t:"What secondary care adds", html:"Phototherapy (narrowband UVB); systemic immunosuppression \u2014 ciclosporin (fastest), methotrexate, azathioprine, mycophenolate; then <b>dupilumab (TA534)</b> and oral <b>JAK inhibitors \u2014 abrocitinib/upadacitinib/baricitinib (TA814)</b> for moderate\u2013severe disease failing systemics."},
          {t:"Children + food allergy", html:"Moderate\u2013severe infant eczema uncontrolled despite optimal topical care + suspected food trigger → paediatric/allergy (not blanket exclusion diets)."}
        ]},
        {b:"say", html:"I'm sending you to the skin team \u2014 not because we've run out of options, but because the next treatments (light therapy, tablets that calm the immune system, or the newer targeted injections and tablets) are theirs to start and monitor. The emollient-and-steroid routine carries on throughout."}
      ]}
  ],
  foot:"Atopic eczema in primary care \u2014 NICE CG57, NG190 (infection), TA534 (dupilumab), TA814 (JAK inhibitors), CKS. Verify doses and potencies against the current BNF/BNFc before prescribing."
});
</script>
