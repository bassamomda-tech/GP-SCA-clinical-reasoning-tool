<script>
MG.render({
  icon:"🩸",
  title:"Lipids & Hypercholesterolaemia — The Complete Guide",
  stemTitle:"Lipids made simple &mdash; QRISK sets who, atorvastatin sets the start, the 40% drop sets success",
  stemSub:"One pathway: decide primary vs secondary prevention, screen for familial hypercholesterolaemia, use QRISK3 with the shared decision, start the right atorvastatin dose, chase the target by the 40% non-HDL fall (not chasing LDL blindly), manage the myalgia that makes people quit without abandoning statins, and climb ezetimibe \u2192 injectables when needed. NICE NG238 \u00b7 CKS.",
  guideline:"NICE NG238 (2023)",
  glance:[
    {lbl:"Primary prevention", val:"QRISK3 \u226510%", sub:"atorvastatin 20mg"},
    {lbl:"Secondary (known CVD)", val:"Atorvastatin 80mg", sub:"no QRISK needed"},
    {lbl:"Success", val:"non-HDL \u2193\u226540%", sub:"at 2\u20133 months"},
    {lbl:"CKD / T1DM / >40 T2DM", val:"Atorvastatin 20mg", sub:"risk-independent"},
    {lbl:"Think FH", val:"TC >7.5 / LDL >4.9", sub:"+ FHx early CVD"},
    {lbl:"Next steps", val:"Ezetimibe \u2192 PCSK9i/inclisiran", sub:"if target missed"}
  ],
  flow:[

    {t:"node", d:"found", n:"1", tag:"Step 1 · frame it", title:"Primary vs secondary — and screen for FH first",
      blocks:[
        {b:"kv", rows:[
          ["Secondary prevention","<b>Established CVD</b> (MI/ACS, angina, stroke/TIA, PAD, coronary revascularisation) \u2192 <b>high-intensity statin for everyone, no QRISK needed</b> \u2014 the risk is already realised"],
          ["Primary prevention","No established CVD \u2192 estimate 10-year risk with <b>QRISK3</b> and decide by shared decision"],
          ["<b>Screen for Familial Hypercholesterolaemia</b>","<b>Total cholesterol >7.5 or LDL >4.9</b> (or a tendon xanthoma, or premature CVD) \u2192 think FH: use Simon Broome / DLCN criteria, check for FHx of early CVD (<60), and <b>don't put the raised cholesterol through QRISK</b> (it underestimates FH). Refer for genetic testing + cascade screening of relatives"],
          ["Baseline before starting","Non-fasting <b>full lipid profile</b> (total, HDL, non-HDL, triglycerides), <b>LFTs</b> (transaminases), <b>HbA1c</b>, U&E/eGFR, TFTs, and <b>consider secondary causes</b> of dyslipidaemia (hypothyroidism, diabetes, alcohol, nephrotic, cholestasis, drugs) \u2014 treat those too"],
          ["Very high triglycerides","<b>>20 mmol/L</b> \u2192 pancreatitis risk, urgent specialist + fibrate/lifestyle; 10\u201320 \u2192 repeat fasting, address cause"]
        ]},
        {b:"why", html:"Three questions frame every lipid consult: <strong>(1) already got CVD?</strong> (secondary \u2192 treat hard) <strong>(2) is this FH?</strong> (the raised number is genetic, not lifestyle \u2014 QRISK misses it, relatives are at risk) <strong>(3) if neither, what's the 10-year risk?</strong> (QRISK3 + shared decision). Getting the frame right prevents both under-treating the high-risk and medicalising the low-risk."}
      ]},

    {t:"node", d:"life", n:"2", tag:"Step 2 · risk & lifestyle", title:"QRISK3, the conversation, and lifestyle",
      blocks:[
        {b:"kv", rows:[
          ["QRISK3 \u226510% (10-year)","Offer atorvastatin 20mg \u2014 a shared decision, not automatic. Discuss absolute benefit (e.g. events prevented per 100 over 10y), side effects, and that it's long-term"],
          ["QRISK <10%","Lifestyle + address modifiable factors; statin still reasonable after informed discussion if the patient prioritises risk reduction (NG238 allows it) \u2014 QRISK under-estimates in some (severe mental illness, HIV, autoimmune, recently stopped smoking)"],
          ["Age >85 / frailty","QRISK less reliable; individualise \u2014 statins still reduce events but weigh polypharmacy/frailty"],
          ["The number isn't everything","Family history, ethnicity, and 'risk-enhancers' (already in QRISK3: SLE, severe mental illness, steroids, AF, migraine, CKD) shift the decision"]
        ]},
        {b:"tiles", v:"life", items:[
          {t:"🥗 Diet", html:"Mediterranean pattern; reduce saturated fat, refined carbs; ↑fibre, oily fish, plant sterols. Modest LDL effect but real CV benefit."},
          {t:"🏃 Exercise + weight", html:"150 min/week; weight loss improves triglycerides + HDL most."},
          {t:"🚭 Smoking", html:"The biggest single modifiable CV lever — and QRISK drops fast after quitting."},
          {t:"🍺 Alcohol", html:"Excess raises triglycerides — a common reversible cause of a 'bad' profile."}
        ]}
      ]},

    {t:"node", d:"drug", n:"3", tag:"Step 3 · statin", title:"Start the right statin dose — high vs moderate intensity",
      blocks:[
        {b:"table", head:["Indication","Statin","Intensity"], rows:[
          ["<b>Secondary prevention</b> (established CVD)","<b>Atorvastatin 80mg</b> (reduce if interactions/frailty/CKD)","High"],
          ["<b>Primary prevention</b>, QRISK \u226510%","<b>Atorvastatin 20mg</b>","High"],
          ["CKD (eGFR <60) primary prevention","<b>Atorvastatin 20mg</b> \u2192 up to 80mg (avoid high-dose simvastatin in CKD)","High"],
          ["Type 1 diabetes","<b>Atorvastatin 20mg</b> if >40y, DM >10y, nephropathy, or other risk factors","High"],
          ["Type 2 diabetes","<b>Atorvastatin 20mg</b> if QRISK \u226510% (most >40y qualify)","High"]
        ]},
        {b:"kv", rows:[
          ["High- vs moderate-intensity","'High-intensity' = \u226540% LDL reduction (atorvastatin 20\u201380, rosuvastatin 10\u201340). Atorvastatin is first-line \u2014 potent, once-daily any time, fewer interactions than simvastatin"],
          ["Interactions","Simvastatin + amlodipine/diltiazem/verapamil, macrolides, azoles, some HIV drugs \u2192 dose caps or myopathy \u2014 atorvastatin is cleaner; check for the classic clarithromycin/statin clash (hold statin during a macrolide course)"],
          ["Grapefruit","Relevant to simvastatin/atorvastatin at high intake \u2014 usually a non-issue in practice, but counsel heavy consumers"]
        ]},
        {b:"warn", html:"<b>Statins in pregnancy:</b> stop before conception and during pregnancy/breastfeeding (discuss with any woman of childbearing potential). <b>Not</b> a reason to withhold in someone not planning pregnancy \u2014 but plan the pause."}
      ]},

    {t:"node", d:"monitor", n:"4", tag:"Step 4 · chase target", title:"Success = a 40% fall in non-HDL — check at 2–3 months",
      blocks:[
        {b:"table", head:["Check","When","Action"], rows:[
          ["Non-HDL cholesterol","<b>2\u20133 months</b> after starting/changing","<b>Aim \u226540% reduction from baseline non-HDL.</b> Not achieved \u2192 check adherence + lifestyle \u2192 uptitrate \u2192 add ezetimibe"],
          ["LFTs (transaminases)","Baseline, 3 months, 12 months","Only stop if ALT/AST >3\u00d7 ULN; mild rises are common + not a reason to stop"],
          ["Secondary-prevention targets (NG238 2023)","On treatment","Aim <b>LDL \u22642.0 or non-HDL \u22642.6 mmol/L</b> \u2014 escalate (ezetimibe \u00b1 injectable) if not met"],
          ["HbA1c","If risk","Statins slightly raise diabetes risk \u2014 benefit outweighs; monitor in the at-risk"],
          ["Adherence","Every review","The commonest reason for 'not at target' \u2014 explore beliefs, myalgia, dosing"]
        ]},
        {b:"why", html:"NG238 (2023) sharpened the goal: aim for <strong>LDL \u22642.0 / non-HDL \u22642.6 in secondary prevention</strong> and escalate to hit it, rather than 'fire-and-forget' 80mg. Non-HDL is the better target than LDL (no fasting needed, captures all atherogenic particles). The 40% drop confirms the statin is actually working and being taken."}
      ]},

    {t:"node", d:"drug", n:"5", tag:"Step 5 · not at target", title:"The escalation ladder — ezetimibe → injectables",
      blocks:[
        {b:"ladder", steps:[
          {step:"1st", title:"Maximise / confirm the statin", when:"target missed",
           html:"Uptitrate to the highest tolerated intensity; <b>confirm adherence honestly</b> (half of 'statin failure' is non-adherence) and re-address any myalgia (Step 6) before adding drugs."},
          {step:"2nd", title:"Add ezetimibe 10mg OD", when:"still above target on max statin",
           fromLabel:"or as monotherapy if statin-intolerant",
           html:"Cheap, well-tolerated, ~15\u201320% further LDL drop. First add-on, and the default in true statin intolerance. Also a fixed-dose combo tablet for adherence."},
          {step:"3rd", title:"Injectables — PCSK9i or inclisiran", when:"target still missed at specialist thresholds",
           fromLabel:"lipid clinic",
           html:"<b>PCSK9 inhibitors (alirocumab/evolocumab, TA393/TA394)</b> or <b>inclisiran (TA733, twice-yearly siRNA)</b> \u2014 for secondary prevention or FH with LDL persistently above NICE thresholds despite max tolerated statin + ezetimibe. Refer per local pathway."},
          {step:"Alt", title:"Bempedoic acid / other", when:"statin-intolerant + not at target on ezetimibe",
           fromLabel:"specialist add-on",
           html:"Bempedoic acid (+ ezetimibe combo) for statin-intolerant patients; fibrates for severe hypertriglyceridaemia (pancreatitis prevention), not routine for cholesterol."}
        ]}
      ]},

    {t:"node", d:"safety", n:"6", tag:"Step 6 · myalgia", title:"Statin muscle symptoms — the #1 quit reason, mostly fixable",
      blocks:[
        {b:"kv", rows:[
          ["The reality","True statin myopathy is RARE; most 'statin muscle pain' is non-specific and often nocebo (SAMSON trial: most symptoms occur equally on placebo). Don't abandon a life-saving drug on the first ache"],
          ["<b>Check CK + red flags</b>","Severe pain/weakness or dark urine \u2192 <b>CK</b>: >10\u00d7 ULN or rhabdomyolysis features \u2192 STOP + urgent. Modest aches with normal/mildly raised CK \u2192 work through the options below"],
          ["The rechallenge approach","Stop 2\u20134 weeks \u2192 do symptoms actually resolve? \u2192 rechallenge same or lower dose, or a different statin, or alternate-day/twice-weekly rosuvastatin/atorvastatin \u2014 most 'intolerant' patients tolerate SOME statin"],
          ["Check the amplifiers","Vitamin D deficiency, hypothyroidism, drug interactions (see Step 3), new exercise, alcohol \u2014 fix these before declaring intolerance"],
          ["True intolerance","Documented failure of \u22652\u20133 statins including low-dose attempts \u2192 ezetimibe \u00b1 bempedoic acid \u00b1 injectables (Step 5). Don't just leave them on nothing"]
        ]},
        {b:"warn", html:"<b>Nocebo is real but so is the CV benefit.</b> Frame statins positively (the evidence is overwhelming), warn proportionately, and treat myalgia as a problem to solve \u2014 not a reason to leave a secondary-prevention patient unprotected."}
      ]},

    {t:"loop", icon:"🔁", title:"Not at target? Work through this before escalating",
      arrow:"\u2026adherence first, always",
      checks:[
        {b:"1 · Adherence", html:"Actually taking it? Explore myalgia beliefs, nocebo, dosing confusion — half of 'failure' is here."},
        {b:"2 · The 40% test", html:"Non-HDL fallen ≥40%? If not on a supposedly-taken high-intensity statin, suspect non-adherence or interaction."},
        {b:"3 · Secondary cause", html:"Untreated hypothyroidism, uncontrolled diabetes, alcohol, nephrotic — treat the driver."},
        {b:"4 · Is it FH?", html:"Very high baseline + FHx → genetic cause, needs specialist + cascade screening, higher-intensity targets."},
        {b:"5 · Myalgia handled?", html:"Rechallenge/alternate-day tried, amplifiers fixed — or written off too soon?"},
        {b:"6 · Escalate", html:"Genuinely maxed + adherent + still above target → ezetimibe → injectable pathway."}
      ],
      back:"Adherent + optimised + still above target → ezetimibe / lipid clinic"},

    {t:"node", d:"safety", n:"7", tag:"Safety-net", title:"What the patient must know",
      blocks:[
        {b:"tiles", v:"safety", items:[
          {t:"🔴 Rare but urgent", html:"\u201cSevere muscle pain or weakness with dark (cola-coloured) urine \u2014 stop the statin and contact us the same day.\u201d"},
          {t:"💊 Aches", html:"\u201cMild aches are usually not the statin and usually settle \u2014 tell us rather than just stopping; we can adjust, not abandon.\u201d"},
          {t:"🤰 Pregnancy", html:"\u201cStop statins if you might become pregnant and tell us you're planning \u2014 we pause them beforehand.\u201d"},
          {t:"🧬 Family", html:"\u201cIf your cholesterol is very high and runs in the family, your relatives should be tested too \u2014 it can be an inherited condition.\u201d"}
        ]}
      ]},

    {t:"node", d:"refer", n:"8", tag:"Refer", title:"Lipid clinic and specialist input",
      blocks:[
        {b:"tiles", v:"refer", items:[
          {t:"Suspected FH", html:"TC >7.5 / LDL >4.9 + FHx early CVD, or tendon xanthomata → genetic testing + cascade screening; children of FH patients."},
          {t:"Not at target", html:"Secondary prevention or FH above NICE LDL thresholds despite max statin + ezetimibe → PCSK9i / inclisiran assessment."},
          {t:"Statin intolerance", html:"≥2–3 documented failures needing bempedoic acid / injectable pathway."},
          {t:"Severe hypertriglyceridaemia", html:">10–20 mmol/L (pancreatitis risk) → urgent specialist + fibrate/lifestyle."},
          {t:"Diagnostic doubt", html:"Mixed/secondary dyslipidaemia not responding, or unusual patterns."}
        ]},
        {b:"say", html:"Cholesterol treatment is about the long game \u2014 lowering your risk of a heart attack or stroke years down the line. The statin does most of the work; we check a blood test in a couple of months to prove it's working (a 40% drop is the goal), and if muscle aches bother you we adjust rather than give up \u2014 there's almost always a version you can tolerate."}
      ]}
  ],
  foot:"Lipid management & hypercholesterolaemia in adults \u2014 NICE NG238 (2023), CG71 (FH), TA393/394/733 (injectables) and CKS. Verify doses against the current BNF before prescribing."
});
</script>
