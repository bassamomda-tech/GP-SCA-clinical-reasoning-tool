MG.render({

  title:"Irritable Bowel Syndrome",
  stemTitle:"Confirmed IBS — ongoing management",
  stemSub:"Primary-care management of diagnosed IBS \u2014 diet and lifestyle first, symptom-targeted drugs by subtype, the low-FODMAP and psychological options for refractory disease \u2014 with the red-flag safety net. NICE CG61 \u00b7 CKS 2026.",
  guideline:"NICE CG61",
  glance:[
    {lbl:"Diagnosis", val:"Clinical", sub:"+ exclude organic"},
    {lbl:"Must check", val:"Coeliac + calprotectin", sub:"FBC/CRP"},
    {lbl:"First-line", val:"Diet & lifestyle", sub:"fibre by subtype"},
    {lbl:"Pain", val:"Antispasmodic", sub:"\u00b1 low-dose TCA"},
    {lbl:"Refractory", val:"Low-FODMAP", sub:"dietitian-led"},
    {lbl:"Refer", val:"Red flags", sub:"2-week-wait"}
  ],
  flow:[
    {t:"node", d:"found", n:"1", tag:"Foundation", title:"Confirm IBS and its subtype",
      blocks:[
        {b:"kv", rows:[
          ["Diagnosis","Abdominal pain related to defecation + altered stool form/frequency \u2265 6 months, with bloating/mucus"],
          ["Exclude organic","FBC, CRP/ESR, <b>coeliac serology</b>, <b>faecal calprotectin</b> (IBD); CA125 if ovarian concern"],
          ["Subtype","IBS-C (constipation), IBS-D (diarrhoea), IBS-M (mixed) \u2014 directs drug choice"],
          ["Red flags","See safety-net \u2014 must be absent to confidently diagnose IBS"]
        ]},
        {b:"why", html:"IBS is a positive clinical diagnosis once red flags and key mimics (coeliac disease, IBD) are excluded \u2014 calprotectin and coeliac serology are the two tests that most change management. Subtyping matters because the same diagnosis needs opposite treatments (a laxative vs an antidiarrhoeal)."}
      ]},
    {t:"node", d:"life", n:"2", tag:"Non-drug \u00b7 first-line", title:"Diet, lifestyle and the gut\u2013brain link",
      blocks:[
        {b:"tiles", v:"life", items:[
          {t:"🍽️ Regular meals", html:"Regular eating pattern; don\u2019t skip or rush meals; adequate fluid."},
          {t:"☕ Limit triggers", html:"Reduce caffeine, alcohol, fizzy drinks, fatty/processed foods, sweeteners (sorbitol)."},
          {t:"🌾 Fibre by subtype", html:"<b>Soluble</b> fibre (ispaghula) for IBS-C; <b>reduce insoluble</b> fibre (bran) for IBS-D/bloating."},
          {t:"🦠 Probiotics", html:"A trial for \u22654 weeks if the patient wishes \u2014 discontinue if no benefit."},
          {t:"🏃 Activity & stress", html:"Physical activity; address stress \u2014 a strong symptom driver."},
          {t:"🥗 Low-FODMAP", html:"If symptoms persist \u2014 a structured low-FODMAP diet, ideally dietitian-led."}
        ]}
      ]},
    {t:"node", d:"drug", n:"3", tag:"Medication \u00b7 symptom-targeted", title:"Treat the dominant symptom",
      blocks:[
        {b:"ladder", steps:[
          {step:"Symptom", title:"First-line by symptom", when:"antispasmodic / laxative / loperamide",
           html:"<b>Pain/spasm:</b> antispasmodic (<b>mebeverine 135 mg TDS</b>, <b>hyoscine butylbromide 10\u201320 mg TDS</b>, or <b>peppermint oil 1\u20132 capsules TDS</b>). <b>Constipation:</b> a laxative (<b>avoid lactulose</b> \u2014 bloating). <b>Diarrhoea:</b> <b>loperamide 2 mg</b> titrated to response."},
          {step:"Step 2", title:"Low-dose amitriptyline", when:"second-line for pain",
           fromLabel:"persistent pain despite first-line",
           html:"Low-dose tricyclic (off-label) as a gut neuromodulator; counsel on drowsiness/anticholinergic effects."},
          {step:"Step 3", title:"SSRI / specialist agents", when:"if TCA ineffective",
           fromLabel:"still symptomatic",
           html:"Consider a low-dose neuromodulator (<b>amitriptyline 10 mg at night</b>, titrate) or an SSRI. For refractory IBS-C, <b>linaclotide 290 micrograms OD</b>; refractory IBS-D, specialist options."}
        ]},
        {b:"why", html:"There is no single \u2018IBS drug\u2019 \u2014 you treat the dominant symptom, and add a low-dose neuromodulator (TCA/SSRI) for persistent pain because it dampens visceral hypersensitivity. Lactulose is avoided because its fermentation worsens the very bloating IBS patients complain of."}
      ]},
    {t:"node", d:"monitor", n:"4", tag:"Monitoring", title:"Response and red flags",
      blocks:[
        {b:"table", head:["What","When","Action"], rows:[
          ["Symptom response","Each review","Adjust diet/drug by subtype; stop ineffective drugs"],
          ["Red flags","Ongoing","New alarm feature \u2192 investigate / refer"],
          ["FODMAP / probiotic trials","After ~4\u20138 weeks","Continue only if benefit; involve dietitian"],
          ["Mood / stress","As needed","Treat comorbid anxiety/depression; consider psychological therapy"]
        ]}
      ]},
    {t:"node", d:"follow", n:"5", tag:"Follow-up", title:"Review schedule",
      blocks:[
        {b:"timeline", items:[
          {n:"1", when:"After diet + first-line drug", title:"Response review", html:"Reassess symptoms, adherence, triggers; adjust by subtype."},
          {n:"2", when:"If persistent", title:"Escalate non-drug", html:"Dietitian-led low-FODMAP, add neuromodulator, consider psychological therapy."},
          {n:"3", when:"Periodic", title:"Reassess", html:"Confirm diagnosis still fits; re-screen red flags; manage as a long-term relapsing condition."}
        ]}
      ]},
    {t:"loop", icon:"🔁", title:"Not responding? Re-think before escalating",
      arrow:"\u2026if symptoms persist",
      intro:"Persistent symptoms warrant revisiting diagnosis and drivers.",
      checks:[
        {b:"1 \u00b7 Red flags / mimics", html:"Re-screen; confirm coeliac and calprotectin done."},
        {b:"2 \u00b7 Subtype", html:"Has treatment been matched to the current dominant symptom?"},
        {b:"3 \u00b7 Diet", html:"Structured low-FODMAP via a dietitian (not unsupervised exclusion)."},
        {b:"4 \u00b7 Psychological", html:"Stress, anxiety, prior trauma \u2014 CBT / gut-directed therapy for refractory IBS."},
        {b:"5 \u00b7 Drug trial", html:"Adequate trial of antispasmodic \u00b1 neuromodulator before declaring failure."}
      ],
      back:"Mimics excluded, diet + neuromodulator tried \u2192 psychological therapy / refer"},
    {t:"node", d:"safety", n:"6", tag:"Safety-net", title:"Safety-netting",
      blocks:[
        {b:"tiles", v:"safety", items:[
          {t:"🔴 Alarm features", html:"\u201cBleeding from the back passage, unintentional weight loss, a tummy or back-passage lump, or new symptoms over 60 \u2014 come back; we\u2019ll investigate.\u201d"},
          {t:"🟠 Nocturnal / progressive", html:"\u201cSymptoms that wake you at night, or steadily worsening, need re-checking.\u201d"},
          {t:"🩸 Anaemia", html:"\u201cIf you feel increasingly tired or look pale, we\u2019ll check your blood count.\u201d"},
          {t:"🧠 It\u2019s real", html:"\u201cIBS is a genuine condition, not \u2018in your head\u2019 \u2014 but stress can flare it, so we treat both.\u201d"}
        ]}
      ]},
    {t:"node", d:"refer", n:"7", tag:"Refer to secondary care", title:"When to refer",
      arrow:"red flags urgently; refractory routinely",
      blocks:[
        {b:"tiles", v:"refer", items:[
          {t:"2-week-wait", html:"Alarm features (PR bleeding, weight loss, mass, anaemia, change in habit \u2265 60) \u2192 suspected-cancer pathway."},
          {t:"Refractory", html:"Symptoms unresponsive to optimal diet, drugs and psychological therapy."},
          {t:"Diagnostic doubt", html:"Atypical features, raised calprotectin (IBD), or positive coeliac serology \u2192 gastroenterology."},
          {t:"Severe impact", html:"Major psychological comorbidity or quality-of-life impact."}
        ]},
        {b:"say", html:"Your tests rule out the serious causes, which is reassuring. IBS is real and manageable \u2014 we\u2019ll work on diet and the dominant symptom, and if needed a dietitian and a gut-calming medication. Tell me if any of the warning signs I mentioned appear."}
      ]}
  ]

</script>
