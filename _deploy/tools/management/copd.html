<script>
MG.render({
  icon:"🫁",
  title:"COPD — The Complete Guide",
  stemTitle:"COPD made simple &mdash; confirm, grade, treat the trait, rescue, refer",
  stemSub:"One pathway: confirm with post-bronchodilator spirometry and the full diagnostic work-up, grade severity and symptom burden, do the high-value non-drug work first, climb the inhaler ladder by phenotype (the 'two Es'), manage exacerbations with exact rescue doses, de-escalate ICS when it isn't earning its pneumonia risk, and know the LTOT and referral triggers. NICE NG115 \u00b7 GOLD.",
  guideline:"NICE NG115 \u00b7 GOLD 2025",
  glance:[
    {lbl:"Diagnose", val:"FEV\u2081/FVC <0.7", sub:"POST-bronchodilator"},
    {lbl:"#1 lever", val:"Stop smoking", sub:"only disease-modifier"},
    {lbl:"First inhaler", val:"LAMA or LABA+LAMA", sub:"by symptom burden"},
    {lbl:"Add ICS if", val:"The two Es", sub:"Exacerbations + Eos \u22650.3"},
    {lbl:"Rescue pack", val:"Pred 30mg \u00d75d", sub:"\u00b1 5-day antibiotic"},
    {lbl:"LTOT trigger", val:"SpO\u2082 \u226492%", sub:"stable \u2014 refer to assess"}
  ],
  flow:[

    {t:"node", d:"found", n:"1", tag:"Step 1 · confirm", title:"Diagnose properly — spirometry plus the work-up",
      blocks:[
        {b:"kv", rows:[
          ["The test","<b>Post-bronchodilator FEV\u2081/FVC <0.70</b> in a symptomatic patient with a risk factor (\u226535, smoker/ex-smoker, occupational dust/fume). No reversibility testing routinely needed \u2014 clinical features separate asthma"],
          ["At diagnosis, everyone gets","<b>CXR</b> (exclude cancer \u2014 NG12: unexplained cough/haemoptysis/weight loss in a smoker), <b>FBC</b> (anaemia/polycythaemia + <b>baseline eosinophils</b>), <b>BMI</b>, MRC + CAT score"],
          ["Selected patients","<b>\u03b1\u2081-antitrypsin</b> if <40y, minimal smoking, or FHx; sputum culture if persistently purulent; ECG/BNP if cor pulmonale suspected; CT if bronchiectasis/fibrosis/cancer suspected"],
          ["Severity (FEV\u2081 % predicted)","Stage 1 \u226580% (needs symptoms) \u00b7 2: 50\u201379% \u00b7 3: 30\u201349% \u00b7 4: <30%"],
          ["MRC dyspnoea scale","1 strenuous only \u00b7 2 hurrying/hills \u00b7 3 slower than peers on flat \u00b7 4 stops after 100m \u00b7 5 housebound/breathless dressing"]
        ]},
        {b:"why", html:"The two commonest diagnostic errors: labelling COPD on <em>pre</em>-bronchodilator spirometry (over-diagnoses), and never re-questioning an old label that arrived without spirometry at all (a third of 'COPD' on registers). If the record has no post-bronchodilator ratio, get one."},
        {b:"warn", html:"Asthma\u2013COPD distinction matters because it flips the inhaler logic: <b>asthmatic features / previous asthma / eosinophilia / big variability \u2192 ICS is essential</b> (treat as asthma with fixed obstruction), whereas in pure COPD, ICS is a targeted add-on with a pneumonia cost."}
      ]},

    {t:"node", d:"life", n:"2", tag:"Step 2 · the big four", title:"Non-drug treatment outperforms the inhalers",
      blocks:[
        {b:"tiles", v:"life", items:[
          {t:"🚭 1 · Smoking cessation", html:"The ONLY thing that slows FEV\u2081 decline. Offer at every contact: varenicline/cytisinicline, NRT combo, vaping as a quit tool per local policy + behavioural support."},
          {t:"🏃 2 · Pulmonary rehab", html:"Refer <b>MRC \u22653</b> (and after any admission). Improves breathlessness, exercise capacity and readmission more than any inhaler step-up. Sell it like a drug: 'the treatment with the best evidence'."},
          {t:"💉 3 · Vaccines", html:"Annual flu \u00b7 pneumococcal (PPV23 once) \u00b7 COVID per schedule \u00b7 RSV if eligible."},
          {t:"📝 4 · Self-management plan", html:"Written plan + rescue pack for suitable patients (Step 5); early-recognition education; anxiety/breathing techniques."},
          {t:"🍽️ Nutrition", html:"Low BMI/cachexia = poor prognosis \u2192 dietitian + supplements; obesity worsens breathlessness \u2192 weight support."},
          {t:"🌬️ Technique", html:"Observed inhaler technique at every review; match device to inspiratory ability (weak inhale \u2192 MDI+spacer or soft-mist, not DPI)."}
        ]}
      ]},

    {t:"node", d:"drug", n:"3", tag:"Step 3 · inhalers", title:"The ladder — treat the trait, not the FEV\u2081",
      blocks:[
        {b:"p", html:"Everyone gets a short-acting reliever. The first regular inhaler depends on <strong>symptom burden</strong>; adding ICS depends on the <strong>'two Es' — Exacerbations (\u22652/yr or 1 admission) and Eosinophils (\u22650.3)</strong> or asthmatic features. Review any change at 8\u201312 weeks."},
        {b:"ladder", steps:[
          {step:"All", title:"Short-acting reliever PRN", when:"everyone",
           html:"<b>Salbutamol 100mcg 1\u20132 puffs PRN</b> (+ spacer) or ipratropium 20\u201340mcg QDS (stop SAMA when a LAMA starts \u2014 don't double anticholinergics)."},
          {step:"Step A", title:"LAMA — lower symptom burden", when:"MRC 1\u20132 / CAT <10, \u22641 exacerbation",
           fromLabel:"first regular inhaler",
           html:"<b>Tiotropium</b> (Spiriva\u00ae Respimat 2 puffs OD / Tiogiva\u00ae DPI), glycopyrronium (Seebri\u00ae) or aclidinium (Eklira\u00ae Genuair BD). Once-daily, best exacerbation prevention of any single agent."},
          {step:"Step B", title:"LABA + LAMA — higher symptom burden", when:"MRC \u22653 / CAT \u226510",
           fromLabel:"or breathless on LAMA alone",
           html:"One combined device OD: <b>Anoro\u00ae Ellipta</b> (umeclidinium/vilanterol), <b>Spiolto\u00ae Respimat</b>, <b>Ultibro\u00ae Breezhaler</b>. This \u2014 not ICS/LABA \u2014 is the default dual therapy in COPD without asthmatic features."},
          {step:"Step C", title:"Add ICS → triple therapy", when:"the two Es, or asthmatic features",
           fromLabel:"exacerbating on LABA+LAMA",
           html:"Single triple device: <b>Trelegy\u00ae Ellipta OD</b>, <b>Trimbow\u00ae BD</b>, <b>Trixeo\u00ae Aerosphere BD</b>. Also use a 3-month ICS trial if breathlessness persists on LABA+LAMA with day-to-day variability. <b>Set the review: if no fewer flares at 12 months, or pneumonia \u2014 step back down to LABA+LAMA</b> (de-escalation is safe when eos <0.3)."},
          {step:"Step D", title:"Beyond triple — specialist territory", when:"still exacerbating",
           fromLabel:"optimised triple + non-drug work",
           html:"<b>Azithromycin 250mg 3\u00d7/week</b> (specialist-initiated: needs ECG for QT, LFTs, hearing check, and CT/sputum first). <b>Roflumilast</b> if chronic bronchitis + FEV\u2081<50% + flares. <b>Carbocisteine</b> trial for chronic productive cough (continue only if it helps at 4 weeks)."}
        ]},
        {b:"table", head:["Side effect","Culprit","Fix"], rows:[
          ["Pneumonia (\u2191risk ~50%)","ICS in COPD","This is why ICS is gated by the two Es \u2014 de-escalate if not earning its keep; counsel to report fever/purulence"],
          ["Dry mouth, urinary retention, glaucoma precipitation","LAMA","Caution in BPH/urinary symptoms and angle-closure risk; never nebulise ipratropium into the eyes (mask fit)"],
          ["Tremor, palpitations, cramps","LABA/salbutamol","Usually settles; check not over-using SABA for uncontrolled disease"],
          ["Oral thrush / dysphonia","ICS","Rinse-and-spit; spacer with MDIs"],
          ["QT prolongation / hearing loss","Azithromycin prophylaxis","Baseline + repeat ECG and LFTs; stop if tinnitus/hearing change; treat flares with a NON-macrolide"]
        ]},
        {b:"warn", html:"<b>Legacy ICS/LABA-only patients</b> (Seretide-era, no LAMA): if no asthmatic features and eos <0.3, switch to LABA+LAMA at review \u2014 same symptom control, less pneumonia. Never leave someone on ICS/LABA + separate LAMA in three devices when one triple inhaler does it."}
      ]},

    {t:"node", d:"safety", n:"4", tag:"Step 4 · exacerbation", title:"The flare — exact rescue doses",
      blocks:[
        {b:"table", head:["Severity","Picture","Action"], rows:[
          ["Mild\u2013moderate (home)","More breathless, \u2191sputum volume/purulence, coping","\u2191 bronchodilator use (spacer). <b>Prednisolone 30mg OD \u00d7 5 days</b> if breathlessness limits activities. Antibiotic ONLY if sputum purulent/\u2191: <b>amoxicillin 500mg TDS</b> or <b>doxycycline 200mg then 100mg OD</b> or <b>clarithromycin 500mg BD</b> \u2014 all 5 days"],
          ["Severe","Breathless at rest, RR \u226525, accessory muscles, SpO\u2082 <90\u201392% or below their known baseline","Admit. Controlled O\u2082 if available: <b>target 88\u201392%</b> via Venturi 24\u201328% \u2014 uncontrolled high-flow O\u2082 kills CO\u2082 retainers"],
          ["Life-threatening","Confusion/drowsiness (CO\u2082), cyanosis, exhaustion, new oedema","999. Sit up, controlled O\u2082, salbutamol while waiting"]
        ]},
        {b:"kv", rows:[
          ["Rescue pack rules","Selected, educated patients with a written plan. One pack at a time; they TELL you each use; \u22652 uses \u2192 face-to-face review + escalate the ladder; on azithromycin prophylaxis \u2192 non-macrolide antibiotic"],
          ["After every flare","Review within days\u2013weeks: technique, adherence, step-up decision, rehab referral (post-exacerbation rehab halves readmission), smoking, oximetry once stable"],
          ["Frequent steroid courses","\u22652/year \u2192 check the ladder + think bone protection (DEXA/bisphosphonate) and adrenal suppression"]
        ]}
      ]},

    {t:"node", d:"monitor", n:"5", tag:"Step 5 · review", title:"Annual review + who needs oxygen",
      blocks:[
        {b:"table", head:["What","When","Action"], rows:[
          ["MRC + CAT + exacerbation count","Every review (\u22651/yr; 2 if severe)","Trend, not snapshot \u2014 rising burden = revisit ladder + rehab"],
          ["Observed technique + adherence","Every review","Fix before any escalation"],
          ["SpO\u2082 when STABLE","Every review","<b>\u226492% \u2192 refer for LTOT assessment</b> (two ABGs 3 weeks apart in secondary care). Never oximeter-screen during/just after a flare"],
          ["FBC eosinophils","When considering ICS either way","\u22650.3 supports ICS; <0.1 argues against"],
          ["BMI + mood + frailty","Annually","Cachexia \u2192 dietitian; depression/anxiety are near-universal and treatable; consider frailty/palliative needs"],
          ["Spirometry","Periodically / if changing picture","Rapid decline (>500ml/5y) \u2192 refer"]
        ]},
        {b:"warn", html:"<b>LTOT is for survival, not breathlessness</b> \u2014 and it requires 15+ h/day use and is dangerous (burns, fire) in current smokers: smoking cessation is part of the assessment. For breathlessness without hypoxia, oxygen does NOT help \u2014 use the fan, breathing techniques, rehab and (in advanced disease) low-dose opioids."}
      ]},

    {t:"loop", icon:"🔁", title:"Still breathless or flaring? Check before escalating",
      arrow:"\u2026the ladder isn't the first move",
      intro:"Most 'failed inhalers' are smoking, technique, deconditioning — or a second diagnosis.",
      checks:[
        {b:"1 · Smoking", html:"Still smoking? Everything else is secondary."},
        {b:"2 · Technique", html:"Watched them? Device matched to their inspiratory effort?"},
        {b:"3 · Rehab", html:"Offered, attended, completed? Re-refer after every admission."},
        {b:"4 · Second diagnosis", html:"Heart failure (BNP), anaemia, PE (disproportionate hypoxia), lung cancer (new haemoptysis/weight loss \u2192 2WW CXR/CT), bronchiectasis, anxiety."},
        {b:"5 · Phenotype", html:"Eosinophils re-checked? ICS earning its keep \u2014 or due de-escalation?"}
      ],
      back:"All addressed → next ladder step / refer"},

    {t:"node", d:"refer", n:"6", tag:"Step 6 · refer", title:"Respiratory referral + advanced disease",
      blocks:[
        {b:"tiles", v:"refer", items:[
          {t:"LTOT assessment", html:"Stable SpO\u2082 \u226492%, cor pulmonale, or polycythaemia \u2192 formal oxygen assessment."},
          {t:"Young / atypical", html:"<40y, minimal smoking, FHx \u2192 \u03b1\u2081-antitrypsin; rapid FEV\u2081 decline; diagnostic doubt."},
          {t:"Frequent flares", html:"Exacerbating through optimised triple \u2192 azithromycin/roflumilast assessment; bronchiectasis work-up."},
          {t:"Procedures", html:"Severe emphysema (FEV\u2081<50%, hyperinflation) \u2192 lung-volume-reduction / valve / transplant assessment \u2014 under-referred and genuinely effective in the right patient."},
          {t:"Palliative needs", html:"MRC 5, housebound, recurrent admissions, cachexia \u2192 anticipatory care plan, DNACPR discussion, low-dose oral morphine for refractory breathlessness, fan therapy, hospice/community team \u2014 don't wait for a 'terminal' label."}
        ]},
        {b:"say", html:"The two treatments with the biggest effect are stopping smoking and the exercise programme \u2014 the inhalers help you live with the disease, but those two change where it's going. And if you ever feel more breathless with dirtier phlegm, that's a flare: start the plan and let us know the same day."}
      ]}
  ],
  foot:"Confirmed COPD in adults on NICE NG115 with GOLD 2025 concepts. Verify doses against the current BNF and local formulary (inhaler brands vary by ICB) before prescribing."
});
</script>
