MG.render({"icon":"💇","title":"Female Pattern Hair Loss","guideline":"NICE CKS","stemTitle":"Female androgenetic alopecia — confirm pattern, screen, treat with minoxidil","stemSub":"Primary-care management of female-pattern hair loss — confirm the diffuse central thinning with preserved frontal hairline, screen for reversible/endocrine contributors, and treat with topical minoxidil while managing the psychological impact. NICE CKS · 2026.","glance":[{"lbl":"Pattern","val":"Diffuse vertex thinning","sub":"frontal hairline preserved"},{"lbl":"Screen","val":"Ferritin, TFTs","sub":"± androgens if virilising"},{"lbl":"1st-line","val":"Topical minoxidil 2–5%","sub":"long-term"},{"lbl":"Treat","val":"Reversible causes","sub":"iron, thyroid"},{"lbl":"Consider","val":"Antiandrogen (specialist)","sub":"if hyperandrogenism"},{"lbl":"Red flag","val":"Virilisation / scarring","sub":"= investigate / refer"}],"flow":[{"t":"node","d":"found","n":"1","tag":"Foundation","title":"Confirm + screen","blocks":[{"b":"kv","rows":[["Typical","Diffuse thinning over the crown/central scalp with <b>widened central parting</b> and a <b>preserved frontal hairline</b>; gradual"],["Screen for contributors","Ferritin (iron deficiency), TFTs (thyroid); review diet, recent illness/childbirth (telogen effluvium), drugs"],["Hyperandrogenism","If acne, hirsutism, irregular periods → consider PCOS ± androgen profile; rapid virilisation → urgent (androgen-secreting tumour)"],["Exclude","Scarring alopecia (refer), alopecia areata (patchy), traction (styling)"]]},{"b":"why","html":"Female-pattern hair loss is distressing but benign; the GP value is screening for the treatable contributors (iron deficiency, thyroid) and recognising hyperandrogenism, then offering topical minoxidil — while excluding scarring alopecia which needs dermatology."}]},{"t":"node","d":"safety","n":"2","tag":"Safety-net","title":"Don't miss","blocks":[{"b":"tiles","v":"safety","items":[{"t":"🔴 Virilisation","html":"Rapid hair loss + deepening voice, clitoromegaly, marked hirsutism → urgent investigation for androgen-secreting tumour."},{"t":"🔴 Scarring alopecia","html":"Shiny scarred patches, loss of follicular openings → dermatology (irreversible)."},{"t":"🟠 Telogen effluvium","html":"Diffuse shedding ~3 months after illness/childbirth/stress/crash diet — usually recovers; correct iron."},{"t":"🧠 Psychological","html":"Significant impact on mood/self-esteem — acknowledge and support."}]}]},{"t":"node","d":"life","n":"3","tag":"Non-drug · supportive","title":"Supportive & cosmetic","blocks":[{"b":"tiles","v":"life","items":[{"t":"🧴 Gentle hair care","html":"Avoid traction hairstyles and harsh treatments; gentle handling reduces breakage."},{"t":"💇 Cosmetic options","html":"Hair fibres, sympathetic styling, wigs; psychological impact is real — acknowledge it."},{"t":"🩸 Check contributors","html":"Optimise iron (ferritin), thyroid and address androgen excess; balanced diet."}]},{"b":"why","html":"Beyond drug treatment, correcting contributors, gentle hair care and acknowledging the psychological impact are an important part of management."}]},{"t":"node","d":"drug","n":"4","tag":"Treatment","title":"Stepwise","blocks":[{"b":"ladder","steps":[{"step":"Step 1","title":"Correct reversible causes","when":"all","html":"Treat iron deficiency (target ferritin), thyroid dysfunction; address crash dieting/drugs/styling (traction)."},{"step":"Step 2","title":"Topical minoxidil","when":"first-line","fromLabel":"for the alopecia itself","html":"Minoxidil 2% (or 5%) to the scalp long-term; counsel on initial shedding, slow benefit, need for continued use, and facial hypertrichosis risk."},{"step":"Step 3","title":"Specialist antiandrogen / other","when":"if hyperandrogenism / refractory","fromLabel":"specialist","html":"Spironolactone or other antiandrogens (off-label, specialist/with contraception), or dermatology referral for refractory cases."}]}]},{"t":"node","d":"follow","n":"5","tag":"Follow-up","title":"Review response","blocks":[{"b":"timeline","items":[{"n":"1","when":"3–6 months","title":"Expect shedding first","html":"Warn of an initial <b>shedding phase</b> with minoxidil; benefit takes <b>3–6 months</b>. Serial standardised photos help judge response objectively."},{"n":"2","when":"6–12 months","title":"Assess & continue","html":"Meaningful effect by 6–12 months in responders. Benefit is maintained <b>only while treatment continues</b> — stopping reverses gains over months. Reinforce adherence."},{"n":"3","when":"No response","title":"Re-screen & refer","html":"Recheck ferritin/TFTs and androgen screen if features; refer to dermatology for scarring alopecia or diagnostic doubt."}]},{"b":"say","html":"The lotion can cause more shedding at first, which is normal, and it takes several months to help — and it only keeps working while you use it. We'll take photos to track progress."}]},{"t":"node","d":"refer","n":"6","tag":"Refer","title":"Referral","blocks":[{"b":"tiles","v":"refer","items":[{"t":"Endocrine / urgent","html":"Virilisation or suspected androgen-secreting tumour."},{"t":"Dermatology","html":"Scarring alopecia, diagnostic uncertainty, refractory disease."},{"t":"Gynae / endocrine","html":"PCOS/hyperandrogenism management."}]},{"b":"say","html":"This is female-pattern thinning — common and harmless, though understandably upsetting. First we’ll check for things that worsen it, like low iron or thyroid problems. The main treatment is a minoxidil scalp lotion used long-term — it works slowly and only while you keep using it. If there are other signs like extra body hair, we’ll look into the hormones."}]}],"foot":"Management of female androgenetic alopecia in primary care; screen for reversible causes and exclude virilisation/scarring alopecia. Verify against current NICE CKS and the BNF."});
