<body data-screen-label="Shingles management card">
<div class="mg-wrap" id="mgRoot"></div>
<script src="../../assets/management-engine.js?v=3"></script>
<script>
MG.render({
  icon:"⚡",
  title:"Shingles (Herpes Zoster) — The Complete Guide",
  stemTitle:"Shingles made simple &mdash; antiviral early, guard the eye, prevent the neuralgia",
  stemSub:"One pathway: recognise dermatomal zoster and the danger sites (ophthalmic, Ramsay Hunt, disseminated), start an antiviral within 72h (or while new lesions appear) in those who qualify, control pain and pre-empt post-herpetic neuralgia, advise on infectivity, and vaccinate to prevent recurrence. NICE CKS.",
  guideline:"NICE CKS",
  glance:[
    {lbl:"Antiviral", val:"Aciclovir / valaciclovir", sub:"start ≤72h or new lesions"},
    {lbl:"Always treat", val:">50 · ophthalmic · immunocompromised", sub:"or severe/truncal"},
    {lbl:"Eye red flag", val:"Hutchinson's sign", sub:"→ same-day ophthalmology"},
    {lbl:"Ear + palsy", val:"Ramsay Hunt", sub:"antiviral + steroid + ENT"},
    {lbl:"Pain", val:"Ladder → neuropathic", sub:"amitriptyline / gabapentin"},
    {lbl:"Infectious", val:"Until crusted", sub:"causes chickenpox in non-immune"}
  ],
  flow:[

    {t:"node", d:"safety", n:"1", tag:"Step 1 · danger sites", title:"Recognise the emergencies before anything else",
      blocks:[
        {b:"table", head:["Danger site","Recognise","Action"], rows:[
          ["<b>Ophthalmic zoster</b>","V1 distribution; rash on nose tip/side (<b>Hutchinson's sign</b>); eye redness/pain/visual change","Antiviral + <b>same-day ophthalmology</b>"],
          ["<b>Ramsay Hunt</b>","Ear pain + vesicles in canal + facial palsy ± vertigo/hearing loss","Urgent antiviral + oral steroid + ENT"],
          ["<b>Disseminated / immunocompromised</b>","Widespread or multidermatomal rash; severely immunocompromised","Urgent assessment; consider IV antivirals"],
          ["Contacts","Infectious until crusted","Avoid pregnant non-immune women, neonates, immunocompromised"]
        ]},
        {b:"why", html:"Most shingles is self-limiting, but ophthalmic zoster threatens sight, Ramsay Hunt threatens the facial nerve, and dissemination threatens the immunocompromised — these need urgent antivirals and specialist input regardless of the 72-hour window."}
      ]},

    {t:"node", d:"found", n:"2", tag:"Step 2 · confirm", title:"Confirm it's zoster",
      blocks:[
        {b:"table", head:["Feature","Detail"], rows:[
          ["Typical","Unilateral, dermatomal, does NOT cross the midline; painful/burning prodrome then grouped vesicles on erythema"],
          ["Evolution","Vesicles → pustules → crust over 7–10 days; infectious until crusted"],
          ["Diagnosis","Clinical — no routine swab; viral PCR only if atypical/immunocompromised or diagnostic doubt"],
          ["Mimics","Consider HSV (recurrent, non-dermatomal), impetigo, contact dermatitis, cellulitis, early bullous disease"]
        ]}
      ]},

    {t:"node", d:"drug", n:"3", tag:"Step 3 · antiviral", title:"Antiviral — who, which, when",
      blocks:[
        {b:"ladder", steps:[
          {step:"Who", title:"Offer an antiviral if", when:"within 72h of rash onset — or while new lesions still appearing",
           splits:[
             {cond:"Age", drug:">50 years", note:"Reduces post-herpetic neuralgia risk"},
             {cond:"Site / severity", drug:"Ophthalmic, Ramsay Hunt, severe rash/pain, truncal", note:"Any danger site = treat regardless of time"},
             {cond:"Host", drug:"Immunocompromised, or non-truncal in younger adults", note:"Lower threshold; immunocompromised may need IV / admission"}
           ]},
          {step:"Which", title:"First-line oral antivirals", when:"7-day course", fromLabel:"choose by adherence",
           splits:[
             {cond:"Preferred (OD/BD dosing)", drug:"Valaciclovir 1g TDS ×7d", note:"Or famciclovir 500mg TDS — simpler than aciclovir"},
             {cond:"Cheapest", drug:"Aciclovir 800mg 5×/day ×7d", note:"Frequent dosing hurts adherence; reduce dose in renal impairment"}
           ]},
          {step:"Renal", title:"Dose-adjust in CKD", when:"all antivirals renally cleared", fromLabel:"check eGFR",
           html:"Reduce dose per eGFR (BNF) — accumulation causes neurotoxicity (confusion, hallucination) especially in the elderly. Maintain hydration."}
        ]},
        {b:"warn", html:"Antivirals still benefit the immunocompromised, ophthalmic zoster and Ramsay Hunt even <b>beyond 72 hours</b> if new lesions are appearing. In pregnancy, seek specialist advice — aciclovir is used when benefit outweighs risk (especially near term / ophthalmic)."}
      ]},

    {t:"node", d:"drug", n:"4", tag:"Step 4 · pain", title:"Pain — the acute ladder and preventing PHN",
      blocks:[
        {b:"table", head:["Step","Option","Note"], rows:[
          ["Mild","Paracetamol ± NSAID","Regular dosing during the acute phase"],
          ["Moderate","Add codeine / short opioid","Time-limited; avoid long courses"],
          ["Neuropathic / severe","<b>Amitriptyline 10mg nocte</b> or gabapentin/pregabalin/duloxetine","Titrate; treats the neuropathic component + reduces PHN impact"],
          ["Topical (localised)","Capsaicin or lidocaine 5% plaster","Especially once healed if localised residual pain"]
        ]},
        {b:"why", html:"Post-herpetic neuralgia (pain persisting >90 days) is the commonest complication — risk rises with age, severe rash, severe acute pain and ophthalmic involvement. Early antiviral + good acute analgesia reduce its burden; established PHN follows the neuropathic-pain ladder (see that card)."}
      ]},

    {t:"node", d:"life", n:"5", tag:"Step 5 · advice & vaccine", title:"Infectivity, self-care, and prevention",
      blocks:[
        {b:"table", head:["Topic","Advice"], rows:[
          ["Infectivity","Contagious (chickenpox in non-immune) from rash until fully crusted — cover lesions; avoid pregnant non-immune women, neonates, immunocompromised; off work if lesions can't be covered or patient works with high-risk groups"],
          ["Self-care","Keep rash clean and dry; loose clothing; don't share towels; simple analgesia; most heal in 2–4 weeks"],
          ["Vaccination","<b>Shingrix</b> (recombinant, 2 doses) — the routine NHS zoster vaccine; eligibility widened to include immunocompromised adults and a broadening age cohort. Offer/signpost after recovery — vaccination still worthwhile after an episode"]
        ]},
        {b:"say", html:"The rash is catching until it fully scabs over — mainly a risk to people who've never had chickenpox, pregnant women and anyone with a weak immune system, so keep it covered. Once you're better, there's a vaccine that cuts the chance of it coming back — worth having."}
      ]},

    {t:"loop", icon:"🔁", title:"Not settling / complications? Check", arrow:"…escalate the right pathway",
      checks:[
        {b:"1 · Eye", html:"Any V1/nasociliary involvement or eye symptoms → ophthalmology today, don't wait."},
        {b:"2 · Bacterial superinfection", html:"Increasing redness, warmth, pus, fever → flucloxacillin; swab if uncertain."},
        {b:"3 · Neuro", html:"Ramsay Hunt (facial palsy/hearing), motor weakness, encephalitis features → urgent specialist."},
        {b:"4 · Antiviral toxicity", html:"Confusion/hallucinations on aciclovir in CKD/elderly → check dose + renal function."},
        {b:"5 · Persistent pain", html:"Pain >90 days = PHN → neuropathic-pain ladder; refer if refractory."},
        {b:"6 · Recurrent / atypical", html:"Recurrent, multidermatomal, or very young → consider immunosuppression/HIV screen."}
      ],
      back:"Danger site or complication → same-day specialist pathway"},

    {t:"node", d:"safety", n:"6", tag:"Safety-net", title:"What the patient must know",
      blocks:[
        {b:"table", head:["Scenario","Advice"], rows:[
          ["👁️ Eye","Eye pain, redness or changed vision, or rash on the nose — contact us the same day"],
          ["🔴 Spreading / unwell","Rash spreading widely, high fever, or feeling very unwell — urgent review"],
          ["🧠 Ear + face","Ear pain with facial droop or hearing change — urgent (Ramsay Hunt)"],
          ["🤰 Contacts","Keep away from pregnant women, newborns and anyone immunosuppressed until it's scabbed over"]
        ]}
      ]},

    {t:"node", d:"refer", n:"7", tag:"Refer", title:"Who needs specialist input",
      blocks:[
        {b:"table", head:["Refer","Trigger"], rows:[
          ["Same-day ophthalmology","Ophthalmic zoster / Hutchinson's sign / any eye involvement"],
          ["Urgent ENT","Ramsay Hunt syndrome"],
          ["Urgent medical / admission","Disseminated zoster, severely immunocompromised, suspected encephalitis, or unable to tolerate oral antivirals"],
          ["Pain clinic","Refractory post-herpetic neuralgia despite the neuropathic ladder"]
        ]},
        {b:"say", html:"Most shingles clears up with the tablets and time. The bits I'm watching for are your eye, your ear and any sign it's spreading — those need a specialist quickly, so tell me straight away if they happen."}
      ]}
  ],
  foot:"Herpes zoster in adults \u2014 NICE CKS; antivirals per BNF (dose-adjust in renal impairment); Shingrix per the current UK immunisation schedule. Verify doses before prescribing."
});
</script>
