  title:"Palliative Breathlessness — Step-by-Step",
  stemTitle:"Breathlessness in palliative care &mdash; reversible causes, the handheld fan, low-dose opioids and anxiolytics",
  stemSub:"A practical protocol: treat reversible causes, lead with non-drug measures (the handheld fan is first-line), use low-dose oral morphine to reduce the sensation of breathlessness, add a benzodiazepine for the anxiety component, and reserve oxygen for hypoxia \u2014 converting to a syringe pump in the last days. GMEC Palliative Care 2025 / PCF8.",
  guideline:"GMEC 2025 · PCF8",
  glance:[
    {lbl:"First (non-drug)", val:"Handheld fan", sub:"airflow to the face"},
    {lbl:"Core drug", val:"Morphine 2.5 mg IR", sub:"IR 2.5\u20135mg PRN"},
    {lbl:"Anxiety component", val:"Lorazepam 0.5 mg SL", sub:"0.5mg SL PRN"},
    {lbl:"Oxygen", val:"Only if hypoxic", sub:"not for sensation alone"},
    {lbl:"Reversible", val:"Effusion / PE / infection", sub:"treat if appropriate"},
    {lbl:"Last days", val:"CSCI morphine ± midazolam", sub:"syringe pump"}
  ],
  flow:[
    {t:"node", d:"found", n:"1", tag:"Assess", title:"Treat reversible causes first",
      blocks:[
        {b:"table", head:["Reversible cause","Action (if appropriate to prognosis/wishes)"], rows:[
          ["Pleural effusion","Drainage ± pleurodesis / indwelling catheter"],
          ["Anaemia","Transfusion if symptomatic and prognosis allows"],
          ["Infection (LRTI)","Antibiotics if consistent with goals of care"],
          ["Bronchospasm (COPD/asthma)","Bronchodilators ± corticosteroid"],
          ["PE","Anticoagulation \u2014 weigh against prognosis/bleeding"],
          ["SVC obstruction / lymphangitis","Dexamethasone + urgent oncology (see SVCO pathway)"]
        ]},
        {b:"warn", html:"Breathlessness in palliative care is usually <b>multifactorial</b> and there is often an <b>anxiety/panic component</b> that amplifies it \u2014 address both the physical cause and the fear."}
      ]},
    {t:"node", d:"life", n:"2", tag:"Step 1 \u00b7 non-drug (first-line)", title:"Non-drug measures \u2014 start here",
      blocks:[
        {b:"tiles", v:"life", items:[
          {t:"🌬️ Handheld fan", html:"<b>First-line</b> \u2014 a stream of cool air to the face (trigeminal) reduces the sensation of breathlessness. Cheap, effective, evidence-based."},
          {t:"🪑 Positioning", html:"Sit upright / lean forward on a table; open windows; cool room."},
          {t:"🧘 Breathing & anxiety", html:"Breathing-control techniques, pacing, relaxation; calm reassurance reduces the panic spiral."},
          {t:"♿ Energy conservation", html:"Activity pacing, aids, plan around the breathlessness; pulmonary-rehab-style techniques."}
        ]}
      ]},
    {t:"node", d:"drug", n:"3", tag:"Step 2 \u00b7 opioid", title:"Low-dose opioid for the breathlessness sensation",

          {step:"3b", title:"Already on opioid for pain", when:"use a breathlessness PRN",
           fromLabel:"on background opioid",
           html:"Use an extra PRN dose (often the breakthrough dose, or smaller) for breathlessness episodes; titrate cautiously."},

        ]},
        {b:"why", html:"Low-dose opioids reduce the <strong>central perception</strong> of breathlessness and respiratory drive sensitivity without clinically significant respiratory depression at these doses \u2014 the evidence base supports them as the core pharmacological treatment."}
      ]},
    {t:"node", d:"drug", n:"4", tag:"Step 3 \u00b7 anxiety component", title:"Add a benzodiazepine for anxiety/panic",

          ["Persistent anxiety","Consider a regular low-dose benzodiazepine or, if prognosis allows, an SSRI for background anxiety (see Anxiety/Depression protocol)."],
          ["Last days of life","<b>Midazolam 2.5\u20135mg SC PRN</b> and/or via CSCI for distressing breathlessness/agitation."]

          ["Unable to swallow / last days","Convert morphine to <b>CSCI</b>; add <b>midazolam</b> to the syringe pump for the anxiety/agitation component (see Care of the Dying protocol)."]
        ]}
      ]},
    {t:"node", d:"monitor", n:"6", tag:"Review", title:"Review & safety-net",

        {b:"kv", rows:[

    {t:"node", d:"refer", n:"8", tag:"Refer", title:"When to refer / seek advice",
      arrow:"reversible cause or refractory",
      blocks:[
        {b:"tiles", v:"refer", items:[
          {t:"Treat the cause", html:"Effusion (drainage), SVCO (oncology + dexamethasone), infection, bronchospasm \u2014 if consistent with goals of care."},
          {t:"Specialist palliative care", html:"Refractory breathlessness despite fan + opioid + anxiolytic; complex CSCI."},
          {t:"Respiratory / oncology", html:"For procedures (pleural intervention, stent) or disease-directed treatment."}
        ]},
        {b:"say", html:"Breathlessness is frightening, which itself makes it worse \u2014 so we use a handheld fan, breathing techniques, a low dose of morphine to ease the feeling of breathlessness, and a calming tablet for the panic. Oxygen only helps if your levels are actually low."}
      ]}
  ]
