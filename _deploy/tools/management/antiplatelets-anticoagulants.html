    {lbl:"VTE", val:"Apixaban 10mg BD \u00d77d", sub:"\u2192 5mg BD \u00b7 review 3 months"},

        ]},
        {b:"kv", rows:[
          ["AF threshold","CHA\u2082DS\u2082-VASc <b>\u22652 men / \u22653 women</b> \u2192 anticoagulate; 1 (men) \u2192 consider. Score 0 men / 1 women \u2192 none. <b>Aspirin has NO role in AF stroke prevention</b> (NG196)"],
          ["Bleeding risk","<b>ORBIT</b> preferred (NG196): use it to FIX modifiables \u2014 BP, alcohol, NSAIDs, anaemia, concurrent antiplatelet \u2014 <b>not to withhold anticoagulation</b>; falls risk alone almost never outweighs stroke prevention"],

        {b:"kv", rows:[
          ["Picking between them","<b>Apixaban</b>: best GI-bleed profile, BD. <b>Rivaroxaban/edoxaban</b>: OD \u2014 better for adherence/dosette. <b>Dabigatran</b>: the only one with dyspepsia as a common side effect; fully renally cleared. Once-daily beats 'best on paper' if adherence is shaky"],

      ]},

    {t:"node", d:"drug", n:"3", tag:"Step 3 · VTE", title:"DVT / PE — load, maintain, and set the stop date",
      blocks:[
        {b:"table", head:["Regimen","Loading","Then"], rows:[

          ["Rivaroxaban (no LMWH lead-in)","15mg BD \u00d7 21 days","20mg OD with food"],
          ["Edoxaban / dabigatran","\u22655 days LMWH first","edoxaban 60mg OD / dabigatran 150mg BD"],
          ["Extended prophylaxis (after \u22656 months, if continuing)","\u2014","apixaban 2.5mg BD or rivaroxaban 10mg OD"]
        ]},
        {b:"table", head:["VTE type","Duration","Notes"], rows:[
          ["Provoked (surgery, immobility, COCP \u2014 factor now gone)","<b>3 months</b>, then STOP","Book the stop date at initiation \u2014 drift is the commonest error"],
          ["Unprovoked","\u22653 months \u2192 discuss <b>indefinite</b>","Recurrence ~10%/yr off treatment; check bleeding risk; unprovoked VTE also prompts cancer thought (examine, history, bloods \u2014 not blind CT)"],

          ["Recurrent VTE / APS","Indefinite; triple-positive APS \u2192 <b>warfarin</b>","Haematology involvement"]
        ]}
      ]},

    {t:"node", d:"drug", n:"4", tag:"Step 4 · antiplatelets", title:"Antiplatelet regimens — who, what, how long",

        {b:"table", head:["Indication","Regimen","Second agent stops at"], rows:[

          ["Stroke / TIA long-term","<b>Clopidogrel 75mg OD alone</b>","\u2014 (aspirin+dipyridamole MR only if clopidogrel intolerant)"],

          ["PAD","Clopidogrel 75mg OD","\u2014"],
          ["Primary prevention","<b>No antiplatelet</b> \u2014 aspirin has no primary-prevention role (including diabetes)","\u2014"]
        ]},
        {b:"kv", rows:[
          ["Gastroprotection","PPI alongside DAPT, or antiplatelet + any of: prior ulcer/bleed, age \u226565 + risk factors, concurrent SSRI/steroid/NSAID/anticoagulant. <b>With clopidogrel use lansoprazole/pantoprazole</b> (omeprazole/esomeprazole blunt it via CYP2C19)"],

          ["Carbamazepine, phenytoin, rifampicin, <b>St John's Wort</b>","Induce P-gp/CYP3A4 \u2192 DOAC levels FALL \u2192 clots","Avoid DOACs \u2014 use warfarin (monitorable) or change the inducer"],

          ["Indication still valid + duration check","Provoked VTE past its stop date? DAPT past 12 months? De-prescribe"],

          ["Ticagrelor","5 days","24h"],
          ["Aspirin (secondary prevention)","Usually CONTINUE","\u2014"],
          ["Warfarin","5 days (bridge only if mechanical valve/recent VTE \u2014 via anticoag service)","Same evening if haemostasis"]
        ]},
        {b:"kv", rows:[
          ["No bridging for DOACs","Fast on, fast off \u2014 LMWH bridging adds bleeding without benefit"],
          ["Dental work, skin surgery, cataracts","Usually NO interruption needed (local haemostatic measures) \u2014 don't reflexively stop"],
          ["Recent stent/ACS needing surgery","Cardiology discussion BEFORE anything stops"]

      ]},

    {t:"loop", icon:"🔁", title:"Before you start, stop or switch — the 5-point check",
      arrow:"\u2026most errors live here",
      intro:"Wrong dose for the kidneys, drifted durations, and unilateral stops of specialist drugs cause most antithrombotic harm.",
      checks:[

      ],
      back:"Complex? → anticoag service / haematology / cardiology"},

    {t:"node", d:"refer", n:"8", tag:"Refer", title:"Who to call",
      blocks:[
        {b:"tiles", v:"refer", items:[
          {t:"Cardiology", html:"Any change to mandated DAPT; triple-therapy planning; recent stent needing surgery."},
          {t:"Haematology", html:"APS, recurrent VTE on treatment, extremes of weight, CrCl <15, suspected heparin/DOAC failure."},
          {t:"Anticoagulation service", html:"Warfarin management, bridging plans, complex switches."},
          {t:"2WW pathways", html:"Unexplained bleeding/anaemia on antithrombotics — investigate as cancer per NG12 before blaming the drug."},
          {t:"Emergency", html:"Major bleeding or any neurological change on an anticoagulant → 999/admit (reversal agents exist — speed matters)."}
        ]},
        {b:"say", html:"This tablet is protecting you from a stroke, and the trade-off is bleeding more easily \u2014 so we match the dose to your kidneys every year, avoid ibuprofen-type painkillers, and if you ever see blood that shouldn't be there, we look for the cause properly rather than just blaming the tablet."}
