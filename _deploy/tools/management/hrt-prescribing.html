<body data-screen-label="HRT prescribing management card">
<div class="mg-wrap" id="mgRoot"></div>
<script src="../../assets/management-engine.js"></script>
<script>
MG.render({
  icon:"💊",
  title:"HRT — The Complete Prescribing Guide",
  stemTitle:"HRT made simple &mdash; diagnose, choose, dose, fix, follow up",
  stemSub:"One pathway from first consultation to fine-tuning: confirm the diagnosis (and when you actually need FSH), screen contraindications, pick the route by risk, pick the regimen from uterus + stage with named first-line preparations and dose equivalents, protect the endometrium, then a stepwise plan for 'not better', side effects and bleeding \u2014 plus non-hormonal alternatives when HRT isn't wanted or safe. NICE NG23 (2024 update) \u00b7 BMS.",
  guideline:"NICE NG23 \u00b7 BMS 2024",
  glance:[
    {lbl:"Diagnosis \u226545y", val:"Clinical \u2014 no FSH", sub:"vasomotor Sx + cycle change"},
    {lbl:"No uterus", val:"Oestrogen-only", sub:"no progestogen"},
    {lbl:"Peri / post", val:"Sequential / Continuous", sub:"LMP < or > 12 months"},
    {lbl:"Higher risk or \u226560", val:"Transdermal", sub:"no excess VTE risk"},
    {lbl:"Best progestogen", val:"Utrogestan", sub:"or Mirena / dydrogesterone"},
    {lbl:"First review", val:"3 months", sub:"then annually"}
  ],
  flow:[

    {t:"node", d:"found", n:"1", tag:"Step 1 · diagnose", title:"Confirm the menopause — and know when to test",
      blocks:[
        {b:"kv", rows:[
          ["\u226545 years","<b>Clinical diagnosis \u2014 do NOT do FSH</b> (NG23). Vasomotor symptoms + irregular cycles = perimenopause; no period \u226512 months = postmenopause"],
          ["40\u201344 years","Diagnose clinically if typical picture; FSH only if diagnosis unclear (e.g. after hysterectomy, on hormonal contraception)"],
          ["<40 years","Suspected POI: <b>two FSH >30 IU/L, 4\u20136 weeks apart</b> \u2192 refer; POI needs HRT until at least 51 for bone + CVD protection"],
          ["On the pill / Mirena","Symptoms are masked; FSH unreliable on combined hormonal contraception \u2014 stop or switch before testing if the answer matters"],
          ["Quantify","Record symptom type, frequency, night-time waking and QoL impact \u2014 you will judge treatment against this at 3 months"]
        ]},
        {b:"why", html:"FSH fluctuates wildly in perimenopause \u2014 a 'normal' FSH does not exclude it and an isolated high FSH does not confirm it. That is why NG23 makes diagnosis clinical from 45, and why the only place FSH earns its keep is suspected POI and the uncertain 40\u201344s."},
        {b:"warn", html:"<b>Investigate any abnormal or unscheduled bleeding BEFORE starting HRT</b> \u2014 postmenopausal bleeding is a 2WW (suspected endometrial cancer, NICE NG12: aged 55+ with unexplained PMB \u2014 in practice refer any PMB). Starting HRT on top of unexplained bleeding muddies the picture for months."}
      ]},

    {t:"node", d:"safety", n:"2", tag:"Step 2 · screen", title:"Contraindications & cautions — who NOT to start in primary care",
      blocks:[
        {b:"table", head:["Category","Examples","What to do"], rows:[
          ["Do not start","Current / past breast cancer; other oestrogen-dependent cancer; undiagnosed abnormal bleeding; untreated endometrial hyperplasia; active liver disease; current VTE / arterial disease; pregnancy","Investigate / refer; consider non-hormonal pathway (Step 8)"],
          ["Specialist first","Previous VTE or thrombophilia; hormone-sensitive cancer history wanting HRT; complex CVD","Refer menopause clinic \u2014 transdermal may still be possible"],
          ["Caution \u2014 choose route carefully","BMI >30, migraine (any), smoker, controlled hypertension, gallbladder disease, age \u226560","<b>Transdermal oestrogen</b> + micronised progesterone \u2014 lowest-risk combination"],
          ["Not barriers","Well-controlled hypertension, migraine without aura, diabetes, previous cervical/ovarian pathology per specialist advice","Prescribe with the low-risk route; monitor BP"]
        ]},
        {b:"why", html:"Migraine (with or without aura) contraindicates the combined <i>pill</i>, not HRT \u2014 physiological transdermal estradiol is acceptable in migraineurs. The pattern to internalise: <strong>risk factors change the ROUTE (go transdermal), true contraindications change the PLAN (refer / non-hormonal)</strong>."},
        {b:"warn", html:"HRT is <b>not contraception</b>. Fertility can persist: contraception until <b>2 years after LMP if <50, 1 year if \u226550</b> (or until 55). A <b>Mirena\u00ae</b> elegantly does both jobs \u2014 contraception + the progestogen arm of HRT (replace every 5 years when used for endometrial protection)."}
      ]},

    {t:"node", d:"life", n:"3", tag:"Step 3 · counsel", title:"Risk numbers to counsel with + lifestyle",
      blocks:[
        {b:"table", head:["Risk","What to say (per 1000 women, 50\u201359, over ~5 years)","Modifier"], rows:[
          ["Breast cancer","Baseline ~23/1000. Combined HRT ~+4 extra; oestrogen-only little or no increase. Risk relates to duration and falls after stopping","Micronised progesterone / dydrogesterone carry the lowest signal; 2+ units alcohol/day or obesity add more risk than HRT itself"],
          ["VTE","Oral HRT roughly doubles risk (still small in absolute terms). <b>Transdermal = no excess VTE risk</b>","Transdermal first if BMI >30, smoker, previous superficial thrombophlebitis, FHx"],
          ["CVD / stroke","No increased CHD risk when started <60 or within 10y of menopause; oral (not transdermal) slightly raises stroke risk","'Window of opportunity' \u2014 starting early is cardioprotective-neutral or better"],
          ["Bones","HRT prevents osteoporotic fracture while taken","Especially important in POI and early menopause"]
        ]},
        {b:"tiles", v:"life", items:[
          {t:"🏃 Lifestyle", html:"Weight, exercise, alcohol + caffeine reduction, smoking cessation, layered clothing; vitamin D + calcium."},
          {t:"🧠 CBT", html:"CBT has RCT evidence for vasomotor symptoms, sleep and mood (NG23) \u2014 offer alongside or instead of HRT."},
          {t:"⚖️ Shared decision", html:"Symptom burden vs personal risk profile; leaflets: BMS / Women's Health Concern; document the discussion."}
        ]}
      ]},

    {t:"node", d:"drug", n:"4", tag:"Step 4 · choose", title:"Pick the regimen — three questions decide everything",
      blocks:[
        {b:"p", html:"<strong>(1) Uterus?</strong> No \u2192 oestrogen-only. <strong>(2) Peri or post?</strong> LMP <12 months \u2192 sequential (monthly bleed); LMP >12 months \u2192 continuous ('bleed-free'). <strong>(3) Only vaginal symptoms?</strong> \u2192 local oestrogen alone. Then choose the <b>route</b>: transdermal first-line if any risk factor or she prefers it; oral is fine for younger low-risk women."},
        {b:"ladder", steps:[
          {step:"No uterus", title:"Oestrogen-only", when:"post-hysterectomy",
           html:"<b>Patch:</b> Evorel\u00ae / Estradot\u00ae 50mcg twice weekly (start 25\u201350). <b>Gel:</b> Oestrogel\u00ae 2 pumps daily / Sandrena\u00ae 1mg daily. <b>Spray:</b> Lenzetto\u00ae 1\u20133 sprays daily. <b>Oral:</b> estradiol (Elleste-Solo\u00ae) 1mg daily. <i>Subtotal hysterectomy or severe endometriosis history \u2192 may still need progestogen; ask.</i>"},
          {step:"Uterus + peri", title:"Sequential combined", when:"LMP <12 months",
           fromLabel:"still bleeding / <12m since LMP",
           html:"<b>Ready-made oral:</b> Femoston\u00ae 1/10, Elleste Duet\u00ae 1mg. <b>Ready-made patch:</b> Evorel Sequi\u00ae. <b>Build your own (most flexible):</b> any oestrogen above + <b>Utrogestan\u00ae 200mg nocte days 15\u201326</b>, or + Mirena\u00ae. Expect a monthly withdrawal bleed."},
          {step:"Uterus + post", title:"Continuous combined", when:"LMP >12 months (or age 55 / after 1y sequential)",
           fromLabel:"postmenopausal",
           html:"<b>Ready-made oral:</b> Femoston-conti\u00ae 0.5/1mg, Kliovance\u00ae 1mg, Bijuve\u00ae 1mg/100mg (body-identical). <b>Patch:</b> Evorel Conti\u00ae. <b>Build your own:</b> oestrogen + <b>Utrogestan\u00ae 100mg nocte daily</b>, or + Mirena\u00ae. Bleed-free once settled; tibolone 2.5mg is an alternative."},
          {step:"Vaginal only", title:"Local oestrogen", when:"GSM / dryness / recurrent UTI \u2014 any age, indefinitely",
           fromLabel:"urogenital symptoms only",
           html:"Vagifem\u00ae/Vagirux\u00ae 10mcg tablet (nightly 2 weeks \u2192 twice weekly), Ovestin\u00ae cream, Estring\u00ae ring (3-monthly; good for poor dexterity), Imvaggis\u00ae pessary. <b>No progestogen needed, safe long-term, can add to systemic HRT.</b> Review annually; can continue even with relative systemic contraindications (specialist advice after breast cancer)."}
        ]},
        {b:"table", head:["Dose level","Oral estradiol","Patch","Oestrogel pumps","Lenzetto sprays"], rows:[
          ["Low (start \u226560y)","0.5\u20131mg","25mcg","1","1"],
          ["Standard start","1mg","25\u201350mcg","2","1\u20132"],
          ["Moderate","2mg","50\u201375mcg","3","2\u20133"],
          ["High (specialist territory beyond this)","\u2014","100mcg","4","3"]
        ]},
        {b:"warn", html:"<b>Never unopposed systemic oestrogen with a uterus</b> \u2014 endometrial cancer risk. Start LOW and titrate up; younger women (and POI) often need the higher end, older women the lower end."}
      ]},

    {t:"node", d:"drug", n:"5", tag:"Step 5 · protect", title:"The progestogen — get the dose-per-regimen right",
      blocks:[
        {b:"table", head:["Progestogen","Sequential (12\u201314 d/month)","Continuous (daily)","Notes"], rows:[
          ["<b>Micronised progesterone (Utrogestan\u00ae)</b> \u2014 preferred","200mg nocte \u00d712 days","100mg nocte","Body-identical; lowest breast/VTE signal; sedating (use at night); caution soya/peanut allergy history"],
          ["Dydrogesterone (in Femoston\u00ae)","10mg \u00d714 days","5mg","Next-lowest risk signal; only in combined products in UK"],
          ["Medroxyprogesterone (Provera\u00ae)","10mg \u00d712\u201314 days","2.5\u20135mg","If Utrogestan not tolerated"],
          ["Norethisterone","5mg \u00d712\u201314 days","5mg","More androgenic \u2014 more mood/skin side effects"],
          ["Mirena\u00ae IUS","Covers continuously","Covers continuously","+ contraception; replace 5-yearly for endometrial protection"]
        ]},
        {b:"why", html:"If the oestrogen dose goes up at Step 7, <strong>check the progestogen still matches</strong> \u2014 higher oestrogen may need 200mg continuous / consider extra protection. Under-dosed progestogen (or <12 days sequentially) = hyperplasia risk."}
      ]},

    {t:"node", d:"monitor", n:"6", tag:"Step 6 · review", title:"Follow-up: 3 months, then annually",
      blocks:[
        {b:"table", head:["What","When","Action"], rows:[
          ["Symptoms vs baseline + side effects","3 months after any start or change","Most side effects settle by 3 months \u2014 don't switch too early, don't accept misery too long"],
          ["Bleeding pattern","Every contact","Sequential: regular withdrawal bleed = fine. CCHRT: irregular spotting can be normal for 6 months (Step 9)"],
          ["BP, BMI","At review","Persistently \u2191BP on oral \u2192 switch transdermal"],
          ["Annual review","Ongoing need, dose, new risk factors, breast screening up to date","<b>No arbitrary stop date</b> (NG23) \u2014 continue while benefit outweighs risk at the lowest effective dose; many need it for years"]
        ]},
        {b:"say", html:"We'll review in three months. Side effects in the first few weeks are common and usually settle \u2014 don't stop it yourself; tell me and we'll adjust the dose, the route or the progestogen instead."}
      ]},

    {t:"node", d:"drug", n:"7", tag:"Step 7 · not better?", title:"Stepwise escalation when symptoms persist",
      blocks:[
        {b:"ladder", steps:[
          {step:"7a", title:"Check the basics", when:"always first",
           html:"Adherence; patch actually sticking (change site, avoid moisturiser); gel on dry skin, not washed off for 1h; spray technique; given a full <b>3 months</b>?"},
          {step:"7b", title:"Increase the oestrogen", when:"vasomotor Sx persist",
           fromLabel:"basics confirmed",
           html:"Move one step up the dose table (25\u219250\u219275\u2192100mcg patch; 1\u21922mg oral; 2\u21923\u21924 pumps gel). <b>Re-match the progestogen.</b> Review 3 months."},
          {step:"7c", title:"Switch the route", when:"oral not working / side effects / new risk",
           fromLabel:"dose adequate",
           html:"Oral \u2192 transdermal: steadier levels, better absorption certainty, no first-pass, no VTE excess. Patch skin reaction \u2192 gel or spray."},
          {step:"7d", title:"Treat the specific residual symptom", when:"targeted add-ons",
           fromLabel:"vasomotor controlled but\u2026",
           html:"<b>Low libido</b> \u2192 testosterone gel (Testogel\u00ae sachet over ~8 days / AndroFeme\u00ae 1 \u2014 off-licence in women; baseline + 3\u20136 monthly total testosterone, keep in female range). <b>Vaginal dryness</b> \u2192 add local oestrogen (fine on top of systemic). <b>Mood</b> \u2192 review progestogen type first (Step 8), consider CBT/antidepressant for confirmed depression."},
          {step:"7e", title:"Check the mimics", when:"still 'not right'",
           fromLabel:"HRT optimised",
           html:"TFTs, ferritin/FBC, HbA1c; depression/anxiety; sleep apnoea; medication effects. Menopause is not the only cause of fatigue + poor sleep in a 50-year-old."},
          {step:"7f", title:"Refer menopause clinic", when:"refractory / complex",
           fromLabel:"all the above",
           html:"Persistent symptoms despite optimised dose + route + progestogen; POI; complex risk (previous VTE, hormone-sensitive cancer); consideration of high-dose or unlicensed regimens."}
        ]}
      ]},

    {t:"node", d:"safety", n:"8", tag:"Step 8 · side effects", title:"Fix the side effect — don't abandon the HRT",
      blocks:[
        {b:"p", html:"First decide: <strong>oestrogenic, progestogenic, or local/practical?</strong> Each has a different fix. Most settle by 3 months \u2014 fix what persists."},
        {b:"table", head:["Pattern","Symptoms","Fix, in order"], rows:[
          ["Oestrogenic","Breast tenderness, nausea, bloating, leg cramps, headaches","1) Reassure \u2014 often settles \u22643 months \u00b7 2) take oral with food/at night \u00b7 3) reduce dose \u00b7 4) switch oral\u2192transdermal"],
          ["Progestogenic (the commonest reason women quit)","PMS-like mood swings, irritability, low mood, acne, greasy skin, breast tenderness in progestogen phase","1) Switch to <b>Utrogestan\u00ae or dydrogesterone</b> \u00b7 2) or deliver via <b>Mirena\u00ae</b> (minimal systemic absorption) \u00b7 3) or vaginal Utrogestan (off-licence) \u00b7 4) keep \u226512 days if sequential \u2014 don't shorten below this"],
          ["Practical / local","Patch-site irritation, gel transfer worries, forgetting tablets","Rotate patch sites; switch patch\u2194gel\u2194spray; once-daily combined tablet; align with an existing routine"],
          ["Unclear / both","Persistent intolerance of several regimens","Trial a different combined product or tibolone (postmenopausal only); specialist advice"]
        ]},
        {b:"warn", html:"Never respond to progestogen intolerance by <b>dropping the progestogen</b> and continuing oestrogen \u2014 that trades mood symptoms for endometrial cancer risk. Switch the type or the route instead."}
      ]},

    {t:"node", d:"monitor", n:"9", tag:"Step 9 · bleeding", title:"Bleeding on HRT — expected vs red flag",
      blocks:[
        {b:"table", head:["Scenario","Meaning","Action"], rows:[
          ["Sequential: monthly bleed near end of progestogen days","Expected","Reassure; heavy/prolonged \u2192 can increase progestogen or switch product"],
          ["CCHRT: spotting in first 6 months","Common while endometrium settles","Reassure + review; check adherence"],
          ["CCHRT: bleeding persisting >6 months, or NEW bleeding after amenorrhoea","Unscheduled \u2014 investigate","Examine + TVUSS \u00b1 endometrial biopsy; refer gynae; <b>2WW if any suspicion / PMB off HRT</b>"],
          ["Bleeding after a dose/product change","Often transient (~3 months)","Review at 3 months; investigate if persists"],
          ["Ready to stop the monthly bleed","Age 55, or \u22651 year on sequential","Switch sequential \u2192 continuous combined"]
        ]},
        {b:"warn", html:"Do not keep adjusting HRT around <b>persistent unscheduled bleeding</b> \u2014 assess the endometrium. And remember cervical screening status + examination: not all bleeding on HRT is from HRT."}
      ]},

    {t:"node", d:"drug", n:"10", tag:"Alternative path", title:"Non-hormonal options — HRT declined or contraindicated",
      blocks:[
        {b:"table", head:["Option","Dose","Notes"], rows:[
          ["CBT","\u2014","Evidence for vasomotor symptoms, sleep and mood (NG23); NHS Talking Therapies self-referral"],
          ["Fezolinetant (Veoza\u00ae)","45mg OD","NK3-receptor antagonist for vasomotor symptoms \u2014 the licensed non-hormonal drug; check LFTs baseline, 1/2/3 months then per SmPC"],
          ["SSRI/SNRI: venlafaxine","37.5\u201375mg","Best-evidenced antidepressant for flushes; also citalopram/escitalopram. <b>Avoid paroxetine/fluoxetine with tamoxifen</b> (CYP2D6)"],
          ["Clonidine","50\u201375mcg BD","Only licensed non-hormonal in this list historically; modest effect; hypotension/dry mouth limit use"],
          ["Gabapentin (off-licence)","Titrate 300\u2192900mg nocte","For flushes esp. with sleep disturbance; sedation; dependence-forming \u2014 counsel"],
          ["Vaginal moisturisers + lubricants","Regular use","For GSM when even local oestrogen declined (Replens\u00ae, Sylk\u00ae, YES\u00ae)"]
        ]},
        {b:"why", html:"After breast cancer: non-hormonal first; vaginal oestrogen only with the oncology team's agreement; fezolinetant/SSRIs (avoiding tamoxifen interactions) are the usual pathway."}
      ]},

    {t:"loop", icon:"\uD83D\uDD01", title:"'HRT doesn't suit me' — re-run this checklist before stopping",
      arrow:"\u2026almost always fixable",
      intro:"Most treatment 'failure' is a dose, route, progestogen or absorption problem — not the wrong decision.",
      checks:[
        {b:"1 · Time", html:"Given \u22653 months at this dose?"},
        {b:"2 · Dose", html:"Oestrogen stepped up (with progestogen re-matched)?"},
        {b:"3 · Route", html:"Tried transdermal?"},
        {b:"4 · Progestogen", html:"Switched to Utrogestan / dydrogesterone / Mirena?"},
        {b:"5 · Regimen", html:"Sequential vs continuous right for her stage? Bleeding assessed?"},
        {b:"6 · Mimics", html:"Thyroid, iron, glucose, mood, sleep apnoea excluded?"}
      ],
      back:"All optimised → menopause specialist referral"},

    {t:"node", d:"refer", n:"11", tag:"Refer", title:"Who goes to the menopause clinic",
      blocks:[
        {b:"tiles", v:"refer", items:[
          {t:"POI (<40)", html:"Two raised FSH → refer; needs HRT (often higher dose) or CHC until ~51."},
          {t:"Refractory", html:"Optimised dose + route + progestogen and still symptomatic."},
          {t:"Complex risk", html:"Previous VTE/thrombophilia, hormone-sensitive cancer, complex CVD — do not simply refuse HRT; refer for specialist risk-benefit."},
          {t:"Unscheduled bleeding", html:"Persistent / new on CCHRT → gynae for endometrial assessment (2WW if suspicious)."},
          {t:"Testosterone", html:"HSDD needing initiation where primary care isn't confident."}
        ]},
        {b:"say", html:"There's almost always a version of HRT that suits — the dose, the way it goes in, and the progestogen can each be changed independently. We'll adjust one thing at a time and review at three months."}
      ]}
  ]
});
</script>
