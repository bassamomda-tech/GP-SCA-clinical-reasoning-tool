MG.render({
  icon:"❤️‍🩹",
  title:"MI Secondary Prevention — The Complete Guide",
  stemTitle:"After a heart attack &mdash; the five drugs, cardiac rehab, and the reviews that keep them alive",
  stemSub:"One pathway: get all five secondary-prevention drug classes on board and titrated (dual antiplatelet, statin, ACEi, β-blocker \u00b1 MRA), refer everyone to cardiac rehab, manage the specifics (DAPT duration, when to stop, ticagrelor vs clopidogrel, the LDL target and the add-ons), review lipids and function, and give the DVLA + lifestyle advice. NICE NG185 \u00b7 NG238.",
  guideline:"NICE NG185 \u00b7 NG238",
  glance:[
    {lbl:"5 drugs", val:"DAPT · statin · ACEi · BB · MRA", sub:"for everyone unless CI"},
    {lbl:"DAPT", val:"Aspirin + ticagrelor", sub:"usually 12 months"},
    {lbl:"Statin", val:"Atorvastatin 80mg", sub:"LDL ≤2.0 / non-HDL ≤2.6"},
    {lbl:"MRA if", val:"EF ≤40% + HF/DM", sub:"eplerenone / spironolactone"},
    {lbl:"Everyone", val:"Cardiac rehab", sub:"reduces mortality"},
    {lbl:"Driving", val:"Group 1: 1–4 weeks", sub:"Group 2: notify DVLA"}
  ],
  flow:[

    {t:"node", d:"drug", n:"1", tag:"Step 1 · the five drugs", title:"The secondary-prevention bundle — all five unless contraindicated",
      blocks:[
        {b:"table", head:["Class","Drug + dose","Notes"], rows:[
          ["<b>Dual antiplatelet (DAPT)</b>","<b>Aspirin 75mg lifelong + ticagrelor 90mg BD</b> (or prasugrel/clopidogrel) for <b>~12 months</b>","Then aspirin alone lifelong. Duration individualised (bleeding vs ischaemic risk)"],
          ["<b>Statin</b>","<b>Atorvastatin 80mg</b>","High-intensity for all; LDL ≤2.0 / non-HDL ≤2.6 (NG238)"],
          ["<b>ACE inhibitor</b>","Ramipril titrated to <b>10mg</b> (ARB if intolerant)","All patients; especially LV dysfunction; renoprotective. U&E 1–2 weeks after changes"],
          ["<b>Beta-blocker</b>","Bisoprolol titrated (or metoprolol/carvedilol)","Continue ≥12 months (lifelong if LV dysfunction/HF); don't stop abruptly"],
          ["<b>MRA</b>","<b>Eplerenone / spironolactone</b>","Add if <b>EF ≤40% with HF or diabetes</b> — monitor K⁺ + renal function"]
        ]},
        {b:"why", html:"Each class independently reduces reinfarction and death \u2014 the mortality benefit is additive, which is why the goal is to get <strong>all five started and titrated to target</strong>, not just prescribed at token doses. The commonest primary-care failure is a patient comfortable on starter doses whose ACEi and β-blocker were never up-titrated, or whose statin quietly stopped."}
      ]},

    {t:"node", d:"drug", n:"2", tag:"Step 2 · antiplatelet detail", title:"DAPT — duration, choice, and when to stop",
      blocks:[
        {b:"table", head:["Question","Answer"], rows:[
          ["Standard duration","Aspirin + 2nd agent for <b>12 months</b>, then aspirin monotherapy lifelong"],
          ["Shorten DAPT","High bleeding risk → consider shorter course (specialist/cardiology-led)"],
          ["Extend / adjust","High ischaemic + low bleeding risk → may extend (specialist)"],
          ["2nd agent choice","Ticagrelor or prasugrel (post-PCI ACS) generally preferred over clopidogrel; clopidogrel if high bleeding risk / on anticoagulant"],
          ["On an anticoagulant (e.g. AF)","Triple therapy is time-limited + cardiology-led — clarify the stop date; don't let it run on by repeat-prescription inertia"],
          ["PPI cover","Add if GI bleeding risk (age, prior ulcer, steroids) — do NOT stop DAPT early without cardiology advice"]
        ]},
        {b:"warn", html:"<b>Never stop DAPT prematurely</b> (dental work, minor surgery, patient choice) without checking with cardiology \u2014 early cessation after stenting risks catastrophic stent thrombosis. Most procedures can continue on aspirin."}
      ]},

    {t:"node", d:"drug", n:"3", tag:"Step 3 · lipids", title:"Lipid target — and the add-on ladder",
      blocks:[
        {b:"ladder", steps:[
          {step:"1st", title:"High-intensity statin", when:"start/continue for everyone",
           splits:[
             {cond:"Drug", drug:"Atorvastatin 80mg", note:"Or max tolerated; check lipids + LFTs at 3 months"},
             {cond:"Target", drug:"LDL ≤2.0 / non-HDL ≤2.6", note:"NG238 secondary-prevention target"}
           ]},
          {step:"2nd", title:"Add ezetimibe", when:"target not met on max statin", fromLabel:"add-on",
           html:"Ezetimibe 10mg OD \u2014 cheap, well tolerated; recheck lipids in 3 months."},
          {step:"3rd", title:"Injectable lowering", when:"still not at target", fromLabel:"specialist/criteria",
           html:"<b>Inclisiran</b> (twice-yearly) or a <b>PCSK9 inhibitor</b> (alirocumab/evolocumab) per NICE criteria; bempedoic acid an option for statin-intolerant."},
          {step:"Intolerance", title:"Statin 'intolerance'", when:"muscle symptoms", fromLabel:"don't just stop",
           html:"Confirm (rechallenge, check CK if severe, exclude other causes), try a lower dose / alternate statin / alternate-day dosing before abandoning \u2014 true intolerance is uncommon; nocebo is common."}
        ]}
      ]},

    {t:"node", d:"life", n:"4", tag:"Step 4 · rehab & lifestyle", title:"Cardiac rehab + lifestyle — a treatment, not an add-on",
      blocks:[
        {b:"table", head:["Intervention","Detail"], rows:[
          ["<b>Cardiac rehabilitation</b>","Refer EVERYONE — exercise + education + psychological support; reduces mortality and readmission. Sell it like a drug"],
          ["Smoking","Cessation — the single biggest modifiable risk; risk falls fast after quitting"],
          ["Diet","Mediterranean pattern (Lyon trial evidence); oily fish; reduce salt/saturated fat"],
          ["Physical activity","Gradually increase to regular aerobic activity within rehab guidance"],
          ["Alcohol / weight","Within limits; weight management"],
          ["Mood","Depression is common post-MI and doubles mortality — screen + treat (sertraline is cardiac-safe)"],
          ["Flu vaccine","Annual — MI risk spikes after influenza"]
        ]},
        {b:"say", html:"Five tablets, each doing a different protective job, plus the rehab programme \u2014 together they dramatically cut the chance of another heart attack. The tablets only work while you take them, especially on the days you feel completely well, and the rehab is genuinely one of the most powerful treatments we have."}
      ]},

    {t:"node", d:"monitor", n:"5", tag:"Step 5 · review & driving", title:"Reviews, monitoring, and the DVLA rules",
      blocks:[
        {b:"table", head:["What","When","Action"], rows:[
          ["Titration (ACEi/BB/MRA)","Every few weeks post-discharge","Up-titrate to target/max tolerated; U&E + K⁺ 1–2 weeks after ACEi/MRA changes"],
          ["Lipids","3 months after statin start/change, then annually","Target not met → ezetimibe → injectables"],
          ["DAPT review","At ~12 months","Step down to aspirin monotherapy (per cardiology plan)"],
          ["Annual review","Yearly","BP, HbA1c, renal function, adherence to all five, smoking, mood, rehab completion"],
          ["<b>DVLA — Group 1</b>","Car/motorcycle","No need to notify; <b>stop driving 1 week (successful PCI) or 4 weeks (no PCI / LV impairment)</b>"],
          ["<b>DVLA — Group 2</b>","HGV/PSV","<b>Must notify DVLA</b>; disqualified ≥6 weeks; relicensing needs functional test + EF criteria"]
        ]},
        {b:"say", html:"We'll build the doses up over the next few weeks to get the full protection, and check your kidneys and salts as we go. On driving \u2014 a normal licence usually means a week or four off the road depending on your treatment; if you drive a lorry or bus you must tell the DVLA."}
      ]},

    {t:"loop", icon:"🔁", title:"Something not right? Work through this", arrow:"…optimise the five before anything else",
      checks:[
        {b:"1 · All five on board?", html:"DAPT, statin, ACEi, β-blocker, ± MRA — actually prescribed AND titrated, not token doses?"},
        {b:"2 · Statin stopped?", html:"Quietly discontinued or 'intolerant'? Rechallenge/alternate before abandoning; add ezetimibe."},
        {b:"3 · New angina/breathlessness", html:"Recurrent symptoms → is it stable angina (that card) or a new event (ACS → 999)?"},
        {b:"4 · DAPT bleeding", html:"Bleeding on DAPT → PPI, find source; don't stop early without cardiology."},
        {b:"5 · LV dysfunction", html:"EF ≤40% → is the MRA on, β-blocker + ACEi at target? (heart-failure card)."},
        {b:"6 · Mood/rehab", html:"Depression untreated, rehab not attended → both worsen outcomes; address them."}
      ],
      back:"Five drugs optimised + rehab done → routine annual CV review"},

    {t:"node", d:"safety", n:"6", tag:"Safety-net", title:"What the patient must know",
      blocks:[
        {b:"table", head:["Scenario","Advice"], rows:[
          ["🔴 Chest pain","Chest pain like your heart attack, not settling with GTN/rest in 15 min — 999, don't drive yourself"],
          ["💊 Never stop DAPT","Don't stop the blood-thinning tablets for dental or minor surgery without checking with us/cardiology — it risks a clot in the stent"],
          ["🩸 Bleeding","Black tarry stools, vomiting blood, or a bleed that won't stop — urgent review; tell them you're on blood thinners"],
          ["💪 Feel well = keep taking","All five tablets carry on even when you feel completely better — that's when they're working"]
        ]}
      ]},

    {t:"node", d:"refer", n:"7", tag:"Refer", title:"When to involve cardiology",
      blocks:[
        {b:"table", head:["Refer","Trigger"], rows:[
          ["999 / emergency","Suspected re-infarction (ACS symptoms)"],
          ["Cardiology","Recurrent angina, DAPT duration decisions, high bleeding risk, triple-therapy management, device/EF concerns"],
          ["Heart failure team","EF ≤40% / clinical HF — four-pillar therapy (heart-failure card)"],
          ["Lipid clinic","Not at LDL target despite statin + ezetimibe (injectable pathway) or possible FH"],
          ["Cardiac rehab","Everyone — if not auto-referred at discharge"]
        ]},
        {b:"say", html:"Most of the work now is here with us \u2014 getting your five tablets to full strength, the rehab done, and keeping an eye on your bloods. The cardiology team step in for any return of symptoms or decisions about how long to stay on the second blood-thinner."}
      ]}
  ],
  foot:"Secondary prevention after myocardial infarction \u2014 NICE NG185, NG238 (lipids), CKS. Verify doses against the current BNF before prescribing."
});
</script>
