<script>
MG.render({
  icon:"🧠",
  title:"Migraine — The Complete Guide",
  stemTitle:"Migraine made simple &mdash; two numbers rule everything: attack days and medication days",
  stemSub:"One pathway: confirm it's migraine (and catch the atypical aura), count the two numbers that drive every decision, treat attacks early with the right triptan mechanics, unmask medication-overuse headache before calling anything refractory, titrate prophylaxis properly (6\u20138 weeks at target, not 2 at starting dose), handle the hormonal interfaces (aura + CHC = UKMEC 4, menstrual migraine, pregnancy), and know the CGRP-era referral triggers. NICE CG150 \u00b7 BASH \u00b7 CKS.",
  guideline:"NICE CG150 \u00b7 BASH",
  glance:[
    {lbl:"Diagnose", val:"4\u201372h + POUND", sub:"aura evolves over minutes"},
    {lbl:"Acute", val:"Triptan + NSAID", sub:"early, full dose, together"},
    {lbl:"MOH limits", val:"10 / 15 days", sub:"triptans / simple analgesia"},
    {lbl:"Prophylaxis if", val:"\u22654 days/mo", sub:"or disabling attacks"},
    {lbl:"Judge trial at", val:"6\u20138 wks at target", sub:"not at starting dose"},
    {lbl:"Aura + CHC", val:"UKMEC 4", sub:"switch contraception today"}
  ],
  flow:[

    {t:"node", d:"found", n:"1", tag:"Step 1 · confirm", title:"Confirm migraine — and count the two numbers",
      blocks:[
        {b:"kv", rows:[
          ["The diagnosis","Attacks 4\u201372h with \u22652 of: unilateral, pulsating, moderate\u2013severe, worse on activity, PLUS nausea/vomiting or photo+phonophobia (POUND). Normal examination. No imaging for typical migraine \u2014 scans reassure for a fortnight and find incidentalomas"],
          ["Typical aura","Visual (fortification spectra, scotoma) \u00b1 sensory \u00b1 speech; <b>evolves gradually over \u22655 minutes</b>, lasts 5\u201360 min, fully reversible. Sudden-onset focal symptoms = stroke/TIA pathway, not migraine"],
          ["<b>Atypical aura \u2014 refer</b>","Motor weakness (hemiplegic), double vision, unilateral visual loss, poor balance/dysarthria (brainstem), decreased consciousness, aura >60 min, first aura >50y"],
          ["<b>Number 1 — headache days/month</b>","<8 episodic \u00b7 \u22654 attack days \u2192 discuss prophylaxis \u00b7 <b>\u226515 days/mo (\u22658 migrainous) >3 months = CHRONIC migraine</b> \u2192 different pathway"],
          ["<b>Number 2 — acute medication days/month</b>","Triptans/opioids/combination analgesics <b>\u226510 days</b> or simple analgesia <b>\u226515 days</b> = medication-overuse headache territory \u2014 the great mimic of 'worsening migraine'"],
          ["Context every time","Menstrual link (diary 3 cycles), contraception (aura? \u2192 Step 6), mood/sleep (drives drug choice), FHx, occupation/driving"]
        ]},
        {b:"warn", html:"<b>Red flags out of the migraine pathway:</b> thunderclap (peak <1 min \u2192 same-day SAH pathway) \u00b7 new headache >50y (+ ESR/temporal tenderness \u2192 GCA) \u00b7 postural/woken-by-headache + papilloedema (\u2191ICP) \u00b7 fever + neck stiffness \u00b7 new neurology \u00b7 headache in cancer/HIV/pregnancy (new) \u00b7 progressive daily crescendo pattern."}
      ]},

    {t:"node", d:"life", n:"2", tag:"Step 2 · foundations", title:"The diary and the routine — the free treatments",
      blocks:[
        {b:"tiles", v:"life", items:[
          {t:"📓 Headache diary", html:"THE tool: attack days, acute-med days, menstrual link, triggers. 4\u20138 weeks of diary beats any single consultation — every escalation decision reads from it."},
          {t:"⏰ Regularity beats avoidance", html:"The migrainous brain hates CHANGE: regular sleep, meals, hydration, caffeine. Skipped lunch and lie-ins are bigger triggers than cheese."},
          {t:"💧 Basics", html:"Hydration, limit caffeine to consistent moderate use, alcohol pattern honest look."},
          {t:"🧘 Stress + let-down", html:"Attacks often land AFTER stress (weekend migraine) — wind-down routines; CBT/relaxation have real evidence."},
          {t:"💊 Riboflavin 400mg OD", html:"Modest evidence, harmless, cheap — reasonable adjunct. (Magnesium 400\u2013600mg similar.)"},
          {t:"📍 Acupuncture", html:"Up to 10 sessions over 5\u20138 weeks if drug prophylaxis unsuitable or declined (CG150 option)."}
        ]}
      ]},

    {t:"node", d:"drug", n:"3", tag:"Step 3 · acute", title:"Treat the attack — early, full dose, combination",
      blocks:[
        {b:"ladder", steps:[
          {step:"1st", title:"Triptan + NSAID together, at onset", when:"the evidence-based combination",
           html:"<b>Sumatriptan 50\u2013100mg</b> at headache onset (NOT during aura \u2014 wait for pain) <b>+ ibuprofen 400\u2013600mg or naproxen 500mg or aspirin 900mg</b>. Can repeat triptan after \u22652h if it returns (max 2 doses/24h). Soluble/dispersible forms absorb faster in gastric stasis."},
          {step:"2nd", title:"Add the antiemetic", when:"nausea OR poor absorption",
           fromLabel:"even without prominent nausea",
           html:"<b>Metoclopramide 10mg or prochlorperazine</b> \u2014 treats the gastric stasis that stops tablets working. Buccal prochlorperazine / dispersible options if vomiting. (Metoclopramide: max 5 days \u2014 dystonia risk in the young.)"},
          {step:"3rd", title:"Switch the triptan before abandoning the class", when:"poor response \u00d72 attacks",
           fromLabel:"non-response to ONE \u2260 class failure",
           html:"Try \u22652 alternatives before giving up: <b>rizatriptan 10mg</b> (faster), <b>eletriptan 40\u201380mg</b> (most effective oral), <b>zolmitriptan nasal 5mg</b> (vomiting), <b>sumatriptan SC 6mg</b> (severe/rapid attacks \u2014 most effective overall), <b>frovatriptan/naratriptan</b> (longer half-life \u2014 recurrence-prone + menstrual). A third of 'triptan failures' respond to a different one."},
          {step:"4th", title:"Gepant rescue", when:"triptans failed \u00d72+ / contraindicated",
           fromLabel:"the new option",
           html:"<b>Rimegepant 75mg ODT (NICE TA919)</b> where \u22652 triptans have failed, or triptans contraindicated/not tolerated \u2014 no vasoconstriction, so usable in IHD. Doesn't cause MOH at usual use."}
        ]},
        {b:"table", head:["Rule","Detail"], rows:[
          ["Triptan contraindications","IHD, cerebrovascular disease, uncontrolled hypertension, hemiplegic/brainstem aura. Age >65 = caution not bar (vascular review first)"],
          ["Never","Opioids (incl. codeine/co-codamol) and ergots \u2014 ineffective long-term, the fastest road to MOH and dependence. Inherited co-codamol repeat = an action"],
          ["Timing","Treat EARLY in the pain phase \u2014 efficacy halves once central sensitisation (allodynia) sets in. 'Wait and see if it's a bad one' is the commonest patient error"],
          ["Count the days","Every acute plan comes with the MOH limits said out loud and written down: triptans <10 days/month, painkillers <15"]
        ]}
      ]},

    {t:"node", d:"safety", n:"4", tag:"Step 4 · MOH", title:"Medication-overuse headache — unmask it before escalating anything",
      blocks:[
        {b:"kv", rows:[
          ["Suspect it when","Daily/near-daily background headache with migraine spikes, in someone using acute meds beyond the limits >3 months \u2014 the diary shows it instantly"],
          ["The fix","<b>Stop the overused drug ABRUPTLY for \u22651 month</b> (triptans/simple analgesia \u2014 taper only opioids). Headaches worsen for 1\u20132 weeks before improving \u2014 pre-warn or they'll 'rescue' themselves straight back"],
          ["Support the withdrawal","Naproxen 250\u2013500mg BD regularly for 2\u20134 weeks as bridging cover (not counted if time-limited), or start prophylaxis simultaneously \u2014 <b>candesartan/amitriptyline/CGRP agents work even during overuse</b>"],
          ["Then reassess","At 4\u20138 weeks: many 'chronic migraineurs' revert to episodic once the rebound is gone \u2014 THEN judge whether prophylaxis is still needed"],
          ["Prevent the relapse","The MOH conversation at every acute prescription; scripts capped (e.g. 6 triptans/month on repeat with review)"]
        ]},
        {b:"why", html:"MOH is the commonest reversible cause of 'refractory migraine' in primary care. Escalating prophylaxis (or referring) without withdrawing the overuse fails \u2014 the rebound drives the headache no matter what you add underneath it."}
      ]},

    {t:"node", d:"drug", n:"5", tag:"Step 5 · prophylaxis", title:"Prophylaxis — adequate dose, adequate time, honest counselling",
      blocks:[
        {b:"p", html:"Offer when <strong>\u22654 attack days/month, disabling attacks, or acute meds can't be used</strong>. The iron rule: <strong>titrate to target and hold 6\u20138 weeks before judging</strong> \u2014 most 'failures' were 2 weeks at the starting dose. Success = 50% fewer attack days (diary), not zero."},
        {b:"ladder", steps:[
          {step:"1st", title:"Propranolol — or amitriptyline by phenotype", when:"first-line",
           html:"<b>Propranolol MR 80mg \u2192 160mg/day</b> (avoid: asthma, bradycardia; caution athletes \u2014 fatigue). <b>Amitriptyline 10mg nocte \u2192 titrate by 10\u201325mg \u2192 50\u201375mg</b> when sleep disturbance, tension-type overlap or low mood co-exist \u2014 dry mouth + morning grogginess pre-warned (take it 12h before waking, not at midnight)."},
          {step:"2nd", title:"Candesartan or topiramate", when:"first-line failed/unsuitable",
           fromLabel:"chosen by who's in front of you",
           html:"<b>Candesartan 8mg \u2192 16mg OD</b> \u2014 as effective as propranolol, well tolerated, the quiet star (check BP/U&E). <b>Topiramate 25mg \u2192 50mg BD</b> \u2014 effective but: <b>teratogenic (PPP + effective contraception mandatory)</b>, reduces COC efficacy, cognitive fog ('dopamax' \u2014 warn), weight loss, paraesthesia, renal stones, acute glaucoma (early eye pain \u2192 stop). In any woman who could conceive, candesartan usually wins."},
          {step:"3rd", title:"Third agent or combine", when:"two adequate trials failed",
           fromLabel:"re-check MOH first \u2014 always",
           html:"Try the unused first/second-line, or combine mechanisms (e.g. propranolol + amitriptyline low-dose). Menstrual pattern \u2192 Step 6 strategies instead of endless switching."},
          {step:"4th", title:"The CGRP era — refer", when:"\u22653 adequate prophylactic trials failed",
           fromLabel:"episodic \u22654 days/mo or chronic",
           html:"<b>CGRP monoclonals</b> (erenumab/fremanezumab/galcanezumab \u2014 monthly injections; NICE-approved after 3 failures) or <b>rimegepant 75mg alternate days (TA906)</b>. Chronic migraine also: <b>botulinum toxin</b> (\u22648 headache-free... \u226515 days + 3 failures). These WORK where everything else failed \u2014 refer, don't recycle."}
        ]},
        {b:"table", head:["Situation","Prophylaxis note"], rows:[
          ["Withdrawing after success","6\u201312 months of good control \u2192 taper down over 2\u20133 months and see \u2014 many stay well; restart threshold agreed in advance"],
          ["Woman who could conceive","Avoid topiramate (PPP) and think twice about candesartan (stop pre-conception); propranolol/amitriptyline have the friendliest profiles; folic acid + plan BEFORE conception"],
          ["Comorbid hypertension","Candesartan or propranolol \u2014 one drug, two jobs"],
          ["Comorbid depression/insomnia","Amitriptyline \u2014 but treat the depression properly in its own right (see depression guide)"],
          ["Elderly","Candesartan tolerated best; amitriptyline anticholinergic burden + falls"]
        ]}
      ]},

    {t:"node", d:"drug", n:"6", tag:"Step 6 · hormones", title:"The hormonal interfaces — aura, menstrual migraine, pregnancy",
      blocks:[
        {b:"kv", rows:[
          ["<b>Aura + combined hormonal contraception = UKMEC 4</b>","Any aura, any age \u2014 the CHC comes off TODAY, switched to POP/implant/IUS (see contraception guide). Migraine WITHOUT aura: UKMEC 2 (initiation) \u2014 fine for most. New aura ON the pill \u2192 stop mid-pack + bridge"],
          ["Menstrual migraine (diary-proven, \u22122 to +3 days)","Options: treat acute attacks with a long-half-life triptan; <b>perimenstrual 'mini-prophylaxis'</b> \u2014 frovatriptan 2.5mg BD or naratriptan 1mg BD from 2 days before expected onset \u00d75\u20136 days; or continuous hormonal strategy (extended-cycle CHC if NO aura, or oestrogen-stabilising POP/patch approaches)"],
          ["Pregnancy","Migraine usually improves (especially without aura). Acute: <b>paracetamol first; sumatriptan has the best safety data</b> of the triptans; NSAIDs T1/T2 only sparingly, never T3; antiemetics fine (cyclizine/prochlorperazine). Prophylaxis: <b>propranolol is the choice</b>; stop topiramate/candesartan pre-conception. NEW headache/aura in pregnancy \u2014 especially T3 \u2014 think pre-eclampsia + refer same day"],
          ["Perimenopause","Attacks often flare with cycle chaos \u2014 transdermal HRT (steady levels) is migraine-friendlier than oral; aura is NOT a contraindication to HRT (physiological doses \u2014 see HRT guide)"],
          ["Breastfeeding","Paracetamol/ibuprofen fine; sumatriptan compatible; propranolol compatible"]
        ]}
      ]},

    {t:"node", d:"monitor", n:"7", tag:"Step 7 · review", title:"Diary-led review rhythm",
      blocks:[
        {b:"table", head:["What","When","Action"], rows:[
          ["Diary: attack days + acute-med days","Every review","The two numbers decide: escalate acute care, start/adjust prophylaxis, or unmask MOH"],
          ["New prophylactic","6\u20138 weeks at TARGET dose","<50% improvement \u2192 next agent; log each adequate trial (3 failures = CGRP referral ticket)"],
          ["Acute-med audit","Every contact + repeat-prescription screen","Triptans creeping \u226510 days/mo \u2192 MOH conversation now, not next year"],
          ["Contraception + pregnancy plans","Every review in women of childbearing age","Aura status re-checked; topiramate PPP compliance; pre-conception planning"],
          ["Stable + controlled","6\u201312 months","Offer the taper-off trial; keep the diary going through it"]
        ]},
        {b:"say", html:"Two numbers run this clinic: how many days a month migraine takes from you, and how many days you take something for it. The first tells us if the preventer is working; the second protects you from the trap where the painkillers themselves start causing the headaches. The diary is how we see both \u2014 bring it every time."}
      ]},

    {t:"loop", icon:"🔁", title:"'Nothing works' — run this before the next switch or referral",
      arrow:"\u2026most refractory migraine isn't",
      checks:[
        {b:"1 · MOH", html:"Count the acute-med days honestly (incl. OTC co-codamol, 'just paracetamol'). Overuse present → withdraw FIRST, judge after."},
        {b:"2 · Adequate trials?", html:"Each prophylactic at TARGET dose for 6–8 weeks — or 2 weeks at 10mg amitriptyline? Log what a fair trial actually was."},
        {b:"3 · Triptan mechanics", html:"Taken early? Full dose? With NSAID + antiemetic? Tried ≥2 different triptans ± SC/nasal route?"},
        {b:"4 · Diagnosis drift", html:"Tension-type dominant? Cluster (strictly unilateral, autonomic, restless — different pathway)? New daily persistent headache? Sleep apnoea? Cervicogenic?"},
        {b:"5 · Hormones + life", html:"Menstrual clustering unaddressed? New CHC? Perimenopause? Shift work destroying routine?"},
        {b:"6 · The 3-trial ticket", html:"Three genuinely adequate prophylactic failures → CGRP/botox referral — stop recycling, refer."}
      ],
      back:"All verified → next agent or neurology/headache clinic"},

    {t:"node", d:"safety", n:"8", tag:"Safety-net", title:"What the patient must know",
      blocks:[
        {b:"tiles", v:"safety", items:[
          {t:"🔴 999", html:"\u201cA sudden worst-ever headache that peaks within a minute, or headache with weakness, slurred speech, fever + stiff neck — 999, not a triptan.\u201d"},
          {t:"⚠️ Aura rules", html:"\u201cIf your warning symptoms ever change — weakness, double vision, lasting over an hour — we need to know. And sudden-onset symptoms are stroke rules: 999.\u201d"},
          {t:"💊 The counting rule", html:"\u201cTriptans on fewer than 10 days a month, painkillers fewer than 15 — more than that and the treatment becomes the cause.\u201d"},
          {t:"🤰 Planning a baby?", html:"\u201cTell us BEFORE trying — some preventers must be swapped in advance, and we'll plan safe attack treatment for pregnancy.\u201d"}
        ]}
      ]},

    {t:"node", d:"refer", n:"9", tag:"Refer", title:"Neurology / headache clinic — who and why",
      blocks:[
        {b:"tiles", v:"refer", items:[
          {t:"Same day", html:"Thunderclap; new neurology; suspected GCA (start prednisolone 40\u201360mg + same-day ESR/referral); papilloedema; new headache/aura in pregnancy (pre-eclampsia screen)."},
          {t:"The 3-trial ticket", html:"≥3 adequate prophylactic failures (episodic ≥4 days/mo or chronic) → CGRP mAbs / rimegepant / botox territory."},
          {t:"Chronic migraine", html:"≥15 days/mo persisting AFTER MOH withdrawal → headache clinic."},
          {t:"Atypical aura", html:"Hemiplegic (incl. FHx), brainstem, aura >60 min, first aura >50y — diagnosis + triptan-safety decisions."},
          {t:"Diagnostic doubt", html:"Late-onset, changed pattern, suspected cluster headache (verapamil pathways + oxygen — specialist-led)."}
        ]},
        {b:"say", html:"You've given three preventers a proper try and migraine is still taking too many days \u2014 that's exactly the group the newer injectable preventers were designed for, and they need the specialist clinic to start. Keep the diary going: it's the evidence that gets you treated fastest."}
      ]}
  ],
  foot:"Migraine in adults \u2014 NICE CG150, BASH guidance, TA919/TA906 (rimegepant), TA764 et al (CGRP mAbs). Verify doses against the current BNF before prescribing."
});
