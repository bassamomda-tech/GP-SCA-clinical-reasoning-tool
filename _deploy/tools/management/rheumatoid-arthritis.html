<body data-screen-label="Rheumatoid arthritis management card">

<script>
MG.render({
  icon:"🖐️",
  title:"Rheumatoid Arthritis — The Complete Guide",
  stemTitle:"RA made simple &mdash; refer early (the window matters), the GP owns the shared-care safety",
  stemSub:"One pathway: recognise inflammatory arthritis and refer URGENTLY within the treat-to-target window, understand the DMARD/biologic ladder the specialist uses, run the shared-care blood monitoring that keeps patients safe, treat flares, know the drugs' red-flag toxicities and the infection/live-vaccine rules, manage cardiovascular + osteoporosis risk, and handle pregnancy and the acutely unwell patient. NICE NG100 \u00b7 CKS.",
  guideline:"NICE NG100 \u00b7 BSR",
  glance:[
    {lbl:"Refer if", val:"Small-joint / >6wk", sub:"don't wait for bloods/X-ray"},
    {lbl:"Urgency", val:"Early = better", sub:"treat-to-target window"},
    {lbl:"1st-line", val:"Methotrexate", sub:"weekly + folic acid"},
    {lbl:"NEVER", val:"MTX daily", sub:"weekly dosing only — fatal error"},
    {lbl:"GP role", val:"Shared-care bloods", sub:"FBC/LFT/U&E monitoring"},
    {lbl:"Flare", val:"Steroid bridge", sub:"+ contact rheumatology"}
  ],
  flow:[

    {t:"node", d:"found", n:"1", tag:"Step 1 · recognise & refer", title:"Recognise inflammatory arthritis — refer URGENTLY, don't wait",
      blocks:[
        {b:"kv", rows:[
          ["The picture","<b>Persistent (>6 weeks) symmetrical small-joint pain + swelling</b> (MCPs, PIPs, wrists, MTPs), with <b>early-morning stiffness >30\u201360 min</b> that eases with use \u2014 the opposite of OA. Fatigue, difficulty with fine tasks/jars"],
          ["<b>Refer urgently \u2014 before results</b>","NICE NG100: refer any suspected persistent synovitis of undetermined cause <b>without waiting for blood tests or X-rays</b>; <b>very urgent if small joints of hands/feet, multiple joints, or symptoms \u22653 months</b>. Early treatment changes the disease course \u2014 the window matters"],
          ["Bloods (send, don't wait on)","<b>Rheumatoid factor</b>; if negative, <b>anti-CCP</b> (more specific, prognostic); <b>CRP/ESR</b>, FBC, LFTs, U&E. Seronegative RA exists \u2014 normal RF/CRP does NOT exclude it, refer on clinical grounds"],
          ["X-rays","Hands + feet baseline (may be normal early \u2014 erosions are late); don't let normal films delay referral"],
          ["Squeeze test","Pain on squeezing across the MCP or MTP row is a useful bedside clue to inflammatory joint disease"]
        ]},
        {b:"why", html:"RA is a <strong>treat-to-target emergency of the clock</strong>: the first months are a therapeutic window where early DMARDs prevent erosions and disability. The GP's job is not to diagnose subtype or start DMARDs \u2014 it's to <em>recognise inflammatory arthritis and get it to rheumatology fast</em>, then own the shared-care safety net."},
        {b:"warn", html:"<b>A hot, swollen single joint is septic arthritis until proven otherwise</b> \u2192 same-day. And an RA patient on immunosuppression with fever/sepsis needs urgent assessment (Step 5). Don't anchor a new mono-arthritis on 'RA flare'."}
      ]},

    {t:"node", d:"drug", n:"2", tag:"Step 2 · the DMARD ladder", title:"What the specialist starts — and why the GP must know it",
      blocks:[
        {b:"ladder", steps:[
          {step:"1st", title:"Conventional DMARD — usually methotrexate", when:"first-line, started in secondary care",
           html:"<b>Methotrexate ONCE WEEKLY</b> (oral/SC), titrated, <b>with folic acid</b> on a different day; often with a short steroid bridge. Alternatives/combinations: sulfasalazine, leflunomide, hydroxychloroquine. Aim: remission or low disease activity (treat-to-target, DAS28)."},
          {step:"2nd", title:"Biologic DMARDs", when:"inadequate response to \u22652 cDMARDs",
           fromLabel:"specialist-initiated",
           html:"<b>TNF inhibitors</b> (adalimumab, etanercept, infliximab), or rituximab, tocilizumab, abatacept \u2014 per NICE TA criteria. Screen + treat latent TB and hepatitis B before starting; big infection-risk implications for primary care."},
          {step:"3rd", title:"Targeted synthetic (JAK inhibitors)", when:"further lines",
           fromLabel:"specialist",
           html:"Baricitinib, tofacitinib, upadacitinib \u2014 oral; MHRA cautions re VTE, MACE and malignancy in at-risk/older patients. Same infection vigilance."}
        ]},
        {b:"warn", html:"<b>Methotrexate is weekly \u2014 never daily.</b> Daily dosing causes fatal pancytopenia/mucositis and is a classic, lethal prescribing error (dispensing, hospital admission, care home). On every MTX script/record: dose, day of the week, folic acid, and 2.5mg tablets ONLY (never mix strengths). Trimethoprim/co-trimoxazole + MTX = both antifolates \u2192 marrow suppression: <b>avoid</b>."}
      ]},

    {t:"node", d:"monitor", n:"3", tag:"Step 3 · shared-care monitoring", title:"The GP's core job — DMARD blood monitoring",
      blocks:[
        {b:"table", head:["Drug","Monitor","Watch for"], rows:[
          ["Methotrexate","<b>FBC, LFTs, U&E</b> \u2014 2-weekly until stable dose, then ~every 2\u20133 months","Neutropenia, transaminitis, macrocytosis; <b>pneumonitis</b> (dry cough/breathlessness \u2192 stop + urgent)"],
          ["Leflunomide","FBC, LFTs + <b>BP/weight</b> (hypertension)","Marrow, hepatotoxicity, hypertension, diarrhoea; very long half-life (washout with cholestyramine for toxicity/pregnancy)"],
          ["Sulfasalazine","FBC, LFTs","Neutropenia, hepatotoxicity (early months); harmless orange urine"],
          ["Hydroxychloroquine","No routine bloods; baseline + annual eye review","<b>Retinal toxicity</b> \u2014 formal retinopathy screening"],
          ["Biologics / JAK","Per shared-care protocol","Infection surveillance is the dominant primary-care task"]
        ]},
        {b:"kv", rows:[
          ["The rule","Follow the <b>shared-care agreement</b> \u2014 don't issue DMARDs you're not set up to monitor. Abnormal results (neutropenia, transaminases >3\u00d7 ULN, rising creatinine) \u2192 withhold + contact rheumatology same day"],
          ["Sick-day sense","Intercurrent infection \u2192 hold methotrexate/biologics until recovered (specialist advice); never restart blindly"]
        ]}
      ]},

    {t:"node", d:"safety", n:"4", tag:"Step 4 · flares & symptoms", title:"Managing flares and day-to-day symptoms",
      blocks:[
        {b:"kv", rows:[
          ["Flare","Increased pain/swelling/stiffness across joints. <b>Short steroid bridge</b> (oral prednisolone or IM/intra-articular depot) + contact rheumatology; don't just escalate NSAIDs. Persistent/frequent flares \u2192 DMARD needs stepping up (specialist)"],
          ["Analgesia","NSAID + PPI for symptom relief (lowest dose, shortest time; renal/GI/CV caution); paracetamol adjunct \u2014 these do NOT modify disease, the DMARD does"],
          ["Single hot joint","Exclude septic arthritis (aspirate) and gout before calling it an RA flare \u2014 same-day if systemically unwell"],
          ["Function","OT (aids, joint protection, splints), physio, podiatry (foot RA is disabling and under-treated)"]
        ]}
      ]},

    {t:"node", d:"life", n:"5", tag:"Step 5 · whole-person risk", title:"CVD, bones, infection, vaccines, pregnancy",
      blocks:[
        {b:"tiles", v:"life", items:[
          {t:"❤️ Cardiovascular", html:"RA is an independent CV risk factor (inflammation) — QRISK3 includes it; be proactive with BP, lipids, smoking. RA patients die of CVD."},
          {t:"🦴 Osteoporosis", html:"Disease + steroids raise fracture risk — assess bone health (FRAX), co-prescribe bone protection with steroids (see osteoporosis card)."},
          {t:"🦠 Infection", html:"Immunosuppressed — low threshold for assessment; a septic patient on biologics/MTX is an emergency; counsel to report infections early."},
          {t:"💉 Vaccines", html:"Annual flu, pneumococcal, COVID; <b>AVOID LIVE vaccines</b> on significant immunosuppression (shingles — use the non-live Shingrix; check before yellow fever/MMR)."},
          {t:"🤰 Pregnancy", html:"<b>Methotrexate + leflunomide are teratogenic — stop MTX ≥3 months pre-conception (both partners), leflunomide needs washout.</b> Hydroxychloroquine + sulfasalazine are pregnancy-compatible; plan with rheumatology."},
          {t:"🚭 Smoking", html:"Worsens RA activity AND blunts treatment response — cessation is disease-modifying."}
        ]}
      ]},

    {t:"loop", icon:"🔁", title:"Worsening or 'not right'? Work through this",
      arrow:"\u2026don't mislabel it a flare",
      checks:[
        {b:"1 · Septic joint?", html:"Single hot joint + unwell → aspirate/same-day, not 'flare'."},
        {b:"2 · Drug toxicity?", html:"Breathless/dry cough (MTX pneumonitis), mouth ulcers/bruising (marrow), jaundice (liver) → stop + urgent bloods."},
        {b:"3 · Infection on immunosuppression", html:"Fever/sepsis → urgent; hold DMARD/biologic."},
        {b:"4 · True flare", html:"Multi-joint inflammatory worsening → steroid bridge + rheumatology, step up DMARD."},
        {b:"5 · Under-treated", html:"Persistent activity between flares → not at target → specialist escalation."},
        {b:"6 · Comorbidity", html:"CV event, fracture, mood — the whole-person risks RA carries."}
      ],
      back:"Toxicity/sepsis excluded → rheumatology for target-driven escalation"},

    {t:"node", d:"safety", n:"6", tag:"Safety-net", title:"What the patient must know",
      blocks:[
        {b:"tiles", v:"safety", items:[
          {t:"🔴 MTX warning signs", html:"\u201cOn methotrexate: a new dry cough or breathlessness, mouth ulcers, unusual bruising, or a sore throat/fever \u2014 stop it and contact us the same day.\u201d"},
          {t:"💊 Weekly, not daily", html:"\u201cMethotrexate is ONCE a week on your chosen day \u2014 taking it daily is dangerous. Always tell any new doctor or pharmacist it\u2019s weekly.\u201d"},
          {t:"🦠 Infections", html:"\u201cYour treatment lowers immunity \u2014 tell us early about infections, and avoid \u2018live\u2019 vaccines without checking with us first.\u201d"},
          {t:"🤰 Pregnancy", html:"\u201cSome of these drugs harm a pregnancy \u2014 don\u2019t try for a baby without planning it with us first (applies to men on some drugs too).\u201d"}
        ]}
      ]},

    {t:"node", d:"refer", n:"7", tag:"Refer", title:"Rheumatology — urgency levels",
      blocks:[
        {b:"tiles", v:"refer", items:[
          {t:"Very urgent", html:"Suspected RA with small-joint (hands/feet) involvement, multiple joints, or symptoms ≥3 months — refer without waiting for tests (NG100)."},
          {t:"Same day", html:"Suspected septic arthritis; immunosuppressed + febrile/septic; MTX pneumonitis; significant cytopenia."},
          {t:"Flare / escalation", html:"Frequent or severe flares, or persistent disease activity → target-driven DMARD/biologic escalation."},
          {t:"Shared-care queries", html:"Abnormal monitoring bloods, drug interaction questions, pre-pregnancy planning."},
          {t:"Allied health", html:"OT, physio, podiatry, specialist nurse — function + self-management."}
        ]},
        {b:"say", html:"This looks like inflammatory arthritis, and the single most important thing is getting you to the specialist quickly \u2014 treating it early genuinely changes how the disease behaves. Once you\u2019re on treatment, my job is the regular blood checks that keep it safe, and being the person you call the moment anything feels off."}
      ]}
  ],
  foot:"Rheumatoid arthritis in adults \u2014 NICE NG100, BSR guidance, shared-care/MHRA methotrexate safety. Verify doses against the current BNF; DMARDs are specialist-initiated."
});
</script>
