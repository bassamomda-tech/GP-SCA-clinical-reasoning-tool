<script>
MG.render({
  icon:"💓",
  title:"Atrial Fibrillation — The Complete Guide",
  stemTitle:"AF made simple &mdash; two streams in parallel: stop the stroke, control the symptoms",
  stemSub:"One pathway: confirm AF and hunt the driver, score CHA\u2082DS\u2082-VASc with the actual components, choose and dose the DOAC correctly (CrCl, the reduction rules, the interactions), use ORBIT to fix \u2014 never to withhold \u2014 then run the rate ladder with named doses, know who deserves rhythm control early, and review both streams annually. NICE NG196 \u00b7 ESC.",
  guideline:"NICE NG196",
  glance:[
    {lbl:"Score", val:"CHA\u2082DS\u2082-VASc", sub:"\u22652 offer \u00b7 male 1 consider"},
    {lbl:"First-line", val:"DOAC", sub:"apixaban \u00b7 edoxaban \u00b7 riva \u00b7 dabi"},
    {lbl:"Dose by", val:"CrCl not eGFR", sub:"Cockcroft-Gault"},
    {lbl:"Bleeding", val:"ORBIT \u2192 modify", sub:"never a veto"},
    {lbl:"Rate", val:"Bisoprolol \u2192 <110", sub:"digoxin add-on"},
    {lbl:"Rhythm early if", val:"Young \u00b7 HF \u00b7 symptomatic", sub:"ablation era"}
  ],
  flow:[

    {t:"node", d:"found", n:"1", tag:"Step 1 · confirm", title:"Confirm the rhythm, hunt the driver, split the streams",
      blocks:[
        {b:"kv", rows:[
          ["Confirm","12-lead ECG (irregularly irregular, no P waves) \u2014 or \u226530s on ambulatory monitoring for paroxysmal symptoms. Pulse palpation alone never diagnoses AF; a single-lead smartwatch trace needs 12-lead (or clinician-reviewed strip) confirmation"],
          ["Classify","Paroxysmal (self-terminating <7d) \u00b7 persistent (>7d or needs cardioversion) \u00b7 permanent (accepted). Matters for rhythm-control decisions, NOT for anticoagulation \u2014 <b>paroxysmal AF strokes just as much</b>"],
          ["Hunt the driver","TFTs (thyrotoxic AF), alcohol (the big one), BP, OSA (STOP-BANG), infection/sepsis, anaemia, electrolytes, valve disease (murmur \u2192 echo), HF, ischaemia"],
          ["Baseline","U&E + <b>CrCl (Cockcroft-Gault \u2014 the DOAC gate)</b>, FBC, LFTs, TFTs, HbA1c, lipids; echo (structure/valves \u2014 changes drug choices); weight (dose rules)"],
          ["Symptom burden","Palpitations, breathlessness, fatigue, exercise intolerance \u2014 or nothing (incidental pulse check). Drives Stream B only"]
        ]},
        {b:"why", html:"Run TWO questions in parallel forever: <strong>\u201chow do I stop a stroke?\u201d</strong> (anticoagulation \u2014 by risk score, regardless of symptoms or AF pattern) and <strong>\u201chow do I make them feel better?\u201d</strong> (rate \u00b1 rhythm). The classic fatal error: rate controlled \u2192 feels fine \u2192 someone stops the anticoagulant. Controlled AF still clots."},
        {b:"warn", html:"<b>Fast AF + chest pain, syncope, hypotension or severe breathlessness = haemodynamic compromise \u2192 999.</b> New-onset AF <48h that's otherwise well \u2192 same-day/urgent assessment (cardioversion window). Suspected pre-excitation (young, delta wave, very fast) \u2192 do NOT give rate-limiting drugs \u2014 urgent cardiology."}
      ]},

    {t:"node", d:"drug", n:"2", tag:"Stream A · score", title:"CHA\u2082DS\u2082-VASc — score it with the components in front of you",
      blocks:[
        {b:"table", head:["Letter","Criterion","Points"], rows:[
          ["C","Congestive HF / LV dysfunction","1"],
          ["H","Hypertension (or on treatment)","1"],
          ["A\u2082","Age \u226575","<b>2</b>"],
          ["D","Diabetes","1"],
          ["S\u2082","Prior stroke / TIA / thromboembolism","<b>2</b>"],
          ["V","Vascular disease (MI, PAD, aortic plaque)","1"],
          ["A","Age 65\u201374","1"],
          ["Sc","Sex category female","1"]
        ]},
        {b:"kv", rows:[
          ["\u22652","<b>Offer anticoagulation</b> (annual stroke risk \u22652.2%, rises steeply)"],
          ["Male = 1","<b>Consider</b> \u2014 usually anticoagulate unless the single point is soft and the patient prefers not"],
          ["0 (male) / 1 from sex alone (female)","No anticoagulation \u2014 re-score at least annually and at every review; a 64-year-old becomes 65"],
          ["Aspirin","<b>No role, ever</b> \u2014 ineffective for AF stroke prevention, still bleeds. If you inherit a patient on aspirin 'for AF', that's an action, not a note"]
        ]}
      ]},

    {t:"node", d:"drug", n:"3", tag:"Stream A · anticoagulate", title:"Choose and dose the DOAC — the details that prevent harm",
      blocks:[
        {b:"table", head:["DOAC","Standard dose","Reduce to","Reduce when (the exact rules)"], rows:[
          ["<b>Apixaban</b>","5mg BD","2.5mg BD","\u22652 of: age \u226580 \u00b7 weight \u226460kg \u00b7 creatinine \u2265133 \u2014 or CrCl 15\u201329"],
          ["<b>Edoxaban</b>","60mg OD","30mg OD","Any of: CrCl 15\u201350 \u00b7 weight \u226460kg \u00b7 ciclosporin/dronedarone/erythromycin/ketoconazole"],
          ["<b>Rivaroxaban</b>","20mg OD <b>with food</b>","15mg OD","CrCl 15\u201349 (absorption fails without food \u2014 counsel it)"],
          ["<b>Dabigatran</b>","150mg BD","110mg BD","Age \u226580 \u00b7 verapamil \u00b7 higher bleeding risk; <b>avoid CrCl <30</b> (most renally-cleared)"]
        ]},
        {b:"kv", rows:[
          ["CrCl, not eGFR","Dose by <b>Cockcroft-Gault creatinine clearance</b> \u2014 eGFR over-doses small elderly women (the classic DOAC error). Our CrCl calculator does it in seconds"],
          ["Under-dosing kills too","'Being kind' with 2.5mg apixaban in a patient who doesn't meet 2 criteria = stroke risk with bleeding risk. Dose by the rules, both directions"],
          ["Interactions","Avoid with carbamazepine, phenytoin, rifampicin, St John's Wort (all reduce DOAC levels \u2192 stroke); caution clarithromycin/azoles (increase levels); NSAIDs multiply bleeding \u2014 deprescribe"],
          ["Warfarin still wins","<b>Mechanical valve or moderate\u2013severe mitral stenosis = warfarin only</b> (INR 2\u20133; higher for some valves); also antiphospholipid syndrome (triple-positive), CrCl <15, and DOAC intolerance/cost"],
          ["Missed dose rules","BD drugs: take if <6h late, else skip. OD drugs: take same day if remembered. Never double up"],
          ["Procedures","Low-bleed-risk: skip 24h before, restart 6h+ after; high-risk 48h (longer for dabigatran with renal impairment) \u2014 see the DOAC guide card for the full table"]
        ]},
        {b:"warn", html:"<b>Anticoagulant + antiplatelet together for AF alone = bleeding with no benefit</b> \u2014 stop the antiplatelet the day the DOAC starts (exception: recent stent, specialist-led and time-limited \u2014 clarify the stop date with cardiology, don't let 'triple therapy' run on by repeat-prescription inertia)."}
      ]},

    {t:"node", d:"safety", n:"4", tag:"Stream A · bleeding", title:"ORBIT — fix the bleeding risk, never use it as a veto",
      blocks:[
        {b:"kv", rows:[
          ["Score it","ORBIT (NG196-preferred over HAS-BLED): sex+haemoglobin, age >74, bleeding history, renal impairment, antiplatelet use \u2014 our calculator scores it"],
          ["High score means","<b>Fix the fixables and review more often</b> \u2014 it is NOT a reason to withhold: stroke risk almost always outweighs bleeding risk in AF"],
          ["The fixables","BP to target \u00b7 stop NSAIDs (incl. OTC) \u00b7 stop unneeded antiplatelets \u00b7 alcohol down \u00b7 PPI cover if prior GI bleed/dyspepsia \u00b7 treat anaemia (and find its cause \u2014 occult GI loss?) \u00b7 falls: treat the falling (strength/balance, meds review, eyes), don't stop the DOAC"],
          ["The falls myth","A patient would need to fall <b>hundreds of times a year</b> for fall-related bleeding to outweigh stroke prevention \u2014 'they fall' is almost never a reason to withhold"],
          ["Genuinely can't anticoagulate","Recurrent major bleeding despite everything \u2192 left atrial appendage occlusion (specialist) \u2014 refer rather than accept nothing"]
        ]}
      ]},

    {t:"node", d:"drug", n:"5", tag:"Stream B · rate", title:"Rate control — the ladder with doses",
      blocks:[
        {b:"p", html:"Rate control first for most. Target: <strong>resting HR <110</strong> if asymptomatic (lenient \u2014 RACE II); tighten toward <80 only if still symptomatic."},
        {b:"ladder", steps:[
          {step:"Step 1", title:"Beta-blocker (not sotalol)", when:"first for most",
           html:"<b>Bisoprolol 2.5 \u2192 10mg OD</b> (or atenolol/metoprolol). Asthma is NOT an absolute bar (cardioselective, most tolerate) \u2014 true reactive brittle asthma \u2192 CCB instead."},
          {step:"Alt 1", title:"Rate-limiting CCB", when:"BB not tolerated / contraindicated",
           fromLabel:"choose by comorbidity",
           html:"<b>Diltiazem MR 120 \u2192 360mg</b> or verapamil 40mg TDS \u2192 240\u2013480mg/d. <b>NEVER in HFrEF</b> (negative inotropes); never combined with a \u03b2-blocker without specialist advice (block risk)."},
          {step:"Alt 2", title:"Digoxin", when:"sedentary / HF / add-on",
           fromLabel:"HR above target on monotherapy",
           html:"Load 250\u2013500mcg \u00d72\u20133 doses 6h apart (frailty: less), maintain <b>125\u2013250mcg OD</b> (62.5 elderly/renal). Controls resting not exertional rate \u2014 monotherapy suits the sedentary; otherwise add to BB or CCB. Toxicity: nausea, visual disturbance, arrhythmia \u2192 level + K\u207a (hypokalaemia potentiates)."},
          {step:"Step 3", title:"Dual therapy", when:"still above target / symptomatic",
           fromLabel:"BB + digoxin (or CCB + digoxin)",
           html:"Still uncontrolled on two \u2192 rhythm-control referral rather than a third rate agent."}
        ]}
      ]},

    {t:"node", d:"drug", n:"6", tag:"Stream B · rhythm", title:"Rhythm control — who deserves it EARLY",
      blocks:[
        {b:"kv", rows:[
          ["Refer early for rhythm strategy","<b>Young/active patients \u00b7 AF causing (or worsening) heart failure \u00b7 symptomatic despite rate control \u00b7 new-onset AF \u00b7 clear reversible trigger now fixed</b>. The era of 'rate control for everyone' is over \u2014 early rhythm control improves outcomes in the first year of diagnosis (EAST-AFNET 4), and AF-induced cardiomyopathy is reversible"],
          ["Cardioversion","Onset <48h \u2192 can cardiovert acutely; otherwise \u22653 weeks therapeutic anticoagulation first (or TOE-guided) \u2014 and anticoagulation continues \u22654 weeks after (by score, usually forever)"],
          ["Drugs (specialist-initiated)","Flecainide (only if NO structural/ischaemic disease \u2014 always with a rate-limiter), sotalol, dronedarone, amiodarone (the LV-impairment option; TFT/LFT baseline + 6-monthly, CXR baseline)"],
          ["Pill-in-the-pocket","Infrequent paroxysmal AF, no structural disease, SBP >100: single-dose flecainide self-administered \u2014 specialist-assessed first"],
          ["Ablation","Paroxysmal/persistent AF failing (or intolerant of) one rhythm drug \u2014 increasingly first-line for the young symptomatic. Anticoagulation continues after by CHA\u2082DS\u2082-VASc regardless of apparent success"]
        ]}
      ]},

    {t:"node", d:"monitor", n:"7", tag:"Step 7 · review", title:"The annual AF review — both streams, every time",
      blocks:[
        {b:"table", head:["What","When","Action"], rows:[
          ["Re-score CHA\u2082DS\u2082-VASc","Annually + every review","Not-anticoagulated patients cross thresholds (birthdays, new diagnoses) \u2014 the commonest missed action in AF care"],
          ["CrCl for DOAC dose","Annually; <b>6-monthly if CrCl 30\u201360 or frail; after any acute illness/AKI</b>","Re-dose by the table; rule of thumb: recheck interval (months) \u2248 CrCl \u00f7 10"],
          ["FBC + LFTs","Annually","Falling Hb on an anticoagulant = find the bleed (FIT/scope thinking), don't just stop the DOAC"],
          ["Adherence","Every review","DOACs have short half-lives \u2014 missed doses = unprotected days. Once-daily options / dosette / reminder apps"],
          ["HR + symptoms","Every review","Above target or symptomatic \u2192 ladder step or rhythm referral"],
          ["Weight, alcohol, BP, OSA","Annually","The substrate work \u2014 weight loss reduces AF burden (LEGACY)"]
        ]},
        {b:"say", html:"Two separate jobs, two sets of tablets: the blood thinner is the life-saver \u2014 it works silently and must carry on even when you feel completely well; the heart-rate tablet is the comfort one. If you ever see blood \u2014 in vomit, urine, or black bowel motions \u2014 or you hit your head, that's A&E, not a wait-and-see."}
      ]},

    {t:"loop", icon:"🔁", title:"Not controlled — or bleeding worries? Check before changing course",
      arrow:"\u2026most problems are fixable without losing protection",
      checks:[
        {b:"1 · Adherence", html:"Anticoagulant actually taken daily? Rate tablet at max tolerated before adding?"},
        {b:"2 · Driver recheck", html:"Thyroid, alcohol, OSA, anaemia, infection — has one crept in?"},
        {b:"3 · Right dose?", html:"CrCl re-calculated? Reduction criteria genuinely met (both directions)?"},
        {b:"4 · Bleeding source", html:"Bleeding on a DOAC → find and fix the source + ORBIT fixables — stopping protection is the last resort, not the first."},
        {b:"5 · Target realistic?", html:"HR 100 and asymptomatic = fine (lenient is evidence-based). Chasing 70 adds side effects, not benefit."},
        {b:"6 · Strategy", html:"Symptomatic despite good rate → rhythm referral; don't stack a third rate drug."}
      ],
      back:"All checked → escalate ladder / rhythm referral / LAA occlusion discussion"},

    {t:"node", d:"safety", n:"8", tag:"Safety-net", title:"What the patient must know",
      blocks:[
        {b:"tiles", v:"safety", items:[
          {t:"🔴 Stroke — FAST", html:"\u201cFace, arm, speech — 999 immediately, even if it passes in minutes (that's an emergency too).\u201d"},
          {t:"🩸 Bleeding", html:"\u201cBlack tarry stools, vomiting blood, blood in urine, a bleed that won't stop, or ANY head injury — A&E, tell them you're on a blood thinner.\u201d"},
          {t:"💓 Collapse", html:"\u201cRacing heart WITH chest pain, fainting or severe breathlessness — 999.\u201d"},
          {t:"💊 The golden rule", html:"\u201cNever stop the blood thinner because you feel well — feeling well is what it's for. And check before adding ibuprofen or herbal remedies.\u201d"}
        ]}
      ]},

    {t:"node", d:"refer", n:"9", tag:"Refer", title:"Cardiology — who and how fast",
      blocks:[
        {b:"tiles", v:"refer", items:[
          {t:"999", html:"Haemodynamic compromise; suspected pre-excitation with fast AF (no rate-limiters — they can accelerate it)."},
          {t:"Urgent / same-day", html:"New-onset <48h (cardioversion window); fast AF poorly tolerated; AF with decompensating HF."},
          {t:"Early rhythm referral", html:"Young/active; AF-driven HF; symptomatic despite rate control; post-trigger AF — for cardioversion/drugs/ablation."},
          {t:"Valvular", html:"Mechanical valve / significant mitral stenosis (warfarin + specialist); any significant murmur without an echo yet."},
          {t:"Anticoagulation impossible", html:"Recurrent major bleeding despite full optimisation → LAA occlusion assessment."}
        ]},
        {b:"say", html:"Your rate tablets have done their bit but you're still feeling the rhythm, and you're exactly the kind of patient who does well from getting the normal rhythm back \u2014 so I'm sending you to the heart-rhythm team. The blood thinner carries on throughout, whatever they do."}
      ]}
  ],
  foot:"Atrial fibrillation in adults \u2014 NICE NG196 with ESC 2024 concepts (early rhythm control). Doses/rules cross-checked with the DOAC & Anticoagulation guide card. Verify against the current BNF before prescribing."
});
</script>
