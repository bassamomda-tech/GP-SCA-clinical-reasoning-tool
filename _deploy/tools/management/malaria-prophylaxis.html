MG.render({"icon":"🦟","title":"Malaria Prophylaxis","guideline":"PHE/UKHSA travel guidance","stemTitle":"Malaria prevention — ABCD: Awareness, Bite avoidance, Chemoprophylaxis, Diagnose promptly","stemSub":"Primary-care malaria prevention for travellers — assess destination-specific risk, advise bite avoidance, select appropriate chemoprophylaxis by region/resistance and patient factors, and stress that any fever after travel needs urgent assessment. UKHSA/PHE travel guidance · 2026.","glance":[{"lbl":"Framework","val":"ABCD","sub":"Awareness, Bite avoidance, Chemoprophylaxis, Diagnose"},{"lbl":"Risk","val":"Destination-specific","sub":"check current guidance"},{"lbl":"Options","val":"Atovaquone-proguanil 1 tab OD · doxy 100 mg OD · mefloquine 250 mg/wk","sub":"region + patient factors"},{"lbl":"Bite avoidance","val":"DEET, nets, covering","sub":"dusk–dawn"},{"lbl":"Start/stop","val":"Per drug","sub":"continue after return"},{"lbl":"Red flag","val":"Fever after travel","sub":"= urgent — ?malaria"}],"flow":[{"t":"node","d":"safety","n":"1","tag":"Safety-net","title":"Fever after travel = emergency","blocks":[{"b":"tiles","v":"safety","items":[{"t":"🔴 Any fever post-travel","html":"Fever (or flu-like illness) during or up to a year after travel to an endemic area → <b>urgent same-day assessment + malaria films/RDT</b> — falciparum malaria can kill within days."},{"t":"🔴 Severe/falciparum","html":"Impaired consciousness, jaundice, oliguria, bleeding, breathlessness → emergency admission."},{"t":"⚠️ No prophylaxis is 100%","html":"Stress that chemoprophylaxis reduces but does not eliminate risk — seek help for any fever regardless."},{"t":"🤰 High-risk travellers","html":"Pregnant women, young children, asplenic, immunocompromised — advise against travel to high-risk areas if possible; specialist advice."}]},{"b":"why","html":"The single most important message is that malaria prophylaxis is never fully protective, so any fever during or after travel to an endemic area must be treated as possible malaria and investigated urgently — falciparum is rapidly fatal."}]},{"t":"node","d":"found","n":"2","tag":"Foundation","title":"Risk assessment","blocks":[{"b":"kv","rows":[["Destination + itinerary","Country, regions, rural vs urban, altitude, season, duration, accommodation — check up-to-date country-specific recommendations (UKHSA/TRAVAX/NaTHNaC)"],["Patient factors","Age, pregnancy/breastfeeding, comorbidity (epilepsy, depression — mefloquine; renal), drugs/interactions, G6PD (if primaquine considered), previous tolerance"],["Last-minute / VFR","‘Visiting friends & relatives’ travellers are higher risk — reinforce prophylaxis + bite avoidance"],["Vaccines + other advice","Combine with general travel-health review"]]}]},{"t":"node","d":"life","n":"3","tag":"Non-drug · essential","title":"Bite avoidance","blocks":[{"b":"tiles","v":"life","items":[{"t":"🦟 Bite prevention","html":"DEET 20–50% repellent, insecticide-treated bed nets, cover up at dusk/dawn."},{"t":"🌍 Risk assessment","html":"Check destination, season and resistance pattern; screened/air-con accommodation."},{"t":"📋 Awareness","html":"Carry a fever-action plan; no measure is 100% — seek care for any fever."}]},{"b":"why","html":"Chemoprophylaxis is never 100%, so mosquito-bite avoidance is an essential, equal partner to the tablets."}]},{"t":"node","d":"drug","n":"4","tag":"Chemoprophylaxis","title":"Select by region + patient","blocks":[{"b":"ladder","steps":[{"step":"Bite avoidance (all)","title":"Mosquito-bite prevention","when":"essential for everyone","html":"DEET-based repellent (20–50%), insecticide-treated bed nets, cover skin at dusk–dawn, air-con/screens — first and non-negotiable layer."},{"step":"Option A","title":"Atovaquone-proguanil (Malarone)","when":"short trips / many regions","fromLabel":"choice by region/resistance","html":"Start 1–2 days before, daily, continue 7 days after return; well tolerated; good for last-minute/short trips (cost)."},{"step":"Option B","title":"Doxycycline","when":"alternative","fromLabel":"alternative","html":"Start 1–2 days before, daily, continue 4 weeks after return; photosensitivity, avoid in pregnancy/children &lt;12; can double as some other cover."},{"step":"Option C","title":"Mefloquine","when":"weekly option / longer trips","fromLabel":"alternative","html":"Weekly; start 2–3 weeks before (assess tolerance), continue 4 weeks after; <b>avoid</b> in neuropsychiatric history/epilepsy (vivid dreams, mood, seizures)."}]},{"b":"warn","html":"Exact regimen depends on current destination-specific resistance data — always check live UKHSA/NaTHNaC guidance. Counsel clearly on start/stop timing and adherence after return (the commonest failure point)."}]},{"t":"node","d":"follow","n":"5","tag":"Follow-up & advice","title":"Adherence & post-travel safety-net","blocks":[{"b":"timeline","items":[{"n":"1","when":"Before & during travel","title":"Adherence is everything","html":"Stress <b>start before travel, take throughout, and continue after return</b> as per agent (e.g. atovaquone-proguanil 1–2 days before to 7 days after; doxycycline/mefloquine to 4 weeks after). Combine with bite avoidance (DEET, nets, covering up)."},{"n":"2","when":"Any fever up to 1 year after","title":"Critical safety-net","html":"Advise: <b>any fever during or within 1 year of travel (especially the first 3 months) needs urgent assessment for malaria</b> — prophylaxis is not 100% protective. Seek same-day medical care and mention the travel."},{"n":"3","when":"Special groups","title":"Check suitability","html":"Re-check pregnancy, children, epilepsy/psychiatric history (mefloquine), G6PD (primaquine) and drug interactions against the destination's resistance pattern before issuing."}]},{"b":"say","html":"Take the tablets exactly as directed, including after you get back, and use repellent and nets too. Most importantly: any fever within a year of travel — get checked urgently and say you've been to a malaria area."}]},{"t":"node","d":"refer","n":"6","tag":"Refer","title":"Onward + advice","blocks":[{"b":"tiles","v":"refer","items":[{"t":"Travel clinic","html":"Complex itineraries, high-risk/atypical travellers, vaccines, or where prophylaxis choice is uncertain."},{"t":"Urgent (post-travel)","html":"Any febrile returning traveller → same-day assessment + malaria testing; admit if severe."},{"t":"Specialist","html":"Pregnancy/young children/asplenic/immunocompromised travelling to high-risk areas."}]},{"b":"say","html":"To prevent malaria, think ABCD: be Aware of the risk, avoid mosquito Bites (repellent and nets, especially at night), take your Chemoprophylaxis tablets exactly — including for weeks after you get back — and Diagnose quickly: if you get any fever during or after the trip, see a doctor the same day. No tablet is 100%, so that fever rule is vital."}]}],"foot":"Malaria prevention in primary care — regimen choice depends on current destination-specific guidance. Any febrile returning traveller needs urgent malaria testing. Verify against current UKHSA/NaTHNaC/TRAVAX guidance and the BNF."});
</script>
