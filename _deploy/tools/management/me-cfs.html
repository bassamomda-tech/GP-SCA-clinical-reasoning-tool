MG.render({"icon":"🔋","title":"ME/CFS","guideline":"NICE NG206","stemTitle":"ME/CFS — diagnose on criteria, manage energy, avoid harm","stemSub":"Primary-care management of myalgic encephalomyelitis/chronic fatigue syndrome — diagnose using NG206 criteria after excluding mimics, support energy management (pacing) without prescribing fixed graded exercise, manage symptoms, and refer to a specialist ME/CFS service. NICE NG206 · 2026.","glance":[{"lbl":"Core","val":"Post-exertional malaise","sub":"+ fatigue, unrefreshing sleep, cognitive"},{"lbl":"Diagnose","val":"Symptoms ≥3 months","sub":"after excluding other causes"},{"lbl":"Energy","val":"Pacing / energy management","sub":"patient-led"},{"lbl":"Do NOT","val":"Prescribe fixed GET","sub":"or ‘cure’ claims"},{"lbl":"Refer","val":"Specialist ME/CFS service","sub":"to confirm + support"},{"lbl":"Red flag","val":"Alternative diagnosis features","sub":"= investigate"}],"flow":[{"t":"node","d":"found","n":"1","tag":"Foundation","title":"Diagnose (NG206) + exclude mimics","blocks":[{"b":"kv","rows":[["Suspect","Debilitating fatigue + <b>post-exertional malaise</b> (worsening after minimal activity, often delayed) + unrefreshing sleep + cognitive difficulties (‘brain fog’), not relieved by rest, with functional impairment"],["Diagnose","If these persist ≥ 3 months and other causes excluded (NG206); confirm/review by 3 months, ideally with specialist input"],["Exclude","FBC, U&E, LFTs, TFTs, glucose/HbA1c, ESR/CRP, calcium, ferritin, coeliac serology, CK, vitamin D ± others by history — exclude anaemia, thyroid, coeliac, diabetes, inflammatory/infective causes, depression"],["Assess","Severity, functional impact, comorbidity (mood, orthostatic intolerance, IBS-type symptoms)"]]},{"b":"why","html":"NG206 reframed ME/CFS: post-exertional malaise is central, and the diagnosis is positive (on criteria after excluding mimics), made by 3 months. Crucially, it warns against fixed graded exercise programmes and any therapy presented as curative."}]},{"t":"node","d":"life","n":"2","tag":"Management","title":"Energy management + support","blocks":[{"b":"tiles","v":"life","items":[{"t":"🔋 Pacing","html":"Patient-led <b>energy management</b> — staying within the ‘energy envelope’ to avoid triggering PEM; flexible activity/rest, not fixed incremental increases."},{"t":"🛌 Sleep","html":"Sleep hygiene; manage unrefreshing/disrupted sleep; avoid over-sleeping advice that doesn’t help."},{"t":"🧠 Support, not cure","html":"CBT may be offered to support coping/distress (NOT as a cure); be explicit it doesn’t reverse the illness."},{"t":"🍽️ Nutrition + comorbidity","html":"Maintain nutrition/hydration; treat orthostatic intolerance, pain, mood, IBS symptoms."}]},{"b":"warn","html":"Do NOT offer fixed/incremental graded exercise therapy (GET) or any programme based on the premise that ME/CFS is caused by deconditioning, and do not advise ‘push through’ — this can cause harm (NG206)."}]},{"t":"node","d":"drug","n":"3","tag":"Symptom control","title":"Targeted","blocks":[{"b":"kv","rows":[["Pain","Analgesia per cause; neuropathic agents if neuropathic pain features"],["Sleep","Address insomnia; cautious, time-limited approaches"],["Orthostatic intolerance","Fluids/salt as appropriate; review medications; specialist advice"],["Mood","Treat coexisting depression/anxiety on their own merits (ME/CFS is not a primary psychiatric illness)"]]}]},{"t":"node","d":"follow","n":"4","tag":"Follow-up","title":"Ongoing support (NG206)","blocks":[{"b":"timeline","items":[{"n":"1","when":"Regular review","title":"Personalised care","html":"Review at agreed intervals; coordinate a <b>personalised care and support plan</b> (NG206). Manage symptoms individually — sleep, pain, comorbid mood. <b>Do not</b> offer graded exercise therapy as a cure."},{"n":"2","when":"Energy management","title":"Activity within limits","html":"Support <b>energy management/pacing</b> staying within the individual's energy envelope to avoid post-exertional malaise; involve OT/physio experienced in ME/CFS."},{"n":"3","when":"Worsening / severe","title":"Specialist & safety","html":"Refer to a specialist ME/CFS service for confirmation and complex/severe disease; assess nutrition and risk in the housebound."}]},{"b":"say","html":"There's no quick fix, but careful pacing within your energy limits is the foundation, and we'll build a plan around your worst symptoms and review it regularly."}]},{"t":"node","d":"safety","n":"5","tag":"Safety-net","title":"Red flags — it isn't ME/CFS","blocks":[{"b":"tiles","v":"safety","items":[{"t":"🔴 Alarm features","html":"Weight loss, lymphadenopathy, fever/night sweats, or focal neurology → investigate for an alternative diagnosis."},{"t":"🟠 Severe / housebound","html":"Rapid deterioration, or unsafe nutrition/hydration → urgent specialist and safeguarding-aware review."},{"t":"💬 Safety-net","html":"If you lose weight unintentionally, develop fevers, lumps, or new neurological symptoms, tell us — those are not part of ME/CFS."}]}]},{"t":"node","d":"refer","n":"6","tag":"Refer","title":"Referral + severe disease","blocks":[{"b":"tiles","v":"refer","items":[{"t":"Specialist ME/CFS service","html":"Refer to confirm diagnosis and for multidisciplinary support and an individualised care/energy-management plan."},{"t":"Severe/very severe","html":"Housebound/bedbound — proactive support, home visits, attention to nutrition, pressure care, sensory environment; safeguarding awareness."},{"t":"Investigate","html":"Atypical features / new red flags → reconsider/exclude alternative diagnoses."},{"t":"Mental health","html":"If significant comorbid depression/anxiety."}]},{"b":"say","html":"This is ME/CFS. The key feature is that even small amounts of activity can leave you much worse for a day or more — so management is about pacing and staying within your energy limits, not pushing through or a fixed exercise plan, which can make things worse. We’ll rule out other causes, support your symptoms, and refer you to a specialist service."}]}],"foot":"Management of ME/CFS in primary care per NG206 — positive diagnosis on criteria, energy management/pacing, and avoidance of fixed graded exercise. Verify against current NICE NG206."});
</script>
