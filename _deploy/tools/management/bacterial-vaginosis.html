MG.render({"icon":"🌸","title":"Bacterial Vaginosis","guideline":"BASHH / CKS","stemTitle":"Bacterial vaginosis — metronidazole for symptomatic disease","stemSub":"Primary-care management of bacterial vaginosis — an overgrowth of anaerobes (not an STI) causing thin, fishy discharge; treat symptomatic cases with metronidazole, advise on avoidable triggers, and manage in pregnancy. BASHH · CKS · 2026.","glance":[{"lbl":"Pattern","val":"Thin grey, fishy","sub":"pH ≥4.5, no itch"},{"lbl":"1st-line","val":"Metronidazole 400 mg BD 5–7d","sub":"400 mg BD 5–7d or 2 g stat"},{"lbl":"Alternative","val":"Topical metro/clinda","sub":"if oral not tolerated"},{"lbl":"Not an STI","val":"No partner treatment","sub":"recurrence common"},{"lbl":"Pregnancy","val":"Treat if symptomatic","sub":"avoid 2 g dose"},{"lbl":"Avoid","val":"Douching / soaps","sub":"disrupt flora"}],"flow":[{"t":"node","d":"found","n":"1","tag":"Foundation","title":"Diagnose","blocks":[{"b":"kv","rows":[["Presentation","Thin, grey-white, homogeneous discharge with a <b>fishy odour</b> (worse after sex/menses); <b>no itch or soreness</b> (distinguishes from candida)"],["Cause","Loss of lactobacilli → overgrowth of anaerobes (Gardnerella). Not sexually transmitted, but associated with sexual activity"],["Diagnosis","Clinical ± vaginal pH ≥4.5; high vaginal swab (clue cells) if uncertain/recurrent"],["Exclude","Candida (itch, thick white), trichomonas (frothy, STI), retained tampon"]]},{"b":"why","html":"BV is the commonest cause of abnormal discharge; the fishy odour and absence of itch with a raised pH distinguish it from candida. It is not an STI, so partners are not treated — but it recurs and matters in pregnancy."}]},{"t":"node","d":"safety","n":"2","tag":"Safety-net","title":"When it matters more","blocks":[{"b":"tiles","v":"safety","items":[{"t":"🤰 Pregnancy","html":"BV is associated with preterm birth/late miscarriage — treat symptomatic infection; avoid the 2 g single dose; oral metronidazole used in pregnancy."},{"t":"🩺 Procedures","html":"Consider treating before TOP/IUD insertion/gynae surgery to reduce post-procedure infection."},{"t":"🟠 Recurrent","html":"Frequent recurrence → review triggers; consider longer/suppressive regimens (specialist) and reconsider diagnosis."}]}]},{"t":"node","d":"drug","n":"3","tag":"Medication","title":"Treatment","blocks":[{"b":"ladder","steps":[{"step":"1st-line","title":"Oral metronidazole","when":"symptomatic","html":"Metronidazole 400 mg BD for 5–7 days (or 2 g single dose, not in pregnancy/breastfeeding). Avoid alcohol during + 48h after."},{"step":"Alternative","title":"Topical metronidazole / clindamycin","when":"if oral not tolerated","fromLabel":"oral unsuitable","html":"<b>Oral metronidazole 400 mg BD for 5–7 days</b> (or 2 g single dose); alternatively <b>intravaginal metronidazole 0.75% gel OD ×5</b> or <b>clindamycin 2% cream</b> (weakens latex condoms)."},{"step":"Recurrent","title":"Triggers + suppression","when":"frequent recurrence","fromLabel":"if recurrent","html":"Avoid douching/perfumed products; consider suppressive regimens via specialist."}]},{"b":"warn","html":"Asymptomatic BV generally needs no treatment (except sometimes before procedures/in pregnancy with risk). Do not treat partners — it is not an STI."}]},{"t":"node","d":"life","n":"4","tag":"Advice","title":"Self-care","blocks":[{"b":"tiles","v":"life","items":[{"t":"🚿 Avoid douching","html":"Don’t douche or use perfumed soaps/bubble bath — they disrupt protective lactobacilli."},{"t":"🧼 Gentle washing","html":"Water or unperfumed emollient externally only."},{"t":"🔁 Expect recurrence","html":"Reassure recurrence is common and re-treatable."}]},{"b":"say","html":"This is bacterial vaginosis — an imbalance of the normal vaginal bacteria, not an infection caught from a partner. A short course of antibiotic clears the symptoms. Avoiding douching and perfumed washes helps prevent it. It can come back, and if it does we can simply treat again."}]},{"t":"node","d":"follow","n":"5","tag":"Follow-up","title":"Recurrence and review","blocks":[{"b":"timeline","items":[{"n":"1","when":"No routine test of cure","title":"Symptom-based review","html":"No test of cure needed if symptoms resolve. Re-test only if symptoms persist or recur."},{"n":"2","when":"Recurrent BV (≥3 episodes/yr)","title":"Suppressive options","html":"Confirm the diagnosis (pH, microscopy). Treat each episode with <b>metronidazole 400 mg BD for 7 days</b>; for frequent recurrence consider <b>metronidazole 0.75% vaginal gel twice weekly for up to 16 weeks</b> (specialist/CKS) and review avoidable triggers."},{"n":"3","when":"Recurrent / diagnostic doubt","title":"Refer to GUM","html":"Persistent or recurrent symptoms despite treatment, diagnostic uncertainty, or coexisting STI risk → sexual-health clinic."}]},{"b":"say","html":"BV often comes back, and that doesn't mean anything has been done wrong. If it returns, we can treat each episode and, if it's frequent, use a longer course to keep it away."}]},{"t":"node","d":"refer","n":"6","tag":"Refer","title":"When to refer","blocks":[{"b":"tiles","v":"refer","items":[{"t":"🟠 Recurrent / persistent","html":"3 or more episodes/year or symptoms persisting despite treatment → sexual-health (GUM) clinic."},{"t":"🟠 Diagnostic uncertainty","html":"Atypical features, coexisting STI risk, or diagnostic doubt → GUM for microscopy/pH."},{"t":"🤰 Pregnancy","html":"Symptomatic BV in pregnancy with adverse history → discuss with obstetrics."}]}]}],"foot":"Management of bacterial vaginosis in primary care; not an STI so partners are not treated. Verify against current NICE CKS and BASHH guidance."});
</script>
