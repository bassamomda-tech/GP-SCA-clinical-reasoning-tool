  stemSub:"One pathway: confirm it's chronic (not AKI), stage on the G\u00d7A grid that drives everything, find the cause, deploy the four kidney-protecting drugs with their exact criteria, manage anaemia / bone / potassium / acidosis by the numbers, dose-gate the everyday drugs, monitor by risk cell, and refer on KFRE \u2014 not just eGFR. NICE NG203 \u00b7 KDIGO.",
  guideline:"NICE NG203 \u00b7 KDIGO 2024",
  glance:[

    {lbl:"BP target", val:"<140/90", sub:"<130/80 if ACR \u226570 or DM"},
    {lbl:"Protect", val:"ACEi/ARB + SGLT2i", sub:"+ statin \u00b7 \u00b1 finerenone"},
    {lbl:"Refer if", val:"KFRE >5% / 5y", sub:"or eGFR<30 \u00b7 ACR\u226570"},

  ],
  flow:[

    {t:"node", d:"found", n:"1", tag:"Step 1 · confirm & stage", title:"Confirm it's chronic, stage it on the grid, find the cause",
      blocks:[
        {b:"kv", rows:[
          ["Definition","eGFR <60 and/or ACR \u22653 mg/mmol, <b>persisting \u226590 days on two samples</b>. A single low eGFR is NOT CKD \u2014 repeat within 2 weeks if new (exclude AKI), then confirm at 3 months"],
          ["The samples","<b>Early-morning urine ACR</b> (confirm 3\u201370 with a repeat; \u226570 needs no repeat); creatinine avoiding meat-heavy meals; consider cystatin-C eGFR to confirm G3a with A1 in the well (muscle-mass distortions)"],
          ["Dip for blood, send for ACR","Never dip for protein (insensitive). Persistent non-visible haematuria + ACR \u226530 \u2192 nephrology (glomerular); visible haematuria \u2192 2WW urology first"],
          ["Find the CAUSE","Diabetes and hypertension explain most \u2014 but check: obstruction (LUTS \u2192 bladder scan/USS), drugs (NSAIDs, lithium, PPIs\u2013AIN), myeloma in the >60 with anaemia + high Ca (serum electrophoresis + light chains), FHx (PKD \u2192 USS), systemic features (vasculitis \u2192 urgent)"],
          ["USS if","Accelerated decline, visible haematuria, obstruction symptoms, FHx PKD, or eGFR <30 newly found"]
        ]},
        {b:"table", head:["G \u00d7 A grid","A1 (<3)","A2 (3\u201330)","A3 (>30)"], rows:[
          ["G1\u20132 (\u226560)","Not CKD (unless other marker) \u00b7 annual if risk","<b>CKD</b> \u00b7 review annually","High risk \u00b7 6-monthly"],
          ["G3a (45\u201359)","Annual","6\u201312-monthly","6-monthly"],
          ["G3b (30\u201344)","6-monthly","6-monthly","3\u20136-monthly"],
          ["G4 (15\u201329)","3\u20136-monthly + refer criteria","3-monthly","3-monthly \u00b7 nephrology"],
          ["G5 (<15)","Nephrology","Nephrology","Nephrology"]

        {b:"why", html:"The grid is the whole disease in one picture: <strong>risk rises diagonally</strong> \u2014 a G2/A3 patient (normal-ish eGFR, heavy protein) outranks a stable G3a/A1. ACR is both the risk marker AND the treatment target: it selects who gets RAAS blockade, who gets the SGLT2i, and who gets referred."}
      ]},

    {t:"node", d:"life", n:"2", tag:"Step 2 · protect", title:"Protect the kidneys — the daily rules",
      blocks:[
        {b:"tiles", v:"life", items:[
          {t:"🚫 NSAIDs", html:"The #1 avoidable nephrotoxin — including OTC ibuprofen and topical-to-oral drift. Flag it on the record; offer alternatives."},
          {t:"🤢 Sick-day rules", html:"D&V/dehydration → pause ACEi/ARB, diuretics, SGLT2i, metformin, NSAIDs for 48h. The classic primary-care AKI is this combination in a dry patient."},
          {t:"🧂 Diet", html:"Salt <6g; no protein restriction in primary care (harms more than helps); renal dietitian from G4 (K⁺/phosphate)."},
          {t:"🚭 Smoking + weight + activity", html:"CV death is the commonest CKD outcome — these count double."},
          {t:"💉 Vaccines", html:"Flu, pneumococcal, COVID; hepatitis B series if heading toward dialysis (G4\u20135)."},
          {t:"📋 Med review", html:"Every review: hunt dose errors (next node), stopped-indication drugs, and interacting OTC/herbals."}
        ]}
      ]},

    {t:"node", d:"drug", n:"3", tag:"Step 3 · the big four", title:"The four kidney-protecting drugs — exact criteria",
      blocks:[
        {b:"ladder", steps:[
          {step:"1", title:"BP to target + ACEi/ARB if proteinuric", when:"the foundation",
           html:"<b>Target <140/90; <130/80 if ACR \u226570 or diabetes.</b> ACEi/ARB (ramipril \u2192 10mg / losartan \u2192 100mg / candesartan \u2192 32mg) <b>titrated to maximum tolerated</b> for: ACR \u226570 (anyone), ACR \u226530 + hypertension, or ACR \u22653 + diabetes. U&E before + 1\u20132 weeks after each titration: creatinine rise \u226430% / eGFR fall \u226425% is EXPECTED and acceptable \u2014 don't stop for it. Never ACEi + ARB together."},
          {step:"2", title:"SGLT2 inhibitor", when:"proteinuric CKD \u00b1 diabetes",
           fromLabel:"on top of maximised ACEi/ARB",
           html:"<b>Dapagliflozin 10mg OD</b>: offer if <b>ACR \u226522.6</b> (diabetic or not, eGFR \u226515 to initiate), or T2DM + ACR >3. Slows eGFR decline ~40% (DAPA-CKD). Expect an initial eGFR dip (~3\u20135) \u2014 don't stop. Sick-day pause; DKA counselling in diabetics; genital hygiene advice."},
          {step:"3", title:"Statin", when:"ALL CKD",
           fromLabel:"CV risk is the main killer",
           html:"<b>Atorvastatin 20mg</b> regardless of QRISK (CKD is a QRISK-independent indication); uptitrate if non-HDL not down 40%."},
          {step:"4", title:"Finerenone", when:"T2DM + CKD still proteinuric",
           fromLabel:"the newest addition",
           html:"<b>Finerenone 10\u201320mg OD (TA877)</b>: T2DM with ACR \u22653 despite maximised ACEi/ARB (+SGLT2i), eGFR \u226525, K\u207a \u22645.0. Check K\u207a at 1 month then with monitoring bloods \u2014 it's a non-steroidal MRA: hyperkalaemia is the trade."}
        ]},
        {b:"table", head:["Everyday drug","Gate","Action"], rows:[
          ["Metformin","eGFR <45 \u2192 review/halve; <b><30 \u2192 stop</b>","Switch per diabetes ladder"],
          ["Sulfonylureas","eGFR <30","Hypo risk \u2191\u2014 avoid glibenclamide; gliclazide cautious low dose"],
          ["DOACs","CrCl! (Cockcroft-Gault)","Apply each DOAC's reduction rules; CrCl <15 \u2192 warfarin"],
          ["Nitrofurantoin","eGFR <45","Ineffective + toxic \u2014 use alternative (not trimethoprim if K\u207a high: it raises K\u207a AND creatinine cosmetically)"],
          ["Opioids","G4\u20135","Morphine accumulates \u2192 prefer oxycodone (reduced dose) / fentanyl; start low, go slow"],
          ["Bisphosphonates","eGFR <30","Avoid alendronate \u2014 bone protection needs renal advice (may be renal bone disease, not osteoporosis)"],
          ["Digoxin, gabapentinoids, aciclovir, allopurinol","Renally cleared","Dose-reduce per BNF renal tables \u2014 the BNF renal section is the habit to build"]
        ]}
      ]},

    {t:"node", d:"monitor", n:"4", tag:"Step 4 · complications", title:"Manage the complications by the numbers",
      blocks:[
        {b:"table", head:["Complication","Screen when","Threshold \u2192 action"], rows:[
          ["<b>Anaemia</b>","Hb at every review from G3b (or symptoms)","Hb <110 (or symptomatic): check ferritin/TSAT, B12/folate \u2014 <b>iron FIRST</b> (oral if pre-dialysis, target ferritin >100/TSAT >20%); still <110 with iron replete \u2192 refer for ESA. Exclude other causes \u2014 CKD anaemia is a diagnosis of exclusion"],
          ["<b>Hyperkalaemia</b>","With every U&E","5.5\u20135.9: dietary advice, review K\u207a-raising drugs (trimethoprim, spironolactone, NSAIDs), recheck. \u22656.0 \u2192 urgent repeat + ECG \u2192 \u22656.5 or ECG changes = same-day admission. Persistent 5.5\u20136 on ACEi/ARB: don't reflexively stop the renoprotection \u2014 consider patiromer/SZC via renal team"],
          ["<b>Bone (CKD-MBD)</b>","Calcium, phosphate, PTH, vit D from <b>G4</b> (not routinely G3)","Replace vit D (colecalciferol) if deficient; abnormal phosphate/PTH \u2192 renal team (alfacalcidol territory, not primary care)"],
          ["<b>Acidosis</b>","Bicarbonate from G4","HCO\u2083 <20 \u2192 oral sodium bicarbonate 500mg\u20131g TDS (renal advice) \u2014 slows progression + protects muscle/bone; caution: sodium load in HF"],
          ["<b>Gout</b>","Clinically","Allopurinol dose-adjusted (start 50\u2013100mg); NO NSAIDs \u2014 low-dose colchicine (500mcg OD\u2013BD) or short steroids for flares"]
        ]}
      ]},

    {t:"node", d:"monitor", n:"5", tag:"Step 5 · review", title:"The review — track the trajectory, not the snapshot",
      blocks:[
        {b:"table", head:["What","When","Why"], rows:[
          ["eGFR + ACR","Per the grid cell (annual \u2192 3-monthly)","Plot the TRAJECTORY: <b>accelerated progression = sustained eGFR fall \u226525% + category change within 12 months, or \u226515 ml/min/yr</b> \u2192 loop below + refer"],
          ["<b>4-variable KFRE</b>","Annually from G3","Age + sex + eGFR + ACR \u2192 5-year kidney-failure risk. <b>>5% = refer</b> (NG203); it also rationally reassures the stable elderly G3a (risk often <1%)"],
          ["U&E after any ACEi/ARB/SGLT2i/diuretic change","1\u20132 weeks","Thresholds as above"],

        ]},
        {b:"say", html:"Your kidneys are working at about [X]% and our job is to keep them there \u2014 the blood-pressure tablet and the newer 'flozin' tablet both protect them directly, and the main things that hurt them are ibuprofen-type painkillers and getting dehydrated when you're unwell \u2014 that's what the sick-day card is for."}
      ]},

    {t:"loop", icon:"🔁", title:"eGFR falling faster than expected? Check before blaming CKD",
      arrow:"\u2026most sudden drops are not CKD progressing",
      intro:"CKD progresses slowly. A step-change in creatinine is AKI-on-CKD or an artefact until proven otherwise.",

        {b:"6 · Real and sustained?", html:"Confirm on repeat before acting — one reading is not a trajectory."}
      ],
      back:"Reversibles excluded + sustained → nephrology"},

    {t:"node", d:"safety", n:"6", tag:"Safety-net", title:"What the patient must know",
      blocks:[
        {b:"tiles", v:"safety", items:[
          {t:"🤢 Sick-day card", html:"\u201cVomiting/diarrhoea and can't drink → pause the kidney/BP tablets, water tablets, 'flozin' and metformin for 48h; restart when eating and drinking normally; ring us if unsure.\u201d"},
          {t:"🔴 AKI symptoms", html:"\u201cPassing much less urine, new swelling, drowsiness or feeling really unwell → same-day contact.\u201d"},
          {t:"💊 Painkillers", html:"\u201cNo ibuprofen/naproxen-type drugs — including ones bought over the counter. Paracetamol is fine.\u201d"},
          {t:"⚡ Potassium", html:"\u201cIf we've told you potassium runs high: watch salt substitutes (LoSalt), and mention it whenever anyone prescribes you something new.\u201d"}
        ]}
      ]},

    {t:"node", d:"refer", n:"7", tag:"Refer", title:"Nephrology — by risk, not just by number",
      blocks:[
        {b:"tiles", v:"refer", items:[
          {t:"KFRE >5% / 5y", html:"The NG203 headline criterion — calculate it annually from G3 (our KFRE calculator)."},
          {t:"Function", html:"eGFR <30 (G4\u20135); accelerated progression (\u226525% + category drop, or \u226515/yr sustained)."},
          {t:"Proteinuria", html:"ACR \u226570 (unless established diabetic nephropathy on treatment); ACR \u226530 + persistent haematuria."},
          {t:"Cause needs a specialist", html:"Suspected glomerular disease (active sediment), PKD, myeloma, renal artery stenosis (>25% creatinine jump on ACEi), young patient, single kidney with declining function."},
          {t:"Complications", html:"ESA-territory anaemia; G4 bone disease; resistant hyperkalaemia; BP uncontrolled on 4 agents."},
          {t:"Same day", html:"K\u207a \u22656.5 or ECG changes; severe AKI; fluid overload with oliguria."}
        ]},
        {b:"say", html:"I'm referring you to the kidney team \u2014 not because dialysis is coming, but because your numbers put you in the group where a specialist plan now prevents that later. We'll keep running your day-to-day care together."}
      ]}
  ],
  foot:"Confirmed CKD in adults \u2014 NICE NG203 with KDIGO 2024 and TA877 (finerenone). Verify doses against the current BNF renal tables before prescribing."
