<body data-screen-label="Contraception management card">

<script>
MG.render({
  icon:"💊",
  title:"Contraception — The Complete Prescribing Guide",
  stemTitle:"Contraception made simple &mdash; screen, choose, start, fix, follow up",
  stemSub:"One pathway from request to review: UKMEC safety screen, effectiveness-led choice with named products, exactly how to START each method (and when extra precautions are needed), missed-pill rules, a stepwise fix for bleeding and side effects, switching between methods, emergency contraception, and the over-40s / stopping rules. FSRH \u00b7 UKMEC 2023.",
  guideline:"FSRH / UKMEC 2023",
  glance:[
    {lbl:"Most effective", val:"LARC first", sub:"IUS / IUD / implant >99%"},
    {lbl:"No oestrogen if", val:"UKMEC 4", sub:"aura migraine, VTE, BP \u2265160/100"},
    {lbl:"Default POP", val:"Desogestrel", sub:"12-hour window"},
    {lbl:"Default COC", val:"Levonorgestrel 30mcg", sub:"lowest VTE"},
    {lbl:"Best EC", val:"Copper IUD", sub:"\u22645 days; then UPA > LNG"},
    {lbl:"Stop age", val:"CHC 50 \u00b7 all 55", sub:"then non-hormonal rules"}
  ],
  flow:[

    {t:"node", d:"safety", n:"1", tag:"Step 1 · screen", title:"UKMEC screen — who can't have oestrogen (CHC)?",
      blocks:[
        {b:"table", head:["UKMEC","Meaning","Key examples"], rows:[
          ["4 — do NOT use","Unacceptable risk","<b>Migraine WITH aura</b> (any age) \u00b7 current/past VTE or thrombogenic mutation \u00b7 BP \u2265160/100 \u00b7 smoker \u226535y at \u226515/day \u00b7 <6 weeks postpartum breastfeeding \u00b7 current breast cancer \u00b7 ischaemic heart disease/stroke \u00b7 major surgery with prolonged immobilisation"],
          ["3 — risks outweigh","Avoid unless nothing else suitable","BMI \u226535 \u00b7 smoker \u226535y <15/day (or stopped <1y) \u00b7 adequately controlled hypertension / BP 140\u2013159/90\u201399 \u00b7 FHx VTE first-degree <45y \u00b7 immobility \u00b7 breastfeeding 6wks\u20136mo \u00b7 past breast cancer >5y \u00b7 gallbladder disease"],
          ["1\u20132 — fine","Benefits outweigh","Most women! Well-controlled diabetes without vascular disease, migraine without aura (initiation = 2), obesity BMI 30\u201334, age alone"]
        ]},
        {b:"kv", rows:[
          ["Always check before CHC","BP + BMI (documented), migraine/aura history, smoking, VTE personal + family history, breast cancer history, drug interactions"],
          ["Progestogen-only + intrauterine","Safe for almost everyone the CHC screen excludes \u2014 the fallback is never 'no contraception'"],
          ["Enzyme inducers","Carbamazepine, phenytoin, rifampicin, St John's Wort, some ART \u2192 CHC/POP/implant unreliable \u2192 use <b>DMPA, Cu-IUD or LNG-IUS</b>"],
          ["Lamotrigine","CHC lowers lamotrigine levels (seizure risk on, toxicity off) \u2014 prefer non-oestrogen methods or specialist advice"]
        ]},
        {b:"why", html:"One sentence to internalise: <strong>oestrogen is the dangerous ingredient</strong> \u2014 the entire UKMEC 3/4 list is essentially 'reasons oestrogen can clot, stroke or feed a cancer'. Every progestogen-only and intrauterine method sidesteps nearly all of it."}
      ]},

    {t:"node", d:"found", n:"2", tag:"Step 2 · counsel", title:"Effectiveness-led counselling",
      blocks:[
        {b:"table", head:["Tier","Method","Typical-use failure /year","Key selling points"], rows:[
          ["1 \u2014 LARC","LNG-IUS \u00b7 Cu-IUD \u00b7 implant","<1%","Fit-and-forget; most effective + most cost-effective; rapid fertility return on removal"],
          ["2 \u2014 injectable","DMPA","~4%","12\u201313 weekly; amenorrhoea common (often welcome)"],
          ["2 \u2014 pills/patch/ring","COC \u00b7 POP \u00b7 Evra\u00ae \u00b7 vaginal ring","~7\u20139%","User-controlled; COC gives cycle control + helps acne/HMB"],
          ["3 \u2014 barrier/FAM","Condoms \u00b7 diaphragm \u00b7 fertility awareness","~13\u201324%","Condoms = only STI protection \u2014 promote WITH any method"]
        ]},
        {b:"kv", rows:[
          ["Match to the person","Bleeding wishes (amenorrhoea welcome? IUS/DMPA. Regular bleed wanted? COC), needle/procedure aversion, adherence reality, acne, HMB, weight concerns, fertility plans"],
          ["Non-contraceptive wins","LNG-IUS = first-line for HMB \u00b7 COC helps acne, dysmenorrhoea, PMS, ovarian/endometrial cancer risk \u2193 \u00b7 DMPA helps sickle crises"],
          ["Under 16","Assess capacity, <b>document Fraser criteria</b>; under-13 = safeguarding referral always"],
          ["STI","Screen opportunistically; dual protection message"]
        ]}
      ]},

    {t:"node", d:"drug", n:"3", tag:"Step 3 · choose & start", title:"Named first-lines + exactly how to start each",
      blocks:[
        {b:"ladder", steps:[
          {step:"LNG-IUS", title:"Levonorgestrel IUS — 52mg first (Mirena\u00ae/Levosert\u00ae)", when:"wants LARC \u00b1 lighter periods",
           html:"8y licence (Mirena contraception; 5y for HMB/endometrial protection); fitted \u226545 \u2192 can retain to 55. Smaller frames: Kyleena\u00ae 19.5mg (5y), Jaydess\u00ae 13.5mg (3y) \u2014 but more bleeding than 52mg. <b>Start:</b> any time if reasonably sure not pregnant; <b>effective after 7 days</b> (immediate if fitted day 1\u20137 of cycle)."},
          {step:"Cu-IUD", title:"Copper IUD — hormone-free", when:"wants no hormones / EC",
           fromLabel:"or as emergency contraception",
           html:"TT380\u00ae 10y; \u2265300mm\u00b2 device fitted \u226540 \u2192 keep until menopause. <b>Effective IMMEDIATELY.</b> Expect heavier/longer periods initially \u2014 counsel upfront (commonest removal reason)."},
          {step:"Implant", title:"Etonogestrel implant (Nexplanon\u00ae)", when:"wants LARC, avoids procedures 'down there'",
           fromLabel:"needle once every 3 years",
           html:"3 years. <b>Start:</b> day 1\u20135 = immediate cover; any other time = <b>7 days condoms</b>. Main issue: unpredictable bleeding (Step 6)."},
          {step:"POP", title:"Progestogen-only pill — desogestrel 75mcg first (Cerazette\u00ae/Cerelle\u00ae)", when:"wants a pill / oestrogen not allowed",
           fromLabel:"the default pill when in doubt",
           html:"<b>12-hour window</b>, inhibits ovulation. Alternatives: drospirenone POP (Slynd\u00ae, 24h window, may help acne), traditional norethisterone (Noriday\u00ae, 3h window \u2014 last resort). <b>Start:</b> day 1\u20135 = immediate; otherwise <b>2 days condoms</b>. Taken continuously \u2014 no breaks."},
          {step:"COC", title:"Combined pill — levonorgestrel 30mcg first (Microgynon 30\u00ae/Rigevidon\u00ae)", when:"UKMEC 1\u20132 + wants cycle control",
           fromLabel:"lowest-VTE choice",
           html:"<b>Start:</b> day 1\u20135 = immediate; otherwise <b>7 days condoms</b>. <b>FSRH prefers tailored regimens:</b> continuous or tricycling (3 packs back-to-back then 4-day break) \u2014 fewer withdrawal bleeds, fewer escape-ovulation windows; off-licence but standard practice. Acne: try desogestrel COC (Gedarel\u00ae) or co-cyprindiol (Dianette\u00ae \u2014 stop 3 months after acne controlled; higher VTE). Patch Evra\u00ae (weekly \u00d73 then break; less effective >90kg) and ring (monthly) follow COC rules."},
          {step:"DMPA", title:"Depot injection (Sayana Press\u00ae SC self-inject / Depo-Provera\u00ae IM)", when:"wants privacy / amenorrhoea, no LARC",
           fromLabel:"12\u201313 weekly",
           html:"Start day 1\u20135 = immediate; otherwise 7 days condoms. Counsel: weight gain (esp. <18y BMI\u226530), reversible BMD loss (review at 2y, avoid if osteoporosis risk), and <b>delayed fertility return up to 1 year</b>."}
        ]},
        {b:"warn", html:"<b>Quick-start rule (FSRH):</b> if reasonably certain she isn't pregnant, start ANY method today \u2014 don't send her away to wait for a period. If pregnancy can't be fully excluded but risk is ongoing: quick-start the pill/implant anyway (not harmful to early pregnancy), pregnancy test in 3 weeks; delay only IUD/IUS."}
      ]},

    {t:"node", d:"drug", n:"4", tag:"Step 4 · the rules", title:"Missed pills & sickness — what to tell her",
      blocks:[
        {b:"table", head:["Situation","Rule","Extra"], rows:[
          ["COC \u2014 ONE pill missed (24\u201348h late)","Take it now, continue pack","No extra precautions needed"],
          ["COC \u2014 TWO+ missed","Take the most recent now, condoms 7 days","If missed in week 1 + UPSI \u2192 consider EC. If missed in week 3 \u2192 run packs together (skip the break)"],
          ["POP late","Desogestrel >12h / traditional >3h / Slynd >24h = missed","Take now + condoms 48h; EC if UPSI before 2 pills re-established"],
          ["Vomiting <3h after a pill","Counts as missed","Retake; persistent vomiting/diarrhoea >24h \u2192 follow missed rules for each day"],
          ["Patch/ring detached >48h","As per 2+ missed pills","Condoms 7 days \u00b1 EC"],
          ["DMPA late (>14w from last)","Test, condoms, may need EC","Re-inject once pregnancy excluded (or bridge with POP)"]
        ]},
        {b:"why", html:"The week-1 vs week-3 asymmetry: the hormone-free interval is when the ovary wakes up. Missing pills adjacent to the break stretches it beyond 7 days \u2014 EC territory in week 1, skip-the-break in week 3. Tailored/continuous regimens delete the problem \u2014 another reason FSRH prefers them."}
      ]},

    {t:"node", d:"drug", n:"5", tag:"Emergency", title:"Emergency contraception — always offer the coil",
      blocks:[
        {b:"ladder", steps:[
          {step:"1st", title:"Copper IUD", when:"\u2264120h after UPSI, or \u22645 days after earliest ovulation",
           html:"~99% effective, unaffected by BMI or enzyme inducers, gives ongoing contraception. <b>Offer to every EC presentation</b> \u2014 arrange fitting (bridge with oral EC + quick-started method if fitting is delayed)."},
          {step:"2nd", title:"Ulipristal acetate 30mg (ellaOne\u00ae)", when:"\u2264120h",
           fromLabel:"if IUD declined/unavailable",
           html:"More effective than LNG, especially 72\u2013120h and near ovulation. <b>Wait 5 days before (re)starting hormonal contraception</b> (progestogen blunts UPA) \u2014 condoms meanwhile. Repeat dose if vomiting <3h. Breastfeeding: express + discard 1 week. Avoid if on enzyme inducers or high-dose steroids for severe asthma."},
          {step:"3rd", title:"Levonorgestrel 1.5mg", when:"\u226472h",
           fromLabel:"if UPA unsuitable",
           html:"<b>Double dose (3mg) if BMI >26 or weight >70kg or on enzyme inducers.</b> Can start/continue hormonal contraception IMMEDIATELY (condoms 7 days / 2 for POP). Repeat if vomiting <3h."}
        ]},
        {b:"kv", rows:[
          ["Every EC consult","Quick-start ongoing contraception \u00b7 STI screen offer \u00b7 pregnancy test if period >7 days late \u00b7 safeguarding radar (age, coercion)"]
        ]}
      ]},

    {t:"node", d:"safety", n:"6", tag:"Step 5 · side effects", title:"Fix the problem — method by method",
      blocks:[
        {b:"table", head:["Problem","Method","Fix, in order"], rows:[
          ["Unscheduled bleeding <3 months","Any new method","Reassure (settles in most) \u00b7 check adherence \u00b7 exclude STI, pregnancy, missed cervical screening \u2014 examine if persistent"],
          ["Bleeding >3 months","POP / implant / IUS","1) Exclude the above \u00b7 2) add a levonorgestrel COC for 3 months if UKMEC-safe (off-licence, FSRH-endorsed) \u00b7 3) or 5-day mefenamic acid course \u00b7 4) switch method"],
          ["Bleeding on COC","COC","Check missed pills/vomiting/interactions \u00b7 try \u226530mcg oestrogen (Microgynon over 20mcg brands) \u00b7 change progestogen \u00b7 examine + screen if persists >3 months"],
          ["Mood / low libido","CHC \u2192 or any","Try a different progestogen; consider non-hormonal (Cu-IUD); depression screen \u2014 don't reflexively blame the pill"],
          ["Acne worse","POP/implant/IUS (androgenic)","Switch to drospirenone POP (Slynd) or a COC if eligible (Gedarel; Dianette if severe \u2014 time-limited)"],
          ["Headaches in the pill-free week","COC","Tailored/continuous regimen (delete the break)"],
          ["<b>NEW migraine aura on CHC</b>","COC/patch/ring","<b>STOP oestrogen immediately</b> \u2192 switch to POP/LARC same day (UKMEC 4)"],
          ["Weight gain","DMPA (only method with evidence)","Counsel; consider switch; others: no consistent causal evidence \u2014 explore other causes"],
          ["Breast tenderness / nausea","CHC","Usually settles \u22643 months; lower oestrogen dose or route change"]
        ]},
        {b:"warn", html:"Persistent unscheduled bleeding is never just 'the method' until you've excluded <b>pregnancy, chlamydia, cervical pathology and missed screening</b> \u2014 examine, test, then troubleshoot hormonally."}
      ]},

    {t:"node", d:"drug", n:"7", tag:"Step 6 · switching", title:"Switching methods without a gap",
      blocks:[
        {b:"table", head:["From \u2192 To","How","Extra precautions"], rows:[
          ["COC \u2192 POP","Start POP the day after ANY COC pill (skip the break)","None if no break taken"],
          ["POP \u2192 COC","Start COC immediately","7 days condoms"],
          ["Pill \u2192 implant/IUS/injection","Overlap: fit/inject while still taking the pill for 7 more days","Covered by the overlap"],
          ["Implant/IUS/DMPA \u2192 pill","Start pill 7 days before removal (or by 14w from last DMPA)","Covered by the overlap"],
          ["Cu-IUD \u2192 hormonal","Start hormonal method 7 days BEFORE coil removal","Sperm survive 7 days \u2014 removal with recent UPSI risks pregnancy"],
          ["Anything \u2192 Cu-IUD","Fit any time (immediate cover)","None"]
        ]},
        {b:"why", html:"The single rule behind this table: <strong>never leave a window where neither method is established</strong>. Overlap by the new method's own 'time to effective' (7 days for most, 2 for POP, 0 for Cu-IUD)."}
      ]},

    {t:"node", d:"monitor", n:"8", tag:"Step 7 · follow-up", title:"Review schedule + the over-40s and stopping rules",
      blocks:[
        {b:"table", head:["What","When","Action"], rows:[
          ["CHC review","3 months after start, then annually","BP + BMI + new UKMEC flags (new migraine? BP? smoking?); issue 12 months at a time"],
          ["POP / implant / IUS","Annual opportunistic","Bleeding pattern, satisfaction; no routine bloods or examinations needed"],
          ["DMPA","Each injection; formal review at 2 years","BMD risk\u2013benefit, weight trend, ongoing preference"],
          ["IUD/IUS","Post-fit check ~6 weeks if problems; else none routine","Teach thread check; pain/dyspareunia/missing threads \u2192 examine \u00b1 USS"]
        ]},
        {b:"kv", rows:[
          ["Age 50 \u2014 CHC & DMPA","Stop CHC and DMPA at 50 (arterial/VTE and BMD risk) \u2192 switch to POP / IUS / Cu-IUD / barrier"],
          ["Stopping in the 40s\u201350s","Non-hormonal methods: stop after <b>2 years amenorrhoea if <50, 1 year if \u226550</b>. On hormonal methods (bleeding masked): continue to <b>55, then stop</b> \u2014 or check FSH \u00d72 (6 weeks apart) on POP/IUS if she wants to stop earlier: both >30 \u2192 1 more year then stop"],
          ["HRT interface","HRT is NOT contraception. POP alongside HRT, or <b>LNG-IUS 52mg as the progestogen arm</b> (replace 5-yearly in that role)"],
          ["Postpartum","Fertility returns from day 21. POP/implant: any time incl. immediately. CHC: not <6 weeks if breastfeeding (UKMEC 4), not <3 weeks regardless. IUD/IUS: within 48h of delivery or wait 4 weeks. Lactational amenorrhoea: reliable only if <6 months + amenorrhoeic + fully breastfeeding"]
        ]}
      ]},

    {t:"loop", icon:"\uD83D\uDD01", title:"Unhappy with the method? Re-run before she just stops",
      arrow:"\u2026most problems are fixable",
      intro:"Most discontinuation is an unfixed bleeding problem or an unswitched side effect — and unplanned pregnancy follows.",
      checks:[
        {b:"1 · Bleeding", html:"STI/pregnancy/cervix excluded, then the 3-month COC or mefenamic rescue tried?"},
        {b:"2 · Side effect", html:"Progestogen type switched? Different method class offered?"},
        {b:"3 · Adherence", html:"Is the real problem remembering? \u2192 LARC conversation again"},
        {b:"4 · New UKMEC", html:"New aura/BP/VTE \u2014 does the method need to CHANGE for safety?"},
        {b:"5 · Bridge", html:"Never remove/stop one method without the next one already effective"}
      ],
      back:"Genuinely unsuitable → different tier, or sexual-health clinic"},

    {t:"node", d:"refer", n:"9", tag:"Refer", title:"Who needs more than primary care",
      blocks:[
        {b:"tiles", v:"refer", items:[
          {t:"LARC fitting", html:"Community sexual-health/contraception clinic if not fitted in-house; failed/deep implant removal → specialist."},
          {t:"Complex UKMEC", html:"Multiple 3s, enzyme inducers, post-bariatric, complex medical disease — specialist contraception advice."},
          {t:"Lost threads / perforation concern", html:"USS ± AXR; if intrauterine device not seen → gynae (assume expulsion; EC + interim method meanwhile)."},
          {t:"Safeguarding", html:"Under-13 always; coercion, exploitation, or capacity concerns at any age."},
          {t:"Sterilisation requests", html:"Counsel (vasectomy safer/simpler than tubal); refer per local pathway; ensure interim contraception."}
        ]},
        {b:"say", html:"The coil and the implant are the most effective options and you can forget about them once they're in — but the best method is the one that fits your life, and if it doesn't suit you we can switch without any gap in protection. Whatever we pick, condoms are still the only thing that protects against infections."}
      ]}
  ],
  foot:"Contraceptive counselling and prescribing in primary care. Verify against current FSRH guidance, UKMEC 2023 and the BNF before prescribing."
});
</script>
