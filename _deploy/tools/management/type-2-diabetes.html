<body data-screen-label="Type 2 diabetes management card">

<script>
MG.render({
  icon:"🩸",
  title:"Type 2 Diabetes — The Complete Guide",
  stemTitle:"T2DM made simple &mdash; confirm, protect the organs, climb the ladder, review the whole person",
  stemSub:"One pathway: confirm the diagnosis (and spot the person who ISN'T type 2), set an individualised target, treat cardiovascular risk as hard as glucose, climb the drug ladder with named doses + the side-effect fixes, know the injectable rules, run the annual review, and de-intensify the frail. NICE NG28 \u00b7 CKS.",
  guideline:"NICE NG28 \u00b7 NG136 \u00b7 NG238",
  glance:[
    {lbl:"Diagnose", val:"HbA1c \u226548 \u00d72", sub:"once only if symptomatic"},
    {lbl:"Target", val:"48 / 53", sub:"no-hypo drug / hypo drug"},
    {lbl:"First-line", val:"Metformin", sub:"500mg OD \u2192 1g BD"},
    {lbl:"Organ protection", val:"SGLT2i early", sub:"CVD \u00b7 HF \u00b7 CKD \u00b7 QRISK>10%"},
    {lbl:"BP target", val:"<140/90", sub:"<130/80 if CKD/ACR\u226570"},
    {lbl:"Statin", val:"Atorvastatin 20mg", sub:">40y or QRISK \u226510%"}
  ],
  flow:[

    {t:"node", d:"found", n:"1", tag:"Step 1 · confirm", title:"Confirm it — and confirm it's actually type 2",
      blocks:[
        {b:"kv", rows:[
          ["Diagnosis","<b>HbA1c \u226548 mmol/mol \u00d72</b> (repeat within 2 weeks\u20133 months) \u2014 or ONE result if osmotic symptoms. 42\u201347 = prediabetes \u2192 NHS Diabetes Prevention Programme"],
          ["HbA1c invalid when","Pregnancy, <3 months' red-cell lifespan disturbance (haemolysis, recent transfusion, severe anaemia), CKD5, HIV \u2014 use fasting/random glucose instead"],
          ["Is it really type 2?","<b>Think T1DM/LADA if:</b> <50y AND lean AND rapid symptoms, ketones, personal/FHx autoimmunity, weight loss \u2192 same-day glucose + ketones; anti-GAD + C-peptide; do NOT just start metformin and wait"],
          ["Other mimics","MODY (strong 3-generation FHx, young, no obesity \u2014 genetics), pancreatic diabetes (pancreatitis history, steatorrhoea), steroid-induced"],
          ["At diagnosis, baseline","Weight/BMI, BP, HbA1c, U&E/eGFR, <b>urine ACR</b>, lipids, LFTs, TSH, QRISK3; smoking; mood; erectile function (ask \u2014 it predicts CVD)"]
        ]},
        {b:"warn", html:"<b>Symptomatic hyperglycaemia at presentation (thirst, polyuria, weight loss + glucose >15\u201320)?</b> Check ketones the same day. Ketones raised or the patient unwell \u2192 same-day assessment (?DKA/HHS, ?new T1DM). Well but markedly symptomatic T2DM \u2192 consider starting with a sulfonylurea (works in days) or insulin, then rationalise."}
      ]},

    {t:"node", d:"life", n:"2", tag:"Step 2 · foundations", title:"Lifestyle, education — and the chance of remission",
      blocks:[
        {b:"tiles", v:"life", items:[
          {t:"🎓 Structured education", html:"DESMOND or equivalent for everyone at diagnosis (document offer + attendance \u2014 QOF and it genuinely works)."},
          {t:"🥗 Remission is real", html:"DiRECT: ~800kcal/day total diet replacement for 12\u201320 weeks in early T2DM (<6y) \u2192 remission in ~46% at 1y. NHS Type 2 Path to Remission programme \u2014 refer eligible, motivated patients."},
          {t:"⚖️ Weight", html:"Every 5\u201310% loss improves HbA1c, BP, lipids. Weight-management referral; consider drug choice through a weight lens (GLP-1/SGLT2i lose it, SU/pioglitazone/insulin gain it)."},
          {t:"🏃 Activity", html:"150 min/week moderate + resistance work; even breaking up sitting time helps insulin sensitivity."},
          {t:"🚭 Smoking", html:"The single biggest multiplier of diabetic CV risk \u2014 cessation support every contact."},
          {t:"🧠 Mood", html:"Depression doubles in diabetes and wrecks self-management \u2014 screen and treat."}
        ]}
      ]},

    {t:"node", d:"drug", n:"3", tag:"Step 3 · protect", title:"Treat the risk, not just the sugar — BP, lipids, kidneys",
      blocks:[
        {b:"table", head:["Domain","Target / threshold","Treatment"], rows:[
          ["Blood pressure","<b><140/90</b> (clinic); <b><130/80 if CKD or ACR \u226570</b>","<b>ACEi/ARB first-line in T2DM</b> at any age (renoprotective); then CCB/thiazide-like per NG136"],
          ["Lipids \u2014 primary prevention","Age >40 or QRISK3 \u226510%","<b>Atorvastatin 20mg</b>; escalate if non-HDL not down 40%"],
          ["Lipids \u2014 secondary prevention","Established CVD","<b>Atorvastatin 80mg</b>; LDL <2.0 / non-HDL <2.6 (NG238)"],
          ["Kidneys","ACR \u22653 + diabetes","<b>ACEi/ARB titrated to max</b>; add <b>SGLT2i</b> (licensed to eGFR thresholds); ACR >30 despite this \u2192 consider finerenone / renal advice"],
          ["Antiplatelet","Established CVD only","Aspirin 75mg \u2014 NOT for primary prevention in diabetes"]
        ]},
        {b:"why", html:"A person with T2DM is far more likely to die of a heart attack than of hyperglycaemia. BP control and statins deliver bigger absolute mortality benefits than tight glucose \u2014 which is why this node comes BEFORE the glucose ladder, not after it."}
      ]},

    {t:"node", d:"drug", n:"4", tag:"Step 4 · glucose ladder", title:"The drug ladder — doses, when, and why",
      blocks:[
        {b:"p", html:"Set the target first: <b>48</b> on lifestyle \u00b1 one non-hypo drug, <b>53</b> once on a sulfonylurea/insulin, relaxed (58\u201364+) in frailty. Intensify when HbA1c rises above <b>58</b> \u2014 and act, don't watch (therapeutic inertia is the commonest error in T2DM care). Review every change at 3\u20136 months."},
        {b:"ladder", steps:[
          {step:"Step 1", title:"Metformin", when:"everyone, unless contraindicated",
           html:"<b>500mg OD with food \u2192 add 500mg weekly \u2192 1g BD.</b> GI upset (~25%) \u2192 slow titration or <b>MR formulation</b>. eGFR <45 \u2192 half dose review; <b>stop <30</b>. Sick-day pause. B12 check if neuropathy/anaemia on long-term use."},
          {step:"Step 1+", title:"SGLT2 inhibitor EARLY — not as an afterthought", when:"CVD, HF, CKD, or QRISK >10%",
           fromLabel:"organ protection, regardless of HbA1c",
           html:"<b>Dapagliflozin 10mg</b> or <b>empagliflozin 10\u201325mg</b> OD, alongside metformin (or instead, if metformin not tolerated). Benefits are independent of glucose \u2014 do not wait for the HbA1c to 'justify' it."},
          {step:"Step 2", title:"Second agent by phenotype", when:"HbA1c >58 on metformin",
           fromLabel:"choose through the patient's lens",
           html:"<b>Weight/CV benefit wanted \u2192 SGLT2i.</b> <b>Hypo-averse (driver, elderly) \u2192 DPP-4i</b> (sitagliptin 100mg / linagliptin 5mg \u2014 the renal-failure-friendly one). <b>Cost + rapid effect \u2192 gliclazide</b> 40\u201380mg mane \u2192 max 160mg BD (hypos, weight gain; warn drivers \u2014 glucose testing rules). <b>Pioglitazone</b> 15\u201345mg \u2014 potent insulin sensitiser, but fluid retention (never in HF), fractures, bladder-cancer signal."},
          {step:"Step 3", title:"Triple therapy", when:"HbA1c >58 on dual",
           fromLabel:"re-check adherence first",
           html:"Combine three mechanisms (e.g. metformin + SGLT2i + DPP-4i or SU). Don't stack a DPP-4i WITH a GLP-1 RA (same pathway, no added benefit)."},
          {step:"Step 4", title:"GLP-1 RA / tirzepatide", when:"triple failed + BMI \u226535 (or insulin unsuitable)",
           fromLabel:"or occupational need to avoid hypos",
           html:"<b>Semaglutide (Ozempic\u00ae)</b> 0.25mg weekly \u2192 titrate 4-weekly \u2192 1mg; oral option Rybelsus\u00ae. <b>Tirzepatide (Mounjaro\u00ae, TA924)</b> \u2014 dual GIP/GLP-1, the most potent. Continue beyond 6 months only if HbA1c \u2193\u226511 mmol/mol AND weight \u2193\u22653%. Counsel: nausea (start low, eat smaller meals), rare pancreatitis (stop + assess if severe abdominal pain), gallstones, and <b>pause before surgery/procedures per anaesthetic guidance</b>."},
          {step:"Step 5", title:"Insulin", when:"symptomatic or HbA1c high despite the above",
           fromLabel:"see the dedicated insulin protocol",
           html:"Usually <b>NPH (Humulin I\u00ae/Insulatard\u00ae) 10 units at bedtime</b>, self-titrated 2\u20134 units twice weekly to fasting 5\u20137. KEEP metformin + SGLT2i; STOP the sulfonylurea (or halve and watch) and DPP-4i. Structured education, glucose meter, DVLA + hypo counselling."}
        ]},
        {b:"table", head:["Drug class","Key side effects","Fix / monitoring"], rows:[
          ["Metformin","GI upset, B12 deficiency, (lactic acidosis \u2014 rare, renal)","Titrate slowly \u2192 MR; B12 if symptomatic; sick-day pause; eGFR gates"],
          ["SGLT2i","Genital thrush, UTI, polyuria, <b>euglycaemic DKA</b>, Fournier's (rare), volume depletion","Sick-day pause (dehydration/surgery); thrush \u2192 treat + hygiene advice, rarely needs stopping; check ketones if unwell even with normal glucose"],
          ["Sulfonylurea","<b>Hypoglycaemia</b>, weight gain","Educate + meter for drivers (DVLA rules); avoid in eGFR <30, frail, erratic eaters"],
          ["DPP-4i","Generally benign; rare pancreatitis","Dose-adjust sitagliptin in CKD (linagliptin needs none)"],
          ["Pioglitazone","Fluid retention/HF, fractures, bladder cancer signal, weight","Never in HF or haematuria under investigation; review benefit at 6 months"],
          ["GLP-1 RA / tirzepatide","Nausea/vomiting, gallstones, pancreatitis (rare)","Slow titration; dietary advice; stop if pancreatitis suspected"]
        ]},
        {b:"warn", html:"<b>De-intensification is a treatment too:</b> in frailty, dementia, or limited life expectancy \u2014 relax the target, strip out the hypo-causing drugs first (SU, insulin), and stop anything without symptomatic benefit. An HbA1c of 48 in a care-home resident is a harm marker, not an achievement."}
      ]},

    {t:"node", d:"monitor", n:"5", tag:"Step 5 · review", title:"The rhythm — and the annual review done properly",
      blocks:[
        {b:"table", head:["What","When","Action"], rows:[
          ["HbA1c","3\u20136-monthly until stable on unchanging therapy, then 6-monthly","Above target \u2192 loop check (below) \u2192 intensify. Below 48 on SU/insulin \u2192 consider de-intensifying"],
          ["The 9 care processes","Annually","HbA1c \u00b7 BP \u00b7 lipids \u00b7 U&E/eGFR \u00b7 <b>urine ACR</b> \u00b7 BMI \u00b7 smoking \u00b7 <b>foot check with risk stratification</b> \u00b7 retinal screening uptake"],
          ["Plus the human bits","Annually","Mood, erectile dysfunction (offer PDE5i \u2014 and it flags CV risk), injection sites if on insulin, hypo history + awareness, driving group + DVLA duties, flu/pneumo/COVID vaccines, pregnancy plans"],
          ["Feet","Annual risk stratification","Active ulcer/infection/ischaemia or suspected Charcot (hot swollen foot) \u2192 <b>same-day/urgent MDT foot service</b> \u2014 not a routine referral"],
          ["eGFR + ACR trend","At least annually; more if CKD","Falling eGFR / rising ACR \u2192 tighten BP, maximise ACEi/ARB + SGLT2i, renal referral per NG203 criteria"]
        ]},
        {b:"say", html:"There are two numbers that matter today: your sugar average and your blood pressure \u2014 and honestly the blood pressure and the statin protect your heart and kidneys at least as much as the sugar tablets do. We'll check the whole picture once a year, feet and eyes included."}
      ]},

    {t:"loop", icon:"🔁", title:"Above target? Run this BEFORE adding the next drug",
      arrow:"\u2026treat the reason, not the number",
      intro:"Half of 'treatment failure' is adherence, intercurrent illness, or the wrong target.",
      checks:[
        {b:"1 · Adherence", html:"Tablets actually taken? GI side effects driving quiet non-adherence? (MR metformin fixes most)"},
        {b:"2 · Lifestyle drift", html:"Weight trend, diet, alcohol — reset ONE measurable goal, review in 3 months."},
        {b:"3 · Intercurrent", html:"Steroids, infection, new antipsychotic, depression, festive season?"},
        {b:"4 · Right target?", html:"Frail/hypo-prone → RELAX it. Young and fit → is 48 actually being pursued?"},
        {b:"5 · Right diagnosis?", html:"Lean, rapid decline, ketosis, weight loss despite treatment → C-peptide + anti-GAD (LADA), or pancreatic cause."}
      ],
      back:"All checked → next rung of the ladder"},

    {t:"node", d:"safety", n:"6", tag:"Safety-net", title:"What the patient must know",
      blocks:[
        {b:"tiles", v:"safety", items:[
          {t:"🔴 DKA / HHS", html:"\u201cVomiting, tummy pain, drowsiness, deep fast breathing \u2014 999. On an SGLT2 tablet this can happen even with normal-ish sugars.\u201d"},
          {t:"🍬 Hypos (SU/insulin)", html:"\u201cShaky, sweaty, confused \u2014 15g fast sugar, recheck in 15 min, then a snack. Severe or recurrent \u2192 tell us; if you drive, you must test before driving (5 to drive) and report severe hypos to DVLA.\u201d"},
          {t:"🦶 Feet", html:"\u201cNew ulcer, colour change, spreading redness or a hot swollen foot \u2014 same-day call. Never 'wait and see' with a diabetic foot.\u201d"},
          {t:"🤢 Sick-day rules", html:"\u201cWhen you can't eat/drink or are vomiting: pause metformin, the SGLT2 ('flozin') tablet, ACE inhibitor and any water tablet; keep insulin going (adjust); check sugars often; call us if in doubt.\u201d"}
        ]}
      ]},

    {t:"node", d:"refer", n:"7", tag:"Refer", title:"Who needs the specialist team",
      blocks:[
        {b:"tiles", v:"refer", items:[
          {t:"Same day", html:"DKA/HHS; active foot disease (MDT foot service); symptomatic + ketotic at diagnosis."},
          {t:"Diagnostic doubt", html:"Possible T1DM/LADA (C-peptide/anti-GAD), MODY (genetics), pancreatic diabetes."},
          {t:"Refractory", html:"Above target despite triple therapy + injectable consideration — or complex insulin needs."},
          {t:"Hypos", html:"Recurrent severe hypoglycaemia or lost hypo awareness (also \u2192 DVLA implications)."},
          {t:"Pregnancy", html:"Preconception: aim HbA1c <48, stop statin/ACEi, start folic acid 5mg BEFORE conception; refer to joint diabetes\u2013antenatal clinic."},
          {t:"Renal", html:"NG203 triggers: ACR \u226570, eGFR <30, rapid decline, 5-y KFRE >5% — nephrology."}
        ]},
        {b:"say", html:"Your tablets have done a lot of work, but the numbers are telling us you need the extra options only the specialist team can start \u2014 we'll keep everything else going in the meantime, and nothing you've done has 'failed': diabetes drifts with time, and we move with it."}
      ]}
  ],
  foot:"Confirmed type 2 diabetes in adults \u2014 NICE NG28 with NG136 (BP), NG238 (lipids) and NG203 (CKD) interfaces. Verify doses against the current BNF before prescribing."
});
</script>
