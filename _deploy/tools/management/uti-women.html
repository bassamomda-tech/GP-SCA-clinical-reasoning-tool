<body data-screen-label="UTI in women management card">

<script>
MG.render({
  icon:"💧",
  title:"UTI in Women — The Complete Guide",
  stemTitle:"UTI in women made simple &mdash; treat the simple one short, protect pregnancy, break the recurrent cycle",
  stemSub:"One pathway: diagnose lower UTI (and when the dipstick lies), give the right short course, handle pregnancy trimester-by-trimester, catch pyelonephritis, and \u2014 the real skill \u2014 work up and prevent RECURRENT UTI with the full non-antibiotic and prophylaxis ladder plus vaginal oestrogen. NICE NG109 \u00b7 NG112 \u00b7 CKS.",
  guideline:"NICE NG109 \u00b7 NG112",
  glance:[
    {lbl:"Simple lower UTI", val:"Nitrofurantoin 3d", sub:"100mg MR BD, eGFR \u226545"},
    {lbl:"Dipstick", val:"Only helps <65", sub:"never dip the elderly/catheter"},
    {lbl:"Pregnancy", val:"Culture + treat ABU", sub:"trimester-aware abx, 7d"},
    {lbl:"Recurrent =", val:"\u22652/6mo or \u22653/yr", sub:"work up + prevent"},
    {lbl:"Postmenopausal", val:"Vaginal oestrogen", sub:"first-line prevention"},
    {lbl:"Non-antibiotic", val:"Methenamine / D-mannose", sub:"before nightly abx"}
  ],
  flow:[

    {t:"node", d:"found", n:"1", tag:"Step 1 · diagnose", title:"Diagnose lower UTI — and know when the dipstick misleads",
      blocks:[
        {b:"kv", rows:[
          ["Clinical diagnosis (<65, no catheter)","\u22653 urinary symptoms (dysuria, frequency, urgency, suprapubic pain, haematuria, cloudy urine) and no vaginal discharge \u2192 treat empirically without a dipstick. New dysuria is ~50% likely UTI on its own"],
          ["<b>When the dipstick LIES</b>","<b>Do NOT dipstick anyone \u226565 or any catheterised patient</b> \u2014 asymptomatic bacteriuria is common and a positive dip doesn't mean UTI. Over-65: diagnose on new/worsening urinary symptoms or signs of systemic infection, not the stick"],
          ["When to CULTURE","Pregnant \u00b7 recurrent \u00b7 treatment failure \u00b7 atypical \u00b7 suspected pyelonephritis \u00b7 \u226565 \u00b7 catheter \u00b7 visible/persistent non-visible haematuria \u2014 send before/with starting"],
          ["Exclude the mimics","Vaginal discharge/itch (thrush, BV, STI \u2014 test if at risk), atrophic vaginitis, interstitial cystitis (chronic, sterile), overactive bladder, urethral syndrome"],
          ["Over-65 caution","Don't attribute confusion alone to 'UTI' without urinary symptoms/signs of sepsis \u2014 the classic over-diagnosis that misses the real cause"]
        ]},
        {b:"warn", html:"<b>Pyelonephritis</b> \u2014 loin/back pain, fever, rigors, nausea/vomiting, systemic upset (\u00b1 the lower-UTI symptoms) \u2192 different pathway: culture always, <b>broader/longer antibiotic</b> (e.g. cefalexin 7\u201310 days, or per local guidance), and admit if sepsis features, pregnancy, vomiting, or not improving. Sepsis screen (NEWS2) if unwell."}
      ]},

    {t:"node", d:"drug", n:"2", tag:"Step 2 · treat the simple one", title:"Uncomplicated lower UTI — short course, right agent",
      blocks:[
        {b:"table", head:["Line","Antibiotic","Notes"], rows:[
          ["<b>1st</b>","<b>Nitrofurantoin 100mg MR BD \u00d7 3 days</b>","Avoid if eGFR <45 (ineffective + toxic); avoid at term in pregnancy"],
          ["1st alt","Trimethoprim 200mg BD \u00d7 3 days","Only if low resistance risk; avoid in 1st-trimester pregnancy (folate antagonist)"],
          ["2nd","Nitrofurantoin (if not 1st) / pivmecillinam 400mg then 200mg TDS / fosfomycin 3g single dose","Per culture + local resistance; fosfomycin useful for resistant organisms"],
          ["Symptom relief","Paracetamol/ibuprofen; hydration","Some mild UTIs settle with self-care \u00b1 back-up (delayed) prescription \u2014 an option if symptoms mild"]
        ]},
        {b:"kv", rows:[
          ["Review","At 48h or on culture: not improving \u2192 reassess, check sensitivities, reconsider diagnosis / upper UTI"],
          ["Don't treat asymptomatic bacteriuria","In non-pregnant women (including the elderly) \u2014 drives resistance, no benefit"]
        ]}
      ]},

    {t:"node", d:"drug", n:"3", tag:"Step 3 · pregnancy", title:"Pregnancy — treat everything, mind the trimester",
      blocks:[
        {b:"kv", rows:[
          ["Screen + treat asymptomatic bacteriuria","Routine antenatal MSU; ABU in pregnancy risks pyelonephritis + preterm birth \u2192 treat on culture, <b>7 days</b>, and do a <b>test of cure</b>"],
          ["1st trimester","<b>Avoid trimethoprim</b> (folate antagonist \u2014 neural tube risk). Nitrofurantoin acceptable; or per culture (cefalexin, amoxicillin if sensitive)"],
          ["3rd trimester / term","<b>Avoid nitrofurantoin at term</b> (neonatal haemolysis risk). Use cefalexin or culture-directed"],
          ["Pyelonephritis in pregnancy","Lower threshold to admit \u2014 obstetric + IV antibiotics"],
          ["Recurrent in pregnancy","Obstetric input; prophylaxis decisions are specialist"]
        ]},
        {b:"warn", html:"The trimester map in one line: <b>trimethoprim out early</b> (folate), <b>nitrofurantoin out late</b> (haemolysis) \u2014 cefalexin is the reliable middle-ground when unsure. Always culture in pregnancy."}
      ]},

    {t:"node", d:"found", n:"4", tag:"Step 4 · recurrent UTI", title:"Recurrent UTI — the work-up before the prophylaxis",
      blocks:[
        {b:"kv", rows:[
          ["Definition","\u22652 in 6 months or \u22653 in 12 months. Distinguish <b>relapse</b> (same organism <2 weeks \u2014 think stone/incomplete treatment) from <b>reinfection</b> (different organism/later \u2014 the usual pattern)"],
          ["Work up","Confirm with cultures (don't build a prevention plan on unproven 'UTIs'); post-void residual/bladder scan if incomplete emptying suspected; <b>visible haematuria or \u226545 with unexplained non-visible \u2192 2WW urology</b> (bladder cancer); glucose (undiagnosed diabetes); consider USS/referral if stones, atypical organisms (Proteus \u2192 stones), or persistent haematuria"],
          ["Find + fix reversibles","Incomplete emptying/constipation, spermicide/diaphragm use, dehydration, postmenopausal atrophy, poor glycaemic control, urinary retention"],
          ["The mimics again","Recurrent 'UTI' with negative cultures = interstitial cystitis, atrophic vaginitis, or overactive bladder \u2014 not antibiotics"]
        ]},
        {b:"why", html:"The commonest error in recurrent UTI is a nightly antibiotic started on a stack of <em>unconfirmed</em> episodes with the reversibles never addressed. Culture-confirm, treat the atrophy, fix the emptying and the spermicide first \u2014 many 'recurrent UTI' patients need no long-term antibiotic at all."}
      ]},

    {t:"node", d:"drug", n:"5", tag:"Step 5 · prevention ladder", title:"Prevention — non-antibiotic first, then prophylaxis",
      blocks:[
        {b:"ladder", steps:[
          {step:"1st", title:"Behavioural + non-antibiotic measures", when:"everyone",
           html:"Hydration (aim ~1.5\u20132L, RCT evidence), don't delay voiding, post-coital voiding, wipe front-to-back, stop spermicide/diaphragm. <b>D-mannose</b> (2g/day \u2014 modest evidence, low harm) and <b>methenamine hippurate 1g BD</b> (ALTBI trial: non-inferior to antibiotic prophylaxis \u2014 the non-antibiotic prophylaxis of choice)."},
          {step:"1st (postmenopausal)", title:"Vaginal oestrogen", when:"postmenopausal recurrent UTI",
           fromLabel:"the highest-yield single measure",
           html:"<b>Topical vaginal oestrogen</b> (estriol cream / estradiol tablet/ring) \u2014 restores the protective vaginal flora, substantially reduces recurrence, safe long-term (see HRT/GSM guidance). Try before any antibiotic prophylaxis in this group."},
          {step:"2nd", title:"Self-start (standby) antibiotics", when:"clear recurrent pattern, reliable patient",
           fromLabel:"reduce total antibiotic exposure",
           html:"A 3-day back-up course the patient starts on symptom onset (with a culture where possible) \u2014 avoids continuous exposure while still treating fast. Good for infrequent-but-definite recurrences."},
          {step:"3rd", title:"Single post-coital dose", when:"clear coital trigger",
           fromLabel:"intercourse-associated UTI",
           html:"Single-dose nitrofurantoin or trimethoprim after sex \u2014 targeted prophylaxis with far less total antibiotic than nightly dosing."},
          {step:"4th", title:"Continuous antibiotic prophylaxis", when:"failed the above",
           fromLabel:"last resort \u2014 trial + review",
           html:"<b>Nightly nitrofurantoin 50\u2013100mg or trimethoprim 100mg</b> \u2014 <b>trial 3\u20136 months then review</b> (resistance, recurrence returns after stopping in many). Rotate agents by resistance; not a 'forever' prescription. Counsel resistance + side effects."}
        ]}
      ]},

    {t:"node", d:"monitor", n:"6", tag:"Step 6 · review", title:"Response & recurrence review",
      blocks:[
        {b:"table", head:["What","When","Action"], rows:[
          ["Symptom response","48h","Not improving \u2192 culture/sensitivities, reconsider diagnosis / upper UTI"],
          ["Culture","When sent","Narrow/adjust to sensitivities; Proteus \u2192 image for stones"],
          ["Pregnancy test of cure","After treatment","Confirm clearance; ongoing antenatal surveillance"],
          ["Prophylaxis efficacy","3\u20136 months","Working + tolerated? Stop-trial to reassess; resistance check"],
          ["Recurrence + haematuria","Ongoing","Persistent haematuria or \u226545 \u2192 urology 2WW; escalate work-up"]
        ]},
        {b:"say", html:"For a one-off infection, a short antibiotic course usually clears it \u2014 come back if you're not better in two days, or urgently if you get back pain, fevers or feel really unwell. For the recurring ones, the aim is to need antibiotics LESS: drinking more, the vaginal oestrogen if you're past the menopause, and a non-antibiotic tablet like methenamine often break the cycle without a nightly antibiotic."}
      ]},

    {t:"loop", icon:"🔁", title:"Not responding or recurring? Re-check",
      arrow:"\u2026reconsider organism, diagnosis, reversibles",
      checks:[
        {b:"1 · Culture", html:"Resistant organism? Adjust to sensitivities. Same organism <2 weeks = relapse → think stone/incomplete treatment."},
        {b:"2 · Upper UTI?", html:"Loin pain, fever, systemic upset → treat as pyelonephritis ± admit."},
        {b:"3 · Right diagnosis?", html:"Negative cultures + symptoms → interstitial cystitis, atrophy, OAB, STI/vaginitis — not more antibiotics."},
        {b:"4 · Reversibles", html:"Emptying, constipation, spermicide, atrophy, glycaemic control, dehydration."},
        {b:"5 · Investigate", html:"Visible haematuria, ≥45 with non-visible, Proteus, persistent → urology / imaging / cancer pathway."}
      ],
      back:"Culture-guided, upper UTI excluded, reversibles fixed → prevention ladder / urology"},

    {t:"node", d:"safety", n:"7", tag:"Safety-net", title:"What the patient must know",
      blocks:[
        {b:"tiles", v:"safety", items:[
          {t:"🔴 Pyelonephritis / sepsis", html:"\u201cLoin or back pain, fever or shivering, vomiting, or feeling very unwell or confused \u2014 urgent help the same day.\u201d"},
          {t:"🤰 Pregnancy", html:"\u201cIf you're pregnant, any urine infection needs prompt treatment \u2014 don't leave it; contact us.\u201d"},
          {t:"🩸 Blood in urine", html:"\u201cVisible blood that persists after treatment \u2014 tell us; it needs checking.\u201d"},
          {t:"⏱️ Not improving", html:"\u201cNo better in 48 hours \u2014 come back; we may need a different antibiotic.\u201d"}
        ]}
      ]},

    {t:"node", d:"refer", n:"8", tag:"Refer", title:"When to refer",
      blocks:[
        {b:"tiles", v:"refer", items:[
          {t:"Urgent / admit", html:"Pyelonephritis with sepsis/systemic illness, pregnancy, vomiting, or unable to tolerate oral treatment."},
          {t:"2WW urology", html:"Visible haematuria (any age), or unexplained non-visible haematuria ≥45 → bladder-cancer pathway."},
          {t:"Recurrent / complicated", html:"Recurrent UTI failing the prevention ladder, suspected stones (Proteus), incomplete emptying, or structural concern → urology."},
          {t:"Pregnancy", html:"Recurrent bacteriuria or pyelonephritis in pregnancy → obstetric input."}
        ]},
        {b:"say", html:"Most of these clear with a short course and simple measures. If they keep coming back, we've got a whole ladder of prevention \u2014 and only if those don't work do we consider a long-term antibiotic, always with a review date."}
      ]}
  ],
  foot:"UTI in adult women (non-pregnant & pregnant) \u2014 NICE NG109 (lower UTI), NG112 (antimicrobial prescribing), NG111 (pyelonephritis), CKS. Verify doses against the current BNF before prescribing."
});
</script>
