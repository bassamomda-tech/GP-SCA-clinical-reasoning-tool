<script>
MG.render({
  icon:"🌙",
  title:"Insomnia — The Complete Guide",
  stemTitle:"Insomnia made simple &mdash; find the thief, fix the behaviour, keep tablets brief \u2014 and know the way off them",
  stemSub:"One pathway: characterise it and hunt the cause (OSA, RLS, mood, nocturia, the drug list), run real CBT-I \u2014 sleep restriction and stimulus control with actual instructions, not a hygiene leaflet \u2014 use hypnotics by the rules when you must (which one, what dose, what stop-plan), know the daridorexant and melatonin criteria, and walk established users off benzos and Z-drugs with the diazepam-switch taper that actually works. NICE CKS \u00b7 TA922 \u00b7 BNF.",
  guideline:"NICE CKS \u00b7 TA922",
  glance:[
    {lbl:"Chronic =", val:"\u22653 nights \u00d7 3mo", sub:"+ daytime impairment"},
    {lbl:"Hunt first", val:"OSA \u00b7 RLS \u00b7 mood", sub:"+ the drug list"},
    {lbl:"First-line", val:"CBT-I", sub:"sleep restriction is the engine"},
    {lbl:"Hypnotic max", val:"\u22642 weeks, intermittent", sub:"zopiclone 3.75\u20137.5mg"},
    {lbl:"Chronic + failed CBT-I", val:"Daridorexant 25\u201350mg", sub:"TA922 \u00b7 review 3mo"},
    {lbl:"Coming off", val:"Diazepam switch + 5\u201310%", sub:"steps every 1\u20132 wks"}
  ],
  flow:[

    {t:"node", d:"found", n:"1", tag:"Step 1 · characterise", title:"Define it — then hunt the thief",
      blocks:[
        {b:"kv", rows:[
          ["Definition","Difficulty falling asleep, staying asleep, or early waking <b>despite adequate opportunity</b>, WITH daytime impairment (fatigue, concentration, mood, errors). Short-term <3 months; <b>chronic = \u22653 nights/week for \u22653 months</b>. No daytime impairment = a short sleeper, not a patient"],
          ["<b>The cause list \u2014 screen every time</b>","<b>OSA</b> (snoring, witnessed apnoeas, unrefreshing sleep, collar size, Epworth/STOP-BANG \u2192 sleep clinic \u2014 hypnotics make it WORSE) \u00b7 <b>RLS</b> (evening leg urge relieved by movement \u2192 check ferritin, target >75) \u00b7 depression/anxiety (early waking = classic depression) \u00b7 pain \u00b7 nocturia (prostate? diuretic timing?) \u00b7 GORD \u00b7 menopause (night sweats \u2192 HRT guide, not zopiclone) \u00b7 shift work / circadian mismatch"],
          ["The drug list","Caffeine (incl. afternoon tea/energy drinks), alcohol (helps onset, wrecks the second half), nicotine, SSRIs (esp. fluoxetine/sertraline \u2014 dose in the morning), corticosteroids (morning dosing), beta-blockers (nightmares), diuretics after 4pm, decongestants, stopping sedatives (rebound)"],
          ["Assess with","2-week <b>sleep diary</b> (or wearable data taken with salt) \u2014 bed time, sleep time, wakes, rise time, naps, caffeine/alcohol. The diary drives the CBT-I maths and exposes the mismatch between felt and actual sleep"],
          ["Expectation reset","Sleep need falls with age (6\u20137h at 70 is normal); waking 1\u20132\u00d7 briefly is normal; the 8-hour rule is a myth that fuels the anxiety that fuels the insomnia"]
        ]},
        {b:"warn", html:"Hypnotics in undiagnosed <b>OSA</b> suppress arousal and worsen hypoxia \u2014 screen before any tablet, especially the overweight snorer. And insomnia + low mood \u2192 treat the depression properly (see depression guide); a Z-drug on top of untreated depression fixes neither."}
      ]},

    {t:"node", d:"life", n:"2", tag:"Step 2 · CBT-I", title:"CBT-I with actual instructions — sleep restriction is the engine",
      blocks:[
        {b:"tiles", v:"life", items:[
          {t:"⏱️ Sleep restriction (the part that works)", html:"From the diary: if they're in bed 9h but asleep 6h → <b>set the bed window to ~6h</b> (never <5h). Fixed wake time 7 days/week, bed only when the window opens. Sleep efficiency >85% for a week → extend window 15–30 min. Brutal for 1–2 weeks (warn: daytime sleepiness — caution driving), then the pressure rebuilds and consolidates the night. This is the active ingredient."},
          {t:"🪑 Stimulus control", html:"Bed = sleep + sex only. Not asleep in ~20 min (felt, not clock-watched) → get up, dim light, boring activity, return when sleepy. Repeat as often as needed. No clock visible."},
          {t:"🧠 Cognitive work", html:"Target the catastrophising ('I'll be useless tomorrow') — sleep-deprived people function better than they predict; paradoxical intention for sleep effort."},
          {t:"📵 Wind-down + environment", html:"60-min buffer, screens out (light + content), dark/cool/quiet room. Hygiene supports CBT-I — it is NOT a treatment alone (the leaflet-only consultation fails)."},
          {t:"💻 Digital CBT-I", html:"Sleepio (NICE-recommended) or equivalent app where commissioned — evidence comparable to face-to-face; NHS Talking Therapies in some areas."},
          {t:"☀️ Daytime", html:"Morning daylight (anchors the clock), regular exercise not late evening, no naps (or ≤20 min before 3pm if essential)."}
        ]},
        {b:"why", html:"CBT-I beats hypnotics at every timepoint beyond 2 weeks and the benefit persists after stopping \u2014 hypnotic benefit stops the night the tablet does. That's why every guideline puts CBT-I first, and why the honest consultation sells the hard fortnight of sleep restriction rather than the easy script."}
      ]},

    {t:"node", d:"drug", n:"3", tag:"Step 3 · tablets", title:"When you do prescribe — the rules, the doses, the stop-plan",
      blocks:[
        {b:"ladder", steps:[
          {step:"Acute", title:"Z-drug — short, intermittent, with an exit", when:"short-term insomnia with severe daytime impact (crisis, bereavement, acute stress)",
           html:"<b>Zopiclone 7.5mg (3.75mg if elderly/hepatic/renal) or zolpidem 5\u201310mg nocte \u2014 \u22642 weeks' supply, ideally 2\u20133 nights/week intermittent, with the stop date agreed AT prescription.</b> Counsel: next-day driving (it's an offence to drive impaired \u2014 and zopiclone shows on roadside-relevant testing), falls in the elderly, no alcohol/opioids, metallic taste (zopiclone). No repeat without review \u2014 the repeat slip is where dependence starts"},
          {step:"\u226555y", title:"Melatonin MR 2mg", when:"age \u226555, up to 13 weeks",
           fromLabel:"the licence",
           html:"Circadin\u00ae/generic MR 2mg 1\u20132h before bed. Modest effect, benign profile, not dependence-forming \u2014 a reasonable first tablet in the older patient (also: jet lag short courses; paediatric use is specialist)"},
          {step:"Chronic", title:"Daridorexant 25\u201350mg (TA922)", when:"chronic insomnia + CBT-I failed/unavailable",
           fromLabel:"the new class",
           html:"<b>Orexin antagonist</b> \u2014 licensed for long-term use, no classical dependence/rebound signature; NICE: only where CBT-I has been tried (or is unavailable), <b>review at 3 months and stop if not working</b>. Take \u226530 min before bed, \u22657h in bed after. Avoid with strong CYP3A4 inhibitors (clarithromycin, azoles); caution narcolepsy-like symptoms"},
          {step:"Niche", title:"What NOT to reach for", when:"the common wrong turns",
           fromLabel:"deprescribing targets, not options",
           html:"<b>Sedating antihistamines</b> (promethazine/OTC Nytol): tolerance in days, anticholinergic burden, hangover \u2014 discourage. <b>Amitriptyline/mirtazapine/quetiapine for pure insomnia</b>: not evidence-based without the comorbid depression \u2014 treat depression properly or don't use them. <b>Benzodiazepines</b> (temazepam): no advantage over Z-drugs, same trap. Long-term nightly ANY hypnotic: the problem, not the plan"}
        ]},
        {b:"warn", html:"Every hypnotic prescription carries three sentences said out loud: <b>\u201cThis is for 2 weeks at most \u00b7 it stops working if used nightly \u00b7 we've already agreed the stop date.\u201d</b> Written on the script, coded on the record, no auto-repeat. The 10-year zopiclone patient started with one unreviewed repeat."}
      ]},

    {t:"node", d:"drug", n:"4", tag:"Step 4 · the way off", title:"Deprescribing established benzo/Z-drug users — the taper that works",
      blocks:[
        {b:"ladder", steps:[
          {step:"1st", title:"The invitation, not the ambush", when:"identify + engage",
           html:"Search the repeat list (>4 weeks' continuous use = dependent until proven otherwise). Frame it as protection: falls, fractures, memory, driving, the drug no longer working. <b>Most patients reduce successfully when invited</b> (letter interventions alone work in ~1 in 5). Never stop abruptly \u2014 seizure/delirium risk in high-dose benzos"},
          {step:"2nd", title:"Switch to diazepam when needed", when:"short-acting drug / difficult withdrawal / high dose",
           fromLabel:"long half-life = smooth taper",
           html:"Equivalents to diazepam 5mg \u2248 <b>zopiclone 7.5mg \u2248 zolpidem 10mg \u2248 temazepam 10mg \u2248 lorazepam 0.5mg</b> (halve the calculated dose if frail). Direct taper of the original drug is fine for low-dose Z-drug users; switch for lorazepam/alprazolam or anyone bouncing between doses"},
          {step:"3rd", title:"Taper 5\u201310% every 1\u20134 weeks", when:"patient-controlled pace",
           fromLabel:"slower at the bottom",
           html:"Reduce by 5\u201310% of the CURRENT dose every 1\u20134 weeks; <b>smaller absolute steps as the dose falls</b> (liquid diazepam helps below 2mg). The patient owns the pace \u2014 hold at any step, never go back up more than one. Typical course: weeks for short use, <b>many months for years-long use \u2014 and that's success, not failure</b>"},
          {step:"4th", title:"Support the gaps", when:"alongside",
           fromLabel:"withdrawal symptoms \u2260 relapse",
           html:"CBT-I running in parallel (the sleep still needs a treatment); warn about transient rebound insomnia + anxiety at each step (days, passes); NO 'rescue' benzos from OOH/locums \u2014 flag the record. Pregabalin/propranolol are NOT routine substitutes. Relapse rate halves when CBT-I accompanies the taper"}
        ]},
        {b:"kv", rows:[
          ["Driving","On any benzo/Z-drug: legal duty not to drive impaired; during a taper most drive safely \u2014 document the conversation. High doses / daytime sedation \u2192 advise off the road + DVLA rules"],
          ["The elderly on nightly temazepam 'for 20 years'","Highest gain: falls + cognition improve measurably off sedatives. Same method, gentler pace, big print taper chart, pharmacist sync"],
          ["Opioids co-prescribed","Benzo + opioid = the respiratory-depression combination \u2014 prioritise these patients for reduction (MHRA warning)"]
        ]}
      ]},

    {t:"node", d:"monitor", n:"5", tag:"Step 5 · review", title:"Review rhythm",
      blocks:[
        {b:"table", head:["What","When","Action"], rows:[
          ["Sleep diary vs baseline","2\u20134 weeks into CBT-I","Efficiency >85% \u2192 extend the window; not engaging \u2192 explore why before any tablet"],
          ["Any hypnotic issued","At the agreed stop date \u2014 in the diary, not 'PRN'","Stopped? Good. Wants more? Review = the CBT-I conversation again, not a repeat"],
          ["Daridorexant","3 months","Working \u2192 continue with annual review; not \u2192 stop (no taper needed)"],
          ["Taper patients","Every 1\u20132 steps","Withdrawal symptoms vs pace; celebrate milestones \u2014 dose-reduction charts motivate"],
          ["The cause list","Every review","Mood, OSA symptoms, pain, alcohol \u2014 the thief changes over time"]
        ]},
        {b:"say", html:"Sleeping tablets work for a fortnight and then quietly stop working \u2014 but the programme where we compress and rebuild your sleep works for years, and it's yours to keep. The first two weeks are genuinely tough; that's the treatment working, not failing. And if you're already on a nightly tablet: we come down in small steps at your pace \u2014 feeling a bit rough for a few days after each step is withdrawal passing through, not your insomnia coming back."}
      ]},

    {t:"loop", icon:"🔁", title:"Still not sleeping? Re-run before any (more) tablets",
      arrow:"\u2026the answer is usually on this list",
      checks:[
        {b:"1 · The thief", html:"OSA screened (properly — STOP-BANG)? RLS + ferritin? Depression re-screened? Nocturia cause? Menopause?"},
        {b:"2 · Real CBT-I?", html:"Actual sleep restriction with a set window — or just a hygiene leaflet? Engagement checked?"},
        {b:"3 · Substances", html:"Afternoon caffeine, evening alcohol, cannabis withdrawal, nicotine — honestly counted?"},
        {b:"4 · Drug timing", html:"SSRI in the morning? Steroids early? Diuretic before 4pm? Beta-blocker dreams?"},
        {b:"5 · Rebound", html:"Recently stopped/reduced a sedative — is this withdrawal insomnia mislabelled as relapse?"},
        {b:"6 · The clock", html:"Shift worker or delayed-phase teenager? That's circadian, not insomnia — different toolkit (light timing, melatonin timing)."}
      ],
      back:"All addressed → daridorexant criteria / sleep clinic"},

    {t:"node", d:"safety", n:"6", tag:"Safety-net", title:"What the patient must know",
      blocks:[
        {b:"tiles", v:"safety", items:[
          {t:"🚗 Driving", html:"\u201cIf you feel drowsy the morning after a sleeping tablet \u2014 don't drive; it's the same offence as drink-driving if impaired.\u201d"},
          {t:"⚠️ The 2-week rule", html:"\u201cThese tablets stop working used nightly and become hard to stop \u2014 we've set the stop date together and it's on the packet.\u201d"},
          {t:"😴 Snoring + pauses", html:"\u201cLoud snoring with breathing pauses and daytime sleepiness needs a different assessment \u2014 tell us, and don't take sleeping tablets meanwhile.\u201d"},
          {t:"🧠 Mood", html:"\u201cIf low mood or hopeless thoughts ride along with the bad nights \u2014 tell us; treating that treats the sleep too.\u201d"},
          {t:"🍷 Mixing", html:"\u201cNever with alcohol or strong painkillers \u2014 the combination suppresses breathing.\u201d"}
        ]}
      ]},

    {t:"node", d:"refer", n:"7", tag:"Refer", title:"Sleep clinic and friends",
      blocks:[
        {b:"tiles", v:"refer", items:[
          {t:"Sleep service", html:"Suspected OSA (STOP-BANG/Epworth high), narcolepsy (cataplexy, sleep attacks), REM behaviour disorder (acting out dreams — also a neurology flag), severe parasomnias, circadian disorders resistant to primary-care measures."},
          {t:"Mental health", html:"Depression/anxiety/PTSD driving it (nightmares + hypervigilance = trauma pathway), or any risk."},
          {t:"Refractory", html:"Chronic insomnia despite genuine CBT-I + daridorexant consideration → sleep/insomnia clinic."},
          {t:"Complex dependence", html:"High-dose or multi-drug sedative dependence, alcohol co-dependence, or failed structured tapers → community drug service / specialist prescribing support."},
          {t:"RLS refractory", html:"Iron replaced + triggers removed and still symptomatic → neurology (dopamine-agonist decisions + augmentation risk)."}
        ]},
        {b:"say", html:"Your sleep problem has a driver we can't fix from here \u2014 the breathing-in-sleep assessment (or the specialist insomnia clinic) is the right next step. In the meantime the programme continues, because whatever they find, the retraining still does the long-term work."}
      ]}
  ],
  foot:"Insomnia in adults \u2014 NICE CKS, TA922 (daridorexant), MHRA sedative guidance. Cross-links: benzodiazepine & Z-drug weaning card, depression, HRT, OSA referral. Verify doses against the current BNF before prescribing."
});
</script>
