<script>
MG.render({
  icon:"🩸",
  title:"Type 1 Diabetes — The Complete Guide",
  stemTitle:"T1DM in primary care &mdash; basal–bolus by name, carb-counting, titration, and the emergencies",
  stemSub:"One pathway for the GPwSI: confirm it's genuinely type 1 (not misdiagnosed T2/LADA/MODY), start the right basal–bolus regimen with named insulins and starting doses, teach carb-counting + correction factors, titrate safely, prevent + treat hypos and DKA, hit the individualised targets with CGM, and know what stays shared-care vs specialist. NICE NG17.",
  guideline:"NICE NG17",
  glance:[
    {lbl:"Regimen", val:"Basal–bolus (MDI)", sub:"first-line for all adults"},
    {lbl:"Basal", val:"Detemir BD / glargine", sub:"or degludec OD"},
    {lbl:"Bolus", val:"Rapid analogue", sub:"aspart / lispro / glulisine"},
    {lbl:"Target", val:"HbA1c ≤48", sub:"individualise"},
    {lbl:"Glucose", val:"5–7 waking · 4–7 pre-meal", sub:"TIR >70%"},
    {lbl:"Emergency", val:"DKA / severe hypo", sub:"know both cold"}
  ],
  flow:[

    {t:"node", d:"found", n:"1", tag:"Step 1 · confirm", title:"Confirm it IS type 1 — the diagnosis that gets missed",
      blocks:[
        {b:"table", head:["Feature","Type 1","Points away (T2/LADA/MODY)"], rows:[
          ["Onset","Rapid: weeks of thirst, polyuria, weight loss","Insidious, obese, metabolic syndrome = T2"],
          ["Ketosis","Ketones / DKA at presentation","Absent"],
          ["Age","Any — not just children (½ present >30y)","MODY: <25y, strong 3-generation FHx, non-obese"],
          ["Antibodies","GAD / IA-2 / ZnT8 positive","LADA = slow autoimmune in adults (antibody+, initially diet/OHA-responsive)"],
          ["C-peptide","Low (paired with glucose)","Preserved in T2/MODY"]
        ]},
        {b:"warn", html:"<b>Do not assume T2 in an overweight adult</b> \u2014 misdiagnosing T1/LADA as T2 and starting only oral agents risks DKA. If lean, ketotic, rapid onset, poor response to orals, or a personal/family history of autoimmunity \u2192 check <b>GAD antibodies + C-peptide</b> and treat as T1 (insulin) until proven otherwise. New T1 with DKA \u2192 same-day admission."},
        {b:"kv", rows:[
          ["Baseline at diagnosis","HbA1c, U&E/eGFR, urine ACR, lipids, TFTs + coeliac serology (autoimmune clustering), BP, weight, retinal + foot screening enrolment"],
          ["Structured education","DAFNE or equivalent for everyone \u2014 carb-counting is the backbone of good T1 control"]
        ]}
      ]},

    {t:"node", d:"drug", n:"2", tag:"Step 2 · the insulins", title:"Know the insulins by name, action, and role",
      blocks:[
        {b:"table", head:["Class","Named products","Onset / peak / duration","Role"], rows:[
          ["<b>Rapid-acting analogue</b>","Aspart (NovoRapid), lispro (Humalog), glulisine (Apidra); <b>ultra-rapid:</b> Fiasp, Lyumjev","10\u201320 min / 1\u20133h / 3\u20135h","<b>Bolus</b> \u2014 with meals + corrections"],
          ["Short-acting (soluble) human","Actrapid, Humulin S","30 min / 2\u20134h / 6\u20138h","Older bolus \u2014 needs 30-min pre-meal timing; largely superseded"],
          ["Intermediate (NPH/isophane)","Insulatard, Humulin I, Insuman Basal","1\u20132h / 4\u20138h / 12\u201316h","Basal (BD) \u2014 cheaper but more nocturnal hypo"],
          ["<b>Long-acting analogue</b>","Detemir (Levemir, usually BD), glargine U100 (Lantus, Semglee), glargine U300 (Toujeo)","No pronounced peak / ~24h (detemir shorter)","<b>Basal</b> \u2014 first-line, flatter profile"],
          ["<b>Ultra-long analogue</b>","Degludec (Tresiba)","Flat / >42h","Basal OD \u2014 very stable, flexible timing, less nocturnal hypo"],
          ["Pre-mixed","NovoMix 30, Humalog Mix25/50, Humulin M3","Biphasic","<b>Not first-line in T1</b> \u2014 only if MDI genuinely unworkable"]
        ]},
        {b:"why", html:"The physiological aim is to <strong>replace background (basal) and meal-time (bolus) insulin separately</strong> so each can be adjusted independently. That flexibility is why <strong>multiple daily injections (MDI, basal\u2013bolus)</strong> \u2014 not pre-mixed \u2014 is first-line for all adults with T1DM (NG17)."}
      ]},

    {t:"node", d:"drug", n:"3", tag:"Step 3 · start", title:"Start the regimen — named choices and starting doses",
      blocks:[
        {b:"ladder", steps:[
          {step:"1st-line", title:"Basal–bolus (MDI)", when:"all adults with T1DM",
           splits:[
             {cond:"Basal", drug:"Detemir (Levemir) BD \u2014 NG17 preferred", note:"Alternatives: glargine OD (Lantus/Toujeo), or degludec OD (Tresiba) for flexible timing / nocturnal hypo"},
             {cond:"Bolus", drug:"Rapid analogue (NovoRapid/Humalog/Apidra) with each meal", note:"Count carbs; inject just before eating (ultra-rapid Fiasp/Lyumjev can be at/after)"}
           ]},
          {step:"Doses", title:"Typical starting total daily dose (TDD)", when:"insulin-naive, non-DKA", fromLabel:"then titrate",
           splits:[
             {cond:"TDD estimate", drug:"~0.5 units/kg/day (0.3\u20130.5)", note:"Lower if lean/insulin-sensitive/honeymoon; higher with intercurrent illness/steroids"},
             {cond:"Split", drug:"~50% basal · ~50% bolus divided across meals", note:"e.g. 70kg \u2192 TDD ~35u \u2192 basal ~17u (÷2 if detemir BD), bolus ~6u per main meal"}
           ]},
          {step:"Carb ratio", title:"Insulin:carb ratio + correction factor", when:"once carb-counting", fromLabel:"individualise",
           splits:[
             {cond:"I:C ratio", drug:"Start ~1 unit : 10g carbs", note:"Adjust by post-meal glucose; often needs to be stronger at breakfast"},
             {cond:"Correction (ISF)", drug:"'100 rule': 100 ÷ TDD = mmol/L dropped per unit", note:"e.g. TDD 50 → ~1 unit drops glucose ~2 mmol/L; correct toward target, beware stacking"}
           ]},
          {step:"Pumps/tech", title:"CSII (pump) ± hybrid closed loop", when:"disabling hypos or HbA1c not met on optimised MDI", fromLabel:"specialist-initiated",
           html:"Insulin pump (NICE TA151) and hybrid closed-loop systems (TA943) for those meeting criteria \u2014 specialist-initiated, GP supports prescriptions + reviews."}
        ]},
        {b:"warn", html:"<b>Never stop basal insulin</b>, even when not eating or unwell \u2014 omission is the classic route to DKA. Sick-day rules cover this (Step 6). Prescribe by BRAND in T1 (biosimilars/strengths differ, esp. U300/degludec) to avoid dangerous switches."}
      ]},

    {t:"node", d:"drug", n:"4", tag:"Step 4 · titrate", title:"Titrate safely — fix the basal first, then bolus",
      blocks:[
        {b:"table", head:["Pattern","Adjust","How"], rows:[
          ["<b>Fasting/waking glucose off</b>","<b>Basal</b> first","Titrate basal to a stable overnight/fasting 5\u20137; change by 10\u201320% (or 1\u20132u) every ~3 days"],
          ["High after a specific meal","That meal's <b>bolus / I:C ratio</b>","Strengthen ratio (e.g. 1:10 \u2192 1:8) if consistently high 2\u20134h post-meal"],
          ["Recurrent hypos at a time","Reduce the responsible insulin","Nocturnal hypo \u2192 reduce basal / switch to degludec; post-meal \u2192 weaken that I:C ratio"],
          ["Erratic / dawn phenomenon","Review basal timing / split","Consider degludec or pump; check injection technique + lipohypertrophy (rotate sites)"],
          ["Illness / steroids","Increase doses temporarily","More frequent monitoring + ketone checks; never omit basal"]
        ]},
        {b:"kv", rows:[
          ["Golden rule","Chase the FASTING number with basal before touching meal-time doses \u2014 a wrong basal makes every bolus look wrong"],
          ["Injection technique","Rotate sites, check for lipohypertrophy (erratic absorption), correct needle length \u2014 a common hidden cause of poor control"]
        ]}
      ]},

    {t:"node", d:"monitor", n:"5", tag:"Step 5 · targets & monitoring", title:"Targets, CGM, and the annual review",
      blocks:[
        {b:"table", head:["Measure","Target (individualise)"], rows:[
          ["HbA1c","\u226448 mmol/mol (6.5%) if achievable without problematic hypos"],
          ["Waking glucose","5\u20137 mmol/L"],
          ["Pre-meal glucose","4\u20137 mmol/L"],
          ["90 min post-meal","5\u20139 mmol/L"],
          ["Time in range (CGM)","<b>>70% in 3.9\u201310</b>; <4% time <3.9; low glucose management index"]
        ]},
        {b:"table", head:["Technology / review","Detail"], rows:[
          ["CGM for ALL","NG17 (2022): offer continuous/flash glucose monitoring (e.g. Libre 2, Dexcom) to everyone with T1DM"],
          ["9 care processes","HbA1c, BP, lipids, U&E/ACR, BMI, smoking, foot check, retinal screening, injection-site review"],
          ["The autoimmune + human bits","TFTs + coeliac periodically; mood/eating-disorder screen (diabulimia \u2014 insulin omission); erectile function; pregnancy planning"],
          ["CVD / renal protection","Statin if indicated (QRISK/age), ACEi/ARB if ACR raised or hypertensive"]
        ]},
        {b:"say", html:"Two insulins doing two jobs: the background one keeps you steady between meals and overnight, and the mealtime one covers what you eat \u2014 which is why we match it to the carbs. We fix the fasting number first, then fine-tune each meal. The sensor tells us not just your average but how much time you spend in the good range."}
      ]},

    {t:"node", d:"safety", n:"6", tag:"Step 6 · emergencies", title:"Hypoglycaemia, DKA, and sick-day rules",
      blocks:[
        {b:"table", head:["Emergency","Recognise","Action"], rows:[
          ["<b>Hypoglycaemia</b> (<4)","Shaky, sweaty, confused; severe = unable to self-treat","<b>15g fast carb</b> (e.g. 4\u20135 glucose tabs / 150ml juice), recheck 15 min, repeat, then long-acting carb. Severe \u2192 <b>IM glucagon</b> / IV glucose + 999. Review the cause; reduce the responsible insulin"],
          ["<b>DKA</b>","Vomiting, abdominal pain, Kussmaul breathing, ketones \u22653.0, glucose usually high (can be near-normal \u2014 euglycaemic)","<b>999 / same-day admission.</b> Never omit insulin; check blood ketones when unwell or glucose >15"],
          ["Impaired awareness","Loss of warning symptoms; recurrent severe hypos","<b>DVLA implications</b>; relax targets, review insulin, structured education, consider CGM/pump \u2014 specialist input"]
        ]},
        {b:"kv", rows:[
          ["Sick-day rules","<b>Never stop insulin</b>; check glucose + <b>blood ketones</b> 2\u20134 hourly; keep hydrated + carbs; give correction doses per ketone level; seek help if ketones rising/vomiting/can't keep fluids down"],
          ["DVLA","Group 1: must have hypo awareness + \u2264 one severe hypo in 12 months + glucose monitoring; <b>'5 to drive'</b> (\u22655 mmol/L), test before + every 2h; carry fast carbs. Group 2: stricter \u2014 specialist assessment"]
        ]}
      ]},

    {t:"loop", icon:"🔁", title:"Control off? Work through this", arrow:"…technique + basal + counting first",
      checks:[
        {b:"1 · Basal right?", html:"Fasting glucose stable 5–7? Fix basal before blaming boluses."},
        {b:"2 · Carb-counting", html:"Actually counting, or fixed doses? I:C ratios reviewed? DAFNE-style education done?"},
        {b:"3 · Technique / sites", html:"Lipohypertrophy, poor rotation, wrong needle, expired/heat-damaged insulin?"},
        {b:"4 · Hypos driving highs", html:"Rebound after unrecognised hypos (over-treating)? CGM to see the pattern."},
        {b:"5 · Life factors", html:"Illness, steroids, alcohol, exercise, menstrual cycle, shift work, eating disorder/insulin omission?"},
        {b:"6 · Right diagnosis / needs", html:"Coeliac, thyroid, gastroparesis; or genuine case for pump/closed-loop → specialist."}
      ],
      back:"Optimised MDI + education + tech considered → diabetes specialist team"},

    {t:"node", d:"safety", n:"7", tag:"Safety-net", title:"What the patient must know",
      blocks:[
        {b:"table", head:["Scenario","Advice"], rows:[
          ["🔴 DKA","\u201cVomiting, tummy pain, deep fast breathing, high ketones \u2014 999. Never stop your insulin, even when not eating.\u201d"],
          ["🍬 Severe hypo","\u201cCan't treat it yourself \u2014 someone gives glucagon or calls 999. Always carry fast sugar.\u201d"],
          ["🤒 Sick days","\u201cUnwell → keep insulin going, check ketones every few hours, sip fluids, use your sick-day plan.\u201d"],
          ["🚗 Driving","\u201c5 to drive \u2014 test before and every 2 hours; treat and wait 45 min after a hypo before driving.\u201d"]
        ]}
      ]},

    {t:"node", d:"refer", n:"8", tag:"Refer", title:"Shared care — what stays specialist",
      blocks:[
        {b:"table", head:["Refer / share","Trigger"], rows:[
          ["Same-day / 999","New T1 with DKA; severe hypo; pregnancy with poor control"],
          ["Diabetes specialist team","Pump/closed-loop assessment (TA151/TA943), impaired hypo awareness, recurrent DKA, HbA1c persistently off target despite optimised MDI"],
          ["Pre-conception / antenatal","Planning or pregnant \u2192 joint clinic; aim HbA1c <48, high-dose folic acid, review retinopathy"],
          ["MDT foot / retinal","Active foot disease → same-day; retinopathy per screening"],
          ["Psychology","Diabetes distress, eating disorder / insulin omission, needle phobia"]
        ]},
        {b:"say", html:"A lot of day-to-day type 1 care can run here with the sensor and your adjustments, but the specialist team lead on pumps, closed-loop technology, pregnancy and any pattern of dangerous hypos \u2014 we work together, and the emergencies always go straight in.\""}
      ]}
  ],
  foot:"Type 1 diabetes in adults \u2014 NICE NG17, TA151 (pumps), TA943 (hybrid closed loop). Prescribe insulin by brand + strength. Verify doses against the current BNF; specialist/shared-care where indicated."
});
</script>
