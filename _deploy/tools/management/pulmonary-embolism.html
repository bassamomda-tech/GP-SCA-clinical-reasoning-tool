MG.render({
  icon:"🫁",
  title:"Pulmonary Embolism — The Complete Guide",
  stemTitle:"PE made simple &mdash; Wells decides the path, unstable means thrombolysis, everyone else gets a DOAC",
  stemSub:"One pathway: recognise it (including the subtle presentations that kill), stratify with the two-level Wells score, know the D-dimer-vs-CTPA fork, spot the haemodynamically unstable patient who needs thrombolysis NOW, start the right DOAC for the right duration, handle pregnancy and cancer-associated PE, and organise the unprovoked-PE follow-up. NICE NG158 \u00b7 CKS.",
  guideline:"NICE NG158 \u00b7 CKS",
  glance:[
    {lbl:"Stratify", val:"Two-level Wells", sub:">4 = PE likely"},
    {lbl:"Likely (>4)", val:"CTPA", sub:"interim anticoag if delay"},
    {lbl:"Unlikely (\u22644)", val:"D-dimer", sub:"neg + low = excludes"},
    {lbl:"Unstable", val:"Thrombolysis", sub:"999 — massive PE"},
    {lbl:"Treat", val:"DOAC first-line", sub:"apixaban / rivaroxaban"},
    {lbl:"Duration", val:"\u22653 months", sub:"provoked vs unprovoked"}
  ],
  flow:[

    {t:"node", d:"found", n:"1", tag:"Step 1 · recognise", title:"Recognise it — including the presentations that get missed",
      blocks:[
        {b:"kv", rows:[
          ["Classic","Pleuritic chest pain, breathlessness, haemoptysis, tachycardia, tachypnoea \u2014 often with DVT signs (unilateral swollen calf)"],
          ["<b>The subtle killers</b>","Isolated unexplained breathlessness or tachycardia; syncope/pre-syncope (can be the ONLY sign of a large PE); 'atypical chest infection' not responding; new AF; unexplained hypoxia. Consider PE in any breathless/collapsed patient with risk factors"],
          ["Risk factors","Recent surgery/immobility/long-haul travel, active cancer, previous VTE, pregnancy/postpartum, oestrogen (COC/HRT), thrombophilia, obesity, lower-limb fracture/cast"],
          ["Assess","Vitals incl. <b>SpO\u2082 + HR + BP</b> (haemodynamic status decides the pathway), calves, and calculate the Wells score"]
        ]},
        {b:"warn", html:"<b>Haemodynamic instability (systolic <90, or a sustained drop) = massive/high-risk PE \u2192 999 / immediate admission for consideration of thrombolysis.</b> Don't score, don't D-dimer, don't wait for a CTPA slot \u2014 resuscitate and get them to hospital. Syncope + hypoxia + tachycardia is massive PE until proven otherwise."}
      ]},

    {t:"node", d:"found", n:"2", tag:"Step 2 · stratify", title:"Two-level Wells score — the fork in the road",
      blocks:[
        {b:"table", head:["Wells criterion","Points"], rows:[
          ["Clinical signs of DVT","3"],
          ["PE is the most likely diagnosis","3"],
          ["Heart rate >100","1.5"],
          ["Immobilisation \u22653 days / surgery in last 4 weeks","1.5"],
          ["Previous DVT/PE","1.5"],
          ["Haemoptysis","1"],
          ["Active cancer (treatment within 6 months / palliative)","1"]
        ]},
        {b:"kv", rows:[
          ["<b>PE LIKELY (>4 points)</b>","\u2192 <b>immediate CTPA</b> (V/Q scan if CTPA unsuitable \u2014 renal impairment, contrast allergy, pregnancy). If CTPA can't be done straight away, give <b>interim therapeutic anticoagulation</b> (a DOAC) while waiting"],
          ["<b>PE UNLIKELY (\u22644 points)</b>","\u2192 <b>D-dimer</b> (with age-adjusted cut-off in >50s where used). <b>Negative + low probability = PE excluded</b>, look elsewhere. Positive \u2192 CTPA"],
          ["D-dimer caveat","D-dimer is a RULE-OUT, only in the 'unlikely' group. Never send it in the 'likely' group (a negative won't reassure you); it's raised by infection, pregnancy, cancer, surgery, age \u2014 low specificity"]
        ]},
        {b:"warn", html:"<b>Don't send a D-dimer to 'screen' a likely-PE patient</b> \u2014 in the Wells-likely group they go straight to imaging with interim anticoagulation. Using D-dimer in the wrong group is the commonest diagnostic error and delays treatment."}
      ]},

    {t:"node", d:"drug", n:"3", tag:"Step 3 · anticoagulate", title:"Treatment — DOAC first-line, the right duration",
      blocks:[
        {b:"ladder", steps:[
          {step:"1st", title:"DOAC — apixaban or rivaroxaban", when:"confirmed PE (or interim while awaiting CTPA)",
           html:"<b>Apixaban 10mg BD \u00d77 days \u2192 5mg BD</b>, or <b>rivaroxaban 15mg BD \u00d721 days \u2192 20mg OD</b> (with food). No routine monitoring. Both have a loading phase built in \u2014 get the schedule right. Edoxaban/dabigatran need \u22655 days of LMWH lead-in first."},
          {step:"Alt", title:"LMWH → warfarin, or LMWH alone", when:"DOAC unsuitable",
           fromLabel:"specific situations",
           html:"<b>Severe renal impairment (CrCl <15), antiphospholipid syndrome (triple-positive) \u2192 LMWH + warfarin (target INR 2\u20133).</b> <b>Cancer-associated PE</b> \u2192 a DOAC (edoxaban/apixaban/rivaroxaban) or LMWH \u2014 caution DOAC with GI/GU tumours (bleeding)."},
          {step:"Duration", title:"How long to treat", when:"the decision at 3 months",
           fromLabel:"provoked vs unprovoked",
           html:"<b>Provoked</b> by a transient factor (surgery, immobility) \u2192 <b>3 months</b> then stop. <b>Unprovoked, or ongoing risk (cancer, thrombophilia, recurrent) \u2192 \u22656 months, often long-term</b> \u2014 weigh recurrence vs bleeding (assess bleeding risk, patient preference). Cancer: continue while cancer active."}
        ]},
        {b:"kv", rows:[
          ["Dosing rules matter","DOAC PE dosing has a LOADING phase (higher dose first days/weeks) \u2014 different from AF dosing. Getting it wrong under-treats the clot. See the DOAC & anticoagulation guide for CrCl, interactions and missed-dose rules"],
          ["Outpatient management","Low-risk confirmed PE (e.g. sPESI 0, stable, no comorbidity) may be managed at home per local pathway with a DOAC \u2014 but the diagnosis is made in secondary care"]
        ]}
      ]},

    {t:"node", d:"found", n:"4", tag:"Step 4 · special situations", title:"Pregnancy, cancer, and the unprovoked work-up",
      blocks:[
        {b:"kv", rows:[
          ["<b>Pregnancy / postpartum</b>","D-dimer is unreliable (physiologically raised) \u2014 don't rely on it. Imaging: <b>LMWH</b> is the anticoagulant of choice throughout (DOACs + warfarin avoided); CTPA or V/Q per local obstetric pathway; involve obstetric medicine urgently. Suspected PE in pregnancy = treat empirically with LMWH while investigating"],
          ["Cancer-associated","DOAC or LMWH; higher recurrence + bleeding; continue while cancer active; caution DOACs with luminal GI/GU cancers"],
          ["<b>Unprovoked PE work-up</b>","Don't do indiscriminate 'cancer screens' \u2014 NICE: <b>review history/exam, bloods, and do baseline investigations</b>; further imaging/tumour markers only if clinically indicated. Consider thrombophilia testing only in specific cases (e.g. first-degree relative + planning to stop anticoagulation) \u2014 and NOT while on anticoagulation"],
          ["Thrombophilia testing","Rarely changes acute management; specialist-guided; antiphospholipid syndrome testing if unprovoked + planning to stop"]
        ]}
      ]},

    {t:"node", d:"monitor", n:"5", tag:"Step 5 · follow-up", title:"After the acute event",
      blocks:[
        {b:"table", head:["What","When","Action"], rows:[
          ["Anticoagulation review","Regularly + at the duration decision point","Provoked \u2192 stop at 3 months; unprovoked \u2192 reassess risk/benefit for extended therapy"],
          ["Renal function (on DOAC)","Baseline, then periodically","Re-dose per CrCl; more often if CKD/elderly/unwell"],
          ["Bleeding review","Each review","Falling Hb → find the source; optimise modifiable bleeding risks (BP, NSAIDs, alcohol)"],
          ["Persistent breathlessness","3\u20136 months post-PE","Consider chronic thromboembolic pulmonary hypertension (CTEPH) → refer if unexplained ongoing dyspnoea"],
          ["Provoking factors","Ongoing","Stop the COC/HRT if that was the trigger (switch contraception — see contraception guide); mobility, future surgery VTE prophylaxis"]
        ]},
        {b:"say", html:"The clot on your lung is treated with a blood thinner \u2014 usually a tablet \u2014 for at least three months. If we couldn\u2019t find an obvious trigger, we often continue longer because the risk of another one is higher. Tell us about any abnormal bleeding, and if you stay breathless months down the line, we\u2019ll check the lung pressures."}
      ]},

    {t:"loop", icon:"🔁", title:"Breathless/unwell on treatment? Think again",
      arrow:"\u2026treated PE can still deteriorate",
      checks:[
        {b:"1 · Still unstable?", html:"Deteriorating obs / hypotension → recurrent or massive PE → 999, ?thrombolysis."},
        {b:"2 · Right DOAC dose?", html:"Loading phase given correctly? CrCl checked? Adherence?"},
        {b:"3 · Bleeding?", html:"Anticoagulant bleed → find + fix source, ORBIT-style; stopping is last resort."},
        {b:"4 · Trigger removed?", html:"Still on the COC/HRT that caused it? Immobility ongoing?"},
        {b:"5 · CTEPH", html:"Persistent breathlessness months later → echo + refer (chronic thromboembolic pulmonary hypertension)."},
        {b:"6 · Missed cancer", html:"Unprovoked PE with new symptoms/weight loss → targeted investigation."}
      ],
      back:"Recurrence/instability → 999; otherwise optimise + specialist review"},

    {t:"node", d:"safety", n:"6", tag:"Safety-net", title:"What the patient must know",
      blocks:[
        {b:"tiles", v:"safety", items:[
          {t:"🔴 999", html:"\u201cSudden severe breathlessness, chest pain, coughing blood, fainting or collapse \u2014 999 immediately.\u201d"},
          {t:"🩸 Bleeding", html:"\u201cOn the blood thinner: black tarry stools, vomiting blood, blood in urine, a bleed that won\u2019t stop, or a head injury \u2014 A&E; tell them you\u2019re anticoagulated.\u201d"},
          {t:"💊 Don\u2019t miss doses", html:"\u201cThe blood thinner protects you every day \u2014 don\u2019t stop or skip without telling us; a missed dose leaves you unprotected.\u201d"},
          {t:"🚭 Hormones", html:"\u201cIf the clot was linked to the pill or HRT, we\u2019ll stop it and sort safe alternative contraception.\u201d"}
        ]}
      ]},

    {t:"node", d:"refer", n:"7", tag:"Refer", title:"Admission & specialist",
      blocks:[
        {b:"tiles", v:"refer", items:[
          {t:"999 / immediate", html:"Haemodynamic instability (massive PE) — thrombolysis territory; syncope + hypoxia + tachycardia."},
          {t:"Same day", html:"Suspected PE (Wells likely, or unlikely + positive D-dimer) → acute medical/ambulatory care for CTPA + treatment. Suspected PE in pregnancy → empirical LMWH + urgent obstetric medicine."},
          {t:"Duration / complex", html:"Unprovoked PE anticoagulation-duration decisions; cancer-associated; antiphospholipid; recurrent VTE → haematology/specialist."},
          {t:"CTEPH", html:"Persistent unexplained breathlessness post-PE → echo + pulmonary hypertension referral."}
        ]},
        {b:"say", html:"A suspected clot on the lung is a same-day hospital problem \u2014 they\u2019ll do the scan and start treatment. If you\u2019re at all unstable, that\u2019s a 999 call, not a wait. Once you\u2019re on the blood thinner, we\u2019ll plan together how long you need it."}
      ]}
  ],
  foot:"Pulmonary embolism in adults \u2014 NICE NG158 and CKS. Diagnosis + initial treatment are secondary-care; DOAC dosing per the DOAC & Anticoagulation guide. Verify against the current BNF before prescribing."
