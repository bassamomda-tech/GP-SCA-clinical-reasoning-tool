MG.render({"icon":"💪","title":"Tennis Elbow","guideline":"NICE CKS","stemTitle":"Lateral epicondylalgia — reassure, load-manage, self-limiting","stemSub":"Primary-care management of tennis elbow (lateral epicondylalgia) — a common overuse tendinopathy of the wrist extensors; confirm clinically, treat with activity modification, analgesia and exercises, and reserve injection/referral, recognising the good natural history. NICE CKS · 2026.","glance":[{"lbl":"Hallmark","val":"Lateral elbow pain","sub":"on gripping/wrist extension"},{"lbl":"1st-line","val":"Activity modification + exercise","sub":"+ analgesia"},{"lbl":"Aids","val":"Epicondylar clasp / topical NSAID","sub":""},{"lbl":"Injection","val":"Steroid: short-term only","sub":"worse long-term — limited use"},{"lbl":"Prognosis","val":"Self-limiting","sub":"most within 1–2 years"},{"lbl":"Differentials","val":"Radial tunnel, OA, referred neck","sub":""}],"flow":[{"t":"node","d":"found","n":"1","tag":"Foundation","title":"Diagnose","blocks":[{"b":"kv","rows":[["Typical","Pain + tenderness over the lateral epicondyle, worse with gripping and resisted wrist/finger extension; dominant arm; overuse (repetitive gripping, not just tennis)"],["Tests","Pain on resisted wrist extension / middle-finger extension; tender lateral epicondyle"],["Differentials","Radial tunnel syndrome, elbow OA, referred cervical pain, posterior interosseous nerve entrapment"],["Imaging","Not routine; consider if atypical/refractory"]]},{"b":"why","html":"Tennis elbow is a clinical diagnosis (extensor origin tendinopathy) with an excellent natural history — most resolve within 1–2 years. Management emphasises reassurance and load management; corticosteroid injection helps short-term but worsens longer-term outcomes."}]},{"t":"node","d":"life","n":"2","tag":"Treatment","title":"Conservative","blocks":[{"b":"tiles","v":"life","items":[{"t":"📉 Activity modification","html":"Reduce/modify aggravating gripping/lifting; ergonomic/technique advice; relative rest, not complete rest."},{"t":"🏋️ Exercises","html":"Progressive wrist-extensor strengthening (eccentric) + stretching; physiotherapy for refractory cases."},{"t":"🦾 Brace","html":"Counterforce (epicondylar) clasp/band may relieve pain during activity."},{"t":"🧊 Adjuncts","html":"Ice; topical NSAID for symptom relief."}]}]},{"t":"node","d":"drug","n":"3","tag":"Symptom relief / escalation","title":"Analgesia ± injection","blocks":[{"b":"ladder","steps":[{"step":"Step 1","title":"Analgesia","when":"as needed","html":"Paracetamol 1 g QDS and/or topical or short-course oral NSAID (ibuprofen 400 mg TDS or naproxen 250–500 mg BD) to support activity."},{"step":"Step 2","title":"Physiotherapy","when":"persistent","fromLabel":"if not improving","html":"Structured loading programme; consider counterforce brace; address technique/ergonomics."},{"step":"Step 3","title":"Corticosteroid injection (selective)","when":"severe short-term need","fromLabel":"limited role","html":"Provides short-term relief only and is associated with <b>worse outcomes at 6–12 months</b> — use sparingly after discussing trade-offs; not first-line."},{"step":"Step 4","title":"Specialist","when":"refractory","fromLabel":"if refractory >6–12 months","html":"MSK/orthopaedics for shockwave therapy, other injections, or rarely surgery."}]},{"b":"warn","html":"Counsel on the good but slow prognosis. Corticosteroid injection improves pain short-term but leads to higher recurrence and worse long-term outcomes — not routine."}]},{"t":"node","d":"follow","n":"4","tag":"Follow-up","title":"Natural course & escalation","blocks":[{"b":"timeline","items":[{"n":"1","when":"Weeks–months","title":"Reassure & load","html":"Explain it is <b>self-limiting but slow</b> (often 6–24 months); activity modification, a forearm strap, and progressive <b>eccentric strengthening</b> are the mainstay."},{"n":"2","when":"If persistent","title":"Adjuncts","html":"Topical/oral NSAID for symptom relief. Corticosteroid injection gives <b>short-term</b> relief but worse long-term outcomes — counsel and use selectively."},{"n":"3","when":"Refractory","title":"Refer","html":"Disabling symptoms beyond several months despite a structured programme → physiotherapy/orthopaedic referral (consider other options)."}]},{"b":"say","html":"This is frustrating because it's slow to settle, but it does get better — strengthening exercises and a strap are the key. Injections help briefly but aren't a long-term fix."}]},{"t":"node","d":"safety","n":"5","tag":"Safety-net","title":"When it isn't tennis elbow","blocks":[{"b":"tiles","v":"safety","items":[{"t":"🟠 Non-mechanical features","html":"Pain at rest/night, swelling, systemic symptoms, or neurological signs → reconsider (referred neck pain, radial tunnel, inflammatory arthritis)."},{"t":"💬 Safety-net","html":"If the pain is there at rest or at night, the elbow swells, or you get numbness/weakness in the hand, come back."}]}]},{"t":"node","d":"refer","n":"6","tag":"Refer","title":"Referral","blocks":[{"b":"tiles","v":"refer","items":[{"t":"Physiotherapy / MSK","html":"Persistent symptoms for a loading programme; refractory disease for shockwave/specialist options."},{"t":"Orthopaedics","html":"Refractory beyond conservative care (rarely surgery)."},{"t":"Reconsider","html":"Atypical/neurological features → radial tunnel/cervical cause."}]},{"b":"say","html":"This is tennis elbow — an overuse strain where the forearm muscles attach at the elbow. The good news is it nearly always settles, though it can take many months. The best approach is easing the aggravating gripping, simple painkillers, and strengthening exercises. A steroid injection helps briefly but tends to come back worse, so we use it sparingly."}]}],"foot":"Management of tennis elbow (lateral epicondylalgia) in primary care — conservative, self-limiting; corticosteroid injection has limited, short-term-only benefit. Verify against current NICE CKS Tennis elbow."});
</script>
