MG.render({"icon":"🌸","title":"Pelvic Inflammatory Disease","guideline":"BASHH","stemTitle":"PID — treat empirically and early to protect fertility","stemSub":"Primary-care management of pelvic inflammatory disease — a clinical diagnosis treated empirically (low threshold) to prevent tubal damage; cover the likely organisms, ensure STI testing and partner notification, and admit severe or complicated cases. BASHH · CKS · 2026.","glance":[{"lbl":"Diagnose","val":"Clinically, low threshold","sub":"don’t await swabs"},{"lbl":"Hallmark","val":"Pelvic pain + adnexal/CMT","sub":"± fever/discharge"},{"lbl":"1st-line","val":"Ceftriaxone 1g IM + doxy 100 BD + metro 400 BD ×14d","sub":"outpatient regimen"},{"lbl":"Test","val":"NAAT CT/NG + HIV","sub":"+ pregnancy test"},{"lbl":"Always","val":"Partner notification","sub":"+ abstain"},{"lbl":"Red flag","val":"Sepsis / abscess / pregnancy","sub":"= admit"}],"flow":[{"t":"node","d":"safety","n":"1","tag":"Safety-net","title":"Admit + exclude","blocks":[{"b":"tiles","v":"safety","items":[{"t":"🔴 Admit","html":"Severe pain/sepsis, unable to tolerate oral, tubo-ovarian abscess, pregnancy, or no response to oral therapy → admit for IV antibiotics."},{"t":"🔴 Exclude ectopic","html":"Always do a pregnancy test — ectopic pregnancy can mimic PID and is life-threatening."},{"t":"🟠 Appendicitis / other","html":"Consider appendicitis, ovarian torsion/cyst accident, UTI."},{"t":"🩺 Fitz-Hugh-Curtis","html":"RUQ pain (perihepatitis) can accompany PID."}]},{"b":"why","html":"PID is a clinical diagnosis with a deliberately low treatment threshold because delay causes tubal infertility, ectopic pregnancy and chronic pelvic pain. The must-excludes are ectopic pregnancy (always test) and a surgical abdomen."}]},{"t":"node","d":"found","n":"2","tag":"Foundation","title":"Diagnose","blocks":[{"b":"kv","rows":[["Features","Lower abdominal/pelvic pain, deep dyspareunia, abnormal discharge, IMB/PCB, fever; <b>cervical motion tenderness</b> and adnexal tenderness on examination"],["Organisms","Chlamydia, gonorrhoea, Mycoplasma genitalium, anaerobes/endogenous flora"],["Tests","Endocervical/vulvovaginal NAAT (CT/NG), HIV/syphilis, <b>pregnancy test</b>, microscopy if available; bloods/USS if unwell/abscess suspected"],["Treat empirically","Start antibiotics on clinical suspicion — do not wait for swab results"]]}]},{"t":"node","d":"life","n":"3","tag":"Non-drug · prevention","title":"Safer sex & recovery advice","blocks":[{"b":"tiles","v":"life","items":[{"t":"🚫 Abstain","html":"Avoid sex until patient and partner(s) have completed treatment."},{"t":"🧴 Condoms","html":"Consistent condom use reduces recurrence and protects future fertility."},{"t":"🛌 Rest & analgesia","html":"Rest, simple analgesia; remove IUD only if no improvement at 48–72 h (specialist advice)."}]},{"b":"why","html":"Because PID threatens future fertility, preventing recurrence is part of treatment — partner treatment, condoms and completing the course all matter."}]},{"t":"node","d":"drug","n":"4","tag":"Medication","title":"Empirical antibiotics","blocks":[{"b":"ladder","steps":[{"step":"Outpatient","title":"Ceftriaxone + doxycycline + metronidazole","when":"mild–moderate","html":"e.g. IM ceftriaxone 1 g single dose + doxycycline 100 mg BD + metronidazole 400 mg BD for 14 days (per BASHH; regimens updated for M. genitalium/resistance — check current guidance)."},{"step":"IUD","title":"Consider device","when":"if IUD in situ","fromLabel":"IUS/IUD present","html":"Usually leave the IUD in and review at 48–72h; consider removal if no improvement (with contraception advice)."},{"step":"Always","title":"Partner notification + abstain","when":"all cases","fromLabel":"prevent reinfection","html":"Notify + treat partners (via sexual health); abstain until both treated."}]},{"b":"warn","html":"Review at 48–72 hours — lack of improvement warrants admission/IV therapy and reconsidering the diagnosis (abscess, ectopic)."}]},{"t":"node","d":"follow","n":"5","tag":"Follow-up","title":"Review & partner care","blocks":[{"b":"timeline","items":[{"n":"1","when":"72 h","title":"Review response","html":"Review within <b>72 h</b> — significant improvement expected. No/poor response → reconsider diagnosis and admit for IV therapy/imaging (tubo-ovarian abscess)."},{"n":"2","when":"Partner notification","title":"Trace & treat","html":"Test and treat partners; advise abstinence until both completed treatment. Full STI screen including HIV; offer contraception review."},{"n":"3","when":"Counsel","title":"Fertility implications","html":"Explain the link with future <b>infertility, ectopic pregnancy and chronic pelvic pain</b> — reinforces the importance of completing treatment and partner care. Review at 2–4 weeks."}]},{"b":"say","html":"It's important to finish the full antibiotic course and for your partner to be treated too, because untreated infection can affect future fertility. I'll review you in three days to check it's improving."}]},{"t":"node","d":"refer","n":"6","tag":"Refer","title":"Referral + follow-up","blocks":[{"b":"tiles","v":"refer","items":[{"t":"Admit","html":"Severe/septic, pregnant, abscess, oral therapy failed, diagnostic uncertainty (?surgical/ectopic)."},{"t":"GUM / sexual health","html":"STI testing, partner notification, M. genitalium, recurrent PID."},{"t":"Gynaecology","html":"Tubo-ovarian abscess, chronic pelvic pain, subfertility follow-up."}]},{"b":"say","html":"This looks like pelvic inflammatory disease — an infection of the womb and tubes, usually from a sexually transmitted infection. We treat it straight away with a course of antibiotics, even before tests come back, because early treatment protects your fertility. Recent partners need testing and treatment, and avoid sex until you’re both treated."}]}],"foot":"Management of PID in primary care — treat empirically with a low threshold; admit severe/complicated/pregnant cases. Always exclude ectopic pregnancy. Verify against current BASHH PID guidance."});
