MG.render({

  title:"Benzodiazepines & Z-drugs — Prescribing & Deprescribing",
  stemTitle:"Benzodiazepines & z-hypnotics &mdash; short-course only, and how to taper long-term users off safely",
  stemSub:"A medicines-optimisation protocol for anxiety and insomnia in adults: reserve these dependence-forming drugs for short, severe episodes, prescribe \u22642 weeks at the lowest dose with an agreed stop plan, and proactively taper established long-term users \u2014 with a diazepam-equivalent conversion and a structured reduction schedule. NICE TA77 / CKS / BZRA deprescribing guideline.",
  guideline:"NICE TA77 \u00b7 CKS \u00b7 BZRA deprescribing",
  glance:[
    {lbl:"Insomnia (short-term)", val:"Zopiclone 3.75\u20137.5mg", sub:"or zolpidem 5\u201310mg"},
    {lbl:"Anxiety (short-term)", val:"Diazepam 2mg", sub:"severe/disabling crisis only"},
    {lbl:"Max course", val:"\u22642 weeks", sub:"preferably <1 week; no repeats"},

  ],
  flow:[

    {t:"node", d:"found", n:"1", tag:"Before you prescribe", title:"Treat the cause first; these are last-resort, short-course drugs",
      blocks:[
        {b:"kv", rows:[
          ["Indication (narrow)","Benzodiazepine \u2014 <b>short-term, severe, disabling anxiety</b> causing unacceptable distress. Z-hypnotic \u2014 <b>short-term, severe, disabling insomnia</b>. Not for mild/chronic symptoms or distress alone."],
          ["Optimise non-drug first","Insomnia \u2192 sleep hygiene + CBT-I (see insomnia pathway). Anxiety \u2192 low-intensity psychological interventions / Talking Therapies first-line. Continue these alongside any prescription."],
          ["Treat comorbidity","Pain, respiratory/cardiac disease, depression, panic, substance misuse \u2014 treating these often resolves the sleep/anxiety symptom; review culprit medicines."],
          ["Agree the stop plan upfront","Before prescribing, explain dependence/withdrawal risk and <b>agree how and when it will stop</b>. Document that further scripts will not usually be given."],
          ["Don't reissue blind","Do <b>not</b> issue a repeat or further prescription without reviewing the patient face-to-face."]
        ]},
        {b:"warn", html:"Benzodiazepines and z-hypnotics are <b>dependence-forming</b>. Long-term use gives <b>limited benefit</b> but well-documented harms: tolerance, dependence, <b>falls &amp; fractures</b>, cognitive impairment/dementia risk, daytime sedation and road-traffic accidents \u2014 risks magnified in older people."}
      ]},

    {t:"node", d:"life", n:"2", tag:"Non-drug · core", title:"Non-drug alternatives & withdrawal", blocks:[{b:"tiles", v:"life", items:[{t:"😴 Non-drug first", html:"CBT/CBT-I, sleep hygiene and self-help are first-line for insomnia/anxiety \u2014 the goal is to avoid/limit these drugs."},{t:"📉 Gradual withdrawal", html:"For long-term users, agree a slow patient-led taper (switch to diazepam equivalent, reduce gradually) with support."},{t:"🧠 Treat the driver", html:"Address underlying anxiety, depression, pain or substance use rather than perpetuating the prescription."}]},{b:"why", html:"These drugs are for short-term use only \u2014 non-drug treatment and structured gradual withdrawal are the real management of dependence."}]},
    {t:"node", d:"drug", n:"3", tag:"Step 1 \u00b7 if you must prescribe", title:"Short course, lowest dose, named agent",
      blocks:[
        {b:"p", html:"If a drug is genuinely needed for a severe, short-lived crisis: <b>lowest effective dose, \u22642 weeks (ideally &lt;1 week), as an acute script.</b>"},
        {b:"table", head:["Indication","Agent (brand)","Dose","Note"], rows:[
          ["Insomnia","Zopiclone","3.75\u20137.5mg at night (3.75mg if elderly)","Z-hypnotic; \u226412h driving impairment"],
          ["Insomnia","Zolpidem (Stilnoct\u00ae)","5\u201310mg at night (5mg if elderly)","2nd-line z-hypnotic"],
          ["Insomnia","Zaleplon","10mg at night","Ultra-short-acting; rarely used"],
          ["Anxiety (crisis)","Diazepam (Valium\u00ae)","2mg (up to 5mg) \u00d7 few days","Long-acting benzodiazepine"],
          ["Anxiety (short)","Lorazepam (Ativan\u00ae)","0.5\u20131mg","Short-acting; higher dependence/withdrawal risk"]

        {b:"kv", rows:[
          ["No \u201Ctrial of the others\u201D","If a patient doesn't respond to one z-hypnotic, <b>do not</b> try the others. Only switch z-hypnotic for an agent-specific adverse effect."],
          ["Avoid combinations","Do not combine with opioids, gabapentinoids (pregabalin/gabapentin), sedating antihistamines or alcohol \u2014 additive respiratory depression / overdose risk."],
          ["Check discharge scripts","Query any hospital-initiated benzodiazepine/z-hypnotic that arrives without a course duration or review plan; don't continue by default."]
        ]},
        {b:"why", html:"The evidence base supports only <strong>short courses</strong>: tolerance to the hypnotic/anxiolytic effect develops within days to weeks, after which the patient is largely taking the drug to stave off withdrawal. Setting the expectation of a short course at the very first prescription is what prevents decades of dependence."}
      ]},

    {t:"node", d:"monitor", n:"4", tag:"Step 2 \u00b7 review long-term users", title:"Proactively identify & assess established use",
      blocks:[
        {b:"p", html:"Search for and proactively review every patient on a long-term benzodiazepine/z-hypnotic. First decide whether to <b>deprescribe</b> (most) or <b>continue/treat-the-cause</b> (a minority)."},
        {b:"tiles", v:"refer", items:[
          {t:"Recommend deprescribing", html:"Insomnia alone (or comorbidity now managed); <b>any patient \u226565</b> on a BZRA regardless of duration; patients <b>18\u201364 on it &gt;4 weeks</b>. Expected gains: better alertness, cognition, fewer falls."},
          {t:"Treat cause, don't just stop", html:"<b>Unmanaged anxiety/depression/panic</b>, or a physical/mental condition driving insomnia \u2014 optimise that first (e.g. SSRI + psychological therapy for an anxiety disorder)."},
          {t:"Different problem", html:"Restless legs, OSA or another sleep disorder masquerading as insomnia \u2192 manage that, not a hypnotic."},
          {t:"Out of scope", html:"Benzodiazepine genuinely effective for a specific anxiety disorder, alcohol withdrawal, epilepsy, spasticity, palliative/end-of-life, procedural sedation \u2014 different rules apply."}
        ]},
        {b:"warn", html:"Use a patient decision aid (\u2018Should I stop my benzodiazepine or z-drug?\u2019). Engagement, not coercion: if the patient declines after a full discussion, give information and review again in 3\u20136 months."}
      ]},

    {t:"node", d:"drug", n:"5", tag:"Step 3 \u00b7 the taper", title:"Convert, then reduce slowly with the patient",
      blocks:[
        {b:"p", html:"Tapering is the core skill. For a smoother withdrawal, consider <b>converting a short-acting agent to an equivalent dose of long-acting diazepam</b>, then reduce stepwise. (Switching is optional \u2014 there's no firm evidence it beats simply tapering the original drug, but the long half-life avoids inter-dose withdrawal.)"},
        {b:"table", head:["Drug","\u2248 Diazepam 5mg equivalent"], rows:[
          ["Diazepam","5mg"],
          ["Temazepam","10mg"],
          ["Lorazepam","0.5mg"],
          ["Nitrazepam","5mg"],
          ["Zopiclone","7.5mg"],
          ["Zolpidem","10mg"]
        ]},
        {b:"ladder", steps:[
          {step:"4a", title:"Agree the schedule with the patient", when:"plan together",
           html:"Patient controls the pace. Typical: <b>reduce ~25% of the dose every 2 weeks</b>. Start smaller (e.g. 10\u201312.5%, or monthly) if anxious \u2014 confidence matters more than speed."},
          {step:"4b", title:"Go slower near the end", when:"approaching low doses",
           fromLabel:"early steps tolerated",
           html:"Reduce to <b>~12.5% steps near the end</b>, consider planned drug-free days, and switch to lorazepam/oxazepam for final small steps if tablet strengths don't allow a 25% cut."},
          {step:"4c", title:"Monitor every 1\u20132 weeks", when:"throughout",
           fromLabel:"tapering underway",
           html:"Review for withdrawal and relapse. Warn that <b>withdrawal (insomnia, anxiety, irritability, sweating, GI upset) is usually mild and lasts days to a few weeks</b>."},
          {step:"4d", title:"If symptoms relapse, hold \u2014 don't reverse", when:"setback",
           fromLabel:"withdrawal/relapse",
           html:"Maintain the current dose for 1\u20132 weeks until settled, then resume tapering at a slower rate. Keep going non-drug insomnia/anxiety strategies (CBT-I, behavioural)."}
        ]},
        {b:"warn", html:"<b>Never stop abruptly after prolonged use</b> \u2014 abrupt withdrawal can cause seizures, delirium and severe rebound anxiety/insomnia. Taper over <b>weeks to months</b>, scaled to how long they've been on it."}
      ]},

    {t:"node", d:"safety", n:"6", tag:"Step 4 \u00b7 safety", title:"Withdrawal, driving & co-prescribing",
      blocks:[
        {b:"table", head:["Issue","Detail","Action"], rows:[
          ["Withdrawal symptoms","Insomnia, anxiety, irritability, sweating, GI symptoms; rarely seizures if abrupt","Reassure (usually mild, self-limiting); slow taper; hold if needed"],
          ["Driving","Impair driving; covered by drug-driving law","Advise not to drive when starting/adjusting or if unfit; document"],
          ["Falls / cognition (elderly)","\u2191 falls, fractures, confusion, dementia association","Strong reason to deprescribe in older patients"],
          ["Dangerous combinations","Opioids, gabapentinoids, alcohol, sedating antihistamines","Avoid; if co-prescribed, prioritise deprescribing"],
          ["Sedating alternatives misused","Promethazine, sedating antidepressants","Not licensed for chronic insomnia \u2014 don't substitute one dependence for another"]
        ]},
        {b:"why", html:"The goal is not just \u2018off the drug\u2019 but better function: most patients report <strong>improved alertness and mood and fewer falls</strong> once tapered, often with no worsening of the original sleep/anxiety problem \u2014 which is the key message to share when engaging them."}
      ]},

    {t:"loop", icon:"\uD83D\uDD01", title:"Taper stalling? Re-run the checklist",
      arrow:"\u2026hold and slow, don't abandon",
      intro:"Most failed tapers are too fast, or an untreated underlying problem \u2014 not a need to stay on the drug forever.",
      checks:[
        {b:"1 \u00b7 Pace", html:"Reduce the step size (12.5% or less) and lengthen the interval; let the patient set the pace."},
        {b:"2 \u00b7 Underlying", html:"Untreated anxiety/depression/pain/RLS driving symptoms? Treat it."},
        {b:"3 \u00b7 Non-drug", html:"CBT-I / behavioural sleep strategies and relaxation in place?"},
        {b:"4 \u00b7 Form", html:"Tablet strengths limiting the cut? Switch to diazepam / lorazepam liquid for fine steps."},
        {b:"5 \u00b7 Support", html:"Single prescriber, regular review, decision aid, realistic expectations?"}
      ],
      back:"Complex dependence, high dose, or failed tapers despite optimisation \u2192 specialist support"},

      arrow:"complex or high-risk dependence",
      blocks:[
        {b:"tiles", v:"refer", items:[
          {t:"Talking Therapies / psychology", html:"CBT-I for chronic insomnia; psychological therapy for the underlying anxiety disorder (self-referral accepted in most areas)."},
          {t:"Substance-misuse service", html:"High-dose, illicit/multiple-source use, polydrug dependence, or diversion \u2192 specialist drug service for a structured withdrawal."},
          {t:"Mental health (CMHT)", html:"Severe or refractory anxiety/depression, or where the benzodiazepine is masking a significant psychiatric illness."},
          {t:"Specialist taper", html:"Failed community tapers, very long-term high-dose use, or significant withdrawal complications."}
        ]},
        {b:"say", html:"These work for a short time but the body gets used to them within a couple of weeks, after which they mostly just hold off withdrawal. We'll come off slowly, at a pace you control \u2014 most people sleep about the same but feel sharper, steadier on their feet and better in themselves once the dose is down."}
      ]}
  ]
