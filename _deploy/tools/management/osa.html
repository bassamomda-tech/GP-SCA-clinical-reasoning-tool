<title>Obstructive Sleep Apnoea — Protocol · Reasoning GP</title>

<body data-screen-label="OSA management card">
<div class="mg-wrap" id="mgRoot"></div>
<script src="../../assets/management-engine.js?v=3"></script>
<script>
MG.render({
  icon:"😴",
  title:"Obstructive Sleep Apnoea — The Complete Guide",
  stemTitle:"OSA made simple &mdash; screen the sleepy snorer, give the driving advice TODAY, refer for the study, support CPAP",
  stemSub:"One pathway: recognise and risk-stratify with Epworth + STOP-Bang, give the immediate DVLA/driving and safety advice that can't wait for the sleep clinic, refer for the diagnostic sleep study, make weight loss the treatment that runs through everything, support CPAP adherence as first-line for moderate\u2013severe disease, and treat the comorbidities OSA drives \u2014 resistant hypertension, AF, diabetes. NICE NG202 \u00b7 DVLA.",
  guideline:"NICE NG202 \u00b7 DVLA",
  glance:[
    {lbl:"Screen", val:"Epworth + STOP-Bang", sub:"the sleepy snorer"},
    {lbl:"Can't wait", val:"DVLA + driving advice", sub:"give it at first contact"},
    {lbl:"Diagnose", val:"Sleep study (AHI)", sub:"specialist-led"},
    {lbl:"1st-line", val:"CPAP", sub:"moderate\u2013severe / symptomatic"},
    {lbl:"Runs throughout", val:"Weight loss", sub:"even 5\u201310% helps"},
    {lbl:"Drives", val:"Resistant HTN \u00b7 AF", sub:"a treatable cause"}
  ],
  flow:[

    {t:"node", d:"found", n:"1", tag:"Step 1 · recognise", title:"Recognise OSA and stratify the risk",
      blocks:[
        {b:"kv", rows:[
          ["Suspect","Snoring + <b>witnessed apnoeas</b> + daytime sleepiness; also non-refreshing sleep, morning headache, nocturia, poor concentration, low mood, reduced libido"],
          ["Quantify sleepiness","<b>Epworth Sleepiness Scale</b> \u2014 >10 = excessive daytime sleepiness (and the number the sleep service + DVLA care about)"],
          ["Pre-test risk","<b>STOP-Bang</b> (Snore, Tired, Observed apnoea, Pressure/BP, BMI >35, Age >50, Neck >40cm, male \u2014 \u22653 intermediate, \u22655 high risk)"],
          ["Who to think of it in","<b>Resistant hypertension, AF, type 2 diabetes, obesity</b>, hypothyroidism, large collar size, retrognathia \u2014 OSA is a common, treatable driver of all of these"]
        ]},
        {b:"why", html:"OSA is common, massively under-diagnosed, and a modifiable cause of resistant hypertension, arrhythmia, road-traffic accidents and poor quality of life. The GP job is three things the sleep clinic can't do at first contact: <strong>identify it, give the immediate driving/safety advice, and refer for the study</strong> \u2014 diagnosis and CPAP titration are specialist-led, but the safety-netting can't wait for them."},
        {b:"warn", html:"<b>Obesity hypoventilation</b> \u2014 morning headache, cyanosis, daytime somnolence with low SpO\u2082/hypercapnia in a very obese patient \u2192 urgent assessment (\u00b1 ABG); risk of decompensated respiratory failure, not just simple OSA."}
      ]},

    {t:"node", d:"safety", n:"2", tag:"Step 2 · can't wait", title:"The driving + safety advice that can't wait for the clinic",
      blocks:[
        {b:"tiles", v:"safety", items:[
          {t:"🚗 DVLA", html:"Excessive sleepiness affecting (or likely to affect) driving → the patient <b>must not drive and must notify the DVLA</b>. Advise explicitly, document it. Group 2 (HGV/PSV) rules are stricter and time-critical — many can't work until controlled."},
          {t:"⚠️ Sleepy at the wheel", html:"\u201cIf you ever feel sleepy driving — stop, and don't drive again until you're treated and the sleepiness is controlled.\u201d The RTA risk is the acute danger."},
          {t:"🍺 Alcohol + sedatives", html:"Both worsen airway collapse and sleepiness — reduce evening alcohol; review benzodiazepines/opioids/Z-drugs (and don't add them)."},
          {t:"🫁 Red flag", html:"Obesity hypoventilation (morning headache + cyanosis + hypercapnia) → urgent, not routine, referral."}
        ]}
      ]},

    {t:"node", d:"life", n:"3", tag:"Step 3 · foundation", title:"Weight loss + lifestyle — the treatment under everything",
      blocks:[
        {b:"tiles", v:"life", items:[
          {t:"⚖️ Weight loss", html:"The single most effective intervention — even <b>5–10% loss</b> reduces severity; can be curative. Structured support ± GLP-1 / bariatric pathway if eligible. Runs alongside CPAP, not instead of it."},
          {t:"🍺 Alcohol", html:"Avoid, especially evenings — relaxes pharyngeal muscles and fragments sleep."},
          {t:"🚭 Smoking", html:"Cessation — reduces upper-airway inflammation (see smoking guide)."},
          {t:"🛌 Positional", html:"Where positional (supine-predominant) — side-sleeping aids / positional therapy help."},
          {t:"💊 Drug review", html:"Reduce sedatives, opioids, muscle relaxants where possible — they worsen it."},
          {t:"😴 Sleep hygiene", html:"Regular schedule, adequate opportunity — comorbid poor sleep amplifies the daytime impact."}
        ]}
      ]},

    {t:"node", d:"refer", n:"4", tag:"Step 4 · diagnose", title:"Refer for the sleep study — severity guides treatment",
      blocks:[
        {b:"kv", rows:[
          ["Routine sleep referral","Suspected OSA with daytime sleepiness or high STOP-Bang \u2192 sleep study (home oximetry / respiratory polygraphy / polysomnography) to confirm and grade"],
          ["Urgent referral","<b>Sleepy driver (especially vocational), suspected obesity-hypoventilation, or severe symptoms with unstable comorbidity</b>"],
          ["Severity (AHI, events/hour)","Mild 5\u201314 \u00b7 Moderate 15\u201330 \u00b7 Severe >30 \u2014 combined with symptom burden, this decides CPAP vs device vs conservative"]
        ]},
        {b:"why", html:"NG202 makes the diagnosis specialist-led via the sleep study \u2014 the apnoea-hypopnoea index plus symptoms determines whether CPAP, a mandibular device, or conservative measures are offered. Your referral quality (Epworth + STOP-Bang + comorbidities + driving status) is what gets the right patients seen fast."}
      ]},

    {t:"node", d:"drug", n:"5", tag:"Step 5 · treat", title:"CPAP first-line — devices and adjuncts (shared care)",
      blocks:[
        {b:"ladder", steps:[
          {step:"1st-line", title:"CPAP", when:"moderate\u2013severe, or symptomatic mild",
           html:"Continuous positive airway pressure \u2014 first-line for moderate\u2013severe OSAHS and symptomatic mild disease. Transforms sleepiness, lowers BP, improves QoL. <b>Adherence is everything (aim >4h/night):</b> mask fit, humidification, early troubleshooting \u2014 support it in primary care, re-refer if failing rather than letting it lapse."},
          {step:"Alternative", title:"Mandibular advancement device (MAD)", when:"mild\u2013moderate, or CPAP not tolerated",
           fromLabel:"CPAP declined / milder disease",
           html:"Custom mandibular advancement splint \u2014 option for mild\u2013moderate OSA or CPAP intolerance. Needs dental assessment (contraindicated with poor dentition/TMJ disease)."},
          {step:"Adjunct", title:"Weight management \u00b1 surgery", when:"throughout",
           fromLabel:"alongside device therapy",
           html:"Intensive weight management continues regardless; <b>bariatric surgery can be curative</b> in obesity-related OSA. ENT/maxillofacial surgery only in selected anatomical cases."}
        ]},
        {b:"warn", html:"OSA has <b>no first-line drug treatment</b> \u2014 CPAP and weight loss are the mainstays. Never treat the 'insomnia'/sleepiness with sedatives or hypnotics: they worsen airway collapse and the daytime somnolence."}
      ]},

    {t:"node", d:"monitor", n:"6", tag:"Step 6 · monitor", title:"Adherence + the comorbidities OSA drives",
      blocks:[
        {b:"table", head:["What","When","Action"], rows:[
          ["CPAP adherence + symptoms","Sleep-clinic follow-up + GP reviews","Reinforce use (>4h/night); troubleshoot mask/pressure; re-refer if failing \u2014 don't let it quietly lapse"],
          ["Blood pressure","Regularly","Treat resistant hypertension; effective CPAP improves BP \u2014 the two are linked"],
          ["Weight / BMI","Each review","Continue the programme; escalate (GLP-1/bariatric) if static"],
          ["Cardiometabolic","Annually","Screen/treat T2DM, AF, lipids, mood \u2014 the comorbidity cluster OSA travels with"],
          ["Driving status","Each review until controlled","Confirm not driving while sleepy; DVLA notified; Group 2 fitness"]
        ]},
        {b:"say", html:"Sleep apnoea is very treatable. The sleep test tells us how severe it is, and a mask at night usually transforms the daytime tiredness \u2014 alongside weight loss and cutting evening alcohol. Until it's controlled, please don't drive if you feel sleepy, and let the DVLA know; it's the law and it protects you."}
      ]},

    {t:"loop", icon:"🔁", title:"Still sleepy / not improving? Work through this",
      arrow:"\u2026sleepiness has more than one cause",
      checks:[
        {b:"1 · CPAP actually used?", html:"Adherence >4h/night? Mask fit, pressure, humidification, nasal congestion sorted? Re-refer for troubleshooting rather than abandon."},
        {b:"2 · Weight trend", html:"Losing weight, or static? Escalate to GLP-1/bariatric pathway if eligible."},
        {b:"3 · Alcohol / sedatives", html:"Evening alcohol, benzos, opioids still on board undermining it?"},
        {b:"4 · Another cause of sleepiness", html:"Depression, hypothyroidism, anaemia, shift work, poor sleep opportunity, narcolepsy — sleepiness isn't always residual OSA."},
        {b:"5 · Under-treated comorbidity", html:"Resistant hypertension/AF persisting → is the OSA genuinely controlled? Recheck with the sleep service."},
        {b:"6 · Wrong device/severity", html:"MAD insufficient for severe disease, or severity re-graded → back to the sleep clinic."}
      ],
      back:"Adherence + weight + comorbidity optimised → sleep service re-review"},

    {t:"node", d:"safety", n:"7", tag:"Safety-net", title:"What the patient must know",
      blocks:[
        {b:"tiles", v:"safety", items:[
          {t:"🚗 Driving", html:"\u201cDon't drive when you feel sleepy, and tell the DVLA \u2014 especially if you drive for a living; you may need to be treated first.\u201d"},
          {t:"🍺 Evenings", html:"\u201cAlcohol and sleeping tablets in the evening make it worse \u2014 best avoided.\u201d"},
          {t:"😷 Keep the mask on", html:"\u201cCPAP only works on the nights you use it \u2014 if the mask is uncomfortable, tell us and we'll fix it rather than you giving up.\u201d"},
          {t:"🫁 Red flag", html:"\u201cMorning headaches with blue lips or breathlessness \u2014 get seen promptly.\u201d"}
        ]}
      ]},

    {t:"node", d:"refer", n:"8", tag:"Refer", title:"Who to escalate, and where",
      blocks:[
        {b:"tiles", v:"refer", items:[
          {t:"Respiratory / sleep", html:"CPAP intolerance or failure, diagnostic uncertainty, COPD overlap (overlap syndrome), or suspected obesity hypoventilation."},
          {t:"ENT / maxillofacial", html:"Anatomical obstruction, MAD provision, selected surgical candidates."},
          {t:"Bariatric", html:"Obesity meeting NICE thresholds — surgery can resolve OSA."},
          {t:"Cardiology", html:"Resistant hypertension, AF, or heart failure linked to OSA."}
        ]},
        {b:"say", html:"I'm referring you for a sleep study to confirm it and grade how severe it is \u2014 then the sleep team set you up, usually with CPAP. Meanwhile the weight, the alcohol and the driving advice are the parts we start on today."}
      ]}
  ],
  foot:"Suspected/confirmed obstructive sleep apnoea in primary care \u2014 diagnosis and CPAP titration in secondary care. NICE NG202, SIGN 73, DVLA Assessing Fitness to Drive. Verify against current guidance before acting."
});
</script>
