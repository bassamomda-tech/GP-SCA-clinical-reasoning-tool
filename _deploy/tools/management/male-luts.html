<body data-screen-label="Male LUTS management card">

<script>
MG.render({
  icon:"🚹",
  title:"Male LUTS — The Complete Guide",
  stemTitle:"Male LUTS made simple &mdash; split voiding from storage, exclude the sinister, then treat by pattern",
  stemSub:"One pathway: characterise voiding vs storage (it decides the whole plan), do the work-up that catches cancer and retention, run conservative measures first, then treat by pattern with named doses \u2014 alpha-blocker \u00b1 5-ARI for obstruction, antimuscarinic/mirabegron for storage (only after excluding retention), desmopressin for nocturnal polyuria with sodium checks. NICE NG97 \u00b7 CKS.",
  guideline:"NICE NG97 \u00b7 CKS",
  glance:[
    {lbl:"Split", val:"Voiding vs storage", sub:"+ IPSS + 3-day chart"},
    {lbl:"Voiding (BPE)", val:"Tamsulosin 400mcg", sub:"works in days"},
    {lbl:"Prostate >30g / PSA >1.4", val:"Add 5-ARI", sub:"finasteride \u00b7 3\u20136mo"},
    {lbl:"Storage / OAB", val:"Antimuscarinic / mirabegron", sub:"exclude retention first"},
    {lbl:"5-ARI + PSA", val:"Double the value", sub:"halves measured PSA"},
    {lbl:"Red flags", val:"Retention \u00b7 haematuria", sub:"hard DRE \u00b7 \u2191PSA"}
  ],
  flow:[

    {t:"node", d:"found", n:"1", tag:"Step 1 · characterise", title:"Split voiding from storage — and work it up",
      blocks:[
        {b:"kv", rows:[
          ["Voiding (obstructive)","Hesitancy, weak/intermittent stream, straining, terminal dribble, incomplete emptying \u2014 usually benign prostatic enlargement (BPE)"],
          ["Storage (irritative)","Frequency, urgency, urgency incontinence, nocturia \u2014 overactive bladder (OAB); often coexists"],
          ["Assess","<b>IPSS + bother score</b>, <b>3-day frequency-volume chart</b> (separates nocturnal polyuria, polyuria and OAB), DRE (size, symmetry, nodules, hardness), abdomen for palpable bladder"],
          ["Tests","Urine dipstick (infection, haematuria, glucose), U&E/eGFR (obstructive uropathy), <b>PSA after counselling</b> (and before DRE, or defer 1 week \u2014 DRE can transiently raise it)"],
          ["Exclude / consider","UTI, chronic retention, prostate/bladder cancer, neurological cause (MS, cord), diabetes/diabetes insipidus, medications (diuretics, anticholinergics, opioids), obstructive sleep apnoea (nocturia)"]
        ]},
        {b:"why", html:"The voiding-vs-storage split steers everything: obstruction responds to alpha-blockers \u00b1 5-ARIs; storage/OAB needs bladder training and antimuscarinics/mirabegron. The 3-day chart is the highest-yield free test \u2014 it distinguishes true nocturnal polyuria (a fluid/timing or ADH problem) from prostatic nocturia, which are treated completely differently."},
        {b:"warn", html:"<b>Don't miss:</b> a <b>hard/craggy/asymmetrical prostate or nodule</b>, or an <b>age-specific raised PSA</b> \u2192 suspected prostate cancer pathway (NICE NG12). PSA age thresholds (CKS): <b>50\u201359 \u2265 3.0 \u00b7 60\u201369 \u2265 4.0 \u00b7 \u226570 \u2265 5.0</b> ng/mL (lower threshold 2.5\u20133.5 in the 40s if FHx/Black ethnicity). Visible haematuria \u2192 2WW urology. Palpable bladder + rising creatinine = chronic retention \u2192 urgent."}
      ]},

    {t:"node", d:"life", n:"2", tag:"Step 2 · conservative", title:"Conservative measures — first-line for mild/moderate",
      blocks:[
        {b:"tiles", v:"life", items:[
          {t:"💧 Fluid timing", html:"~1.5–2L/day but front-loaded; cut evening fluids, caffeine and alcohol (bladder irritants + diuretics) for nocturia/urgency."},
          {t:"🚽 Bladder training", html:"For storage/urgency — timed voiding + urge-suppression, gradually lengthening intervals. As effective as drugs for mild OAB."},
          {t:"🔁 Double voiding + urethral milking", html:"For incomplete emptying and post-micturition dribble."},
          {t:"💊 Review drugs", html:"Diuretic timing; anticholinergics/opioids worsen voiding; think about what's driving nocturnal polyuria."},
          {t:"⚖️ Lifestyle", html:"Treat constipation (shares pelvic space), weight, and any contributing condition; pelvic floor exercises for post-void dribble."},
          {t:"📋 Containment + review", html:"Pads/sheaths and reassurance while measures take effect; supervised waiting is legitimate for mild symptoms."}
        ]}
      ]},

    {t:"node", d:"drug", n:"3", tag:"Step 3 · treat by pattern", title:"Medication — named doses, keyed to the symptom type",
      blocks:[
        {b:"ladder", steps:[
          {step:"Voiding 1", title:"Alpha-blocker", when:"bothersome voiding / moderate-severe LUTS",
           html:"<b>Tamsulosin 400mcg OD</b> (or alfuzosin 10mg MR, doxazosin) \u2014 relaxes prostatic smooth muscle, works within days. Counsel: <b>postural hypotension</b> (first-dose, take at night), retrograde ejaculation, and <b>intra-operative floppy iris syndrome</b> \u2014 tell the ophthalmologist BEFORE cataract surgery (ideally start it after)."},
          {step:"Voiding 2", title:"Add a 5-alpha-reductase inhibitor", when:"prostate >30g (or PSA >1.4)",
           fromLabel:"enlarged prostate / high retention risk",
           html:"<b>Finasteride 5mg OD or dutasteride 500mcg OD</b> \u2014 shrinks the prostate over <b>3\u20136 months</b>, reduces acute retention + surgery risk. Combine with the alpha-blocker if both enlarged AND bothersome (single-pill <b>dutasteride/tamsulosin = Combodart</b>). Side effects: reduced libido, ED, ejaculatory dysfunction, gynaecomastia."},
          {step:"Storage", title:"Antimuscarinic or mirabegron", when:"storage/OAB persisting after bladder training",
           fromLabel:"retention + significant residual EXCLUDED first",
           html:"<b>Solifenacin 5mg OD, tolterodine 2mg BD, or oxybutynin</b> (avoid oxybutynin in the frail elderly \u2014 anticholinergic cognitive load). <b>Mirabegron 50mg OD</b> (\u03b23-agonist) if anticholinergic burden/side effects a concern \u2014 check BP (avoid if severe uncontrolled HTN). Can add to an alpha-blocker for mixed symptoms."},
          {step:"Nocturia", title:"Target nocturnal polyuria specifically", when:"chart confirms nocturnal polyuria",
           fromLabel:"fluid measures failed",
           html:"Fluid/evening measures first. <b>Desmopressin 50\u2013100mcg nocte</b> for troublesome nocturnal polyuria \u2014 <b>check Na\u207a at baseline, day 3 and day 7</b> (hyponatraemia); avoid >65y with cardiac/renal disease. Also treat the real driver if present (OSA, ankle oedema, evening diuretic, poorly controlled diabetes/HF)."}
        ]},
        {b:"warn", html:"<b>Two traps:</b> (1) <b>Exclude retention before any antimuscarinic</b> \u2014 they precipitate acute retention (post-void residual / palpable bladder). (2) <b>5-ARIs halve PSA</b> after ~6 months \u2014 <b>double the measured value</b> when interpreting, and a rising PSA on a 5-ARI is a red flag. Finasteride/dutasteride are teratogenic \u2014 women of childbearing potential must not handle crushed/broken tablets, and treated men shouldn't donate blood."}
      ]},

    {t:"node", d:"monitor", n:"4", tag:"Step 4 · review", title:"Monitoring — symptoms, PSA correction, renal",
      blocks:[
        {b:"table", head:["What","When","Action"], rows:[
          ["IPSS + bother + side effects","4\u20136 weeks after starting/changing","Titrate; combine voiding+storage agents for mixed symptoms; stop what isn't helping"],
          ["5-ARI effect","3\u20136 months","Shrinkage takes months \u2014 don't judge early; reassess symptoms + retention risk"],
          ["PSA","Per surveillance / symptoms","Interpret with the 5-ARI doubling correction; a genuine rise \u2192 reassess for cancer"],
          ["Renal function + residual","If chronic retention suspected","Rising creatinine / large residual (hydronephrosis) \u2192 urgent urology"],
          ["Na\u207a on desmopressin","Baseline, day 3, day 7, then periodically","<b>Stop if hyponatraemic</b>"]
        ]},
        {b:"say", html:"Most prostate-related urinary symptoms settle with simple measures and a tablet that relaxes the bladder outlet \u2014 that one works within days. If your prostate is enlarged we add a second tablet that shrinks it, but that one takes three to six months, so don't lose heart early. We'll keep an eye on your kidney bloods and PSA along the way."}
      ]},

    {t:"loop", icon:"🔁", title:"Not improving? Re-check before escalating",
      arrow:"\u2026confirm the pattern, exclude the sinister",
      checks:[
        {b:"1 · Retention", html:"Palpable bladder, large post-void residual, rising creatinine → chronic retention → urology (don't add an antimuscarinic)."},
        {b:"2 · Right target", html:"Voiding treated as voiding, storage as storage? Mixed picture needs both."},
        {b:"3 · Adequate trial", html:"Alpha-blocker given days–weeks? 5-ARI given 3–6 months? Dose/adherence?"},
        {b:"4 · Nocturia driver", html:"3-day chart re-read — nocturnal polyuria (fluids/OSA/oedema/desmopressin) vs prostatic?"},
        {b:"5 · Red flags", html:"Visible haematuria, hard/nodular DRE, rising PSA (corrected) → suspected-cancer pathway."},
        {b:"6 · Refer", html:"Refractory bothersome symptoms despite optimised therapy → urology (surgical options)."}
      ],
      back:"Retention + cancer excluded, therapy optimised → urology"},

    {t:"node", d:"safety", n:"5", tag:"Safety-net", title:"What the patient must know",
      blocks:[
        {b:"tiles", v:"safety", items:[
          {t:"🔴 Acute retention", html:"\u201cSuddenly unable to pass urine with a painful, full bladder \u2014 A&E straight away.\u201d"},
          {t:"🩸 Blood in urine", html:"\u201cVisible blood in the urine \u2014 always get it checked; it needs tests.\u201d"},
          {t:"😵 First-dose dizziness", html:"\u201cThe outlet-relaxing tablet can drop your blood pressure, especially the first dose \u2014 take it at night and stand up slowly.\u201d"},
          {t:"👁️ Eye surgery", html:"\u201cIf you're having cataract surgery, tell the eye surgeon you take tamsulosin \u2014 it affects the operation.\u201d"}
        ]}
      ]},

    {t:"node", d:"refer", n:"6", tag:"Refer", title:"Urology — who and how fast",
      blocks:[
        {b:"tiles", v:"refer", items:[
          {t:"Emergency", html:"Acute urinary retention → same-day catheterisation/assessment."},
          {t:"2WW suspected cancer", html:"Hard/nodular/asymmetric prostate, age-specific raised PSA, or visible haematuria → suspected-cancer pathway."},
          {t:"Chronic retention / renal", html:"Large residual, hydronephrosis, or impaired renal function → urgent urology."},
          {t:"Refractory", html:"Bothersome LUTS not controlled medically → surgical assessment (TURP, prostate artery embolisation, newer minimally-invasive options)."},
          {t:"Complex", html:"Suspected neurological cause, recurrent UTIs, bladder stones, or diagnostic uncertainty."}
        ]},
        {b:"say", html:"We've checked there's nothing more serious and given the tablets a fair go \u2014 if they're not doing enough, the urology team has procedures that physically relieve the blockage. I'll keep everything going while you wait."}
      ]}
  ],
  foot:"Male lower urinary tract symptoms \u2014 NICE NG97 (formerly CG97), NICE NG12 (suspected prostate cancer) and CKS. Verify doses and PSA age-thresholds against current BNF/CKS before prescribing."
});
</script>
