MG.render({"icon":"🦶","title":"Morton's Neuroma","guideline":"NICE CKS","stemTitle":"Morton's neuroma — footwear + offloading, injection, then surgery","stemSub":"Primary-care management of Morton’s neuroma — a benign perineural fibrosis causing forefoot pain; confirm clinically, treat with footwear/metatarsal support, escalate to corticosteroid injection and refer for refractory disease. NICE CKS · 2026.","glance":[{"lbl":"Hallmark","val":"Burning forefoot pain","sub":"+ toe tingling, 3rd/4th web"},{"lbl":"Sign","val":"Mulder’s click","sub":"on lateral squeeze"},{"lbl":"1st-line","val":"Wide footwear + metatarsal pad","sub":"offloading"},{"lbl":"2nd-line","val":"Corticosteroid injection","sub":"± USS-guided"},{"lbl":"Refractory","val":"Surgery / specialist","sub":"excision/decompression"},{"lbl":"Confirm","val":"Clinical ± USS","sub":""}],"flow":[{"t":"node","d":"found","n":"1","tag":"Foundation","title":"Diagnose","blocks":[{"b":"kv","rows":[["Typical","Burning/sharp pain in the forefoot radiating to the toes, with tingling/numbness, usually the <b>3rd/4th intermetatarsal space</b>; worse in tight/high-heeled shoes and on walking; relieved by removing shoe/massaging"],["Sign","Tenderness in the web space; <b>Mulder’s click</b> on mediolateral forefoot compression"],["Confirm","Clinical; USS (or MRI) if diagnostic doubt or before intervention"],["Differentials","Metatarsalgia, stress fracture, MTP synovitis/OA, Freiberg’s, tarsal tunnel"]]},{"b":"why","html":"Morton’s neuroma is a benign perineural fibrosis diagnosed clinically (web-space pain + Mulder’s click). Management is conservative first — footwear and offloading — escalating to injection and surgery, with imaging mainly to confirm before intervention."}]},{"t":"node","d":"life","n":"2","tag":"Treatment","title":"Conservative first","blocks":[{"b":"tiles","v":"life","items":[{"t":"👟 Footwear","html":"Wide, low-heeled, soft shoes with a roomy toe box; avoid tight/high-heeled footwear."},{"t":"🦶 Offloading","html":"Metatarsal dome/pad or orthotic to spread the metatarsal heads and offload the neuroma."},{"t":"📉 Activity","html":"Reduce aggravating high-impact/standing activity; weight management."},{"t":"💊 Analgesia","html":"Simple analgesia / topical NSAID for symptom relief."}]}]},{"t":"node","d":"drug","n":"3","tag":"Escalation","title":"Injection → surgery","blocks":[{"b":"ladder","steps":[{"step":"Step 1","title":"Footwear + metatarsal support","when":"first-line","html":"Optimise footwear and offloading for several weeks — many improve."},{"step":"Step 2","title":"Corticosteroid injection","when":"if conservative fails","fromLabel":"persistent symptoms","html":"Local corticosteroid (± USS-guided) into the web space gives medium-term relief in many; can be repeated; counsel re fat-pad atrophy/skin changes."},{"step":"Step 3","title":"Surgery / specialist","when":"refractory","fromLabel":"if injection fails","html":"Refer (podiatric surgery/orthopaedics) for neuroma excision or decompression; alternatives include radiofrequency/alcohol ablation in some centres."}]}]},{"t":"node","d":"follow","n":"4","tag":"Follow-up","title":"Review & escalation","blocks":[{"b":"timeline","items":[{"n":"1","when":"6–12 weeks","title":"Conservative trial","html":"Review response to <b>footwear change + metatarsal pad/orthosis</b> (wide, low-heeled shoes). Many improve with offloading."},{"n":"2","when":"If persistent","title":"Injection","html":"Persistent pain → <b>corticosteroid ± local anaesthetic injection</b> (USS-guided helpful); can be diagnostic and therapeutic."},{"n":"3","when":"Refractory","title":"Refer","html":"Ongoing disabling symptoms despite conservative measures + injection → refer for consideration of radiofrequency ablation or excision."}]},{"b":"say","html":"Start with roomier shoes and a small pad to take pressure off the nerve. If that's not enough we can try an injection, and surgery is reserved for stubborn cases."}]},{"t":"node","d":"safety","n":"5","tag":"Safety-net","title":"When to reconsider","blocks":[{"b":"tiles","v":"safety","items":[{"t":"🟠 Atypical features","html":"Night pain, swelling, systemic symptoms, or sensory loss → reconsider (stress fracture, MTP synovitis, inflammatory arthritis)."},{"t":"💬 Safety-net","html":"If the foot becomes swollen, hot, or painful at rest, or pins-and-needles spread up the foot, come back."}]}]},{"t":"node","d":"refer","n":"6","tag":"Refer","title":"Referral","blocks":[{"b":"tiles","v":"refer","items":[{"t":"Podiatry","html":"Orthoses/metatarsal support and footwear assessment."},{"t":"MSK / orthopaedics / podiatric surgery","html":"Refractory to conservative + injection — for surgical options."},{"t":"Imaging","html":"USS to confirm before injection/surgery or if diagnostic doubt."}]},{"b":"say","html":"This is a Morton’s neuroma — a thickened, irritated nerve between the toes giving that burning pain and tingling. It’s harmless. Start with roomy, low-heeled shoes and a small pad to take pressure off the area. If that’s not enough, a steroid injection often helps, and for stubborn cases there’s a minor operation."}]}],"foot":"Management of Morton’s neuroma in primary care — footwear/offloading first, then injection, then surgical referral. Verify against current NICE CKS Morton’s neuroma."});
