<script>
MG.render({
  icon:"🦴",
  title:"Osteoporosis — The Complete Guide",
  stemTitle:"Osteoporosis made simple &mdash; find the at-risk, FRAX \u2192 DXA, treat with the ritual, review at 5 years",
  stemSub:"One pathway: know who to assess (and who to treat WITHOUT waiting for a scan), run FRAX \u2192 NOGG \u2192 DXA in the right order, screen the secondary causes, start alendronate with the counselling ritual that decides whether it works, fix each side effect instead of abandoning bone protection, respect the denosumab never-just-stop rule, and make the 5-year holiday decision properly \u2014 with falls work running alongside throughout. NICE TA464 \u00b7 NOGG 2024 \u00b7 CKS.",
  guideline:"NOGG 2024 \u00b7 NICE TA464",
  glance:[
    {lbl:"Assess with", val:"FRAX / QFracture", sub:"F \u226565 \u00b7 M \u226575 \u00b7 risk factors"},
    {lbl:"Diagnosis", val:"T-score \u2264 \u22122.5", sub:"DXA hip/spine"},
    {lbl:"Treat without DXA", val:"Fragility # \u226575", sub:"or vertebral fracture"},
    {lbl:"Steroids", val:"\u22657.5mg \u22653mo", sub:"protect from day one"},
    {lbl:"First-line", val:"Alendronate 70mg wk", sub:"the ritual matters"},
    {lbl:"Review", val:"5 years", sub:"(3 for zoledronate) \u2192 holiday?"}
  ],
  flow:[

    {t:"node", d:"found", n:"1", tag:"Step 1 · find them", title:"Who to assess — and who to treat without waiting",
      blocks:[
        {b:"kv", rows:[
          ["Assess (FRAX or QFracture)","All women \u226565 / men \u226575; younger if: previous fragility fracture, steroids, falls, BMI <18.5, smoker, alcohol >14u, FHx hip fracture, early menopause (<45), RA/IBD/coeliac, T1DM, CKD, antiandrogens/aromatase inhibitors, antiepileptics, SSRIs/PPIs long-term"],
          ["<b>Treat WITHOUT waiting for DXA</b>","(1) <b>Fragility fracture at \u226575</b> \u2014 FRAX/DXA optional, start treatment. (2) <b>Vertebral fracture</b> (often incidental on imaging \u2014 act on it, don't file it). (3) <b>Starting \u22657.5mg prednisolone for \u22653 months</b> \u2192 co-prescribe bone protection from day one, don't scan first"],
          ["A fragility fracture is","Fracture from standing height or less: wrist (the classic early warning \u2014 refer every distal radius fracture 50+ to the fracture liaison pathway), hip, vertebral, humerus, pelvis"],
          ["Height loss / kyphosis",">4cm height loss or new thoracic kyphosis \u2192 lateral spine X-ray or VFA \u2014 two-thirds of vertebral fractures are silent"],
          ["The gap","Half of hip-fracture patients had an earlier fragility fracture nobody acted on. The wrist fracture IS the opportunity"]
        ]}
      ]},

    {t:"node", d:"found", n:"2", tag:"Step 2 · stratify", title:"FRAX → NOGG → DXA — in that order",
      blocks:[
        {b:"ladder", steps:[
          {step:"1st", title:"FRAX (without BMD)", when:"the 10-year fracture probability",
           html:"FRAX (40\u201390y) or QFracture (30\u201399, better for multimorbidity) \u2192 plots onto <b>NOGG bands</b>: low / intermediate / high / very high."},
          {step:"2nd", title:"Act by band", when:"NOGG 2024",
           fromLabel:"the fork",
           html:"<b>Low</b> \u2192 lifestyle + reassess in 5y (or on new risk). <b>Intermediate</b> \u2192 <b>DXA</b>, recalculate FRAX with BMD, treat if above threshold. <b>High</b> \u2192 treat (DXA useful as baseline but should not delay). <b>Very high</b> \u2192 treat + consider specialist referral for anabolic-first therapy."},
          {step:"3rd", title:"DXA interpretation", when:"T-scores",
           fromLabel:"lowest of hip / spine",
           html:"<b>T \u2264 \u22122.5 = osteoporosis</b> \u00b7 \u22121 to \u22122.5 = osteopenia (treat only if FRAX says so) \u00b7 \u2265 \u22121 normal. <b>Z-score \u2264 \u22122 in the young \u2192 hunt secondary causes hard + refer.</b>"}
        ]},
        {b:"kv", rows:[
          ["Secondary-cause screen (before/with treatment)","FBC, ESR, U&E, LFTs, bone profile (Ca/PO\u2084/ALP), TFTs, <b>vitamin D</b>, coeliac serology; <b>myeloma screen if >50 with vertebral fracture</b> (electrophoresis + light chains); testosterone/LH/FSH in men (hypogonadism drives ~20% of male osteoporosis); PTH if Ca abnormal; 24h urinary cortisol if cushingoid"],
          ["Why it matters","Treating coeliac-driven or myeloma-driven bone loss with alendronate alone misses the disease \u2014 and correcting vitamin D BEFORE zoledronate/denosumab prevents symptomatic hypocalcaemia"]
        ]}
      ]},

    {t:"node", d:"life", n:"3", tag:"Step 3 · foundations", title:"Falls work + calcium/D — the co-treatment, not the garnish",
      blocks:[
        {b:"tiles", v:"life", items:[
          {t:"🚶 Falls assessment", html:"Fractures need a fall AND fragile bone — treat both. Gait/balance (TUG test), meds review (sedatives, antihypertensives, anticholinergics), vision, footwear, home hazards → strength & balance programme (evidence: ~25% fall reduction)."},
          {t:"💪 Exercise", html:"Weight-bearing + resistance + balance (Tai Chi counts). Walking alone is not enough; swimming/cycling don't load bone."},
          {t:"🥛 Calcium", html:"Aim ~700\u20131200mg/day \u2014 <b>diet first</b> (calculator: 1 pint milk \u2248 700mg). Supplement only the dietary gap; combined Ca/D (e.g. Accrete D3, Adcal-D3) if intake poor."},
          {t:"☀️ Vitamin D", html:"800 IU colecalciferol daily for all on bone treatment (loading course first if deficient <25). Non-negotiable with zoledronate/denosumab."},
          {t:"🚭 Smoking + alcohol", html:"Both independent risks \u2014 cessation support; alcohol \u226414u."},
          {t:"⚖️ Weight", html:"BMI <18.5 is a major risk — address the cause (eating disorder? malabsorption? frailty?)."}
        ]}
      ]},

    {t:"node", d:"drug", n:"4", tag:"Step 4 · treat", title:"The ladder — and the ritual that decides if it works",
      blocks:[
        {b:"ladder", steps:[
          {step:"1st", title:"Alendronate 70mg once weekly", when:"first-line for almost everyone",
           html:"<b>The ritual (say it, write it, check it):</b> same morning weekly \u00b7 empty stomach \u00b7 whole tablet with a <b>full glass of plain tap water</b> \u00b7 stay <b>upright 30 minutes</b> \u00b7 nothing else (food, drink, other tablets, calcium) for 30 minutes. Done wrong = oesophagitis + near-zero absorption. Alternative: risedronate 35mg weekly (gentler on the oesophagus)."},
          {step:"2nd", title:"IV zoledronate 5mg once yearly", when:"oral not tolerated / contraindicated / adherence unrealistic",
           fromLabel:"oesophageal disease \u00b7 can't sit upright \u00b7 GI intolerance",
           html:"Given via day unit; flu-like reaction after first infusion in ~30% (warn + paracetamol; much less thereafter). Needs eGFR \u226535 and corrected Ca + vitamin D replete first. Also the post-hip-fracture drug of choice (HORIZON: mortality benefit)."},
          {step:"3rd", title:"Denosumab 60mg SC 6-monthly", when:"renal failure (eGFR <35) / both above unsuitable",
           fromLabel:"the one with the trap",
           html:"<b>THE RULE: never stop or delay denosumab without a plan.</b> Missed/stopped doses \u2192 rapid bone loss + <b>rebound vertebral fractures</b> within 7\u201318 months. Stopping requires a bisphosphonate follow-on (specialist-guided). Flag it on the record like an anticoagulant. Check Ca (hypocalcaemia risk, esp. CKD) + vitamin D replete before each dose."},
          {step:"4th", title:"Anabolic first for the very-high-risk", when:"specialist",
           fromLabel:"T \u2264 \u22123.5, multiple vertebral #s, fracture ON treatment",
           html:"<b>Romosozumab</b> (12 months \u2014 avoid if MI/stroke history) or <b>teriparatide</b> (18\u201324 months) \u2014 build bone first, THEN antiresorptive to lock it in. Building-then-locking beats locking alone in the very-high-risk (ARCH/VERO) \u2014 hence early referral, not after three failed oral years. HRT is the option of choice in early menopause / <60 with symptoms; raloxifene niche."}
        ]},
        {b:"table", head:["Problem","Looks like","Fix — keep bone protection alive"], rows:[
          ["Reflux / oesophagitis","Heartburn, dysphagia on alendronate","Check the ritual first (usually the cause) \u2192 switch risedronate \u2192 IV zoledronate. <b>New dysphagia = stop + investigate (2WW thinking), not just switch</b>"],
          ["ONJ fear (media-driven)","Patient refuses treatment","Absolute risk on oral bisphosphonates \u2248 1 in 10,000\u2013100,000 \u2014 dental check-up + good hygiene sensible before starting; invasive dental work ideally before IV agents. The fracture they're risking is ~1 in 3\u201310"],
          ["Atypical femoral fracture","New thigh/groin ache on long-term treatment","X-ray BOTH femurs; if confirmed \u2192 stop + orthopaedics + endocrine. Risk rises after 5y \u2014 this is WHY the holiday review exists. Absolute risk tiny vs fractures prevented"],
          ["Flu-like reaction","48h post first zoledronate","Pre-warn + paracetamol; settles; much milder subsequent years"],
          ["Hypocalcaemia","Cramps/tingling after denosumab/zoledronate","Prevented by checking Ca + loading vitamin D FIRST \u2014 the pre-dose check is not optional"],
          ["'It's not doing anything'","No felt benefit \u2192 quiet non-adherence (~50% by 1 year)","Name the silence upfront: 'you won't feel it working \u2014 the win is the fracture that never happens.' Ask at every review; switch to IV/6-monthly if realistic adherence is the issue"]
        ]}
      ]},

    {t:"node", d:"monitor", n:"5", tag:"Step 5 · review", title:"The rhythm — and the 5-year holiday decision",
      blocks:[
        {b:"table", head:["What","When","Action"], rows:[
          ["Adherence + ritual + side effects","3\u20136 months after starting, then annually","The 1-year quit rate is ~50% \u2014 this review is the treatment"],
          ["Ca / vit D / renal","Annually (and before every IV/SC dose)","Replace, re-dose, re-gate (zoledronate eGFR \u226535)"],
          ["Height + back pain","Annually","New >2cm loss or thoracic pain \u2192 spine imaging (new vertebral # = treatment failure \u2192 escalate)"],
          ["<b>The 5-year review</b> (3 for zoledronate)","At 5 years of oral bisphosphonate","<b>Holiday if ALL of:</b> no fragility # on treatment \u00b7 hip T > \u22122.5 \u00b7 not high-risk (no steroids, no previous hip/vertebral #). <b>Continue to 10y (oral) / 6y (IV) if:</b> fracture on treatment, T \u2264 \u22122.5 still, age \u226575, steroids, previous hip/vertebral #"],
          ["During a holiday","Reassess FRAX + DXA at <b>2 years</b> (bisphosphonates linger in bone \u2014 protection persists)","New fracture or significant BMD fall \u2192 restart. <b>No holidays from denosumab \u2014 ever</b> (rebound) \u2014 its 'stop' is a specialist-planned switch"],
          ["Repeat DXA on treatment","Not routinely \u2014 only if the result changes the decision","(e.g. the 5-year review, or suspected failure)"]
        ]},
        {b:"say", html:"This tablet is like a pension payment \u2014 you'll never feel it working, but it roughly halves the chance of breaking your hip or spine, and the weekly ritual with the water and staying upright is genuinely what makes it work and keeps it safe. We'll look at it all again properly at five years \u2014 many people then earn a pause."}
      ]},

    {t:"loop", icon:"🔁", title:"Fracture ON treatment? Check before calling it failure",
      arrow:"\u2026most 'failure' is absorption, adherence, or a missed cause",
      checks:[
        {b:"1 · Actually taken?", html:"Weekly, with the full ritual? Pharmacy refill history? (~50% have quietly stopped by year 1.)"},
        {b:"2 · Absorbed?", html:"Taken with breakfast/coffee/calcium = near-zero absorption. Coeliac screen done?"},
        {b:"3 · Vitamin D + calcium replete?", html:"Treating osteomalacia with a bisphosphonate helps nobody — recheck 25-OH-D."},
        {b:"4 · Secondary cause missed?", html:"Myeloma (re-screen if new vertebral #), hyperparathyroidism, hypogonadism, cortisol, new steroid courses."},
        {b:"5 · The fall side?", html:"Falls programme actually attended? New sedatives? Vision checked?"},
        {b:"6 · True failure", html:"\u22652 fragility #s on verified treatment, or fracture + falling BMD → specialist for anabolic-first (romosozumab/teriparatide)."}
      ],
      back:"Verified adherence + causes excluded → escalate, don't repeat"},

    {t:"node", d:"safety", n:"6", tag:"Safety-net", title:"What the patient must know",
      blocks:[
        {b:"tiles", v:"safety", items:[
          {t:"💊 The ritual", html:"\u201cEmpty stomach, full glass of plain water, stay upright half an hour, nothing else in that window \u2014 done differently it can burn the food-pipe and won't absorb.\u201d"},
          {t:"🦵 Thigh ache", html:"\u201cA new dull ache in the thigh or groin that won't settle \u2014 tell us; we X-ray it. Don't just push through.\u201d"},
          {t:"🦷 Dental", html:"\u201cKeep up dental check-ups and tell your dentist you're on a bone medicine \u2014 the jaw problem people read about is extremely rare, and preventable.\u201d"},
          {t:"💉 Denosumab diary", html:"\u201cYour injection is due every 6 months TO THE WEEK \u2014 a late dose loses the protection quickly. If a dose is ever going to be missed, ring us first.\u201d"},
          {t:"🍽️ Swallowing", html:"\u201cFood sticking or pain on swallowing on the weekly tablet \u2014 stop it and come in.\u201d"}
        ]}
      ]},

    {t:"node", d:"refer", n:"7", tag:"Refer", title:"Who needs the osteoporosis / metabolic bone clinic",
      blocks:[
        {b:"tiles", v:"refer", items:[
          {t:"Very high risk", html:"T ≤ −3.5, multiple vertebral fractures, fracture on treatment → anabolic-first assessment (romosozumab/teriparatide)."},
          {t:"Young / unexplained", html:"Osteoporosis <50, Z-score ≤ −2, men without an obvious cause → secondary-cause work-up with endocrine."},
          {t:"Denosumab exits", html:"Any planned stop/switch of denosumab → specialist-guided bisphosphonate follow-on."},
          {t:"Complex", html:"eGFR <30\u201335 (renal bone disease vs osteoporosis — get advice before bisphosphonates), atypical femoral fracture, ONJ, pregnancy-associated osteoporosis."},
          {t:"Fracture liaison", html:"Every fragility fracture 50+ should flow through the FLS pathway — if your area has one, use it; if not, YOU are the FLS."}
        ]},
        {b:"say", html:"Your bones have broken despite treatment we've verified you're taking properly \u2014 that puts you in the group that does better with the bone-BUILDING injections first, and that's a specialist decision, so I'm referring you. Everything else \u2014 the calcium, vitamin D and balance work \u2014 carries on exactly as now."}
      ]}
  ],
  foot:"Osteoporosis and fragility-fracture prevention in adults \u2014 NOGG 2024, NICE TA464/TA791 (romosozumab) and CKS. Verify doses against the current BNF before prescribing."
});
</script>
