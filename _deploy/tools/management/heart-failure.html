<script>
MG.render({
  icon:"🫀",
  title:"Heart Failure — The Complete Guide",
  stemTitle:"Heart failure made simple &mdash; diagnose by BNP clock, build the four pillars, titrate past the obstacles",
  stemSub:"One pathway: use NT-proBNP to set the echo clock, split the phenotype (it changes everything), get all four pillars on board low-dose then titrate to target, fix each titration obstacle instead of stopping, separate the diuretic in your head, run the review + iron checks, manage decompensation in the community, and know when it's time for palliative parallel planning. NICE NG106 \u00b7 ESC.",
  guideline:"NICE NG106 \u00b7 ESC 2023",
  glance:[
    {lbl:"NT-proBNP >2000", val:"2-week echo", sub:"400\u20132000: 6 weeks"},
    {lbl:"Phenotype", val:"EF <40 / 41\u201349 / \u226550", sub:"HFrEF \u00b7 HFmrEF \u00b7 HFpEF"},
    {lbl:"HFrEF core", val:"4 pillars", sub:"all on board low-dose first"},
    {lbl:"Titrate", val:"2\u20134 weekly", sub:"U&E 1\u20132wk after RAAS/MRA"},
    {lbl:"HFpEF core", val:"SGLT2i + diuretic", sub:"+ treat the comorbidities"},
    {lbl:"Decompensating", val:"Weight +2kg/3d", sub:"double loop \u00b7 review 48h"}
  ],
  flow:[

    {t:"node", d:"found", n:"1", tag:"Step 1 · diagnose", title:"The BNP clock, the echo, and the phenotype split",
      blocks:[
        {b:"table", head:["NT-proBNP","Meaning","Action (NG106)"], rows:[
          ["<b>>2000 ng/L</b>","High risk \u2014 worse prognosis","<b>Specialist assessment + echo within 2 WEEKS</b>"],
          ["400\u20132000 ng/L","Possible HF","Specialist assessment + echo within <b>6 weeks</b>"],
          ["<400 ng/L","HF unlikely","Look elsewhere \u2014 but beware the false-lowerers below"]
        ]},
        {b:"kv", rows:[
          ["BNP false-LOW","<b>Obesity</b>, diuretics/ACEi/BB already on board \u2014 a 'normal' BNP in a breathless obese patient does NOT exclude HF"],
          ["BNP false-HIGH","Age, AF, CKD (eGFR <60), LVH, sepsis, PE, COPD/cor pulmonale \u2014 interpret against the whole picture"],
          ["The phenotype split","<b>HFrEF (LVEF \u226440%)</b> \u2192 the four pillars, full evidence base. <b>HFmrEF (41\u201349%)</b> \u2192 treat like HFrEF (weaker but consistent evidence). <b>HFpEF (\u226550%)</b> \u2192 SGLT2i + diuretic + hunt the comorbidities (Step 5)"],
          ["Baseline work-up","ECG (AF? old MI? LBBB \u2014 CRT relevance), CXR, U&E, FBC, LFT, TFT, HbA1c, lipids, <b>ferritin + TSAT</b> (iron deficiency in ~50%), urinalysis; spirometry if COPD overlap suspected"],
          ["Find the cause","IHD (commonest \u2014 needs angiography discussion), hypertension, valve disease (murmur \u2192 echo priority), AF, alcohol, chemo history, FHx cardiomyopathy (<b>refer young/familial separately</b>)"]
        ]},
        {b:"warn", html:"New suspected HF with <b>acute breathlessness at rest, oedema up the legs, or SpO\u2082 down</b> = decompensated \u2014 same-day admission, not a 6-week echo. And NYHA-grade every patient at every contact: I none \u00b7 II on exertion \u00b7 III minimal exertion \u00b7 IV at rest."}
      ]},

    {t:"node", d:"life", n:"2", tag:"Step 2 · foundations", title:"Self-management — the admission-preventers",
      blocks:[
        {b:"tiles", v:"life", items:[
          {t:"⚖️ Daily weights", html:"Same scales, same time, after voiding. <b>+2kg over 3 days = ring the practice/HF nurse</b> — the earliest decompensation signal, days before breathlessness."},
          {t:"🏃 Cardiac rehab", html:"Refer everyone stable — improves symptoms, capacity and admissions as much as a drug. Sell it accordingly."},
          {t:"🧂 Salt, fluid, alcohol", html:"No added salt; fluid restriction only if advised (severe HF/hyponatraemia); alcohol minimal — zero if alcohol cardiomyopathy."},
          {t:"🚫 The saboteurs", html:"<b>NSAIDs (incl. OTC), pioglitazone, verapamil/diltiazem</b>, flecainide in structural disease; caution pregabalin (oedema), corticosteroids (fluid)."},
          {t:"💉 Vaccines", html:"Flu yearly, pneumococcal once, COVID per schedule."},
          {t:"🧠 Mood + plan", html:"Depression is common and kills adherence — screen. Written HF plan: who to call, weight rules, sick-day rules."}
        ]}
      ]},

    {t:"node", d:"drug", n:"3", tag:"Step 3 · four pillars", title:"HFrEF: all four on board, then titrate to target",
      blocks:[
        {b:"p", html:"<strong>Philosophy shift:</strong> get all four classes started at low dose within weeks (each cuts mortality independently, benefits start in days), THEN up-titrate each toward target every 2\u20134 weeks as BP, HR and kidneys allow. Breadth before depth \u2014 four drugs at half-dose beat two at target."},
        {b:"ladder", steps:[
          {step:"Pillar 1", title:"ACEi (ARB if cough) — or ARNI from the start via HF team", when:"day one",
           html:"<b>Ramipril 1.25\u20132.5mg \u2192 target 10mg</b> (or candesartan 4\u20138 \u2192 32mg). U&E + K\u207a 1\u20132 weeks after every step. Creatinine rise \u226430% / eGFR fall \u226425% = acceptable \u2014 recheck, don't stop. <b>ARNI (sacubitril/valsartan 24/26\u201349/51mg BD \u2192 97/103mg BD)</b> is replacing ACEi ever earlier \u2014 specialist-initiated; <b>36h ACEi washout</b> (angioedema)."},
          {step:"Pillar 2", title:"HF-licensed beta-blocker", when:"stable, not congested",
           fromLabel:"start alongside, titrate alternately",
           html:"<b>Bisoprolol 1.25 \u2192 10mg</b> / carvedilol 3.125 BD \u2192 25\u201350 BD / nebivolol (elderly). Double no faster than 2-weekly. Warn: 'you may feel more tired for the first fortnight \u2014 that's the drug working, it passes.' <b>Continue through decompensation</b> unless shocked/bradycardic \u2014 stopping doubles risk."},
          {step:"Pillar 3", title:"MRA", when:"EF \u226435% or still symptomatic",
           fromLabel:"the forgotten pillar \u2014 don't skip it",
           html:"<b>Spironolactone 25 \u2192 50mg</b> (eplerenone 25 \u2192 50mg if gynaecomastia/post-MI). K\u207a + U&E at 1, 4, 8, 12 weeks then 4-monthly. Hold if K\u207a >5.5; do NOT combine with routine K\u207a supplements."},
          {step:"Pillar 4", title:"SGLT2 inhibitor", when:"everyone, diabetic or not",
           fromLabel:"no titration \u2014 the easy pillar",
           html:"<b>Dapagliflozin 10mg or empagliflozin 10mg OD.</b> Works in days; also the ONLY pillar with hard evidence in HFpEF. Expect a small early creatinine dip \u2014 don't stop. Sick-day pause; genital hygiene counselling."}
        ]},
        {b:"table", head:["Titration obstacle","Looks like","Fix — don't just stop the pillar"], rows:[
          ["Symptomatic hypotension","Dizzy, BP <90\u2013100 systolic","Stagger dosing times; <b>reduce the DIURETIC first</b> if euvolaemic (commonest fix); drop nitrates/alpha-blockers/CCBs before touching pillars; asymptomatic low BP needs NO action"],
          ["Bradycardia","HR <50 on BB","ECG (block?); stop rate-limiting non-essentials (digoxin? diltiazem?); reduce BB last \u2014 if sinus \u226575 despite max BB \u2192 ivabradine (specialist)"],
          ["K\u207a 5.5\u20135.9","On ACEi + MRA","Diet advice, stop K\u207a-raisers (trimethoprim, NSAIDs, salt substitutes), recheck 1 week; persistent \u2192 halve MRA; \u22656.0 \u2192 hold MRA + urgent recheck/ECG. Patiromer/SZC via HF team can KEEP the pillars on board"],
          ["Creatinine climbing","eGFR falling on titration","Rise \u226430% acceptable; >30% \u2192 halve the last change, exclude dehydration/NSAID, recheck 1\u20132 weeks; CKD is a reason for SLOWER titration, not no titration"],
          ["'Feels worse' on BB","Fatigue weeks 1\u20132","Expected and transient \u2014 pre-warned patients persist; don't abandon"]
        ]},
        {b:"warn", html:"<b>The diuretic is not a pillar.</b> Furosemide 20\u201340mg (bumetanide 1mg \u2248 40mg furosemide) treats congestion \u2014 symptoms only, no survival benefit. Keep it mentally separate: titrate pillars UP for prognosis, titrate diuretic to the lowest dose that keeps them decongested (flexible self-adjustment plan for capable patients). Never ACEi + ARB + MRA together."}
      ]},

    {t:"node", d:"drug", n:"4", tag:"Step 4 · beyond", title:"Still symptomatic on four pillars — what the HF team adds",
      blocks:[
        {b:"kv", rows:[
          ["ARNI switch","ACEi/ARB \u2192 sacubitril/valsartan if still symptomatic + EF \u226435% (36h washout from ACEi)"],
          ["Ivabradine","Sinus rhythm \u226575 bpm on maximum tolerated BB, EF \u226435%"],
          ["IV iron","Symptomatic + ferritin <100 (or TSAT <20%): IV ferric carboxymaltose improves symptoms and admissions \u2014 <b>oral iron does NOT work in HF</b>; flag iron studies at every annual review"],
          ["Devices","LBBB + QRS \u2265130ms \u2192 CRT; EF \u226435% despite 3 months optimal therapy \u2192 ICD discussion (ischaemic aetiology especially)"],
          ["Digoxin","Symptom add-on, especially AF + HF; also hydralazine/nitrate (Afro-Caribbean patients or renal intolerance of RAAS)"],
          ["AF + HF","Rate control with the BB (not verapamil/diltiazem); anticoagulate by CHA\u2082DS\u2082-VASc (see DOAC guide); consider rhythm strategy early \u2014 AF-driven cardiomyopathy is reversible"]
        ]}
      ]},

    {t:"node", d:"drug", n:"5", tag:"HFpEF", title:"HFpEF — a different disease, a different plan",
      blocks:[
        {b:"kv", rows:[
          ["What works","<b>SGLT2i (dapagliflozin/empagliflozin)</b> \u2014 the only class with trial-proven benefit (EMPEROR-Preserved/DELIVER); loop diuretic for congestion; that's the drug list"],
          ["What doesn't","ACEi/BB/MRA have NO mortality evidence in true HFpEF \u2014 they stay only if another indication (hypertension, AF rate, post-MI)"],
          ["The real work","Treat what's driving it: <b>hypertension to target, AF, obesity (weight loss genuinely improves HFpEF), diabetes, OSA screen, CKD</b>"],
          ["Think amyloid","Elderly + LVH + carpal tunnel history \u00b1 low-voltage ECG \u2192 cardiology (treatable now \u2014 tafamidis)"]
        ]},
        {b:"why", html:"HFpEF is stiff-heart disease driven by metabolic and vascular comorbidity \u2014 which is why the comorbidity list IS the treatment list, and why the GP (who owns the BP, the weight, the diabetes) matters more than any referral."}
      ]},

    {t:"node", d:"monitor", n:"6", tag:"Step 5 · review", title:"Monitoring rhythm + community decompensation",
      blocks:[
        {b:"table", head:["What","When","Action"], rows:[
          ["U&E + K\u207a","1\u20132 wks after every RAAS/MRA change; MRA 1-4-8-12 wks; then 6-monthly stable","Thresholds per the obstacle table"],
          ["Weight + NYHA + BP/HR","Every contact","Trend beats snapshot"],
          ["Ferritin/TSAT + FBC + HbA1c","Annually","Iron deficiency \u2192 IV iron referral"],
          ["Structured review","6-monthly (HF nurse ideal)","Pillars at target? Adherence? Rehab done? Devices discussed? Advance care conversation started?"],
          ["<b>Decompensating in the community</b>","Weight \u2191, orthopnoea, oedema \u2014 but walking, talking, SpO\u2082 OK","<b>Double the loop diuretic for 3\u20137 days</b> (or furosemide 40\u219280), U&E in 3\u20135 days, review 48h; keep the BB going; involve the HF nurse same week. No response / worse \u2192 admit"],
          ["Admit","Breathless at rest, SpO\u2082 <92%, new confusion, SBP <90, K\u207a \u22656.0, AKI","Same day"]
        ]},
        {b:"say", html:"You have four different tablets because each one protects the heart in a different way \u2014 together they roughly halve the risk. The water tablet is different: that one just controls the fluid, and you'll learn to adjust it yourself using the scales. The single most useful thing you can do is weigh yourself every morning."}
      ]},

    {t:"loop", icon:"🔁", title:"Still symptomatic? Check before calling it refractory",
      arrow:"\u2026optimise before escalating",
      intro:"Most 'refractory' HF is under-titration, congestion, iron, or an untreated driver.",
      checks:[
        {b:"1 · Pillars at target?", html:"All four ON and titrated to target/max-tolerated — not just started? (The commonest gap in UK primary care.)"},
        {b:"2 · Actually dry?", html:"JVP, oedema, weight trend — hidden congestion is the commonest cause of persistent breathlessness."},
        {b:"3 · Iron checked?", html:"Ferritin <100 or TSAT <20% → IV iron. Checked this year?"},
        {b:"4 · A driver untreated?", html:"AF rate/rhythm, ischaemia (angina? → angiography discussion), valve disease progressing, thyroid, anaemia, NSAID creep, alcohol."},
        {b:"5 · The lungs?", html:"COPD overlap, PE, effusion — not all breathlessness is the heart."},
        {b:"6 · Right phenotype?", html:"Repeat echo if trajectory changed — EF recovers (stand down nothing without advice) or falls (devices territory)."}
      ],
      back:"All optimised → HF team: ARNI / ivabradine / devices / advanced therapies"},

    {t:"node", d:"safety", n:"7", tag:"Safety-net", title:"What the patient must know",
      blocks:[
        {b:"tiles", v:"safety", items:[
          {t:"⚖️ The 2kg rule", html:"\u201cUp 2kg in 3 days → ring us or the heart-failure nurse — don't wait for breathlessness.\u201d"},
          {t:"🔴 Same day", html:"\u201cBreathless at rest or lying flat, waking gasping, new confusion — same-day call; chest pain or fainting — 999.\u201d"},
          {t:"🤢 Sick-day rules", html:"\u201cVomiting/diarrhoea → pause the water tablet, ACE inhibitor and 'flozin' for 48h, keep drinking, ring us if unsure.\u201d"},
          {t:"💊 Painkillers", html:"\u201cNo ibuprofen-type drugs — they undo the water tablet and strain the kidneys. Paracetamol is fine.\u201d"}
        ]}
      ]},

    {t:"node", d:"refer", n:"8", tag:"Refer", title:"HF team, cardiology — and the palliative conversation",
      blocks:[
        {b:"tiles", v:"refer", items:[
          {t:"Every new diagnosis", html:"Specialist confirmation + pillar plan (2wk if NT-proBNP >2000); community HF nurse from day one."},
          {t:"Escalation", html:"Symptomatic on optimal four pillars → ARNI/ivabradine/digoxin; EF ≤35% at 3 months → device discussion; QRS ≥130 + LBBB → CRT."},
          {t:"Cause needs fixing", html:"Ischaemia → angiography; significant valve disease → intervention MDT; suspected amyloid/familial cardiomyopathy → specialist clinic (+ family screening)."},
          {t:"Recurrent admissions", html:"≥2 in 6 months despite optimisation → advanced HF assessment — and trigger the parallel palliative conversation."},
          {t:"Palliative parallel planning", html:"NYHA IV despite everything, cachexia, hypotension limiting all titration → anticipatory care plan, deactivate-the-ICD discussion, opioids for breathlessness, hospice support — alongside, not instead of, HF care."}
        ]},
        {b:"say", html:"I want the heart-failure team involved — not because you're at the end of the road, but because the next treatments (a newer tablet, possibly a special pacemaker) are theirs to start. We keep doing the day-to-day together — and the weighing scales remain your best early-warning system."}
      ]}
  ],
  foot:"Heart failure in adults \u2014 NICE NG106 with ESC 2023 concepts (phenotype split, four-pillar early initiation). Verify doses against the current BNF before prescribing."
});
