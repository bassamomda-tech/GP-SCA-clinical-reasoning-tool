  stemSub:"A practical protocol for the dying phase: recognise dying and communicate, stop non-essential medicines, prescribe the four \u2018just-in-case\u2019 subcutaneous drugs (pain, agitation, secretions, nausea), convert background opioids to a syringe pump, and individualise hydration \u2014 following the five priorities of care. GMEC Palliative Care 2025 / Priorities for Care of the Dying Person.",

  flow:[
    {t:"node", d:"found", n:"1", tag:"Recognise & communicate", title:"Recognise dying; the five priorities",
      blocks:[
        {b:"kv", rows:[
          ["Recognise","Increasing weakness, bed-bound, semi-conscious, minimal intake, unable to swallow tablets \u2014 the dying phase. Reassess if reversible factors (e.g. infection, hypercalcaemia, drug toxicity) are plausible and treatment fits goals."],
          ["1 \u00b7 Recognise","Recognise the possibility of dying and review regularly."],
          ["2 \u00b7 Communicate","Communicate sensitively with the dying person (if possible) and those important to them."],

        ]},

      ]}
