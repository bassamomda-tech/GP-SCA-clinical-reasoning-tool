<script>
MG.render({
  icon:"🌀",
  title:"Generalised Anxiety Disorder — The Complete Guide",
  stemTitle:"Anxiety made simple &mdash; rule out the mimics, climb the stepped-care ladder, start low and slow",
  stemSub:"One pathway: confirm it's GAD (and screen for the physical mimics, depression and the substances that fake it), run CG113 stepped care with the psychological options FIRST, choose and dose the drug \u2014 sertraline first, the half-dose start that stops early quitting, the 12-week judge point \u2014 switch and augment properly, avoid the benzodiazepine and pregabalin traps, and know which anxiety disorder isn't GAD. NICE CG113 \u00b7 CKS.",
  guideline:"NICE CG113",
  glance:[
    {lbl:"Confirm", val:"GAD-7 + rule out mimics", sub:"thyroid, caffeine, drugs"},
    {lbl:"Step 1\u20132", val:"Education + low-intensity", sub:"guided self-help / gCBT"},
    {lbl:"Step 3 drug", val:"Sertraline 25\u201350mg", sub:"start low \u2014 early jitteriness"},
    {lbl:"Judge at", val:"12 weeks", sub:"6\u20138 for partial response"},
    {lbl:"Avoid", val:"Benzos >2\u20134 weeks", sub:"pregabalin misuse risk"},
    {lbl:"Continue", val:"\u226512 months", sub:"after response"}
  ],
  flow:[

    {t:"node", d:"found", n:"1", tag:"Step 1 · confirm", title:"Confirm GAD — and exclude what fakes it",
      blocks:[
        {b:"kv", rows:[
          ["GAD","Excessive, hard-to-control worry about multiple domains, most days \u22656 months, + \u22653 of: restlessness, fatigue, poor concentration, irritability, muscle tension, sleep disturbance \u2014 with functional impairment. Quantify with <b>GAD-7</b> (5/10/15 = mild/moderate/severe)"],
          ["<b>Physical mimics \u2014 screen before labelling</b>","<b>Thyrotoxicosis</b> (TFTs \u2014 the classic), arrhythmia/SVT, phaeochromocytoma (paroxysmal BP+sweats+palpitations), hypoglycaemia, menopause, asthma; <b>substances:</b> caffeine (quantify \u2014 energy drinks!), alcohol (and withdrawal), stimulants, salbutamol, steroids, SSRI initiation itself, cannabis withdrawal"],
          ["Comorbidity is the rule","Depression co-exists in most GAD \u2014 <b>screen with PHQ-9 and treat the depression first if present</b> (it changes the plan). Also chronic pain, other anxiety disorders"],
          ["Risk","Ask about self-harm/suicide directly (higher with comorbid depression); alcohol/substance use as self-medication"],
          ["Baseline","TFTs \u00b1 FBC/glucose if features; caffeine/alcohol/drug history; what it stops them doing"]
        ]},
        {b:"warn", html:"<b>Is it actually GAD?</b> Panic disorder (discrete attacks + anticipatory fear \u2192 own pathway), social anxiety (performance/scrutiny fear), OCD, PTSD (trauma + re-experiencing + hypervigilance), health anxiety, and simple phobia are all managed differently. Mislabelling everything 'anxiety' leads to the wrong therapy referral."}
      ]},

    {t:"node", d:"life", n:"2", tag:"Step 2 · stepped care", title:"CG113 stepped care — psychology before pills",
      blocks:[
        {b:"p", html:"<strong>Steps 1\u20132 come first</strong> \u2014 an antidepressant is a Step 3 intervention, offered when low-intensity work fails or symptoms are marked, and ideally <em>alongside</em> psychology, not instead of it."},
        {b:"tiles", v:"life", items:[
          {t:"1\u20e3 Education + active monitoring", html:"Explain GAD, the worry cycle, and that anxiety is not dangerous. Many improve with this + review \u2014 don't medicalise mild, recent worry."},
          {t:"2\u20e3 Low-intensity (Step 2)", html:"Individual guided self-help (CBT-based) or psychoeducational groups \u2014 NHS Talking Therapies SELF-REFERRAL (give the link/number; self-referral rates double when you do)."},
          {t:"3\u20e3 High-intensity CBT (Step 3)", html:"Individual CBT or applied relaxation \u2014 equal in efficacy to drugs; offer as an alternative or addition to medication."},
          {t:"🏃 Lifestyle", html:"Exercise (genuine anxiolytic effect), sleep (see insomnia card), reduce caffeine + alcohol \u2014 often the single biggest lever."},
          {t:"📱 Adjuncts", html:"Digital CBT where commissioned; breathing/grounding techniques; worry-time and problem-solving structure."},
          {t:"🔗 Social", html:"Address the driver where there is one \u2014 debt, work, caring, isolation \u2014 social prescribing."}
        ]}
      ]},

    {t:"node", d:"drug", n:"3", tag:"Step 3 · medication", title:"Drug treatment — sertraline first, start low, judge at 12 weeks",
      blocks:[
        {b:"ladder", steps:[
          {step:"1st", title:"Sertraline (CG113 first-line — most cost-effective SSRI)", when:"Step 3, or marked symptoms",
           html:"<b>Sertraline 25\u201350mg OD \u2192 titrate to 100\u2013200mg</b>. <b>Start at HALF the depression dose</b> \u2014 SSRIs can transiently worsen anxiety/jitteriness in week 1\u20132, the #1 reason anxious patients quit. Warn explicitly + review early. Take with food."},
          {step:"2nd", title:"Alternative SSRI, then SNRI", when:"sertraline not tolerated / ineffective",
           fromLabel:"adequate dose + time",
           html:"Another SSRI (escitalopram 5\u219210\u201320mg, paroxetine \u2014 but worst for discontinuation). Then <b>SNRI: duloxetine 30\u219260mg or venlafaxine MR 75\u2192225mg</b> (check BP at higher doses). Each an adequate trial before moving on."},
          {step:"3rd", title:"Pregabalin", when:"SSRI + SNRI failed / not tolerated",
           fromLabel:"third-line \u2014 with caution",
           html:"<b>Pregabalin 150 \u2192 600mg/day in 2\u20133 divided doses</b> \u2014 licensed for GAD, effective. BUT: <b>Class C controlled drug; misuse/dependence potential (esp. with substance-use history), sedation, weight gain, withdrawal, respiratory depression with opioids (MHRA)</b>. Screen for misuse risk; not first reach."},
          {step:"Judge", title:"The 12-week rule", when:"assessing response",
           fromLabel:"the discipline",
           html:"GAD responds SLOWER than depression \u2014 <b>allow up to 12 weeks at an adequate dose before declaring failure</b> (6\u20138 weeks for a partial response then optimise). Premature switching = serial under-treatment. Success = function restored, not zero worry."}
        ]},
        {b:"table", head:["Side effect / issue","Detail","Fix"], rows:[
          ["Early jitteriness/worse anxiety","SSRIs, first 1\u20132 weeks","Half-dose start, pre-warn, review early; short-term propranolol 10\u201340mg for physical symptoms (NOT in asthma) can bridge"],
          ["Sexual dysfunction","SSRIs/SNRIs (~50%+)","Ask (they won't volunteer); dose-reduce or switch"],
          ["Discontinuation","Paroxetine/venlafaxine worst","Taper slowly + proportionately (see depression card); warn never to stop abruptly"],
          ["Hyponatraemia","Elderly + SSRI \u00b1 diuretic","Na\u207a at 2\u20134 weeks in at-risk"],
          ["Bleeding risk","SSRI + NSAID/anticoagulant","PPI cover or switch"]
        ]},
        {b:"warn", html:"<b>Benzodiazepines are NOT for GAD</b> beyond short-term crisis use (\u22642\u20134 weeks) \u2014 tolerance, dependence and rebound anxiety make them counterproductive. If inherited on long-term benzos, plan a taper (see the benzodiazepine/Z-drug weaning card). <b>Beta-blockers</b> help physical symptoms (tremor, palpitations) but not the psychological core."}
      ]},

    {t:"node", d:"monitor", n:"4", tag:"Step 4 · review", title:"Review, continuation, and stopping",
      blocks:[
        {b:"table", head:["What","When","Action"], rows:[
          ["Early tolerability + risk","1\u20132 weeks (<30y or higher risk: 1 week)","Catch the early-jitteriness quit point; reassure it passes"],
          ["GAD-7 + function","Every review; formally at 12 weeks","<50% improvement at adequate dose/time \u2192 optimise dose \u2192 switch (Step 3 ladder)"],
          ["Continuation","\u226512 months after response","Stopping early is the main relapse cause \u2014 name it; then taper slowly"],
          ["Stopping","Slow, proportionate taper","Smaller steps at the end; distinguish withdrawal (days, physical) from relapse (weeks, the worry returns)"],
          ["Comorbidity","Ongoing","Re-screen depression, alcohol self-medication, and whether therapy actually happened"]
        ]},
        {b:"say", html:"Two things to expect. First, this type of tablet can make you feel a bit MORE wired for the first week or two \u2014 that's temporary and actually a sign it's active; ring me rather than stopping it. Second, it works slowly for anxiety \u2014 we judge it properly at around three months, not three weeks. And the talking therapy does at least as much of the work, so let's get that going alongside."}
      ]},

    {t:"loop", icon:"🔁", title:"Not responding? Run this before switching or referring",
      arrow:"\u2026most 'resistant' anxiety isn't",
      checks:[
        {b:"1 · Adequate trial?", html:"Right dose, actually taken, for a genuine 12 weeks (not 3)?"},
        {b:"2 · The mimics", html:"Thyroid re-checked? Caffeine/energy drinks, alcohol, stimulants, cannabis withdrawal honestly quantified?"},
        {b:"3 · Right diagnosis?", html:"Panic disorder, PTSD, OCD, social anxiety, health anxiety — different therapy pathways. Bipolar (anxiety can herald a mixed state)?"},
        {b:"4 · Comorbid depression", html:"Untreated depression under the anxiety → treat it; drives non-response."},
        {b:"5 · Therapy on board?", html:"CBT actually accessed, or drug alone? Combination beats either."},
        {b:"6 · Self-medication", html:"Alcohol/benzos masking and worsening it — address before escalating."}
      ],
      back:"All confirmed → switch (ladder) or refer to psychology / psychiatry"},

    {t:"node", d:"safety", n:"5", tag:"Safety-net", title:"What the patient must know",
      blocks:[
        {b:"tiles", v:"safety", items:[
          {t:"🔴 Crisis", html:"\u201cIf you ever feel unsafe or have thoughts of harming yourself \u2014 999/A&E, NHS 111 option 2, Samaritans 116 123. Save these now.\u201d"},
          {t:"⚠️ First fortnight", html:"\u201cIf you feel more anxious, agitated, or have new dark thoughts in the first weeks \u2014 contact us the same day; it's a known early effect and we act on it.\u201d"},
          {t:"💊 Don't stop dead", html:"\u201cThese aren't addictive, but stopping suddenly can make you feel dizzy and unwell \u2014 we always reduce them slowly together.\u201d"},
          {t:"☕ Self-help now", html:"\u201cCutting caffeine and alcohol, and the breathing techniques, start working before any tablet does.\u201d"}
        ]}
      ]},

    {t:"node", d:"refer", n:"6", tag:"Refer", title:"Psychology / psychiatry",
      blocks:[
        {b:"tiles", v:"refer", items:[
          {t:"Today", html:"Active suicidal intent, or severe self-neglect → crisis team / same-day."},
          {t:"Psychology (Step 3)", html:"For CBT — as alternative or addition to medication; refer early, don't wait for drugs to fail."},
          {t:"Psychiatry (Step 4)", html:"Marked functional impairment, high risk, self-neglect, or treatment-resistant despite two adequate drug + psychological trials → specialist (combination/augmentation, diagnostic review)."},
          {t:"Different disorder", html:"PTSD, OCD, severe social anxiety, panic disorder — specific evidence-based pathways/therapies."},
          {t:"Perinatal", html:"Moderate+ anxiety in pregnancy/postnatal → perinatal mental-health team (low threshold)."}
        ]},
        {b:"say", html:"You've given a fair trial to the treatment and you're still struggling more than you should \u2014 that's a reason to bring in the specialist team for the therapies and options they can add, not a sign you've failed. We keep going here alongside them."}
      ]}
  ],
  foot:"Generalised anxiety disorder in adults \u2014 NICE CG113 with CKS. Panic disorder, PTSD, OCD, social anxiety follow their own pathways. Verify doses against the current BNF before prescribing."
});
</script>
