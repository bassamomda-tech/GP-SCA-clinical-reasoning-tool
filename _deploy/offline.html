<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#0c4a47" />
<title>Offline · Reasoning GP</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: #f6f2e9; color: #15202b; padding: 32px;
    font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  }
  .wrap { max-width: 460px; text-align: center; }
  .logo { width: 64px; height: 64px; margin: 0 auto 26px; display: block; }
  h1 {
    font-family: 'Source Serif 4', Georgia, 'Times New Roman', serif;
    font-weight: 500; font-size: 30px; line-height: 1.15; letter-spacing: -.01em;
  }
  h1 em { font-style: italic; color: #0c4a47; }
  p { font-size: 15.5px; line-height: 1.6; color: #45525c; margin-top: 14px; text-wrap: pretty; }
  .actions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 26px; }
  a, button {
    font: inherit; font-size: 14px; font-weight: 600; cursor: pointer;
    padding: 11px 20px; border-radius: 10px; text-decoration: none; transition: .15s ease;
  }
  .primary { background: #0c4a47; color: #f3ede0; border: 1px solid #0c4a47; }
  .primary:hover { background: #0a3e3b; }
  .ghost { background: #fff; color: #45525c; border: 1px solid #d8d2c4; }
  .ghost:hover { border-color: #45525c; color: #15202b; }
  .note { margin-top: 22px; font-size: 12.5px; color: #8a8270; }
</style>
</head>
<body>
  <div class="wrap">
    <svg class="logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Reasoning GP">
      <rect width="64" height="64" rx="14" fill="#0c4a47"></rect>
      <text x="32" y="44" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-weight="500" font-size="36" fill="#f3ede0" letter-spacing="-0.02em">R</text>
      <circle cx="51" cy="51" r="6" fill="#b54c2b" stroke="#f6f2e9" stroke-width="2"></circle>
    </svg>
    <h1>You're <em>offline</em></h1>
    <p>This page hasn't been saved for offline use yet. Reconnect to load it — anything you've already opened stays available without a connection.</p>
    <div class="actions">
      <button class="primary" onclick="location.reload()">Try again</button>
      <a class="ghost" href="index.html">Go to home</a>
    </div>
    <p class="note">Reasoning GP · clinical reasoning for clinic and the SCA</p>
  </div>
</body>
</html>
