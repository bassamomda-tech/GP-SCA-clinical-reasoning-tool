name = "reasoning-gp-api"
main = "worker.js"
compatibility_date = "2024-11-01"

# --- KV namespaces (create with: wrangler kv namespace create USERS) ---
# Paste the returned ids below.
kv_namespaces = [
  { binding = "USERS",  id = "PASTE_USERS_KV_ID" },
  { binding = "TOKENS", id = "PASTE_TOKENS_KV_ID" },
  # Optional — powers the 12-month "Updates" archive. Create with:
  #   wrangler kv namespace create UPDATES
  { binding = "UPDATES", id = "PASTE_UPDATES_KV_ID" }
]

# Daily cron warms the live feed AND appends new items to the 12-month archive.
[triggers]
crons = ["0 7 * * *"]

# --- Workers AI (OPTIONAL) — powers semantic search in the Ask assistant. ---
# Free tier. In the dashboard: Worker → Settings → Bindings → Add → Workers AI,
# variable name "AI". If absent, Ask silently uses lexical search instead.
[ai]
binding = "AI"

[vars]
ALLOWED_ORIGIN = "https://www.reasoninggp.com"
AI_MODEL = "claude-sonnet-4-6"   # best quality/price. Cheaper: claude-haiku-4-5
WEB_SEARCH = "on"                # live web search on trusted UK clinical domains (set "off" to disable)
ADMIN_EMAIL = ""                 # YOUR account email on the site — unlocks tools/ask-quality.html (feedback review + answer cache)
EMBED_MODEL = "@cf/baai/bge-base-en-v1.5"   # Workers AI embedding model for semantic search

# PayPal Subscription Plan IDs (create them in the PayPal dashboard, then paste)
PLAN_SILVER_MONTHLY   = ""
PLAN_SILVER_YEARLY    = ""
PLAN_GOLD_MONTHLY     = ""
PLAN_GOLD_3MONTHLY    = ""
PLAN_GOLD_YEARLY      = ""
PLAN_PLATINUM_MONTHLY = ""
PLAN_PLATINUM_YEARLY  = ""

# Secrets are NOT stored here — set them with `wrangler secret put`:
#   wrangler secret put AI_API_KEY
#   wrangler secret put PAYPAL_CLIENT_ID
#   wrangler secret put PAYPAL_SECRET
#   wrangler secret put PAYPAL_WEBHOOK_ID
