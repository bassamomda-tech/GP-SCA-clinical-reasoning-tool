<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Rx specialty icon legend</title>
<style>
  body{ background:#f6f2e9; font-family:'DM Sans',system-ui,sans-serif; padding:30px; color:#2a2722; }
  h1{ font-size:18px; margin-bottom:20px; }
  .grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:16px; }
  .cell{ background:#fff; border:1px solid #e7dfce; border-radius:12px; padding:18px; display:flex; flex-direction:column; align-items:center; gap:10px; text-align:center; }
  .badge{ width:60px; height:60px; border-radius:50%; background:#efe9dc; display:grid; place-items:center; }
  .badge svg{ width:34px; height:34px; color:#1f6f6b; }
  .lbl{ font-size:12.5px; font-weight:600; color:#2a2722; line-height:1.3; }
</style>
</head>
<body>
<h1>Specialty icons — anatomical / system-reflective</h1>
<div class="grid" id="grid"></div>
<script>
const ICONS = {
  'Gastroenterology (stomach)':
    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M13 3.5c0 1.4.2 2.2 1.4 2.8C16.8 7.9 18.5 10.4 18.5 13.4A6.5 6.5 0 0 1 5.6 14.6c-.3-1.9.8-3.4 2.6-3.8"/><path d="M18.4 13.6c1.3.2 2.2-.4 2.6-1.7"/></svg>',
  'Urology & Renal (kidney)':
    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M15 4.2c3.1 0 4.8 3.2 4.8 7.3S18.1 18.8 15 18.8c-2.1 0-3.2-1.4-3.2-3.1 0-1.3.7-2.1.7-3.2s-.7-1.9-.7-3.2c0-1.7 1.1-3.1 3.2-3.1Z"/><path d="M11.8 11.5H8"/></svg>',
  "Women's & Sexual Health (uterus)":
    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M7 5c0 3 1 5 2.4 6.2.9.8 1.1 1.4 1.1 2.6V19"/><path d="M17 5c0 3-1 5-2.4 6.2-.9.8-1.1 1.4-1.1 2.6V19"/><path d="M7 5C5.5 5.4 4.6 6.3 4.4 8"/><path d="M17 5c1.5.4 2.4 1.3 2.6 3"/><path d="M10 19h4"/></svg>',
  "Men's & Sexual Health (male)":
    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="10" cy="14" r="5.5"/><path d="M14.5 9.5 20 4"/><path d="M15 4h5v5"/></svg>',
  'Dermatology (skin layers)':
    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7c3-2 5-2 8 0s5 2 8 0"/><path d="M4 12c3-2 5-2 8 0s5 2 8 0"/><path d="M4 17c3-2 5-2 8 0s5 2 8 0"/></svg>',
  'ENT & Eyes (ear)':
    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M7 9a5 5 0 0 1 10 0c0 2.5-2 3.5-3 4.5s-1.3 2-1.3 3a2.7 2.7 0 0 1-5 .8"/><path d="M9.5 9a2.5 2.5 0 0 1 4.3-1.7"/></svg>',
  'Neurology & Pain (brain)':
    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5.5a3 3 0 0 0-5.6-1.3A2.8 2.8 0 0 0 4 9c-.9 1-.7 2.6.4 3.4-.5 1.4.4 3 2 3.2.3 1.5 1.9 2.4 3.3 1.8.3.1.2.1.3.1"/><path d="M12 5.5a3 3 0 0 1 5.6-1.3A2.8 2.8 0 0 1 20 9c.9 1 .7 2.6-.4 3.4.5 1.4-.4 3-2 3.2-.3 1.5-1.9 2.4-3.3 1.8"/><path d="M12 5.5V19"/></svg>',
  'Musculoskeletal (bone)':
    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M8.5 8.5 15.5 15.5"/><path d="M8.5 8.5a2 2 0 1 0-2.6-2.6A2 2 0 1 0 5.9 8.5 2 2 0 1 0 8.5 8.1"/><path d="M15.5 15.5a2 2 0 1 1 2.6 2.6A2 2 0 1 1 18.1 15.5 2 2 0 1 1 15.5 15.9"/></svg>',
  'Mental Health (head/mind)':
    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M16 19v-2.2c2-1 3.3-3 3.3-5.4A7 7 0 0 0 5.4 9.6c-.2 1.2-.9 2-1.7 2.8-.4.4-.4 1 0 1.3l1.6 1.1V18a1.5 1.5 0 0 0 1.5 1.5H10"/><path d="M9.5 11a2.5 2.5 0 0 1 5 0c0 1.5-2.5 1.8-2.5 3.5"/></svg>',
  'Haematology & Nutrition (blood)':
    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3.5c2.8 3.4 5.5 6.4 5.5 9.6a5.5 5.5 0 0 1-11 0c0-3.2 2.7-6.2 5.5-9.6Z"/><path d="M9.5 13.5a2.5 2.5 0 0 0 2.5 2.5"/></svg>',
  'Paediatrics (child)':
    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="6.5" r="3"/><path d="M7 20v-3.5a5 5 0 0 1 10 0V20"/><path d="M9.8 6.2h.01M14.2 6.2h.01"/></svg>',
  'Travel Health (plane)':
    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M10.5 13 4 15l-1-2 5-3.2L6.5 5 8 4.5l4 4 4.5-1.3a1.6 1.6 0 0 1 .9 3.1L8 14l-1 5-1.5-.5.5-4"/></svg>',
  'Infections (microbe)':
    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><path d="M12 7V4M12 20v-3M17 12h3M4 12h3M15.5 8.5l2-2M6.5 17.5l2-2M15.5 15.5l2 2M6.5 6.5l2 2"/><circle cx="10.5" cy="11" r=".6" fill="currentColor"/><circle cx="13.5" cy="13" r=".6" fill="currentColor"/></svg>',
};
const g = document.getElementById('grid');
g.innerHTML = Object.entries(ICONS).map(([k,svg]) =>
  `<div class="cell"><div class="badge">${svg}</div><div class="lbl">${k}</div></div>`
).join('');
</script>
</body>
</html>
