  stemSub:"Primary-care management of the painful ear \u2014 distinguish acute otitis media (mostly self-limiting, back-up antibiotics) from otitis externa (topical treatment), exclude mastoiditis &amp; malignant otitis externa, and manage glue ear conservatively. NICE NG91/NG98 \u00b7 2026.",

          {t:"🔴 Malignant (necrotising) otitis externa", html:"Elderly diabetic/immunosuppressed, severe deep pain (often out of proportion, worse at night), granulation tissue in the canal, \u00b1 facial nerve palsy \u2192 <b>urgent ENT/admission</b>."},

        {b:"why", html:"Most earache is benign and self-limiting, but a few presentations are limb/life-threatening: mastoiditis (a complication of AOM) and malignant otitis externa (in the diabetic/immunosuppressed) both need urgent specialist care. Always look behind and around the ear, not just in it."}

    {t:"node", d:"found", n:"2", tag:"Foundation", title:"Distinguish the three",
