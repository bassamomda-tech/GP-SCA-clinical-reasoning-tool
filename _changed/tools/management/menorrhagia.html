<script>
MG.render({
  icon:"🩸",
  title:"Heavy Menstrual Bleeding",
  stemTitle:"Menorrhagia (HMB) \u2014 exclude pathology, then treat by contraceptive need",
  stemSub:"Primary-care management of heavy menstrual bleeding \u2014 check FBC and exclude structural/sinister causes, then offer the LNG-IUS first-line, with non-hormonal and hormonal alternatives chosen around whether contraception is wanted. NICE NG88 \u00b7 2026.",
  guideline:"NICE NG88",
  glance:[
    {lbl:"Always", val:"FBC (ferritin)", sub:"check for anaemia"},
    {lbl:"1st-line", val:"LNG-IUS", sub:"if contraception acceptable"},
    {lbl:"Non-hormonal", val:"Tranexamic acid 1 g TDS / NSAID", sub:"taken during periods"},
    {lbl:"Hormonal", val:"COC / cyclical progestogen", sub:"alternatives"},
    {lbl:"Image", val:"USS if structural", sub:"per exam/history"},
    {lbl:"Red flag", val:"PMB / IMB / 45+ persistent", sub:"= USC / USS"}
  ],
  flow:[
    {t:"node", d:"safety", n:"1", tag:"Safety-net", title:"Exclude sinister + structural causes",
      blocks:[
        {b:"tiles", v:"safety", items:[
          {t:"🔴 Postmenopausal bleeding", html:"PMB \u2192 2WW gynaecology (exclude endometrial cancer) \u2014 a different pathway."},
          {t:"🟠 IMB / PCB / 45+", html:"Intermenstrual or postcoital bleeding, or persistent HMB at 45+ \u2192 USS \u00b1 endometrial assessment; consider 2WW per NG12."},
          {t:"🟠 Structural", html:"Bulky/irregular uterus, fibroids, suspected adenomyosis/polyp \u2192 pelvic + transvaginal USS."},
          {t:"🩸 Anaemia / bleeding disorder", html:"Symptomatic anaemia; HMB since menarche or family history \u2192 consider von Willebrand/clotting screen."}
        ]},
        {b:"why", html:"HMB is usually benign (often no identified pathology), but the examiner expects you to exclude endometrial cancer (PMB/IMB/age) and structural causes (fibroids, polyps, adenomyosis) before symptomatic treatment, and to treat the anaemia it causes."}
      ]},
    {t:"node", d:"found", n:"2", tag:"Foundation", title:"Assess + investigate",
      blocks:[
        {b:"kv", rows:[
          ["History","Impact on QoL, flooding/clots, cycle regularity, IMB/PCB, contraceptive + fertility wishes, dysmenorrhoea, comorbidity"],
          ["Examination","Abdominal + (if structural/symptoms) speculum &amp; bimanual; smear if due"],
          ["Bloods","<b>FBC</b> for all; ferritin if anaemic; coagulation/vWF if suggestive; TFTs only if thyroid symptoms"],
          ["Imaging","Transvaginal USS if structural cause suspected, abnormal exam, or treatment failure"]
        ]}
      ]},
    {t:"node", d:"life", n:"3", tag:"Non-drug · advice", title:"Support & investigation", blocks:[{b:"tiles", v:"life", items:[{t:"🩸 Quantify impact", html:"Assess flooding, clots, anaemia symptoms; a menstrual diary helps gauge severity."},{t:"🥩 Treat anaemia", html:"Iron-rich diet and replace iron if deficient; check ferritin/FBC."},{t:"🗓️ Inform choice", html:"Explain options; the LNG-IUS is first-line and reversible."}]},{b:"why", html:"Quantifying the impact, correcting iron-deficiency anaemia and supporting an informed choice are key non-drug elements of HMB care."}]},
    {t:"node", d:"drug", n:"4", tag:"Treatment", title:"Treat by contraceptive need (NG88)",
      blocks:[
        {b:"ladder", steps:[
          {step:"1st-line", title:"LNG-IUS (Mirena)", when:"if hormonal contraception acceptable",
           html:"Levonorgestrel intrauterine system \u2014 most effective medical treatment; also provides contraception. Counsel re irregular bleeding in first 3\u20136 months."},
          {step:"Non-hormonal", title:"Tranexamic acid \u00b1 NSAID", when:"contraception not wanted",
           fromLabel:"if LNG-IUS declined / no contraception needed",
           html:"<b>Tranexamic acid</b> during menses (reduces flow ~50%); <b>mefenamic acid</b>/NSAID if dysmenorrhoea too (taken on bleeding days). Stop if no benefit after 3 cycles."},
          {step:"Hormonal alt.", title:"COC or cyclical progestogen", when:"alternative",
           fromLabel:"if suitable / preferred",
           html:"Combined oral contraceptive (regulates + lightens), or cyclical oral progestogen (e.g. <b>norethisterone 5 mg BD\u2013TDS</b>) for short-term control."},
          {step:"Refractory", title:"Gynaecology", when:"failure / structural",
           fromLabel:"if not controlled",
           html:"For fibroids/adenomyosis, treatment failure, or fertility-sparing/definitive options (ablation, myomectomy, UAE, hysterectomy)."}
        ]},
        {b:"warn", html:"Treat iron deficiency anaemia alongside (oral iron). Don\u2019t delay treatment for investigations in a young woman with a clear benign picture and normal exam."}
      ]},
    {t:"node", d:"monitor", n:"5", tag:"Monitoring", title:"Review response",
      blocks:[
        {b:"table", head:["What","When","Action"], rows:[
          ["Bleeding + QoL","3\u20136 months","Assess response; LNG-IUS often takes months to settle"],
          ["FBC/ferritin","If anaemic","Confirm recovery; continue iron"],
          ["Non-hormonal trial","After 3 cycles","Stop if ineffective; switch approach"],
          ["New red flags","Any time","IMB/PCB/PMB \u2192 investigate/refer"]
        ]}
      ]},
    {t:"node", d:"refer", n:"6", tag:"Refer", title:"Referral",
      arrow:"red flags, structural or refractory",
      blocks:[
        {b:"tiles", v:"refer", items:[
          {t:"2WW gynaecology", html:"Postmenopausal bleeding; suspected endometrial/cervical cancer per NG12."},
          {t:"Gynaecology (routine)", html:"Fibroids/adenomyosis, treatment failure, large uterus, or for ablation/surgery."},
          {t:"Haematology", html:"Suspected bleeding disorder (von Willebrand)."}
        ]},
        {b:"say", html:"Heavy periods are common and usually not due to anything serious, but we\u2019ll check a blood count and examine you. The hormonal coil is the most effective treatment and also acts as contraception; if you\u2019d rather not, tablets taken during your period can roughly halve the bleeding."}
      ]}
  ],
  foot:"Management of heavy menstrual bleeding in primary care; PMB/IMB follow the suspected-cancer pathway. Verify against current NICE NG88 and the BNF."
});
</script>
