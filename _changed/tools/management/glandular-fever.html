MG.render({"icon":"🦠","title":"Glandular Fever (Infectious Mononucleosis)","guideline":"NICE CKS","stemTitle":"Glandular fever — supportive care, avoid amoxicillin + contact sport","stemSub":"Primary-care management of infectious mononucleosis (EBV) — confirm where needed, treat supportively, avoid amoxicillin (rash) and contact sports (splenic rupture), and recognise airway and splenic complications. NICE CKS · 2026.","glance":[{"lbl":"Cause","val":"EBV (usually)","sub":"young adults"},{"lbl":"Triad","val":"Sore throat + fever + lymphadenopathy","sub":"+ fatigue"},{"lbl":"Confirm","val":"Monospot/EBV serology + FBC","sub":"lymphocytosis"},{"lbl":"Treatment","val":"Supportive","sub":"self-limiting"},{"lbl":"AVOID","val":"Amoxicillin/ampicillin","sub":"florid rash"},{"lbl":"Red flag","val":"Airway / splenic rupture","sub":"= emergency"}],"flow":[{"t":"node","d":"safety","n":"1","tag":"Safety-net","title":"Complications + key cautions","blocks":[{"b":"tiles","v":"safety","items":[{"t":"🔴 Airway compromise","html":"Severe tonsillar enlargement → stridor/difficulty swallowing/drooling → emergency admission (may need steroids/airway support)."},{"t":"🔴 Splenic rupture","html":"Sudden severe abdominal/left shoulder-tip pain ± collapse → emergency; <b>avoid contact/collision sports and heavy lifting for at least 4 weeks</b> (often 8 weeks for contact sport)."},{"t":"💊 Avoid amoxicillin/ampicillin","html":"Causes a florid maculopapular rash in most with EBV — don’t treat the sore throat with these."},{"t":"🟠 Other","html":"Hepatitis (deranged LFTs), haemolysis/thrombocytopenia, neurological (rare), prolonged fatigue."}]},{"b":"why","html":"Glandular fever is self-limiting, but the examinable safety points are: avoid amoxicillin (rash), avoid contact sport (splenic rupture risk), and recognise the airway emergency from massive tonsillar swelling."}]},{"t":"node","d":"found","n":"2","tag":"Foundation","title":"Diagnose","blocks":[{"b":"kv","rows":[["Presentation","Young adult with sore throat (often severe exudative tonsillitis), fever, marked cervical (esp. posterior) lymphadenopathy, profound fatigue, malaise; ± splenomegaly, palatal petechiae, periorbital oedema"],["Confirm","FBC (lymphocytosis with atypical lymphocytes), heterophile antibody (Monospot) — may be negative early/in children; EBV-specific serology if needed; LFTs (often deranged)"],["Differentials","Streptococcal tonsillitis, CMV/toxoplasma/HIV seroconversion, acute leukaemia (check blood film), other causes of lymphadenopathy"]]}]},{"t":"node","d":"life","n":"3","tag":"Non-drug · core","title":"Rest, recovery & sport","blocks":[{"b":"tiles","v":"life","items":[{"t":"🛌 Rest & fluids","html":"Supportive care — rest, fluids, paracetamol/ibuprofen for fever and sore throat."},{"t":"🏉 Avoid contact sport","html":"No contact/collision sport or heavy lifting for ≥1 month (splenic rupture risk while spleen enlarged)."},{"t":"🍺 Avoid alcohol","html":"Avoid alcohol while LFTs deranged; expect fatigue to outlast the acute illness."}]},{"b":"why","html":"Glandular fever has no specific drug treatment — supportive care, avoiding contact sport while the spleen is enlarged, and pacing recovery are the management."}]},{"t":"node","d":"drug","n":"4","tag":"Treatment","title":"Supportive","blocks":[{"b":"ladder","steps":[{"step":"Step 1","title":"Supportive care","when":"mainstay","html":"Rest, fluids, paracetamol/NSAID for pain/fever, saline gargles/throat lozenges; reassure most recover in 2–4 weeks though fatigue can linger weeks–months."},{"step":"Step 2","title":"Activity advice","when":"all","fromLabel":"prevent splenic rupture","html":"Avoid contact/collision sports and heavy lifting for ≥4 weeks (≥8 weeks for contact sports / until splenomegaly resolved); avoid alcohol while LFTs deranged."},{"step":"Step 3","title":"Corticosteroids (selected)","when":"airway / specific complications","fromLabel":"specialist/urgent","html":"Consider for impending airway obstruction or significant complications (e.g. severe thrombocytopenia/haemolysis) — specialist-guided, not routine."}]},{"b":"warn","html":"Do NOT prescribe amoxicillin/ampicillin. Antibiotics don’t treat EBV — reserve for proven bacterial co-infection (and use a non-amino-penicillin)."}]},{"t":"node","d":"follow","n":"5","tag":"Follow-up & advice","title":"Recovery, sport & complications","blocks":[{"b":"timeline","items":[{"n":"1","when":"Weeks 1–4","title":"Expected course","html":"Symptomatic recovery usually over <b>2–4 weeks</b>, though fatigue can linger weeks–months. Reassure; supportive care (fluids, paracetamol/NSAID, rest). No antivirals/steroids routinely."},{"n":"2","when":"First month","title":"Avoid contact sport","html":"Advise <b>no contact/collision sport or heavy lifting for at least the first month</b> (splenic rupture risk while spleen enlarged); return guided by recovery, longer if splenomegaly persists."},{"n":"3","when":"If not settling","title":"Reassess","html":"Prolonged fever, worsening sore throat/airway concern, jaundice/RUQ pain (hepatitis), or fatigue beyond a few months → re-examine and consider FBC/LFTs and other causes."}]},{"b":"say","html":"This is glandular fever — it usually settles over a few weeks but the tiredness can outlast it. Avoid contact sport and heavy lifting for at least a month because your spleen can be enlarged."}]},{"t":"node","d":"refer","n":"6","tag":"Refer","title":"Referral","blocks":[{"b":"tiles","v":"refer","items":[{"t":"Emergency admission","html":"Airway compromise (severe tonsillar swelling/stridor), suspected splenic rupture, severe dehydration."},{"t":"Haematology / urgent FBC","html":"If blood film raises leukaemia concern, or significant cytopenias."},{"t":"Review","html":"Prolonged/atypical course — reconsider diagnosis; support persistent fatigue."}]},{"b":"say","html":"This is glandular fever, a viral infection common in young adults. There’s no specific cure — rest, fluids and painkillers — and most people are over the worst in a few weeks, though tiredness can hang around. Two important things: avoid contact sports and heavy lifting for at least a month because the spleen can be enlarged, and we won’t use certain antibiotics as they cause a rash."}]}],"foot":"Management of infectious mononucleosis in primary care — supportive; avoid amoxicillin and contact sport; recognise airway/splenic emergencies. Verify against current NICE CKS Glandular fever."});
