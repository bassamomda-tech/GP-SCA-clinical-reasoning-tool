        {b:"kv", rows:[
          ["Suspect FH","Adult TC &gt;7.5 or LDL &gt;4.9 (child TC &gt;6.7 / LDL &gt;4) with personal/family history of premature CHD or tendon xanthomata. <b>Systematically search records</b>: TC &gt;9 if \u226530y (&gt;7.5 if &lt;30y) is &gt;99th centile \u2014 very likely FH. Suspect <b>homozygous FH</b> if LDL &gt;13 (\u226516y) or &gt;11 (&lt;16y) \u2192 refer a specialist centre (don\u2019t use Simon Broome/Dutch)"],
