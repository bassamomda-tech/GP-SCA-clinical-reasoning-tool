  flow:[
    {t:"node", d:"found", n:"1", tag:"Foundation", title:"Confirm angina and quantify the burden",

    {t:"node", d:"life", n:"2", tag:"Non-drug \u00b7 every patient", title:"Lifestyle, rehab and risk-factor control",

          {t:"🔴 Unstable angina", html:"\u201cChest pain at rest, lasting longer, or coming more often \u2014 seek urgent assessment; this can signal a heart attack.\u201d"},
          {t:"💊 Don\u2019t stop \u03b2-blocker", html:"\u201cNever stop the heart tablets suddenly \u2014 it can trigger worse angina; speak to us first.\u201d"},
          {t:"🤕 GTN side effects", html:"\u201cGTN can cause headache or light-headedness \u2014 sit down to use it.\u201d"}
        ]}
      ]},
    {t:"node", d:"refer", n:"8", tag:"Refer to secondary care", title:"When to refer",
      arrow:"when unstable, refractory, or diagnosis uncertain",
      blocks:[
        {b:"tiles", v:"refer", items:[

          {t:"Diagnostic", html:"Uncertain diagnosis needing anatomical/functional testing."},
          {t:"New LV dysfunction", html:"Angina with heart failure or significant arrhythmia."}
        ]},
        {b:"say", html:"Your medicines aren\u2019t keeping the angina under control, so I\u2019d like the cardiology team to look at whether a procedure to improve blood flow would help. We\u2019ll keep your tablets and GTN going in the meantime."}
      ]}
