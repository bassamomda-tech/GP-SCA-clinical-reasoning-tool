<script>
MG.render({
  icon:"🫁",
  title:"Asthma",
  stemTitle:"Confirmed Asthma (adults & children 12+) — ongoing management",
  stemSub:"Primary-care management on the 2024 NICE/BTS/SIGN pathway \u2014 ICS-formoterol as anti-inflammatory reliever (AIR) and maintenance-and-reliever therapy (MART), inhaler technique, the personalised action plan, and the move away from SABA-only \u2014 up to specialist referral. NICE NG245 \u00b7 2026.",
  guideline:"NICE NG245 (2024)",
  glance:[
    {lbl:"Reliever", val:"ICS-formoterol", sub:"AIR \u00b7 not SABA-only"},
    {lbl:"Maintenance", val:"MART", sub:"one inhaler, dual role"},
    {lbl:"Control tool", val:"RCP 3 Q / ACT", sub:"at every review"},
    {lbl:"SABA overuse", val:">2 / year", sub:"= poor control flag"},
    {lbl:"Step 4 tests", val:"FeNO + eos", sub:"before referral"},
    {lbl:"Review", val:"Annual +", sub:"after every flare"}
  ],
  flow:[
    {t:"node", d:"found", n:"1", tag:"Foundation", title:"Confirm control as your treatment target",
      blocks:[
        {b:"kv", rows:[
          ["Assess control","RCP 3 questions or ACT: daytime symptoms, night waking, activity limitation"],
          ["SABA reliance","\u22653 doses/week or &gt;2 reliever inhalers/year = uncontrolled \u2014 a key risk flag"],
          ["Risk","Previous attacks/admissions, oral steroid courses, poor technique, smoking"],
          ["Baseline","Inhaler technique, adherence, triggers, occupation, BMI, comorbid rhinitis"]
        ]},
        {b:"why", html:"The 2024 guideline reframed asthma around <strong>anti-inflammatory reliever therapy</strong>: every reliever now contains an inhaled steroid, because SABA-only relief masks worsening inflammation and SABA over-use is the strongest predictor of fatal attacks. Your target is <em>control</em>, tracked objectively at every review \u2014 not just \u2018how do you feel today\u2019."}
      ]},
    {t:"node", d:"life", n:"2", tag:"Non-drug \u00b7 every patient", title:"The work that makes inhalers work",
      blocks:[
        {b:"tiles", v:"life", items:[
          {t:"🌬️ Inhaler technique", html:"Check at every review and every step change \u2014 the commonest reason for poor control. Use a spacer where appropriate."},
          {t:"💊 Adherence", html:"Review prescription pickup; address fear of steroids; simplify with MART (one inhaler)."},
          {t:"🚭 Smoking", html:"Cessation (incl. vaping/second-hand) \u2014 reduces symptoms and steroid resistance."},
          {t:"📝 Action plan", html:"Personalised asthma action plan (PAAP) for everyone \u2014 what to do as symptoms change."},
          {t:"🌿 Triggers", html:"Identify and reduce allergens, occupational exposures; treat allergic rhinitis."},
          {t:"💉 Vaccines & weight", html:"Annual flu vaccine; weight loss if overweight improves control."}
        ]}
      ]},
    {t:"node", d:"drug", n:"3", tag:"Medication \u00b7 stepwise (adults & 12+)", title:"The AIR \u2192 MART ladder",
      blocks:[
        {b:"p", html:"Move up if uncontrolled, move down if stable for a few months. <strong>Always check technique and adherence before stepping up.</strong>"},
        {b:"ladder", steps:[
          {step:"Step 1", title:"As-needed low-dose ICS/formoterol (AIR)", when:"mild / intermittent (12+)",
           html:"No SABA-only therapy. A combined <b>ICS-formoterol</b> inhaler used <b>only when symptomatic</b>. Licensed AIR devices (12+): <b>Symbicort Turbohaler 200/6</b>, <b>DuoResp Spiromax 160/4.5</b>, <b>Fobumix Easyhaler 160/4.5</b>, <b>WockAIR 160/4.5</b> (budesonide/formoterol). One inhalation PRN; a second after a few minutes if needed; max 6 at once, usual max 8/day (max 12)."},
          {step:"Step 2", title:"Low-dose MART", when:"regular symptoms",
           fromLabel:"symptoms \u2265 most weeks / waking",
           html:"Same ICS-formoterol inhaler as <b>daily maintenance AND reliever</b> (one device). Low-dose MART: <b>Symbicort 100/6</b> or <b>Fobumix 80/4.5</b> \u2014 1 dose <b>twice daily + PRN</b>. (Fostair Nexthaler/MDI 100/6 &amp; Luforbec MDI are licensed MART from 18+, 1 puff BD + PRN \u2014 encourage a spacer with MDIs.)"},
          {step:"Step 3", title:"Moderate-dose MART", when:"still uncontrolled",
           fromLabel:"uncontrolled on low-dose MART",
           html:"Increase the maintenance ICS to moderate dose: e.g. <b>Symbicort 200/6</b> or <b>Fobumix/DuoResp/WockAIR 160/4.5</b> \u2014 2 doses <b>twice daily + PRN</b>. Max usually 8 puffs/day (rarely 12 for a limited period)."},
          {step:"Step 4", title:"Check FeNO + blood eosinophils", when:"before further escalation",
           fromLabel:"still uncontrolled \u2014 phenotype first",
           html:"If <b>raised</b> (eosinophilic) \u2192 refer for specialist assessment / biologics. If <b>not raised</b> \u2192 trial an <b>LTRA</b> (montelukast 10mg nocte) <b>or LAMA</b> (e.g. tiotropium) added to moderate-dose MART for <b>8\u201312 weeks</b>; stop if no benefit or side effects, then refer if still uncontrolled."}
        ]},
        {b:"warn", html:"<b>SABA over-reliance is dangerous:</b> &gt;2 reliever inhalers/year or escalating use mandates urgent review, not just a repeat prescription. Frequent oral steroid courses = poorly controlled disease needing escalation/referral."},
        {b:"warn", html:"<b>Acute symptoms on AIR/MART:</b> up to <b>6 puffs of ICS-formoterol</b> may be taken at once (one puff at 1-minute intervals); if this doesn't relieve symptoms, seek <b>urgent medical advice</b>. Ensure every patient has a <b>MART/AIR-specific asthma action plan</b>.\n      "},
        {b:"table", head:["Side effect","Cause","What to do"], rows:[
          ["Oral thrush / hoarse voice","Inhaled steroid deposition","Rinse &amp; spit after dosing; use a spacer with MDIs; check technique; treat candidiasis (nystatin/miconazole)"],
          ["Palpitations / tremor","Formoterol (\u03b2-agonist)","Usually settles; review if persistent/excessive PRN use"],
          ["Throat irritation / cough","Device/propellant","Re-check technique; consider a DPI vs MDI switch"]
        ]},
                {b:"why", html:"MART works because the same inhaler delivers extra inhaled steroid exactly when symptoms (and inflammation) rise \u2014 so escalating reliever use automatically escalates anti-inflammatory dose, the opposite of the old SABA model. Checking FeNO/eosinophils at step 4 identifies who will respond to biologics rather than blindly adding drugs."}
      ]},
    {t:"node", d:"monitor", n:"4", tag:"Monitoring", title:"Track control objectively",
      blocks:[
        {b:"table", head:["What","When","Action"], rows:[
          ["Control score (RCP3/ACT)","Every review","Uncontrolled \u2192 technique/adherence \u2192 step up"],
          ["SABA/reliever use","Every review","Rising use \u2192 escalate + review trigger control"],
          ["Inhaler technique","Every review + each step change","Re-teach; switch device if needed"],
          ["Spirometry / FeNO / PEF","Periodically / at step 4","Phenotype + objective trend"]
        ]}
      ]},
    {t:"node", d:"follow", n:"5", tag:"Follow-up", title:"Review schedule",
      blocks:[
        {b:"timeline", items:[
          {n:"1", when:"After any step change", title:"Response check", html:"Reassess control, technique and adherence at 4\u20138 weeks; step down if stable."},
          {n:"2", when:"Within 48 h of an attack", title:"Post-exacerbation review", html:"Every attack is a sentinel event \u2014 review technique, adherence, trigger and step."},
          {n:"3", when:"At least annual", title:"Structured asthma review", html:"For an acute attack: <b>prednisolone 40\u201350 mg once daily for at least 5 days</b> (child 1\u20132 mg/kg, max 40 mg). At review: control score, inhaler technique, action plan update, SABA/reliever audit, smoking, comorbidities, flu vaccine."}
        ]}
      ]},
    {t:"loop", icon:"🔁", title:"Not controlled? Check before stepping up",
      arrow:"\u2026if control score remains poor",
      intro:"Most \u2018uncontrolled asthma\u2019 is technique or adherence, not disease severity.",
      checks:[
        {b:"1 \u00b7 Technique", html:"Watch them use the device; correct or switch."},
        {b:"2 \u00b7 Adherence", html:"Check pickup data; explore steroid fears; simplify to MART."},
        {b:"3 \u00b7 Triggers", html:"Smoking, allergens, occupation, untreated rhinitis, NSAIDs/\u03b2-blockers."},
        {b:"4 \u00b7 Diagnosis", html:"Reconsider the diagnosis if never objectively confirmed."},
        {b:"5 \u00b7 Phenotype", html:"At step 4 check FeNO/eosinophils \u2192 refer if eosinophilic."}
      ],
      back:"Technique + adherence + triggers addressed \u2192 step up the ladder / refer"},
    {t:"node", d:"safety", n:"6", tag:"Safety-net", title:"Safety-netting",
      blocks:[
        {b:"tiles", v:"safety", items:[
          {t:"🔴 Life-threatening attack", html:"\u201cCan\u2019t speak in full sentences, lips/fingers turning blue, exhausted, or reliever not working \u2014 call 999.\u201d"},
          {t:"🟠 Worsening attack", html:"\u201cNeeding your reliever every few hours, peak flow dropping, waking at night \u2014 start your action plan and contact us urgently.\u201d"},
          {t:"💨 SABA overuse", html:"\u201cIf you\u2019re using your reliever a lot more than usual, that\u2019s a warning sign \u2014 book a review, don\u2019t just reorder.\u201d"},
          {t:"📝 Action plan", html:"\u201cFollow your written plan: when to step up treatment, start steroids, and when to seek help.\u201d"}
        ]}
      ]},
    {t:"node", d:"refer", n:"7", tag:"Refer to secondary care", title:"When to refer",
      arrow:"when control fails or the diagnosis is uncertain",
      blocks:[
        {b:"tiles", v:"refer", items:[
          {t:"Emergency", html:"Acute severe / life-threatening attack \u2192 999 / admit."},
          {t:"Poor control", html:"Uncontrolled despite moderate-dose MART + add-on, or frequent oral-steroid courses / attacks."},
          {t:"Biologics", html:"Eosinophilic phenotype (raised FeNO/eosinophils) \u2014 for specialist add-on biologic assessment."},
          {t:"Occupational", html:"Suspected occupational asthma \u2014 refer (and document exposure)."},
          {t:"Diagnostic doubt", html:"Diagnosis never objectively confirmed, or atypical features."}
        ]},
        {b:"say", html:"Your asthma isn\u2019t as settled as it should be despite good treatment, so I\u2019d like a respiratory specialist to assess whether a newer add-on treatment would help. Let\u2019s also re-check your inhaler technique today \u2014 it makes a big difference."}
      ]}
  ]
});
</script>
