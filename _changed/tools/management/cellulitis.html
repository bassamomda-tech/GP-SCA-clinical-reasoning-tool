<script>
MG.render({
  icon:"🦠",
  title:"Cellulitis",
  stemTitle:"Cellulitis \u2014 class the severity (Eron), treat &amp; admit the sick",
  stemSub:"Primary-care management of cellulitis &amp; erysipelas \u2014 stratify with the Eron class, mark the margin and review, give flucloxacillin first-line, treat the entry portal (tinea pedis, ulcers, oedema), and recognise the mimics (DVT, necrotising fasciitis, septic arthritis) and the sepsis that needs admission. NICE NG141 \u00b7 2026.",
  guideline:"NICE NG141",
  glance:[
    {lbl:"Typical", val:"Unilateral, hot, red, tender", sub:"spreading; usually a leg"},
    {lbl:"First-line", val:"Flucloxacillin 500 mg\u20131 g QDS", sub:"clarithromycin 500 mg BD if allergic"},
    {lbl:"Severity", val:"Eron class I\u2013IV", sub:"III/IV \u2192 admit"},
    {lbl:"Mark it", val:"Draw the margin", sub:"review 48h / safety-net"},
    {lbl:"Portal", val:"Treat tinea pedis / ulcer", sub:"reduces recurrence"},
    {lbl:"Red flag", val:"Pain out of proportion / sepsis", sub:"= nec fasc / admit"}
  ],
  flow:[
    {t:"node", d:"safety", n:"1", tag:"Safety-net", title:"Admit / exclude the dangerous mimics",
      blocks:[
        {b:"tiles", v:"safety", items:[
          {t:"🔴 Necrotising fasciitis", html:"Pain out of proportion to signs, rapidly spreading, dusky/blistering/crepitus skin, systemically very unwell \u2192 <b>999/emergency surgical admission</b> \u2014 do not delay."},
          {t:"🔴 Sepsis / Eron III\u2013IV", html:"Systemically unwell, fever/rigors, tachycardia, hypotension, confusion, or significant comorbidity/immunosuppression \u2192 <b>admit for IV antibiotics</b>."},
          {t:"🔴 Orbital / periorbital cellulitis", html:"Eyelid swelling with proptosis, painful/restricted eye movements or reduced vision \u2192 <b>same-day emergency</b> (sight- and life-threatening)."},
          {t:"🟠 Don\u2019t miss the mimics", html:"DVT (bilateral risk, calf), septic arthritis (hot joint, won\u2019t move), gout, acute lipodermatosclerosis, contact dermatitis, and <b>bilateral \u2018cellulitis\u2019 = rarely infection</b> (think venous eczema/lymphoedema)."}
        ]},
        {b:"why", html:"Cellulitis is usually unilateral and acute. Bilateral lower-leg redness is almost never cellulitis \u2014 it is usually venous/gravitational eczema or lipodermatosclerosis and does not need antibiotics. The two not-to-miss diagnoses are necrotising fasciitis (pain out of proportion) and a DVT presenting as a hot leg."}
      ]},
    {t:"node", d:"found", n:"2", tag:"Foundation", title:"Recognise &amp; stratify (Eron)",
      blocks:[
        {b:"kv", rows:[
          ["Features","Acute, unilateral, hot, red, swollen, tender, poorly demarcated spreading area \u00b1 fever/malaise; erysipelas = sharply demarcated, raised (often face/leg)"],
          ["Eron I","Systemically well, no uncontrolled comorbidity \u2192 oral antibiotics at home"],
          ["Eron II","Systemically unwell OR comorbidity that may complicate/delay resolution \u2192 may need IV / closer review"],
          ["Eron III","Significant systemic upset (tachycardia, tachypnoea, hypotension) or limb-threatening \u2192 admit"],
          ["Eron IV","Sepsis / necrotising infection \u2192 emergency admission"],
          ["Likely organisms","Streptococcus pyogenes &amp; Staphylococcus aureus"]
        ]}
      ]},
    {t:"node", d:"life", n:"3", tag:"Non-drug · supportive", title:"Supportive care", blocks:[{b:"tiles", v:"life", items:[{t:"⬆️ Elevation", html:"Elevate the affected limb to reduce swelling; rest the limb early on."},{t:"✏️ Mark the edge", html:"Mark the erythema margin to monitor spread/response objectively."},{t:"💧 Skin care", html:"Treat the portal of entry (tinea pedis, eczema, wounds); emollients."}]},{b:"why", html:"Limb elevation, marking the margin and treating the entry point speed recovery and prevent recurrence alongside antibiotics."}]},
    {t:"node", d:"drug", n:"4", tag:"Management", title:"Antibiotics &amp; the entry portal",
      blocks:[
        {b:"ladder", steps:[
          {step:"Step 1", title:"First-line oral antibiotic", when:"Eron I, treat at home",
           html:"<b>Flucloxacillin</b> (high dose, e.g. 500mg\u20131g QDS) 5\u20137 days, review &amp; extend if not settling. Penicillin allergy \u2192 <b>clarithromycin 500 mg BD</b> (or <b>erythromycin 500 mg QDS</b> in pregnancy); <b>doxycycline 200 mg on day 1 then 100 mg OD</b> an alternative. Near eyes/nose \u2192 <b>co-amoxiclav 500/125 mg TDS</b> cover."},
          {step:"Step 2", title:"Mark, elevate &amp; analgesia", when:"all cases",
           fromLabel:"supportive care",
           html:"Draw around the margin with date/time to track progression; elevate the limb; paracetamol/NSAID; treat oedema. Photograph if able."},
          {step:"Step 3", title:"Treat the portal of entry", when:"reduce recurrence",
           fromLabel:"source control",
           html:"Treat <b>tinea pedis</b> (toe-web maceration is the classic portal), leg ulcers, eczema, and oedema/lymphoedema; skin care &amp; emollients. This is the single best way to prevent recurrent cellulitis."},
          {step:"Step 4", title:"Recurrent cellulitis", when:"\u22652 episodes/year",
           fromLabel:"prevention",
           html:"Optimise oedema/lymphoedema, skin care &amp; portal; consider <b>antibiotic prophylaxis</b> (<b>phenoxymethylpenicillin 250 mg BD</b>, or erythromycin 250 mg BD if penicillin-allergic) and compression once infection settled."}
        ]},
        {b:"warn", html:"Mark the area and review at 48\u201372h: failure to improve, spreading despite antibiotics, or systemic deterioration \u2192 reassess for resistance, abscess, a missed mimic (DVT/nec fasc), or the need for IV/admission. Consider abscess \u2192 incision &amp; drainage."}
      ]},
    {t:"node", d:"monitor", n:"5", tag:"Follow-up", title:"Review &amp; safety-net",
      blocks:[
        {b:"timeline", items:[
          {n:"1", when:"48\u201372h", title:"Review response", html:"Compare to the marked margin; improving \u2192 continue; not improving/spreading \u2192 escalate (IV/admit) &amp; reconsider the diagnosis."},
          {n:"2", when:"On completion", title:"Confirm resolution", html:"Ensure full resolution; address residual oedema; treat the portal of entry to prevent recurrence."},
          {n:"3", when:"Ongoing", title:"Recurrence prevention", html:"Compression, skin care, treat tinea/ulcers; consider prophylaxis if recurrent."}
        ]}
      ]},
    {t:"node", d:"refer", n:"6", tag:"Refer", title:"Referral",
      arrow:"admit vs community",
      blocks:[
        {b:"tiles", v:"refer", items:[
          {t:"999 / emergency", html:"Suspected necrotising fasciitis, sepsis, or orbital cellulitis."},
          {t:"Admit (IV antibiotics)", html:"Eron III\u2013IV, failing oral therapy, immunosuppressed, facial cellulitis, or unable to manage at home."},
          {t:"Community IV / OPAT", html:"Selected moderate cellulitis suitable for ambulatory IV antibiotics where available."},
          {t:"Lymphoedema / dermatology", html:"Recurrent cellulitis, complex lymphoedema, or diagnostic uncertainty (?venous eczema)."}
        ]},
        {b:"say", html:"This is a skin infection \u2014 the redness and tenderness should start to settle within a couple of days of the antibiotics. I\u2019ve drawn around the edge so we can see if it\u2019s improving. Keep the leg up. Come back urgently if it spreads past the line, you feel feverish or unwell, or the pain becomes severe and out of keeping with how it looks."}
      ]}
  ],
  foot:"Management of cellulitis in primary care; necrotising fasciitis, sepsis and orbital cellulitis are emergencies; bilateral lower-leg redness is rarely infective. Verify against current NICE NG141 Cellulitis &amp; erysipelas: antimicrobial prescribing."
});
</script>
