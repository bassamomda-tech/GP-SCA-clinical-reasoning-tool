  stemSub:"A practical medicines-optimisation protocol: set functional goals, run a time-limited morphine trial, keep below 120mg/day oral morphine equivalent, choose a named first-line strong opioid, manage adverse effects, and taper-and-stop when there's no benefit \u2014 with a structured deprescribing schedule. Opioids Aware / Faculty of Pain Medicine / NICE chronic pain (NG193).",

          ["Wider plan","Opioids are an <b>adjunct</b> to a plan aimed at improving function, reducing disability and quality of life \u2014 not a standalone fix. Agree and document individualised functional goals."],
          ["Realistic expectations","Opioids rarely give complete relief; many chronic pains (low back pain, fibromyalgia, headache/migraine, abdominal/pelvic pain) <b>do not respond</b> to opioids. Neuropathic pain \u2192 see neuropathic-pain pathway, not opioids."],
          ["Agree the exit upfront","State clearly: <b>if the trial doesn't meet the goals, the opioid will be stopped</b> \u2014 even if no other treatment is available."],

        ]},
        {b:"warn", html:"<b>Cautions:</b> dependence/addiction (MHRA warning Sept 2020 \u2014 add a prominent label); <b>renal impairment</b> (reduce dose / seek advice if eGFR &lt;30); <b>driving</b> \u2014 don't drive when starting, adjusting, or if unfit; explain the drug-driving law."}
      ]},

    {t:"node", d:"life", n:"2", tag:"Non-drug · core", title:"Non-drug pain management", blocks:[{b:"tiles", v:"life", items:[{t:"🏃 Active strategies", html:"Exercise, physiotherapy, pacing and psychological therapy are first-line for chronic non-cancer pain \u2014 opioids are rarely the answer."},{t:"🎯 Set function goals", html:"Agree realistic function-based goals; explain opioids often don\u2019t help chronic pain and carry real harms."},{t:"🧠 Address drivers", html:"Treat mood, sleep and social factors that amplify pain."}]},{b:"why", html:"For chronic non-cancer pain, non-drug strategies (exercise, physio, psychological therapy) are first-line \u2014 opioids are reserved and reviewed, so non-drug care leads the plan."}]},
    {t:"node", d:"drug", n:"3", tag:"Step 1 \u00b7 the trial", title:"Run a proper, time-limited opioid trial",
      blocks:[
        {b:"p", html:"Trial with a <b>short (1\u20132 week) supply of immediate-release morphine</b> (tablets or liquid), letting the patient explore a range, e.g. <b>morphine 5\u201310mg</b>. Define a clear maximum daily dose \u2014 \u201Cas directed\u201D is never acceptable."},
        {b:"ladder", steps:[
          {step:"1a", title:"Immediate-release morphine trial", when:"start here",
           html:"Morphine IR 5\u201310mg, short supply, fixed dose range with a stated max/day. <b>If a single dose of morphine 20mg gives no useful pain reduction, opioids are unlikely to help long-term</b> \u2014 don't escalate."},
          {step:"1b", title:"Assess at 4 weeks against goals", when:"trial endpoint",
           fromLabel:"trial dose tolerated",
           html:"A <b>4-week trial is adequate</b>. Success = pain relief <b>and</b> progress towards functional goals. Initial positive response doesn't predict long-term benefit. If unsuccessful \u2192 taper and stop (Step 6)."},
          {step:"1c", title:"Convert to modified-release if continuing", when:"clear benefit + functional gain",

        ]},
        {b:"why", html:"Framing opioids as a <strong>monitored trial with a defined endpoint</strong> \u2014 rather than an open-ended prescription \u2014 is the core of safe opioid prescribing. The morphine-20mg single-dose test and the 4-week review give objective off-ramps before dependence sets in."}
      ]},

    {t:"node", d:"drug", n:"4", tag:"Step 2 \u00b7 choice & dose", title:"First-line strong opioid, named brands & the dose cap",

        {b:"table", head:["Opioid (brand)","Start","Primary-care max (\u224812h dose)","Status"], rows:[

          ["Buprenorphine patch (Butec\u00ae / Bupeaze\u00ae)","Butec 10mcg/h weekly","Bupeaze 52.5mcg/h twice weekly","Useful in renal impairment / swallowing difficulty"],
          ["Fentanyl patch (Opiodur\u00ae)","12mcg/h every 3 days","37mcg/h","Amber 2 \u2014 specialist only; NOT for opioid-na\u00efve/acute"],
          ["Tapentadol MR (Palexia\u00ae SR)","50mg BD","specialist","Amber 2 \u2014 pain-specialist initiation only (3rd line)"]
        ]},
        {b:"warn", html:"<b>Do not exceed 120mg/day OME without specialist input.</b> Risk of harm/mortality rises substantially above this with <b>no extra benefit</b>. Use the <b>ANZCA / Faculty of Pain Medicine opioid calculator</b> for equivalences. Fentanyl/buprenorphine patches are not for acute pain or opioid-na\u00efve patients."}
      ]},

    {t:"node", d:"drug", n:"5", tag:"Step 3 \u00b7 switching", title:"Switching opioids \u2014 do it safely",

          ["Use the calculator","Convert with the ANZCA / FPM opioid calculator; secondary care may use different brands \u2014 switch to the primary-care preferred brand."],
          ["Withdrawal on abrupt change","Sweating, yawning, abdominal cramps, anxiety, insomnia if reduced/stopped abruptly \u2014 common with <b>tramadol</b> and even weak opioids after short courses."]
        ]}
      ]},

    {t:"node", d:"safety", n:"6", tag:"Step 4 \u00b7 side effects & monitoring", title:"Manage adverse effects; review regularly",

      ]},

    {t:"node", d:"drug", n:"7", tag:"Step 5 \u00b7 deprescribe", title:"Taper and stop \u2014 a structured schedule",
      blocks:[

        {b:"ladder", steps:[

          {step:"6b", title:"Calculate total OME & confirm actual use", when:"plan the taper",
           fromLabel:"patient willing",
           html:"Total the OME across all opioids/routes (calculator). <b>Ask what they actually take</b> \u2014 don't assume the prescribed dose."},

           html:"Taper <b>10% of the original dose every 2 weeks or monthly</b>. Reduce <b>one opioid at a time, most potent first</b>; taper MR/patch first and switch IR liquid \u2192 tablets to count use. Don't let the patient up-titrate IR to compensate; don't issue scripts early."},

      ]},

    {t:"loop", icon:"\uD83D\uDD01", title:"Still in pain on opioids? Re-run the checklist",
      arrow:"\u2026the answer is rarely a higher dose",
      intro:"Persistent pain despite opioids means the opioids aren't working \u2014 not that the dose is too low.",
      checks:[

        {b:"4 \u00b7 Co-drugs", html:"On benzodiazepines/gabapentinoids/alcohol? High-risk \u2192 deprescribe."},

    {t:"node", d:"follow", n:"8", tag:"Monitoring & review", title:"Structured opioid review", arrow:"review \u2014 do not just re-prescribe", blocks:[{b:"timeline", items:[{n:"1", when:"At each review", title:"Function, not just pain", html:"Review <b>pain AND function/quality of life</b> \u2014 if the opioid is not delivering meaningful benefit, it should be reduced/stopped. Avoid escalating doses for chronic non-cancer pain; <b>doses above 120 mg/day oral morphine equivalent rarely add benefit</b> and increase harm."},{n:"2", when:"Ongoing", title:"Harms & dependence", html:"Monitor for sedation, constipation (co-prescribe laxative), tolerance, dependence and aberrant use. Avoid co-prescribing with benzodiazepines/gabapentinoids (respiratory depression)."},{n:"3", when:"If not helping", title:"Deprescribe", html:"Taper gradually (e.g. 10% of dose every 1\u20134 weeks) with support; faster if safety concern. Offer non-drug pain strategies and address mood/sleep."}]}, {b:"say", html:"Strong painkillers are only worth continuing if they genuinely improve what you can do. We\u2019ll review that regularly, and if they\u2019re not helping we\u2019ll reduce them slowly together."}]},

      blocks:[
        {b:"tiles", v:"refer", items:[
          {t:"Pain service", html:"Considering &gt;120mg/day OME, a more potent opioid (oxycodone/fentanyl/tapentadol \u2014 Amber 2), or refractory pain despite an adequate trial."},
          {t:"Drug & alcohol service", html:"Evidence of misuse, abuse, diversion, or opioid-use disorder \u2192 specialist substance-misuse support alongside the taper."},
          {t:"Specialist taper support", html:"Complex/high-dose tapers, significant psychological distress, or failed previous attempts \u2014 shared care with the pain team."},
          {t:"Reassess the diagnosis", html:"New or changing pain, red flags, or a treatable cause (e.g. joint requiring replacement) \u2192 appropriate specialty."}
        ]},
        {b:"say", html:"We'll try this as a time-limited test with clear goals. Opioids only help some pains, and if it isn't improving what you can do, the safest thing is to come off it slowly \u2014 most people actually feel better in themselves once the dose comes down, even if the pain doesn't change much."}
