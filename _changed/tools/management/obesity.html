MG.render({

  stemSub:"Primary-care management of obesity \u2014 classify by BMI (with ethnicity adjustment) and waist, screen for secondary causes and comorbidity, deliver the tiered weight-management pathway from lifestyle to pharmacotherapy to bariatric surgery, with non-stigmatising support. NICE CG189 / NG246 \u00b7 2026.",

    {lbl:"Foundation", val:"Diet + activity + behaviour", sub:"Tier 1\u20132"},
    {lbl:"Pharmacotherapy", val:"GLP-1 / orlistat", sub:"within NICE criteria"},

    {lbl:"Screen", val:"T2DM, BP, lipids, OSA, NAFLD", sub:"comorbidity"},
    {lbl:"Approach", val:"Non-stigmatising", sub:"raise sensitively"}

  flow:[
    {t:"node", d:"found", n:"1", tag:"Foundation", title:"Classify + assess",
      blocks:[

          ["Waist circumference","Adds risk information \u2014 high waist (or waist-to-height ratio &gt;0.5) raises cardiometabolic risk at any BMI"],
          ["Secondary causes","Screen for hypothyroidism, Cushing\u2019s, PCOS, hypothalamic causes, and drug-induced gain (antipsychotics, steroids, insulin/sulfonylureas, some antiepileptics)"],
          ["Assess","Comorbidity, eating pattern/disorder, mental health, sleep (OSA), mobility, medications, readiness to change, social factors"]
        ]},
        {b:"why", html:"Obesity is a chronic relapsing disease, not a willpower failure. Classifying severity and screening for secondary causes and comorbidity directs the intensity of intervention; ethnicity-adjusted thresholds matter in UK practice."}
      ]},
    {t:"node", d:"safety", n:"2", tag:"Don't miss", title:"Comorbidity + sensitive approach",

        {b:"tiles", v:"safety", items:[

          {t:"🧠 Mental health / eating disorder", html:"Screen for depression and binge-eating/eating disorder before weight-focused intervention."},

        {b:"warn", html:"Pharmacotherapy and surgery are adjuncts to \u2014 not replacements for \u2014 lifestyle change, and need ongoing support and monitoring (e.g. lifelong vitamins/micronutrients post-bariatric)."}

          {t:"Endocrine", html:"Suspected secondary cause (Cushing\u2019s, hypothyroid not explaining, hypothalamic)."},
          {t:"Mental health / eating disorder", html:"Binge-eating disorder, significant depression."}
        ]},

      ]}
  ],
  foot:"Tiered management of obesity in primary care; pharmacotherapy and bariatric surgery are adjuncts within specialist pathways. Verify against current NICE CG189 / NG246 and local weight-management service criteria."
