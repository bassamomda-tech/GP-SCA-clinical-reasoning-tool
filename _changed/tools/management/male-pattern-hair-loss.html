MG.render({"icon":"💈","title":"Male Pattern Hair Loss","guideline":"NICE CKS","stemTitle":"Androgenetic alopecia (male) — reassure, explain options","stemSub":"Primary-care management of male-pattern hair loss — a benign, common, androgen-dependent process; confirm the typical pattern, exclude other causes of hair loss, and counsel on the (largely non-NHS) treatment options of topical minoxidil and oral finasteride. NICE CKS · 2026.","glance":[{"lbl":"Pattern","val":"Temporal recession + vertex","sub":"gradual, post-pubertal"},{"lbl":"Diagnosis","val":"Clinical","sub":"no tests if typical"},{"lbl":"Options","val":"Minoxidil / finasteride","sub":"usually private"},{"lbl":"Exclude","val":"Scarring / patchy / diffuse","sub":"other causes"},{"lbl":"Reassure","val":"Benign + cosmetic","sub":"no treatment needed"},{"lbl":"Note","val":"Finasteride counselling","sub":"sexual SEs, pregnancy handling"}],"flow":[{"t":"node","d":"found","n":"1","tag":"Foundation","title":"Confirm + exclude other causes","blocks":[{"b":"kv","rows":[["Typical","Gradual, symmetrical bitemporal recession + vertex thinning post-puberty; family history; otherwise well; no scarring or inflammation"],["Exclude","<b>Scarring alopecia</b> (smooth shiny patches, lost follicles → refer), alopecia areata (discrete patches, exclamation-mark hairs), telogen effluvium (diffuse shedding after illness/stress), tinea capitis (children, scaling), traction"],["Screen if atypical","Diffuse/rapid loss → ferritin, TFTs, consider other causes"],["Diagnosis","Clinical — no investigations needed for typical androgenetic pattern"]]},{"b":"why","html":"Male androgenetic alopecia is a benign cosmetic diagnosis made clinically. The reasoning is to recognise the classic pattern and exclude the treatable/serious mimics — scarring alopecia (irreversible, needs dermatology) and tinea capitis — before reassuring."}]},{"t":"node","d":"safety","n":"2","tag":"Safety-net","title":"When to look harder","blocks":[{"b":"tiles","v":"safety","items":[{"t":"🔴 Scarring alopecia","html":"Smooth, shiny areas with loss of follicular openings, redness/scaling → refer dermatology (potentially irreversible)."},{"t":"🟠 Patchy / exclamation hairs","html":"Alopecia areata — autoimmune; reassure (often regrows) ± dermatology for extensive disease."},{"t":"🟠 Diffuse shedding","html":"Telogen effluvium (post-illness/stress/childbirth/drugs) — usually recovers; check ferritin/TFTs."},{"t":"🧒 Tinea capitis","html":"Child with scaly patch + broken hairs → mycology + systemic antifungal."}]}]},{"t":"node","d":"life","n":"3","tag":"Non-drug · supportive","title":"Supportive & cosmetic","blocks":[{"b":"tiles","v":"life","items":[{"t":"💇 Cosmetic options","html":"Sympathetic styling, hair systems, or surgical transplant (private) for those who wish."},{"t":"🧠 Set expectations","html":"Reassure it is physiological; acknowledge psychological impact; treatment is optional."},{"t":"🧴 Gentle care","html":"No specific diet/product reverses it — avoid spending on unevidenced remedies."}]},{"b":"why","html":"Androgenetic alopecia is physiological — non-drug management is realistic counselling and cosmetic options for those who want them."}]},{"t":"node","d":"drug","n":"4","tag":"Treatment","title":"Options (counsel: largely private)","blocks":[{"b":"ladder","steps":[{"step":"Option 1","title":"Topical minoxidil","when":"first-line, OTC/private","html":"Minoxidil 5% solution/foam applied to the scalp; slows loss and can partially regrow; effect maintained only while continued; initial shedding common. Bought OTC (not NHS for cosmetic alopecia)."},{"step":"Option 2","title":"Oral finasteride","when":"if preferred","fromLabel":"private prescription","html":"5α-reductase inhibitor 1 mg/day; slows loss/promotes regrowth in many; <b>counsel on sexual side effects</b> (libido/erectile/ejaculatory, usually reversible) and that women who are/could be pregnant must not handle crushed/broken tablets (teratogenic to male fetus)."},{"step":"Other","title":"Cosmetic / acceptance","when":"alternatives","fromLabel":"non-drug","html":"Hairpieces, surgical transplant (private), or simply reassurance — many men need no treatment."}]},{"b":"warn","html":"These treatments are generally not available on the NHS for cosmetic male-pattern baldness. Set realistic expectations: benefit is maintained only while treatment continues."}]},{"t":"node","d":"follow","n":"5","tag":"Follow-up","title":"Review response","blocks":[{"b":"timeline","items":[{"n":"1","when":"3–6 months","title":"Early shedding","html":"Minoxidil commonly causes initial shedding; finasteride benefit also takes months. Set realistic expectations — treatment <b>slows loss/partially regrows</b>, it doesn't restore a full head of hair."},{"n":"2","when":"6–12 months","title":"Assess & continue","html":"Judge response at 6–12 months. Effect maintained <b>only while continued</b>; gains reverse within ~12 months of stopping. Counsel finasteride sexual side effects (usually reversible) and pregnancy-handling precautions."},{"n":"3","when":"Note","title":"Mostly private","html":"These are largely private prescriptions in the NHS; document the counselling and the patient's informed choice."}]},{"b":"say","html":"These treatments slow the loss and only work while you keep using them — if you stop, the benefit fades within about a year. Let's review how it's going in six months."}]},{"t":"node","d":"refer","n":"6","tag":"Refer","title":"Referral","blocks":[{"b":"tiles","v":"refer","items":[{"t":"Dermatology","html":"Suspected scarring alopecia, diagnostic uncertainty, extensive alopecia areata."},{"t":"Manage / reassure","html":"Typical androgenetic alopecia — explain options; no NHS treatment indicated."}]},{"b":"say","html":"This is common male-pattern hair loss — harmless and runs in families. It doesn’t need treatment, but if you want to slow it down there are two main options: a lotion you rub on (minoxidil) or a daily tablet (finasteride), usually bought privately. Both only work while you keep using them, and the tablet can affect sex drive in a small number of men."}]}],"foot":"Management of male androgenetic alopecia in primary care — a benign cosmetic diagnosis; treatments are largely non-NHS. Verify against current NICE CKS and the BNF."});
