MG.render({"icon":"⚡","title":"Trigeminal Neuralgia","guideline":"NICE CKS / NG173","stemTitle":"Trigeminal neuralgia — carbamazepine first-line; refer red flags","stemSub":"Primary-care management of trigeminal neuralgia — recognise the characteristic paroxysmal facial pain, start carbamazepine, and refer for MRI/neurosurgery when atypical, red-flag, or refractory. NICE CKS · NG173 · 2026.","glance":[{"lbl":"Hallmark","val":"Brief electric-shock facial pain","sub":"trigger zones, unilateral"},{"lbl":"1st-line","val":"Carbamazepine","sub":"titrate to effect"},{"lbl":"Monitor","val":"FBC, U&E, LFTs","sub":"+ HLA-B*1502 if relevant"},{"lbl":"Atypical/young","val":"MRI","sub":"exclude MS / lesion"},{"lbl":"Refractory","val":"Neurology/neurosurgery","sub":"MVD / procedures"},{"lbl":"Red flag","val":"Sensory loss, deafness, <40, bilateral","sub":"= refer + image"}],"flow":[{"t":"node","d":"found","n":"1","tag":"Foundation","title":"Recognise + red flags","blocks":[{"b":"kv","rows":[["Typical","Sudden, severe, brief (seconds) <b>electric-shock/stabbing</b> pain in V2/V3 distribution; unilateral; triggered by touch, chewing, talking, cold wind, brushing teeth; refractory periods between paroxysms"],["Red flags","Sensory deficit, hearing loss, age &lt;40, bilateral pain, other cranial-nerve signs, optic neuritis history → suggest secondary cause (MS, tumour) → MRI"],["Differentials","Dental pathology, temporomandibular disorder, cluster/other headache, giant cell arteritis, post-herpetic neuralgia"],["Assess","Impact (eating, weight loss, mood — suicide risk in severe), examination of cranial nerves"]]},{"b":"why","html":"Trigeminal neuralgia is the one neuropathic-pain condition NG173 treats differently — carbamazepine first-line, not the usual four agents. Recognising red flags (sensory loss, young age, bilateral) prompts MRI to exclude MS or a posterior-fossa lesion."}]},{"t":"node","d":"life","n":"2","tag":"Non-drug · alongside medication","title":"Trigger avoidance & supportive care","blocks":[{"b":"tiles","v":"life","items":[{"t":"❄️ Avoid triggers","html":"Identify and avoid cutaneous trigger zones — cold wind (scarf), chewing, talking, shaving, tooth-brushing, light touch. Small adaptations reduce attack frequency."},{"t":"🍲 Protect nutrition","html":"During flares, a soft/liquid diet and lukewarm food help maintain intake — weight loss and dehydration from pain on eating are real risks."},{"t":"🦷 Oral care","html":"Maintain dental hygiene with adaptations (e.g. lukewarm water, soft brush) and ensure dental causes are excluded."},{"t":"🧠 Mood & support","html":"Severe TN carries a real risk of low mood and suicidal ideation — ask directly, signpost support, and treat as a reason to expedite control."}]},{"b":"why","html":"Trigeminal neuralgia is primarily treated with medication, but identifying and avoiding cutaneous trigger zones genuinely reduces attacks, and protecting nutrition and mental health matters because the pain can be severe enough to stop eating and drive suicidal thoughts."}]},{"t":"node","d":"drug","n":"3","tag":"Treatment","title":"Carbamazepine first-line","blocks":[{"b":"ladder","steps":[{"step":"1st-line","title":"Carbamazepine","when":"start low, titrate","html":"Start low (e.g. 100 mg OD/BD) and titrate to symptom control; aim for lowest effective dose; attempt to reduce during remissions. Monitor FBC, U&E (hyponatraemia), LFTs; counsel on rash (consider HLA-B*1502 in relevant ancestry — SJS risk)."},{"step":"Alternatives","title":"Oxcarbazepine / lamotrigine / baclofen","when":"if intolerant/inadequate","fromLabel":"if carbamazepine fails","html":"Specialist-guided alternatives (oxcarbazepine, lamotrigine, gabapentin, baclofen) — often initiated/advised by neurology."},{"step":"Refractory","title":"Neurosurgical options","when":"refractory","fromLabel":"if medical therapy fails","html":"Microvascular decompression, or ablative procedures (gamma knife, glycerol/radiofrequency rhizotomy) — neurosurgery."}]},{"b":"warn","html":"Severe uncontrolled trigeminal neuralgia can prevent eating/drinking and carries a suicide risk — escalate urgently if pain is uncontrolled or the patient is dehydrated/distressed."}]},{"t":"node","d":"monitor","n":"4","tag":"Monitoring","title":"Carbamazepine safety monitoring","blocks":[{"b":"table","head":["Watch for","Test / action","When"],"rows":[["Bone-marrow suppression (agranulocytosis, aplastic anaemia)","<b>FBC</b> — baseline then periodically; stop &amp; urgent FBC if fever, sore throat, mouth ulcers, bruising","Baseline + if symptomatic"],["Hyponatraemia (SIADH)","<b>U&amp;E / sodium</b> — esp. elderly, on diuretics, or if drowsy/confused","Baseline + periodic"],["Hepatotoxicity","<b>LFTs</b> — baseline and if symptomatic","Baseline + periodic"],["Serious skin reaction (SJS/TEN)","Stop immediately for any rash; consider <b>HLA-B*1502</b> testing in Han Chinese/Thai ancestry before starting","Counsel at start"],["Enzyme induction (interactions)","Reduces efficacy of <b>hormonal contraception, DOACs/warfarin, lamotrigine, many drugs</b> — review co-prescriptions","At start &amp; each change"]]},{"b":"warn","html":"<b>⚠ Carbamazepine is a potent enzyme inducer and marrow/skin risk drug.</b> Warn every patient: a sore throat, mouth ulcers, fever, bruising or any rash means <b>stop and seek same-day review with an urgent FBC</b>. Check contraceptive cover."}]},{"t":"node","d":"follow","n":"5","tag":"Follow-up","title":"Titration & review","blocks":[{"b":"timeline","items":[{"n":"1","when":"From start","title":"Titrate carbamazepine","html":"Start <b>carbamazepine 100 mg OD/BD</b>, titrate to the lowest effective dose; monitor FBC, U&amp;E (hyponatraemia) and LFTs. Aim to reduce dose during remissions."},{"n":"2","when":"If intolerant/ineffective","title":"Alternatives","html":"Carbamazepine not tolerated/effective → specialist-guided options (oxcarbazepine, lamotrigine, gabapentin, baclofen)."},{"n":"3","when":"Red flags / refractory","title":"Refer","html":"Refer to neurology for refractory pain, diagnostic doubt, or red flags (sensory loss, age <40, bilateral) → MRI to exclude MS/posterior-fossa lesion; consider surgical options (microvascular decompression)."}]},{"b":"say","html":"We build the carbamazepine up slowly with some blood tests, and it usually controls the pain well. If it doesn't, or there are warning features, a neurologist can arrange a scan and other options."}]},{"t":"node","d":"safety","n":"6","tag":"Safety-net","title":"Red flags → image & refer","blocks":[{"b":"tiles","v":"safety","items":[{"t":"🟠 Atypical features","html":"Sensory loss, age under 40, bilateral pain, or other neurology → MRI to exclude MS or a posterior-fossa lesion."},{"t":"🔴 Progressive / refractory","html":"Progressive deficit, systemic features, or pain uncontrolled despite carbamazepine → urgent neurology."},{"t":"💬 Safety-net","html":"If you notice facial numbness, the pain becomes bilateral, or it stops responding to the tablets, contact us."}]}]},{"t":"node","d":"refer","n":"7","tag":"Refer","title":"Referral","blocks":[{"b":"tiles","v":"refer","items":[{"t":"Neurology + MRI","html":"Red flags (sensory loss, &lt;40, bilateral, cranial-nerve signs), diagnostic uncertainty, or to exclude MS/secondary cause."},{"t":"Urgent","html":"Uncontrolled pain, unable to eat/drink, dehydration, significant distress/suicidality."},{"t":"Neurosurgery","html":"Refractory to medical therapy — for MVD/ablative procedures."},{"t":"Dental","html":"If dental cause possible — exclude."}]},{"b":"say","html":"This is trigeminal neuralgia — brief, severe electric-shock pains in the face, often set off by touch, eating or cold air. The most effective tablet is carbamazepine, which we build up slowly with some blood-test monitoring. If it doesn’t control the pain, or there are unusual features, we’ll arrange a brain scan and specialist review — there are good procedures for stubborn cases."}]}],"foot":"Management of trigeminal neuralgia in primary care — carbamazepine first-line; refer red flags/refractory cases for imaging and neurosurgery. Verify against current NICE CKS and NG173."});
