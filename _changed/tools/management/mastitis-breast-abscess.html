MG.render({"icon":"🌸","title":"Mastitis & Breast Abscess","guideline":"NICE CKS","stemTitle":"Mastitis — keep milk flowing, antibiotics if needed, drain abscess","stemSub":"Primary-care management of lactational (and non-lactational) mastitis — continue effective milk removal, treat with antibiotics when infection is likely or not settling, drain abscesses, support breastfeeding, and recognise inflammatory breast cancer. NICE CKS · 2026.","glance":[{"lbl":"Lactational","val":"Keep feeding/expressing","sub":"effective milk removal"},{"lbl":"Antibiotic","val":"Flucloxacillin","sub":"if not settling / systemic / fissure"},{"lbl":"Abscess","val":"USS + drainage","sub":"aspiration/incision"},{"lbl":"Continue","val":"Breastfeeding safe","sub":"encourage"},{"lbl":"Non-lactational","val":"Consider anaerobes","sub":"co-amoxiclav; smoking link"},{"lbl":"Red flag","val":"Not resolving / peau d’orange","sub":"= exclude inflammatory cancer"}],"flow":[{"t":"node","d":"safety","n":"1","tag":"Safety-net","title":"Don't-miss + when to escalate","blocks":[{"b":"tiles","v":"safety","items":[{"t":"🔴 Breast abscess","html":"Fluctuant, very tender localised swelling, not settling on antibiotics → urgent USS + drainage (aspiration or incision)."},{"t":"🔴 Inflammatory breast cancer","html":"‘Mastitis’ not resolving with treatment, peau d’orange, skin changes, nipple change, no clear infective trigger (esp. non-lactating) → 2WW breast referral."},{"t":"🟠 Sepsis","html":"Systemically very unwell → admit."},{"t":"🍼 Support feeding","html":"Stopping milk flow worsens mastitis — continue feeding/expressing from the affected side."}]},{"b":"why","html":"Most mastitis settles with milk removal ± antibiotics, but the two pitfalls are missing an abscess (needs drainage) and mislabelling inflammatory breast cancer as infection — any ‘mastitis’ that doesn’t resolve must be referred under the 2WW pathway."}]},{"t":"node","d":"found","n":"2","tag":"Foundation","title":"Assess","blocks":[{"b":"kv","rows":[["Lactational mastitis","Painful, red, swollen, wedge-shaped area + flu-like symptoms in a breastfeeding woman; often from milk stasis ± bacterial infection (S. aureus, often via nipple fissure)"],["Non-lactational","Periductal mastitis (smokers), duct ectasia; mixed organisms incl. anaerobes; consider granulomatous mastitis"],["Assess","Duration, systemic features, nipple fissure, fluctuance (abscess), feeding technique"],["Culture","Breast milk/aspirate culture if not responding, recurrent, or hospital-acquired"]]}]},{"t":"node","d":"life","n":"3","tag":"Non-drug · first-line","title":"Continue milk removal","blocks":[{"b":"tiles","v":"life","items":[{"t":"🤱 Keep feeding/expressing","html":"Effective, frequent milk removal from the affected breast is the key treatment — safe to continue breastfeeding."},{"t":"🧊 Comfort","html":"Warm compress before feeds, cold packs after; simple analgesia (paracetamol/ibuprofen)."},{"t":"🤱 Latch support","html":"Review positioning/latch with infant-feeding support to prevent recurrence."}]},{"b":"why","html":"Most lactational mastitis settles with effective milk removal — continuing to feed/express is the central treatment, antibiotics added only if not improving."}]},{"t":"node","d":"drug","n":"4","tag":"Treatment","title":"Milk removal + antibiotics","blocks":[{"b":"ladder","steps":[{"step":"Step 1","title":"Effective milk removal + analgesia","when":"all lactational","html":"Continue breastfeeding/expressing, ensure good attachment/positioning (lactation support), warm compress before feeds, analgesia (paracetamol/ibuprofen — compatible with breastfeeding). Many resolve in 24–48h."},{"step":"Step 2","title":"Antibiotics","when":"infection likely / not settling","fromLabel":"if systemic, fissure, or no improvement in 24h","html":"Lactational: flucloxacillin 10–14 days (erythromycin if penicillin-allergic, preferred in pregnancy). Non-lactational/periductal: co-amoxiclav 500/125 tds 10–14 days (penicillin-allergic → erythromycin or clarithromycin, plus metronidazole). Refer to breast clinic if not settling after 2 weeks of antibiotics."},{"step":"Step 3","title":"Drain abscess","when":"if fluctuant / not resolving","fromLabel":"if abscess","html":"USS-guided needle aspiration (± repeat) or incision and drainage; send pus for culture."}]},{"b":"warn","html":"Breastfeeding from the affected breast is safe and beneficial — encourage continuation. Don’t forget smoking cessation in recurrent periductal mastitis."}]},{"t":"node","d":"follow","n":"5","tag":"Follow-up","title":"Review & breastfeeding","blocks":[{"b":"timeline","items":[{"n":"1","when":"48–72 h","title":"Reassess response","html":"Review within 48–72 h. <b>Continue breastfeeding/expressing</b> from the affected side (safe and aids drainage). If not improving on antibiotics, reconsider abscess (USS) or inflammatory breast cancer."},{"n":"2","when":"If abscess","title":"Drainage","html":"Confirmed abscess → <b>USS-guided needle aspiration</b> (or incision &amp; drainage) plus antibiotics; refer to breast surgery same-day if large/not resolving."},{"n":"3","when":"Non-lactational / recurrent","title":"Investigate","html":"Recurrent or non-lactational mastitis, or any residual mass after resolution → refer for breast imaging to exclude malignancy; address smoking (periductal mastitis)."}]},{"b":"say","html":"Keep feeding or expressing from that side — it helps it clear and is safe for the baby. If it's not better in a couple of days or a lump develops, come straight back."}]},{"t":"node","d":"refer","n":"6","tag":"Refer","title":"Referral","blocks":[{"b":"tiles","v":"refer","items":[{"t":"2WW breast","html":"Non-resolving ‘mastitis’, skin/nipple changes, suspected inflammatory breast cancer."},{"t":"Breast surgery / USS","html":"Suspected abscess for imaging + drainage; recurrent periductal mastitis/fistula."},{"t":"Infant feeding / lactation","html":"Breastfeeding support to correct attachment and prevent recurrence."},{"t":"Admit","html":"Sepsis or severe systemic illness."}]},{"b":"say","html":"This is mastitis — inflammation of the breast, common when breastfeeding. The most important treatment is keeping the milk flowing by feeding or expressing, plus painkillers; if it’s not settling or you’re feverish we’ll add antibiotics. Breastfeeding is safe to continue. If a tender lump forms or it doesn’t clear up, we’ll arrange a scan and review."}]}],"foot":"Management of mastitis and breast abscess in primary care; non-resolving ‘mastitis’ needs 2WW referral to exclude inflammatory breast cancer. Verify against current NICE CKS Mastitis and breast abscess."});
</script>
