MG.render({"icon":"🪨","title":"Renal Colic & Stones","guideline":"NICE NG118","stemTitle":"Renal/ureteric colic — NSAID analgesia, image, watch for the septic/obstructed kidney","stemSub":"Primary-care management of renal colic — relieve pain with an NSAID, arrange urgent CT KUB, recognise the infected obstructed kidney (an emergency), and support stone passage or onward urology referral. NICE NG118 · 2026.","glance":[{"lbl":"Analgesia","val":"NSAID first-line","sub":"e.g. PR/IM diclofenac"},{"lbl":"Image","val":"CT KUB","sub":"urgent (within 24h)"},{"lbl":"Emergency","val":"Infection + obstruction","sub":"= same-day urology"},{"lbl":"Small stones","val":"May pass spontaneously","sub":"± MET (alpha-blocker)"},{"lbl":"Check","val":"U&E, urate, calcium, urine","sub":"+ pregnancy test"},{"lbl":"Red flag","val":"Sepsis / AKI / single kidney","sub":"= admit"}],"flow":[{"t":"node","d":"safety","n":"1","tag":"Safety-net","title":"Emergencies","blocks":[{"b":"tiles","v":"safety","items":[{"t":"🔴 Infected obstructed kidney","html":"Fever/sepsis + obstructing stone → <b>urological emergency</b> (same-day) — needs decompression (nephrostomy/stent); rapidly life-threatening."},{"t":"🔴 AKI / single kidney / bilateral","html":"Obstruction with rising creatinine, solitary or transplant kidney, or bilateral stones → admit/urgent urology."},{"t":"🟠 Uncontrolled pain / vomiting","html":"Unable to manage pain or fluids → admit."},{"t":"🤰 Exclude mimics","html":"Always exclude ruptured AAA (older patients), ectopic pregnancy (pregnancy test), appendicitis, biliary/bowel pathology."}]},{"b":"why","html":"The killer to recognise is the infected, obstructed kidney — sepsis behind an obstructing stone needs emergency decompression. In older patients, a ruptured AAA can masquerade as renal colic, so it must be actively excluded."}]},{"t":"node","d":"found","n":"2","tag":"Foundation","title":"Diagnose + investigate","blocks":[{"b":"kv","rows":[["Presentation","Sudden severe loin-to-groin colicky pain, unable to get comfortable, ± haematuria, nausea/vomiting, urinary urgency"],["Imaging","<b>Low-dose CT KUB</b> is first-line, ideally within 24h (USS in pregnancy/young/where CT not appropriate)"],["Bloods/urine","U&E (renal function), FBC/CRP (infection), calcium, urate; urine dip (haematuria) + MC&S; pregnancy test"],["Stone analysis","Sieve urine/retrieve stone for analysis; assess metabolic risk if recurrent"]]}]},{"t":"node","d":"drug","n":"3","tag":"Treatment","title":"Analgesia + stone management","blocks":[{"b":"ladder","steps":[{"step":"Step 1","title":"NSAID analgesia","when":"first-line","html":"NSAID (e.g. diclofenac IM/PR or oral) is first-line for renal colic pain; IV paracetamol or opioid if NSAID contraindicated/insufficient; antiemetic."},{"step":"Step 2","title":"Expectant + MET for small stones","when":"distal ureteric < 10 mm, no red flags","fromLabel":"if stone likely to pass","html":"Many stones &lt;5–10 mm pass spontaneously — hydration + analgesia; consider <b>medical expulsive therapy</b> with an alpha-blocker (<b>tamsulosin 400 micrograms OD</b>) for distal ureteric stones (esp. ~5–10 mm); strain urine; safety-net."},{"step":"Step 3","title":"Urology intervention","when":"large/obstructing/not passing","fromLabel":"if won’t pass / complications","html":"Refer for shockwave lithotripsy (ESWL), ureteroscopy, or PCNL depending on size/site; emergency decompression if infected/obstructed."}]},{"b":"warn","html":"Arrange imaging promptly — don’t assume colic without confirming. Strong NSAID caution in AKI/CKD; reassess renal function."}]},{"t":"node","d":"life","n":"4","tag":"Prevention","title":"Reduce recurrence","blocks":[{"b":"tiles","v":"life","items":[{"t":"💧 Fluids","html":"High fluid intake (2.5–3 L/day) to keep urine dilute — the key preventive measure."},{"t":"🧂 Diet","html":"Reduce salt + excess animal protein; normal dietary calcium (don’t restrict); reduce oxalate if oxalate stones."},{"t":"⚖️ Weight","html":"Weight management; treat metabolic contributors (e.g. high urate/gout)."},{"t":"🔁 Recurrent","html":"Metabolic stone work-up + targeted prevention (e.g. thiazide, potassium citrate, allopurinol) per stone type."}]}]},{"t":"node","d":"follow","n":"5","tag":"Follow-up","title":"After the acute episode","blocks":[{"b":"timeline","items":[{"n":"1","when":"Stone passage","title":"Expect & support","html":"Stones <5 mm usually pass spontaneously; <b>NSAID (e.g. diclofenac) is first-line analgesia</b>, consider <b>tamsulosin 400 microgram OD</b> as medical expulsive therapy for distal ureteric stones 5–10 mm. Strain urine; arrange imaging follow-up."},{"n":"2","when":"Urology / imaging","title":"Intervention if needed","html":"Stone not passed, >10 mm, or ongoing symptoms → urology for lithotripsy/ureteroscopy. Same-day if <b>obstruction + infection (emergency), single kidney, or uncontrolled pain/AKI</b>."},{"n":"3","when":"Prevention","title":"Metabolic & lifestyle","html":"After a first/recurrent stone: <b>high fluid intake (2.5–3 L/day)</b>, reduce salt, normal dietary calcium; send stone for analysis; check calcium/urate/U&amp;E; refer recurrent stone-formers for metabolic work-up."}]},{"b":"say","html":"Most small stones pass on their own with good pain relief and plenty of fluids. To stop them coming back, drinking more water is the single best thing — and we'll check why it formed."}]},{"t":"node","d":"refer","n":"6","tag":"Refer","title":"Referral","blocks":[{"b":"tiles","v":"refer","items":[{"t":"Emergency","html":"Infected obstructed kidney, sepsis, AKI, solitary/bilateral, uncontrolled pain/vomiting."},{"t":"Urology","html":"Stones not passing, large/proximal stones, recurrent stones, intervention required."},{"t":"Imaging","html":"Urgent CT KUB if not already done."}]},{"b":"say","html":"This is renal colic — pain from a kidney stone moving down the tube to the bladder. An anti-inflammatory painkiller works best, and we’ll arrange a scan. Many small stones pass by themselves with fluids and time, sometimes helped by a tablet that relaxes the tube. If you develop a fever, that’s urgent — a blocked, infected kidney needs same-day treatment. Drinking plenty helps prevent future stones."}]}],"foot":"Management of renal/ureteric colic in primary care; infected obstructed kidney is an emergency. Verify against current NICE NG118 Renal and ureteric stones."});
</script>
