MG.render({"icon":"🧒","title":"Nappy Rash","guideline":"NICE CKS","stemTitle":"Nappy rash — barrier + nappy care; treat candida, spot the mimics","stemSub":"Primary-care management of irritant nappy dermatitis — the commonest infantile rash; treat with nappy-care advice and barrier preparations, recognise and treat candidal superinfection, and consider safeguarding and other diagnoses when atypical. NICE CKS · 2026.","glance":[{"lbl":"Commonest","val":"Irritant dermatitis","sub":"spares the skin folds"},{"lbl":"Cornerstone","val":"Nappy care + barrier","sub":"frequent changes, air time"},{"lbl":"Candida","val":"Topical antifungal","sub":"satellite lesions, involves folds"},{"lbl":"Inflamed","val":"Mild hydrocortisone (short)","sub":"if significant"},{"lbl":"Mimics","val":"Seborrhoeic, psoriasis, eczema","sub":"+ rarer causes"},{"lbl":"Red flag","val":"Atypical / unwell / safeguarding","sub":"= reconsider"}],"flow":[{"t":"node","d":"found","n":"1","tag":"Foundation","title":"Diagnose + distinguish","blocks":[{"b":"kv","rows":[["Irritant (commonest)","Erythema on the convex skin in contact with the nappy (buttocks, genitals), <b>sparing the skin folds</b>; from urine/faeces, friction, moisture"],["Candidal","Beefy-red rash <b>involving the folds</b> with satellite papules/pustules; consider after antibiotics or if &gt;3 days unresponsive"],["Mimics","Seborrhoeic dermatitis (folds + scalp/cradle cap), atopic eczema, psoriasis, bacterial infection (impetigo); rarely Langerhans cell histiocytosis, zinc deficiency, scabies"],["Assess","Duration, severity, feeding/antibiotics, systemic features, other skin sites"]]},{"b":"why","html":"Nappy rash is usually simple irritant dermatitis (sparing folds), but involvement of the folds with satellite lesions signals candida, and atypical/persistent or systemic features should prompt reconsidering the diagnosis (including, rarely, safeguarding or serious dermatoses)."}]},{"t":"node","d":"life","n":"2","tag":"Treatment","title":"Nappy care + barrier","blocks":[{"b":"tiles","v":"life","items":[{"t":"👶 Frequent changes","html":"Change nappies promptly/frequently; high-absorbency nappies; clean gently with water or fragrance-free wipes."},{"t":"💨 Nappy-free time","html":"Let skin air/dry; pat dry, avoid vigorous rubbing."},{"t":"🛡️ Barrier preparation","html":"Thin layer of a barrier product (e.g. zinc & castor oil / soft white paraffin) at each change to protect skin."},{"t":"🧴 Avoid irritants","html":"Avoid soap, bubble bath, talcum powder, and fragranced products."}]}]},{"t":"node","d":"drug","n":"3","tag":"Treatment","title":"When to add medication","blocks":[{"b":"ladder","steps":[{"step":"Step 1","title":"Barrier + nappy care","when":"all","html":"Most irritant nappy rash resolves with the measures above within a few days."},{"step":"Step 2","title":"Topical antifungal","when":"candida suspected/confirmed","fromLabel":"if folds involved / satellite lesions / >3 days","html":"Topical imidazole (<b>clotrimazole 1%</b> or <b>miconazole 2% cream</b>, apply 2–3 times daily) for candidal nappy dermatitis; apply with barrier care; consider oral candidiasis (treat if present)."},{"step":"Step 3","title":"Short mild topical corticosteroid","when":"significantly inflamed","fromLabel":"if marked inflammation","html":"Hydrocortisone 1% once daily for up to 7 days for inflamed dermatitis (can combine concept with antifungal if candida); avoid potent steroids in the nappy area."},{"step":"Step 4","title":"Antibiotic","when":"if bacterial","fromLabel":"if impetiginised","html":"Treat secondary bacterial infection (e.g. impetigo) per NG153."}]},{"b":"warn","html":"Avoid potent topical steroids and prolonged steroid use in the occluded nappy area. Reconsider the diagnosis if not improving despite appropriate treatment."}]},{"t":"node","d":"follow","n":"4","tag":"Follow-up","title":"Review & recurrence","blocks":[{"b":"timeline","items":[{"n":"1","when":"3–7 days","title":"Reassess","html":"Simple irritant rash should improve within days of barrier care. If not improving, reassess for <b>candida</b> (satellite lesions → topical imidazole) or bacterial infection."},{"n":"2","when":"Persistent / atypical","title":"Reconsider diagnosis","html":"Consider seborrhoeic/atopic dermatitis, psoriasis, or (rarely) zinc deficiency/immunodeficiency if persistent, severe or atypical."},{"n":"3","when":"Prevention","title":"Skin care","html":"Frequent nappy changes, barrier preparation at each change, nappy-free time, avoid soap/wipes with fragrance."}]},{"b":"say","html":"Frequent changes, a barrier cream and some nappy-free time usually clears it in a few days. If it's not settling or there are little red spots spreading out, it may be thrush and need an antifungal."}]},{"t":"node","d":"safety","n":"5","tag":"Safety-net","title":"When to reassess","blocks":[{"b":"tiles","v":"safety","items":[{"t":"🟠 Not settling","html":"No better after a few days of barrier care, or worsening → reassess for candida (satellite lesions) or bacterial infection."},{"t":"🔴 Systemic / atypical","html":"Fever, blistering, erosions, or an unwell baby → same-day review; consider other diagnoses."},{"t":"💬 Safety-net","html":"If the rash blisters, weeps, spreads, or your baby is unwell or feverish, see us promptly."}]}]},{"t":"node","d":"refer","n":"6","tag":"Refer","title":"Referral","blocks":[{"b":"tiles","v":"refer","items":[{"t":"Reconsider / dermatology","html":"Severe, persistent or atypical rash not responding to treatment; suspected psoriasis/serious dermatosis."},{"t":"Safeguarding / paediatrics","html":"Features suggesting neglect or systemic illness (unwell child, faltering growth, unusual distribution)."},{"t":"Manage in primary care","html":"Typical irritant or candidal nappy rash responding to standard care."}]},{"b":"say","html":"This is nappy rash — very common and not serious. The key is frequent nappy changes, gentle cleaning, some nappy-free time to let the skin breathe, and a barrier cream at each change. If it gets into the skin creases with little spots around it, that’s a yeast and we add an antifungal cream. Come back if it’s not settling in a few days."}]}],"foot":"Management of nappy rash in primary care — barrier/nappy care, antifungal for candida, short mild steroid if inflamed; reconsider if atypical. Verify against current NICE CKS Nappy rash."});
