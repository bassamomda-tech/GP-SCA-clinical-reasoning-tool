MG.render({"icon":"🌸","title":"Dysmenorrhoea","guideline":"NICE CKS","stemTitle":"Period pain — NSAIDs and hormonal options; spot secondary causes","stemSub":"Primary-care management of dysmenorrhoea — treat primary period pain with NSAIDs and/or hormonal contraception, and identify secondary causes (endometriosis, adenomyosis, fibroids, PID) that need investigation or referral. NICE CKS · NG73 · 2026.","glance":[{"lbl":"Primary","val":"No pelvic pathology","sub":"starts with periods/ovulation"},{"lbl":"1st-line","val":"NSAID","sub":"e.g. mefenamic acid/ibuprofen"},{"lbl":"2nd-line","val":"Hormonal contraception","sub":"COC / LNG-IUS"},{"lbl":"Secondary clues","val":"Later onset, deep pain","sub":"dyspareunia, menorrhagia"},{"lbl":"Suspect endometriosis","val":"Refer / investigate","sub":"NG73"},{"lbl":"Red flag","val":"Pelvic mass / PID / pregnancy","sub":"= investigate"}],"flow":[{"t":"node","d":"found","n":"1","tag":"Foundation","title":"Primary vs secondary","blocks":[{"b":"kv","rows":[["Primary dysmenorrhoea","Crampy lower abdominal pain with menses, no underlying pathology; typically begins 6–12 months after menarche; pain starts just before/with bleeding"],["Secondary","Later onset, pain at other times of cycle, deep dyspareunia, menorrhagia, subfertility → endometriosis, adenomyosis, fibroids, PID, ovarian cyst, IUD-related"],["History","Cycle, pain pattern, contraceptive + fertility wishes, dyspareunia, GI/urinary cyclical symptoms (endometriosis)"],["Examine","Abdominal ± pelvic exam if secondary cause suspected; pregnancy test if relevant"]]},{"b":"why","html":"Distinguishing primary from secondary dysmenorrhoea drives management: primary responds to NSAIDs/hormones and needs no investigation, while features suggesting endometriosis/adenomyosis/fibroids/PID warrant examination, imaging or referral (NG73)."}]},{"t":"node","d":"life","n":"2","tag":"Non-drug · every patient","title":"Self-care and non-drug measures","blocks":[{"b":"tiles","v":"life","items":[{"t":"🔥 Local heat","html":"A heat pad/hot-water bottle to the lower abdomen is as effective as NSAIDs for some women.","effect":"good evidence"},{"t":"🏃 Exercise","html":"Regular aerobic exercise reduces pain intensity over cycles.","target":"150 min/wk"},{"t":"🚭 Stop smoking","html":"Smoking is associated with more severe dysmenorrhoea — offer cessation support."},{"t":"🧘 TENS / reassurance","html":"High-frequency TENS has some evidence; explain the benign, self-limiting nature of primary dysmenorrhoea."}]},{"b":"why","html":"Non-drug measures are a genuine first-line option many women prefer — local heat in particular has trial evidence comparable to NSAIDs — and they continue alongside any drug treatment."}]},{"t":"node","d":"safety","n":"3","tag":"Safety-net","title":"Don't miss","blocks":[{"b":"tiles","v":"safety","items":[{"t":"🟠 Endometriosis","html":"Cyclical pain, deep dyspareunia, dyschezia, cyclical bowel/bladder symptoms, subfertility → consider/refer (NG73); normal exam/USS doesn’t exclude it."},{"t":"🟠 PID","html":"Pelvic pain + discharge + cervical motion tenderness → treat empirically; STI screen."},{"t":"🟠 Pelvic mass","html":"Fibroids/ovarian mass → USS; CA125 if ovarian cancer concern."},{"t":"🤰 Pregnancy","html":"Always consider ectopic in acute pelvic pain."}]}]},{"t":"node","d":"drug","n":"4","tag":"Treatment","title":"Stepwise","blocks":[{"b":"ladder","steps":[{"step":"1st-line","title":"NSAID","when":"primary dysmenorrhoea","html":"<b>Mefenamic acid 500 mg TDS</b> or <b>ibuprofen 400 mg TDS</b>/<b>naproxen 250–500 mg BD</b>, started at onset of pain/bleeding and taken regularly through the painful days; paracetamol if NSAID contraindicated. Heat, TENS, exercise as adjuncts."},{"step":"2nd-line","title":"Hormonal contraception","when":"if contraception acceptable / NSAID insufficient","fromLabel":"if NSAID inadequate or contraception wanted","html":"Combined oral contraceptive (can be used continuously/tricycled), or LNG-IUS; progestogen-only options."},{"step":"3rd-line","title":"Investigate / refer","when":"refractory or secondary suspected","fromLabel":"if not controlled / red flags","html":"USS for structural causes; refer gynaecology for suspected endometriosis/adenomyosis or treatment failure."}]}]},{"t":"node","d":"follow","n":"5","tag":"Follow-up & review","title":"Review and when to escalate","blocks":[{"b":"timeline","items":[{"n":"1","when":"After 3–6 cycles","title":"Assess first-line response","html":"Review NSAID ± hormonal response over <b>at least 3 menstrual cycles</b> (hormonal options need time). Good control → continue and review annually."},{"n":"2","when":"If inadequate","title":"Switch / combine","html":"Try a different NSAID, add or switch to hormonal contraception (COC tried continuously/tricycled, or LNG-IUS), or combine NSAID + hormonal."},{"n":"3","when":"Persistent despite both","title":"Re-evaluate for secondary cause","html":"Primary dysmenorrhoea unresponsive to 3–6 months of NSAID + hormonal treatment is itself a NICE NG73 trigger to investigate/refer for endometriosis."}]},{"b":"say","html":"Period-pain treatments often take two or three cycles to show their full effect, so let's give this a fair trial and review you in about three months — sooner if the pain changes or gets worse."}]},{"t":"node","d":"refer","n":"6","tag":"Refer","title":"Referral","blocks":[{"b":"tiles","v":"refer","items":[{"t":"Gynaecology","html":"Suspected endometriosis/adenomyosis, refractory pain, structural pathology, subfertility."},{"t":"GUM","html":"If PID/STI suspected."},{"t":"Manage in primary care","html":"Primary dysmenorrhoea responding to NSAIDs ± hormonal treatment."}]},{"b":"say","html":"Period pain is very common and usually has no serious cause. Anti-inflammatory tablets like ibuprofen, started as the pain begins, work well — and the pill or hormonal coil can reduce it further. If the pain is severe, happens at other times, or sex is painful, we’ll look for an underlying cause such as endometriosis."}]}],"foot":"Management of dysmenorrhoea in primary care; investigate/refer features of secondary causes (e.g. endometriosis per NG73). Verify against current NICE CKS and NG73."});
</script>
