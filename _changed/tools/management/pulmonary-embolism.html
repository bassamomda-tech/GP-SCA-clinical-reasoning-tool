MG.render({"icon":"🫁","title":"Pulmonary Embolism","guideline":"NICE NG158","stemTitle":"PE — risk-assess, anticoagulate, refer; the GP role in suspicion + ongoing care","stemSub":"Primary-care role in pulmonary embolism — recognise and risk-stratify suspected PE (Wells), arrange urgent assessment/imaging, start anticoagulation per pathway, and support ongoing DOAC management and recurrence/cancer considerations. NICE NG158 · 2026.","glance":[{"lbl":"Suspect","val":"Pleuritic pain, breathless, ↑HR","sub":"± DVT, syncope"},{"lbl":"Score","val":"Wells PE","sub":"+ PERC where used"},{"lbl":"Pathway","val":"Urgent CTPA / admission","sub":"D-dimer if PE unlikely"},{"lbl":"Treatment","val":"DOAC first-line","sub":"apixaban/rivaroxaban"},{"lbl":"Duration","val":"≥3 months","sub":"provoked vs unprovoked"},{"lbl":"Red flag","val":"Haemodynamic instability / syncope","sub":"= 999"}],"flow":[{"t":"node","d":"safety","n":"1","tag":"Safety-net","title":"Recognise + act","blocks":[{"b":"tiles","v":"safety","items":[{"t":"🔴 Massive PE","html":"Hypotension, syncope, severe hypoxia, cardiac arrest → 999 — may need thrombolysis."},{"t":"🔴 Suspected PE","html":"Pleuritic chest pain, unexplained breathlessness, tachycardia, haemoptysis, signs of DVT → urgent same-day assessment/admission for diagnosis + anticoagulation."},{"t":"🤰 Pregnancy","html":"Lower threshold; different pathway (Wells/D-dimer not validated) → urgent obstetric/medical assessment + imaging."},{"t":"🩸 Bleeding risk","html":"Assess before anticoagulation; balance with thrombosis risk."}]},{"b":"why","html":"PE is a can’t-miss diagnosis. The GP’s role is to suspect it, risk-stratify (Wells), and arrange urgent assessment/imaging and anticoagulation — then support ongoing DOAC therapy and the provoked-vs-unprovoked decisions that determine duration and cancer screening."}]},{"t":"node","d":"found","n":"2","tag":"Foundation","title":"Risk-stratify + diagnose","blocks":[{"b":"kv","rows":[["Wells score (PE)","Stratifies into PE ‘likely’ (&gt;4) vs ‘unlikely’ (≤4)"],["PE unlikely","D-dimer — if negative, PE excluded (age-adjusted where used); if positive → CTPA"],["PE likely","Immediate <b>CTPA</b> (V/Q if contraindicated) — via urgent pathway/admission; interim anticoagulation if delay"],["Provoked vs unprovoked","Identify transient provoking factor (surgery, immobility, etc.) vs unprovoked — affects duration + investigation"]]}]},{"t":"node","d":"life","n":"3","tag":"Non-drug · supportive","title":"Lifestyle & risk reduction","blocks":[{"b":"tiles","v":"life","items":[{"t":"🚶 Mobilise & hydrate","html":"Early mobilisation as able; avoid dehydration; graduated return to activity during recovery."},{"t":"✈️ Reduce future risk","html":"Travel precautions on long journeys, address modifiable VTE risk (immobility, weight, smoking, oestrogen)."},{"t":"💊 Anticoagulant safety","html":"Adherence, bleeding awareness, and review of provoking factors (stop oestrogen contraception)."}]},{"b":"why","html":"Beyond anticoagulation, reducing future VTE risk — stopping oestrogen contraception, travel precautions, weight and mobility — is an important part of after-PE care."}]},{"t":"node","d":"drug","n":"4","tag":"Treatment","title":"Anticoagulation","blocks":[{"b":"ladder","steps":[{"step":"1st-line","title":"DOAC","when":"most patients","html":"Apixaban or rivaroxaban first-line (NG158), including as interim treatment when PE suspected and diagnosis delayed; LMWH/warfarin or LMWH-then-DOAC in specific situations (e.g. antiphospholipid syndrome → warfarin; severe renal impairment; pregnancy → LMWH)."},{"step":"Duration","title":"≥3 months, then review","when":"by provoking factor","fromLabel":"decide length","html":"Provoked (transient factor) → usually 3 months; unprovoked / ongoing risk factor / recurrent → consider long-term anticoagulation after weighing recurrence vs bleeding risk."},{"step":"Cancer","title":"Consider occult malignancy","when":"unprovoked","fromLabel":"if unprovoked","html":"Review for cancer in unprovoked VTE (history, exam, bloods, age-appropriate screening) per NG158; DOAC or LMWH for cancer-associated VTE per current guidance."}]},{"b":"warn","html":"Do not delay treatment when PE is strongly suspected — give interim anticoagulation if imaging is delayed (unless high bleeding risk). Provide anticoagulation safety/monitoring advice."}]},{"t":"node","d":"monitor","n":"5","tag":"Ongoing care","title":"GP role","blocks":[{"b":"table","head":["What","When","Action"],"rows":[["Anticoagulation review","Regularly","Adherence, bleeding, renal function (DOAC dosing), duration decision"],["Recurrence symptoms","Safety-net","New breathlessness/chest pain/leg swelling → reassess"],["Unprovoked VTE","After event","Cancer review + consider thrombophilia/antiphospholipid in selected cases"],["Pregnancy/COC","Counsel","Avoid oestrogen-containing contraception after VTE"]]}]},{"t":"node","d":"refer","n":"6","tag":"Refer","title":"Referral","blocks":[{"b":"tiles","v":"refer","items":[{"t":"999 / admit","html":"Haemodynamic instability, hypoxia, syncope, or suspected PE needing urgent diagnosis + anticoagulation."},{"t":"Ambulatory/medical pathway","html":"Stable suspected/confirmed PE via local PE pathway."},{"t":"Haematology","html":"Recurrent/unusual VTE, antiphospholipid syndrome, anticoagulation dilemmas."},{"t":"Oncology pathway","html":"If cancer found during unprovoked-VTE review."}]},{"b":"say","html":"A pulmonary embolism is a clot on the lung — it’s serious, so if it’s suspected we arrange urgent tests the same day and start blood-thinning treatment, usually a tablet (a DOAC). You’ll stay on it for at least three months; whether longer depends on why it happened. If you suddenly become very breathless or pass out, call 999."}]}],"foot":"Primary-care recognition and shared management of PE; suspected PE needs urgent assessment/imaging and anticoagulation. Verify against current NICE NG158 Venous thromboembolic diseases."});
