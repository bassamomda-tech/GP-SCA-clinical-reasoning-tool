<body data-screen-label="Type 2 diabetes management card">

<script>
MG.render({
  icon:"🩸",
  title:"Type 2 Diabetes",
  stemTitle:"Confirmed Type 2 Diabetes — ongoing management",
  stemSub:"Primary-care management of confirmed T2DM \u2014 structured education and lifestyle, the glucose-lowering ladder with early organ protection, the annual review bundle, monitoring and safety \u2014 up to referral. NICE NG28 \u00b7 CKS 2026.",
  guideline:"NICE NG28",
  glance:[
    {lbl:"Target (lifestyle\u00b1metformin)", val:"48", sub:"mmol/mol"},
    {lbl:"Target (hypo-risk drug)", val:"53", sub:"mmol/mol"},
    {lbl:"First-line", val:"Metformin 500 mg, titrate", sub:"+ assess CV risk"},
    {lbl:"Organ protection", val:"SGLT2i", sub:"CVD / HF / CKD / high-risk"},
    {lbl:"Review HbA1c", val:"3\u20136 mo", sub:"then 6-monthly stable"},
    {lbl:"Annual bundle", val:"9 checks", sub:"eyes \u00b7 feet \u00b7 renal\u2026"}
  ],
  flow:[
    {t:"node", d:"found", n:"1", tag:"Foundation", title:"Set the HbA1c target + map the risk profile",
      blocks:[
        {b:"p", html:"Diagnosis confirmed (HbA1c \u226548, or symptoms + raised glucose). The single most important branch in modern T2DM care is the patient\u2019s <strong>cardiovascular / renal status</strong> \u2014 it pulls organ-protective drugs forward, independent of glucose."},
        {b:"table", head:["Set","Value","Notes"], rows:[
          ["Target on lifestyle \u00b1 single non-hypo drug","<b>48 mmol/mol</b>","6.5%"],
          ["Target on a drug causing hypos (SU/insulin)","<b>53 mmol/mol</b>","7.0%"],
          ["Relax target","Individualise \u2014 higher","Frailty, limited life expectancy, recurrent hypos, isolation"],
          ["Risk to assess now","QRISK, ACR/eGFR, established CVD/HF/CKD","Drives early SGLT2i (node 3)"]
        ]},
        {b:"why", html:"HbA1c is no longer the only target. SGLT2 inhibitors and GLP-1 agonists cut cardiovascular and renal events <em>independent</em> of their glucose-lowering, so the first question after metformin is not \u201cis sugar high?\u201d but \u201cdoes this person have, or risk, heart/kidney disease?\u201d Over-tight control in the frail causes more harm (hypos, falls) than it prevents."}
      ]},
    {t:"node", d:"life", n:"2", tag:"Non-drug \u00b7 foundation of care", title:"Education, diet, weight and remission",
      blocks:[
        {b:"tiles", v:"life", items:[
          {t:"🎓 Structured education", html:"Refer to DESMOND/equivalent at diagnosis \u2014 improves self-management and outcomes."},
          {t:"🥗 Diet & remission", html:"Calorie reduction; a low-calorie diet can induce <b>remission</b> in early T2DM (DiRECT)."},
          {t:"⚖️ Weight loss", html:"5\u201310% loss improves glycaemia, BP and lipids; the biggest single lever early on."},
          {t:"🏃 Activity", html:"150 min/week moderate activity improves insulin sensitivity."},
          {t:"🚭 Smoking & 🍺 alcohol", html:"Cessation + sensible alcohol \u2014 compound CV risk reduction."},
          {t:"🩺 CV risk factors", html:"Treat BP and offer a statin (atorvastatin 20 mg primary prevention) \u2014 huge absolute benefit."}
        ]}
      ]},
    {t:"node", d:"drug", n:"3", tag:"Medication \u00b7 stepwise", title:"The glucose-lowering ladder with early organ protection",
      blocks:[
        {b:"p", html:"Start <b>metformin 500 mg OD with food, titrate to 1 g BD (MR if GI upset)</b>. <strong>Assess CV/renal status at the same time</strong> \u2014 if present, add an SGLT2 inhibitor early, not as an afterthought. Escalate if HbA1c stays above the agreed target."},
        {b:"ladder", steps:[
          {step:"Step 1", title:"Metformin (standard \u2192 MR if GI upset)", when:"titrate over weeks",
           html:"<b>Metformin 500mg OD with food \u2192 titrate to 1g BD</b> (switch to MR if GI upset). First-line for all unless contraindicated. Stop if eGFR &lt;30; review dose 30\u201345. <b>Assess CV risk now.</b>"},
          {step:"Step 1+", title:"Add SGLT2 inhibitor early", when:"if CVD / HF / CKD / high CV risk",
           fromLabel:"established CVD, HF, CKD, or QRISK >10%",
           html:"<b>Dapagliflozin 10mg OD</b> or <b>empagliflozin 10\u201325mg OD</b> (or canagliflozin) alongside metformin \u2014 or alone if metformin not tolerated. Cardio-renal protection regardless of HbA1c."},
          {step:"Step 2", title:"Dual therapy", when:"HbA1c above target",
           fromLabel:"HbA1c above target after Step 1",
           html:"Add a second agent: <b>SGLT2i</b> (as above), <b>DPP-4i</b> (sitagliptin 100mg, linagliptin 5mg, alogliptin \u2014 weight-neutral, low hypo), <b>pioglitazone</b> 15\u201345mg (avoid in HF), or <b>sulfonylurea</b> (gliclazide 40\u201380mg \u2192 up to 320mg \u2014 cheap, rapid, but hypos + weight gain; good rescue for symptomatic hyperglycaemia). Choose by hypo risk, weight, comorbidity, cost."},
          {step:"Step 3", title:"Triple therapy", when:"intensify",
           fromLabel:"still above target",
           html:"Combine three of the above, or move to insulin-based therapy. Review each drug\u2019s ongoing benefit."},
          {step:"Step 4", title:"GLP-1 RA or insulin", when:"specialist-supported pathways",
           fromLabel:"triple therapy inadequate",
           html:"<b>GLP-1 RA</b> (semaglutide/Ozempic\u00ae, liraglutide/Victoza\u00ae, dulaglutide/Trulicity\u00ae) if BMI \u226535 with obesity-related problems, or insulin unsuitable \u2014 continue only if HbA1c falls \u226511 mmol/mol + \u22653% weight loss at 6 mo. Or a <b>dual GIP/GLP-1 agonist (tirzepatide/Mounjaro\u00ae, NICE TA924)</b> if GLP-1 not tolerated/effective. <b>Insulin</b> with structured support \u2014 see the dedicated Insulin protocol."}
        ]},
        {b:"warn", html:"<b>SGLT2 inhibitor:</b> counsel on euglycaemic <b>DKA</b> and <b>sick-day rules</b> (pause when acutely unwell/dehydrated); genital thrush; rare Fournier\u2019s. <b>Pioglitazone:</b> avoid in HF, bladder cancer, fracture risk."}
      ]},
    {t:"node", d:"monitor", n:"4", tag:"Monitoring", title:"HbA1c rhythm + the annual review bundle",
      blocks:[
        {b:"table", head:["What","When","Action"], rows:[
          ["HbA1c","3\u20136-monthly until stable, then 6-monthly","Above target \u2192 reinforce lifestyle, then intensify. <b>Avoid therapeutic inertia</b> \u2014 act promptly to intensify or de-intensify"],
          ["U&amp;E + eGFR","Annually (more if CKD / on metformin near threshold)","Adjust/stop metformin; informs SGLT2i continuation"],
          ["Urine ACR + BP","Annually","ACR raised \u2192 ACEi/ARB + SGLT2i; treat BP to target"],
          ["Lipids","Annually","Statin for CV risk reduction"],
          ["Feet","Annually (urgent if ulcer)","Risk-stratify; same-day referral for active foot problem"],
          ["Retinal screening","Annually","National diabetic eye screening"]
        ]}
      ]},
    {t:"node", d:"follow", n:"5", tag:"Follow-up", title:"Review schedule",
      blocks:[
        {b:"timeline", items:[
          {n:"1", when:"After any treatment change", title:"Response + tolerability", html:"Recheck HbA1c at ~3 months; review side effects, adherence, hypos."},
          {n:"2", when:"3\u20136-monthly until stable", title:"Glycaemic reviews", html:"Titrate toward the agreed target; de-intensify if over-treated or frail."},
          {n:"3", when:"Annual", title:"Structured annual review", html:"The 9 care processes: HbA1c, BP, lipids, U&amp;E/eGFR, ACR, BMI, smoking, feet, eyes \u2014 plus mood, erectile function and self-management."}
        ]}
      ]},
    {t:"loop", icon:"🔁", title:"Not at target? Check before intensifying",
      arrow:"\u2026if HbA1c stays above target",
      intro:"Treat the reason it\u2019s high, not just the number.",
      checks:[
        {b:"1 \u00b7 Adherence", html:"Confirm tablets taken; address GI side effects (switch to MR metformin)."},
        {b:"2 \u00b7 Lifestyle drift", html:"Diet, weight, activity, alcohol \u2014 re-set one measurable goal."},
        {b:"3 \u00b7 Intercurrent", html:"Infection, steroids, depression, new drug raising glucose?"},
        {b:"4 \u00b7 Right target?", html:"Is the target appropriate \u2014 or should it be relaxed (frailty/hypos)?"},
        {b:"5 \u00b7 Phenotype", html:"Lean, ketosis-prone, rapid loss of control \u2192 reconsider T1DM/LADA \u2014 refer."}
      ],
      back:"Adherent, lifestyle optimised, target appropriate \u2192 step up the ladder"},
    {t:"node", d:"safety", n:"6", tag:"Safety-net", title:"Safety-netting",
      blocks:[
        {b:"tiles", v:"safety", items:[
          {t:"🔴 DKA", html:"\u201cVomiting, tummy pain, drowsiness, fast deep breathing, fruity breath \u2014 999. On an SGLT2 tablet this can happen even with near-normal sugars.\u201d"},
          {t:"🍬 Hypoglycaemia", html:"(if on SU/insulin) \u201cShaky, sweaty, confused \u2014 take fast sugar now, then a snack. Recurrent or severe \u2014 contact us.\u201d"},
          {t:"🦶 Diabetic foot", html:"\u201cNew ulcer, colour change, spreading redness, or a hot swollen foot \u2014 same-day contact (possible Charcot/infection).\u201d"},
          {t:"🤢 Sick-day rules", html:"\u201cWhen unwell/dehydrated, pause metformin + SGLT2; stay hydrated; check sugars more often.\u201d"}
        ]}
      ]},
    {t:"node", d:"refer", n:"7", tag:"Refer to secondary care", title:"When to refer",
      arrow:"when primary-care management is exhausted or a red flag appears",
      blocks:[
        {b:"tiles", v:"refer", items:[
          {t:"Urgent / emergency", html:"DKA or HHS; active diabetic foot (same-day MDT foot service); sight-threatening retinopathy."},
          {t:"Diagnostic doubt", html:"Suspected T1DM/LADA, MODY, or pancreatic diabetes \u2014 ketosis, rapid decline, atypical features."},
          {t:"Poor control", html:"HbA1c above target despite triple therapy / appropriate escalation."},
          {t:"Pregnancy / preconception", html:"Joint diabetes\u2013antenatal care; optimise before conception."},
          {t:"Complex / recurrent hypos", html:"Recurrent severe hypoglycaemia, hypo unawareness, complex insulin needs."}
        ]},
        {b:"say", html:"Your diabetes tablets have done a lot, but your numbers are telling us we need extra help, so I\u2019m involving the diabetes specialist team \u2014 we\u2019ll keep your current treatment going while they review you."}
      ]}
  ]
});
</script>
