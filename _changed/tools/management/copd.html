  flow:[
    {t:"node", d:"found", n:"1", tag:"Foundation", title:"Confirm, grade and profile",
      blocks:[
        {b:"kv", rows:[
          ["Diagnosis","Post-bronchodilator spirometry FEV\u2081/FVC &lt;0.70 in a symptomatic smoker/ex-smoker"],
          ["Assess","Symptoms (MRC dyspnoea, CAT score), exacerbation frequency, FEV\u2081% (severity)"],
          ["Phenotype for inhalers","Steroid-responsive features (PMH asthma/atopy, symptom variability, higher eosinophils)? Blood eosinophil count? Exacerbation history? \u2014 the \u2018two Es\u2019: frequent <b>E</b>xacerbations (\u22652/yr or an admission) + <b>E</b>osinophils <b>\u22650.3</b> favour ICS"],

        {b:"why", html:"COPD management has one disease-modifying lever \u2014 <strong>stopping smoking</strong> \u2014 and everything else (inhalers, rehab, oxygen) improves symptoms, exacerbations and quality of life. The inhaler choice hinges on whether there are asthmatic/eosinophilic features, because that predicts who benefits from inhaled steroids versus who is just exposed to their pneumonia risk."}
      ]},
    {t:"node", d:"life", n:"2", tag:"Non-drug \u00b7 highest-value", title:"Cessation, rehab, vaccination",

        {b:"tiles", v:"life", items:[

          {t:"💉 Vaccination", html:"Annual influenza, pneumococcal, COVID-19."},

        ]},
        {b:"warn", html:"<b>ICS+LABA (without a LAMA) is no longer encouraged</b> in COPD without asthmatic features \u2014 current ICS+LABA users with controlled symptoms and no history of eosinophils \u22650.3 should be considered for a switch to LABA+LAMA. <b>ICS raises pneumonia risk</b>; de-escalate if no benefit. Azithromycin prophylaxis needs ECG (QT) + LFTs and specialist initiation."}

        {b:"3 \u00b7 Rehab", html:"Has pulmonary rehab been offered/completed?"},
        {b:"4 \u00b7 Comorbidity", html:"Is it COPD \u2014 or HF, anaemia, deconditioning, anxiety driving breathlessness?"},
        {b:"5 \u00b7 Phenotype", html:"Eosinophils/asthmatic features to guide ICS; consider specialist add-ons."}
      ],
      back:"Smoking, technique, rehab, comorbidity addressed \u2192 step up / refer"},
    {t:"node", d:"safety", n:"6", tag:"Safety-net", title:"Safety-netting",
      blocks:[
        {b:"tiles", v:"safety", items:[

        ]}
      ]},
    {t:"node", d:"refer", n:"7", tag:"Refer to secondary care", title:"When to refer respiratory",
      arrow:"when severe, atypical, or oxygen/devices needed",
      blocks:[

          {t:"LTOT assessment", html:"Stable SpO\u2082 \u226492% \u2014 refer for formal long-term oxygen assessment."},

      ]}
