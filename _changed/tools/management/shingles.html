MG.render({"icon":"⚡","title":"Shingles (Herpes Zoster)","guideline":"NICE CKS","stemTitle":"Shingles — antiviral early, watch the eye, prevent neuralgia","stemSub":"Primary-care management of herpes zoster — start antivirals within 72 hours (or while new lesions appear) in those who qualify, recognise ophthalmic and other danger sites, manage pain and prevent/treat post-herpetic neuralgia, and advise on infectivity and vaccination. NICE CKS · 2026.","glance":[{"lbl":"Antiviral","val":"Aciclovir/valaciclovir","sub":"start ≤72h / new lesions"},{"lbl":"Always treat","val":"Ophthalmic, severe, immunocompromised, >50","sub":""},{"lbl":"Eye","val":"Hutchinson’s sign","sub":"= ophthalmology"},{"lbl":"Pain","val":"Analgesia → neuropathic agents","sub":"amitriptyline etc"},{"lbl":"Infectious","val":"Until lesions crust","sub":"can cause chickenpox"},{"lbl":"Red flag","val":"Ophthalmic / Ramsay Hunt / disseminated","sub":"= urgent"}],"flow":[{"t":"node","d":"safety","n":"1","tag":"Safety-net","title":"Danger sites + urgent referral","blocks":[{"b":"tiles","v":"safety","items":[{"t":"🔴 Ophthalmic zoster","html":"V1 distribution, rash on nose tip/side (<b>Hutchinson’s sign</b>), eye redness/pain/visual change → antiviral + <b>same-day ophthalmology</b>."},{"t":"🔴 Ramsay Hunt","html":"Ear pain + vesicles in ear canal + facial palsy ± vertigo/hearing loss → urgent antiviral + steroid + ENT."},{"t":"🔴 Disseminated / immunocompromised","html":"Widespread/multidermatomal rash, or severely immunocompromised → urgent assessment/IV antivirals."},{"t":"🤰 Contacts","html":"Infectious (causes chickenpox in non-immune) until crusted — avoid pregnant non-immune women, neonates, immunocompromised."}]},{"b":"why","html":"Most shingles is self-limiting, but ophthalmic zoster threatens sight, Ramsay Hunt threatens the facial nerve, and disseminated disease threatens immunocompromised patients — these need urgent antivirals and specialist input regardless of the 72-hour window."}]},{"t":"node","d":"found","n":"2","tag":"Foundation","title":"Diagnose","blocks":[{"b":"kv","rows":[["Presentation","Unilateral painful dermatomal rash (often preceded by pain/tingling) → grouped vesicles on erythema, not crossing the midline; thoracic commonest"],["Who to treat with antivirals","Within 72h of rash onset, OR while new vesicles still forming, AND/OR: age &gt;50, ophthalmic/other danger site, immunocompromised, severe rash/pain, non-truncal involvement"],["Assess","Site, immune status, pain severity, eye involvement, pregnancy contacts"]]}]},{"t":"node","d":"drug","n":"3","tag":"Treatment","title":"Antiviral + pain","blocks":[{"b":"ladder","steps":[{"step":"Step 1","title":"Oral antiviral","when":"if criteria met, ≤72h / new lesions","html":"Aciclovir 800 mg 5×/day, or valaciclovir 1 g TDS, or famciclovir 500 mg TDS — for 7 days. Reduces severity/duration and post-herpetic neuralgia risk. Dose-adjust in renal impairment."},{"step":"Step 2","title":"Pain relief","when":"all patients","fromLabel":"acute pain","html":"Paracetamol ± NSAID; add a neuropathic agent (amitriptyline, or gabapentin/pregabalin) for significant nerve pain; consider short opioid for severe acute pain."},{"step":"Step 3","title":"Skin + advice","when":"supportive","fromLabel":"local care","html":"Keep lesions clean/covered; avoid topical antibiotics/adhesive dressings; advise on infectivity until crusted."}]},{"b":"warn","html":"Corticosteroids are not routinely recommended for uncomplicated shingles. Watch for post-herpetic neuralgia — pain persisting &gt;90 days after rash onset."}]},{"t":"node","d":"life","n":"4","tag":"Advice + prevention","title":"Infectivity + vaccine","blocks":[{"b":"tiles","v":"life","items":[{"t":"🦠 Infectivity","html":"Contagious (varicella) until lesions crust; cover the rash; avoid contact with non-immune pregnant women, neonates, immunocompromised."},{"t":"💉 Vaccination","html":"Shingles vaccine offered to eligible older adults / immunocompromised per the national programme — prevents future episodes."},{"t":"⏱️ PHN risk","html":"Counsel that some pain may persist; review if pain ongoing."}]}]},{"t":"node","d":"follow","n":"5","tag":"Follow-up","title":"Healing & complications","blocks":[{"b":"timeline","items":[{"n":"1","when":"Antiviral window","title":"Treat early","html":"Oral antiviral (<b>aciclovir 800 mg 5×/day</b>, or valaciclovir/famciclovir) ideally within <b>72 h of rash onset</b> — still consider if new vesicles, ophthalmic/severe, or immunocompromised. Analgesia + keep rash clean."},{"n":"2","when":"Watch for","title":"Post-herpetic neuralgia","html":"Warn pain may persist as <b>post-herpetic neuralgia</b> — review and manage (amitriptyline/gabapentin/pregabalin/duloxetine) if pain continues beyond rash healing."},{"n":"3","when":"Red flags","title":"Urgent review","html":"<b>Herpes zoster ophthalmicus</b> (nasociliary/Hutchinson sign) → same-day ophthalmology; Ramsay Hunt (facial palsy + ear) → urgent; disseminated/immunocompromised → admit. Advise on vaccination eligibility once recovered."}]},{"b":"say","html":"Starting the antiviral early helps the rash and lowers the risk of lingering nerve pain. If pain carries on after the rash heals, come back — there are effective treatments for it."}]},{"t":"node","d":"refer","n":"6","tag":"Refer","title":"Referral","blocks":[{"b":"tiles","v":"refer","items":[{"t":"Same-day ophthalmology","html":"Ophthalmic zoster / eye involvement / Hutchinson’s sign."},{"t":"Urgent","html":"Ramsay Hunt (ENT), disseminated/immunocompromised disease."},{"t":"Pain clinic","html":"Refractory post-herpetic neuralgia."}]},{"b":"say","html":"This is shingles — the chickenpox virus reactivating along a nerve. If we’re within about three days of the rash, antiviral tablets help, and we’ll treat the pain. Keep the rash covered — it can give chickenpox to people who haven’t had it. If it’s near your eye or you get eye symptoms, that needs same-day eye review."}]}],"foot":"Management of herpes zoster in primary care; ophthalmic zoster, Ramsay Hunt and disseminated disease are urgent. Verify against current NICE CKS Shingles and the Green Book."});
