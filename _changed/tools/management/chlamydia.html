MG.render({"icon":"🦠","title":"Chlamydia","guideline":"BASHH","stemTitle":"Chlamydia — test, treat with doxycycline, notify partners","stemSub":"Primary-care management of genital chlamydia — the commonest bacterial STI — diagnose by NAAT, treat with doxycycline, ensure partner notification and a test of reincaution, and recognise complications (PID, epididymo-orchitis, reactive arthritis). BASHH · CKS · 2026.","glance":[{"lbl":"Test","val":"NAAT","sub":"vulvovaginal/first-void urine"},{"lbl":"1st-line","val":"Doxycycline 100 mg BD 7d","sub":"100 mg BD"},{"lbl":"Pregnancy","val":"Azithromycin 1 g then 500 mg OD ×2d","sub":"doxy contraindicated"},{"lbl":"Always","val":"Partner notification","sub":"+ abstain 7 days"},{"lbl":"Screen","val":"Under-25s / new partner","sub":"NCSP"},{"lbl":"Complication","val":"PID / epididymo-orchitis","sub":"treat early"}],"flow":[{"t":"node","d":"safety","n":"1","tag":"Safety-net","title":"Complications to recognise","blocks":[{"b":"tiles","v":"safety","items":[{"t":"🟠 PID","html":"Pelvic pain, deep dyspareunia, cervical motion tenderness, fever → treat empirically (protect fertility); admit if severe/pregnant/abscess."},{"t":"🟠 Epididymo-orchitis","html":"Unilateral testicular pain/swelling in a young man → treat for chlamydia/gonorrhoea; exclude torsion (urgent if acute severe)."},{"t":"🟠 Reactive arthritis","html":"Arthritis + urethritis + conjunctivitis (Reiter’s) → treat infection, rheumatology if needed."},{"t":"🤰 Pregnancy/neonatal","html":"Untreated maternal chlamydia → neonatal conjunctivitis/pneumonia; treat + test of cure."}]},{"b":"why","html":"Chlamydia is often asymptomatic, so it is found by screening; untreated it causes PID and tubal infertility in women and epididymo-orchitis in men. Early treatment and partner notification prevent these and reinfection."}]},{"t":"node","d":"found","n":"2","tag":"Foundation","title":"Diagnose","blocks":[{"b":"kv","rows":[["Often asymptomatic","Up to 70% women / 50% men; symptoms: discharge, dysuria, IMB/PCB, pelvic pain, testicular pain"],["Test (NAAT)","Vulvovaginal swab (self-taken) or first-void urine (men); add rectal/pharyngeal per history; test for gonorrhoea simultaneously"],["Screen","National Chlamydia Screening Programme — offer to sexually active under-25s annually and on partner change"],["Full screen","Offer HIV, syphilis, gonorrhoea testing"]]}]},{"t":"node","d":"life","n":"3","tag":"Non-drug · prevention","title":"Safer sex & prevention","blocks":[{"b":"tiles","v":"life","items":[{"t":"🚫 Abstain during treatment","html":"No sex (incl. oral) until both partner(s) and patient have completed treatment and 7 days passed."},{"t":"🧴 Condoms","html":"Promote consistent condom use to prevent reinfection and other STIs."},{"t":"🔁 Reduce reinfection","html":"Reinforce partner treatment and the under-25 retest; discuss number of partners and regular screening."}]},{"b":"why","html":"Chlamydia is cured by antibiotics, but reinfection is the main risk — abstinence during treatment, condoms and partner treatment do more to prevent recurrence than anything else."}]},{"t":"node","d":"drug","n":"4","tag":"Medication","title":"Treatment","blocks":[{"b":"ladder","steps":[{"step":"1st-line","title":"Doxycycline 100 mg BD × 7 days","when":"non-pregnant","html":"<b>Doxycycline 100 mg BD for 7 days</b> — more effective than azithromycin (esp. rectal infection). Avoid in pregnancy; photosensitivity advice."},{"step":"Pregnancy/contraindicated","title":"Azithromycin or erythromycin","when":"if doxy unsuitable","fromLabel":"pregnant / doxy contraindicated","html":"Azithromycin 1 g then 500 mg OD 2 days (or erythromycin); arrange test of cure in pregnancy/rectal infection."},{"step":"Always","title":"Partner notification + abstain","when":"all cases","fromLabel":"prevent reinfection","html":"Notify + treat partners; abstain from sex (incl. with partners) until both treated and 7 days after single-dose/started 7-day course."}]},{"b":"warn","html":"Test of cure is not routine for uncomplicated genital chlamydia except in pregnancy, rectal infection, or persistent symptoms. Re-test under-25s at 3 months (high reinfection)."}]},{"t":"node","d":"follow","n":"5","tag":"Follow-up","title":"Partner notification & retesting","blocks":[{"b":"timeline","items":[{"n":"1","when":"Partner notification","title":"Trace & treat contacts","html":"Notify partners — look-back <b>4 weeks</b> (symptomatic men) or <b>6 months</b> (women/asymptomatic). Advise <b>abstinence for 7 days</b> after treatment started and partners treated."},{"n":"2","when":"No routine test of cure","title":"Re-test only if indicated","html":"Test of cure <b>not</b> routinely needed except in pregnancy, persistent symptoms, or suspected non-adherence (repeat NAAT ≥3 weeks after treatment to avoid false positives)."},{"n":"3","when":"Under-25s","title":"Retest at 3 months","html":"Offer a repeat test at <b>3 months</b> (high reinfection rate) per the National Chlamydia Screening Programme. Offer a full STI screen + HIV test."}]},{"b":"say","html":"The tablets clear it, but reinfection is common — so it's important your recent partners are tested and treated, and if you're under 25 we'll re-check you in three months."}]},{"t":"node","d":"refer","n":"6","tag":"Refer","title":"Referral + follow-up","blocks":[{"b":"tiles","v":"refer","items":[{"t":"GUM / sexual health","html":"Partner notification support, complex/recurrent cases, rectal/pharyngeal, LGV, treatment failure."},{"t":"Pregnancy","html":"Test of cure; neonatal implications."},{"t":"Complications","html":"PID, epididymo-orchitis, reactive arthritis — treat + refer as needed."}]},{"b":"say","html":"Chlamydia is a common, easily treated infection that often causes no symptoms. A week of antibiotics clears it. The important bit is that your recent partners get tested and treated too, and you both avoid sex until a week after treatment — otherwise you can pass it back and forth. We’ll offer a full sexual-health check as well."}]}],"foot":"Management of genital chlamydia in primary care; partner notification via sexual-health services. Verify against current BASHH guidance and the National Chlamydia Screening Programme."});
</script>
