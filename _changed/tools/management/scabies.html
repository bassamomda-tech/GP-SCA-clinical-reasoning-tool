MG.render({"icon":"🕷️","title":"Scabies","guideline":"NICE CKS","stemTitle":"Scabies — treat the patient and ALL close contacts simultaneously","stemSub":"Primary-care management of scabies — a mite infestation causing intense itch; treat with topical permethrin (two applications) treating all household/close contacts at the same time, give clear application + laundering advice, and recognise crusted (Norwegian) scabies. NICE CKS · 2026.","glance":[{"lbl":"1st-line","val":"Permethrin 5% cream","sub":"whole body, 2 doses 1 wk apart"},{"lbl":"Alternative","val":"Malathion","sub":"if permethrin unsuitable"},{"lbl":"Crucial","val":"Treat ALL contacts","sub":"same day, even if asymptomatic"},{"lbl":"Itch","val":"Persists 2–4 weeks","sub":"after successful cure"},{"lbl":"Laundry","val":"Hot wash day 1","sub":"bedding/clothes/towels"},{"lbl":"Severe","val":"Crusted scabies","sub":"= specialist + isolate"}],"flow":[{"t":"node","d":"found","n":"1","tag":"Foundation","title":"Diagnose","blocks":[{"b":"kv","rows":[["Symptoms","Intense generalised itch, <b>worse at night</b>; spares the face/scalp in adults (not in infants/elderly)"],["Signs","Burrows (finger webs, wrists, axillae, genitals, periumbilical), papules, excoriations; penile/scrotal nodules; infants — palms/soles/face"],["Contacts itching","Household/sexual contacts with itch supports diagnosis"],["Crusted (Norwegian)","Hyperkeratotic crusted lesions, may not itch, highly contagious — immunocompromised/elderly/institutional"]]},{"b":"why","html":"Scabies is diagnosed clinically from the intense nocturnal itch and burrows in typical sites. The single most important management principle is simultaneous treatment of all close contacts — untreated contacts cause ‘treatment failure’ by reinfestation."}]},{"t":"node","d":"drug","n":"2","tag":"Treatment","title":"Permethrin + contacts","blocks":[{"b":"ladder","steps":[{"step":"Step 1","title":"Permethrin 5% cream","when":"whole body","html":"Apply to whole body (incl. neck, ears, under nails; whole head in infants/elderly/immunocompromised); leave 8–12h (overnight) then wash off; <b>repeat after 7 days</b>. Reapply to hands if washed during treatment period."},{"step":"Step 2","title":"Treat ALL close contacts simultaneously","when":"same day","fromLabel":"essential","html":"All household members and sexual/skin contacts treated at the same time, even if asymptomatic — the key to preventing reinfestation."},{"step":"Step 3","title":"Alternative","when":"if permethrin unsuitable","fromLabel":"alternative","html":"Malathion 0.5% aqueous; oral ivermectin (specialist/unlicensed) for crusted scabies, outbreaks, or treatment failure."},{"step":"Itch","title":"Treat post-scabetic itch","when":"after treatment","fromLabel":"symptom control","html":"Itch can persist 2–4 weeks after successful cure — emollients, an antihistamine (e.g. <b>chlorphenamine 4 mg at night</b> or cetirizine 10 mg OD), mild topical steroid; reassure this is not treatment failure."}]},{"b":"warn","html":"Itch persisting up to 4 weeks after treatment is expected and does NOT mean failure — avoid repeated re-treatment. Genuine failure = new burrows / contacts not treated."}]},{"t":"node","d":"life","n":"3","tag":"Advice","title":"Laundering + hygiene","blocks":[{"b":"tiles","v":"life","items":[{"t":"🧺 Laundry","html":"On the first treatment day, hot-wash (≥50°C) bedding, clothing and towels used in the previous days; items that can’t be washed → sealed bag for 72h."},{"t":"💅 Application tips","html":"Apply to cool dry skin; don’t apply after a hot bath; cover all areas; reapply to washed hands."},{"t":"🛑 Avoid contact","html":"Avoid close skin contact until first treatment completed."},{"t":"📋 Outbreaks","html":"Care homes/institutions → inform infection control/health protection."}]}]},{"t":"node","d":"follow","n":"4","tag":"Follow-up","title":"Retreatment & itch","blocks":[{"b":"timeline","items":[{"n":"1","when":"Day 7","title":"Second application","html":"Repeat the topical scabicide (permethrin 5%) <b>after 7 days</b> to catch newly-hatched mites. Treat <b>all household/close contacts simultaneously</b>, even if asymptomatic, and decontaminate bedding/clothing (hot wash)."},{"n":"2","when":"Up to 4 weeks","title":"Post-scabetic itch","html":"Warn itch can <b>persist 2–4 weeks after successful treatment</b> — this is not failure. Treat with emollient, antihistamine (e.g. chlorphenamine nocte), mild topical steroid."},{"n":"3","when":"Persistent","title":"Reassess","html":"New burrows or itch beyond 4–6 weeks → re-treat (check application technique/contacts) and consider crusted scabies (immunosuppressed → specialist)."}]},{"b":"say","html":"Do a second treatment in a week, and everyone in the house must be treated the same day even if they have no itch. The itch can last a few weeks after — that doesn't mean it hasn't worked."}]},{"t":"node","d":"safety","n":"5","tag":"Safety-net","title":"When it's more than ordinary scabies","blocks":[{"b":"tiles","v":"safety","items":[{"t":"🟠 Crusted (Norwegian) scabies","html":"Thick, widespread hyperkeratotic crusting (often immunocompromised/elderly) → highly contagious → specialist + infection control."},{"t":"🔴 Secondary infection","html":"Weeping, crusting, spreading redness or systemic symptoms → treat bacterial superinfection."},{"t":"💬 Safety-net","html":"If the skin becomes weepy and infected-looking, or the rash worsens despite treatment, come back."}]}]},{"t":"node","d":"refer","n":"6","tag":"Refer","title":"Referral","blocks":[{"b":"tiles","v":"refer","items":[{"t":"Specialist / urgent","html":"Crusted (Norwegian) scabies — dermatology/infection input, isolation, oral ivermectin."},{"t":"Public health / IPC","html":"Institutional outbreaks."},{"t":"Reassess","html":"Genuine treatment failure (new burrows) — check application + contacts, consider alternative agent."}]},{"b":"say","html":"This is scabies — a tiny mite in the skin causing intense itch, especially at night. The treatment is a cream applied over the whole body and repeated a week later — and crucially, everyone in your household (and close partners) must be treated on the same day, even without itching. Wash bedding and clothes hot on day one. The itch can linger for a few weeks after it’s cured — that’s normal."}]}],"foot":"Management of scabies in primary care; treat all close contacts simultaneously. Crusted scabies needs specialist care. Verify against current NICE CKS Scabies."});
</script>
