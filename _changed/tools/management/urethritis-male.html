MG.render({"icon":"🚹","title":"Urethritis (Male)","guideline":"BASHH","stemTitle":"Male urethritis — treat gonococcal vs non-gonococcal, screen for STIs","stemSub":"Primary-care management of male urethritis — distinguish gonococcal from non-gonococcal urethritis (commonly chlamydia/Mycoplasma genitalium), test and refer to sexual health, treat appropriately, and ensure partner notification. BASHH · CKS · 2026.","glance":[{"lbl":"Symptoms","val":"Discharge + dysuria","sub":"± urethral irritation"},{"lbl":"Test","val":"NAAT (CT/NG)","sub":"first-void urine ± culture"},{"lbl":"NGU 1st-line","val":"Doxycycline 100 mg BD 7d","sub":"covers chlamydia"},{"lbl":"Gonococcal","val":"Ceftriaxone 1 g IM","sub":"GUM-led + culture"},{"lbl":"Always","val":"Partner notification","sub":"+ abstain"},{"lbl":"Persistent","val":"Think M. genitalium","sub":"refer GUM"}],"flow":[{"t":"node","d":"found","n":"1","tag":"Foundation","title":"Diagnose + classify","blocks":[{"b":"kv","rows":[["Presentation","Urethral discharge, dysuria, urethral discomfort/itch; ask about partners, sites of exposure, prior STIs"],["Gonococcal (GC)","Profuse purulent discharge more typical — confirm NAAT + culture"],["Non-gonococcal (NGU)","Chlamydia commonest; also Mycoplasma genitalium, Ureaplasma, Trichomonas, adenovirus, HSV"],["Test","First-void urine NAAT for chlamydia + gonorrhoea (± urethral swab/culture if GC); full STI screen (HIV, syphilis)"]]},{"b":"why","html":"Splitting urethritis into gonococcal vs non-gonococcal directs treatment: NGU is treated with <b>doxycycline 100 mg BD for 7 days</b> (covering chlamydia), while gonococcal urethritis needs <b>ceftriaxone 1 g IM</b> with culture because of resistance. Persistent NGU raises Mycoplasma genitalium."}]},{"t":"node","d":"safety","n":"2","tag":"Safety-net","title":"Exclude + consider","blocks":[{"b":"tiles","v":"safety","items":[{"t":"🟠 Epididymo-orchitis","html":"Testicular pain/swelling → treat for STI; exclude torsion (acute severe pain = urgent)."},{"t":"🟠 Reactive arthritis","html":"Arthritis + urethritis + conjunctivitis."},{"t":"🟠 Not UTI","html":"UTI is uncommon in young men — dysuria + discharge points to STI, not cystitis; don’t just give trimethoprim."},{"t":"💧 M. genitalium","html":"Persistent/recurrent NGU → test for M. genitalium + macrolide-resistance markers (GUM) — avoid azithromycin monotherapy."}]}]},{"t":"node","d":"life","n":"3","tag":"Non-drug · prevention","title":"Safer sex & prevention","blocks":[{"b":"tiles","v":"life","items":[{"t":"🚫 Abstain","html":"No sex until 7 days after treatment and partners treated and symptom-free."},{"t":"🧴 Condoms","html":"Consistent condom use to prevent reinfection and other STIs."},{"t":"🔎 Screen & PrEP","html":"Full STI + HIV screen; discuss PrEP if ongoing HIV risk."}]},{"b":"why","html":"Non-gonococcal urethritis recurs mainly through reinfection — abstinence during treatment, partner treatment and condoms are the practical preventive steps."}]},{"t":"node","d":"drug","n":"4","tag":"Medication","title":"Treatment","blocks":[{"b":"ladder","steps":[{"step":"NGU 1st-line","title":"Doxycycline 100 mg BD × 7 days","when":"non-gonococcal","html":"Covers chlamydia and is preferred for M. genitalium initial therapy; avoids azithromycin resistance."},{"step":"Gonococcal","title":"Ceftriaxone 1 g IM","when":"if GC confirmed/suspected","fromLabel":"if gonococcal","html":"After culture; GUM-led; test of cure."},{"step":"Always","title":"Partner notification + abstain","when":"all cases","fromLabel":"prevent reinfection","html":"Notify partners; abstain until treated + 7 days; arrange follow-up for persistent symptoms."}]}]},{"t":"node","d":"follow","n":"5","tag":"Follow-up","title":"Partner care & persistence","blocks":[{"b":"timeline","items":[{"n":"1","when":"Treat & cover","title":"Empirical NGU therapy","html":"Treat non-gonococcal urethritis with <b>doxycycline 100 mg BD for 7 days</b> (covers chlamydia and preferred for M. genitalium initial therapy); add gonorrhoea cover if at risk. Full STI screen + HIV."},{"n":"2","when":"Partner notification","title":"Trace & abstain","html":"Notify and treat partners; advise abstinence until both treated and symptom-free for 7 days."},{"n":"3","when":"Persistent/recurrent","title":"Refer to GUM","html":"Persistent or recurrent NGU → test for <b>M. genitalium + macrolide-resistance markers</b> (avoid azithromycin monotherapy); refer to sexual health."}]},{"b":"say","html":"The antibiotics cover the usual causes, but your partner needs treating too and you should avoid sex until you're both clear. If it doesn't settle, the GUM clinic can test for harder-to-treat bugs."}]},{"t":"node","d":"refer","n":"6","tag":"Refer","title":"Referral","blocks":[{"b":"tiles","v":"refer","items":[{"t":"GUM / sexual health","html":"Confirmation, culture, partner notification, persistent/recurrent NGU, M. genitalium testing."},{"t":"Urgent","html":"Suspected testicular torsion (acute scrotum)."}]},{"b":"say","html":"This is urethritis — usually a sexually transmitted infection rather than a urine infection. We’ll test for chlamydia and gonorrhoea and treat with antibiotics, ideally through the sexual-health clinic. Recent partners need testing and treatment, and avoid sex until a week after treatment. If symptoms persist we’ll test for a less common bug."}]}],"foot":"Management of male urethritis in primary care, with sexual-health involvement; gonococcal urethritis needs culture-guided IM ceftriaxone. Verify against current BASHH guidance."});
