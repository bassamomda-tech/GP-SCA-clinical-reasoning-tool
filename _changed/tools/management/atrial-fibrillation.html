<body data-screen-label="AF management card">

<script src="../../assets/management-engine.js"></script>
<script>
MG.render({
  icon:"💓",
  title:"Atrial Fibrillation",
  stemTitle:"Confirmed Atrial Fibrillation — ongoing management",
  stemSub:"Everything achievable in primary care for established AF — stroke-prevention, rate and rhythm control, monitoring and follow-up — up to referral. Two parallel goals run at once: prevent stroke (anticoagulation) and control symptoms (rate \u00b1 rhythm). NICE NG196 \u00b7 CKS 2026.",
  guideline:"NICE NG196",
  glance:[
    {lbl:"Stroke risk", val:"CHA\u2082DS\u2082-VASc", sub:"\u22652 offer \u00b7 men =1 consider"},
    {lbl:"Bleeding risk", val:"ORBIT", sub:"modify, don\u2019t withhold"},
    {lbl:"Anticoagulant", val:"DOAC 1st", sub:"not aspirin"},
    {lbl:"Rate target", val:"<110 bpm", sub:"resting, initial lenient"},
    {lbl:"Rate 1st-line", val:"BB or CCB", sub:"not both in HFrEF"},
    {lbl:"Rhythm", val:"if symptomatic", sub:"refer \u00b1 ablation"}
  ],
  flow:[
    {t:"node", d:"found", n:"1", tag:"Foundation", title:"Confirm AF and risk-stratify",
      blocks:[
        {b:"p", html:"AF confirmed on ECG (or \u226530 s on a monitor). Before treating, quantify the two risks that drive every decision below \u2014 <strong>stroke risk</strong> (do you anticoagulate?) and <strong>symptom burden</strong> (do you need rhythm control?) \u2014 and screen for reversible drivers."},
        {b:"table", head:["Tool","Use","Action"], rows:[
          ["<b>CHA\u2082DS\u2082-VASc</b>","Stroke risk","\u22652 \u2192 offer anticoagulation \u00b7 men =1 \u2192 consider \u00b7 0 (m) / 1 (f, sex only) \u2192 none"],
          ["<b>ORBIT</b>","Bleeding risk","Identify &amp; <b>modify</b> reversible factors \u2014 a high score is <b>not</b> a reason to withhold"],
          ["<b>EHRA / symptoms</b>","Symptom burden","Drives the rate-vs-rhythm decision"],
          ["<b>Reversible causes</b>","Thyroid, alcohol, OSA, HTN, sepsis, electrolytes","Treat the driver \u2014 may restore sinus rhythm"]
        ]},
        {b:"why", html:"AF management is two questions running in parallel, not one: <strong>\u201chow do I stop a stroke?\u201d</strong> and <strong>\u201chow do I make them feel better?\u201d</strong> Anticoagulation reduces stroke risk ~64%; rate/rhythm control treats symptoms but does <em>not</em> remove the need to anticoagulate. Keeping the two streams separate prevents the classic error of stopping anticoagulation once the rate is controlled."}
      ]},
    {t:"node", d:"life", n:"2", tag:"Non-drug \u00b7 every patient", title:"Treat reversible drivers + optimise risk factors",
      blocks:[
        {b:"tiles", v:"life", items:[
          {t:"🍺 Alcohol", html:"A major modifiable trigger. \u226414 u/wk; abstinence often reduces AF burden markedly."},
          {t:"⚖️ Weight & exercise", html:"Weight loss + regular aerobic activity reduce AF recurrence and symptom burden (LEGACY)."},
          {t:"😴 OSA", html:"Screen + treat obstructive sleep apnoea \u2014 untreated OSA drives recurrence."},
          {t:"🦋 Thyroid", html:"Check TFTs \u2014 thyrotoxicosis is a reversible cause; treat it."},
          {t:"🩺 BP & CV risk", html:"Optimise hypertension, diabetes, lipids \u2014 the substrate behind AF."},
          {t:"☕ Stimulants", html:"Reduce excess caffeine; review sympathomimetics &amp; recreational stimulants."}
        ]}
      ]},
    {t:"decision", q:"Run two streams in parallel", note:"A: prevent stroke (anticoagulate by risk) \u00b7 B: control symptoms (rate first, then rhythm)"},
    {t:"node", d:"drug", n:"3", tag:"Medication \u00b7 Stream A", title:"Stroke prevention \u2014 anticoagulation",
      arrow:"Stream A \u2014 stroke prevention",
      blocks:[
        {b:"p", html:"Offer anticoagulation by <strong>CHA\u2082DS\u2082-VASc</strong>, after a shared discussion of benefit vs bleeding risk. <strong>Do not use aspirin</strong> for stroke prevention in AF."},
        {b:"ladder", steps:[
          {step:"1st line", title:"A DOAC", when:"apixaban / rivaroxaban / edoxaban / dabigatran",
           html:"First-line for non-valvular AF. <b>Dose by renal function, age, weight</b> (e.g. apixaban 2.5 mg BD if 2 of: \u226580 y, \u226460 kg, creatinine \u2265133). Check baseline FBC, U&amp;E/eGFR, LFTs."},
          {step:"Alt", title:"Warfarin (target INR 2\u20133)", when:"when a DOAC is unsuitable",
           fromLabel:"DOAC contraindicated / unsuitable",
           html:"<b>Required</b> for mechanical heart valve or moderate\u2013severe mitral stenosis. Also if DOAC not tolerated/affordable. Needs INR monitoring + TTR review."}
        ]},
        {b:"warn", html:"<b>Never combine</b> an anticoagulant with antiplatelet for AF alone. If triple therapy is unavoidable (recent PCI), it is specialist-led and time-limited. <b>Minor surgery:</b> for low-bleeding-risk procedures stop a DOAC (apixaban/dabigatran/edoxaban) ~24h before and restart 6h after; for warfarin seek anticoagulation-service advice."},
        {b:"why", html:"DOACs match or beat warfarin for stroke prevention with less intracranial bleeding and no INR monitoring \u2014 hence first-line. Aspirin is ineffective for AF stroke prevention and still bleeds, so it has no role. A high bleeding score should trigger <em>modifying</em> reversible factors (BP, alcohol, NSAIDs, falls), not withholding protection."}
      ]},
    {t:"node", d:"drug", n:"4", tag:"Medication \u00b7 Stream B", title:"Rate control \u2014 first-line for most",
      arrow:"Stream B \u2014 symptom control",
      blocks:[
        {b:"p", html:"Offer <strong>rate control as the first strategy</strong> unless rhythm control is indicated (node 5). Initial target resting HR <strong>&lt;110 bpm</strong> (lenient); aim tighter if symptoms persist."},
        {b:"ladder", steps:[
          {step:"Step 1", title:"Monotherapy \u2014 beta-blocker OR rate-limiting CCB", when:"choose by comorbidity",
           html:"<b>Standard \u03b2-blocker</b> (e.g. bisoprolol) \u2014 not sotalol. <b>OR rate-limiting CCB</b> (diltiazem/verapamil) if \u03b2-blocker not tolerated. <b>Avoid CCB in HFrEF</b> \u2014 use \u03b2-blocker \u00b1 digoxin instead."},
          {step:"Step 2", title:"Add digoxin", when:"sedentary, or add-on",
           fromLabel:"HR still \u2265 target / still symptomatic",
           html:"Digoxin monotherapy only for largely sedentary, non-paroxysmal AF; otherwise as an add-on to a \u03b2-blocker or CCB."},
          {step:"Step 3", title:"Combination therapy", when:"BB + digoxin, or CCB + digoxin",
           fromLabel:"still uncontrolled",
           html:"Combine two rate-limiting agents (avoid \u03b2-blocker + verapamil/diltiazem \u2014 bradycardia/block risk). Persistent failure \u2192 consider rhythm control / refer."}
        ]}
      ]},
    {t:"node", d:"drug", n:"5", tag:"Medication \u00b7 Stream B", title:"Rhythm control \u2014 when symptoms persist",
      blocks:[
        {b:"kv", rows:[
          ["Consider when","New-onset AF; AF with a reversible cause; <b>HF thought to be caused by AF</b>; remaining symptomatic despite rate control; or patient preference (often younger)."],
          ["Drugs (specialist-guided)","\u03b2-blocker first; then <b>flecainide</b> (no structural/ischaemic heart disease), <b>sotalol</b>, <b>dronedarone</b>, or <b>amiodarone</b> (esp. with LV impairment)."],
          ["\u201cPill in the pocket\u201d","Selected infrequent paroxysmal AF: single-dose flecainide \u2014 initiated by specialist."],
          ["Cardioversion","New-onset &lt;48 h, or after \u22653 wk anticoagulation / TOE \u2014 refer."],
          ["Ablation","Symptomatic paroxysmal/persistent AF refractory or intolerant to drugs \u2014 refer."]
        ]},
        {b:"why", html:"Rate control is first-line because the AFFIRM trial showed no mortality advantage to a rhythm strategy in the older, minimally symptomatic majority \u2014 with fewer drug harms. Rhythm control earns its place when symptoms persist, the patient is young, or AF is driving heart failure (where restoring sinus rhythm improves function)."}
      ]},
    {t:"node", d:"monitor", n:"6", tag:"Monitoring", title:"What to check, and when",
      blocks:[
        {b:"table", head:["What","When","Action"], rows:[
          ["U&amp;E / eGFR (for DOAC dose)","Baseline, then annually (6-monthly if CrCl 30\u201360, elderly, or frail)","Re-dose or switch DOAC as renal function changes"],
          ["FBC + LFTs","Baseline, then annually","Anaemia (occult bleed) \u00b7 hepatic dosing"],
          ["Resting HR + symptoms","Each review","Above target / symptomatic \u2192 uptitrate or escalate"],
          ["Anticoagulation review","Annually (TTR if on warfarin)","Re-confirm benefit/risk, adherence, bleeding factors"],
          ["Digoxin level","Only if toxicity suspected","Nausea, visual changes, arrhythmia \u2014 check level + K\u207a"]
        ]}
      ]},
    {t:"node", d:"follow", n:"7", tag:"Follow-up", title:"Review schedule",
      blocks:[
        {b:"timeline", items:[
          {n:"1", when:"1 week after starting rate control", title:"Tolerability + HR", html:"Check HR, BP, symptoms and side effects; uptitrate toward target."},
          {n:"2", when:"After any DOAC/dose change", title:"Renal + adherence", html:"Confirm correct dose for renal function; reinforce adherence and the no-missed-dose message."},
          {n:"3", when:"Annual structured review", title:"Full AF review", html:"Stroke + bleeding risk re-scored, anticoagulation reaffirmed, rate/symptom control, renal function, reversible-cause check, lifestyle."}
        ]}
      ]},
    {t:"loop", icon:"🔁", title:"Not controlled? Work through this before escalating",
      arrow:"\u2026at any review, if rate or symptoms remain uncontrolled",
      intro:"Apparent failure is usually dose, adherence or an untreated driver \u2014 not the wrong drug.",
      checks:[
        {b:"1 \u00b7 Adherence", html:"Confirm tablets are taken \u2014 anticoagulant especially. Consider once-daily options."},
        {b:"2 \u00b7 Dose", html:"Is the rate-limiting drug at maximum tolerated dose before adding another?"},
        {b:"3 \u00b7 Reversible driver", html:"Recheck thyroid, alcohol, OSA, infection, anaemia, electrolytes."},
        {b:"4 \u00b7 Target realistic?", html:"Lenient &lt;110 may suffice; tighten only if symptomatic."},
        {b:"5 \u00b7 Strategy", html:"Symptomatic despite good rate control \u2192 consider rhythm control referral."}
      ],
      back:"Driver excluded, adherent, dose optimised \u2192 escalate rate control or refer for rhythm control"},
    {t:"node", d:"safety", n:"8", tag:"Safety-net", title:"Safety-netting \u2014 say it, document it",
      blocks:[
        {b:"tiles", v:"safety", items:[
          {t:"🔴 Stroke (FAST)", html:"\u201cFace drooping, arm weakness, speech difficulty \u2014 call 999 immediately, even if it passes.\u201d"},
          {t:"🩸 Major bleeding", html:"\u201cBlack tarry stools, vomiting blood, blood in urine, or a bleed that won\u2019t stop \u2014 999 / A&amp;E. After a head injury on a blood thinner, go straight to A&amp;E.\u201d"},
          {t:"💓 Haemodynamic", html:"\u201cVery fast palpitations with chest pain, severe breathlessness, blackout or collapse \u2014 call 999.\u201d"},
          {t:"💊 Missed doses", html:"\u201cDon\u2019t double up a missed anticoagulant dose \u2014 a missed dose leaves you briefly unprotected, so don\u2019t skip them.\u201d"}
        ]}
      ]},
    {t:"node", d:"refer", n:"9", tag:"Refer to secondary care", title:"When to step beyond primary care",
      arrow:"when primary-care management is exhausted or a red flag appears",
      blocks:[
        {b:"tiles", v:"refer", items:[
          {t:"Emergency", html:"Haemodynamic instability \u2014 chest pain, severe breathlessness, syncope, hypotension with fast AF \u2192 999."},
          {t:"Rhythm control", html:"Symptomatic despite rate control, new-onset for cardioversion, or ablation candidate \u2014 cardiology."},
          {t:"AF + heart failure", html:"AF with HF, or rate uncontrolled on combination therapy."},
          {t:"Valvular AF", html:"Mechanical valve or moderate\u2013severe mitral stenosis \u2014 needs warfarin + specialist input."},
          {t:"Diagnostic doubt", html:"Young patient, suspected WPW/pre-excitation, or uncertainty about AF vs other SVT."}
        ]},
        {b:"say", html:"Your heart rhythm is under control for now, but because you\u2019re still getting symptoms I\u2019d like a heart specialist to see whether we can get you back into a normal rhythm. We\u2019ll keep your current tablets going in the meantime."}
      ]}
  ]
});
</script>
