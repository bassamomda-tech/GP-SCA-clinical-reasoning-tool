MG.render({"icon":"🦵","title":"Achilles Tendinopathy","guideline":"NICE CKS","stemTitle":"Achilles tendinopathy — load-manage, exclude rupture, avoid steroid injection","stemSub":"Primary-care management of Achilles tendinopathy — confirm clinically, exclude tendon rupture, treat with load management and progressive (eccentric) loading exercises, and avoid local corticosteroid injection due to rupture risk. NICE CKS · 2026.","glance":[{"lbl":"Hallmark","val":"Posterior heel pain + stiffness","sub":"worse after rest/activity"},{"lbl":"Exclude","val":"Rupture","sub":"Simmonds/calf-squeeze test"},{"lbl":"1st-line","val":"Load management + eccentric exercise","sub":"physio"},{"lbl":"Pain relief","val":"Analgesia / topical NSAID","sub":"short-term"},{"lbl":"Avoid","val":"Steroid injection","sub":"rupture risk"},{"lbl":"Drug note","val":"Fluoroquinolone link","sub":"review/stop"}],"flow":[{"t":"node","d":"safety","n":"1","tag":"Safety-net","title":"Exclude rupture + don't-miss","blocks":[{"b":"tiles","v":"safety","items":[{"t":"🔴 Achilles rupture","html":"Sudden ‘kick/pop’ to the calf, difficulty weight-bearing/push-off, palpable gap, <b>positive Simmonds (calf-squeeze) test</b> (no plantarflexion) → urgent orthopaedic/fracture-clinic referral; immobilise (equinus), non-weight-bearing."},{"t":"💊 Fluoroquinolones","html":"Ciprofloxacin/levofloxacin cause tendinopathy/rupture — review/stop; caution with concurrent corticosteroids."},{"t":"🟠 Inflammatory","html":"Bilateral/insertional enthesitis in a young person ± inflammatory back pain → consider spondyloarthropathy."},{"t":"🟠 Insertional pathology","html":"Insertional tendinopathy / Haglund’s / retrocalcaneal bursitis differs in management from mid-portion disease."}]},{"b":"why","html":"The critical step is excluding Achilles rupture (Simmonds test) — a missed rupture has major functional consequences. Otherwise tendinopathy is a load-related overuse condition managed with progressive loading, and corticosteroid injection is avoided because it increases rupture risk."}]},{"t":"node","d":"found","n":"2","tag":"Foundation","title":"Diagnose","blocks":[{"b":"kv","rows":[["Mid-portion","Pain + thickening 2–6 cm above the insertion; pain/stiffness worse after rest (‘start-up’) and after activity; common in runners/middle-aged"],["Insertional","Pain at the calcaneal insertion ± Haglund’s deformity/bursitis — different loading approach"],["Assess","Onset, training change, footwear, calf flexibility, body weight; exclude rupture (Simmonds)"],["Imaging","Not routine; USS/MRI if diagnostic doubt, suspected partial tear, or refractory"]]}]},{"t":"node","d":"life","n":"3","tag":"Treatment","title":"Load management + rehab","blocks":[{"b":"tiles","v":"life","items":[{"t":"🏋️ Loading exercises","html":"Progressive calf/Achilles loading (eccentric heel-drops for mid-portion; modified for insertional) — the mainstay; refer physiotherapy."},{"t":"📉 Relative rest","html":"Reduce aggravating high-impact activity; modify training load; gradual return."},{"t":"👟 Footwear","html":"Cushioned/supportive shoes; heel raise can offload insertional disease short-term."},{"t":"⚖️ Weight + factors","html":"Weight management; address contributing factors; calf stretching."}]}]},{"t":"node","d":"drug","n":"4","tag":"Symptom relief","title":"Analgesia (adjunct)","blocks":[{"b":"kv","rows":[["Analgesia","Paracetamol and/or short-course topical/oral NSAID for pain to support rehab"],["AVOID steroid injection","Peritendinous corticosteroid injection is generally avoided — risk of tendon rupture"],["Other","Extracorporeal shockwave therapy or specialist options for refractory cases (via MSK/physio)"]]},{"b":"warn","html":"Counsel on the slow recovery (often 3–12 months) and the importance of consistent loading exercises. Do not inject corticosteroid into the Achilles."}]},{"t":"node","d":"follow","n":"5","tag":"Follow-up","title":"Rehab progression","blocks":[{"b":"timeline","items":[{"n":"1","when":"Weeks 0–6","title":"Load & isometrics","html":"Relative rest from aggravating load (not complete rest); begin <b>progressive calf-loading / eccentric heel-drop</b> exercises. Pain up to ~5/10 during exercise is acceptable."},{"n":"2","when":"6–12 weeks","title":"Progress loading","html":"Expect slow improvement over <b>3 months</b>; progress resistance as able. Most cases settle with a sustained loading programme — emphasise adherence and that recovery is gradual."},{"n":"3","when":"≥3–6 months / no progress","title":"Refer","html":"Refer to physiotherapy/MSK if not improving despite a structured programme. Avoid peritendinous corticosteroid injection (rupture risk)."}]},{"b":"say","html":"This is slow to settle — the key treatment is a gradual strengthening programme, and some discomfort during the exercises is fine. Give it a good three months before we consider anything else."}]},{"t":"node","d":"refer","n":"6","tag":"Refer","title":"Referral","blocks":[{"b":"tiles","v":"refer","items":[{"t":"Urgent orthopaedics","html":"Suspected Achilles rupture (positive Simmonds) — same-day/fracture clinic."},{"t":"Physiotherapy / MSK","html":"Loading programme; refractory disease for shockwave/specialist options."},{"t":"Rheumatology","html":"Suspected inflammatory enthesopathy."}]},{"b":"say","html":"This is Achilles tendinopathy — an overuse strain of the heel cord. First I’ll check the tendon isn’t torn. It responds well to a physiotherapy strengthening programme (calf exercises), easing off high-impact activity and supportive footwear — but it’s slow, often a few months. We avoid steroid injections here because they can cause the tendon to rupture."}]}],"foot":"Management of Achilles tendinopathy in primary care; exclude rupture and avoid corticosteroid injection. Verify against current NICE CKS Achilles tendinopathy."});
