<body data-screen-label="AKI management card">

<script>
MG.render({
  icon:"🫘",
  title:"Acute Kidney Injury (AKI)",
  stemTitle:"AKI \u2014 detection, the sick-day approach and safe recovery",
  stemSub:"Primary-care management of acute kidney injury \u2014 spot the rise in creatinine, decide who needs same-day admission, stop the nephrotoxins, hold the \u2018sick-day\u2019 drugs, find and treat the cause, then monitor renal recovery and review CKD risk. NICE NG148 \u00b7 CKS 2026.",
  guideline:"NICE NG148",
  glance:[
    {lbl:"Definition", val:"Creatinine \u219126\u00b5mol", sub:"in 48h, or \u00d71.5 in 7d"},
    {lbl:"1st action", val:"Assess + admit?", sub:"volume + sepsis + K\u207a"},
    {lbl:"STOP", val:"Nephrotoxins", sub:"NSAID, ACEi/ARB, etc."},
    {lbl:"Emergency", val:"K\u207a / fluid / acidosis", sub:"+ uraemia"},
    {lbl:"Recheck", val:"U&amp;E in 24\u201372h", sub:"track recovery"},
    {lbl:"Red flag", val:"Anuria / very high K\u207a", sub:"= same-day admit"}
  ],
  flow:[
    {t:"node", d:"found", n:"1", tag:"Foundation", title:"Confirm AKI and grade it",
      blocks:[
        {b:"kv", rows:[
          ["Definition (KDIGO)","Serum creatinine rise \u226526 \u00b5mol/L within 48h, or \u22651.5\u00d7 baseline within 7 days, or urine output &lt;0.5 mL/kg/h for &gt;6h"],
          ["Stage","1: \u00d71.5\u20131.9 \u00b7 2: \u00d72\u20132.9 \u00b7 3: \u00d73 or creatinine \u2265354 or RRT \u2014 higher stage = higher risk"],
          ["Spot it","Often an incidental rise on bloods, or unwell + reduced urine output. Compare with the patient\u2019s baseline creatinine"],
          ["Context","Acute illness (sepsis, D&amp;V, AKI on CKD), recent contrast, new drugs, urinary symptoms"]
        ]},
        {b:"why", html:"AKI is common, frequently iatrogenic and a strong marker of mortality and future CKD. The pre-renal/intrinsic/post-renal framework directs the most urgent actions: restore perfusion, stop the offending drug, and exclude obstruction."}
      ]},
    {t:"node", d:"safety", n:"2", tag:"Safety-net", title:"Who needs same-day hospital assessment?",
      blocks:[
        {b:"tiles", v:"safety", items:[
          {t:"🔴 Hyperkalaemia", html:"K\u207a \u22656.5 (or \u22656.0 with ECG changes) \u2192 emergency admission \u2014 risk of fatal arrhythmia."},
          {t:"🔴 Fluid overload", html:"Pulmonary oedema / breathless / unable to manage fluids \u2192 same-day."},
          {t:"🔴 Severe / stage 3 AKI", html:"Marked or rapidly rising creatinine, oliguria/anuria, acidosis, uraemia (confusion, pericardial rub) \u2192 admit."},
          {t:"🔴 No clear reversible cause / unwell", html:"Sepsis, hypovolaemia not correctable in the community, suspected obstruction with infection \u2192 admit."}
        ]},
        {b:"warn", html:"Anuria, suspected obstructed + infected urinary tract (pyonephrosis), or hyperkalaemia are emergencies \u2014 arrange immediate admission, do not wait for repeat bloods."}
      ]},
    {t:"node", d:"life", n:"3", tag:"Non-drug · core", title:"Supportive & sick-day measures", blocks:[{b:"tiles", v:"life", items:[{t:"💧 Optimise volume", html:"Assess and correct volume status; treat the cause (sepsis, obstruction, hypovolaemia)."},{t:"⏸️ Sick-day rules", html:"Temporarily hold nephrotoxins/at-risk drugs (NSAIDs, ACEi/ARB, diuretics, metformin, SGLT2i) during acute illness."},{t:"📋 Monitor & hydrate", html:"Encourage oral intake where safe; monitor urine output and weight."}]},{b:"why", html:"Stopping nephrotoxic and at-risk drugs during acute illness (sick-day rules) and restoring volume are the core non-drug actions that often reverse AKI."}]},
    {t:"node", d:"drug", n:"4", tag:"Medication \u00b7 first move", title:"Stop nephrotoxins + hold sick-day drugs",
      blocks:[
        {b:"kv", rows:[
          ["STOP / avoid","NSAIDs, aminoglycosides (gentamicin), and review iodinated contrast \u2014 directly nephrotoxic"],
          ["HOLD during acute illness (sick-day rules)","ACE inhibitors / ARBs, diuretics, <b>metformin</b>, SGLT2 inhibitors, and other antihypertensives if hypotensive \u2014 restart when recovered"],
          ["Review + dose-adjust","Digoxin, DOACs/LMWH, opioids, gabapentinoids, lithium, methotrexate \u2014 accumulate in renal impairment; check levels/doses"],
          ["Document","Give the patient clear sick-day guidance: which drugs to pause when vomiting/diarrhoea/febrile, and when to restart"]
        ]},
        {b:"why", html:"\u2018DAMN\u2019 drugs (Diuretics/Diabetes agents, ACEi/ARB, Metformin/NSAIDs) are the commonest reversible contributors. Holding them during intercurrent illness (sick-day rules) prevents and treats AKI \u2014 and forgetting to restart them afterwards causes harm too."}
      ]},
    {t:"node", d:"found", n:"5", tag:"Find the cause", title:"Pre-renal vs intrinsic vs post-renal",
      blocks:[
        {b:"table", head:["Category","Clues","Action"], rows:[
          ["Pre-renal (commonest)","Hypovolaemia (D&amp;V, sepsis, bleeding, poor intake), hypotension","Restore volume \u2014 oral or IV fluids; treat sepsis"],
          ["Intrinsic","Drugs (ATN), glomerulonephritis (haematuria + proteinuria + oedema), myeloma, rhabdomyolysis","Dipstick + urine PCR/ACR; if GN suspected \u2192 urgent nephrology"],
          ["Post-renal","Obstruction \u2014 anuria, palpable bladder, prostatism, stones, pelvic malignancy","Urgent renal-tract USS; catheterise if outflow obstruction"]
        ]},
        {b:"kv", rows:[
          ["Bedside","Volume status (BP lying/standing, JVP, mucous membranes, urine output), palpable bladder, fluid balance"],
          ["Tests","Repeat U&amp;E, FBC, CRP, bicarbonate; <b>urine dipstick</b> (blood+protein \u2192 GN/myeloma); renal USS if obstruction suspected or no cause found"]
        ]}
      ]},
    {t:"node", d:"drug", n:"6", tag:"Manage in community (if appropriate)", title:"Treat the cause + support",
      blocks:[
        {b:"ladder", steps:[
          {step:"Step 1", title:"Restore perfusion", when:"pre-renal",
           html:"Encourage oral fluids; treat the precipitant (infection, D&amp;V). Reassess volume and urine output. Low threshold to admit if not improving."},
          {step:"Step 2", title:"Relieve obstruction", when:"post-renal",
           fromLabel:"if obstructed",
           html:"Catheterise for bladder-outflow obstruction; urgent urology/imaging for upper-tract obstruction (especially if infected \u2192 emergency)."},
          {step:"Step 3", title:"Remove the insult", when:"intrinsic / drug",
           fromLabel:"if drug-induced",
           html:"Stop the nephrotoxin; if glomerulonephritis/vasculitis/myeloma suspected \u2192 urgent nephrology/haematology."}
        ]}
      ]},
    {t:"node", d:"monitor", n:"7", tag:"Monitoring", title:"Track renal recovery",
      blocks:[
        {b:"table", head:["What","When","Action"], rows:[
          ["U&amp;E (creatinine, K\u207a, bicarb)","Within 24\u201372h, then until recovered","Rising/not improving \u2192 escalate/admit"],
          ["Fluid balance / weight","Daily if managing at home","Overload or worsening oliguria \u2192 admit"],
          ["Held medicines","On recovery","Restart ACEi/ARB, metformin, SGLT2i, diuretics when stable; recheck U&amp;E after restarting ACEi/ARB"],
          ["Repeat creatinine after recovery","2\u20133 months","Confirm return to baseline; identify new/progressive CKD"]
        ]}
      ]},
    {t:"loop", icon:"🔁", title:"Creatinine not improving?",
      arrow:"\u2026if renal function fails to recover",
      intro:"Reassess the three categories \u2014 something is ongoing.",
      checks:[
        {b:"1 \u00b7 Perfusion", html:"Still hypovolaemic or hypotensive/septic? Reassess and treat."},
        {b:"2 \u00b7 Obstruction", html:"Has a renal-tract USS been done? Exclude/relieve obstruction."},
        {b:"3 \u00b7 Drugs", html:"All nephrotoxins stopped and doses adjusted?"},
        {b:"4 \u00b7 Intrinsic disease", html:"Blood + protein on dip, or myeloma features \u2192 urgent nephrology."},
        {b:"5 \u00b7 Admit", html:"Worsening biochemistry, overload or uraemia \u2192 same-day admission."}
      ],
      back:"Cause addressed + improving \u2192 continue monitoring to baseline"},
    {t:"node", d:"refer", n:"8", tag:"Refer", title:"When to refer / admit",
      arrow:"escalation thresholds",
      blocks:[
        {b:"tiles", v:"refer", items:[
          {t:"Emergency admission", html:"Hyperkalaemia, fluid overload, stage 3/severe AKI, uraemia, acidosis, obstructed+infected tract, no correctable cause."},
          {t:"Urgent nephrology", html:"Suspected glomerulonephritis/vasculitis (blood+protein, systemic features), myeloma, or AKI not recovering."},
          {t:"Urology", html:"Obstructive AKI \u2014 stones, retention, pelvic malignancy."},
          {t:"Post-AKI review", html:"All patients \u2014 medicines reconciliation, CKD surveillance, avoid future nephrotoxins."}
        ]},
        {b:"say", html:"Your kidney blood test has gone off \u2014 usually from dehydration, infection or a medication. We\u2019ll pause some tablets while you\u2019re unwell, get fluids in, and recheck the blood. If you\u2019re passing very little urine, getting breathless or feel very unwell, we need to send you in the same day."}
      ]}
  ],
  foot:"Primary-care framework for acute kidney injury; many cases require same-day hospital assessment. Includes drug \u2018sick-day\u2019 guidance. Verify against current NICE NG148, KDIGO AKI guidance and your local AKI/sick-day-rules pathway."
});
</script>
