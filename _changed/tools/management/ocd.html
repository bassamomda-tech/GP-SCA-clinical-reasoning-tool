<script>
MG.render({
  icon:"🧠",
  title:"OCD",
  stemTitle:"Obsessive-compulsive disorder — ongoing management",
  stemSub:"Primary-care management of OCD on the stepped-care model \u2014 CBT with exposure and response prevention (ERP), SSRIs (often higher dose, longer trial), and combination for severe disease \u2014 up to specialist referral. NICE CG31 \u00b7 CKS 2026.",
  guideline:"NICE CG31",
  glance:[
    {lbl:"Model", val:"Stepped care", sub:"by severity"},
    {lbl:"Core therapy", val:"CBT with ERP", sub:"exposure + response prevention"},
    {lbl:"Drug 1st-line", val:"SSRI", sub:"often higher dose"},
    {lbl:"Trial length", val:"\u226512 weeks", sub:"longer than depression"},
    {lbl:"Severe", val:"SSRI + CBT", sub:"combination"},
    {lbl:"Refer", val:"Severe / refractory", sub:"specialist"}
  ],
  flow:[
    {t:"node", d:"found", n:"1", tag:"Foundation", title:"Confirm OCD, severity and risk",
      blocks:[
        {b:"kv", rows:[
          ["Features","Obsessions (intrusive thoughts) + compulsions (repetitive acts/rituals) that are distressing and time-consuming"],
          ["Severity","Functional impact (mild / moderate / severe) \u2014 guides the stepped-care level"],
          ["Risk","Suicidality, severe self-neglect, impact on dependants/safeguarding"],
          ["Comorbidity","Depression, anxiety, tics, eating disorder, substance misuse \u2014 common"]
        ]},
        {b:"why", html:"OCD responds to two evidence-based treatments \u2014 <strong>CBT with ERP</strong> and <strong>SSRIs</strong> \u2014 matched to severity via stepped care. Two features differ from depression: SSRIs often need <strong>higher doses and a longer trial (\u226512 weeks)</strong>, and ERP (deliberately facing triggers without ritualising) is the active ingredient of the therapy."}
      ]},
    {t:"node", d:"life", n:"2", tag:"Non-drug \u00b7 first-line", title:"CBT with exposure and response prevention",
      blocks:[
        {b:"tiles", v:"life", items:[

          {t:"📚 Psychoeducation", html:"Explain the obsession\u2013anxiety\u2013compulsion\u2013relief cycle and how ERP breaks it."},
          {t:"👨‍👩‍👧 Involve family", html:"Reduce family accommodation of rituals (which maintains OCD); support carers."},
          {t:"📱 Guided self-help", html:"For mild OCD \u2014 CBT-based self-help/digital resources."},
          {t:"🔗 Function", html:"Support work/education; address avoidance."},
          {t:"🧩 Comorbidity", html:"Address depression/anxiety that worsen or mask OCD."}
        ]}
      ]},

      blocks:[
        {b:"ladder", steps:[
          {step:"Step 1", title:"An SSRI", when:"often titrated to higher dose",

          {step:"Adequate trial", title:"Wait \u226512 weeks", when:"before judging response",

           html:"Assess response over <b>at least 12 weeks</b> at an adequate dose before switching."},
          {step:"Step 2", title:"Switch SSRI or try clomipramine", when:"inadequate response",
           fromLabel:"after an adequate trial",
           html:"Switch to another SSRI, or to <b>clomipramine</b> (TCA with strong OCD evidence; ECG/cautions)."},
          {step:"Severe", title:"Combination SSRI + CBT", when:"moderate\u2013severe",
           fromLabel:"escalate",
           html:"Combine medication with high-intensity CBT/ERP; refer if not responding."}
        ]},
        {b:"warn", html:"OCD needs <b>higher SSRI doses and a longer trial</b> than depression \u2014 don\u2019t switch prematurely. Monitor suicidality early (esp. &lt;25 y); clomipramine needs ECG and overdose-risk consideration."}
      ]},
    {t:"node", d:"monitor", n:"4", tag:"Monitoring", title:"Response, risk and dose",
      blocks:[
        {b:"table", head:["What","When","Action"], rows:[
          ["Risk + early effects","1\u20132 weeks after starting (1 wk if &lt;30/at risk)","Escalate if risk rises"],
          ["Symptoms / function","Each review","Track over \u226512 weeks before judging SSRI"],
          ["Dose","During titration","Push to effective (often higher) dose as tolerated"],
          ["Therapy engagement","Ongoing","Ensure CBT/ERP accessed and practised"]
        ]}
      ]},
    {t:"node", d:"follow", n:"5", tag:"Follow-up", title:"Review schedule",
      blocks:[
        {b:"timeline", items:[
          {n:"1", when:"1\u20132 weeks after starting drug", title:"Early review", html:"Risk, tolerability, expectation-setting; refer for CBT/ERP."},
          {n:"2", when:"Over \u226512 weeks", title:"Response review", html:"Titrate dose; assess over an adequate trial before switching."},
          {n:"3", when:"Ongoing", title:"Continuation", html:"Continue effective treatment (often \u226512 months); relapse prevention; escalate if refractory."}
        ]}
      ]},
    {t:"loop", icon:"🔁", title:"Not responding? Check before switching",

      intro:"Confirm an adequate (higher-dose, \u226512-week) trial and ERP engagement.",
      checks:[
        {b:"1 \u00b7 Dose & duration", html:"Was the SSRI at an adequate (often higher) dose for \u226512 weeks?"},
        {b:"2 \u00b7 ERP", html:"Is the therapy genuinely ERP-based, and being practised between sessions?"},
        {b:"3 \u00b7 Accommodation", html:"Is family accommodation of rituals maintaining symptoms?"},
        {b:"4 \u00b7 Comorbidity", html:"Untreated depression/anxiety undermining progress?"},
        {b:"5 \u00b7 Escalate", html:"Adequate trial failed \u2192 switch SSRI / clomipramine / specialist."}
      ],
      back:"Adequate trial, ERP engaged, accommodation addressed \u2192 switch agent / refer"},
    {t:"node", d:"safety", n:"6", tag:"Safety-net", title:"Safety-netting",
      blocks:[
        {b:"tiles", v:"safety", items:[
          {t:"🔴 Crisis", html:"\u201cIf you feel unsafe or have thoughts of ending your life \u2014 call 999, go to A&amp;E, or ring NHS 111 / Samaritans 116 123.\u201d"},
          {t:"⏳ Be patient", html:"\u201cThe tablets can take longer to work in OCD than in depression \u2014 stick with it and we\u2019ll review the dose.\u201d"},
          {t:"⚠️ Early worsening", html:"\u201cIf you feel more agitated or low in the first weeks of an antidepressant, contact us promptly.\u201d"},
          {t:"🔄 Resisting rituals", html:"\u201cThe therapy works by facing triggers without doing the ritual \u2014 it feels hard at first but the anxiety fades.\u201d"}
        ]}
      ]},
    {t:"node", d:"refer", n:"7", tag:"Refer to secondary care", title:"When to refer",

      blocks:[
        {b:"tiles", v:"refer", items:[
          {t:"Urgent", html:"Significant suicide risk or severe functional collapse \u2192 urgent mental-health assessment."},
          {t:"Severe", html:"Severe OCD, or marked impairment \u2192 specialist mental-health/OCD service."},
          {t:"Refractory", html:"Inadequate response to CBT/ERP + adequate SSRI (and/or clomipramine) trials."},
          {t:"Diagnostic complexity", html:"Significant comorbidity (e.g. tics, eating disorder, psychosis) or doubt."}
        ]},
        {b:"say", html:"OCD is very treatable. The two things that work are a specific therapy \u2014 facing the triggers without doing the rituals \u2014 and antidepressants, which in OCD often need a higher dose and a bit longer to work. Let\u2019s start both and review."}
      ]}
  ]
