MG.render({"icon":"⚡","title":"Post-Herpetic Neuralgia","guideline":"NICE NG173","stemTitle":"Post-herpetic neuralgia — neuropathic-pain ladder + prevention","stemSub":"Primary-care management of post-herpetic neuralgia — persistent dermatomal pain after shingles; treat with the NG173 neuropathic-pain agents and topical options, support function and mood, and emphasise prevention through early shingles antivirals and vaccination. NICE NG173 · 2026.","glance":[{"lbl":"Definition","val":"Pain >90 days post-rash","sub":"same dermatome"},{"lbl":"1st-line","val":"NG173 agent","sub":"amitriptyline/duloxetine/gabapentinoid"},{"lbl":"Localised","val":"Capsaicin / lidocaine patch","sub":"topical options"},{"lbl":"Prevent","val":"Early antiviral + zoster vaccine","sub":""},{"lbl":"Support","val":"Sleep, mood, function","sub":"biopsychosocial"},{"lbl":"Refer","val":"Refractory → pain clinic","sub":""}],"flow":[{"t":"node","d":"found","n":"1","tag":"Foundation","title":"Recognise + risk","blocks":[{"b":"kv","rows":[["Definition","Neuropathic pain persisting (or recurring) ≥ ~90 days after the onset of the shingles rash, in the affected dermatome"],["Features","Burning, aching, stabbing pain; allodynia (pain on light touch/clothing); often elderly; thoracic/ophthalmic common"],["Risk factors","Older age, severe acute pain/rash, ophthalmic zoster"],["Impact","Sleep, mood, appetite, function — assess and address"]]},{"b":"why","html":"PHN is the commonest complication of shingles and is treated as neuropathic pain (NG173). Its risk is reduced by treating acute shingles with antivirals early and by zoster vaccination — so prevention is part of the management story."}]},{"t":"node","d":"drug","n":"2","tag":"Treatment","title":"Neuropathic-pain ladder","blocks":[{"b":"ladder","steps":[{"step":"1st-line","title":"NG173 oral agent","when":"choose one + switch","html":"<b>Amitriptyline 10–75 mg nocte</b>, <b>duloxetine 60 mg OD</b>, <b>gabapentin titrated to 300–1200 mg TDS</b> or <b>pregabalin 75–300 mg BD</b> — start low, titrate; switch (don’t stack first) if ineffective/not tolerated. Review at 4–6 weeks."},{"step":"Topical","title":"Capsaicin / lidocaine","when":"localised pain","fromLabel":"if localised / oral-limited","html":"Capsaicin 0.075% cream (or 8% patch via specialist); topical lidocaine 5% plaster for localised PHN, useful when oral agents are limited by side effects (elderly)."},{"step":"Combination / escalate","title":"Combine or refer","when":"refractory","fromLabel":"if inadequate","html":"Combine classes under review; refer to pain clinic for refractory pain (interventional options, multidisciplinary support)."}]},{"b":"warn","html":"In elderly patients balance efficacy against falls/sedation/anticholinergic load; topical lidocaine is a useful lower-risk option. Gabapentinoids are controlled drugs — prescribe carefully."}]},{"t":"node","d":"life","n":"3","tag":"Support + prevention","title":"Function + future","blocks":[{"b":"tiles","v":"life","items":[{"t":"💉 Zoster vaccine","html":"Offer eligible patients the shingles vaccine to prevent future episodes/PHN."},{"t":"⏱️ Early antiviral","html":"Treating acute shingles within 72h reduces PHN risk — reinforce for future/at-risk."},{"t":"🧠 Mood + sleep","html":"Treat coexisting depression/insomnia; CBT/ACT for chronic pain (NG193)."},{"t":"🤝 Function","html":"Pacing, clothing protection for allodynia, support and reassurance pain usually improves over months."}]}]},{"t":"node","d":"follow","n":"4","tag":"Follow-up","title":"Titration & review","blocks":[{"b":"timeline","items":[{"n":"1","when":"2–4 weeks","title":"Titrate to effect","html":"Review the chosen neuropathic agent (amitriptyline, duloxetine, gabapentin or pregabalin) — titrate to an effective/tolerated dose over weeks; switch class if one fails at adequate dose."},{"n":"2","when":"Ongoing","title":"Adjuncts & expectations","html":"Topical capsaicin or lidocaine 5% plaster for localised pain. Explain PHN often <b>improves over months</b>; set realistic goals (reduce, not abolish, pain)."},{"n":"3","when":"Refractory","title":"Refer to pain clinic","html":"Severe or refractory pain despite sequential agents → specialist pain service."}]},{"b":"say","html":"These nerve-pain tablets take a few weeks to reach the right dose, and the good news is the pain usually eases over the following months. We'll fine-tune the dose and try alternatives if needed."}]},{"t":"node","d":"safety","n":"5","tag":"Safety-net","title":"When to refer / reassess","blocks":[{"b":"tiles","v":"safety","items":[{"t":"🟠 New deficit","html":"New motor weakness, spreading sensory loss, or atypical pain → reconsider the diagnosis and refer."},{"t":"🔴 Ophthalmic / disseminated","html":"Eye involvement or widespread rash in the acute phase, or immunocompromise → urgent review."},{"t":"💬 Safety-net","html":"If you develop new weakness, the pain changes character, or you feel generally unwell, contact us."}]}]},{"t":"node","d":"refer","n":"6","tag":"Refer","title":"Referral","blocks":[{"b":"tiles","v":"refer","items":[{"t":"Pain clinic","html":"Refractory PHN despite optimised oral + topical therapy."},{"t":"Ophthalmology","html":"PHN after ophthalmic zoster with ongoing eye involvement."},{"t":"Mental health","html":"Significant depression / impact."}]},{"b":"say","html":"This is post-shingles nerve pain. It can be stubborn but usually eases over months. We treat it with nerve-pain medicines — tablets, and patches or creams for a localised area, which are gentler if you’re older. Treating shingles early and the shingles vaccine both help prevent it next time."}]}],"foot":"Management of post-herpetic neuralgia in primary care per NG173; prevention via early antivirals and zoster vaccination. Verify against current NICE NG173 and the Green Book."});
</script>
