<body data-screen-label="Osteoarthritis management card">
<div class="mg-wrap" id="mgRoot"></div>
<script src="../../assets/management-engine.js"></script>
<script>
MG.render({
  icon:"🦵",
  title:"Osteoarthritis",
  stemTitle:"Confirmed Osteoarthritis — ongoing management",
  stemSub:"Primary-care management of diagnosed OA on the 2022 NICE model \u2014 therapeutic exercise and weight management as the core treatment, topical-first analgesia, and joint-replacement referral when quality of life is substantially affected. NICE NG226 \u00b7 CKS 2026.",
  guideline:"NICE NG226",
  glance:[
    {lbl:"Diagnosis", val:"Clinical", sub:"no imaging if typical"},
    {lbl:"Core treatment", val:"Exercise", sub:"+ weight loss"},
    {lbl:"Analgesia 1st", val:"Topical NSAID", sub:"knee/hand"},
    {lbl:"Then", val:"Oral NSAID + PPI", sub:"lowest dose, shortest time"},
    {lbl:"Avoid routine", val:"Paracetamol alone / opioids", sub:"limited benefit"},
    {lbl:"Refer", val:"QoL affected", sub:"joint replacement"}
  ],
  flow:[
    {t:"node", d:"found", n:"1", tag:"Foundation", title:"Diagnose clinically, assess impact",
      blocks:[
        {b:"kv", rows:[
          ["Diagnosis","<b>Clinical</b> if \u226545 y, activity-related joint pain, and no/short morning stiffness \u2014 imaging not required"],
          ["Assess","Function, pain, sleep, mood, work, which joints, effect on quality of life"],
          ["Comorbidity","Relevant to drug choice (GI, renal, CV risk for NSAIDs)"],
          ["Set expectations","OA is manageable; the aim is function and pain control, not a \u2018cure\u2019"]
        ]},
        {b:"why", html:"NICE 2022 reframed OA around <strong>therapeutic exercise and weight management as the core treatment for everyone</strong>, with drugs as adjuncts \u2014 because exercise has the best evidence for pain and function, while long-term analgesia has modest benefit and real harms. Over-imaging and an X-ray-led narrative drive unnecessary pessimism and intervention."}
      ]},
    {t:"node", d:"life", n:"2", tag:"Non-drug \u00b7 core treatment", title:"Exercise and weight \u2014 offered to all",
      blocks:[
        {b:"tiles", v:"life", items:[
          {t:"🏃 Therapeutic exercise", html:"<b>First-line for all</b> \u2014 muscle strengthening + aerobic activity, tailored and sustained; benefit may take weeks."},
          {t:"⚖️ Weight loss", html:"If overweight \u2014 even modest loss reduces load-joint pain meaningfully."},
          {t:"📚 Education & self-management", html:"Explain the condition, set realistic goals, support self-efficacy."},
          {t:"🦯 Aids & devices", html:"Walking aids, appropriate footwear; consider occupational therapy."},
          {t:"🤲 Manual therapy", html:"As an adjunct to exercise (esp. hip/knee), not a standalone."},
          {t:"🔥 Local heat/TENS", html:"May help symptom relief for some \u2014 low-risk adjuncts."}
        ]}
      ]},
    {t:"node", d:"drug", n:"3", tag:"Medication \u00b7 adjunct, topical-first", title:"Analgesia ladder",
      blocks:[
        {b:"ladder", steps:[
          {step:"Step 1", title:"Topical NSAID", when:"knee / hand OA",
           html:"First-line pharmacological option \u2014 e.g. <b>topical ibuprofen 5% or diclofenac 1% gel, applied up to TDS\u2013QDS</b> \u2014 good local effect, minimal systemic risk."},
          {step:"Step 2", title:"Oral NSAID + gastroprotection", when:"lowest dose, shortest time",
           fromLabel:"insufficient / unsuitable site",
           html:"Oral NSAID at the lowest effective dose for the shortest time \u2014 e.g. <b>ibuprofen 400 mg TDS</b> or <b>naproxen 250\u2013500 mg BD</b> \u2014 <b>with a PPI (e.g. omeprazole 20 mg OD)</b>. Weigh GI, renal and cardiovascular risk \u2014 caution in elderly, CKD, CVD, on ACEi/diuretic."},
          {step:"Adjunct", title:"Topical capsaicin / intra-articular steroid", when:"selected",
           fromLabel:"for flares / when NSAIDs unsuitable",
           html:"<b>Topical capsaicin 0.025% cream QDS</b> (knee/hand). <b>Intra-articular corticosteroid</b> (e.g. methylprednisolone acetate 40 mg, or triamcinolone) for short-term relief of a flare."}
        ]},
        {b:"warn", html:"<b>NICE 2022:</b> do <b>not</b> routinely offer paracetamol alone or weak opioids (limited benefit, opioid harms); avoid glucosamine/chondroitin and intra-articular hyaluronan. Reserve strong opioids for exceptional, time-limited use."}
      ]},
    {t:"node", d:"monitor", n:"4", tag:"Monitoring", title:"Function and drug safety",
      blocks:[
        {b:"table", head:["What","When","Action"], rows:[
          ["Function / pain / QoL","Each review","Worsening QoL despite core treatment \u2192 consider referral"],
          ["NSAID safety","If on regular oral NSAID","Review renal function, BP, GI symptoms; use intermittently"],
          ["Exercise adherence","Each review","Re-motivate; the core treatment only works if done"],
          ["Mood / sleep","As needed","Treat comorbid low mood / poor sleep that amplify pain"]
        ]}
      ]},
    {t:"node", d:"follow", n:"5", tag:"Follow-up", title:"Review schedule",
      blocks:[
        {b:"timeline", items:[
          {n:"1", when:"After establishing exercise", title:"Reassess", html:"Review exercise engagement, weight, analgesia need and tolerability."},
          {n:"2", when:"Periodic", title:"Function review", html:"Track impact on daily life; adjust adjuncts; reinforce self-management."},
          {n:"3", when:"If QoL substantially affected", title:"Referral decision", html:"Discuss joint replacement when conservative measures no longer maintain quality of life."}
        ]}
      ]},
    {t:"loop", icon:"🔁", title:"Not controlled? Check before escalating",
      arrow:"\u2026if pain/function not improving",
      intro:"Optimise the core treatment before relying on drugs or imaging.",
      checks:[
        {b:"1 \u00b7 Exercise", html:"Is therapeutic exercise actually being done and sustained?"},
        {b:"2 \u00b7 Weight", html:"Weight management addressed for load joints?"},
        {b:"3 \u00b7 Analgesia", html:"Topical tried before oral; NSAID at lowest effective dose with PPI?"},
        {b:"4 \u00b7 Other cause", html:"Hot swollen joint, rapid change, or atypical features \u2192 reconsider diagnosis."},
        {b:"5 \u00b7 QoL", html:"If quality of life is substantially affected despite all of the above \u2192 refer."}
      ],
      back:"Core treatment optimised, QoL still affected \u2192 refer for joint-replacement assessment"},
    {t:"node", d:"safety", n:"6", tag:"Safety-net", title:"Safety-netting",
      blocks:[
        {b:"tiles", v:"safety", items:[
          {t:"🔴 Hot swollen joint", html:"\u201cA suddenly hot, swollen, very painful joint with fever \u2014 seek urgent help; it could be infection or gout, not OA.\u201d"},
          {t:"⚠️ NSAID risks", html:"\u201cReport indigestion, black stools, or ankle swelling on anti-inflammatories; avoid if we\u2019ve said your kidneys/stomach are at risk.\u201d"},
          {t:"🦵 Red flags", html:"\u201cRapidly worsening pain, night pain, weight loss, or a lump \u2014 get checked.\u201d"},
          {t:"🏃 Keep moving", html:"\u201cRest makes OA joints stiffer \u2014 staying active is treatment, even when it aches a little.\u201d"}
        ]}
      ]},
    {t:"node", d:"refer", n:"7", tag:"Refer to secondary care", title:"When to refer",
      arrow:"when QoL is affected or the picture is atypical",
      blocks:[
        {b:"tiles", v:"refer", items:[
          {t:"Joint replacement", html:"Quality of life substantially affected despite optimal conservative management \u2014 don\u2019t delay for arbitrary X-ray thresholds."},
          {t:"Diagnostic doubt", html:"Atypical features, inflammatory pattern, or suspected alternative diagnosis."},
          {t:"Urgent", html:"Suspected septic arthritis or sinister cause \u2192 same-day."},
          {t:"Allied health", html:"Physiotherapy, occupational therapy, podiatry, weight services as needed."}
        ]},
        {b:"say", html:"The best treatment for your joint is actually exercise and, if relevant, some weight loss \u2014 painkillers help a bit but the movement does the real work. If it ever stops you doing the things that matter to you despite all this, we can talk about a joint replacement."}
      ]}
  ]
});
</script>
