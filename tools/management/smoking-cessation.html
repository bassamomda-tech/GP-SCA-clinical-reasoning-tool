<body data-screen-label="Smoking cessation management card">

<script>
MG.render({
  icon:"🚭",
  title:"Smoking Cessation",
  stemTitle:"Stopping smoking \u2014 very brief advice, then pharmacotherapy + support",
  stemSub:"Primary-care smoking cessation \u2014 deliver Very Brief Advice at every opportunity, then combine behavioural support with the most effective pharmacotherapy (varenicline, combination NRT, or a licensed vape) to maximise quit rates. NICE NG209 \u00b7 2026.",
  guideline:"NICE NG209",
  glance:[
    {lbl:"Every contact", val:"Very Brief Advice", sub:"Ask\u00b7Advise\u00b7Act"},
    {lbl:"Most effective", val:"Varenicline 1 mg BD", sub:"+ behavioural support"},
    {lbl:"Alternative", val:"Combination NRT", sub:"patch + short-acting"},
    {lbl:"Option", val:"Licensed vape", sub:"as a quit aid"},
    {lbl:"Support", val:"Stop-smoking service", sub:"\u00d72\u20133 quit rates"},
    {lbl:"Pregnancy", val:"NRT \u00b1 CO monitoring", sub:"behavioural first"}
  ],
  flow:[
    {t:"node", d:"found", n:"1", tag:"Foundation", title:"Very Brief Advice (VBA) \u2014 every contact",
      blocks:[
        {b:"kv", rows:[
          ["ASK","Record smoking status for every patient at every opportunity"],
          ["ADVISE","The best thing for your health is to stop; the most effective way is with support + medication (not willpower alone)"],
          ["ACT","Offer referral to the local stop-smoking service + pharmacotherapy; don\u2019t lecture \u2014 it takes ~30 seconds"],
          ["Assess dependence","Cigarettes/day, time to first cigarette, previous quit attempts, triggers, motivation, comorbidity"]
        ]},
        {b:"why", html:"Smoking is the single largest preventable cause of death; brief opportunistic advice plus an offer of help meaningfully increases quit attempts. Combining behavioural support with pharmacotherapy roughly triples success versus going it alone."}
      ]},
    {t:"node", d:"drug", n:"2", tag:"Medication", title:"Choose pharmacotherapy",
      blocks:[
        {b:"ladder", steps:[
          {step:"1st-line (most effective)", title:"Varenicline", when:"if available + suitable",
           html:"Start ~1\u20132 weeks before quit date; titrate; 12-week course. Most effective single agent. Counsel re nausea, vivid dreams, low mood \u2014 review. (Availability has varied \u2014 check current supply.)"},
          {step:"1st-line (highly effective)", title:"Combination NRT", when:"widely used",
           fromLabel:"if varenicline unsuitable/unavailable",
           html:"<b>Long-acting patch + short-acting</b> (gum/lozenge/inhalator/spray) together \u2014 more effective than single-form NRT. Start on quit date; titrate to cravings; safe in most patients."},
          {step:"Option", title:"Licensed nicotine vape", when:"if patient prefers",
           fromLabel:"alternative quit aid",
           html:"NICE NG209 supports vapes as an effective quit aid for adults; combine with behavioural support. Not for non-smokers/young people/pregnancy."},
          {step:"Alternative", title:"Bupropion", when:"if others unsuitable",
           fromLabel:"second-line",
           html:"Bupropion (<b>150 mg OD for 6 days, then 150 mg BD</b>) is an option; cautions/contraindications (seizure risk, eating disorders). Avoid in pregnancy."}
        ]},
        {b:"warn", html:"Smoking cessation raises blood levels of some drugs metabolised via CYP1A2 (e.g. theophylline, clozapine, olanzapine) \u2014 doses may need review on stopping. Adjust insulin/warfarin monitoring as needed."}
      ]},
    {t:"node", d:"life", n:"3", tag:"Behavioural support", title:"Maximise the quit",
      blocks:[
        {b:"tiles", v:"life", items:[
          {t:"📅 Quit date", html:"Set a firm quit date; \u2018not a puff\u2019 rule from that day."},
          {t:"🤝 Specialist service", html:"Refer to local stop-smoking service \u2014 structured behavioural support doubles\u2013triples success."},
          {t:"🧠 Triggers + coping", html:"Identify routines/triggers; plan alternatives; manage stress and weight-gain worries."},
          {t:"👨‍👩‍👧 Household", html:"Encourage other smokers in the home to quit; smoke-free home/car protects children."},
          {t:"📱 Tools", html:"NHS Quit Smoking app, helpline, financial-saving framing as motivation."}
        ]}
      ]},
    {t:"node", d:"safety", n:"4", tag:"Special groups", title:"Tailor the approach",
      blocks:[
        {b:"tiles", v:"safety", items:[
          {t:"🤰 Pregnancy", html:"Behavioural support first; offer NRT if needed (intermittent dosing, remove patch overnight option); CO monitoring; avoid varenicline/bupropion. Vaping less harmful than smoking if it helps quit."},
          {t:"🧠 Severe mental illness", html:"Higher smoking rates \u2014 offer cessation actively; monitor mental state + clozapine/olanzapine levels on quitting."},
          {t:"🫁 Comorbidity", html:"COPD, CVD, diabetes, pre-surgery \u2014 cessation is the highest-value intervention; prioritise."},
          {t:"🧒 Young people", html:"Behavioural support; do not initiate vaping in non-smokers."}
        ]}
      ]},
    {t:"node", d:"monitor", n:"5", tag:"Follow-up", title:"Support the quit attempt",
      blocks:[
        {b:"timeline", items:[
          {n:"1", when:"Quit date", title:"Start meds", html:"Begin pharmacotherapy (or before, for varenicline); confirm plan + support referral."},
          {n:"2", when:"1\u20134 weeks", title:"Review", html:"Check adherence, side effects, cravings, withdrawal, mood; titrate NRT; CO if available."},
          {n:"3", when:"12 weeks +", title:"Relapse prevention", html:"Complete course; congratulate; plan for high-risk situations; treat lapses as learning, re-attempt."}
        ]}
      ]},
    {t:"node", d:"refer", n:"6", tag:"Refer", title:"Signposting",
      arrow:"structured support",
      blocks:[
        {b:"tiles", v:"refer", items:[
          {t:"Stop-smoking service", html:"Local specialist behavioural support + medication \u2014 the highest-yield referral."},
          {t:"Pharmacy", html:"Community pharmacy schemes for NRT supply + support."},
          {t:"Mental health / maternity", html:"Integrated cessation support for SMI and pregnancy."}
        ]},
        {b:"say", html:"Stopping smoking is the single best thing you can do for your health, and you\u2019re far more likely to succeed with support and medication than willpower alone. I\u2019ll refer you to the stop-smoking service and we\u2019ll start a treatment \u2014 combination patches plus a spray/gum, or tablets \u2014 around your quit date. Most people need a few attempts, so a slip isn\u2019t a failure."}
      ]}
  ],
  foot:"Smoking cessation in primary care \u2014 Very Brief Advice plus combined behavioural support and pharmacotherapy. Drug availability (e.g. varenicline) has varied; check current supply. Verify against current NICE NG209 and the BNF."
});
</script>
