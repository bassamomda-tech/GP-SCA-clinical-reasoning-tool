MG.render({

  stemSub:"Primary-care management of LUTS in men \u2014 characterising voiding vs storage symptoms, conservative measures, and drug therapy (alpha-blocker, 5-ARI, anticholinergic) \u2014 with the retention and cancer safety nets. NICE NG97 (LUTS) \u00b7 CKS 2026.",
  guideline:"NICE NG97",
  glance:[
    {lbl:"Characterise", val:"Voiding vs storage", sub:"+ IPSS, chart"},
    {lbl:"Voiding (BPE)", val:"Alpha-blocker", sub:"tamsulosin"},
    {lbl:"Large prostate", val:"Add 5-ARI", sub:"finasteride"},

    {lbl:"Check", val:"PSA + creatinine", sub:"+ urine dip"},
    {lbl:"Red flag", val:"Retention / haematuria", sub:"urgent"}
  ],
  flow:[
    {t:"node", d:"found", n:"1", tag:"Foundation", title:"Characterise the symptoms and assess",
      blocks:[
        {b:"kv", rows:[
          ["Symptom type","<b>Voiding</b> (hesitancy, weak stream, terminal dribble \u2014 usually BPE) vs <b>storage</b> (frequency, urgency, nocturia \u2014 OAB)"],
          ["Assess","IPSS + bother score, frequency-volume chart, DRE (prostate size/feel), examine for palpable bladder"],
          ["Tests","Urine dipstick (infection/haematuria), U&amp;E/creatinine, PSA (after counselling)"],
          ["Exclude","UTI, retention, bladder/prostate cancer, neurological cause, diabetes, medications"]

        {b:"why", html:"The voiding-vs-storage split steers the whole plan: voiding symptoms (prostatic obstruction) respond to alpha-blockers \u00b1 5-ARIs, while storage/overactive-bladder symptoms need bladder training and antimuscarinics. A DRE, PSA discussion and renal function check anchor safe management and catch the things you must not miss \u2014 retention and cancer."}
      ]},
    {t:"node", d:"life", n:"2", tag:"Non-drug \u00b7 first-line", title:"Conservative measures",
      blocks:[
        {b:"tiles", v:"life", items:[

          {t:"🚽 Bladder training", html:"For storage/urgency \u2014 scheduled voiding, urge suppression techniques."},
          {t:"🔁 Double voiding", html:"For incomplete emptying / post-micturition dribble; urethral milking."},
          {t:"💊 Review drugs", html:"Diuretics timing, drugs causing retention (anticholinergics, opioids)."},
          {t:"⚖️ Lifestyle", html:"Weight, constipation management, treat contributing conditions."},

          {step:"Voiding 2", title:"Add a 5-alpha-reductase inhibitor", when:"enlarged prostate",

           html:"<b>Finasteride 5mg OD</b> or <b>dutasteride 500micrograms OD</b> \u2014 shrinks the prostate over 3\u20136 months, reduces retention/surgery risk (offer if prostate &gt;30g or PSA &gt;1.4). Combine with an alpha-blocker if both bothersome and enlarged (combination product: <b>dutasteride/tamsulosin = Combodart\u00ae</b>)."},
          {step:"Storage", title:"Antimuscarinic or mirabegron", when:"overactive bladder symptoms",

          {step:"Nocturia", title:"Targeted options", when:"if dominant",

        ]},
        {b:"warn", html:"<b>Exclude retention before antimuscarinics</b> (can precipitate acute retention). 5-ARIs lower PSA by ~50% \u2014 <b>double the measured PSA</b> when interpreting. Finasteride is teratogenic (handling precautions)."}

    {t:"node", d:"monitor", n:"4", tag:"Monitoring", title:"Symptoms, PSA and renal",

          {n:"3", when:"Annual", title:"Ongoing review", html:"IPSS, PSA per plan, renal function, medication review."}

      ]},
    {t:"loop", icon:"🔁", title:"Not improving? Re-check before escalating",

      intro:"Confirm the symptom type and exclude retention/cancer before referral.",
      checks:[
        {b:"1 \u00b7 Retention", html:"Palpable bladder, large residual, rising creatinine \u2192 refer (chronic retention)."},
        {b:"2 \u00b7 Right target", html:"Voiding treated as voiding, storage as storage?"},
        {b:"3 \u00b7 Adherence/dose", html:"Adequate trial and titration of each agent?"},
        {b:"4 \u00b7 Red flags", html:"Haematuria, abnormal DRE, rising PSA \u2192 suspected-cancer pathway."},
        {b:"5 \u00b7 Refer", html:"Refractory bothersome symptoms \u2192 urology (surgical options)."}
      ],
      back:"Retention + cancer excluded, therapy optimised \u2192 refer urology"},
    {t:"node", d:"safety", n:"6", tag:"Safety-net", title:"Safety-netting",
      blocks:[
        {b:"tiles", v:"safety", items:[
          {t:"🔴 Acute retention", html:"\u201cSudden inability to pass urine with a painful, full bladder \u2014 go to A&amp;E.\u201d"},
          {t:"🩸 Haematuria", html:"\u201cVisible blood in the urine \u2014 always get it checked; we\u2019ll refer for tests.\u201d"},
          {t:"😵 Postural drop", html:"\u201cAlpha-blockers can cause dizziness on standing, especially the first dose \u2014 take it at night and rise slowly.\u201d"},
          {t:"⚠️ Worsening / systemic", html:"\u201cFevers, loin pain, or rapidly worsening symptoms \u2014 contact us.\u201d"}
        ]}
      ]},
    {t:"node", d:"refer", n:"7", tag:"Refer to secondary care", title:"When to refer urology",
      arrow:"urgent for retention/cancer; routine for refractory",
      blocks:[
        {b:"tiles", v:"refer", items:[
          {t:"Emergency", html:"Acute urinary retention \u2192 same-day."},
          {t:"Suspected cancer", html:"Abnormal/hard DRE, raised age-specific PSA, or visible haematuria \u2192 suspected-cancer pathway."},
          {t:"Chronic retention / renal", html:"Large residual volume or impaired renal function."},
          {t:"Refractory", html:"Bothersome LUTS not controlled medically \u2192 surgical assessment (e.g. TURP)."},
          {t:"Complex", html:"Suspected neurological cause or recurrent infections/stones."}
        ]},
        {b:"say", html:"Most prostate-related urinary symptoms improve with simple measures and a tablet that relaxes the bladder outlet. We\u2019ll check there\u2019s nothing more serious, and if tablets don\u2019t do enough, the urology team can offer a procedure."}
      ]}
  ]
