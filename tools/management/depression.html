<body data-screen-label="Depression management card">

<script>
MG.render({
  icon:"🧠",
  title:"Depression",
  stemTitle:"Confirmed Depression — ongoing management",
  stemSub:"Primary-care management of confirmed depression \u2014 risk assessment first, the menu of psychological and lifestyle options, antidepressant initiation and switching for more severe illness, monitoring and continuation \u2014 up to mental-health referral. NICE NG222 \u00b7 CKS 2026.",
  guideline:"NICE NG222",
  glance:[
    {lbl:"First, always", val:"Risk", sub:"suicide / self-harm / safeguarding"},
    {lbl:"Severity", val:"PHQ-9", sub:"less vs more severe"},
    {lbl:"Less severe", val:"Don\u2019t default to a pill", sub:"offer the menu"},
    {lbl:"Drug 1st-line", val:"SSRI", sub:"sertraline / citalopram"},
    {lbl:"Early review", val:"1\u20132 weeks", sub:"<30 or risk \u2192 1 week"},
    {lbl:"Continue", val:"\u22656 months", sub:"after remission"}
  ],
  flow:[
    {t:"node", d:"found", n:"1", tag:"Foundation", title:"Assess risk and severity first",
      blocks:[
        {b:"kv", rows:[
          ["Risk (paramount)","Suicidal ideation, intent, plan, protective factors; self-neglect; safeguarding (dependants)"],
          ["Severity","PHQ-9 + functional impact: <b>less severe</b> (subthreshold\u2013mild) vs <b>more severe</b> (moderate\u2013severe)"],
          ["Screen","Bipolar (past mania/hypomania), psychosis, alcohol/substances, comorbid anxiety"],
          ["Context","Stressors, relationships, work, finances, physical illness, perinatal status"]
        ]},
        {b:"why", html:"Risk assessment comes before any treatment decision because it changes urgency and setting \u2014 a high-risk patient needs a crisis plan today, not a prescription and a 4-week review. Severity then sets the route: less severe depression often does <em>not</em> need an antidepressant, and screening for bipolarity prevents the serious error of precipitating mania with an SSRI."}
      ]},
    {t:"node", d:"life", n:"2", tag:"Non-drug \u00b7 offer the menu", title:"Psychological & lifestyle options",
      blocks:[
        {b:"p", html:"For <strong>less severe</strong> depression, offer a menu and shared choice \u2014 do not default to medication. For <strong>more severe</strong>, combine a psychological therapy with an antidepressant."},
        {b:"tiles", v:"life", items:[
          {t:"👀 Active monitoring", html:"For mild/subthreshold: structured follow-up, psychoeducation, self-help resources."},
          {t:"💬 Guided self-help / CBT", html:"Low-intensity CBT-based self-help; group or individual CBT; behavioural activation."},
          {t:"🏃 Exercise", html:"Group exercise / structured physical activity \u2014 evidence-based for depression."},
          {t:"🧘 Mindfulness / counselling", html:"Mindfulness, counselling, IPT, behavioural couples therapy where relevant."},
          {t:"😴 Sleep & routine", html:"Sleep hygiene, daily structure, reduce alcohol, social connection."},
          {t:"🔗 Social prescribing", html:"Link to community support, finances, work, isolation \u2014 often the real drivers."}
        ]}
      ]},
    {t:"node", d:"drug", n:"3", tag:"Medication \u00b7 more severe / persistent", title:"Antidepressant initiation and switching",
      blocks:[
        {b:"ladder", steps:[
          {step:"Step 1", title:"An SSRI", when:"sertraline / citalopram / fluoxetine",
           html:"First-line: <b>sertraline 50 \u2192 200mg</b>, <b>citalopram 20 \u2192 40mg</b> (max 20mg if &gt;65 or hepatic impairment \u2014 QT prolongation), <b>fluoxetine 20 \u2192 60mg</b>, or escitalopram 10 \u2192 20mg. Counsel: may take 2\u20134 weeks to work, possible early GI/agitation side effects, not addictive but must not stop abruptly. Review early (node 4)."},
          {step:"Step 2", title:"Optimise then switch", when:"inadequate response at ~4 weeks",
           fromLabel:"no/partial response after adequate dose & time",
           html:"Check adherence/dose/duration first (optimise to max tolerated). Then switch to a <b>different SSRI</b>, or an <b>SNRI</b> (venlafaxine MR 75 \u2192 375mg \u2014 check BP) or <b>mirtazapine 15 \u2192 45mg</b> (sedating + appetite-stimulating \u2014 useful with insomnia/poor appetite or troublesome sexual side effects). Cross-taper carefully."},
          {step:"Step 3", title:"Combination / augmentation", when:"specialist-guided",
           fromLabel:"two adequate trials failed",
           html:"Combination/augmentation strategies under, or with advice from, mental-health services."}
        ]},
        {b:"kv", rows:[
          ["Continuation","Continue antidepressant for <b>at least 6 months after remission</b> (longer if recurrent) to prevent relapse."],
          ["Stopping","Taper gradually over weeks\u2013months to avoid discontinuation symptoms."]
        ]},
        {b:"warn", html:"<b>Suicidality may rise early</b>, especially &lt;25 y \u2014 review within 1 week and safety-net. Watch <b>serotonin syndrome</b> (with triptans/tramadol/other serotonergics) and <b>hyponatraemia</b> (elderly). Screen bipolar before starting."},
        {b:"why", html:"The 6-month continuation rule exists because stopping at the point of feeling better is the commonest cause of relapse \u2014 the illness is in remission, not cured. Switching only after an <em>adequate</em> dose and duration avoids the trap of serial under-treatment mistaken for treatment resistance."}
      ]},
    {t:"node", d:"monitor", n:"4", tag:"Monitoring", title:"Review, risk and response",
      blocks:[
        {b:"table", head:["What","When","Action"], rows:[
          ["Risk + side effects","First review at 1\u20132 weeks (<b>1 week if &lt;30 or higher risk</b>)","Escalate urgently if risk rises; manage early side effects"],
          ["PHQ-9 / function","Each review","Track response; guide switch/continue decisions"],
          ["Side effects","Each review","Early nausea/agitation usually settle in 1\u20132 weeks; persistent <b>sexual dysfunction</b> \u2192 consider dose reduction or switch (mirtazapine/vortioxetine); GI bleed risk \u2192 PPI if on NSAID/anticoagulant"],
          ["Na\u207a (if elderly/at risk)","Early after starting SSRI","Hyponatraemia \u2192 review drug"]
        ]}
      ]},
    {t:"node", d:"follow", n:"5", tag:"Follow-up", title:"Review schedule",
      blocks:[
        {b:"timeline", items:[
          {n:"1", when:"1\u20132 weeks after starting", title:"Early safety review", html:"Risk, tolerability, adherence, expectation-setting. Sooner (1 week) if young or higher risk."},
          {n:"2", when:"Every 2\u20134 weeks until improving", title:"Response reviews", html:"PHQ-9, function, adherence; optimise dose or switch if no response by ~4 weeks."},
          {n:"3", when:"Through remission + \u22656 months", title:"Continuation + relapse prevention", html:"Maintain treatment, plan gradual withdrawal, relapse-prevention and warning signs."}
        ]}
      ]},
    {t:"loop", icon:"🔁", title:"Not responding? Check before switching",
      arrow:"\u2026if no improvement at review",
      intro:"Confirm an adequate trial and reconsider the formulation before changing drug.",
      checks:[
        {b:"1 \u00b7 Adherence", html:"Taken regularly at an adequate dose for long enough (\u22654 weeks)?"},
        {b:"2 \u00b7 Dose", html:"Optimise within the licensed range before switching."},
        {b:"3 \u00b7 Diagnosis", html:"Reconsider bipolar, psychosis, substance misuse, hypothyroidism, anaemia."},
        {b:"4 \u00b7 Psychosocial", html:"Ongoing trauma, abuse, finances, isolation \u2014 address alongside."},
        {b:"5 \u00b7 Switch / combine", html:"Adequate trial failed \u2192 switch class or refer for combination/therapy."}
      ],
      back:"Adequate trial confirmed, drivers addressed \u2192 switch agent or refer"},
    {t:"node", d:"safety", n:"6", tag:"Safety-net", title:"Safety-netting",
      blocks:[
        {b:"tiles", v:"safety", items:[
          {t:"🔴 Crisis / suicide", html:"\u201cIf you feel unsafe or have thoughts of ending your life: call 999, go to A&amp;E, or call NHS 111 / Samaritans 116 123 any time.\u201d"},
          {t:"⚠️ Early worsening", html:"\u201cIn the first weeks you may feel more agitated or low \u2014 if so, contact us promptly; don\u2019t wait for your next appointment.\u201d"},
          {t:"💊 Don\u2019t stop suddenly", html:"\u201cDon\u2019t stop the tablet abruptly \u2014 it can cause withdrawal effects; we\u2019ll reduce it slowly when the time is right.\u201d"},
          {t:"🌡️ Serotonin syndrome", html:"\u201cAgitation, sweating, shivering, twitching after a new medicine \u2014 seek urgent advice.\u201d"}
        ]}
      ]},
    {t:"node", d:"refer", n:"7", tag:"Refer to secondary care", title:"When to refer",
      arrow:"when risk is high or illness is complex/resistant",
      blocks:[
        {b:"tiles", v:"refer", items:[
          {t:"Urgent / crisis", html:"Significant suicide risk, psychotic depression, severe self-neglect \u2192 crisis team / urgent mental-health assessment."},
          {t:"Bipolar / psychosis", html:"Manic/hypomanic history or psychotic features \u2014 specialist diagnosis and treatment."},
          {t:"Treatment-resistant", html:"Inadequate response after two adequate antidepressant trials."},
          {t:"Perinatal", html:"Pregnancy/postnatal depression \u2014 perinatal mental-health team."},
          {t:"Complex", html:"Comorbid substance misuse, eating disorder, or diagnostic uncertainty."}
        ]},
        {b:"say", html:"You\u2019ve given the treatment a fair go and you\u2019re still struggling, so I\u2019d like the mental-health team involved to add their expertise. You\u2019re not alone in this \u2014 we\u2019ll keep supporting you here too, and I want to make sure you know how to get urgent help if things feel unsafe."}
      ]}
  ]
});
</script>
