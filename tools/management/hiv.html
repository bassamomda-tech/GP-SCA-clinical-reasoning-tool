MG.render({"icon":"🧬","title":"HIV","guideline":"BHIVA / BASHH","stemTitle":"HIV — test widely, refer for ART, support shared care","stemSub":"Primary-care role in HIV — normalise and offer testing, recognise seroconversion and AIDS-defining illness, refer promptly for antiretroviral therapy, and support a patient on lifelong treatment (U=U, drug interactions, comorbidity, vaccinations). BHIVA · BASHH · 2026.","glance":[{"lbl":"Test","val":"4th-gen Ag/Ab","sub":"offer widely; opt-out"},{"lbl":"Treatment","val":"ART for all","sub":"specialist-initiated"},{"lbl":"U=U","val":"Undetectable = untransmittable","sub":"key message"},{"lbl":"Prevention","val":"PrEP / PEP","sub":"PEPSE ≤72h"},{"lbl":"GP role","val":"Interactions + comorbidity","sub":"shared care"},{"lbl":"Red flag","val":"Seroconversion / AIDS illness","sub":"= urgent test/refer"}],"flow":[{"t":"node","d":"safety","n":"1","tag":"Safety-net","title":"Recognise + act urgently","blocks":[{"b":"tiles","v":"safety","items":[{"t":"🟠 Seroconversion","html":"Flu/glandular-fever-like illness, rash, mouth ulcers, lymphadenopathy 2–6 weeks after exposure → test (Ag/Ab ± RNA); highly infectious phase."},{"t":"🔴 AIDS-defining illness","html":"PCP (breathlessness, dry cough, desaturation on exertion), oral/oesophageal candidiasis, Kaposi’s, unexplained weight loss, TB, cryptococcal meningitis → urgent testing + admission/HIV team."},{"t":"💉 PEP / PEPSE","html":"Significant exposure within 72h → urgent post-exposure prophylaxis via GUM/ED."},{"t":"🧪 Test indicator conditions","html":"Offer HIV test for TB, hepatitis B/C, shingles in younger adults, recurrent thrush, unexplained cytopenias, certain cancers, any STI."}]},{"b":"why","html":"Late diagnosis drives HIV morbidity and onward transmission. The GP’s highest-value actions are normalising testing (opt-out in higher-prevalence areas), recognising seroconversion and indicator conditions, and arranging urgent PEP after exposure."}]},{"t":"node","d":"found","n":"2","tag":"Foundation","title":"Diagnose + link to care","blocks":[{"b":"kv","rows":[["Test","4th-generation HIV antigen/antibody (p24 + Ab); rapid/POC tests available; confirm reactive tests; window period considerations"],["At diagnosis","Same-day/next-day referral to HIV specialist service; assess for opportunistic infection, baseline bloods (CD4, viral load), partner notification"],["Who to offer testing","Everyone registering in high-prevalence areas (opt-out), all GUM/antenatal attendees, indicator conditions, on request"],["Confidentiality + consent",""]]}]},{"t":"node","d":"life","n":"3","tag":"Non-drug · core","title":"Prevention & whole-person care","blocks":[{"b":"tiles","v":"life","items":[{"t":"🧴 Onward prevention","html":"Condoms; <b>U=U</b> (undetectable = untransmittable) once suppressed; partner testing; PrEP for negative partners."},{"t":"💉 Vaccines & screening","html":"Vaccinations (hepatitis A/B, pneumococcal, flu, HPV), cervical screening, STI screening."},{"t":"🧠 Holistic support","html":"Mental health, disclosure and adherence support, smoking cessation, CVD risk reduction."}]},{"b":"why","html":"Beyond antiretrovirals, the GP role is prevention (U=U, PrEP, condoms), vaccination/screening and whole-person support."}]},{"t":"node","d":"drug","n":"4","tag":"Treatment (specialist-led)","title":"Antiretroviral therapy","blocks":[{"b":"ladder","steps":[{"step":"ART for all","title":"Combination antiretroviral therapy","when":"started by HIV team","html":"Lifelong combination ART (e.g. integrase-inhibitor-based) for everyone regardless of CD4 — suppresses viral load to undetectable, restores immunity, normal life expectancy."},{"step":"U=U","title":"Treatment as prevention","when":"once suppressed","fromLabel":"sustained undetectable","html":"Undetectable viral load = cannot transmit sexually (U=U) — a key counselling and destigmatising message."},{"step":"Prevention","title":"PrEP / PEP","when":"for those at risk/exposed","fromLabel":"prevention pathways","html":"PrEP for ongoing risk (via sexual health); PEPSE within 72h of exposure."}]}]},{"t":"node","d":"monitor","n":"5","tag":"GP role / shared care","title":"Comorbidity + safety","blocks":[{"b":"table","head":["Area","Action","Note"],"rows":[["Drug interactions","Always check before prescribing","ART (esp. boosters) interacts widely — statins, steroids (incl. inhaled/intra-articular → Cushing’s), PPIs, some contraceptives, antiepileptics"],["Vaccination","Keep up to date","Avoid live vaccines if significantly immunosuppressed; pneumococcal, flu, COVID, hepatitis B"],["Cardiometabolic","Monitor + treat","Higher CVD risk; manage lipids/BP/diabetes; QRISK may underestimate"],["Mental health + sexual health","Support","Depression, ongoing STI screening, cervical screening per guidance"]]}]},{"t":"node","d":"refer","n":"6","tag":"Refer","title":"Referral","blocks":[{"b":"tiles","v":"refer","items":[{"t":"HIV specialist (urgent)","html":"All new diagnoses; seroconversion; AIDS-defining illness."},{"t":"GUM / sexual health","html":"Testing, PEP/PrEP, partner notification, STI screening."},{"t":"Check interactions","html":"Liaise with HIV pharmacy before starting new drugs."}]},{"b":"say","html":"HIV today is a manageable long-term condition — with treatment, people live a normal lifespan and, once the virus is undetectable, can’t pass it on to partners. The most important step is getting started on treatment with the specialist team. I’ll always check any new medicine doesn’t clash with your HIV drugs."}]}],"foot":"Primary-care testing and shared care for HIV; diagnosis and ART are specialist-led. Always check drug interactions with ART. Verify against current BHIVA/BASHH guidance and the Green Book."});
</script>
