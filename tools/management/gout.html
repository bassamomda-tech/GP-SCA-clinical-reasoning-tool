MG.render({

  title:"Gout",
  stemTitle:"Confirmed Gout — flare treatment + long-term control",
  stemSub:"Primary-care management of established gout \u2014 treating the acute flare, then the urate-lowering ladder to a target serum urate that prevents recurrence \u2014 with monitoring, lifestyle and the septic-joint safety net. NICE NG219 \u00b7 CKS 2026.",
  guideline:"NICE NG219",
  glance:[
    {lbl:"Flare 1st-line", val:"NSAID / colchicine", sub:"or oral steroid"},
    {lbl:"Long-term", val:"Allopurinol", sub:"start 100 mg, titrate"},
    {lbl:"Urate target", val:"<360", sub:"\u00b5mol/L (<300 if tophi)"},
    {lbl:"Cover ULT", val:"\u22646 months", sub:"prophylaxis on starting"},
    {lbl:"Check urate", val:"4\u20136 wks", sub:"after flare / each titration"},
    {lbl:"Red flag", val:"Hot + fever", sub:"= ?septic joint"}
  ],
  flow:[
    {t:"node", d:"found", n:"1", tag:"Foundation", title:"Confirm gout and assess the burden",
      blocks:[
        {b:"kv", rows:[
          ["Diagnosis","Clinical (rapid-onset hot, red, exquisitely tender joint \u2014 often 1st MTP); MSU crystals on aspirate if doubt"],
          ["Serum urate","Confirm raised urate \u2014 <b>\u2265360 \u00b5mol/L confirms the clinical diagnosis</b>; if &lt;360 but gout strongly suspected, recheck <b>\u22652 weeks after the flare settles</b> (may be normal during one)"],
          ["Assess","Flare frequency, tophi, joint damage, CKD, urate stones, diuretic use, CV/metabolic comorbidity"],
          ["Always exclude","<b>Septic arthritis</b> \u2014 a hot swollen joint with fever is septic until proven otherwise"]
        ]},
        {b:"why", html:"Gout is two problems in one: the painful <em>flare</em> (treat fast) and the underlying <em>hyperuricaemia</em> (treat to target for life). Most long-term failure comes from treating only the flares. The urate is checked away from a flare because it often dips during acute attacks and can falsely reassure."}
      ]},
    {t:"node", d:"life", n:"2", tag:"Non-drug \u00b7 every patient", title:"Lifestyle + remove urate-raising drivers",
      blocks:[
        {b:"tiles", v:"life", items:[
          {t:"🍺 Alcohol", html:"Reduce \u2014 especially beer and spirits (high purine / impair excretion)."},
          {t:"🥤 Sugary drinks", html:"Cut fructose-sweetened drinks; they raise urate."},
          {t:"🍖 Diet", html:"Moderate purine-rich red meat, offal, seafood; a balanced diet \u00b1 dairy."},
          {t:"⚖️ Weight", html:"Gradual weight loss lowers urate and flare frequency."},
          {t:"💧 Hydration", html:"Good fluid intake, especially with urate stones."},
          {t:"💊 Review diuretics", html:"Thiazide/loop diuretics raise urate \u2014 switch if alternatives suit (e.g. for HTN)."}
        ]}
      ]},
    {t:"node", d:"drug", n:"3", tag:"Medication \u00b7 the flare", title:"Treat the acute flare fast",
      blocks:[
        {b:"kv", rows:[
          ["1st-line (choose one)","<span class='pill pill-teal'>NSAID</span> (e.g. naproxen) + PPI \u00b7 or <span class='pill pill-teal'>colchicine</span> 500 \u00b5g 2\u20134\u00d7/day (lower in CKD/elderly) \u00b7 or <span class='pill pill-teal'>short oral prednisolone</span>"],
          ["Adjuncts","Rest, elevate, ice the joint. Continue any existing urate-lowering therapy \u2014 do not stop it during a flare."],
          ["If one fails","Switch class or combine (e.g. add steroid) under review; intra-articular steroid for a single joint."]
        ]},
        {b:"warn", html:"<b>Colchicine</b> \u2014 diarrhoea signals toxicity; reduce dose in CKD and avoid with strong CYP3A4/P-gp inhibitors. <b>NSAID</b> \u2014 caution in CKD, HF, GI risk, on ACEi/diuretic (triple whammy)."}
      ]},
    {t:"node", d:"drug", n:"4", tag:"Medication \u00b7 long-term", title:"Urate-lowering therapy (ULT) to target",
      blocks:[
        {b:"p", html:"Offer ULT to essentially everyone with gout \u2014 <strong>especially \u22652 flares/year, tophi, joint damage, CKD, diuretic use, or urate stones</strong>. Start when the patient is ready (can begin during or after a flare) and titrate to a target urate."},
        {b:"ladder", steps:[
          {step:"Step 1", title:"Allopurinol \u2014 start low, titrate", when:"100 mg \u2192 up monthly",
           html:"Start 100 mg/day (50 mg if CKD); increase ~monthly guided by urate. <b>Co-prescribe flare prophylaxis</b> (<b>colchicine first-line</b>; NSAID or low-dose oral steroid second-line, \u00b1 PPI) for up to 6 months when starting/uptitrating."},
          {step:"Step 2", title:"Febuxostat", when:"if allopurinol unsuitable",
           fromLabel:"intolerance / target not reached",

          {step:"Target", title:"Treat-to-target urate", when:"<360 \u00b5mol/L (<300 if tophi/severe)",
           fromLabel:"keep titrating until target reached",
           html:"Don\u2019t stop at \u2018better\u2019 \u2014 titrate the dose until urate is below target, then continue lifelong."}
        ]},
        {b:"why", html:"Starting ULT transiently <em>provokes</em> flares as tophi mobilise \u2014 hence the prophylaxis cover \u2014 which is why patients often wrongly conclude allopurinol \u2018caused\u2019 their gout and stop it. Treat-to-target (not a fixed dose) is what dissolves the urate pool and ultimately stops flares."}
      ]},
    {t:"node", d:"monitor", n:"5", tag:"Monitoring", title:"Urate-led titration",
      blocks:[
        {b:"table", head:["What","When","Action"], rows:[
          ["Serum urate","4\u20136 weeks after each dose change, then annually once at target","Above target \u2192 uptitrate ULT"],
          ["U&amp;E / eGFR","Before + during ULT","Dose-adjust allopurinol; informs NSAID/colchicine safety"],
          ["LFTs (febuxostat)","Baseline + periodically","Stop if significant derangement"],
          ["Flare frequency / tophi","Each review","Falling = success; persisting \u2192 reassess adherence + target"]
        ]}
      ]},
    {t:"node", d:"follow", n:"6", tag:"Follow-up", title:"Review schedule",
      blocks:[
        {b:"timeline", items:[
          {n:"1", when:"After a flare settles", title:"Discuss ULT", html:"Explain treat-to-target, start ULT with prophylaxis cover, agree the plan."},
          {n:"2", when:"Monthly while titrating", title:"Urate titration", html:"Recheck urate, uptitrate allopurinol toward target, reinforce adherence + prophylaxis."},
          {n:"3", when:"Annual once at target", title:"Stable review", html:"Urate, renal function, flare frequency, lifestyle, CV/metabolic comorbidity."}
        ]}
      ]},
    {t:"loop", icon:"🔁", title:"Still flaring / urate not at target?",
      arrow:"\u2026if flares continue or urate stays high",
      intro:"Almost always under-dosing or stopping ULT \u2014 not treatment failure.",
      checks:[
        {b:"1 \u00b7 Adherence", html:"Has the patient kept taking allopurinol daily (not just during flares)?"},
        {b:"2 \u00b7 Dose", html:"Is allopurinol titrated to target, or stuck at the starting dose?"},
        {b:"3 \u00b7 Prophylaxis", html:"Was flare cover given for the first months? Early flares deter adherence."},
        {b:"4 \u00b7 Drivers", html:"Alcohol, diuretics, sugary drinks, weight \u2014 still contributing?"},
        {b:"5 \u00b7 Switch/refer", html:"Intolerant or target unreachable \u2192 febuxostat / specialist."}
      ],
      back:"Adherent, prophylaxis given, drivers addressed \u2192 uptitrate ULT or switch agent"},
    {t:"node", d:"safety", n:"7", tag:"Safety-net", title:"Safety-netting",
      blocks:[
        {b:"tiles", v:"safety", items:[
          {t:"🔴 Septic joint", html:"\u201cA hot, swollen, very painful joint with fever or feeling unwell \u2014 seek urgent help the same day; this can be a joint infection.\u201d"},
          {t:"🟠 Allopurinol rash", html:"\u201cAny rash after starting allopurinol \u2014 stop it and contact us; rarely it causes a serious skin reaction.\u201d"},
          {t:"💩 Colchicine", html:"\u201cIf colchicine gives you diarrhoea, stop it and call us \u2014 that\u2019s a sign of too much.\u201d"},
          {t:"💊 Keep ULT going", html:"\u201cDon\u2019t stop allopurinol during a flare \u2014 keep taking it; we treat the flare separately.\u201d"}
        ]}
      ]},
    {t:"node", d:"refer", n:"8", tag:"Refer to secondary care", title:"When to refer",
      arrow:"when diagnosis is unclear or management is complex",
      blocks:[
        {b:"tiles", v:"refer", items:[
          {t:"Emergency", html:"Suspected septic arthritis \u2192 same-day assessment / admission."},
          {t:"Diagnostic doubt", html:"Atypical presentation, or need for joint aspiration/crystal confirmation."},
          {t:"Refractory / tophaceous", html:"Target not reached or recurrent flares despite optimised ULT."},
          {t:"Complicating CKD", html:"<b>eGFR &lt;45</b> or renal transplant \u2014 renal impairment limiting drug choices."},
          {t:"Intolerance", html:"Allopurinol hypersensitivity and febuxostat unsuitable \u2014 specialist options."},
          {t:"Considering IL-1 inhibitor", html:"Frequent flares unresponsive to / intolerant of standard flare therapy \u2014 specialist IL-1 inhibitor."}
        ]},
        {b:"say", html:"The good news is gout is very treatable \u2014 the key is a daily tablet that lowers your uric acid to a target over a few months, plus some lifestyle changes. Let\u2019s get you started and check the level until it\u2019s where it needs to be."}
      ]}
  ]
