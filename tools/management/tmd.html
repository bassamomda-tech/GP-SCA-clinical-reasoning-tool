MG.render({

  stemTitle:"Temporomandibular disorders — ongoing management",
  stemSub:"Primary-care management of TMD (jaw-joint/muscle pain) \u2014 reassurance, self-care and jaw rest, simple analgesia, and dental/maxillofacial referral when conservative measures fail. CKS \u00b7 2026.",
  guideline:"NICE CKS",
  glance:[
    {lbl:"Nature", val:"Usually self-limiting", sub:"good prognosis"},
    {lbl:"Core", val:"Self-care + reassurance", sub:"jaw rest, soft diet"},
    {lbl:"Analgesia", val:"Paracetamol / NSAID", sub:"short-term"},
    {lbl:"Habits", val:"Reduce clenching", sub:"+ stress, bruxism"},

    {lbl:"Refer", val:"Persistent / red flags", sub:"OMFS / dental"}
  ],
  flow:[
    {t:"node", d:"found", n:"1", tag:"Foundation", title:"Confirm TMD and exclude mimics",
      blocks:[
        {b:"kv", rows:[
          ["Features","Jaw/facial pain, worse on chewing; clicking/locking; limited mouth opening; often masticatory-muscle tenderness"],
          ["Contributors","Bruxism/clenching, stress, malocclusion, trauma, nail-biting, gum-chewing"],
          ["Exclude","Dental pathology, otitis, parotid disease, giant cell arteritis (older), trigeminal neuralgia, rarely tumour"],
          ["Reassure","Usually benign and self-limiting with conservative care"]

        {b:"why", html:"TMD is common, usually <strong>self-limiting</strong>, and responds to conservative self-care \u2014 so the approach is reassurance and simple measures, reserving referral for persistence or red flags. Excluding dental and other facial-pain mimics (including GCA in older patients with jaw claudication) prevents missed diagnoses."}
      ]},
    {t:"node", d:"life", n:"2", tag:"Non-drug \u00b7 first-line", title:"Self-care and habit change",

          {t:"🔥 Heat / massage", html:"Warm compresses and gentle masseter massage; jaw stretching exercises."},
          {t:"😬 Reduce clenching", html:"Awareness of daytime clenching; avoid nail-biting/pen-chewing; address night bruxism."},
          {t:"🧠 Stress", html:"Stress management and relaxation \u2014 a major driver of muscle tension."},
          {t:"💪 Jaw exercises", html:"Simple physiotherapy/jaw exercises can help."},
          {t:"🫶 Reassurance", html:"Explain the favourable prognosis to reduce anxiety-driven clenching."}

           html:"Consider a short course of muscle relaxant, or a low-dose TCA for chronic facial pain (off-label) \u00b1 physiotherapy."}

      intro:"Confirm self-care, address habits, and reconsider the diagnosis.",
      checks:[

        {b:"2 \u00b7 Bruxism", html:"Night grinding/clenching addressed (dental splint)?"},
        {b:"3 \u00b7 Stress", html:"Underlying stress/anxiety managed?"},
        {b:"4 \u00b7 Mimic?", html:"Dental disease, GCA (older), trigeminal neuralgia, ear/parotid pathology?"},

          {t:"⚠️ Atypical pain", html:"\u201cProgressive pain, swelling, numbness, or weight loss \u2014 get checked.\u201d"},
          {t:"🫶 Prognosis", html:"\u201cMost jaw-joint pain settles with rest and simple measures over a few weeks.\u201d"}
        ]}
      ]},
    {t:"node", d:"refer", n:"7", tag:"Refer to secondary care", title:"When to refer",
      arrow:"persistent, atypical, or red flags",
      blocks:[
        {b:"tiles", v:"refer", items:[
          {t:"Dental", html:"For occlusal splint, suspected dental cause, or bruxism management."},
          {t:"OMFS / oral medicine", html:"Persistent/refractory TMD, locking, or significant joint dysfunction."},
          {t:"Urgent", html:"Suspected GCA (older, jaw claudication + visual/headache) \u2192 same-day; suspected malignancy."},
          {t:"Chronic pain", html:"Refractory chronic facial pain \u2192 chronic pain/oral medicine."}
        ]},
        {b:"say", html:"Jaw-joint pain is common and usually settles with simple measures \u2014 resting the jaw, soft foods, warmth, and easing off clenching, plus short-term painkillers. If grinding is a factor, your dentist can make a bite guard. We\u2019ll review if it doesn\u2019t improve."}
      ]}
