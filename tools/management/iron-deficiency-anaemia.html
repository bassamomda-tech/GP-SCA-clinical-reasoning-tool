MG.render({

  title:"Iron-Deficiency Anaemia",
  stemTitle:"IDA \u2014 confirm with ferritin, FIND THE CAUSE, then replace iron",
  stemSub:"Primary-care management of iron-deficiency anaemia \u2014 confirm with a low ferritin, always look for the cause (GI blood loss / coeliac / menstrual), apply the NG12 cancer rules, replace with oral iron and recheck, and refer non-responders or those needing scoping. NICE NG8 \u00b7 BSG \u00b7 2026.",
  guideline:"NICE NG8 / BSG",
  glance:[
    {lbl:"Confirm", val:"Microcytic anaemia + \u2193ferritin", sub:"ferritin = best single test"},
    {lbl:"Caveat", val:"Ferritin is an acute-phase reactant", sub:"may be normal/high if inflamed"},
    {lbl:"Always", val:"Find the cause", sub:"GI loss · coeliac · menstrual"},
    {lbl:"🟣 2WW", val:"IDA in men / post-menopausal women", sub:"\u2192 colorectal pathway (NG12)"},
    {lbl:"Treat", val:"Ferrous sulfate 200 mg OD", sub:"recheck Hb in 2\u20134 weeks"},
    {lbl:"Coeliac", val:"Anti-tTG IgA + total IgA", sub:"on gluten"}
  ],
  flow:[
    {t:"node", d:"safety", n:"1", tag:"Safety-net", title:"The cause matters more than the iron",
      blocks:[
        {b:"tiles", v:"safety", items:[
          {t:"🟣 Colorectal cancer (NG12)", html:"<b>IDA in any man, or any non-menstruating/post-menopausal woman</b> \u2192 suspected colorectal cancer pathway (2WW) \u2014 IDA may be the only sign of a right-sided colon cancer. Use FIT to support urgent referral per local pathway."},
          {t:"🟣 Other GI cancers", html:"Consider gastric/oesophageal cancer (dysphagia, dyspepsia, weight loss \u2192 OGD) and, with abdominal/pelvic symptoms, urological/gynae causes."},
          {t:"🔴 Severe / symptomatic anaemia", html:"Marked breathlessness, chest pain, haemodynamic compromise, or very low Hb \u2192 urgent assessment/admission &amp; consider transfusion."},
          {t:"🟠 Don\u2019t just treat the number", html:"Replacing iron without finding the cause risks missing a treatable bleed or a cancer. Always ask: <b>where is the iron going?</b>"}
        ]},
        {b:"why", html:"Iron deficiency is a symptom, not a diagnosis. The clinical task is to find and treat the source of loss (commonly GI blood loss or menorrhagia) or malabsorption (coeliac), applying the NG12 rules \u2014 unexplained IDA in men and post-menopausal women is a colorectal-cancer red flag until proven otherwise."}
      ]},
    {t:"node", d:"found", n:"2", tag:"Foundation", title:"Confirm &amp; investigate the cause",
      blocks:[
        {b:"kv", rows:[
          ["Confirm","FBC (microcytic, hypochromic anaemia) + <b>ferritin</b> (low confirms iron deficiency). Ferritin is an acute-phase reactant \u2014 if inflamed, a normal/high ferritin doesn\u2019t exclude IDA; check CRP, transferrin saturation"],
          ["History","Diet, menstrual loss, GI symptoms (bleeding, change in bowel habit, dyspepsia, weight loss), NSAID/anticoagulant use, blood donation, pregnancy"],
          ["Coeliac screen","Anti-tTG IgA + total IgA (while eating gluten) in all unexplained IDA"],
          ["GI investigation","Men &amp; post-menopausal women with IDA \u2192 upper + lower GI investigation (OGD + colonoscopy) unless an overt cause; FIT to guide urgency"],
          ["Pre-menopausal women","Menstrual loss is the commonest cause \u2014 treat &amp; manage menorrhagia; investigate GI if GI symptoms, FH, persistent/refractory, or \u226550"]
        ]}
      ]},
    {t:"node", d:"life", n:"3", tag:"Non-drug · alongside iron", title:"Diet & how to take iron", blocks:[{b:"tiles", v:"life", items:[{t:"\ud83e\udd69 Dietary iron", html:"Encourage iron-rich foods (red meat, pulses, fortified cereals, leafy greens); dietitian input for restricted diets/vegans."},{t:"\ud83c\udf4a Aid absorption", html:"Take iron with <b>vitamin C</b> (orange juice); avoid taking with <b>tea, coffee, milk/calcium or PPIs</b>, which reduce absorption."},{t:"\ud83d\udd04 Dosing tip", html:"Alternate-day dosing can improve absorption and reduce GI side effects; persist \u2014 effect builds over weeks."},{t:"\ud83e\ude78 Treat the cause", html:"Iron replacement treats the number, not the reason \u2014 always pursue the underlying cause (see investigation node)."}]},{b:"why", html:"How iron is taken strongly affects whether it works \u2014 vitamin C aids absorption, tea/coffee/calcium block it, and alternate-day dosing improves uptake while easing GI upset, all of which improve adherence and response."}]},

      blocks:[
        {b:"ladder", steps:[
          {step:"Step 1", title:"Oral iron", when:"first-line",
           html:"<b>One ferrous salt tablet once daily</b> (<b>ferrous sulfate 200 mg</b>, fumarate 210 mg, or gluconate 300 mg). Once-daily (or alternate-day) dosing improves absorption &amp; tolerability vs TDS. Take with vitamin C / on an empty stomach; avoid with tea/calcium/PPIs near the dose."},
          {step:"Step 2", title:"Manage side effects", when:"GI upset common",
           fromLabel:"adherence",
           html:"Nausea/constipation are common \u2014 try a lower dose, alternate-day dosing, with food, or a different salt before abandoning oral iron."},
          {step:"Step 3", title:"Recheck &amp; continue", when:"monitor response",
           fromLabel:"response check",
           html:"Recheck Hb at <b>2\u20134 weeks</b> (expect a rise of ~20 g/L over 3\u20134 weeks). Once normalised, <b>continue iron for ~3 months</b> to replenish stores (ferritin)."},
          {step:"Step 4", title:"IV iron / refer", when:"intolerant or non-responsive",
           fromLabel:"escalation",
           html:"IV iron if oral not tolerated/ineffective, malabsorption, ongoing significant loss, or rapid replacement needed (per local pathway). Reconsider the diagnosis/cause if not responding."}
        ]},
        {b:"warn", html:"Failure to respond to oral iron \u2192 check adherence/absorption (PPI, coeliac), ongoing blood loss, wrong diagnosis (anaemia of chronic disease, thalassaemia trait), or malignancy. Don\u2019t keep re-prescribing iron without investigating."}
      ]},
    {t:"node", d:"monitor", n:"5", tag:"Follow-up", title:"Monitor &amp; replenish",
      blocks:[
        {b:"timeline", items:[
          {n:"1", when:"2\u20134 weeks", title:"Check response", html:"Repeat Hb; confirm a rise; reinforce adherence."},
          {n:"2", when:"~3 months after normal Hb", title:"Replenish stores", html:"Continue iron to restore ferritin; then recheck FBC/ferritin."},
          {n:"3", when:"Ongoing", title:"Watch for recurrence", html:"Periodic FBC if ongoing risk (menorrhagia, malabsorption); re-investigate if IDA recurs."}
        ]}
      ]},
    {t:"node", d:"refer", n:"6", tag:"Refer", title:"Referral",
      arrow:"cause-driven",
      blocks:[
        {b:"tiles", v:"refer", items:[
          {t:"🟣 2WW colorectal", html:"IDA in men / post-menopausal women (NG12); FIT-positive symptomatic patients."},
          {t:"Gastroenterology", html:"OGD + colonoscopy for unexplained IDA; positive coeliac serology; refractory/recurrent IDA."},
          {t:"Gynaecology", html:"Menorrhagia not controlled, or post-menopausal bleeding (2WW)."},
          {t:"Haematology", html:"Diagnostic uncertainty, suspected thalassaemia, or IV iron/transfusion needs."}
        ]},
        {b:"say", html:"Your blood count shows you\u2019re low in iron, which explains the tiredness and breathlessness. The iron tablets will build it back up over a few weeks \u2014 but just as important is finding why it dropped, so I\u2019d like to do a few checks (and, given your age/sex, arrange a camera test of the bowel) to be thorough. Keep taking the iron, with orange juice, and we\u2019ll recheck your blood in a few weeks."}
      ]}
  ],
  foot:"Management of iron-deficiency anaemia in primary care; always identify the cause and apply the NG12 colorectal rules for men and post-menopausal women. Verify against current NICE NG8/CKS and BSG iron-deficiency guidance."
