<script>
MG.render({
  icon:"💊",
  title:"HRT Prescribing — Step-by-Step",
  stemTitle:"HRT prescribing &mdash; which preparation, what dose, and what to do when it isn't working",
  stemSub:"A practical prescribing protocol: decide the regimen from uterus status and menopausal stage, choose a named first-line preparation, get endometrial protection right, then troubleshoot inadequate control, oestrogenic/progestogenic side effects and bleeding \u2014 with named second-line switches. SEL Gynae Network / BMS / NICE NG23.",
  guideline:"SEL Network \u00b7 NICE NG23",
  glance:[
    {lbl:"No uterus", val:"Oestrogen-only", sub:"no progestogen needed"},
    {lbl:"Perimenopausal", val:"Sequential combined", sub:"monthly bleed"},
    {lbl:"Postmenopausal", val:"Continuous combined", sub:"bleed-free"},
    {lbl:"\u226560y / higher-risk", val:"Transdermal first", sub:"patch / gel / spray"},
    {lbl:"Safest progestogen", val:"Micronised progesterone", sub:"Utrogestan / dydrogesterone"},
    {lbl:"Urogenital only", val:"Vaginal oestrogen", sub:"long-term, standalone"}
  ],
  flow:[

    {t:"node", d:"found", n:"1", tag:"Before you prescribe", title:"Assess, counsel, and choose the route",
      blocks:[
        {b:"kv", rows:[
          ["Review","Symptom nature, frequency, severity, time of day and impact on quality of life \u2014 quantify before and at review"],
          ["Inform","Menopause + HRT leaflets; signpost BMS (thebms.org.uk), Menopause Matters, Women's Health Concern, Daisy Network"],
          ["Lifestyle","Smoking cessation, weight, alcohol reduction, healthy diet; adequate vitamin D + calcium"],
          ["Individualise","Choose preparation by <b>age, symptoms and co-morbidities</b> after discussing risks, benefits, adverse effects and contraindications"],
          ["Exclude first","<b>Investigate any abnormal bleeding before starting.</b> Check BP/BMI; review VTE, breast-cancer, CVD and migraine history"]
        ]},
        {b:"why", html:"The single biggest route decision: <strong>women aged \u226560, or with VTE / cardiovascular risk, migraine, BMI &gt;30 or gallbladder disease, should be offered a transdermal oestrogen first line</strong> \u2014 transdermal carries no excess VTE risk and bypasses first-pass metabolism. Oral is reasonable for younger, lower-risk women who prefer a tablet."},
        {b:"warn", html:"HRT is <b>not contraceptive</b>. Women need contraception until 1 year amenorrhoea if \u226550 (2 years if &lt;50). Sequential (cyclical) HRT does not reliably suppress ovulation."}
      ]},

    {t:"node", d:"life", n:"2", tag:"Non-drug · core", title:"Lifestyle & shared decision", blocks:[{b:"tiles", v:"life", items:[{t:"⚖️ Risk\u2013benefit", html:"Individualise: discuss symptom benefit vs VTE/breast-cancer risk by age, type and route (transdermal lower VTE risk)."},{t:"🏃 Lifestyle for symptoms", html:"Exercise, weight, reduced caffeine/alcohol, layered clothing and CBT help vasomotor symptoms alongside or instead of HRT."},{t:"🦴 Bone & CVD", html:"Reinforce weight-bearing exercise, calcium/vit D, smoking cessation for long-term bone and cardiovascular health."}]},{b:"why", html:"HRT is a shared decision balancing individual risk and benefit, and lifestyle measures (and CBT) genuinely help symptoms \u2014 so counselling and non-drug measures are integral, not optional."}]},
    {t:"node", d:"drug", n:"3", tag:"Step 1 \u00b7 choose the regimen", title:"Pick the regimen from uterus + menopausal stage",
      blocks:[
        {b:"p", html:"Three questions decide everything: <strong>(1) Does she have a uterus?</strong> If not \u2192 oestrogen-only. <strong>(2) If yes, is she peri- or post-menopausal?</strong> Perimenopausal (LMP &lt;12 months / irregular periods) \u2192 <b>sequential combined</b>; postmenopausal (LMP &gt;12 months) \u2192 <b>continuous combined</b> ('bleed-free'). <strong>(3) Are symptoms only urogenital?</strong> \u2192 vaginal oestrogen alone."},
        {b:"ladder", steps:[
          {step:"No uterus", title:"Oestrogen-only HRT", when:"post-hysterectomy",
           html:"<b>Transdermal first line if \u226560 / higher-risk:</b> Evorel\u00ae 25\u201350\u201375\u2013100mcg patch twice weekly, or Estradot\u00ae 25\u2013100mcg patch twice weekly, or gel (Oestrogel\u00ae pump / Sandrena\u00ae sachets) or spray (Lenzetto\u00ae) daily. <b>Oral option:</b> Elleste-Solo\u00ae 1\u20132mg daily (Premarin\u00ae 0.3mg only if already established and tolerating). <i>Subtotal hysterectomy / treated severe endometriosis may still need a progestogen \u2014 seek advice.</i>"},
          {step:"Uterus \u00b7 perimenopausal", title:"Sequential combined HRT", when:"LMP <12 months / irregular + vasomotor symptoms",
           fromLabel:"still having periods or <12 months since LMP",
           html:"Gives a predictable <b>monthly withdrawal bleed</b>. <b>Oral:</b> Femoston\u00ae 1/10 or 2/10 daily, or Elleste Duet\u00ae 1mg / 2mg daily. <b>Transdermal:</b> Evorel Sequi\u00ae 50mcg patch twice weekly. <b>Or build your own:</b> transdermal/oral oestrogen (as above) + a cyclical progestogen for 12\u201314 days/month (see Step 3), or + Mirena\u00ae IUS."},
          {step:"Uterus \u00b7 postmenopausal", title:"Continuous combined HRT (CCHRT)", when:">12 months since LMP",
           fromLabel:"postmenopausal / bleed-free wanted",
           html:"A <b>'bleed-free'</b> regimen. <b>Oral:</b> Femoston-conti\u00ae 0.5/1mg, Bijuve\u00ae 1mg/100mg, Elleste Duet Conti\u00ae 2mg, Kliofem\u00ae 2mg or Kliovance\u00ae 1mg daily. <b>Transdermal:</b> Evorel Conti\u00ae 50mcg patch twice weekly. <b>Or build your own:</b> oestrogen + continuous progestogen (Step 3) or + Mirena\u00ae. Tibolone 2.5mg daily is an alternative."},
          {step:"Urogenital only", title:"Low-dose vaginal oestrogen", when:"local symptoms, any time",
           fromLabel:"vaginal dryness / GSM / recurrent UTI",
           html:"Minimal systemic absorption \u2014 <b>can be used long-term, alone or added to systemic HRT, and needs no progestogen</b>. Options: Ovestin\u00ae estriol 0.1% cream, Vagirux\u00ae/Vagifem estradiol 10mcg tablet, Imvaggis\u00ae estriol 30mcg pessary, or Estring\u00ae estradiol ring (good for limited dexterity). Non-hormonal moisturisers/lubricants alone or alongside."}
        ]},
        {b:"warn", html:"<b>Never give unopposed systemic oestrogen to a woman with a uterus</b> \u2014 endometrial hyperplasia/cancer risk. Always pair with adequate progestogen (Step 3) or a Mirena\u00ae."}
      ]},

    {t:"node", d:"drug", n:"4", tag:"Step 2 \u00b7 endometrial protection", title:"Progestogen dosing (the 'Table 3' rule)",
      blocks:[
        {b:"p", html:"If you build a regimen from separate oestrogen + progestogen, the progestogen dose differs for sequential vs continuous. <b>Micronised progesterone (Utrogestan\u00ae) and dydrogesterone carry the lowest breast-cancer/VTE signal</b> and are preferred."},
        {b:"table", head:["Progestogen","Sequential (12\u201314 days/month)","Continuous (daily)"], rows:[
          ["Micronised progesterone (Utrogestan\u00ae) \u2014 preferred","200mg at night for 12 days","100mg at night daily"],
          ["Medroxyprogesterone acetate (Provera\u00ae)","10mg daily \u00d7 12\u201314 days","2.5\u20135mg daily"],
          ["Norethisterone","5mg daily \u00d7 12\u201314 days","5mg daily (or Noriday\u00ae 350mcg)"],
          ["Levonorgestrel IUS (Mirena\u00ae)","Provides protection continuously","Continuously \u2014 replace per endometrial-protection licence"]
        ]},
        {b:"warn", html:"<b>Utrogestan is micronised progesterone \u2014 caution / avoid in true peanut allergy</b> (older formulations). Take at night (sedating). For sequential dosing, the progestogen days must be adequate (\u226512 days) or hyperplasia risk rises."}
      ]},

    {t:"node", d:"monitor", n:"5", tag:"Step 3 \u00b7 first review", title:"Review at 3 months, then annually",
      blocks:[
        {b:"table", head:["What","When","Action"], rows:[
          ["Symptom response + side effects","3 months after start/change","Optimise dose/route/regimen before abandoning HRT"],
          ["Bleeding pattern","Each review","Expected withdrawal bleed (sequential) vs unscheduled (investigate \u2014 Step 6)"],
          ["BP","At review (esp. oral)","Persistently raised \u2192 review route / treat"],
          ["Ongoing need / dose","Annually","No arbitrary stop date; lowest effective dose for symptom control; re-counsel risks"]
        ]},
        {b:"why", html:"Allow <strong>at least 3 months</strong> at a given dose before judging efficacy \u2014 most 'HRT failure' is too low an oestrogen dose, poor absorption, or a fixable side effect, not the wrong decision."}
      ]},

    {t:"node", d:"drug", n:"6", tag:"Step 4 \u00b7 not working?", title:"Inadequate symptom control \u2014 escalate stepwise",
      blocks:[
        {b:"ladder", steps:[
          {step:"4a", title:"Confirm absorption + adherence", when:"first move",
           html:"Check the patch is sticking / gel is applied to dry skin and not washed off / spray technique. Confirm consistent daily use. Reassess after a further 4\u20138 weeks."},
          {step:"4b", title:"Increase the oestrogen dose", when:"persistent vasomotor symptoms",
           fromLabel:"absorption + adherence confirmed",
           html:"Step up: e.g. Evorel/Estradot patch 25\u219250\u219275\u2192100mcg, Oestrogel 2\u21924 pumps, or oral 1mg\u21922mg. Re-titrate the progestogen to match a higher oestrogen dose if needed. Review at 3 months."},
          {step:"4c", title:"Switch oral \u2192 transdermal", when:"poor response / side effects / risk",
           fromLabel:"oral not tolerated or suboptimal",
           html:"Transdermal gives steadier levels, avoids first-pass metabolism, and removes the oral VTE excess \u2014 try before declaring HRT ineffective."},
          {step:"4d", title:"Add testosterone", when:"persistent low libido despite adequate HRT",
           fromLabel:"HSDD on optimised HRT",
           html:"Testosterone gel (e.g. Testogel\u00ae / AndroFeme\u00ae \u2014 off-licence for women) for persistent low sexual desire; often specialist-initiated. Check baseline + 3-monthly testosterone; avoid supraphysiological levels."},
          {step:"4e", title:"Refer menopause specialist", when:"refractory / complex",
           fromLabel:"optimised but still uncontrolled",
           html:"Persistent symptoms despite optimised dose/route/regimen, complex contraindications, or POI \u2192 specialist menopause clinic."}
        ]}
      ]},

    {t:"node", d:"safety", n:"7", tag:"Step 5 \u00b7 side effects", title:"Troubleshoot oestrogenic vs progestogenic effects",
      blocks:[
        {b:"p", html:"Decide whether the side effect is <strong>oestrogenic</strong> or <strong>progestogenic</strong> \u2014 the fix differs. Most settle within 3 months; persistence drives the switch."},
        {b:"table", head:["Pattern","Typical effects","What to do"], rows:[
          ["Oestrogenic","Breast tenderness, nausea, leg cramps, bloating, headache","Reduce oestrogen dose; switch oral \u2192 transdermal; take oral dose with food / at night; allow 3 months to settle"],
          ["Progestogenic","PMS-like mood change, irritability, low mood, breast tenderness, acne","Switch to <b>micronised progesterone (Utrogestan) or dydrogesterone</b>; change route to <b>Mirena\u00ae IUS</b>; shorten/lower sequential progestogen (keep \u226512 days); vaginal Utrogestan (off-licence)"],
          ["Both / unclear","Persistent intolerance","Trial alternative combined preparation; consider tibolone (postmenopausal); specialist advice"]
        ]},
        {b:"warn", html:"Progestogen intolerance is the commonest reason women stop HRT \u2014 <b>switching the progestogen type or delivering it via Mirena\u00ae usually rescues treatment</b> before abandoning HRT."}
      ]},

    {t:"node", d:"monitor", n:"8", tag:"Step 6 \u00b7 bleeding", title:"Bleeding on HRT \u2014 expected vs investigate",
      blocks:[
        {b:"table", head:["Scenario","Interpretation","Action"], rows:[
          ["Sequential HRT","Regular monthly withdrawal bleed at end of progestogen phase","Expected \u2014 reassure"],
          ["New CCHRT (first 6 months)","Irregular/unscheduled bleeding settling","Usually settles \u2014 does not require investigation if &lt;6 months"],
          ["CCHRT bleeding >6 months / new after amenorrhoea","Unscheduled bleeding","Investigate endometrium (TVUSS \u00b1 biopsy); 2WW if suspicious"],
          ["Sequential \u2192 change to CCHRT","At age 55, or after 1 year of sequential if she wants to avoid monthly bleeds","Switch regimen"]
        ]},
        {b:"warn", html:"<b>Persistent, heavy or new unscheduled bleeding</b> (beyond the expected windows) always needs endometrial assessment \u2014 do not just keep adjusting HRT."}
      ]},

    {t:"loop", icon:"\uD83D\uDD01", title:"Still struggling? Re-run the checklist",
      arrow:"\u2026before stopping HRT",
      intro:"Almost all 'HRT doesn't suit me' is a fixable dose, route, progestogen or absorption problem.",
      checks:[
        {b:"1 \u00b7 Dose", html:"Oestrogen dose high enough, given \u22653 months?"},
        {b:"2 \u00b7 Route", html:"Tried transdermal for absorption + risk profile?"},
        {b:"3 \u00b7 Progestogen", html:"Intolerance? Switch to <b>micronised progesterone (Utrogestan 100 mg continuous, or 200 mg for 12 days sequential)</b> / dydrogesterone / Mirena\u00ae."},
        {b:"4 \u00b7 Regimen", html:"Right sequential vs continuous for her stage? Bleeding managed?"},
        {b:"5 \u00b7 Mimics", html:"Thyroid, anaemia, depression, sleep disorder driving symptoms?"}
      ],
      back:"Dose/route/progestogen/regimen optimised, mimics excluded \u2192 menopause specialist"},

    {t:"node", d:"refer", n:"9", tag:"Refer to specialist", title:"When to involve the menopause clinic",
      arrow:"complex, refractory or high-risk",
      blocks:[
        {b:"tiles", v:"refer", items:[
          {t:"POI (<40)", html:"Premature ovarian insufficiency \u2014 diagnosis + long-term HRT (higher doses, until ~51)."},
          {t:"Refractory", html:"Symptoms persist despite optimised dose, route, progestogen and regimen."},
          {t:"Complex risk", html:"Hormone-sensitive cancer, significant VTE/CVD/thrombophilia, or migraine with aura uncertainty."},
          {t:"Unscheduled bleeding", html:"Persistent/new bleeding on HRT \u2192 gynaecology for endometrial assessment."},
          {t:"Testosterone", html:"For HSDD where primary care is not confident initiating/monitoring."}
        ]},
        {b:"say", html:"We'll start with the safest, most effective preparation for you, review at three months, and fine-tune the dose, the route or the progestogen if anything doesn't suit \u2014 most side effects are fixable without giving up the benefits."}
      ]}
  ]
});
</script>
