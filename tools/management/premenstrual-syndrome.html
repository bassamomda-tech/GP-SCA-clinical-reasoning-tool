MG.render({"icon":"🌸","title":"Premenstrual Syndrome","guideline":"RCOG / NICE CKS","stemTitle":"PMS / PMDD — confirm the cyclical pattern, then treat by severity","stemSub":"Primary-care management of premenstrual syndrome — confirm luteal-phase symptoms with a symptom diary, treat with lifestyle, SSRIs and hormonal options, and recognise severe PMDD. RCOG · NICE CKS · 2026.","glance":[{"lbl":"Confirm","val":"2-month symptom diary","sub":"luteal-phase, resolves with menses"},{"lbl":"Lifestyle","val":"Exercise, CBT","sub":"+ sleep, stress"},{"lbl":"1st-line drug","val":"SSRI","sub":"luteal or continuous"},{"lbl":"Hormonal","val":"COC (drospirenone)","sub":"continuous/cyclical"},{"lbl":"Severe (PMDD)","val":"SSRI ± specialist","sub":"GnRH if refractory"},{"lbl":"Red flag","val":"Suicidal ideation","sub":"= urgent MH"}],"flow":[{"t":"node","d":"found","n":"1","tag":"Foundation","title":"Confirm the diagnosis","blocks":[{"b":"kv","rows":[["Definition","Cyclical psychological (irritability, low mood, anxiety) + physical (bloating, breast tenderness, headache) symptoms in the <b>luteal phase</b>, resolving soon after menstruation starts, with a symptom-free week"],["Confirm","Prospective <b>symptom diary over 2 cycles</b> — establishes the cyclical pattern and excludes underlying mood disorder"],["PMDD","Severe variant with marked mood symptoms + functional impairment"],["Differentials","Depression/anxiety (not cyclical), thyroid disease, perimenopause, exacerbation of existing mental illness premenstrually"]]},{"b":"why","html":"The diagnosis rests on demonstrating a cyclical, luteal-phase pattern with a symptom-free interval — hence the prospective diary — which distinguishes PMS/PMDD from a continuous mood disorder that merely worsens premenstrually (managed differently)."}]},{"t":"node","d":"safety","n":"2","tag":"Safety-net","title":"Severity + risk","blocks":[{"b":"tiles","v":"safety","items":[{"t":"🔴 PMDD + risk","html":"Severe mood symptoms with suicidal ideation or major functional impairment → urgent mental-health assessment."},{"t":"🟠 Underlying mood disorder","html":"If symptoms persist through the cycle, treat as depression/anxiety, not PMS."},{"t":"🤰 Perimenopause overlap","html":"Consider in older women with new cyclical symptoms."}]}]},{"t":"node","d":"life","n":"3","tag":"Non-drug · first-line","title":"Lifestyle & psychological","blocks":[{"b":"tiles","v":"life","items":[{"t":"🏃 Lifestyle","html":"Regular exercise, sleep, reduced caffeine/alcohol, smaller frequent meals; stress reduction can ease symptoms."},{"t":"🧠 CBT","html":"CBT is an effective first-line option for PMS, alone or with drug treatment."},{"t":"📔 Symptom diary","html":"A prospective 2-cycle symptom diary confirms the cyclical pattern and guides treatment."}]},{"b":"why","html":"Lifestyle measures and CBT are genuine first-line options for PMS — many women improve without drugs, and the symptom diary underpins the whole plan."}]},{"t":"node","d":"drug","n":"4","tag":"Treatment","title":"By severity (RCOG)","blocks":[{"b":"ladder","steps":[{"step":"Step 1","title":"Lifestyle + CBT","when":"mild","html":"Regular exercise, sleep, stress reduction, balanced diet, reduce alcohol/caffeine; CBT has good evidence. Consider vitamin/agnus castus where preferred (limited evidence)."},{"step":"Step 2","title":"SSRI","when":"moderate–severe / PMDD","fromLabel":"if lifestyle insufficient","html":"SSRI (e.g. <b>sertraline 50 mg</b> or <b>fluoxetine 20 mg</b>) — luteal-phase (days 15–28) or continuous dosing; effective for psychological symptoms, often rapid in PMS."},{"step":"Step 3","title":"Hormonal suppression","when":"if SSRI insufficient / contraception wanted","fromLabel":"hormonal option","html":"Combined oral contraceptive (drospirenone-containing, continuous/extended) to suppress ovulation; transdermal oestrogen ± progestogen options (specialist)."},{"step":"Step 4","title":"Specialist (GnRH/surgery)","when":"severe refractory","fromLabel":"refractory PMDD","html":"GnRH analogues with add-back HRT, rarely surgery — specialist/gynaecology only."}]}]},{"t":"node","d":"follow","n":"5","tag":"Follow-up","title":"Review response","blocks":[{"b":"timeline","items":[{"n":"1","when":"After 2–3 cycles","title":"Symptom diary","html":"Reassess with a prospective <b>symptom diary over ≥2 cycles</b>. Judge response to first-line (lifestyle, CBT, COC, or SSRI — continuous or luteal-phase)."},{"n":"2","when":"If inadequate","title":"Step up","html":"Try a different SSRI or a continuous regimen, or a higher-dose/continuous COC; consider escalation per RCOG (e.g. higher-dose estradiol) via specialist."},{"n":"3","when":"Severe / PMDD","title":"Refer","html":"Severe PMS/PMDD unresponsive to first/second-line → gynaecology or a multidisciplinary clinic (may consider GnRH analogues with add-back)."}]},{"b":"say","html":"Tracking symptoms across a couple of cycles tells us what's really cyclical and whether the treatment is working. We'll review then and step things up if needed."}]},{"t":"node","d":"refer","n":"6","tag":"Refer","title":"Referral","blocks":[{"b":"tiles","v":"refer","items":[{"t":"Gynaecology / specialist PMS","html":"Severe/refractory PMS/PMDD, considering GnRH analogues."},{"t":"Mental health","html":"Suicidal ideation, diagnostic overlap with mood disorder."},{"t":"Manage in primary care","html":"Confirmed PMS responding to lifestyle/SSRI/hormonal therapy."}]},{"b":"say","html":"These cyclical symptoms before your period sound like PMS. Keeping a symptom diary for a couple of months confirms the pattern. We can help with lifestyle changes and, if needed, a low-dose antidepressant (which works well for this, taken in the second half of the cycle) or the pill. If it’s ever overwhelming or you feel unsafe, tell me straight away."}]}],"foot":"Management of PMS/PMDD in primary care; confirm with a prospective symptom diary. Verify against current RCOG Green-top guidance and NICE CKS."});
</script>
