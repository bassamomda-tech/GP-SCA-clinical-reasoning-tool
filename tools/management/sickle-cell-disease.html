MG.render({"icon":"🩸","title":"Sickle Cell Disease","guideline":"NICE / specialist shared care","stemTitle":"Sickle cell disease — prevent crises, treat pain fast, share care","stemSub":"Primary-care role in sickle cell disease — support preventive care (penicillin prophylaxis, vaccination, hydroxycarbamide monitoring), treat acute pain crises promptly, and recognise the life-threatening complications that need emergency referral. NICE · specialist shared care · 2026.","glance":[{"lbl":"Prophylaxis","val":"Penicillin V + vaccines","sub":"hyposplenism"},{"lbl":"Folate","val":"Daily","sub":"haemolysis"},{"lbl":"Disease-modifying","val":"Hydroxycarbamide","sub":"specialist; FBC monitoring"},{"lbl":"Crisis pain","val":"Rapid strong analgesia","sub":"within 30 min"},{"lbl":"Avoid triggers","val":"Cold, dehydration, hypoxia, infection","sub":""},{"lbl":"Red flag","val":"Chest/sepsis/stroke/splenic/priapism","sub":"= 999"}],"flow":[{"t":"node","d":"found","n":"1","tag":"Foundation","title":"Confirm the picture & the GP's role","blocks":[{"b":"kv","rows":[["Diagnosis","Specialist/newborn-screening confirmed haemoglobinopathy (commonly <b>HbSS</b>; also HbSC, HbS/β-thal). GP works in <b>shared care</b> with haematology."],["Baseline","Know the patient's <b>baseline Hb</b> and usual symptoms, genotype, splenic status, transfusion/hydroxycarbamide history, and their personal crisis pattern."],["Hyposplenism","Most are functionally hyposplenic → lifelong infection risk; ensure prophylaxis and vaccination are up to date (see preventive care)."],["GP role","Prevent crises, treat pain fast, recognise emergencies early, coordinate annual review and support — not to manage disease-modifying therapy alone."]]},{"b":"why","html":"Knowing the patient's genotype and personal baseline is what lets you recognise when they are deviating from normal — a fever, a drop from their usual Hb, or a new symptom — and act before a crisis becomes life-threatening."}]},{"t":"node","d":"life","n":"2","tag":"Non-drug · every patient","title":"Self-management & trigger avoidance","blocks":[{"b":"tiles","v":"life","items":[{"t":"💧 Stay hydrated","html":"Dehydration precipitates sickling — maintain good fluid intake, more in heat/illness/exercise."},{"t":"🌡️ Keep warm","html":"Cold and sudden temperature change trigger vaso-occlusion — warm clothing, avoid cold water."},{"t":"🏔️ Avoid hypoxia","html":"Caution with high altitude and unpressurised flights; treat OSA; avoid smoking (and second-hand smoke)."},{"t":"🦠 Prompt infection care","html":"Seek care early for any fever/infection; keep vaccinations and penicillin prophylaxis going; good hand hygiene."},{"t":"🏃 Exercise sensibly","html":"Regular moderate activity is fine; avoid extreme exertion/overheating and stay hydrated during it."},{"t":"🧠 Support","html":"Chronic pain and frequent admissions affect mood/education/work — offer psychological support and signpost patient groups."}]},{"b":"why","html":"Most crises are provoked by identifiable triggers — dehydration, cold, hypoxia and infection — so consistent everyday self-management genuinely reduces crisis frequency, alongside the drugs."}]},{"t":"node","d":"drug","n":"3","tag":"Preventive care","title":"The GP’s ongoing role","blocks":[{"b":"ladder","steps":[{"step":"Infection prevention","title":"Penicillin V + vaccination","when":"lifelong","html":"Daily prophylactic <b>penicillin V 250 mg BD</b> (erythromycin if allergic); full vaccination incl. pneumococcal (+ boosters), Hib, meningococcal, annual influenza, hepatitis B — functional hyposplenism."},{"step":"Haematinics","title":"Folic acid","when":"ongoing","fromLabel":"chronic haemolysis","html":"Daily <b>folic acid 5 mg</b>; avoid routine iron unless deficient."},{"step":"Disease-modifying","title":"Hydroxycarbamide","when":"specialist-initiated","fromLabel":"reduce crises","html":"Reduces crises/acute chest syndrome; GP supports adherence + monitoring (FBC for myelosuppression) per shared-care; counsel re contraception/teratogenicity."},{"step":"Trigger avoidance","title":"Reduce precipitants","when":"all","fromLabel":"prevention","html":"Keep warm, hydrated; avoid hypoxia (altitude/anaesthetic planning), prompt infection treatment; smoking cessation."}]}]},{"t":"node","d":"drug","n":"4","tag":"Acute crisis","title":"Treat pain fast","blocks":[{"b":"kv","rows":[["Vaso-occlusive crisis","Severe bony pain; treat <b>strong analgesia rapidly</b> (within ~30 min of presentation), reassess frequently; warmth, hydration, treat infection; per patient’s individualised plan"],["Analgesia","Paracetamol + NSAID (if appropriate) + opioids for severe pain; avoid pethidine; antiemetic/laxative with opioids"],["Escalate","If not settling, hypoxic, febrile, chest/neuro symptoms → admit (don’t under-treat sickle pain — patients are often under-dosed)"],["Avoid","Dismissing pain / delayed analgesia — a recognised cause of harm and mistrust"]]}]},{"t":"node","d":"monitor","n":"5","tag":"Monitoring","title":"Hydroxycarbamide & disease monitoring","blocks":[{"b":"table","head":["What","Test","When"],"rows":[["Hydroxycarbamide (myelosuppression)","<b>FBC</b> — watch neutrophils/platelets; dose adjusted by specialist","Every 2–4 weeks at start/dose change, then ~3-monthly"],["Organ function on treatment","<b>U&amp;E, LFTs, reticulocytes</b>","Periodically per shared-care protocol"],["Iron overload (if transfused)","<b>Ferritin</b> ± specialist iron studies","Per haematology"],["Disease surveillance","Annual review: growth, BP, urinalysis (proteinuria), O₂ sats; <b>transcranial Doppler in children</b>; retinal &amp; renal screening","Annually (TCD per paediatric haematology)"]]},{"b":"warn","html":"<b>⚠ Hydroxycarbamide is cytotoxic</b> — never let FBC monitoring lapse; report fever/infection promptly (neutropenia risk). It is teratogenic — discuss contraception and pre-conception planning."}]},{"t":"node","d":"follow","n":"6","tag":"Follow-up","title":"Shared-care & prevention","blocks":[{"b":"timeline","items":[{"n":"1","when":"Lifelong","title":"Prophylaxis & vaccines","html":"Ensure <b>penicillin V prophylaxis</b>, full vaccination (pneumococcal, meningococcal, Hib, annual flu), <b>folic acid</b>, and hydroxycarbamide where indicated (specialist-initiated) — GP supports adherence."},{"n":"2","when":"Each contact","title":"Prevent crises","html":"Advise hydration, warmth, avoiding triggers; treat infections promptly (low threshold). Annual review: growth, organ complications, transcranial Doppler in children (per haematology)."},{"n":"3","when":"Acute crisis","title":"Escalate fast","html":"Severe pain, fever, chest symptoms (acute chest syndrome), neuro signs or splenic sequestration → <b>urgent admission</b>; never undertreat sickle pain."}]},{"b":"say","html":"Staying on your penicillin, vaccines and folic acid prevents serious infections, and keeping warm and hydrated helps avoid crises. Any fever, chest symptoms or severe pain — get seen urgently."}]},{"t":"node","d":"safety","n":"7","tag":"Safety-net","title":"Life-threatening complications","blocks":[{"b":"tiles","v":"safety","items":[{"t":"🔴 Acute chest syndrome","html":"Chest pain, fever, hypoxia, new infiltrate → emergency — a leading cause of death."},{"t":"🔴 Sepsis (hyposplenism)","html":"Fever in sickle cell = potential overwhelming sepsis → urgent assessment/antibiotics; encapsulated organisms."},{"t":"🔴 Stroke","html":"Focal neurology/seizure → 999 (children at particular risk)."},{"t":"🔴 Splenic sequestration / aplastic crisis","html":"Rapid anaemia, enlarging spleen (child), pallor/collapse (parvovirus B19) → emergency."},{"t":"🔴 Priapism","html":"Prolonged painful erection &gt;2–4h → urological emergency."}]},{"b":"why","html":"Sickle cell disease is punctuated by emergencies — acute chest syndrome, sepsis (functional asplenia), stroke, splenic sequestration, aplastic crisis and priapism — all of which need immediate recognition and emergency referral; the GP also drives the preventive care that reduces them."}]},{"t":"node","d":"refer","n":"8","tag":"Refer","title":"Shared care + emergencies","blocks":[{"b":"tiles","v":"refer","items":[{"t":"999 / emergency","html":"Acute chest syndrome, sepsis/fever, stroke, splenic sequestration, aplastic crisis, priapism, severe uncontrolled crisis."},{"t":"Haematology (specialist)","html":"All patients — disease-modifying therapy, transfusion programmes, transition, pregnancy planning, monitoring."},{"t":"Annual review","html":"Growth/development (children), organ surveillance (retinopathy, renal, pulmonary hypertension), TCD screening in children."}]},{"b":"say","html":"Sickle cell disease is managed mainly by the specialist team, but day to day we keep you well: a daily penicillin and your vaccinations because the spleen doesn’t work properly, daily folic acid, and supporting your hydroxycarbamide if you take it. If you get a painful crisis we treat the pain quickly. A fever, chest pain or breathlessness means you must be seen urgently."}]}],"foot":"Primary-care shared care of sickle cell disease; acute chest syndrome, sepsis, stroke and sequestration are emergencies. Verify against current NICE/specialist haematology guidance."});
</script>
