MG.render({"icon":"🧴","title":"Impetigo","guideline":"NICE NG153","stemTitle":"Impetigo — localised topical, widespread oral, hygiene + exclusion","stemSub":"Primary-care management of impetigo — a contagious superficial bacterial skin infection; treat localised non-bullous disease topically (antiseptic or antibiotic) and widespread/bullous disease with oral antibiotics, with hygiene and school-exclusion advice. NICE NG153 · 2026.","glance":[{"lbl":"Localised","val":"H2O2 1% cream 2–3x/day","sub":"5 days; fusidic acid 2nd"},{"lbl":"Widespread/bullous","val":"Flucloxacillin 500mg QDS","sub":"5 days; clarithro if allergic"},{"lbl":"Organism","val":"Staph aureus ± strep","sub":""},{"lbl":"Exclude","val":"Until lesions healed/crusted","sub":"or 48h on antibiotics"},{"lbl":"Hygiene","val":"Don’t share towels","sub":"limit spread"},{"lbl":"Red flag","val":"Recurrent / systemic / MRSA","sub":"= swab / review"}],"flow":[{"t":"node","d":"found","n":"1","tag":"Foundation","title":"Diagnose + classify","blocks":[{"b":"kv","rows":[["Non-bullous (commonest)","Golden-crusted erosions, often face/perioral; very contagious; usually S. aureus ± group A strep"],["Bullous","Flaccid fluid-filled blisters → erosions (staphylococcal toxin); more often in young children/trunk — treat orally"],["Assess","Extent (localised vs widespread), systemic features, underlying skin disease (eczema), recurrence"],["Swab","Not routine; swab if recurrent, treatment failure, suspected MRSA, or outbreaks"]]},{"b":"why","html":"Impetigo management follows NG153 antimicrobial-stewardship logic: localised non-bullous disease is treated topically (hydrogen peroxide first, sparing antibiotics), while widespread or bullous disease, or systemic features, warrant oral antibiotics."}]},{"t":"node","d":"drug","n":"2","tag":"Treatment","title":"Stepwise (NG153)","blocks":[{"b":"ladder","steps":[{"step":"Localised non-bullous","title":"Hydrogen peroxide 1% cream","when":"first-line if systemically well","html":"<b>Hydrogen peroxide 1% cream</b> applied 2–3 times daily for 5 days (antiseptic, first-line). If unsuitable/ineffective → topical antibiotic <b>fusidic acid 2% three times daily for 5 days</b> (mupirocin 2% TDS if MRSA / where fusidic resistance)."},{"step":"Widespread / bullous","title":"Oral flucloxacillin","when":"or systemically unwell","fromLabel":"if extensive/bullous/unwell","html":"<b>Flucloxacillin 500 mg four times daily for 5 days</b> (7 days if severe/extensive) — child doses by age/weight. If penicillin-allergic: <b>clarithromycin 250–500 mg BD</b>, or <b>erythromycin 250–500 mg QDS</b> in pregnancy."},{"step":"Recurrent","title":"Investigate + decolonise","when":"recurrent","fromLabel":"if recurrent","html":"Swab (incl. nasal carriage/MRSA), treat underlying skin disease (eczema), consider decolonisation; check close contacts."}]},{"b":"warn","html":"Avoid prolonged/repeated topical antibiotics (fusidic acid resistance), and do not give topical and oral antibiotics together. Treat underlying eczema, which predisposes to recurrent impetigo."}]},{"t":"node","d":"life","n":"3","tag":"Advice","title":"Hygiene + exclusion","blocks":[{"b":"tiles","v":"life","items":[{"t":"🚫 Exclusion","html":"Children/staff stay off school/work until lesions are healed/crusted over, or 48 hours after starting antibiotic treatment."},{"t":"🧼 Hygiene","html":"Wash hands, don’t share towels/flannels, avoid scratching/touching lesions, keep nails short."},{"t":"🏠 Contacts","html":"Watch household contacts; treat if affected."}]}]},{"t":"node","d":"follow","n":"4","tag":"Follow-up","title":"Review & recurrence","blocks":[{"b":"timeline","items":[{"n":"1","when":"~7 days","title":"Check resolution","html":"Most impetigo clears within 7 days of treatment. Review (or safety-net) if no better — reconsider adherence, resistance, or an alternative diagnosis (e.g. eczema herpeticum, fungal)."},{"n":"2","when":"Recurrent impetigo","title":"Look for a reservoir","html":"For recurrent cases, take swabs and consider <b>nasal Staph. aureus carriage</b> — treat carriage (e.g. nasal mupirocin/chlorhexidine) and screen close contacts; check for underlying skin disease (eczema, scabies)."},{"n":"3","when":"Exclusion","title":"Return to school/work","html":"Can return once lesions are healed/crusted over, or 48 h after starting antibiotics."}]},{"b":"say","html":"It should settle within a week. Keep towels and flannels separate, and come back if it spreads or keeps coming back — sometimes the bacteria live in the nose and we treat that too."}]},{"t":"node","d":"safety","n":"5","tag":"Safety-net","title":"When to seek urgent review","blocks":[{"b":"tiles","v":"safety","items":[{"t":"🔴 Spreading / systemic","html":"Expanding redness, pain, fever or feeling unwell → suspect cellulitis → same-day review + oral antibiotics."},{"t":"🟠 Widespread / bullous / neonate","html":"Extensive or bullous impetigo, or any newborn → treat systemically and consider referral."},{"t":"💬 Safety-net","html":"If the skin around it becomes red, hot and painful, or your child develops a fever, contact us the same day."}]}]},{"t":"node","d":"refer","n":"6","tag":"Refer","title":"Referral","blocks":[{"b":"tiles","v":"refer","items":[{"t":"Review / swab","html":"Treatment failure, recurrent impetigo, suspected MRSA, or systemic illness."},{"t":"Dermatology / paediatrics","html":"Widespread bullous disease in infants, diagnostic uncertainty, or complicating skin disease."},{"t":"Admit","html":"Systemically unwell / extensive bullous in infant / suspected SSSS."}]},{"b":"say","html":"This is impetigo — a contagious skin infection that makes golden, crusty sores. A small patch can be treated with an antiseptic or antibiotic cream; if it’s spread, we’ll use antibiotic tablets. It spreads easily, so wash hands, don’t share towels, and keep off school until it’s healed or 48 hours after starting antibiotics."}]}],"foot":"Management of impetigo in primary care per antimicrobial stewardship (NG153); exclusion until healed/crusted or 48h on antibiotics. Verify against current NICE NG153."});
