<body data-screen-label="GAD management card">

<script>
MG.render({
  icon:"🧠",
  title:"Generalised Anxiety Disorder",
  stemTitle:"Confirmed Generalised Anxiety Disorder — ongoing management",
  stemSub:"Primary-care management of confirmed GAD on the NICE stepped-care model \u2014 education and low-intensity psychological options first, then CBT or an SSRI, with monitoring and continuation \u2014 up to specialist referral. NICE CG113 \u00b7 CKS 2026.",
  guideline:"NICE CG113",
  glance:[
    {lbl:"Model", val:"Stepped care", sub:"lowest effective step"},
    {lbl:"Severity", val:"GAD-7", sub:"+ functional impact"},
    {lbl:"Drug 1st-line", val:"SSRI", sub:"sertraline"},
    {lbl:"If SSRI fails", val:"SNRI / pregabalin", sub:"not antipsychotics in 1\u00b0 care"},
    {lbl:"Avoid", val:"Benzodiazepines", sub:"except short crisis use"},
    {lbl:"Continue", val:"\u22656\u201312 mo", sub:"after response"}
  ],
  flow:[
    {t:"node", d:"found", n:"1", tag:"Foundation", title:"Confirm GAD, severity and risk",
      blocks:[
        {b:"kv", rows:[
          ["Severity / function","GAD-7 + impact on work, relationships, daily life"],
          ["Risk","Suicidal ideation, self-neglect; comorbid depression (treat the more severe first)"],
          ["Exclude / contribute","Hyperthyroidism, excess caffeine/stimulants, alcohol, substances, certain drugs"],
          ["Differentiate","Panic disorder, social anxiety, PTSD, OCD, health anxiety \u2014 different pathways"]
        ]},
        {b:"why", html:"Stepped care means matching intensity to need \u2014 most GAD improves with the lowest-intensity effective step, and reserving CBT and drugs for those who need them. Excluding thyrotoxicosis and stimulant/caffeine load first avoids medicating a reversible physical driver."}
      ]},
    {t:"node", d:"life", n:"2", tag:"Non-drug \u00b7 stepped care", title:"Education and low-intensity options first",
      blocks:[
        {b:"tiles", v:"life", items:[
          {t:"📚 Step 1 \u00b7 Education", html:"Psychoeducation, active monitoring, reliable self-help resources; explain the anxiety cycle."},
          {t:"💬 Step 2 \u00b7 Low-intensity", html:"Guided self-help (CBT-based), psychoeducational groups, digital CBT."},
          {t:"🧠 Step 3 \u00b7 High-intensity", html:"Individual CBT or applied relaxation \u2014 equally effective alternative to medication."},
          {t:"🏃 Lifestyle", html:"Exercise, sleep, reduce caffeine and alcohol, problem-solving real stressors."},
          {t:"🔗 Social prescribing", html:"Work, finances, relationships, isolation \u2014 address the drivers directly."},
          {t:"🌬️ Self-regulation", html:"Breathing/relaxation techniques, mindfulness, worry-time strategies."}
        ]}
      ]},
    {t:"node", d:"drug", n:"3", tag:"Medication \u00b7 step 3", title:"Drug ladder (alternative or addition to CBT)",
      blocks:[
        {b:"ladder", steps:[
          {step:"Step 1", title:"An SSRI", when:"sertraline first-line",
           html:"<b>Sertraline 25–50 mg once daily</b> (titrate to max 200 mg) — first-line. Counsel: may briefly <b>increase anxiety in the first week or two</b>, takes weeks to work, not addictive but don\u2019t stop abruptly. Review early."},
          {step:"Step 2", title:"Alternative SSRI or an SNRI", when:"if first SSRI ineffective/not tolerated",
           fromLabel:"inadequate response after adequate trial",
           html:"Try a second SSRI, or an SNRI (<b>venlafaxine 75 mg OD, up to 225 mg</b>, or <b>duloxetine 30\u201360 mg OD</b>)."},
          {step:"Step 3", title:"Pregabalin", when:"if SSRI/SNRI unsuitable",
           fromLabel:"SSRI + SNRI ineffective/not tolerated",
           html:"Consider <b>pregabalin 150 mg/day in 2\u20133 divided doses (up to 600 mg/day)</b> \u2014 but counsel on dependence/misuse potential and sedation."}
        ]},
        {b:"warn", html:"<b>Avoid benzodiazepines</b> except short-term during a crisis (dependence). <b>Do not</b> start antipsychotics for GAD in primary care. Continue effective treatment for <b>at least 6\u201312 months</b>, then taper slowly."},
        {b:"why", html:"Drugs and high-intensity CBT are equally valid Step 3 choices \u2014 the decision is the patient\u2019s. SSRIs are first-line because benzodiazepines, though fast, create dependence and rebound anxiety, trading a short-term gain for a long-term problem."}
      ]},
    {t:"node", d:"monitor", n:"4", tag:"Monitoring", title:"Response, risk and tolerability",
      blocks:[
        {b:"table", head:["What","When","Action"], rows:[
          ["Risk + early side effects","1\u20132 weeks after starting (<b>1 week if &lt;30 / risk</b>)","Escalate if risk rises; reassure re early anxiety worsening"],
          ["GAD-7 / function","Each review","Track response; guide switch/continue"],
          ["Adherence + expectations","Each review","Reinforce delayed onset, non-addictive nature"]
        ]}
      ]},
    {t:"node", d:"follow", n:"5", tag:"Follow-up", title:"Review schedule",
      blocks:[
        {b:"timeline", items:[
          {n:"1", when:"1\u20132 weeks after starting", title:"Early review", html:"Risk, tolerability, expectation-setting; sooner if young/at risk."},
          {n:"2", when:"Every 2\u20134 weeks until improving", title:"Response reviews", html:"GAD-7, function, adherence; optimise or switch if no response."},
          {n:"3", when:"\u22656\u201312 months after response", title:"Continuation + taper", html:"Maintain, then withdraw slowly with relapse-prevention planning."}
        ]}
      ]},
    {t:"loop", icon:"🔁", title:"Not responding? Check before switching",
      arrow:"\u2026if anxiety persists at review",
      intro:"Confirm an adequate trial and the right step.",
      checks:[
        {b:"1 \u00b7 Adherence + dose", html:"Adequate dose and duration before judging failure?"},
        {b:"2 \u00b7 Step matched", html:"Has high-intensity CBT been offered alongside?"},
        {b:"3 \u00b7 Drivers", html:"Caffeine, alcohol, stimulants, ongoing stressors, thyroid."},
        {b:"4 \u00b7 Diagnosis", html:"Reconsider panic, PTSD, OCD, depression as the dominant problem."},
        {b:"5 \u00b7 Switch / refer", html:"Adequate trial failed \u2192 switch agent or refer."}
      ],
      back:"Adequate trial, drivers addressed \u2192 switch agent / add CBT / refer"},
    {t:"node", d:"safety", n:"6", tag:"Safety-net", title:"Safety-netting",
      blocks:[
        {b:"tiles", v:"safety", items:[
          {t:"🔴 Crisis", html:"\u201cIf you ever feel unsafe or have thoughts of ending your life \u2014 call 999, go to A&amp;E, or ring NHS 111 / Samaritans 116 123.\u201d"},
          {t:"⚠️ Early worsening", html:"\u201cAnxiety can feel worse for a week or two when starting \u2014 it settles. If it\u2019s severe, contact us.\u201d"},
          {t:"💊 Don\u2019t stop suddenly", html:"\u201cDon\u2019t stop the medicine abruptly \u2014 we\u2019ll taper it slowly to avoid withdrawal effects.\u201d"},
          {t:"🍷 Self-medicating", html:"\u201cUsing alcohol or others\u2019 sedatives to cope tends to worsen anxiety \u2014 tell us and we\u2019ll help.\u201d"}
        ]}
      ]},
    {t:"node", d:"refer", n:"7", tag:"Refer to secondary care", title:"When to refer",
      arrow:"when risk is high or illness is resistant",
      blocks:[
        {b:"tiles", v:"refer", items:[
          {t:"Urgent", html:"Significant suicide/self-harm risk or severe self-neglect \u2192 urgent mental-health assessment."},
          {t:"Treatment-resistant", html:"Marked functional impairment despite Step 3 (CBT + drug trials)."},
          {t:"Diagnostic complexity", html:"Comorbid severe depression, PTSD, OCD, substance misuse, or diagnostic doubt."},
          {t:"Perinatal", html:"Pregnancy/postnatal \u2014 perinatal mental-health team."}
        ]},
        {b:"say", html:"You\u2019ve worked hard at this and it\u2019s still affecting your life, so I\u2019d like to involve the mental-health team for more specialist support \u2014 we\u2019ll keep things going here in the meantime."}
      ]}
  ]

</script>
