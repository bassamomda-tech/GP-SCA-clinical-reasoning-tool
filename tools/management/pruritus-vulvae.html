MG.render({"icon":"🌸","title":"Pruritus Vulvae","guideline":"NICE CKS","stemTitle":"Vulval itch — find the cause, treat it, don't miss VIN/cancer","stemSub":"Primary-care management of vulval itch — examine to identify the cause (dermatoses, infection, atrophy, lichen sclerosus), treat with emollients/avoidance and targeted therapy, and biopsy/refer suspicious or non-resolving lesions to exclude VIN and vulval cancer. NICE CKS · 2026.","glance":[{"lbl":"Always","val":"Examine the vulva","sub":"don’t treat blind"},{"lbl":"Foundation","val":"Emollient + avoid irritants","sub":"soap substitute"},{"lbl":"Lichen sclerosus","val":"Potent topical steroid","sub":"clobetasol"},{"lbl":"Infection","val":"Treat candida/STI","sub":"if present"},{"lbl":"Atrophy","val":"Topical oestrogen","sub":"postmenopausal"},{"lbl":"Red flag","val":"Persistent lump/ulcer/white plaque","sub":"= biopsy / 2WW"}],"flow":[{"t":"node","d":"safety","n":"1","tag":"Safety-net","title":"Don't miss malignancy","blocks":[{"b":"tiles","v":"safety","items":[{"t":"🔴 Vulval cancer / VIN","html":"Persistent lump, ulcer, bleeding, fixed white/red plaque, or non-resolving itch → examine + refer (2WW) / biopsy. Don’t treat blind long-term."},{"t":"🟠 Lichen sclerosus","html":"White atrophic ‘cigarette-paper’ skin, figure-of-8 distribution, scarring — ~5% lifetime SCC risk → treat + monitor; biopsy if atypical/unresponsive."},{"t":"🟠 Child with vulval itch","html":"Usually irritant/threadworm/hygiene; consider safeguarding if features of abuse."},{"t":"🩺 Systemic itch","html":"Generalised pruritus (iron deficiency, liver/renal, thyroid, lymphoma) can include vulva — screen if suggested."}]},{"b":"why","html":"Vulval itch is usually benign (dermatitis, candida, atrophy, lichen sclerosus), but persistent or atypical lesions must be examined and biopsied/referred to exclude VIN and vulval carcinoma — the classic error is repeated blind antifungal prescribing."}]},{"t":"node","d":"found","n":"2","tag":"Foundation","title":"Identify the cause","blocks":[{"b":"kv","rows":[["Dermatitis","Irritant/allergic contact (soaps, wipes, panty liners, OTC creams), eczema, psoriasis — commonest"],["Infection","Candida (itch + thick discharge), trichomonas, threadworm (perianal, children), STI"],["Lichen sclerosus / planus","White atrophic or violaceous lesions; scarring"],["Atrophy","Postmenopausal genitourinary syndrome — dryness, soreness, itch"],["Examine","Always inspect the vulva; swab if infection suspected; consider ferritin/glucose if generalised/persistent"]]}]},{"t":"node","d":"life","n":"3","tag":"Non-drug · skin care","title":"Vulval skin care","blocks":[{"b":"tiles","v":"life","items":[{"t":"🧼 Avoid irritants","html":"Use a soap substitute/emollient; avoid soaps, perfumed products, wipes, tight synthetic underwear and over-washing."},{"t":"💧 Emollient barrier","html":"Regular bland emollient soothes and protects; pat dry, cotton underwear."},{"t":"🚫 Break the itch-scratch","html":"Avoid scratching (worsens lichenification); keep nails short, consider night-time antihistamine."}]},{"b":"why","html":"Much vulval itch is driven or sustained by irritant contact — a soap substitute, emollient and avoiding perfumed products are first-line and continue alongside any specific treatment."}]},{"t":"node","d":"drug","n":"4","tag":"Treatment","title":"Treat by cause","blocks":[{"b":"ladder","steps":[{"step":"All","title":"Emollients + avoid irritants","when":"foundation","html":"Soap substitute/emollient as a barrier; stop perfumed products, wipes, OTC creams; loose cotton underwear; pat dry."},{"step":"Dermatitis","title":"Topical corticosteroid","when":"eczematous/inflammatory","fromLabel":"if dermatitis","html":"Short course of appropriate-potency topical steroid; treat any secondary infection."},{"step":"Lichen sclerosus","title":"Potent topical steroid","when":"clobetasol regimen","fromLabel":"if lichen sclerosus","html":"Ultra-potent topical steroid (clobetasol) reducing regimen; long-term monitoring for malignant change."},{"step":"Infection / atrophy","title":"Targeted therapy","when":"as indicated","fromLabel":"infection or atrophy","html":"Antifungal (e.g. <b>clotrimazole 1% cream</b> ± <b>fluconazole 150 mg</b>) for candida, treat STI/threadworm; <b>topical oestrogen</b> for atrophic change."}]}]},{"t":"node","d":"follow","n":"5","tag":"Follow-up","title":"Review & cause","blocks":[{"b":"timeline","items":[{"n":"1","when":"2–4 weeks","title":"Treat the cause","html":"Review after general measures (emollient soap substitute, avoid irritants) + treatment of any identified cause (candida, lichen sclerosus, eczema, threadworm)."},{"n":"2","when":"Lichen sclerosus","title":"Maintenance steroid","html":"If lichen sclerosus: <b>potent topical steroid (clobetasol propionate 0.05%)</b> reducing regimen, then maintenance; long-term follow-up (small VIN/cancer risk)."},{"n":"3","when":"Persistent / abnormal","title":"Examine & refer","html":"Persistent itch, white plaques, ulceration or a lump → examine and refer (vulval clinic / biopsy) to exclude VIN or vulval carcinoma."}]},{"b":"say","html":"We'll treat the likely cause and soothe the skin, then review. If there are white patches or it doesn't settle, you'll need an examination and sometimes a specialist check."}]},{"t":"node","d":"refer","n":"6","tag":"Refer","title":"Referral","blocks":[{"b":"tiles","v":"refer","items":[{"t":"2WW gynaecology","html":"Suspicious vulval lump/ulcer/plaque or unexplained vulval bleeding."},{"t":"Dermatology / vulval clinic","html":"Lichen sclerosus/planus uncertain or unresponsive; recurrent dermatoses; biopsy."},{"t":"Reassess","html":"Itch not resolving with treatment → re-examine + biopsy, don’t keep re-prescribing antifungals."}]},{"b":"say","html":"Vulval itch usually comes from skin irritation, a yeast infection or thinning of the skin — all very treatable. The key is to examine the area, treat the specific cause, and switch to gentle soap-free washing. If there’s a lump, sore or white patch that doesn’t settle, we’ll take a closer look or a small sample to be safe."}]}],"foot":"Management of vulval itch in primary care; persistent or atypical lesions need examination and biopsy/referral to exclude VIN/vulval cancer. Verify against current NICE CKS and BAD/BSSVD guidance."});
