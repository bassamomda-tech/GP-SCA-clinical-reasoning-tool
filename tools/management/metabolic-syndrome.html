<script>
MG.render({
  icon:"⚖️",
  title:"Metabolic Syndrome",
  stemTitle:"Metabolic syndrome \u2014 treat every component to target",
  stemSub:"Primary-care management of the cardiometabolic cluster \u2014 intensive lifestyle change as the foundation, then treat dysglycaemia, lipids and blood pressure to target, screen for NAFLD/OSA, and prevent progression to diabetes and cardiovascular disease. IDF criteria \u00b7 NICE NG238/NG28/NG136 \u00b7 2026.",
  guideline:"NICE NG238 / NG28 / NG136",
  glance:[
    {lbl:"Foundation", val:"5\u201310% weight loss", sub:"diet + activity"},
    {lbl:"Risk score", val:"QRISK3", sub:"statin if \u226510%"},
    {lbl:"Glycaemia", val:"Prevent T2DM", sub:"NHS DPP / metformin"},
    {lbl:"BP target", val:"per NG136", sub:"ACEi/ARB first"},
    {lbl:"Screen", val:"NAFLD / OSA", sub:"FIB-4, Epworth"},
    {lbl:"Adjunct", val:"GLP-1 / bariatric", sub:"if eligible"}
  ],
  flow:[
    {t:"node", d:"found", n:"1", tag:"Foundation", title:"Define the cluster + reclassify",
      blocks:[
        {b:"kv", rows:[
          ["Components","Central obesity + \u22652 of: triglycerides \u22651.7 \u00b7 HDL &lt;1.0 (M)/&lt;1.3 (F) \u00b7 BP \u2265130/85 (or treated) \u00b7 fasting glucose \u22655.6 / known T2DM"],
          ["Ethnicity","South Asian and other high-risk groups develop insulin resistance at lower waist/BMI \u2014 use ethnicity-specific thresholds"],
          ["Reclassify first","Already diabetic? Established CVD? Familial hypercholesterolaemia? Secondary obesity (Cushing\u2019s, hypothyroid, drugs)? \u2014 each has its own higher-priority pathway"],
          ["Associated","NAFLD/MASLD, OSA, PCOS, gout, erectile dysfunction \u2014 share the insulin-resistant phenotype"]
        ]},
        {b:"why", html:"Metabolic syndrome is a risk state, not a disease; its value is prompting aggressive, simultaneous risk-factor control. There is no single drug \u2014 outcomes improve by treating each component to target on a foundation of weight loss."}
      ]},
    {t:"node", d:"life", n:"2", tag:"Non-drug \u00b7 the foundation", title:"Intensive lifestyle change",
      blocks:[
        {b:"tiles", v:"life", items:[
          {t:"🥗 Diet", html:"Mediterranean-style / calorie-controlled; cut refined carbs, sugary drinks, ultra-processed food."},
          {t:"🏃 Activity", html:"\u2265150 min/week moderate aerobic + 2\u00d7 resistance; reduce sedentary time."},
          {t:"⚖️ Weight", html:"Target 5\u201310% loss; structured programmes (NHS DPP, referrals); self-monitoring."},
          {t:"🍺 Alcohol", html:"Within \u226414 units/week; fewer calories + better BP/triglycerides."},
          {t:"🚭 Smoking", html:"Cessation \u2014 the single biggest CV risk reduction."},
          {t:"😴 Sleep / OSA", html:"Treat OSA; poor sleep worsens insulin resistance + appetite."}
        ]}
      ]},
    {t:"node", d:"drug", n:"3", tag:"Medication \u00b7 by component", title:"Treat each component to target",
      blocks:[
        {b:"ladder", steps:[

          {step:"Lipids", title:"Statin by risk", when:"QRISK3 \u226510%",
           fromLabel:"primary prevention",
           html:"Atorvastatin 20 mg if QRISK3 \u226510% (NG238); 80 mg for secondary prevention. Aim &gt;40% non-HDL reduction."},
          {step:"Blood pressure", title:"Treat to target (NG136)", when:"if hypertensive",
           fromLabel:"if BP raised",
           html:"ACEi/ARB first-line (especially with diabetes); thresholds/targets by age, diabetes and CKD status."},
          {step:"Weight Rx", title:"GLP-1 / orlistat \u00b1 bariatric", when:"if eligible",

        ]}
      ]},
    {t:"node", d:"found", n:"4", tag:"Screen complications", title:"Look for the linked conditions",
      blocks:[
        {b:"kv", rows:[
          ["NAFLD / MASLD","Raised LFTs/steatosis \u2192 exclude other liver disease, stage fibrosis with <b>FIB-4 / ELF</b> (NG49); refer if advanced"],
          ["OSA","Snoring + daytime sleepiness \u2192 Epworth, refer sleep service"],
          ["CKD","Urine ACR + eGFR \u2014 diabetic/hypertensive kidney involvement"],
          ["PCOS / gout / ED","Manage as part of the insulin-resistant cluster"]
        ]}
      ]},
    {t:"node", d:"monitor", n:"5", tag:"Monitoring", title:"Annual cardiometabolic review",
      blocks:[
        {b:"table", head:["What","When","Action"], rows:[
          ["Weight/waist, BP, HbA1c, lipids (non-HDL), ACR, LFTs","Annually","Recalculate QRISK3; titrate treatments to target"],
          ["Glucose status","Per risk","Re-check HbA1c in pre-diabetes; re-refer to prevention programme"],
          ["FIB-4 (NAFLD)","Per risk","Repeat; refer if rising fibrosis score"],
          ["Drug monitoring","Per agent","Statin (lipids/LFTs), antihypertensives (U&amp;E), diabetes drugs"]

      ]},
    {t:"node", d:"safety", n:"6", tag:"Safety-net", title:"Cardiovascular safety-net", blocks:[{b:"tiles", v:"safety", items:[{t:"\ud83d\udd34 Acute event", html:"Chest pain, breathlessness, or stroke symptoms (FAST) \u2192 emergency \u2014 call 999."},{t:"\ud83d\udfe0 New diabetes symptoms", html:"Thirst, polyuria, weight loss, or recurrent infections \u2192 check glucose/HbA1c."},{t:"\ud83d\udcac Safety-net", html:"Seek urgent help for chest pain or stroke symptoms; tell us about excessive thirst, passing lots of urine, or unexplained weight loss."}]}]},
    {t:"node", d:"refer", n:"7", tag:"Refer", title:"When to refer",
      arrow:"complications or specialist treatment",
      blocks:[
        {b:"tiles", v:"refer", items:[
          {t:"Weight management / bariatric", html:"Tier 3/4 for complex obesity, GLP-1 initiation, surgery per CG189."},
          {t:"Hepatology", html:"Advanced fibrosis on FIB-4/ELF or NAFLD uncertainty."},
          {t:"Lipid clinic / cardiology", html:"Possible FH, statin intolerance, established CVD."},
          {t:"Sleep / endocrine", html:"Suspected OSA; suspected secondary cause (Cushing\u2019s), difficult diabetes, PCOS."}
        ]},
        {b:"say", html:"Several risk factors are clustering together \u2014 weight around the middle, blood pressure, sugar and cholesterol. The good news is they respond to the same changes. Losing 5\u201310% of weight, moving more and stopping smoking improves all of them, and we\u2019ll add tablets to bring each number to target."}
      ]}
  ],
  foot:"Risk-management framework for the cardiometabolic cluster; treat each component to its guideline target. Verify against current NICE NG238, NG28, NG136, NG49/CG189 and the NHS Diabetes Prevention Programme."
});
