MG.render({

  stemSub:"Primary-care management of diagnosed dementia \u2014 post-diagnostic support, cognitive enhancers, non-pharmacological management of distress (BPSD), carer support and advance care planning \u2014 in shared care with memory services. NICE NG97 \u00b7 CKS 2026.",
  guideline:"NICE NG97",
  glance:[
    {lbl:"Subtype matters", val:"AD / vascular / Lewy", sub:"drives drug choice"},
    {lbl:"Mild\u2013mod AD", val:"AChE inhibitor", sub:"donepezil etc."},
    {lbl:"Mod\u2013severe / add-on", val:"Memantine", sub:""},
    {lbl:"BPSD", val:"Non-drug first", sub:"antipsychotic last resort"},
    {lbl:"Avoid", val:"Anticholinergics", sub:"worsen cognition"},
    {lbl:"Always", val:"Carer support", sub:"+ advance care planning"}
  ],
  flow:[
    {t:"node", d:"found", n:"1", tag:"Foundation", title:"Subtype, severity and the whole person",
      blocks:[
        {b:"kv", rows:[
          ["Subtype","Alzheimer\u2019s, vascular, mixed, dementia with Lewy bodies, frontotemporal \u2014 changes drug choice &amp; cautions"],
          ["Severity & function","Cognition, ADLs, behavioural/psychological symptoms (BPSD), risk"],
          ["Capacity & planning","Mental capacity, LPA, advance care planning, DVLA notification"],
          ["Reversible contributors","Sensory impairment, pain, depression, delirium, polypharmacy (anticholinergics)"]
        ]},
        {b:"why", html:"Subtype drives safe prescribing \u2014 cholinesterase inhibitors help Alzheimer\u2019s and Lewy-body dementia but antipsychotics are dangerous in Lewy-body disease. Beyond drugs, dementia care is mostly <strong>support, planning and treating the things that make cognition worse</strong> (pain, sensory loss, anticholinergic load), where the largest quality-of-life gains lie."}
      ]},
    {t:"node", d:"life", n:"2", tag:"Non-drug \u00b7 foundation of care", title:"Support, stimulation and carers",
      blocks:[
        {b:"tiles", v:"life", items:[
          {t:"🧩 Cognitive stimulation", html:"Group cognitive stimulation therapy for mild\u2013moderate dementia; structured activity."},
          {t:"👥 Post-diagnostic support", html:"Named coordinator, written care plan, local services, dementia adviser."},
          {t:"🫂 Carer support", html:"Carer needs assessment, education, respite \u2014 carer wellbeing protects the patient."},
          {t:"📋 Advance care planning", html:"Capacity, LPA, preferences, DNACPR discussions while able to participate."},
          {t:"👓 Optimise the basics", html:"Hearing/vision aids, treat pain, sleep, nutrition, hydration, continence."},
          {t:"🚗 Practicalities", html:"DVLA notification, safeguarding, finances, home safety."}

          {step:"Step 2", title:"Memantine", when:"moderate\u2013severe, or add-on, or AChEi-intolerant",

        {b:"warn", html:"<b>Avoid antipsychotics in dementia with Lewy bodies</b> (severe sensitivity). Minimise <b>anticholinergic burden</b> \u2014 it worsens cognition and opposes AChE inhibitors. Antipsychotics for BPSD raise stroke and death risk \u2014 last resort only."}
      ]},

          ["Review","Time-limited; attempt withdrawal of antipsychotics periodically"]
        ]},
        {b:"why", html:"BPSD is usually communication of an unmet need \u2014 pain, infection or distress \u2014 so the first \u2018treatment\u2019 is a careful search for the cause. Antipsychotics carry a real excess of stroke and death in dementia, which is why they are a last resort, lowest-dose, time-limited measure."}
      ]},
    {t:"node", d:"monitor", n:"5", tag:"Monitoring", title:"Cognition, function and drug effects",
      blocks:[
        {b:"table", head:["What","When","Action"], rows:[
          ["Cognition / function","At reviews","Track decline; reassess goals and support"],
          ["AChE inhibitor tolerability","After starting / titration","GI effects, weight, pulse/bradycardia, syncope"],
          ["BPSD + antipsychotic review","Regularly","Attempt withdrawal; monitor for harm"],
          ["Carer strain","Each review","Reassess carer support and respite needs"]

        ]}
      ]},
    {t:"loop", icon:"🔁", title:"Decline or new distress? Exclude reversible causes",
      arrow:"\u2026with new decline or behavioural change",
      intro:"A sudden change is delirium until proven otherwise \u2014 not just \u2018the dementia getting worse\u2019.",
      checks:[
        {b:"1 \u00b7 Delirium", html:"Acute change \u2192 screen for infection (esp. urine/chest), constipation, dehydration, new drug."},
        {b:"2 \u00b7 Pain", html:"Unrecognised pain is a leading cause of agitation \u2014 assess and treat."},
        {b:"3 \u00b7 Anticholinergics", html:"Review and reduce anticholinergic burden."},
        {b:"4 \u00b7 Mood / sensory", html:"Treat depression; optimise hearing/vision."},
        {b:"5 \u00b7 Specialist", html:"Severe/refractory BPSD or diagnostic doubt \u2192 old-age psychiatry / memory service."}
      ],
      back:"Delirium + reversible causes excluded \u2192 specialist (memory service / old-age psychiatry)"},
    {t:"node", d:"safety", n:"7", tag:"Safety-net", title:"Safety-netting",
      blocks:[
        {b:"tiles", v:"safety", items:[

          {t:"🛡️ Safeguarding", html:"\u201cConcerns about safety, neglect, finances, or driving \u2014 raise them with us; we can help.\u201d"},
          {t:"💊 Antipsychotic risks", html:"\u201cIf an antipsychotic is used, it\u2019s short-term and reviewed \u2014 tell us about drowsiness, falls or stiffness.\u201d"},
          {t:"🫂 Carer", html:"\u201cIf you\u2019re struggling as a carer, tell us early \u2014 support and respite are available.\u201d"}
        ]}
      ]},
    {t:"node", d:"refer", n:"8", tag:"Refer to secondary care", title:"When to refer",
      arrow:"shared care with memory / old-age psychiatry",
      blocks:[
        {b:"tiles", v:"refer", items:[
          {t:"Diagnosis / subtype", html:"Memory assessment service for diagnosis, subtyping and cognitive-enhancer initiation."},
          {t:"Severe BPSD", html:"Distress or risk refractory to non-drug measures \u2192 old-age psychiatry."},
          {t:"Rapid / young-onset", html:"Rapid decline, young-onset, or atypical features \u2014 neurology/specialist."},
          {t:"Complex", html:"Capacity disputes, complex safeguarding, or palliative needs."}
        ]},
        {b:"say", html:"Much of the help in dementia is support, planning ahead, and treating things that make memory worse \u2014 like pain or infection. We\u2019ll work with the memory team, and I want to make sure you as the carer are supported too."}
      ]}
  ]
});
</script>
