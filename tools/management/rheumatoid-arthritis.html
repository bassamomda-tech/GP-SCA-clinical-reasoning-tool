  stemSub:"Primary-care recognition &amp; shared care of rheumatoid arthritis \u2014 refer suspected persistent inflammatory polyarthritis urgently (do not wait for a positive rheumatoid factor), support early DMARD therapy, monitor shared-care drugs &amp; toxicity, and manage flares, cardiovascular risk &amp; the at-risk patient. NICE NG100 \u00b7 2026.",
  guideline:"NICE NG100",
  glance:[
    {lbl:"Pattern", val:"Symmetrical small-joint", sub:"MCPs/PIPs/wrists; sparing DIPs"},
    {lbl:"Key clue", val:"Early-morning stiffness &gt;30\u201360 min", sub:"+ joint swelling"},
    {lbl:"Refer", val:"Urgently on suspicion", sub:"don\u2019t wait for RF/anti-CCP"},
    {lbl:"Treat-to-target", val:"Early DMARD (methotrexate)", sub:"\u00b1 short-term steroid bridge"},
    {lbl:"Monitor", val:"Shared-care bloods (FBC/LFT/U&amp;E)", sub:"methotrexate toxicity"},
    {lbl:"Don\u2019t miss", val:"Septic joint · cervical myelopathy · CV risk", sub:""}
  ],
  flow:[
    {t:"node", d:"safety", n:"1", tag:"Safety-net", title:"Refer early; spot the dangers",
      blocks:[
        {b:"tiles", v:"safety", items:[
          {t:"⏱️ Refer early \u2014 the \u2018window of opportunity\u2019", html:"Suspected RA (persistent swelling of small joints, esp. with early-morning stiffness) \u2192 <b>urgent rheumatology referral</b>. A NEGATIVE rheumatoid factor does NOT exclude RA \u2014 do not let it delay referral. Early DMARDs prevent irreversible joint damage."},
          {t:"🔴 Septic arthritis", html:"A single hot, acutely swollen, very painful joint (esp. on immunosuppression/biologics) \u2192 <b>same-day</b> \u2014 a flare can mask sepsis; aspirate/admit."},
          {t:"🔴 Cervical myelopathy", html:"Atlanto-axial subluxation \u2014 neck pain, arm/leg weakness, gait/sphincter change, or before any GA \u2192 urgent assessment/imaging."},
          {t:"🔴 Neutropenic sepsis (DMARD/biologic)", html:"Fever/unwell on methotrexate/biologic \u2192 urgent FBC; withhold the drug; treat as sepsis if neutropenic."}
        ]},
        {b:"why", html:"The single biggest determinant of long-term outcome in RA is how quickly disease-modifying treatment is started. The GP\u2019s job is to recognise inflammatory (not mechanical) joint disease and refer urgently \u2014 before, not after, waiting for serology or X-rays."}
      ]},
    {t:"node", d:"found", n:"2", tag:"Foundation", title:"Inflammatory vs mechanical",
      blocks:[
        {b:"kv", rows:[
          ["Inflammatory (RA)","Symmetrical, small-joint (MCP/PIP/wrist) swelling; <b>early-morning stiffness &gt;30\u201360 min</b> easing with activity; pain better with use; \u00b1 systemic (fatigue, malaise)"],
          ["Examination","Synovitis (boggy swelling/tenderness), positive MCP/MTP squeeze; later deformities (ulnar deviation, swan-neck, boutonni\u00e8re); rheumatoid nodules"],
          ["Bloods","RF &amp; anti-CCP (anti-CCP more specific; both may be negative \u2014 seronegative RA exists), ESR/CRP, FBC, LFT/U&amp;E baseline; X-rays (early erosions) \u2014 do NOT delay referral for these"],
          ["Extra-articular","Eyes (dry/scleritis), lungs (ILD), nodules, anaemia, raised CV risk; consider in the whole-patient review"]

      ]},
    {t:"node", d:"life", n:"3", tag:"Non-drug · every patient", title:"Non-drug pillars", blocks:[{b:"tiles", v:"life", items:[{t:"\ud83c\udfc3 Exercise & physio", html:"Regular aerobic + strengthening exercise and physiotherapy maintain function and reduce pain/stiffness; OT for joint protection and aids."},{t:"\ud83d\udead Stop smoking", html:"Smoking worsens RA activity and reduces response to DMARDs/biologics \u2014 offer cessation support."},{t:"\u2696\ufe0f Weight & diet", html:"Weight optimisation reduces joint load and cardiovascular risk; address the raised CVD risk inherent to RA."},{t:"\ud83d\udc9b Vaccination", html:"Ensure annual flu, pneumococcal and COVID vaccines before/at immunosuppression; avoid live vaccines on biologics."}]},{b:"why", html:"Drugs control the inflammation, but exercise, smoking cessation, weight and vaccination determine long-term function and safety on immunosuppression \u2014 they are part of every RA plan, not an afterthought."}]},
    {t:"node", d:"drug", n:"4", tag:"Management", title:"Treat-to-target &amp; shared care",
      blocks:[
        {b:"ladder", steps:[
          {step:"Step 1", title:"Early DMARD (specialist-initiated)", when:"treat-to-target",

          {step:"Step 2", title:"Bridging &amp; flares", when:"symptom control",
           fromLabel:"adjuncts",
           html:"<b>Short-term corticosteroid</b> (oral/IM/intra-articular) to bridge while DMARDs take effect or to treat flares; <b>NSAID</b> (lowest dose/shortest time, with gastroprotection) for symptoms."},
          {step:"Step 3", title:"Escalation (specialist)", when:"inadequate response",

          {step:"Step 4", title:"Whole-patient care", when:"ongoing GP role",
           fromLabel:"holistic",
           html:"Manage <b>cardiovascular risk</b> (RA raises it), bone health/osteoporosis (steroids), vaccinations (annual flu, pneumococcal, avoid live vaccines on immunosuppression), physiotherapy/OT, smoking cessation, mood &amp; fatigue."}
        ]},
        {b:"warn", html:"Methotrexate is <b>weekly, not daily</b> \u2014 daily dosing is a serious, potentially fatal error. Monitor shared-care bloods; withhold DMARDs in significant infection; check interactions (e.g. trimethoprim + methotrexate \u2192 marrow suppression)."}
      ]},
    {t:"node", d:"monitor", n:"5", tag:"Follow-up", title:"Shared-care monitoring",
      blocks:[
        {b:"timeline", items:[

          {n:"3", when:"Flare / unwell", title:"Manage promptly", html:"Treat flares (steroid), exclude sepsis, liaise with rheumatology; withhold DMARD if infection/neutropenia."}

      ]},
    {t:"node", d:"refer", n:"6", tag:"Refer", title:"Referral",

          {t:"Specialist services", html:"Poorly controlled disease, biologic decisions, extra-articular complications (ILD, scleritis)."},
          {t:"MDT", html:"Physiotherapy, occupational therapy, podiatry, specialist nurse, psychology for fatigue/mood."}
        ]},

      ]}

});
