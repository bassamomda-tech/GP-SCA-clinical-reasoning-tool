MG.render({"icon":"🍄","title":"Fungal Skin Infection","guideline":"NICE CKS","stemTitle":"Dermatophyte (tinea) infections — topical first, oral for scalp/nails/extensive","stemSub":"Primary-care management of fungal skin infections (tinea/ringworm) — confirm clinically (sample if doubt), treat localised disease topically and scalp/nail/extensive disease with oral antifungals, and avoid the topical-steroid trap (tinea incognito). NICE CKS · 2026.","glance":[{"lbl":"Body/foot/groin","val":"Topical antifungal","sub":"imidazole/terbinafine"},{"lbl":"Scalp (tinea capitis)","val":"ORAL antifungal","sub":"+ sample; topical alone fails"},{"lbl":"Nails","val":"Confirm + oral terbinafine","sub":"if confirmed/symptomatic"},{"lbl":"Sample","val":"Skin scraping/nail clipping/hair","sub":"if scalp/nail/doubt"},{"lbl":"Avoid","val":"Topical steroid alone","sub":"tinea incognito"},{"lbl":"Note","val":"Treat foot + source","sub":"prevent recurrence"}],"flow":[{"t":"node","d":"found","n":"1","tag":"Foundation","title":"Diagnose + sample when needed","blocks":[{"b":"kv","rows":[["Tinea corporis/cruris/pedis","Annular, scaly, raised advancing edge with central clearing; itchy; athlete’s foot = scaling/maceration between toes"],["Tinea capitis","Scaly patches + hair loss/broken hairs ± kerion (boggy mass) — mainly children; <b>needs oral therapy</b>"],["Onychomycosis","Thickened, discoloured, crumbly nails — confirm before oral treatment"],["Sample","Send skin scrapings/nail clippings/hair for mycology before oral antifungals (scalp/nail) or if diagnosis uncertain"]]},{"b":"why","html":"Most tinea is treated topically, but scalp and nail infections require oral antifungals (topical fails), so confirm these with mycology first. The classic trap is ‘tinea incognito’ — a topical steroid mistakenly applied alters the appearance and worsens the infection."}]},{"t":"node","d":"drug","n":"2","tag":"Treatment","title":"By site","blocks":[{"b":"ladder","steps":[{"step":"Body/groin/foot","title":"Topical antifungal","when":"localised","html":"<b>Terbinafine 1% cream once–twice daily for 1–2 weeks</b>, or an <b>imidazole (clotrimazole 1% 2–3 times daily) for 2–4 weeks</b> (continue 1–2 weeks after clearance; tinea pedis up to 4–6 weeks). Add mild hydrocortisone 1% short-term only if very inflamed (combined preparation), not steroid alone."},{"step":"Scalp","title":"Oral antifungal","when":"tinea capitis","fromLabel":"scalp — oral required","html":"<b>Oral terbinafine 250 mg once daily</b> (Trichophyton) or <b>griseofulvin</b> (preferred for Microsporum; ~10 mg/kg/day) for 4–6 weeks after mycology; antifungal shampoo (ketoconazole/selenium) as adjunct to reduce spread; treat household/check pets."},{"step":"Nails","title":"Oral terbinafine","when":"confirmed/symptomatic","fromLabel":"onychomycosis","html":"<b>Oral terbinafine 250 mg once daily</b> — fingernails ~6 weeks, toenails ~3–6 months — after positive mycology; <b>amorolfine 5% nail lacquer</b> 1–2×/week for mild/limited disease or if oral unsuitable. Baseline LFTs per guidance."},{"step":"Extensive/refractory","title":"Oral antifungal","when":"widespread","fromLabel":"if extensive","html":"<b>Oral terbinafine 250 mg OD</b> or <b>itraconazole 100 mg OD</b> for extensive or topical-resistant tinea corporis."}]},{"b":"warn","html":"Never treat a suspected fungal rash with a topical steroid alone — ‘tinea incognito’ spreads and loses its typical features. Treat athlete’s foot as a reservoir to prevent recurrent groin/body tinea."}]},{"t":"node","d":"life","n":"3","tag":"Advice","title":"Prevent recurrence","blocks":[{"b":"tiles","v":"life","items":[{"t":"🦶 Foot care","html":"Dry between toes, breathable footwear, antifungal powder; treat athlete’s foot (common source)."},{"t":"🧺 Hygiene","html":"Don’t share towels; wash bedding/clothing; avoid scratching/spreading."},{"t":"🐈 Source","html":"Tinea capitis — check household contacts and pets (kittens/guinea pigs)."},{"t":"⏳ Complete course","html":"Continue topical after clearance; complete oral courses."}]}]},{"t":"node","d":"follow","n":"4","tag":"Follow-up","title":"Review, duration & recurrence","blocks":[{"b":"timeline","items":[{"n":"1","when":"Complete the course","title":"Treat for long enough","html":"Continue topical antifungal for <b>1–2 weeks after clearance</b>. Tinea pedis ~4 weeks; tinea corporis/cruris 2–4 weeks. Nail/scalp infection needs <b>oral</b> terbinafine/itraconazole for weeks–months — confirm by sampling first."},{"n":"2","when":"Not improving","title":"Reconsider","html":"If no better after an adequate course: confirm with skin scrapings/nail clippings, check adherence, and reconsider the diagnosis (eczema, psoriasis, erythrasma). 'Tinea incognito' if a steroid was used."},{"n":"3","when":"Prevent recurrence","title":"Source control","html":"Treat all affected sites together (e.g. feet + groin), keep skin dry, treat footwear, and manage predisposing factors (diabetes, immunosuppression)."}]},{"b":"say","html":"Keep using the cream for a week or two after it looks better, or it tends to come back. If it's a nail or the scalp, we'll need tablets and a sample first."}]},{"t":"node","d":"safety","n":"5","tag":"Safety-net","title":"When it's not simple tinea","blocks":[{"b":"tiles","v":"safety","items":[{"t":"🟠 Extensive / immunocompromised","html":"Widespread infection, diabetes or immunosuppression → lower threshold for oral therapy and review."},{"t":"🟠 Tinea incognito","html":"Previously steroid-treated, atypical or worsening rash → stop steroid, sample, reassess."},{"t":"💬 Safety-net","html":"If it spreads, blisters, becomes weepy (secondary infection) or doesn't improve after a full course, come back."}]}]},{"t":"node","d":"refer","n":"6","tag":"Refer","title":"Referral","blocks":[{"b":"tiles","v":"refer","items":[{"t":"Dermatology","html":"Diagnostic uncertainty, extensive/refractory disease, kerion, or scalp/nail treatment failure."},{"t":"Mycology","html":"Sample scalp/nail before oral therapy and if diagnosis unclear."},{"t":"Manage in primary care","html":"Typical localised tinea responding to topical therapy."}]},{"b":"say","html":"This is a fungal skin infection — ringworm. On the body or feet, an antifungal cream for a few weeks clears it. On the scalp or nails, creams don’t work, so we take a sample and use antifungal tablets. Don’t use a steroid cream alone, as it makes fungal rashes worse. Treating athlete’s foot helps stop it coming back."}]}],"foot":"Management of dermatophyte skin infections in primary care; scalp and nail disease need confirmed-diagnosis oral therapy. Verify against current NICE CKS (Fungal skin/scalp/nail infection)."});
</script>
