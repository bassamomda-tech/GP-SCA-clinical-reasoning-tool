MG.render({"icon":"🦠","title":"Gonorrhoea","guideline":"BASHH","stemTitle":"Gonorrhoea — refer to GUM for ceftriaxone + culture","stemSub":"Primary-care management of gonorrhoea — diagnose by NAAT, but refer to sexual health for culture/sensitivities and IM ceftriaxone because of antimicrobial resistance, ensure partner notification and test of cure, and recognise disseminated and neonatal disease. BASHH · CKS · 2026.","glance":[{"lbl":"Test","val":"NAAT (+ culture)","sub":"culture before treatment"},{"lbl":"1st-line","val":"Ceftriaxone 1 g IM","sub":"single dose"},{"lbl":"Refer","val":"GUM / sexual health","sub":"resistance → culture"},{"lbl":"Always","val":"Test of cure","sub":"+ partner notification"},{"lbl":"Co-treat?","val":"Per chlamydia result","sub":"often co-infected"},{"lbl":"Red flag","val":"DGI / neonatal / PID","sub":"= urgent"}],"flow":[{"t":"node","d":"safety","n":"1","tag":"Safety-net","title":"Serious presentations","blocks":[{"b":"tiles","v":"safety","items":[{"t":"🔴 Disseminated GC","html":"Fever, migratory polyarthralgia, tenosynovitis, pustular rash, septic arthritis → urgent referral/admission."},{"t":"🔴 Neonatal/ophthalmia","html":"Gonococcal conjunctivitis in neonate (or adult hyperacute purulent conjunctivitis) → same-day ophthalmology/specialist — sight-threatening."},{"t":"🟠 PID / epididymo-orchitis","html":"Treat early to protect fertility; exclude testicular torsion in acute scrotal pain."},{"t":"🦠 Resistance","html":"Rising cephalosporin/azithromycin resistance — hence culture + sensitivities and GUM-led treatment."}]},{"b":"why","html":"Gonorrhoea management is dominated by antimicrobial resistance: a culture with sensitivities should be taken before treatment, and treatment (IM ceftriaxone) plus follow-up is best delivered through sexual-health services with test of cure."}]},{"t":"node","d":"found","n":"2","tag":"Foundation","title":"Diagnose","blocks":[{"b":"kv","rows":[["Symptoms","Men: urethral discharge + dysuria. Women: often asymptomatic, or discharge/IMB/pelvic pain. Also rectal/pharyngeal (often asymptomatic)"],["Test","NAAT (vulvovaginal swab / first-void urine / rectal / pharyngeal); <b>culture + sensitivities</b> before treatment where possible (resistance)"],["Co-infection","Test for chlamydia, HIV, syphilis"],["Refer","Sexual health for culture-guided treatment, partner notification, test of cure"]]}]},{"t":"node","d":"life","n":"3","tag":"Non-drug · prevention","title":"Safer sex & prevention","blocks":[{"b":"tiles","v":"life","items":[{"t":"🚫 Abstain","html":"No sex until 7 days after both patient and partner(s) treated and symptom-free."},{"t":"🧴 Condoms","html":"Consistent condom use reduces reinfection and onward transmission; discuss PrEP eligibility if at HIV risk."},{"t":"🔁 Screening","html":"Offer regular STI screening for those at ongoing risk; reinforce partner notification."}]},{"b":"why","html":"With rising resistance, preventing reinfection matters as much as treatment — abstinence during the treatment window, condoms and partner treatment are central."}]},{"t":"node","d":"drug","n":"4","tag":"Medication","title":"Treatment","blocks":[{"b":"ladder","steps":[{"step":"1st-line","title":"Ceftriaxone 1 g IM single dose","when":"empirical / per sensitivities","html":"Given after culture taken; if sensitivities known and susceptible, <b>ciprofloxacin 500 mg single dose</b> may be used. GUM-led."},{"step":"Always","title":"Test of cure","when":"all cases","fromLabel":"confirm clearance","html":"Test of cure for ALL gonorrhoea (NAAT ± culture) at ~2 weeks — because of resistance."},{"step":"Always","title":"Partner notification + abstain","when":"all cases","fromLabel":"prevent reinfection","html":"Notify + treat partners; abstain until treated and 7 days after, and symptoms resolved."}]},{"b":"warn","html":"Do not treat gonorrhoea casually in primary care without culture and sexual-health involvement — resistance and the need for test of cure make GUM the appropriate setting."}]},{"t":"node","d":"follow","n":"5","tag":"Follow-up · essential","title":"Test of cure & partner notification","blocks":[{"b":"timeline","items":[{"n":"1","when":"Always — test of cure","title":"Repeat NAAT at 2 weeks","html":"A <b>test of cure is mandatory in gonorrhoea</b> (rising resistance) — repeat NAAT at <b>2 weeks</b> after treatment (culture earlier if persistent symptoms). Confirms eradication."},{"n":"2","when":"Partner notification","title":"Trace & treat contacts","html":"Notify and treat partners (look-back: 2 weeks for symptomatic men, 3 months otherwise). Advise <b>abstinence for 7 days</b> after both partners treated and symptoms resolved."},{"n":"3","when":"Always offer","title":"Full STI screen","html":"Test for chlamydia, HIV and syphilis; offer hepatitis B vaccination; document partner notification outcome."}]},{"b":"say","html":"Because gonorrhoea is getting harder to treat, I want you back in two weeks for a repeat swab to be sure it's gone — and your recent partners need testing and treating too."}]},{"t":"node","d":"refer","n":"6","tag":"Refer","title":"Referral","blocks":[{"b":"tiles","v":"refer","items":[{"t":"GUM / sexual health","html":"All cases — culture, <b>ceftriaxone 1 g IM single dose</b>, partner notification, test of cure."},{"t":"Urgent","html":"Disseminated gonococcal infection, ophthalmia neonatorum, PID."},{"t":"Obstetrics/paediatrics","html":"Pregnancy / neonatal exposure."}]},{"b":"say","html":"Gonorrhoea is a bacterial infection treated with a single antibiotic injection — but because the bug is becoming resistant, the sexual-health clinic takes a sample first to pick the right antibiotic, and you’ll have a follow-up test to confirm it’s gone. Recent partners need testing and treatment too."}]}],"foot":"Management of gonorrhoea in primary care, with sexual-health (GUM) leading culture-guided treatment and test of cure due to antimicrobial resistance. Verify against current BASHH guidance."});
