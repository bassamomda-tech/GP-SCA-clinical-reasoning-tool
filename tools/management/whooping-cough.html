MG.render({"icon":"🦠","title":"Whooping Cough (Pertussis)","guideline":"UKHSA / NICE CKS","stemTitle":"Pertussis — notify, treat early, protect infants","stemSub":"Primary-care management of whooping cough — recognise the paroxysmal cough, notify UKHSA, give a macrolide if within the infectious window, provide post-exposure prophylaxis to vulnerable contacts, and protect infants through maternal vaccination. UKHSA · NICE CKS · 2026.","glance":[{"lbl":"Notify","val":"UKHSA — urgently","sub":"notifiable disease"},{"lbl":"Antibiotic","val":"Macrolide","sub":"if cough ≤21 days (or vulnerable)"},{"lbl":"Infants","val":"High risk","sub":"apnoea → admit"},{"lbl":"Contacts","val":"PHE-led prophylaxis","sub":"vulnerable groups"},{"lbl":"Prevent","val":"Maternal + infant vaccine","sub":"key"},{"lbl":"Red flag","val":"Apnoea/cyanosis/seizure (infant)","sub":"= 999"}],"flow":[{"t":"node","d":"safety","n":"1","tag":"Safety-net","title":"Protect the infant","blocks":[{"b":"tiles","v":"safety","items":[{"t":"🔴 Young infant","html":"Babies (esp. &lt;6 months) → apnoea, cyanosis, poor feeding, seizures, severe paroxysms → 999/admit — pertussis is most dangerous and can be fatal in infants."},{"t":"🔴 Complications","html":"Pneumonia, dehydration, seizures, rib fracture/syncope from coughing → assess/admit as needed."},{"t":"🤰 Pregnancy contact","html":"Protect via maternal vaccination; manage exposure of late-pregnancy women + neonates."},{"t":"📋 Notify","html":"Suspected pertussis is notifiable — inform UKHSA promptly (they coordinate contact prophylaxis)."}]},{"b":"why","html":"Whooping cough is usually a prolonged nuisance cough in adults/older children but is life-threatening in young infants (apnoea). The priorities are protecting infants, early macrolide within the infectious window, notification, and prevention through maternal/infant vaccination."}]},{"t":"node","d":"found","n":"2","tag":"Foundation","title":"Recognise + confirm","blocks":[{"b":"kv","rows":[["Phases","Catarrhal (coryza) → paroxysmal (bouts of coughing ± inspiratory ‘whoop’, post-tussive vomiting, worse at night) → convalescent (cough lingers weeks — ‘100-day cough’)"],["Adults/vaccinated","Often atypical — just a persistent troublesome cough; consider in any prolonged cough"],["Confirm","Per timing: PCR/culture (per-nasal swab) early; <b>anti-pertussis toxin serology/oral fluid</b> if cough &gt;2 weeks; per UKHSA testing pathway"],["Assess","Age, infectious duration, contacts (infants/pregnant), vaccination status, complications"]]}]},{"t":"node","d":"drug","n":"3","tag":"Treatment","title":"Macrolide + supportive","blocks":[{"b":"ladder","steps":[{"step":"Step 1","title":"Macrolide antibiotic","when":"if within ~21 days of cough onset (or vulnerable/contact of vulnerable)","html":"<b>Clarithromycin 500 mg BD for 7 days</b> or <b>azithromycin 500 mg on day 1 then 250 mg OD</b> (<b>erythromycin 500 mg QDS</b> in pregnancy); <b>reduces infectivity</b> more than altering the clinical course if given late. Not useful for the cough itself once paroxysmal phase established beyond the window."},{"step":"Step 2","title":"Supportive care","when":"all","fromLabel":"symptom care","html":"Rest, fluids, antipyretics; cough is self-limiting but prolonged; counsel on the long convalescence; avoid contact with infants/pregnant women until non-infectious."},{"step":"Step 3","title":"Exclusion","when":"public health","fromLabel":"limit spread","html":"Stay off school/work until 48 hours of appropriate antibiotics completed, or 21 days from cough onset if untreated."}]},{"b":"warn","html":"Antibiotics given outside the infectious window do not shorten the cough — their main role is reducing transmission. Prioritise protecting infants and vulnerable contacts."}]},{"t":"node","d":"life","n":"4","tag":"Prevention + contacts","title":"Vaccination + PEP","blocks":[{"b":"tiles","v":"life","items":[{"t":"🤰 Maternal vaccine","html":"Pertussis vaccination in pregnancy (from ~16–32 weeks) protects the newborn — the single most important preventive measure."},{"t":"💉 Infant schedule","html":"Routine childhood immunisation — ensure up to date."},{"t":"🛡️ Contact prophylaxis","html":"UKHSA-directed antibiotic prophylaxis ± vaccination for vulnerable contacts (young infants, late pregnancy, those in contact with them)."},{"t":"📋 Notify","html":"Notify UKHSA — they coordinate the contact response."}]},{"b":"say","html":"This is whooping cough. In adults it’s mainly a long, exhausting cough that can linger for weeks. If we’re early enough, an antibiotic mainly reduces how infectious you are. The big concern is young babies, so please keep away from infants and pregnant women until you’re no longer infectious — and it’s a condition we must report to public health."}]},{"t":"node","d":"follow","n":"5","tag":"Follow-up","title":"Public health & course","blocks":[{"b":"timeline","items":[{"n":"1","when":"Notify","title":"Statutory notification","html":"Whooping cough is a <b>notifiable disease</b> — notify public health (UKHSA). Antibiotics (macrolide) mainly reduce infectivity if given <b>within 21 days of cough onset</b>; offer to close/vulnerable contacts per local guidance."},{"n":"2","when":"Exclusion","title":"Stay away","html":"Exclude from school/work until <b>48 h of appropriate antibiotics</b> (or 21 days from onset if untreated). Reinforce hand/respiratory hygiene."},{"n":"3","when":"Expectation & prevention","title":"Long cough; vaccinate","html":"Warn the cough can last weeks–months ('100-day cough'). Reinforce routine and <b>pertussis vaccination in pregnancy</b> (protects the newborn). Watch infants for apnoea/cyanosis → admit."}]},{"b":"say","html":"This needs reporting to public health, and antibiotics mainly stop you passing it on if started early. The cough itself can linger for weeks — and the pregnancy vaccine is what protects newborn babies."}]},{"t":"node","d":"refer","n":"6","tag":"Refer","title":"When to refer / admit","blocks":[{"b":"tiles","v":"refer","items":[{"t":"🔴 Infant / severe","html":"Infants under 6 months, apnoea, cyanosis, feeding difficulty or respiratory distress → admit urgently."},{"t":"🟠 Complications","html":"Pneumonia, seizures, or significant dehydration → admit / paediatric assessment."},{"t":"📋 Public health","html":"Notify UKHSA; liaise on contact prophylaxis for vulnerable/close contacts."}]}]}],"foot":"Management of pertussis in primary care — a notifiable disease; protect infants and vulnerable contacts; prevention via maternal/infant vaccination. Verify against current UKHSA pertussis guidance and NICE CKS."});
