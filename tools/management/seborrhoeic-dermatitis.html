MG.render({"icon":"🧴","title":"Seborrhoeic Dermatitis","guideline":"NICE CKS","stemTitle":"Seborrhoeic dermatitis — antifungal + anti-inflammatory, control not cure","stemSub":"Primary-care management of seborrhoeic dermatitis — a chronic relapsing scaly eruption of sebaceous areas linked to Malassezia; treat with antifungal shampoos/creams and short anti-inflammatory courses, manage scalp/face/body sites, and consider HIV in severe disease. NICE CKS · 2026.","glance":[{"lbl":"Cause","val":"Malassezia yeast","sub":"+ host response"},{"lbl":"Scalp","val":"Antifungal/keratolytic shampoo","sub":"ketoconazole/selenium/coal tar"},{"lbl":"Face/body","val":"Topical antifungal","sub":"± short mild steroid"},{"lbl":"Nature","val":"Chronic, relapsing","sub":"maintenance therapy"},{"lbl":"Infant","val":"‘Cradle cap’","sub":"emollient/soft brush"},{"lbl":"Severe/refractory","val":"Consider HIV / Parkinson’s","sub":"+ refer"}],"flow":[{"t":"node","d":"found","n":"1","tag":"Foundation","title":"Recognise by site","blocks":[{"b":"kv","rows":[["Distribution","Greasy yellowish scale + erythema in sebaceous areas: scalp (dandruff), eyebrows, nasolabial folds, ears, central chest; may itch"],["Adults","Chronic relapsing; flares with stress, cold weather, illness"],["Infants","Cradle cap (scalp), napkin area — usually self-limiting"],["Consider underlying","Severe/refractory/extensive disease → consider <b>HIV</b>; association with Parkinson’s disease and neuroleptics"]]},{"b":"why","html":"Seborrhoeic dermatitis is a clinical diagnosis from the greasy scale in sebaceous sites. It’s benign and chronic, but unusually severe or treatment-resistant disease is a recognised clue to immunosuppression (HIV) or neurological disease."}]},{"t":"node","d":"life","n":"2","tag":"Non-drug · skin care","title":"Skin & scalp care","blocks":[{"b":"tiles","v":"life","items":[{"t":"🧴 Regular antifungal wash","html":"Use antifungal shampoo (e.g. ketoconazole) regularly as washing routine, leaving on a few minutes."},{"t":"🧼 Gentle cleansing","html":"Soap substitute on the face; avoid harsh products that flare it."},{"t":"☀️ Triggers","html":"Stress, fatigue and cold/dry weather flare it; manage where possible. Infant cradle cap: emollient + soft brushing."}]},{"b":"why","html":"Seborrhoeic dermatitis is a long-term, relapsing condition — a regular antifungal washing routine and gentle skin care keep it controlled and reduce reliance on steroids."}]},{"t":"node","d":"drug","n":"3","tag":"Treatment","title":"By site","blocks":[{"b":"ladder","steps":[{"step":"Scalp","title":"Antifungal / keratolytic shampoo","when":"first-line","html":"Ketoconazole 2% shampoo (leave on a few minutes) regularly then for maintenance; selenium sulfide, zinc pyrithione, or coal tar alternatives; descaling agent if thick scale. Short potent topical steroid scalp application for itchy/inflamed flares."},{"step":"Face / body","title":"Topical antifungal ± mild steroid","when":"flares","fromLabel":"facial/flexural","html":"Topical antifungal (e.g. ketoconazole cream); add a short course of <b>mild topical corticosteroid (hydrocortisone 1%)</b> (or topical calcineurin inhibitor on the face) for inflammation — avoid prolonged facial steroids."},{"step":"Maintenance","title":"Intermittent antifungal","when":"prevent relapse","fromLabel":"ongoing","html":"Regular antifungal shampoo/cream (e.g. 1–2×/week) to keep it under control — it recurs if stopped."},{"step":"Infant","title":"Cradle cap care","when":"babies","fromLabel":"infantile","html":"Soften scale with emollient/baby oil, gentle brushing, wash; usually self-limiting; mild antifungal/hydrocortisone if needed."}]},{"b":"warn","html":"Counsel that it is controlled, not cured — maintenance therapy prevents relapse. Limit potent/facial steroid duration."}]},{"t":"node","d":"follow","n":"4","tag":"Follow-up","title":"Maintenance & relapse","blocks":[{"b":"timeline","items":[{"n":"1","when":"2–4 weeks","title":"Assess response","html":"Review scalp (antifungal shampoo, e.g. ketoconazole) and facial/flexural disease (topical antifungal ± short mild steroid). Expect improvement but a relapsing-remitting course."},{"n":"2","when":"Ongoing","title":"Maintenance","html":"Use antifungal shampoo/cream <b>intermittently (e.g. weekly) to maintain control</b>; minimise topical steroid use. Infantile cradle cap is self-limiting (emollient/soft brushing)."},{"n":"3","when":"Severe / atypical","title":"Reconsider","html":"Severe, treatment-resistant or very extensive disease → consider HIV and refer to dermatology; reconsider psoriasis."}]},{"b":"say","html":"This tends to come and go, so the aim is to keep it under control with an antifungal wash used regularly rather than to cure it once. Use steroid creams only sparingly."}]},{"t":"node","d":"safety","n":"5","tag":"Safety-net","title":"When to look harder","blocks":[{"b":"tiles","v":"safety","items":[{"t":"🟠 Severe / resistant","html":"Severe, widespread or treatment-resistant disease → consider underlying immunosuppression (HIV) and refer to dermatology."},{"t":"🟠 Diagnostic doubt","html":"Atypical distribution → reconsider psoriasis, tinea, rosacea, or (in infants) atopic eczema."},{"t":"💬 Safety-net","html":"If it spreads fast, doesn't respond, or you have other unexplained symptoms, let us know."}]}]},{"t":"node","d":"refer","n":"6","tag":"Refer","title":"Referral","blocks":[{"b":"tiles","v":"refer","items":[{"t":"Dermatology","html":"Diagnostic uncertainty, severe/refractory disease, or to confirm if extensive."},{"t":"HIV testing","html":"Severe, sudden, or treatment-resistant seborrhoeic dermatitis — offer an HIV test."},{"t":"Manage in primary care","html":"Typical disease responding to antifungal + intermittent maintenance."}]},{"b":"say","html":"This is seborrhoeic dermatitis — a common, harmless scaly rash in the oilier areas like the scalp and around the nose, driven by a normal skin yeast. It tends to come and go. Anti-yeast shampoos and creams control it well, with a short anti-inflammatory cream for flares, but you’ll need to keep using a treatment now and then to keep it away."}]}],"foot":"Management of seborrhoeic dermatitis in primary care — chronic/relapsing, controlled with antifungal ± anti-inflammatory therapy; consider HIV in severe disease. Verify against current NICE CKS."});
</script>
