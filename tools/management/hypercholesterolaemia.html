<body data-screen-label="Hypercholesterolaemia management card">
<div class="mg-wrap" id="mgRoot"></div>
<script src="../../assets/management-engine.js"></script>
<script>
MG.render({
  icon:"🩸",
  title:"Hypercholesterolaemia",
  stemTitle:"High cholesterol — ongoing lipid management",
  stemSub:"Primary-care lipid management once the decision to treat is made \u2014 the statin ladder, the \u226540% non-HDL goal, add-on agents, monitoring and statin-intolerance handling \u2014 across primary prevention, secondary prevention and familial hypercholesterolaemia. NICE NG238 \u00b7 CKS 2026.",
  guideline:"NICE NG238",
  glance:[
    {lbl:"Primary prevention", val:"Atorva 20", sub:"QRISK \u226510%"},
    {lbl:"Secondary prevention", val:"Atorva 80", sub:"established CVD"},
    {lbl:"Goal", val:">40%", sub:"non-HDL reduction"},
    {lbl:"Add-on", val:"Ezetimibe", sub:"if goal not met"},
    {lbl:"Check lipids", val:"3 months", sub:"then annually"},
    {lbl:"FH clue", val:"TC >9 / FH", sub:"refer lipid clinic"}
  ],
  flow:[
    {t:"node", d:"found", n:"1", tag:"Foundation", title:"Define the prevention category",
      blocks:[
        {b:"p", html:"Lipid management is driven by <strong>which category the patient is in</strong>, not the cholesterol number alone. Establish category, take a baseline lipid profile (non-fasting full profile incl. non-HDL), and exclude secondary causes."},
        {b:"table", head:["Category","Trigger","Statin"], rows:[
          ["Primary prevention","QRISK3 \u226510% over 10 years (offer); consider if &lt;10% &amp; concern","<b>Atorvastatin 20 mg</b>"],
          ["Secondary prevention","Established CVD (MI, angina, stroke/TIA, PAD)","<b>Atorvastatin 80 mg</b> (high intensity)"],
          ["CKD","eGFR &lt;60 or ACR \u22653 (primary &amp; secondary)","Atorvastatin 20 mg \u2014 titrate up if eGFR \u226530 &amp; target unmet (eGFR &lt;30: with renal specialist)"],
          ["Type 1 / Type 2 diabetes","Per NICE criteria","Atorvastatin 20 mg (80 mg if established CVD)"],
          ["Familial hypercholesterolaemia","TC &gt;7.5 / LDL high + FH of early CVD","High-intensity statin + <b>refer lipid clinic</b>"]
        ]},
        {b:"kv", rows:[
          ["Baseline tests","Full lipid profile, HbA1c, U&amp;E/eGFR, LFTs (transaminases), TFTs; CK only if muscle symptoms"],
          ["Exclude secondary","Hypothyroidism, excess alcohol, poorly-controlled diabetes, nephrotic syndrome, drugs"],
          ["Special groups","<b>HIV \u226540y:</b> offer a statin \u2014 QRISK3 underestimates risk (mind antiretroviral\u2013statin interactions). <b>\u226585y:</b> don\u2019t calculate risk \u2014 consider atorvastatin 20 mg, taking frailty into account. Severe mental illness, SLE, erectile dysfunction, migraine, or on antipsychotics/steroids \u2014 use <b>QRISK3</b> (QRISK2 underestimates)"]
        ]},
        {b:"why", html:"A statin\u2019s absolute benefit depends on baseline risk, so the same cholesterol earns very different treatment in a 35-year-old vs a post-MI patient. Excluding secondary causes (especially hypothyroidism) first avoids treating a number that will fall once the cause is corrected."}
      ]},
    {t:"node", d:"life", n:"2", tag:"Non-drug \u00b7 every patient", title:"Lifestyle \u2014 the foundation under every statin",
      blocks:[
        {b:"tiles", v:"life", items:[
          {t:"🥗 Mediterranean diet", html:"\u2193 saturated fat, \u2191 oily fish, nuts, fruit/veg, wholegrains; reduce refined sugar."},
          {t:"⚖️ Weight", html:"Weight loss improves the whole lipid profile and CV risk."},
          {t:"🏃 Activity", html:"150 min/week moderate exercise raises HDL, lowers triglycerides."},
          {t:"🍺 Alcohol", html:"Within limits \u2014 excess raises triglycerides."},
          {t:"🚭 Smoking", html:"Cessation \u2014 the largest single CV risk reduction available."},
          {t:"🩺 Other CV risk", html:"Treat BP and diabetes; lipids are one lever among several."}
        ]}
      ]},
    {t:"node", d:"drug", n:"3", tag:"Medication \u00b7 stepwise", title:"The statin ladder + add-ons",
      blocks:[
        {b:"p", html:"Start the category-appropriate statin and <strong>recheck non-HDL at 3 months, aiming for a &gt;40% reduction</strong> from baseline. If not met \u2014 first optimise adherence and dose, then add agents."},
        {b:"ladder", steps:[
          {step:"Step 1", title:"High-intensity statin", when:"atorvastatin 20\u201380 mg",
           html:"Atorvastatin 20 mg (primary) or 80 mg (secondary). Titrate up if &gt;40% non-HDL fall not achieved and tolerated."},
          {step:"Step 2", title:"Add ezetimibe 10 mg", when:"goal not met / max statin reached",
           fromLabel:"&lt;40% non-HDL reduction despite adherence",
           html:"Add to the statin (or use alone if statin truly not tolerated)."},
          {step:"Step 3", title:"Specialist injectables", when:"refractory / FH / intolerance",
           fromLabel:"goal still not met",
           html:"In established CVD, optimise to <b>atorvastatin 80 / rosuvastatin 40</b> (rosuvastatin 20 if on clopidogrel or of Asian origin), then add by residual LDL-C: <b>ezetimibe 10 mg OD</b> (LDL 1.4\u20132.5), <b>inclisiran</b> (persistently \u22652.6), <b>PCSK9 inhibitor</b> referral (LDL persistently &gt;4.0 after one CV event, or &gt;3.5 after multiple). Consider <b>icosapent ethyl</b> if on a statin with TG 1.7\u20135.6 + LDL 1.04\u20132.60. Specialist-initiated."}
        ]},
        {b:"warn", html:"<b>Stop statins in pregnancy</b> (stop 3 months pre-conception). Review interacting drugs (e.g. macrolides, some CCBs \u2014 prefer atorvastatin over simvastatin). Avoid grapefruit juice with simvastatin."},
        {b:"why", html:"NICE moved from \u201ctarget cholesterol\u201d to a <strong>percentage reduction</strong> because it captures both potency and adherence: a &gt;40% non-HDL fall reliably tracks meaningful event reduction. Most apparent \u2018failure\u2019 is non-adherence or under-dosing, which is why those come before adding a second drug."}
      ]},
    {t:"node", d:"monitor", n:"4", tag:"Monitoring", title:"Lipids + liver",
      blocks:[
        {b:"table", head:["Test","When","Action"], rows:[
          ["Full lipid profile (non-HDL)","Baseline, 3 months, then annually","&lt;40% reduction \u2192 adherence \u2192 dose \u2192 add-on"],
          ["LFTs (transaminases)","Baseline, 3 months, 12 months","Stop only if ALT/AST &gt;3\u00d7 ULN; mild rise \u2014 continue + recheck"],
          ["CK","Only if muscle symptoms","&gt;5\u00d7 ULN or rhabdo features \u2192 stop + investigate"],
          ["HbA1c","If at diabetes risk","Statins slightly \u2191 glucose \u2014 benefit still outweighs"]
        ]}
      ]},
    {t:"node", d:"follow", n:"5", tag:"Follow-up", title:"Review schedule",
      blocks:[
        {b:"timeline", items:[
          {n:"1", when:"3 months", title:"Response check", html:"Repeat non-HDL + LFTs; assess adherence and tolerability; titrate or add ezetimibe."},
          {n:"2", when:"Annually", title:"Lipid + risk review", html:"Lipid profile, adherence, CV risk factors; reinforce lifestyle."},
          {n:"3", when:"If muscle symptoms", title:"Statin-intolerance pathway", html:"Re-challenge at lower dose / alternate-day / different statin before declaring intolerance."}
        ]}
      ]},
    {t:"loop", icon:"🔁", title:"Not at the >40% goal? Check before escalating",
      arrow:"\u2026if non-HDL hasn\u2019t fallen >40%",
      intro:"Adherence is the commonest reason \u2014 explore it openly.",
      checks:[
        {b:"1 \u00b7 Adherence", html:"Beliefs about statins, media scares, side-effect fears \u2014 address directly."},
        {b:"2 \u00b7 Dose", html:"Is the statin at the highest tolerated intensity?"},
        {b:"3 \u00b7 Muscle symptoms", html:"Nocebo is common; structured re-challenge before abandoning statins."},
        {b:"4 \u00b7 Secondary cause", html:"Recheck thyroid, alcohol, diabetes control, diet."},
        {b:"5 \u00b7 Add-on", html:"Goal still unmet \u2192 add ezetimibe, then consider specialist injectables."}
      ],
      back:"Adherent, optimised, secondary causes excluded \u2192 add ezetimibe / refer"},
    {t:"node", d:"safety", n:"6", tag:"Safety-net", title:"Safety-netting",
      blocks:[
        {b:"tiles", v:"safety", items:[
          {t:"🔴 Rhabdomyolysis", html:"\u201cSevere widespread muscle pain or weakness with dark (cola-coloured) urine \u2014 stop the statin and seek urgent help.\u201d"},
          {t:"💪 Muscle aches", html:"\u201cMuscle aches are usually mild and reversible \u2014 don\u2019t just stop; ring us and we\u2019ll check and adjust.\u201d"},
          {t:"🤰 Pregnancy", html:"\u201cStop the statin if you\u2019re pregnant or planning pregnancy \u2014 tell us so we can plan.\u201d"},
          {t:"🟡 Liver", html:"\u201cYellow eyes/skin, severe tiredness or tummy pain \u2014 contact us for a liver check.\u201d"}
        ]}
      ]},
    {t:"node", d:"refer", n:"7", tag:"Refer to secondary care", title:"When to refer",
      arrow:"when specialist lipid input is needed",
      blocks:[
        {b:"tiles", v:"refer", items:[
          {t:"Familial hypercholesterolaemia", html:"Clinical FH, TC &gt;9 mmol/L, or LDL &gt;5 with FH of premature CVD \u2014 lipid clinic + cascade testing."},
          {t:"Refractory", html:"Goal not met on max statin + ezetimibe \u2014 for PCSK9i / inclisiran assessment."},
          {t:"True statin intolerance", html:"Documented intolerance to \u22652 statins \u2014 specialist alternatives."},
          {t:"Severe hypertriglyceridaemia", html:"Triglycerides &gt;10 mmol/L (pancreatitis risk) \u2014 urgent specialist advice."},
          {t:"Diagnostic doubt", html:"Unexplained very high levels or mixed dyslipidaemia."}
        ]},
        {b:"say", html:"Your cholesterol pattern looks like it may run in the family, so I\u2019d like a lipid specialist to assess you \u2014 it can also help us check your relatives. We\u2019ll keep your current treatment going meanwhile."}
      ]}
  ]
});
</script>
