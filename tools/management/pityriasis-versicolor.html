MG.render({"icon":"🍄","title":"Pityriasis Versicolor","guideline":"NICE CKS","stemTitle":"Pityriasis versicolor — antifungal; warn pigment takes months to recover","stemSub":"Primary-care management of pityriasis versicolor — a common Malassezia overgrowth causing patchy pigment change on the trunk; treat with topical antifungals (oral for extensive/refractory), and counsel that pigment normalises slowly and it commonly recurs. NICE CKS · 2026.","glance":[{"lbl":"Cause","val":"Malassezia yeast","sub":"overgrowth, not contagious"},{"lbl":"1st-line","val":"Topical antifungal","sub":"ketoconazole shampoo/cream / selenium"},{"lbl":"Extensive/refractory","val":"Oral itraconazole","sub":"short course"},{"lbl":"Counsel","val":"Pigment recovers slowly","sub":"weeks–months"},{"lbl":"Recurrence","val":"Common","sub":"intermittent prophylaxis"},{"lbl":"Confirm","val":"Clinical ± skin scrape","sub":"Wood’s lamp"}],"flow":[{"t":"node","d":"found","n":"1","tag":"Foundation","title":"Recognise","blocks":[{"b":"kv","rows":[["Typical","Multiple oval macules/patches with fine scale on the trunk/upper arms; <b>hypo- or hyperpigmented</b> (more obvious after sun/tanning); mild or no itch; young adults"],["Cause","Overgrowth of commensal Malassezia yeast — not contagious; favoured by heat/humidity/sweating"],["Confirm","Clinical; gentle scratch shows fine scale; skin scraping microscopy if uncertain; Wood’s lamp may fluoresce"],["Differentials","Pityriasis rosea, vitiligo (no scale, complete depigmentation), pityriasis alba, seborrhoeic dermatitis"]]},{"b":"why","html":"Pityriasis versicolor is a benign yeast overgrowth, easily confused with vitiligo or post-inflammatory change. Recognising the fine scale and pigment variability avoids misdiagnosis; the key counselling point is that the colour change persists long after the yeast is treated."}]},{"t":"node","d":"life","n":"2","tag":"Non-drug · advice","title":"Self-care & recurrence","blocks":[{"b":"tiles","v":"life","items":[{"t":"🌡️ Reduce humidity","html":"Heat and sweating promote it — wear loose, breathable clothing; dry skin well."},{"t":"🧴 Wash routine","html":"Periodic antifungal shampoo (as a body wash) helps prevent recurrence in susceptible people."},{"t":"🎨 Set expectations","html":"Explain pigment change takes months to normalise after the fungus clears — it is not failure."}]},{"b":"why","html":"It is harmless and tends to recur in warm, humid conditions, so realistic expectations and an occasional antifungal wash are the mainstay of non-drug care."}]},{"t":"node","d":"drug","n":"3","tag":"Treatment","title":"Antifungal","blocks":[{"b":"ladder","steps":[{"step":"1st-line","title":"Topical antifungal","when":"most cases","html":"Ketoconazole 2% shampoo applied to affected areas, left ~5 min then washed off, daily for several days (or selenium sulfide shampoo); or topical imidazole cream for limited areas."},{"step":"Extensive/refractory","title":"Oral antifungal","when":"if widespread / topical fails","fromLabel":"if extensive/refractory","html":"Oral <b>itraconazole 200 mg once daily for 7 days</b> (or <b>fluconazole 300 mg once weekly for 2 weeks</b>). Avoid oral terbinafine (ineffective orally for this) — oral itraconazole/fluconazole are the systemic options."},{"step":"Prevention","title":"Intermittent prophylaxis","when":"recurrent","fromLabel":"if recurrent","html":"Periodic antifungal shampoo (e.g. monthly or before summer) to reduce recurrence."}]},{"b":"warn","html":"Counsel clearly: the rash recurs in many people, and the <b>pigment change takes weeks to months to normalise</b> after successful treatment — persistent pale/dark patches are NOT treatment failure."}]},{"t":"node","d":"follow","n":"4","tag":"Follow-up","title":"Pigment & recurrence","blocks":[{"b":"timeline","items":[{"n":"1","when":"After treatment","title":"Pigment lags","html":"Warn that <b>pigment changes take months to normalise</b> after the fungus is cleared — persistent pale/dark patches do not mean treatment failure."},{"n":"2","when":"Recurrent","title":"Prophylaxis","html":"Recurrence is common (esp. in warm/humid conditions) → intermittent topical antifungal (e.g. ketoconazole shampoo) prophylaxis; oral options for frequent relapse."},{"n":"3","when":"Diagnostic doubt","title":"Confirm","html":"Skin scrapings for microscopy if uncertain; reconsider vitiligo, pityriasis alba, or seborrhoeic dermatitis."}]},{"b":"say","html":"The fungus clears quickly but the colour of the skin can take months to even out — that's normal. It often comes back, so an occasional antifungal wash helps keep it away."}]},{"t":"node","d":"safety","n":"5","tag":"Safety-net","title":"When to reconsider","blocks":[{"b":"tiles","v":"safety","items":[{"t":"🟠 Diagnostic doubt","html":"Widespread, persistent or atypical → confirm with scrapings; reconsider vitiligo, pityriasis alba, or seborrhoeic dermatitis."},{"t":"💬 Safety-net","html":"It's harmless, but if the patches keep spreading or don't clear with treatment, come back for a check."}]}]},{"t":"node","d":"refer","n":"6","tag":"Refer","title":"Referral","blocks":[{"b":"tiles","v":"refer","items":[{"t":"Dermatology","html":"Diagnostic uncertainty (e.g. vs vitiligo), extensive/refractory disease."},{"t":"Manage in primary care","html":"Typical disease responding to topical antifungal ± prophylaxis."}]},{"b":"say","html":"This is pityriasis versicolor — a harmless overgrowth of a normal skin yeast that leaves lighter or darker patches, more obvious with a tan. It’s not contagious. An antifungal shampoo used on the skin clears the yeast. Importantly, the colour takes a few months to even out afterwards, and it can come back — a top-up treatment now and then helps prevent that."}]}],"foot":"Management of pityriasis versicolor in primary care — antifungal therapy; pigment recovery is slow and recurrence common. Verify against current NICE CKS Pityriasis versicolor."});
</script>
