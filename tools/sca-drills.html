<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Micro-Drills · Reasoning GP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;0,8..60,600;1,8..60,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/site.css?v=11">
<style>
.tool-page{ padding:28px 32px 80px; max-width:880px; margin:0 auto; }
@media (max-width:760px){ .tool-page{ padding:18px 14px 60px; } }
.tool-head{ padding-bottom:14px; border-bottom:1px solid var(--line); margin-bottom:18px; }
.tool-eyebrow{ font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); font-weight:600; }
.tool-head h1{ font-family:'Source Serif 4',Georgia,serif; font-weight:500; font-size:34px; line-height:1.1; margin-top:6px; }
.tool-head h1 em{ font-style:italic; color:var(--teal); }
.tool-head p{ font-size:14.5px; color:var(--ink-2); margin-top:6px; max-width:66ch; }

.md-tabs{ display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; }
.md-tab{ font:inherit; font-size:13px; font-weight:700; padding:10px 18px; border-radius:10px; border:1px solid var(--line); background:#fff; color:var(--ink-2); cursor:pointer; }
.md-tab.sel{ background:#0c4a47; color:#f6f2e9; border-color:#0c4a47; }
.md-tab small{ display:block; font-weight:500; font-size:10.5px; opacity:.75; }
.md-stats{ font-size:12.5px; color:var(--muted); margin-bottom:14px; }
.md-stats b{ color:var(--ink); }

.md-card{ border:1px solid var(--line); border-radius:16px; background:#fff; padding:22px 24px; }
.md-ctx{ font-size:11px; font-weight:800; letter-spacing:.07em; text-transform:uppercase; color:#3f5c93; background:#f0f5ff; border:1px solid #d8e3f8; border-radius:999px; padding:3px 11px; display:inline-block; margin-bottom:12px; }
.md-utter{ font-family:'Source Serif 4',Georgia,serif; font-size:19px; line-height:1.5; color:var(--ink); font-style:italic; margin-bottom:16px; }

.md-opts{ display:flex; flex-direction:column; gap:9px; }
.md-opt{ font:inherit; text-align:left; cursor:pointer; border:1px solid var(--line); border-radius:11px; background:#fff; padding:12px 15px; font-size:13.5px; line-height:1.55; color:var(--ink-2); transition:.12s ease; }
.md-opt:hover{ border-color:#94a3b8; }
.md-opt.right{ border-color:#15803d; background:#f0fdf4; color:#14532d; box-shadow:0 0 0 1px #15803d; }
.md-opt.wrong{ border-color:#b91c1c; background:#fef2f2; color:#7f1d1d; }
.md-opt:disabled{ cursor:default; }
.md-why{ display:none; margin-top:14px; border:1px solid #e9d5ff; border-left:4px solid #7e22ce; border-radius:11px; background:linear-gradient(90deg,#faf5ff,#fff 60%); padding:12px 15px; font-size:13.2px; line-height:1.65; color:var(--ink-2); }
.md-why.on{ display:block; }

.md-timerline{ display:flex; align-items:center; gap:14px; margin:6px 0 14px; }
.md-clock{ font-family:'Source Serif 4',Georgia,serif; font-size:30px; font-weight:600; font-variant-numeric:tabular-nums; color:var(--ink); }
.md-clock.warn{ color:#b91c1c; }
.md-prompt{ font-size:13px; color:var(--ink-2); }

.md-model{ display:none; margin-top:6px; }
.md-model.on{ display:block; }
.md-model .mh{ font-size:11.5px; font-weight:800; letter-spacing:.07em; text-transform:uppercase; color:#15803d; margin-bottom:7px; }
.md-model .mt{ font-size:14px; line-height:1.7; color:var(--ink); background:#f0fdf4; border:1px solid #bbf7d0; border-radius:11px; padding:13px 16px; }
.md-note{ margin-top:10px; font-size:12.6px; line-height:1.6; color:#92400e; background:#fffbeb; border:1px solid #fde68a; border-radius:10px; padding:10px 13px; }
.md-beats{ margin-top:12px; display:flex; flex-direction:column; gap:7px; }
.md-beats label{ display:flex; gap:10px; align-items:flex-start; font-size:13px; line-height:1.5; color:var(--ink-2); border:1px solid var(--line); border-radius:10px; padding:9px 12px; cursor:pointer; }
.md-beats input{ margin-top:2px; accent-color:#0c4a47; flex-shrink:0; }
.md-beats label:has(input:checked){ background:#f0fdf4; border-color:#bbf7d0; }

.md-ctl{ display:flex; gap:10px; margin-top:16px; flex-wrap:wrap; }
.md-btn{ font:inherit; font-size:13px; font-weight:700; padding:10px 20px; border-radius:9px; border:1px solid var(--line); background:#fff; color:var(--ink-2); cursor:pointer; }
.md-btn:hover{ border-color:var(--ink-2); color:var(--ink); }
.md-btn.pri{ background:#0c4a47; color:#f6f2e9; border:none; }
.md-btn.pri:hover{ filter:brightness(1.12); }
.md-rate{ display:none; gap:8px; margin-top:14px; flex-wrap:wrap; align-items:center; }
.md-rate.on{ display:flex; }
.md-rate button{ font:inherit; font-size:12.5px; font-weight:700; padding:8px 16px; border-radius:999px; border:1px solid var(--line); background:#fff; cursor:pointer; }
.md-rate .r-bad{ color:#b91c1c; } .md-rate .r-good{ color:#15803d; }
</style>
</head>
<body>
<div class="sb-overlay"></div>
<div class="app">
  <aside class="sidebar" data-active-id="__tools-sca"></aside>
  <main class="main">
    <div class="tool-page">

      <div class="tool-head">
        <div class="tool-eyebrow">Reasoning GP · Isolated skills</div>
        <h1>Micro-<em>drills</em></h1>
        <p>Whole-consultation practice polishes everything a little; drills fix one thing fast. These four skills decide borderline candidates — each rep takes a minute or less, so do dozens.</p>
      </div>

      <div class="md-tabs">
        <button class="md-tab sel" data-t="cues">🎭 Cue-spotting<small>pick the response that answers the cue</small></button>
        <button class="md-tab" data-t="nets">🪢 Safety-net builder<small>say it aloud, then mark the 3 parts</small></button>
        <button class="md-tab" data-t="openers">⏱️ Golden minute<small>60 seconds with the opening line</small></button>
        <button class="md-tab" data-t="explainer">🗣️ 45-second explainer<small>explain a condition, jargon-free</small></button>
      </div>
      <div class="md-stats" id="mdStats"></div>

      <div id="mdStage"></div>

    </div>
  </main>
</div>

<script src="../assets/site.js?v=66"></script>
<script src="../assets/sca-drills.js?v=1"></script>
<script src="../assets/sca-explainer-data.js?v=1"></script>
<script>
(function(){
  'use strict';
  const $ = q => document.querySelector(q);
  const esc = s => String(s ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  const D = window.SCA_DRILLS || { cues:[], nets:[], openers:[] };
  const XP = window.SCA_EXPLAINER || [];

  const KEY = 'rgp-sca-drill-stats';
  const DEF = () => ({ cues:{n:0,ok:0}, nets:{n:0,ok:0}, openers:{n:0,ok:0}, explainer:{n:0,ok:0} });
  const load = () => { try { return Object.assign(DEF(), JSON.parse(localStorage.getItem(KEY)) || {}); } catch(e){ return DEF(); } };
  const save = s => { try { localStorage.setItem(KEY, JSON.stringify(s)); } catch(e){} };

  let mode = 'cues', recent = { cues:[], nets:[], openers:[], explainer:[] }, timer = null;

  function stats(){
    const s = load();
    const seg = k => s[k].n ? `${s[k].ok}/${s[k].n}` : '–';
    $('#mdStats').innerHTML = `Session record — cues caught: <b>${seg('cues')}</b> · nets complete: <b>${seg('nets')}</b> · strong openings: <b>${seg('openers')}</b> · explainers nailed: <b>${seg('explainer')}</b>`;
  }

  function bump(kind, ok){
    const s = load(); s[kind].n++; if (ok) s[kind].ok++; save(s); stats();
  }

  function pick(kind){
    const SRC = kind==='explainer' ? XP : D[kind];
    const pool = SRC.map((x, i) => i).filter(i => !recent[kind].includes(i));
    const list = pool.length ? pool : SRC.map((x, i) => i);
    const i = list[Math.floor(Math.random() * list.length)];
    recent[kind].push(i); if (recent[kind].length > Math.max(4, SRC.length - 2)) recent[kind].shift();
    return SRC[i];
  }

  /* ---- 45-second explainer drill (merged from the standalone tool) ---- */
  function renderExplainer(){
    const d = pick('explainer'); if(!d){ $('#mdStage').innerHTML='<div class="md-card">Explainer set unavailable.</div>'; return; }
    let left = 45;
    $('#mdStage').innerHTML = `
      <div class="md-card">
        <span class="md-ctx">Explain in plain English · ${esc(d.t||'')}</span>
        <div class="md-utter" style="font-style:normal">Explain <b>${esc(d.c)}</b> to a patient — no jargon, as if they'd never heard of it.</div>
        <div class="md-timerline"><span class="md-clock" id="mdClock">0:45</span><span class="md-prompt">Say it <b>out loud</b> in 45 seconds — analogy, why it matters, what we do, safety-net.</span></div>
        <div class="md-ctl">
          <button class="md-btn pri" id="mdStart">Start the 45 seconds</button>
          <button class="md-btn" id="mdSkip">Skip to model</button>
        </div>
        <div class="md-model" id="mdModel">
          <div class="mh">A model explanation — yours can differ and still be excellent</div>
          <div class="mt">${esc(d.m)}</div>
          <div class="md-beats">${(d.b||[]).map(b => `<label><input type="checkbox"><span>${esc(b)}</span></label>`).join('')}</div>
          <div class="md-rate on" style="margin-top:14px">
            <span style="font-size:12.5px;color:var(--muted)">Could the patient repeat it back?</span>
            <button class="r-bad" data-ok="0">Too much jargon / muddled</button>
            <button class="r-good" data-ok="1">Clear — they'd get it</button>
          </div>
        </div>
      </div>`;
    const showModel = () => { clearInterval(timer); $('#mdModel').classList.add('on'); $('#mdStart').style.display='none'; $('#mdSkip').style.display='none'; };
    $('#mdStart').addEventListener('click', () => {
      $('#mdStart').disabled = true; clearInterval(timer);
      timer = setInterval(() => {
        left--; const c = $('#mdClock');
        if (!c) { clearInterval(timer); return; }
        c.textContent = '0:' + String(Math.max(left, 0)).padStart(2, '0');
        c.classList.toggle('warn', left <= 10);
        if (left <= 0) showModel();
      }, 1000);
    });
    $('#mdSkip').addEventListener('click', showModel);
    document.querySelectorAll('.md-rate button').forEach(b => b.addEventListener('click', () => { bump('explainer', b.dataset.ok === '1'); renderExplainer(); }));
  }

  /* ---- Cue drill ---- */
  function renderCue(){
    const d = pick('cues');
    const order = [0,1,2].sort(() => Math.random() - .5);
    $('#mdStage').innerHTML = `
      <div class="md-card">
        <span class="md-ctx">${esc(d.ctx)}</span>
        <div class="md-utter">${esc(d.u)}</div>
        <div class="md-opts">${order.map(i => `<button class="md-opt" data-i="${i}">${esc(d.opts[i])}</button>`).join('')}</div>
        <div class="md-why" id="mdWhy"></div>
        <div class="md-ctl"><button class="md-btn pri" id="mdNext" style="display:none">Next cue →</button></div>
      </div>`;
    document.querySelectorAll('.md-opt').forEach(b => b.addEventListener('click', () => {
      if (b.disabled) return;
      const i = +b.dataset.i;
      document.querySelectorAll('.md-opt').forEach(x => {
        x.disabled = true;
        if (+x.dataset.i === d.best) x.classList.add('right');
      });
      if (i !== d.best) b.classList.add('wrong');
      bump('cues', i === d.best);
      $('#mdWhy').innerHTML = '<b>' + (i === d.best ? '✓ Cue answered. ' : '✗ Cue missed. ') + '</b>' + esc(d.why);
      $('#mdWhy').classList.add('on');
      $('#mdNext').style.display = '';
    }));
    $('#mdNext').addEventListener('click', renderCue);
  }

  /* ---- Safety-net drill ---- */
  function renderNet(){
    const d = pick('nets');
    $('#mdStage').innerHTML = `
      <div class="md-card">
        <span class="md-ctx">Build the safety-net</span>
        <div class="md-utter" style="font-style:normal">${esc(d.s)}</div>
        <div class="md-prompt">Say your safety-net <b>out loud, now</b> — as you would to this patient. Then reveal the model and mark yourself against the three-part standard.</div>
        <div class="md-ctl"><button class="md-btn pri" id="mdReveal">I've said it — show the model</button></div>
        <div class="md-model" id="mdModel">
          <div class="mh">A model net — yours can differ and still be complete</div>
          <div class="mt">${esc(d.m)}</div>
          <div class="md-note">${esc(d.note)}</div>
          <div class="md-beats">
            <label><input type="checkbox"><span><b>Named symptoms</b> — specific, observable, in patient language (not "if it gets worse")</span></label>
            <label><input type="checkbox"><span><b>Timeframe</b> — when to expect improvement and when waiting becomes wrong</span></label>
            <label><input type="checkbox"><span><b>Route back</b> — exactly who to contact, including out-of-hours, with permission to use it</span></label>
          </div>
          <div class="md-rate on" id="mdRate" style="margin-top:14px">
            <span style="font-size:12.5px;color:var(--muted)">Did YOUR net have all three parts?</span>
            <button class="r-bad" data-ok="0">Missing parts</button>
            <button class="r-good" data-ok="1">All three — complete</button>
          </div>
        </div>
      </div>`;
    $('#mdReveal').addEventListener('click', () => { $('#mdModel').classList.add('on'); $('#mdReveal').style.display = 'none'; });
    document.querySelectorAll('#mdRate button').forEach(b => b.addEventListener('click', () => { bump('nets', b.dataset.ok === '1'); renderNet(); }));
  }

  /* ---- Golden minute drill ---- */
  function renderOpener(){
    const d = pick('openers');
    let left = 60;
    $('#mdStage').innerHTML = `
      <div class="md-card">
        <span class="md-ctx">${esc(d.ctx)}</span>
        <div class="md-utter">${esc(d.u)}</div>
        <div class="md-timerline"><span class="md-clock" id="mdClock">1:00</span><span class="md-prompt">Respond <b>out loud</b> — you have one minute to take the consultation somewhere good.</span></div>
        <div class="md-ctl">
          <button class="md-btn pri" id="mdStart">Start the minute</button>
          <button class="md-btn" id="mdSkip">Skip to model</button>
        </div>
        <div class="md-model" id="mdModel">
          <div class="mh">One strong first minute — a standard, not a script</div>
          <div class="mt">${esc(d.m)}</div>
          <div class="md-beats">${d.beats.map(b => `<label><input type="checkbox"><span>${esc(b)}</span></label>`).join('')}</div>
          <div class="md-rate on" style="margin-top:14px">
            <span style="font-size:12.5px;color:var(--muted)">Honest self-mark:</span>
            <button class="r-bad" data-ok="0">Floundered / interrogated</button>
            <button class="r-good" data-ok="1">Opened it up well</button>
          </div>
        </div>
      </div>`;
    const showModel = () => {
      clearInterval(timer);
      $('#mdModel').classList.add('on');
      $('#mdStart').style.display = 'none';
      $('#mdSkip').style.display = 'none';
    };
    $('#mdStart').addEventListener('click', () => {
      $('#mdStart').disabled = true;
      clearInterval(timer);
      timer = setInterval(() => {
        left--;
        const c = $('#mdClock');
        if (!c) { clearInterval(timer); return; }
        c.textContent = '0:' + String(Math.max(left, 0)).padStart(2, '0');
        c.classList.toggle('warn', left <= 10);
        if (left <= 0) showModel();
      }, 1000);
    });
    $('#mdSkip').addEventListener('click', showModel);
    document.querySelectorAll('.md-rate button').forEach(b => b.addEventListener('click', () => { bump('openers', b.dataset.ok === '1'); renderOpener(); }));
  }

  const RENDER = { cues: renderCue, nets: renderNet, openers: renderOpener, explainer: renderExplainer };
  document.querySelectorAll('.md-tab').forEach(t => t.addEventListener('click', () => {
    document.querySelectorAll('.md-tab').forEach(x => x.classList.toggle('sel', x === t));
    mode = t.dataset.t;
    clearInterval(timer);
    RENDER[mode]();
  }));

  stats();
  renderCue();
})();
</script>
<script src="../assets/nav-back.js?v=1"></script>
</body>
</html>
