<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Examinations · GP / SCA Clinical Reasoning</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;0,8..60,600;1,8..60,400&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../assets/site.css?v=11" />
<style>
  .tool-page{ padding:28px 32px 80px; max-width:1180px; margin:0 auto; }
  @media (max-width:760px){ .tool-page{ padding:18px 14px 60px; } }

  .tool-breadcrumb{display:flex;gap:6px;align-items:center;font-size:12px;color:var(--muted);margin-bottom:18px;flex-wrap:wrap}
  .tool-breadcrumb a{color:var(--teal-2);text-decoration:none;font-weight:600;cursor:pointer}
  .tool-breadcrumb a:hover{color:var(--rust)}
  .tool-breadcrumb svg{width:11px;height:11px;color:var(--muted-2)}

  .tool-head{padding-bottom:14px;border-bottom:1px solid var(--line);margin-bottom:20px}
  .tool-head .eyebrow{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);font-weight:600}
  .tool-head h1{font-family:'Source Serif 4',Georgia,serif;font-weight:500;font-size:clamp(1.8rem,3.4vw,2.4rem);line-height:1.12;margin-top:8px}
  .tool-head h1 em{font-style:italic;color:var(--teal);font-weight:500}
  .tool-head p{font-size:14.5px;color:var(--ink-2);margin-top:10px;max-width:70ch;line-height:1.6}

  /* Controls */
  .ex-controls{display:flex;gap:14px;align-items:center;flex-wrap:wrap;margin-bottom:8px}
  .ex-search{position:relative;flex:1;min-width:260px}
  .ex-search svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}
  .ex-search input{width:100%;font:inherit;font-size:15px;padding:12px 14px 12px 42px;border:1px solid var(--line-2);border-radius:10px;background:#fff;color:var(--ink)}
  .ex-search input:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 4px var(--teal-soft)}
  .ex-count-pill{font-size:13px;color:var(--muted);font-weight:500;white-space:nowrap}
  .ex-count-pill b{color:var(--ink);font-feature-settings:"tnum"}
  .ex-empty{display:none;padding:40px 20px;text-align:center;color:var(--muted)}
  .ex-empty.show{display:block}

  /* Launcher groups */
  .ex-group{margin-top:30px}
  .ex-group-head{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--line)}
  .egh-ic{font-size:18px}
  .ex-group-head h2{font-family:'Source Serif 4',Georgia,serif;font-weight:500;font-size:21px;color:var(--ink);letter-spacing:-.01em}
  .egh-count{font-size:11px;font-weight:700;color:var(--muted);background:var(--bg-soft);border:1px solid var(--line);border-radius:99px;padding:2px 9px}
  .ex-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px}

  .ex-card{display:flex;align-items:flex-start;gap:12px;padding:14px 15px;background:#fff;border:1px solid var(--line);border-radius:12px;text-decoration:none;color:inherit;transition:all .15s ease}
  .ex-card:hover{border-color:var(--teal);box-shadow:var(--shadow-2);transform:translateY(-1px)}
  .ex-ic{font-size:22px;line-height:1.1;flex-shrink:0;width:30px;text-align:center}
  .ex-tx{display:flex;flex-direction:column;gap:3px;min-width:0;flex:1}
  .ex-tx b{font-size:14.5px;font-weight:600;color:var(--ink);line-height:1.25}
  .ex-tx small{font-size:12px;color:var(--muted);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .ex-meta{display:flex;gap:5px;margin-top:2px}
  .ex-flag-path,.ex-flag-red{font-size:9.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:1px 7px;border-radius:99px}
  .ex-flag-path{background:var(--teal-soft);color:var(--teal)}
  .ex-flag-red{background:var(--rust-soft);color:var(--rust-2)}
  .ex-arrow{color:var(--line-2);font-size:16px;flex-shrink:0;align-self:center;transition:.15s}
  .ex-card:hover .ex-arrow{color:var(--teal);transform:translateX(2px)}

  .ex-foot{margin-top:36px;padding:14px 18px;background:var(--bg-soft);border:1px solid var(--line);border-radius:10px;font-size:12.5px;color:var(--muted);line-height:1.5}
  .ex-foot strong{color:var(--ink-2)}

  /* Detail */
  .ex-back{display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:600;color:var(--teal-2);text-decoration:none;padding:6px 12px;border:1px solid var(--line);border-radius:99px;background:#fff;margin-bottom:16px;transition:all .15s}
  .ex-back:hover{border-color:var(--teal);background:var(--teal-soft);color:var(--teal)}
  .ex-detail-head{display:flex;gap:16px;align-items:flex-start;padding-bottom:18px;border-bottom:1px solid var(--line);margin-bottom:8px}
  .ex-dh-ic{font-size:34px;line-height:1;flex-shrink:0;width:56px;height:56px;display:flex;align-items:center;justify-content:center;background:var(--bg-soft);border:1px solid var(--line);border-radius:14px}
  .ex-dh-sys{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--teal-2);font-weight:700}
  .ex-detail-head h1{font-family:'Source Serif 4',Georgia,serif;font-weight:500;font-size:clamp(1.6rem,3vw,2.1rem);line-height:1.12;margin:5px 0 0;color:var(--ink)}
  .ex-detail-head p{font-size:14px;color:var(--ink-2);margin-top:8px;line-height:1.55;max-width:72ch}

  .ex-sec{margin-top:26px}
  .ex-sec-h{font-family:'Source Serif 4',Georgia,serif;font-weight:600;font-size:18px;color:var(--ink);margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid var(--line)}

  .ex-chips{display:flex;flex-wrap:wrap;gap:7px}
  .ex-chip{font-size:13px;line-height:1.4;padding:6px 12px;border-radius:8px;border:1px solid var(--line);background:#fff;color:var(--ink-2)}
  .ex-chip-ind{background:var(--teal-soft);border-color:var(--teal-soft);color:var(--teal)}
  .ex-chip-eq{background:var(--bg-soft)}

  /* Red flags */
  .ex-redflags{margin-top:24px;background:var(--rust-soft);border:1px solid var(--rust);border-left:4px solid var(--rust);border-radius:12px;padding:16px 20px}
  .ex-rf-h{font-weight:700;color:var(--rust-2);font-size:14px;margin-bottom:8px;letter-spacing:.01em}
  .ex-redflags ul{margin:0;padding-left:20px}
  .ex-redflags li{font-size:13.5px;color:var(--ink-2);line-height:1.55;margin-bottom:4px}

  /* Sequence phases */
  .ex-phases{display:flex;flex-direction:column;gap:12px}
  .ex-phase{border:1px solid var(--line);border-radius:12px;overflow:hidden;background:#fff}
  .ex-phase-h{font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--teal);background:var(--bg-soft);padding:10px 16px;border-bottom:1px solid var(--line)}
  .ex-phase.is-tests .ex-phase-h{color:var(--rust-2);background:var(--rust-soft)}
  .ex-phase-list{list-style:none;margin:0;padding:6px 0}
  .ex-li{padding:9px 16px;border-bottom:1px dashed var(--line)}
  .ex-li:last-child{border-bottom:none}
  .ex-li-name{font-size:14px;font-weight:600;color:var(--ink);line-height:1.4;display:block}
  .ex-li-rich .ex-li-name{margin-bottom:5px}
  .ex-li-row{display:grid;grid-template-columns:78px 1fr;gap:10px;font-size:13px;line-height:1.5;color:var(--ink-2);padding:1px 0}
  .ex-li-k{font-size:10.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);padding-top:2px}
  .ex-li-pit .ex-li-k{color:var(--rust-2)}
  .ex-li-pit span:last-child{color:var(--rust-2)}
  @media(max-width:560px){.ex-li-row{grid-template-columns:1fr;gap:1px}.ex-li-k{padding-top:4px}}

  /* Outcomes table */
  .ex-outcomes{width:100%;border-collapse:collapse;border:1px solid var(--line);border-radius:10px;overflow:hidden;font-size:13.5px}
  .ex-outcomes th{text-align:left;background:var(--bg-soft);padding:9px 14px;font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);font-weight:700;border-bottom:1px solid var(--line)}
  .ex-outcomes td{padding:10px 14px;border-bottom:1px solid var(--line);line-height:1.5;color:var(--ink-2);vertical-align:top}
  .ex-outcomes tr:last-child td{border-bottom:none}
  .ex-outcomes td:first-child{font-weight:600;color:var(--ink);width:34%}

  /* Common findings (reassure / follow-up / refer) */
  .cf-legend{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
  .cf-pill{display:inline-block;font-size:11px;font-weight:700;letter-spacing:.02em;padding:3px 10px;border-radius:99px;white-space:nowrap}
  .cf-reassure{background:#e7f3ec;color:#1f7a44;border:1px solid #bfe0cb}
  .cf-followup{background:#fdf3e2;color:#9a6a16;border:1px solid #f0d9a8}
  .cf-refer{background:#eaf1fb;color:#27508f;border:1px solid #c2d6f2}
  .cf-urgent{background:var(--rust-soft);color:var(--rust-2);border:1px solid var(--rust)}
  .cf-wrap{display:flex;flex-direction:column;gap:18px}
  .cf-group-h{font-size:13px;font-weight:700;color:var(--ink);margin:0 0 8px;display:flex;align-items:center;gap:7px}
  .cf-table td{vertical-align:top}
  .cf-table td.cf-find{font-weight:600;color:var(--ink);width:30%}
  .cf-table td.cf-act{width:130px;white-space:nowrap}
  .cf-table td.cf-detail{font-weight:400;color:var(--ink-2)}
  @media(max-width:620px){
    .cf-table,.cf-table thead,.cf-table tbody,.cf-table tr,.cf-table td{display:block;width:auto}
    .cf-table thead{display:none}
    .cf-table tr{border:1px solid var(--line);border-radius:10px;margin-bottom:8px;padding:10px 12px}
    .cf-table td{border:none!important;padding:2px 0}
    .cf-table td.cf-find{width:auto}
    .cf-table td.cf-act{width:auto;margin:4px 0}
  }

  /* Pathway */
  .ex-pathway{display:flex;flex-direction:column}
  .ex-pw-step{display:grid;grid-template-columns:auto 1fr;gap:14px;background:#fff;border:1px solid var(--line);border-left:4px solid var(--teal);border-radius:12px;padding:14px 16px}
  .ex-pw-num{width:30px;height:30px;border-radius:50%;background:var(--teal-soft);color:var(--teal);font-weight:700;font-size:14px;display:flex;align-items:center;justify-content:center}
  .ex-pw-q{font-family:'Source Serif 4',Georgia,serif;font-weight:600;font-size:16px;color:var(--ink);line-height:1.3}
  .ex-pw-note{font-size:12.5px;color:var(--muted);margin-top:4px;line-height:1.5;font-style:italic}
  .ex-pw-branches{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:8px;margin-top:10px}
  .ex-pw-branch{border:1px solid var(--line);border-radius:8px;padding:9px 11px;background:var(--bg-soft)}
  .ex-pw-cond{font-size:13px;font-weight:700;color:var(--ink)}
  .ex-pw-clues{font-size:12px;color:var(--muted);margin-top:2px;line-height:1.45}
  .ex-pw-line{display:flex;gap:7px;margin-top:6px;font-size:12px;line-height:1.45;color:var(--ink-2)}
  .ex-pw-k{font-size:9px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:1px 6px;border-radius:99px;flex-shrink:0;height:fit-content;margin-top:1px}
  .ex-pw-k.ex-pc{background:var(--teal-soft);color:var(--teal)}
  .ex-pw-k.ex-rf{background:var(--rust-soft);color:var(--rust-2)}
  .ex-pw-connector{width:2px;height:18px;background:var(--line-2);margin-left:32px}

  /* Links */
  .ex-links{display:flex;flex-wrap:wrap;gap:8px}
  .ex-link{display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:500;color:var(--ink-2);text-decoration:none;padding:8px 13px;border:1px solid var(--line);border-radius:10px;background:#fff;transition:all .15s}
  .ex-link:hover{border-color:var(--teal);background:var(--teal-soft);color:var(--teal)}

  .ex-keynote{margin-top:24px;padding:13px 16px;background:var(--mustard-soft);border:1px solid var(--mustard);border-radius:10px;font-size:13.5px;color:var(--ink-2);line-height:1.55}
  .ex-keynote strong{color:var(--ink)}

  /* Triage findings (reassure / follow-up / refer) */
  .ex-triage{display:flex;flex-direction:column;gap:22px}
  .ex-tri-gh{font-family:'Source Serif 4',Georgia,serif;font-weight:600;font-size:15.5px;color:var(--teal);margin:0 0 11px;letter-spacing:-.01em}
  .ex-tri-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:12px}
  .ex-tri{border:1px solid var(--line);border-radius:12px;background:#fff;padding:14px 16px;display:flex;flex-direction:column;gap:8px}
  .ex-tri-find{font-size:14.5px;font-weight:700;color:var(--ink);line-height:1.35}
  .ex-tri-row{display:grid;grid-template-columns:78px 1fr;gap:10px;font-size:13px;line-height:1.5;color:var(--ink-2)}
  .ex-tri-k{font-size:10px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;padding:2px 8px;border-radius:99px;height:fit-content;text-align:center}
  .ex-tri-row.r-green .ex-tri-k{background:#dcfce7;color:#15803d}
  .ex-tri-row.r-amber .ex-tri-k{background:#fef3c7;color:#b45309}
  .ex-tri-row.r-red .ex-tri-k{background:var(--rust-soft);color:var(--rust-2)}
  @media(max-width:560px){.ex-tri-row{grid-template-columns:1fr;gap:2px}.ex-tri-k{justify-self:start}}
</style>
</head>
